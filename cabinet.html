<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мугалимдин кабинети | MUGALIM.AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #e2e8f0; 
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .custom-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: 0.3s;
        }

        .custom-input:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .hero-text {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="stars-container">
        <canvas id="starsCanvas"></canvas>
    </div>

    <a href="index.html" class="absolute top-8 left-8 text-gray-400 hover:text-white transition flex items-center gap-2">
        <i class="fas fa-arrow-left"></i> Башкы бетке
    </a>

    <div id="auth-section" class="glass-card w-full max-w-md p-10 rounded-[2.5rem] text-center">
        <div class="mb-8">
            <div class="w-20 h-20 bg-blue-600/20 text-blue-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 border border-blue-500/30">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2 id="auth-title" class="text-3xl font-black mb-2 uppercase tracking-tight hero-text">Кирүү</h2>
            <p id="auth-subtitle" class="text-gray-400 text-sm">Мугалимдин жеке кабинетине кирүү</p>
        </div>

        <div class="space-y-4 text-left">
            <div>
                <label class="text-xs font-bold uppercase tracking-widest text-gray-500 ml-2">Почта</label>
                <input type="email" id="email" placeholder="example@mail.com" class="custom-input w-full p-4 rounded-xl mt-1">
            </div>
            <div>
                <label class="text-xs font-bold uppercase tracking-widest text-gray-500 ml-2">Сыр сөз</label>
                <input type="password" id="password" placeholder="••••••••" class="custom-input w-full p-4 rounded-xl mt-1">
            </div>
        </div>

        <button id="main-btn" onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl mt-8 transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-blue-600/30">
            КИРҮҮ <i class="fas fa-sign-in-alt ml-2"></i>
        </button>

        <p class="mt-6 text-gray-500 text-sm">
            <span id="toggle-text">Аккаунтуңуз жокпу?</span> 
            <button onclick="toggleMode()" id="toggle-btn" class="text-blue-400 font-bold hover:underline">Каттоодон өтүү</button>
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            messagingSenderId: "241750360816",
            appId: "1:241750360816:web:a991434eb5afbc470d7835",
            measurementId: "G-9GSQV60QV0"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const mainBtn = document.getElementById('main-btn');
            const toggleText = document.getElementById('toggle-text');
            const toggleBtn = document.getElementById('toggle-btn');

            if (isLoginMode) {
                title.innerText = "Кирүү";
                subtitle.innerText = "Мугалимдин жеке кабинетине кирүү";
                mainBtn.innerHTML = 'КИРҮҮ <i class="fas fa-sign-in-alt ml-2"></i>';
                mainBtn.onclick = login;
                toggleText.innerText = "Аккаунтуңуз жокпу?";
                toggleBtn.innerText = "Каттоодон өтүү";
            } else {
                title.innerText = "Каттоо";
                subtitle.innerText = "Жаңы мугалим катары катталуу";
                mainBtn.innerHTML = 'КАТТАЛУУ <i class="fas fa-user-plus ml-2"></i>';
                mainBtn.onclick = register;
                toggleText.innerText = "Аккаунтуңуз барбы?";
                toggleBtn.innerText = "Кирүү барагына";
            }
        }

        function login() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!email || !pass) {
                alert("Почта жана сыр сөзүңүздү жазыңыз!");
                return;
            }

            auth.signInWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    // Багыттоо ишенимдүү болушу үчүн replace колдонобуз
                    window.location.replace("teacher-dashboard.html");
                })
                .catch((error) => {
                    let msg = error.message;
                    if (error.code === 'auth/wrong-password') msg = "Сыр сөз туура эмес!";
                    if (error.code === 'auth/user-not-found') msg = "Мындай почта катталган эмес!";
                    alert("Кирүүдө ката: " + msg);
                });
        }

        function register() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!email || !pass) {
                alert("Каттоо үчүн бардык талааларды толтуруңуз!");
                return;
            }

            if (pass.length < 6) {
                alert("Сыр сөз кеминде 6 белгиден турушу керек!");
                return;
            }

            auth.createUserWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    // Катталгандан кийин сессияны токтотуу жана кирүүгө багыттоо
                    auth.signOut().then(() => {
                        alert("Ийгиликтүү катталдыңыз! Эми почтаңыз жана сыр сөзүңүз менен кириңиз.");
                        document.getElementById('email').value = "";
                        document.getElementById('password').value = "";
                        toggleMode(); 
                    });
                })
                .catch((error) => {
                    let msg = error.message;
                    if (error.code === 'auth/email-already-in-use') msg = "Бул почта мурунтан катталган!";
                    alert("Каттоодо ката: " + msg);
                });
        }

        // Жылдыздардын анимациясы
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: Math.random() * 0.2,
                    twinkle: Math.random() * 0.02, 
                    color: '#ffffff'
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.opacity += star.twinkle;
                if (star.opacity > 1 || star.opacity < 0.2) star.twinkle *= -1;
                ctx.globalAlpha = Math.abs(star.opacity);
                ctx.fillStyle = star.color;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
            });
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        drawStars();
    </script>
</body>
</html>
