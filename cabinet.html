<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мугалимдин кабинети - Bilimal</title>
    <link rel="stylesheet" href="style.css"> <!-- Стилдер үчүн -->
</head>
<body style="background-color: #001f3f; color: white; font-family: sans-serif;">

    <div id="auth-section" style="max-width: 400px; margin: 100px auto; text-align: center; border: 1px solid #1a3a5a; padding: 30px; border-radius: 15px;">
        <h2>Мугалимдер үчүн кирүү</h2>
        <p>Өзүңүздүн жеке кабинетиңизге кириңиз</p>
        
        <input type="email" id="email" placeholder="Электрондук почта" style="width: 100%; padding: 10px; margin: 10px 0;">
        <input type="password" id="password" placeholder="Сөз айкашы" style="width: 100%; padding: 10px; margin: 10px 0;">
        
        <button onclick="login()" style="background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; margin-top: 10px;">Кирүү</button>
        <button onclick="register()" style="background: transparent; color: #ccc; border: none; margin-top: 15px; cursor: pointer;">Каттоодон өтүү</button>
    </div>

    <script src="auth.js"></script> <!-- Логиканы бөлүп жазабыз -->
</body>
</html>
