<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Kuuмай Онлайн | Жарыш Талаасы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body {
            background: #0b0f19 url('../assets/game-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
        }
        .blur-box {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* АТТАРДЫН АРТЫНДАГЫ АК КУТУЧАНЫ ӨЧҮРҮҮ СТИЛИ */
        .horse-card {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }
        .horse-img {
            mix-blend-mode: lighten; /* Ак фону бар GIF сүрөттөрдү караңгы фонго тунук кылып сиңирет */
            background: transparent !important;
        }
        .horse-wrapper {
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="setup-container" class="w-full max-w-md blur-box rounded-[2rem] p-8 shadow-2xl text-center">
        <h2 class="text-3xl font-black text-amber-400 uppercase tracking-wider mb-2">Кыз Куумай</h2>
        <div id="target-theme-display" class="bg-white/10 px-4 py-1.5 rounded-full text-xs font-bold inline-block text-cyan-300 mb-6">
            Тест жүктөлүүдө...
        </div>

        <div class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-black uppercase text-gray-400 mb-2 tracking-widest">Атыңызды жазыңыз:</label>
                <input type="text" id="player-name-input" placeholder="Мисалы: Илим" class="w-full bg-black/40 border border-white/20 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-400 transition">
            </div>

            <button onclick="createNewRoom()" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-black font-black py-4 rounded-xl text-xs uppercase tracking-widest transition-all shadow-lg font-bold">
                Бөлмө Түзүү (Жигит 🐎)
            </button>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink mx-4 text-gray-500 text-xs font-bold uppercase tracking-widest">же кошулуу</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <div>
                <input type="text" id="room-code-input" placeholder="Кодду жазыңыз..." class="w-full bg-black/40 border border-white/20 rounded-xl px-4 py-3 text-sm text-center font-mono text-amber-400 tracking-widest focus:outline-none focus:border-emerald-400 transition mb-2">
                <button onclick="joinExistingRoom()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-black py-4 rounded-xl text-xs uppercase tracking-widest transition-all shadow-lg font-bold">
                    Бөлмөгө Кирүү (Кыз 🐎)
                </button>
            </div>
        </div>
    </div>

    <div id="game-container" class="hidden w-full max-w-5xl flex flex-col gap-6">
        
        <div class="w-full blur-box rounded-2xl p-4 flex justify-between items-center text-xs md:text-sm font-bold">
            <div class="bg-blue-600/30 border border-blue-500/40 px-4 py-2 rounded-xl">
                Бөлмө: <span id="display-room-code" class="text-amber-400 font-mono">---</span>
            </div>
            <div id="game-status-text" class="text-amber-400 uppercase tracking-widest">
                Оюнчу күтүлүүдө...
            </div>
            <div class="flex gap-4">
                <span class="text-orange-400">Жигит: <span id="p1-score-display">0</span></span>
                <span class="text-pink-400">Кыз: <span id="p2-score-display">0</span></span>
            </div>
        </div>

        <div class="w-full bg-black/50 border border-white/10 rounded-[2rem] p-4 h-48 relative overflow-hidden flex flex-col justify-center gap-4">
            
            <div id="horse-p1" class="horse-wrapper absolute left-0 flex flex-col items-center" style="transform: translateX(20px);">
                <span class="bg-orange-500 text-black text-[10px] font-black px-2 py-0.5 rounded-full uppercase mb-1">Жигит</span>
                <div class="horse-card p-0 m-0">
                    <img src="../assets/horse-boy.gif" alt="Жигит" class="horse-img h-24 w-auto bg-transparent">
                </div>
            </div>

            <div id="horse-p2" class="horse-wrapper absolute left-0 flex flex-col items-center" style="transform: translateX(120px);">
                <span class="bg-pink-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full uppercase mb-1">Кыз</span>
                <div class="horse-card p-0 m-0">
                    <img src="../assets/horse-girl.gif" alt="Кыз" class="horse-img h-24 w-auto bg-transparent">
                </div>
            </div>
        </div>

        <div id="quiz-box" class="w-full blur-box rounded-[2.5rem] p-8 flex flex-col items-center text-center min-h-[220px] justify-between">
            <div class="w-full">
                <span id="question-counter" class="text-xs font-bold uppercase tracking-widest text-gray-400 block mb-2">Жарыш</span>
                <h3 id="question-text" class="text-xl md:text-2xl font-bold max-w-3xl mx-auto leading-relaxed">
                    Эки оюнчу тең киргенде суроолор ушул жерге чыгат...
                </h3>
            </div>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full mt-6"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentSubject = urlParams.get('subject');
        const currentTheme = urlParams.get('theme');

        const DB_URL = "https://bilimal-org-default-rtdb.asia-southeast1.firebasedatabase.app";
        const firebaseConfig = {
            apiKey: "AIzaSyAs7_3V9vG-67Xz-lR7pXF_N74bO8m0bVE",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: DB_URL,
            projectId: "bilimal-org"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.app().database(DB_URL);

        let activeQuizQuestions = [];
        let myRoomCode = null;
        let myRole = null; 
        let currentQuestionIndex = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const displayTag = document.getElementById('target-theme-display');
            if (!currentSubject || !currentTheme) return;
            
            if(displayTag) displayTag.textContent = `Тема: ${currentTheme.replace(/_/g, " ").toUpperCase()}`;

            db.ref(`quizzes/${currentSubject}/${currentTheme}`).once('value').then((snapshot) => {
                const quizData = snapshot.val();
                if (!quizData) return;
                activeQuizQuestions = quizData.questions || (Array.isArray(quizData) ? quizData : Object.values(quizData));
            });
        });

        function createNewRoom() {
            const playerName = document.getElementById('player-name-input').value.trim();
            if (!playerName || activeQuizQuestions.length === 0) { alert("Атыңызды жазыңыз же тесттин жүктөлүшүн күтүңүз!"); return; }

            myRoomCode = Math.floor(1000 + Math.random() * 9000).toString();
            myRole = 'player1';

            const roomData = {
                roomCode: myRoomCode,
                subject: currentSubject,
                theme: currentTheme,
                status: "waiting",
                questions: activeQuizQuestions,
                player1: { name: playerName, score: 0, position: 20 },
                player2: { name: "Күтүүдө...", score: 0, position: 120 }
            };

            db.ref(`rooms/${myRoomCode}`).set(roomData).then(() => {
                initGameUI();
                listenToRoomChanges();
            });
        }

        function joinExistingRoom() {
            const playerName = document.getElementById('player-name-input').value.trim();
            const roomCode = document.getElementById('room-code-input').value.trim();

            if (!playerName || !roomCode) { alert("Маалыматтарды толук киргизиңиз!"); return; }
            myRoomCode = roomCode;
            myRole = 'player2';

            db.ref(`rooms/${roomCode}`).once('value').then((snapshot) => {
                const room = snapshot.val();
                if (!room) { alert("Бөлмө табылган жок!"); return; }

                activeQuizQuestions = room.questions || [];

                db.ref(`rooms/${roomCode}/player2`).set({ name: playerName, score: 0, position: 120 })
                    .then(() => {
                        db.ref(`rooms/${roomCode}`).update({ status: "playing" });
                        initGameUI();
                        listenToRoomChanges();
                    });
            });
        }

        function initGameUI() {
            document.getElementById('setup-container').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            if(document.getElementById('display-room-code')) {
                document.getElementById('display-room-code').innerText = myRoomCode;
            }
        }

        function listenToRoomChanges() {
            db.ref(`rooms/${myRoomCode}`).on('value', (snapshot) => {
                const room = snapshot.val();
                if (!room) return;

                // КАТАЛАРДЫ АЛДЫН АЛУУ МЕНЕН ЖАҢЫЛОО
                if(document.getElementById('p1-score-display') && room.player1) document.getElementById('p1-score-display').innerText = room.player1.score;
                if(document.getElementById('p2-score-display') && room.player2) document.getElementById('p2-score-display').innerText = room.player2.score;

                if(room.player1 && document.getElementById('horse-p1')) document.getElementById('horse-p1').style.transform = `translateX(${room.player1.position}px)`;
                if(room.player2 && document.getElementById('horse-p2')) document.getElementById('horse-p2').style.transform = `translateX(${room.player2.position}px)`;

                if (room.status === "playing") {
                    if(document.getElementById('game-status-text')) document.getElementById('game-status-text').innerText = "Жарыш башталды! 🏁";
                    if (document.getElementById('options-grid').children.length === 0) {
                        renderQuestion();
                    }
                }
            });
        }

        function renderQuestion() {
            if (currentQuestionIndex >= activeQuizQuestions.length) {
                showFinalResults();
                return;
            }

            const currentQuestion = activeQuizQuestions[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `Суроо №${currentQuestionIndex + 1}`;
            document.getElementById('question-text').innerText = currentQuestion.title || currentQuestion.question || "Суроо";

            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';

            const answers = [
                { text: currentQuestion.answerA, isCorrect: true },
                { text: currentQuestion.answerB, isCorrect: false },
                { text: currentQuestion.answerC, isCorrect: false },
                { text: currentQuestion.answerD, isCorrect: false }
            ].filter(a => a.text);

            answers.sort(() => Math.random() - 0.5);

            answers.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = "w-full bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl p-4 text-sm text-left active:scale-[0.98] transition";
                btn.innerText = ans.text;
                btn.onclick = () => handleAnswerSelection(ans.isCorrect, btn);
                optionsGrid.appendChild(btn);
            });
        }

        function handleAnswerSelection(isCorrect, btn) {
            const buttons = document.getElementById('options-grid').getElementsByTagName('button');
            for(let b of buttons) b.disabled = true;

            if (isCorrect) {
                btn.classList.add('bg-emerald-500/30', 'border-emerald-500', 'text-emerald-400');
                db.ref(`rooms/${myRoomCode}/${myRole}`).once('value').then(snapshot => {
                    const data = snapshot.val() || { score: 0, position: 0 };
                    db.ref(`rooms/${myRoomCode}/${myRole}`).update({
                        score: data.score + 1,
                        position: data.position + 60 
                    });
                });
            } else {
                btn.classList.add('bg-rose-500/30', 'border-rose-500', 'text-rose-400');
            }

            setTimeout(() => {
                currentQuestionIndex++;
                renderQuestion();
            }, 1500);
        }

        function showFinalResults() {
            document.getElementById('question-counter').innerText = "Финиш!";
            document.getElementById('question-text').innerText = "Сиз бардык суроолорго жооп бердиңиз!";
            document.getElementById('options-grid').innerHTML = `
                <a href="../games/index.html" class="w-full text-center bg-blue-600 py-4 rounded-xl font-bold text-xs uppercase tracking-widest col-span-2">
                    Оюндар бөлүмүнө кайтуу
                </a>
            `;
        }
    </script>
</body>
</html>
