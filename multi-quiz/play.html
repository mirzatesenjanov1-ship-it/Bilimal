<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай Онлайн | Жарыш Талаасы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body {
            background: #0b0f19 url('../assets/kyz-jygyt.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            transition: background 1s ease;
        }
        .blur-box {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .horse-wrapper {
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        video {
            object-fit: cover;
            background: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <audio id="bg-menu-music" src="../assets/music-menu.mp3" loop></audio>
    <audio id="bg-game-music" src="../assets/music.mp3" loop></audio>

    <div id="setup-container" class="w-full max-w-md blur-box rounded-[2rem] p-8 shadow-2xl text-center">
        <h2 class="text-3xl font-black text-amber-400 uppercase tracking-wider mb-2">Кыз Куумай</h2>
        <div id="target-theme-display" class="bg-white/10 px-4 py-1.5 rounded-full text-xs font-bold inline-block text-cyan-300 mb-6">
            Тест жүктөлүүдө...
        </div>

        <div class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-black uppercase text-gray-400 mb-2 tracking-widest">Атыңызды жазыңыз:</label>
                <input type="text" id="player-name-input" placeholder="Мисалы: Илим" class="w-full bg-black/40 border border-white/20 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-400 transition">
            </div>

            <button onclick="createNewRoom()" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-black font-black py-4 rounded-xl text-xs uppercase tracking-widest transition-all shadow-lg">
                Бөлмө Түзүү (Жигит 🐎)
            </button>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink mx-4 text-gray-500 text-xs font-bold uppercase tracking-widest">же кошулуу</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <div>
                <input type="text" id="room-code-input" placeholder="Кодду жазыңыз..." class="w-full bg-black/40 border border-white/20 rounded-xl px-4 py-3 text-sm text-center font-mono text-amber-400 tracking-widest focus:outline-none focus:border-emerald-400 transition mb-2">
                <button onclick="joinExistingRoom()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-black py-4 rounded-xl text-xs uppercase tracking-widest transition-all shadow-lg">
                    Бөлмөгө Кирүү (Кыз 🐎)
                </button>
            </div>
        </div>
    </div>

    <div id="game-container" class="hidden w-full max-w-5xl flex flex-col gap-6">
        
        <div class="w-full blur-box rounded-2xl p-4 flex justify-between items-center text-xs md:text-sm font-bold">
            <div class="bg-blue-600/30 border border-blue-500/40 px-4 py-2 rounded-xl">
                Бөлмө: <span id="display-room-code" class="text-amber-400 font-mono">---</span>
            </div>
            <div id="game-status-text" class="text-amber-400 uppercase tracking-widest">
                Оюнчу күтүлүүдө...
            </div>
            <div class="flex gap-4">
                <span class="text-orange-400"><span id="p1-name-tag">Жигит</span>: <span id="p1-score-display">0</span></span>
                <span class="text-pink-400"><span id="p2-name-tag">Кыз</span>: <span id="p2-score-display">0</span></span>
            </div>
        </div>

        <div class="w-full bg-black/60 border border-white/10 rounded-[2rem] p-4 h-52 relative overflow-hidden flex flex-col justify-center gap-2">
            
            <div id="horse-p1" class="horse-wrapper absolute left-0 flex flex-col items-center" style="transform: translateX(20px);">
                <span id="label-p1" class="bg-orange-500 text-black text-[10px] font-black px-2 py-0.5 rounded-full uppercase mb-1">Жигит</span>
                <video id="video-p1" src="../assets/boy_run.mp4" class="h-20 w-auto rounded-lg" autoplay loop muted playsinline></video>
            </div>

            <div id="horse-p2" class="horse-wrapper absolute left-0 flex flex-col items-center" style="transform: translateX(140px);">
                <span id="label-p2" class="bg-pink-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full uppercase mb-1">Кыз</span>
                <video id="video-p2" src="../assets/girl_run.mp4" class="h-20 w-auto rounded-lg" autoplay loop muted playsinline></video>
            </div>
        </div>

        <div id="quiz-box" class="w-full blur-box rounded-[2.5rem] p-8 flex flex-col items-center text-center min-h-[260px] justify-between">
            <div class="w-full">
                <span id="question-counter" class="text-xs font-bold uppercase tracking-widest text-gray-400 block mb-2">Жарыш</span>
                <h3 id="question-text" class="text-xl md:text-2xl font-bold max-w-3xl mx-auto leading-relaxed">
                    Эки оюнчу тең киргенде жарыш башталат...
                </h3>
            </div>
            
            <div id="waiting-turn-msg" class="hidden text-amber-400 font-bold animate-pulse text-lg my-4">
                <i class="fas fa-hourglass-half mr-2"></i> Жообуңуз кабыл алынды. Атаандашыңыздын жообун күтүп жатасыз...
            </div>

            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full mt-6"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentSubject = urlParams.get('subject') ? decodeURIComponent(urlParams.get('subject')) : null;
        const currentTheme = urlParams.get('theme') ? decodeURIComponent(urlParams.get('theme')) : null;

        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let activeQuizQuestions = [];
        let myRoomCode = null;
        let myRole = null; 
        let currentQuestionIndex = 0;
        let isListening = false;
        let p1Name = "Жигит", p2Name = "Кыз";

        // Музыкаларды башкаруу
        const menuMusic = document.getElementById('bg-menu-music');
        const gameMusic = document.getElementById('bg-game-music');
        const vidP1 = document.getElementById('video-p1');
        const vidP2 = document.getElementById('video-p2');

        window.addEventListener('DOMContentLoaded', () => {
            // Меню музыкасын баштоо
            document.body.addEventListener('click', () => {
                if(menuMusic.paused && !myRoomCode) menuMusic.play().catch(()=>{});
            }, { once: true });

            const displayTag = document.getElementById('target-theme-display');
            if (!currentSubject || !currentTheme) {
                if(displayTag) displayTag.textContent = "Түз бөлмө режими";
                return;
            }
            if(displayTag) displayTag.textContent = `Тема: ${currentTheme.toUpperCase()}`;

            db.ref(`kyzKuumayQuiz/${currentSubject}/${currentTheme}`).once('value').then((snapshot) => {
                let quizData = snapshot.val();
                if (!quizData) return db.ref(`quizzes/${currentSubject}/${currentTheme}`).once('value');
                return snapshot;
            }).then((snapshot) => {
                const quizData = snapshot.val();
                if (quizData) {
                    activeQuizQuestions = quizData.questions || (Array.isArray(quizData) ? quizData : Object.values(quizData));
                    if(displayTag) displayTag.textContent = `Тема: ${currentTheme.toUpperCase()} (Жүктөлдү)`;
                } else {
                    if(displayTag) displayTag.textContent = "Тест табылган жок!";
                }
            });
        });

        function createNewRoom() {
            const playerName = document.getElementById('player-name-input').value.trim();
            if (!playerName) { alert("Атыңызды жазыңыз!"); return; }
            if (activeQuizQuestions.length === 0) { alert("Тест толук жүктөлө элек, күтө туруңуз!"); return; }

            myRoomCode = Math.floor(1000 + Math.random() * 9000).toString();
            myRole = 'player1';
            p1Name = playerName;

            const roomData = {
                roomCode: myRoomCode,
                status: "waiting",
                currentQuestion: 0,
                questions: activeQuizQuestions,
                player1: { name: playerName, score: 0, position: 20, answered: false },
                player2: { name: "Күтүүдө...", score: 0, position: 140, answered: false }
            };

            db.ref(`rooms/${myRoomCode}`).set(roomData).then(() => {
                initGameUI();
                listenToRoomChanges();
            });
        }

        function joinExistingRoom() {
            const playerName = document.getElementById('player-name-input').value.trim();
            const roomCode = document.getElementById('room-code-input').value.trim();
            if (!playerName || !roomCode) { alert("Маалыматты толук киргизиңиз!"); return; }

            myRoomCode = roomCode;
            myRole = 'player2';
            p2Name = playerName;

            db.ref(`rooms/${roomCode}`).once('value').then((snapshot) => {
                const room = snapshot.val();
                if (!room) { alert("Бөлмө табылган жок!"); return; }

                activeQuizQuestions = room.questions || [];
                db.ref(`rooms/${roomCode}/player2`).set({ name: playerName, score: 0, position: 140, answered: false })
                    .then(() => {
                        db.ref(`rooms/${roomCode}`).update({ status: "playing" });
                        initGameUI();
                        listenToRoomChanges();
                    });
            });
        }

        function initGameUI() {
            document.getElementById('setup-container').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            document.body.style.background = "#0b0f19 url('../assets/game-bg.jpg') no-repeat center center fixed";
            document.body.style.backgroundSize = "cover";
            document.getElementById('display-room-code').innerText = myRoomCode;

            menuMusic.pause();
            gameMusic.play().catch(()=>{});

            // Аттарды алгач күтүү абалына коюу (пауза)
            vidP1.pause();
            vidP2.pause();
        }

        function listenToRoomChanges() {
            if (isListening) return;
            isListening = true;

            db.ref(`rooms/${myRoomCode}`).on('value', (snapshot) => {
                const room = snapshot.val();
                if (!room) return;

                p1Name = room.player1 ? room.player1.name : "Жигит";
                p2Name = room.player2 ? room.player2.name : "Кыз";

                document.getElementById('p1-name-tag').innerText = p1Name;
                document.getElementById('p2-name-tag').innerText = p2Name;
                document.getElementById('label-p1').innerText = p1Name;
                document.getElementById('label-p2').innerText = p2Name;

                document.getElementById('p1-score-display').innerText = room.player1.score;
                document.getElementById('p2-score-display').innerText = room.player2.score;

                document.getElementById('horse-p1').style.transform = `translateX(${room.player1.position}px)`;
                document.getElementById('horse-p2').style.transform = `translateX(${room.player2.position}px)`;

                currentQuestionIndex = room.currentQuestion;

                if (room.status === "playing") {
                    document.getElementById('game-status-text').innerText = "Жарыш башталды! 🏁";
                    
                    // Эки оюнчу тең жооп берип бүткөнүн текшерүү
                    if (room.player1.answered && room.player2.answered) {
                        // Экөө тең жооп берди -> Аттар чуркайт (Видео ойнойт)
                        vidP1.play().catch(()=>{});
                        vidP2.play().catch(()=>{});

                        // 2.5 секунддан кийин кийинки суроого автоматтык түрдө өтүү
                        setTimeout(() => {
                            if (myRole === 'player1') { // Маалымат кайталанбаш үчүн бирөөсү гана жаңылайт
                                db.ref(`rooms/${myRoomCode}`).update({
                                    currentQuestion: currentQuestionIndex + 1,
                                    "player1/answered": false,
                                    "player2/answered": false
                                });
                            }
                        }, 2500);
                    } else {
                        // Эгер кимдир бирөө жооп бере элек болсо, аттар токтойт
                        vidP1.pause();
                        vidP2.pause();

                        // Менин ролум жооп бердиби? Текшерүү
                        if (room[myRole].answered) {
                            document.getElementById('options-grid').innerHTML = '';
                            document.getElementById('waiting-turn-msg').classList.remove('hidden');
                        } else {
                            document.getElementById('waiting-turn-msg').classList.add('hidden');
                            renderQuestion();
                        }
                    }
                }
            });
        }

        function renderQuestion() {
            if (activeQuizQuestions.length === 0) return;

            if (currentQuestionIndex >= activeQuizQuestions.length) {
                showFinalResults();
                return;
            }

            const currentQuestion = activeQuizQuestions[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `Суроо №${currentQuestionIndex + 1} / ${activeQuizQuestions.length}`;
            document.getElementById('question-text').innerText = currentQuestion.title || currentQuestion.question || "Суроо";

            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';

            // Коопсуз варианттарды чогултуу (ар кандай аттар менен келсе дагы)
            const rawAnswers = [
                { text: currentQuestion.answerA || currentQuestion.variantA || currentQuestion.a, isCorrect: true },
                { text: currentQuestion.answerB || currentQuestion.variantB || currentQuestion.b, isCorrect: false },
                { text: currentQuestion.answerC || currentQuestion.variantC || currentQuestion.c, isCorrect: false },
                { text: currentQuestion.answerD || currentQuestion.variantD || currentQuestion.d, isCorrect: false }
            ].filter(a => a.text);

            // Эгерде базада атайын вариант жок болсо, тест туура түзүлгөн эмес
            if (rawAnswers.length === 0) {
                optionsGrid.innerHTML = `<p class="col-span-2 text-rose-400 font-bold">Бул суроонун варианттары табылган жок! Администраторго кайрылыңыз.</p>`;
                return;
            }

            // Биринчи кирген суроону аралаштырбай, бир ирет гана көрсөтүү үчүн
            if(!optionsGrid.dataset.index || optionsGrid.dataset.index != currentQuestionIndex) {
                rawAnswers.sort(() => Math.random() - 0.5);
                optionsGrid.dataset.index = currentQuestionIndex;
                window.currentShuffledAnswers = rawAnswers;
            }

            window.currentShuffledAnswers.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = "w-full bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl p-4 text-sm text-left active:scale-[0.98] transition text-white font-medium";
                btn.innerText = ans.text;
                btn.onclick = () => handleAnswerSelection(ans.isCorrect, btn);
                optionsGrid.appendChild(btn);
            });
        }

        function handleAnswerSelection(isCorrect, btn) {
            const buttons = document.getElementById('options-grid').getElementsByTagName('button');
            for(let b of buttons) b.disabled = true;

            if (isCorrect) {
                btn.classList.add('bg-emerald-500/30', 'border-emerald-500', 'text-emerald-400');
            } else {
                btn.classList.add('bg-rose-500/30', 'border-rose-500', 'text-rose-400');
            }

            // Упайды жана абалды базага жөнөтүү
            db.ref(`rooms/${myRoomCode}/${myRole}`).once('value').then(snapshot => {
                const data = snapshot.val();
                const newScore = isCorrect ? data.score + 1 : data.score;
                const newPosition = isCorrect ? data.position + 60 : data.position;

                db.ref(`rooms/${myRoomCode}/${myRole}`).update({
                    score: newScore,
                    position: newPosition,
                    answered: true
                });
            });
        }

        function showFinalResults() {
            gameMusic.pause();
            vidP1.pause();
            vidP2.pause();

            document.getElementById('question-counter').innerText = "Финиш! Жыйынтык";
            
            db.ref(`rooms/${myRoomCode}`).once('value').then(snapshot => {
                const room = snapshot.val();
                const s1 = room.player1.score;
                const s2 = room.player2.score;
                
                let resultText = "";
                if (s1 > s2) {
                    // Жигит утту
                    resultText = `<span class="text-orange-400 font-black text-2xl block mb-4">🏆 Жигит Утту!</span> "${p1Name}" деген жигит "${p2Name}" деген кызды кууп жетти! 🐎`;
                } else {
                    // Кыз утту же Тең чыгуу (кыз качып кетти)
                    resultText = `<span class="text-pink-400 font-black text-2xl block mb-4">🏆 Кыз Утту!</span> "${p1Name}" деген жигиттен "${p2Name}" деген кыз качып кетти! 🏹`;
                }

                document.getElementById('question-text').innerHTML = resultText;
                document.getElementById('options-grid').innerHTML = `
                    <div class="col-span-2 text-center bg-white/5 p-4 rounded-xl border border-white/10 mb-4">
                        <p class="text-sm text-gray-300">Жалпы упайлар:</p>
                        <p class="text-lg font-bold mt-2 text-orange-400">${p1Name} (Жигит): ${s1}</p>
                        <p class="text-lg font-bold text-pink-400">${p2Name} (Кыз): ${s2}</p>
                    </div>
                    <a href="../games/index.html" class="w-full text-center bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-4 rounded-xl font-bold text-xs uppercase tracking-widest col-span-2 shadow-lg transition">
                        Оюндар бөлүмүнө кайтуу
                    </a>
                `;
            });
        }
    </script>
</body>
</html>
