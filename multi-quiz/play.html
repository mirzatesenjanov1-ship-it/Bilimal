<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай — Онлайн Физика Оюну</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght=400;600;700;900&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #05070c; 
            color: #e2e8f0; 
            overflow-x: hidden;
            position: relative;
        }

        /* 🌆 СЫРТКЫ ЧОҢ ФОНДУК СҮРӨТ — ТОЛУГУ МЕНЕН ТУПТУНУК ЖАНА ДААНА */
        .bg-fullscreen-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('kyz-jygyt.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(0px) brightness(0.75); /* Блёр толугу менен өчүрүлдү, сүрөт туптунук! */
            z-index: -1;
        }
        
        /* 🧪 ОРТОДОГУ РАМКАНЫ МАКСИМАЛДУУ ТУНУК КЫЛУУ (Ultra Glassmorphism) */
        .blur-box-transparent { 
            background: rgba(11, 15, 25, 0.25) !important; /* Фон абдан жука жана тунук */
            backdrop-filter: blur(4px); /* Артындагы сүрөт даана көрүнүп турат */
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
        }

        /* ✏️ ИНПУТТАРДЫ ТУПТУНУК КЫЛУУ */
        .input-transparent {
            background: rgba(255, 255, 255, 0.05) !important; /* Ичи дээрлик тунук */
            border: 1px solid rgba(255, 255, 255, 0.25) !important;
            backdrop-filter: blur(2px);
        }
        .input-transparent:focus {
            border-color: #f59e0b !important;
            background: rgba(255, 255, 255, 0.15) !important;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        /* ТАЗА АК ФОНДУУ ЗОНА */
        .game-track-zone {
            background: #ffffff !important;
            background-color: #ffffff !important;
            border: none !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .video-avatar-clean { 
            width: 130px; 
            height: auto; 
            object-fit: contain;
            background: transparent !important;
        }

        /* Эмоциялардын калкып чыгуу анимациясы */
        .emoji-bubble {
            position: absolute;
            top: -50px;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            font-size: 24px;
            animation: bounceUp 0.4s ease-out forwards;
            color: black;
            border: 2px solid #f3f4f6;
            z-index: 50;
        }

        @keyframes bounceUp {
            0% { transform: translateY(20px) scale(0.5); opacity: 0; }
            70% { transform: translateY(-5px) scale(1.1); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .finish-card {
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes scaleIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4" onclick="startMenuMusic()">

    <div class="bg-fullscreen-image"></div>

    <div id="setup-container" class="w-full max-w-md blur-box-transparent rounded-[2rem] p-6 text-center space-y-5 transition-all duration-300 z-10">
        
        <div class="w-full overflow-hidden rounded-2xl shadow-lg border border-white/20">
            <img src="kyz-jygyt.png" alt="Кыз Куумай" class="w-full h-44 object-cover">
        </div>

        <h2 class="text-3xl font-black text-amber-400 uppercase tracking-wider drop-shadow-[0_4px_12px_rgba(0,0,0,0.9)]">Кыз Куумай</h2>
        
        <div id="theme-badge" class="bg-slate-950/90 text-amber-300 border border-amber-500/40 px-3 py-1.5 rounded-full text-xs font-bold inline-block backdrop-blur-md shadow-md">
            Тема жүктөлүүдө...
        </div>

        <div class="space-y-4 pt-1">
            <div class="text-left">
                <label class="block text-[10px] font-bold text-white uppercase tracking-widest mb-1.5 pl-1 drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)]">Атыңызды жазыңыз:</label>
                <input type="text" id="player-name-input" placeholder="Мисалы: Илим" class="w-full input-transparent rounded-xl px-4 py-3 text-white text-sm font-bold outline-none transition-all placeholder-gray-400">
            </div>

            <button onclick="createRoomProcess()" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-slate-950 font-black text-xs uppercase tracking-widest py-4 rounded-xl transition-all shadow-xl shadow-black/50">
                Бөлмө Түзүү (Жигит 🏇)
            </button>

            <div class="relative flex py-1 items-center">
                <div class="flex-grow border-t border-white/30"></div>
                <span class="flex-shrink mx-4 text-white text-[10px] font-black uppercase tracking-wider drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)]">же кошулуу</span>
                <div class="flex-grow border-t border-white/30"></div>
            </div>

            <div class="flex gap-2">
                <input type="number" id="room-id-input" placeholder="Код..." class="w-2/3 input-transparent rounded-xl px-4 py-3 text-center text-amber-300 font-black tracking-widest outline-none text-sm placeholder-gray-400">
                <button onclick="joinRoomProcess()" class="w-1/3 bg-emerald-600 hover:bg-emerald-500 text-white font-black text-xs uppercase tracking-widest rounded-xl transition-all shadow-xl shadow-black/50">
                    Кирүү (Кыз 🐎)
                </button>
            </div>
        </div>
    </div>

    <div id="game-container" class="w-full max-w-7xl flex flex-col gap-4 hidden z-10">
        
        <div class="flex justify-between items-center bg-slate-900/90 border border-slate-800 p-4 rounded-2xl text-white shadow-md backdrop-blur-md">
            <div class="bg-blue-600 px-3 py-1.5 rounded-lg font-bold text-sm flex items-center gap-1.5">
                <i class="fas fa-door-open"></i> Бөлмө: <span id="room-id-display" class="text-amber-300">0000</span>
            </div>
            <div id="game-status-center" class="font-black tracking-widest text-xs uppercase text-amber-400 animate-pulse">КҮТҮҮДӨ... 🕒</div>
            <div class="flex gap-6 text-sm font-bold">
                <span class="text-orange-400 flex items-center gap-1.5"><span id="display-jigit-name">Жигит</span>: <span id="score-jigit" class="bg-orange-500/20 px-2 py-0.5 rounded text-white">0</span></span>
                <span class="text-pink-400 flex items-center gap-1.5"><span id="display-kyz-name">Кыз</span>: <span id="score-kyz" class="bg-pink-500/20 px-2 py-0.5 rounded text-white">0</span></span>
            </div>
        </div>

        <div class="h-80 game-track-zone rounded-3xl overflow-hidden p-6 flex items-end">
            <div class="absolute inset-x-0 bottom-12 border-b border-dashed border-slate-200"></div>

            <div id="player-jigit" class="absolute transition-all duration-700 flex flex-col items-center" style="left: 5%; bottom: 20px;">
                <div id="emoji-jigit" class="emoji-bubble hidden">😂</div>
                <div class="bg-orange-500 text-white font-bold text-[10px] px-2 py-0.5 rounded-full mb-1 shadow-md">Жигит</div>
                <video src="boy_run.mp4" class="video-avatar-clean" autoplay loop muted playsinline></video>
            </div>

            <div id="player-kyz" class="absolute transition-all duration-700 flex flex-col items-center" style="left: 17%; bottom: 20px;">
                <div id="emoji-kyz" class="emoji-bubble hidden">😂</div>
                <div class="bg-pink-500 text-white font-bold text-[10px] px-2 py-0.5 rounded-full mb-1 shadow-md">Кыз</div>
                <video src="girl_run.mp4" class="video-avatar-clean" autoplay loop muted playsinline></video>
            </div>
        </div>

        <div id="interactive-panel" class="blur-box-transparent border border-white/20 rounded-3xl p-8 flex flex-col items-center gap-4 shadow-2xl relative">
            
            <div class="flex gap-4 text-2xl mb-1 bg-slate-950/80 px-6 py-2.5 rounded-full border border-white/20 shadow-inner backdrop-blur-md">
                <button onclick="sendEmoji('😂')" class="hover:scale-130 transition-transform active:scale-95">😂</button>
                <button onclick="sendEmoji('🚀')" class="hover:scale-130 transition-transform active:scale-95">🚀</button>
                <button onclick="sendEmoji('🔥')" class="hover:scale-130 transition-transform active:scale-95">🔥</button>
                <button onclick="sendEmoji('😎')" class="hover:scale-130 transition-transform active:scale-95">😎</button>
                <button onclick="sendEmoji('😱')" class="hover:scale-130 transition-transform active:scale-95">😱</button>
            </div>
            
            <div id="question-meta" class="text-white text-[10px] font-black tracking-widest uppercase bg-slate-950/90 px-4 py-1.5 rounded-full border border-white/20 mb-2 shadow-md">
                Суроо № <span id="current-question-num" class="text-amber-400">1</span> / 20
            </div>
            
            <h2 id="question-text" class="text-white text-lg md:text-xl font-bold text-center max-w-4xl leading-relaxed drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)]">
                Экинчи оюнчу кошулганда оюн автоматтык түрдө башталат...
            </h2>
            
            <div id="waiting-overlay-msg" class="hidden text-amber-400 font-medium text-sm animate-pulse bg-amber-500/20 border border-amber-500/40 px-5 py-3 rounded-xl flex items-center gap-2 backdrop-blur-sm">
                <i class="fas fa-spinner fa-spin"></i> Сиз жооп бердиңиз. Каршылашыңыздын жооп беришин күтүп жатасыз...
            </div>

            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-5xl mt-2"></div>
        </div>

    </div>

    <script>
        // --- АУДИОЛОРДУ ЖӨНДӨӨ ---
        const menuMusic = new Audio('music-menu.mp3');
        menuMusic.loop = true;
        
        const gameMusic = new Audio('music.mp3');
        gameMusic.loop = true;

        let isMenuMusicPlaying = false;

        function startMenuMusic() {
            if (!isMenuMusicPlaying && document.getElementById('game-container').classList.contains('hidden')) {
                menuMusic.play().then(() => {
                    isMenuMusicPlaying = true;
                }).catch(err => console.log("Музыканы баштоо үчүн экранды басыңыз"));
            }
        }

        // --- FIREBASE ЖӨНДӨӨЛӨРҮ ---
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const currentSubject = urlParams.get('subject') || "Физика";
        const currentTheme = urlParams.get('theme') || "Механика (Динамика жана Кинематика)";
        
        document.getElementById('theme-badge').innerText = `${currentSubject} ➔ ${currentTheme}`;

        let myRoomId = null;
        let myRole = null; 
        let myPlayerName = "";
        let hasIAnswered = false; 

        function createRoomProcess() {
            const nameInput = document.getElementById('player-name-input').value.trim();
            if (!nameInput) { alert("Атыңызды жазыңыз!"); return; }
            myPlayerName = nameInput; myRole = 'jigit';
            myRoomId = Math.floor(1000 + Math.random() * 9000).toString();

            database.ref(`teacherQuizzes/${currentSubject}/${currentTheme}/questions`).once('value').then(snapshot => {
                if (!snapshot.exists()) { alert("Суроолор табылган жок!"); return; }
                const questionsFromTeacher = snapshot.val();
                
                database.ref(`rooms/${myRoomId}`).set({
                    roomId: myRoomId, subject: currentSubject, theme: currentTheme,
                    jigitName: myPlayerName, jigitScore: 0, jigitAnswered: false,
                    kyzName: "Күтүлүүдө...", kyzScore: 0, kyzAnswered: false,   
                    currentQuestionIndex: 0, status: "waiting", roomQuestions: questionsFromTeacher,
                    lastEmojiJigit: "", lastEmojiKyz: "", emojiTrigger: 0
                }).then(() => { startGameSession(); });
            });
        }

        function joinRoomProcess() {
            const nameInput = document.getElementById('player-name-input').value.trim();
            const idInput = document.getElementById('room-id-input').value.trim();
            if (!nameInput || !idInput) { alert("Маалыматтарды толук жазыңыз!"); return; }
            myPlayerName = nameInput; myRole = 'kyz'; myRoomId = idInput;

            database.ref(`rooms/${myRoomId}`).once('value').then(snapshot => {
                if (!snapshot.exists()) { alert("Бөлмө табылган жок!"); return; }
                database.ref(`rooms/${myRoomId}`).update({ kyzName: myPlayerName, status: "playing" })
                .then(() => { startGameSession(); });
            });
        }

        function sendEmoji(emoji) {
            if (!myRoomId) return;
            const field = myRole === 'jigit' ? 'lastEmojiJigit' : 'lastEmojiKyz';
            database.ref(`rooms/${myRoomId}`).update({
                [field]: emoji,
                emojiTrigger: Math.random()
            });
        }

        function showEmojiBubble(role, emoji) {
            const element = document.getElementById(`emoji-${role}`);
            if (!element || !emoji) return;
            element.textContent = emoji;
            element.classList.remove('hidden');
            setTimeout(() => { element.classList.add('hidden'); }, 2000);
        }

        function startGameSession() {
            document.getElementById('setup-container').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            document.getElementById('room-id-display').textContent = myRoomId;

            database.ref(`rooms/${myRoomId}`).on('value', snapshot => {
                const room = snapshot.val();
                if (!room) return;

                if (room.status === "playing") {
                    menuMusic.pause();
                    gameMusic.play().catch(() => {});
                }

                document.getElementById('display-jigit-name').textContent = room.jigitName;
                document.getElementById('display-kyz-name').textContent = room.kyzName;
                document.getElementById('score-jigit').textContent = room.jigitScore;
                document.getElementById('score-kyz').textContent = room.kyzScore;

                if (room.lastEmojiJigit) showEmojiBubble('jigit', room.lastEmojiJigit);
                if (room.lastEmojiKyz) showEmojiBubble('kyz', room.lastEmojiKyz);

                const jigitLeft = 5 + ((room.jigitScore / 10) * 3.5);
                const kyzLeft = 17 + ((room.kyzScore / 10) * 3.5);
                
                document.getElementById('player-jigit').style.left = `${jigitLeft > 85 ? 85 : jigitLeft}%`;
                document.getElementById('player-kyz').style.left = `${kyzLeft > 85 ? 85 : kyzLeft}%`;

                if (room.status === "waiting") {
                    document.getElementById('game-status-center').textContent = "КҮТҮҮДӨ... 🕒";
                    return;
                }

                if (kyzLeft - jigitLeft <= 11 && room.jigitScore > 0 && room.status !== "finished") {
                    showFinalResult(`🎉 ОЮН АЯКТАДЫ! 🎉`, `<span class="text-amber-400 font-extrabold">${room.jigitName}</span> деген жигит <span class="text-pink-400 font-extrabold">${room.kyzName}</span> деген кызга жетти! 🏇✨`, room.jigitScore, room.kyzScore);
                    if (myRole === 'jigit') database.ref(`rooms/${myRoomId}`).update({ status: "finished" });
                    return;
                }

                if (room.status === "finished") return;

                const qIndex = room.currentQuestionIndex || 0;
                document.getElementById('current-question-num').textContent = qIndex + 1;

                if (room.jigitAnswered === true && room.kyzAnswered === true) {
                    if (myRole === 'jigit') {
                        setTimeout(() => {
                            database.ref(`rooms/${myRoomId}`).update({
                                currentQuestionIndex: qIndex + 1,
                                jigitAnswered: false,
                                kyzAnswered: false
                            });
                        }, 1200);
                    }
                    hasIAnswered = false; 
                    return;
                }

                if ((myRole === 'jigit' && room.jigitAnswered) || (myRole === 'kyz' && room.kyzAnswered)) {
                    document.getElementById('waiting-overlay-msg').classList.remove('hidden');
                    document.getElementById('options-container').classList.add('pointer-events-none', 'opacity-30');
                    return;
                } else {
                    document.getElementById('waiting-overlay-msg').classList.add('hidden');
                    document.getElementById('options-container').classList.remove('pointer-events-none', 'opacity-40');
                }

                if (room.roomQuestions && qIndex >= room.roomQuestions.length) {
                    showFinalResult(`🏁 ЖАРЫШ АЯКТАДЫ! 🏁`, `<span class="text-amber-400 font-extrabold">${room.jigitName}</span> деген жигиттен <span class="text-pink-400 font-extrabold">${room.kyzName}</span> деген кыз качып кетти! 🐎💨`, room.jigitScore, room.kyzScore);
                    if (myRole === 'jigit') database.ref(`rooms/${myRoomId}`).update({ status: "finished" });
                    return;
                }

                if (room.roomQuestions && room.roomQuestions[qIndex]) {
                    if (!hasIAnswered) {
                        renderQuestionWithOptions(room.roomQuestions[qIndex]);
                    }
                }
            });
        }

        function showFinalResult(title, message, scoreJ, scoreK) {
            document.getElementById('game-status-center').textContent = "АЯКТАДЫ 🏁";
            gameMusic.pause();

            const interactivePanel = document.getElementById('interactive-panel');
            interactivePanel.innerHTML = `
                <div class="finish-card text-center py-8 px-4 flex flex-col items-center justify-center w-full max-w-2xl mx-auto">
                    <div class="text-6xl mb-4 animate-bounce">🏆</div>
                    <h1 class="text-3xl font-black text-amber-400 uppercase tracking-widest mb-4">${title}</h1>
                    <p class="text-white text-xl font-medium text-center leading-relaxed mb-6 bg-slate-950/90 p-6 rounded-2xl border border-white/20 shadow-inner backdrop-blur-md">
                        ${message}
                    </p>
                    <div class="flex gap-8 text-sm font-bold bg-slate-950/90 px-6 py-3 rounded-full border border-white/20 backdrop-blur-md">
                        <span class="text-orange-400">Жигит упай: <span class="text-white bg-orange-500/30 px-2 py-0.5 rounded ml-1">${scoreJ}</span></span>
                        <div class="border-l border-white/20 h-5"></div>
                        <span class="text-pink-400">Кыз упай: <span class="text-white bg-pink-500/30 px-2 py-0.5 rounded ml-1">${scoreK}</span></span>
                    </div>
                </div>
            `;
        }

        function renderQuestionWithOptions(questionObj) {
            const questionTextElement = document.getElementById("question-text"); 
            const optionsContainer = document.getElementById("options-container"); 

            optionsContainer.innerHTML = "";
            questionTextElement.textContent = questionObj.text || questionObj.question || "Суроо тексти жүктөлүүдө...";

            let rawOptions = [
                { isCorrect: true, text: questionObj.variantA || "" },
                { isCorrect: false, text: questionObj.variantB || "" },
                { isCorrect: false, text: questionObj.variantC || "" },
                { isCorrect: false, text: questionObj.variantD || "" }
            ].filter(o => o.text !== "");

            if (rawOptions.length === 0) {
                optionsContainer.innerHTML = `<p class="text-red-400 col-span-full text-center text-sm font-bold">⚠️ Варианттар табылган жок!</p>`;
                return;
            }

            for (let i = rawOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rawOptions[i], rawOptions[j]] = [rawOptions[j], rawOptions[i]];
            }

            rawOptions.forEach((option) => {
                const button = document.createElement("button");
                button.className = "w-full text-center bg-sky-500 hover:bg-sky-400 text-white font-bold p-4 rounded-xl transition-all duration-200 shadow-lg border border-sky-600/30 text-base text-ellipsis overflow-hidden";
                button.textContent = option.text;
                
                button.onclick = function() {
                    hasIAnswered = true;
                    const allButtons = optionsContainer.querySelectorAll('button');
                    allButtons.forEach(btn => btn.disabled = true);
                    processUserAnswer(option.isCorrect, button);
                };

                optionsContainer.appendChild(button);
            });
        }

        function processUserAnswer(isCorrect, selectedButton) {
            if (isCorrect) {
                selectedButton.className = "w-full text-center bg-emerald-600 text-white font-bold p-4 rounded-xl shadow-lg border border-emerald-700 text-base scale-98 transition-all";
                const scoreField = myRole === 'jigit' ? 'jigitScore' : 'kyzScore';
                database.ref(`rooms/${myRoomId}/${scoreField}`).set(firebase.database.ServerValue.increment(10));
            } else {
                selectedButton.className = "w-full text-center bg-rose-600 text-white font-bold p-4 rounded-xl shadow-lg border border-rose-700 text-base scale-98 transition-all";
            }

            const answeredField = myRole === 'jigit' ? 'jigitAnswered' : 'kyzAnswered';
            database.ref(`rooms/${myRoomId}/${answeredField}`).set(true);
        }
    </script>
</body>
</html>
