<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай - Динамикалык Оюн талаасы</title>
    <style>
        /* Базалык стилдер */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0f19; color: white; margin: 0; padding: 20px; text-align: center; }
        .screen { background: rgba(20, 27, 45, 0.95); border: 2px solid #2c3a58; border-radius: 16px; padding: 30px; max-width: 500px; margin: 40px auto; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { color: #f39c12; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; box-sizing: border-box; border-radius: 8px; border: 1px solid #34495e; background: #1a2536; color: white; font-size: 16px; text-align: center; }
        input:focus { border-color: #f39c12; outline: none; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .main-btn { background: #f39c12; color: #0b0f19; }
        .main-btn:hover { background: #e67e22; }
        .join-btn { background: #2ecc71; color: white; }
        .join-btn:hover { background: #27ae60; }
        .divider { margin: 15px 0; color: #7f8c8d; font-size: 14px; }
        
        /* Ат чабыш треги */
        #game-field { display: none; max-width: 800px; margin: 20px auto; background: #141b2d; border-radius: 12px; padding: 20px; border: 1px solid #2c3a58; }
        .track { position: relative; height: 180px; background: url('track_bg.png') repeat-x; background-size: contain; border-bottom: 4px solid #7f8c8d; margin-bottom: 20px; overflow: hidden; border-radius: 8px; }
        .rider-box { position: absolute; bottom: 10px; width: 90px; transition: left 0.4s ease; text-align: center; }
        .rider-box img { width: 100%; height: auto; }
        .player-label-name { display: block; font-size: 12px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; margin-top: 4px; }
        #boy-container { left: 0%; color: #3498db; }
        #girl-container { left: 15%; color: #e74c3c; }

        /* Тест суроолорунун блогу */
        #ui-bottom { display: none; max-width: 800px; margin: auto; }
        .quiz-container { background: #1a2536; border-radius: 12px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 1px solid #2c3a58; }
        #q-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #ecf0f1; }
        .opt-btn { background: #2c3a58; color: white; text-align: left; padding: 14px; margin: 8px 0; border: 1px solid #34495e; border-radius: 8px; width: 100%; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .opt-btn:hover { background: #34495e; border-color: #f39c12; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="setup-screen" class="screen">
        <h2 id="display-level-name">КЫЗ КУУМАЙ: ОНЛАЙН ТЕСТ</h2>
        
        <input type="text" id="player-name" placeholder="Өз атыңызды жазыңыз" maxlength="15">
        <input type="number" id="teacher-quiz-code" placeholder="Мугалим берген ТЕСТ КОД (мис: 5824)">
        
        <hr style="border-color: #2c3a58; margin: 20px 0;">
        
        <div id="room-controls">
            <button class="btn main-btn" onclick="loginAndLoadQuiz('create')">БӨЛМӨ ТҮЗҮҮ (Жигит 🏇)</button>
            <div class="divider">же даяр бөлмөгө кошулуңуз:</div>
            <input type="number" id="room-input" placeholder="Бөлмө коду (мис: 732)">
            <button class="btn join-btn" onclick="loginAndLoadQuiz('join')">БӨЛМӨГӨ КИРҮҮ (Кыз 🐎)</button>
        </div>
        <div id="wait-status" style="margin-top: 15px; font-weight: bold; color: #e74c3c;"></div>
    </div>

    <div id="game-field">
        <div class="track">
            <div id="boy-container" class="rider-box">
                <img src="../games/boy_run.png" onerror="this.src='https://placehold.co/90x90?text=Boy'" alt="Жигит">
                <span id="label-boy" class="player-label-name">Жигит</span>
            </div>
            <div id="girl-container" class="rider-box">
                <img src="../games/girl_run.png" onerror="this.src='https://placehold.co/90x90?text=Girl'" alt="Кыз">
                <span id="label-girl" class="player-label-name">Кыз</span>
            </div>
        </div>
    </div>

    <div id="ui-bottom">
        <div class="quiz-container">
            <div id="q-text">Суроо жүктөлүүдө...</div>
            <div id="options"></div>
        </div>
    </div>

    <script>
      // ⚠️ БУЛ ЖЕРГЕ ӨЗҮҢҮЗДҮН FIREBASE КОНФИГУРАЦИЯҢЫЗДЫ КОЮҢУЗ
      const firebaseConfig = {
        apiKey: "СИЗДИН_API_KEY",
        authDomain: "СИЗДИН_AUTH_DOMAIN",
        databaseURL: "СИЗДИН_DATABASE_URL",
        projectId: "СИЗДИН_PROJECT_ID",
        storageBucket: "СИЗДИН_STORAGE_BUCKET",
        messagingSenderId: "СИЗДИН_MESSAGING_ID",
        appId: "СИЗДИН_APP_ID"
      };
      if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    </script>
    <script src="play-logic.js"></script>
</body>
</html>
