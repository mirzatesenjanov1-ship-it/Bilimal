<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай: Онлайн Тест | Bilimal.org</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .lobby-box {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="lobby-container" class="w-full max-w-lg lobby-box rounded-[2.5rem] p-8 md:p-10 border-pink-500/20">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-pink-500 to-amber-500 text-white text-3xl mb-4 shadow-lg shadow-pink-500/20">
                <i class="fas fa-heartbeat animate-pulse"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-black uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-pink-500">
                Кыз Куумай: Онлайн Тест
            </h1>
            <p id="quiz-info-text" class="text-xs text-gray-400 mt-2 font-semibold bg-white/5 py-1.5 px-4 rounded-full inline-block">
                Тест жүктөлүүдө...
            </p>
        </div>

        <div class="space-y-6">
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2 ml-1">Оюнчунун аты-жөнү:</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                        <i class="fas fa-user text-sm"></i>
                    </span>
                    <input type="text" id="player-name" placeholder="Өз атыңызды жазыңыз..." 
                        class="w-full bg-black/40 border border-white/10 rounded-2xl pl-11 pr-4 py-3.5 text-sm text-white font-medium focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all placeholder:text-gray-600">
                </div>
            </div>

            <div class="border-t border-white/5 my-4"></div>

            <div class="space-y-2">
                <button onclick="createRoom()" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-black font-black py-4 rounded-2xl text-xs uppercase tracking-widest shadow-lg shadow-orange-500/20 transition-all flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                    Бөлмө түзүү (Жигит <span class="text-base">🐎</span>)
                </button>
                <p class="text-[10px] text-center text-gray-500">Жаңы оюн бөлмөсүн түзүп, кодду кызга бериңиз.</p>
            </div>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-white/5"></div>
                <span class="flex-shrink mx-4 text-[10px] font-bold text-gray-600 uppercase tracking-widest">же даяр бөлмөгө кошулуу</span>
                <div class="flex-grow border-t border-white/5"></div>
            </div>

            <div class="bg-black/20 p-4 rounded-2xl border border-white/5 space-y-3">
                <div>
                    <input type="number" id="room-code-input" placeholder="Бөлмө кодун киргизиңиз (мис: 732)" 
                        class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-center text-xs text-white font-bold focus:outline-none focus:border-emerald-500 transition-all placeholder:font-normal placeholder:text-gray-600 tracking-widest">
                </div>
                <button onclick="joinRoom()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-black py-3.5 rounded-xl text-xs uppercase tracking-widest shadow-lg shadow-emerald-500/10 transition-all flex items-center justify-center gap-2 transform hover:-translate-y-0.5">
                    Бөлмөгө кирүү (Кыз <span class="text-base">🐎</span>)
                </button>
            </div>

        </div>
    </div>

    <div id="game-arena" class="hidden w-full max-w-5xl">
        </div>

    <script>
        // URL'ден предметти жана теманы автоматтык түрдө кармап алуу
        const urlParams = new URLSearchParams(window.location.search);
        const currentSubject = urlParams.get('subject');
        const currentTheme = urlParams.get('theme');

        // Баракча жүктөлгөндө тандалган теманы экранга чыгаруу
        document.addEventListener("DOMContentLoaded", () => {
            const infoTextEl = document.getElementById("quiz-info-text");
            if (currentSubject && currentTheme) {
                // Идентификаторду окумдуу форматка келтирүү (мисалы: kinematika_20 -> КИНЕМАТИКА)
                const themeName = currentTheme.replace('_', ' ').toUpperCase();
                infoTextEl.innerHTML = `<i class="fas fa-book-open text-amber-400 mr-1"></i> Тандалган багыт: <span class="text-white">${themeName}</span>`;
            } else {
                infoTextEl.innerHTML = `<i class="fas fa-exclamation-triangle text-rose-500 mr-1"></i> Тандоо аткарылган жок!`;
            }
        });

        // 1. БӨЛМӨ ТҮЗҮҮ (ЖИГИТ)
        function createRoom() {
            const playerName = document.getElementById("player-name").value.trim();
            
            if (!playerName) {
                alert("Сураныч, атыңызды киргизиңиз!");
                return;
            }

            if (!currentSubject || !currentTheme) {
                alert("Ката: Оюндун предмети же темасы табылган жок! Артка кайтып кайра тандаңыз.");
                return;
            }

            // Бул жерде Firebase аркылуу бөлмө түзүлөт (Random 3 орундуу сан жасалат)
            const generatedRoomCode = Math.floor(100 + Math.random() * 900);
            
            alert(`Ийгиликтүү! Сиз Жигит болуп бөлмө түздүңүз.\nБөлмөнүн коду: ${generatedRoomCode}\nБул кодду Кыз оюнчуга бериңиз.`);
            
            // Кийинки кадамда бул жерге Firebase Realtime Database'ге бөлмөнү жана тандалган теманын суроолорун жүктөө кодун жазабыз.
            switchToArena();
        }

        // 2. БӨЛМӨГӨ КОШУЛУУ (КЫЗ)
        function joinRoom() {
            const playerName = document.getElementById("player-name").value.trim();
            const roomCode = document.getElementById("room-code-input").value.trim();

            if (!playerName) {
                alert("Сураныч, атыңызды киргизиңиз!");
                return;
            }
            if (!roomCode) {
                alert("Сураныч, сизге берилген бөлмөнүн кодун киргизиңиз!");
                return;
            }

            alert(`Ийгиликтүү! Кыз болуп ${roomCode}-бөлмөгө кирдиңиз. Оюн башталууда...`);
            
            // Кийинки кадамда бул жерде Firebase'ден ушул коддуу бөлмө барбы деп текшерип, ичине кошулабыз.
            switchToArena();
        }

        // Лоббиден оюн аянтчасына өтүү функциясы
        function switchToArena() {
            document.getElementById("lobby-container").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
        }
    </script>
</body>
</html>
