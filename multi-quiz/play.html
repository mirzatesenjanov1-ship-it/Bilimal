<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай: Онлайн Тест | Bilimal.org</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #e2e8f0; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
            /* АРТКЫ СҮРӨТТҮ ТОЛУК ЭКРАНГА ЖАЙУУ */
            background-image: linear-gradient(rgba(5, 10, 24, 0.45), rgba(5, 10, 24, 0.65)), url('kyz-jygyt.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* ТУНУК (ПРОЗРАЧНЫЙ) ЛОББИ КУТУСУ */
        .lobby-box {
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
        }

        .race-track {
            background: linear-gradient(to bottom, rgba(17, 24, 39, 0.85), rgba(15, 23, 42, 0.85));
            border-top: 4px solid #f59e0b;
            border-bottom: 4px solid #f59e0b;
        }

        .option-btn {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            background: rgba(59, 130, 246, 0.4);
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <audio id="bg-music-menu" src="music-menu.mp3" loop></audio>
    <audio id="bg-music-game" src="music.mp3" loop></audio>

    <div id="lobby-container" class="w-full max-w-md lobby-box rounded-[2.5rem] p-6 md:p-8 transition-all duration-500">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-gradient-to-tr from-pink-500 to-amber-500 text-white text-xl mb-2 shadow-lg">
                <i class="fas fa-heartbeat animate-pulse"></i>
            </div>
            <h1 class="text-xl md:text-2xl font-black uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-pink-500">
                Кыз Куумай: Онлайн Тест
            </h1>
            <p id="quiz-info-text" class="text-[11px] text-gray-300 mt-1 font-semibold bg-white/10 py-1 px-3 rounded-full inline-block">
                Тест жүктөлүүдө...
            </p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-300 mb-1.5 ml-1">Оюнчунун аты-жөнү:</label>
                <input type="text" id="player-name" placeholder="Өз атыңызды жазыңыз..." 
                    class="w-full bg-black/40 border border-white/20 rounded-xl px-4 py-3 text-sm text-white font-medium focus:outline-none focus:border-pink-500 transition-all">
            </div>

            <div class="border-t border-white/10 my-1"></div>

            <div class="space-y-1">
                <button onclick="createRoom()" class="w-full bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-black font-black py-3.5 rounded-xl text-xs uppercase tracking-widest shadow-lg transition-all transform hover:-translate-y-0.5">
                    Бөлмө түзүү (Жигит 🐎)
                </button>
                <p class="text-[10px] text-center text-gray-400">Жаңы оюн бөлмөсүн түзүп, Жигит атын аласыз.</p>
            </div>

            <div class="relative flex py-1 items-center">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink mx-3 text-[9px] font-bold text-gray-400 uppercase tracking-widest">же кошулуу</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <div class="bg-black/20 p-3 rounded-xl border border-white/10 space-y-2">
                <input type="number" id="room-code-input" placeholder="Бөлмө кодун киргизиңиз..." 
                    class="w-full bg-black/40 border border-white/20 rounded-lg px-4 py-2 text-center text-xs text-white font-bold focus:outline-none focus:border-emerald-500 tracking-widest">
                <button onclick="joinRoom()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-black py-3 rounded-lg text-xs uppercase tracking-widest shadow-lg transition-all transform hover:-translate-y-0.5">
                    Бөлмөгө кирүү (Кыз 🐎)
                </button>
            </div>
        </div>
    </div>

    <div id="game-arena" class="hidden w-full max-w-4xl space-y-6">
        <div class="flex flex-wrap justify-between items-center bg-slate-900/90 p-4 rounded-2xl border border-white/10 gap-4">
            <div class="flex items-center gap-4">
                <span id="display-room-code" class="bg-blue-600/30 border border-blue-500/40 text-blue-400 px-4 py-1.5 rounded-xl text-xs font-bold font-mono">БӨЛМӨ: ---</span>
                <span id="game-status-text" class="text-xs font-bold text-amber-400 uppercase tracking-wider animate-pulse">Кыздын кошулушун күтүүдө...</span>
            </div>
            <div class="flex items-center gap-6 text-sm font-bold">
                <div class="text-orange-400">Жигит: <span id="jigit-name-lbl">...</span> (<span id="jigit-score">0</span>)</div>
                <div class="text-pink-400">Кыз: <span id="kyz-name-lbl">...</span> (<span id="kyz-score">0</span>)</div>
            </div>
        </div>

        <div class="race-track h-52 rounded-3xl p-4 flex flex-col justify-between relative overflow-hidden">
            <div class="relative w-full h-20 border-b border-white/5 flex items-center">
                <div id="kyz-track-container" class="absolute transition-all duration-500" style="left: 55%;">
                    <video id="v-girl" src="girl_run.mp4" autoplay loop muted playsinline class="h-14 object-contain"></video>
                    <span class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-pink-500 text-[9px] font-bold px-2 py-0.5 rounded-full text-black whitespace-nowrap">Кыз</span>
                </div>
            </div>
            <div class="relative w-full h-20 flex items-center">
                <div id="jigit-track-container" class="absolute transition-all duration-500" style="left: 10%;">
                    <video id="v-boy" src="boy_run.mp4" autoplay loop muted playsinline class="h-14 object-contain"></video>
                    <span class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-amber-400 text-[9px] font-bold px-2 py-0.5 rounded-full text-black whitespace-nowrap">Жигит</span>
                </div>
            </div>
        </div>

        <div id="quiz-box-container" class="hidden bg-slate-900/80 p-6 md:p-8 rounded-[2rem] border border-white/10 space-y-6">
            <div class="flex justify-between items-center text-xs font-bold text-gray-400">
                <span id="question-number-lbl" class="uppercase tracking-widest text-blue-400">Суроо №1</span>
                <span id="timer-lbl" class="bg-rose-500/10 text-rose-400 px-3 py-1 rounded-lg border border-rose-500/20">Убакыт: 20с</span>
            </div>
            <h2 id="question-text" class="text-lg md:text-xl font-bold leading-relaxed">Суроо жүктөлүүдө...</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="submitAnswer(0)" id="opt-0" class="option-btn p-5 rounded-2xl text-left text-sm font-semibold text-gray-200">А</button>
                <button onclick="submitAnswer(1)" id="opt-1" class="option-btn p-5 rounded-2xl text-left text-sm font-semibold text-gray-200">Б</button>
                <button onclick="submitAnswer(2)" id="opt-2" class="option-btn p-5 rounded-2xl text-left text-sm font-semibold text-gray-200">В</button>
                <button onclick="submitAnswer(3)" id="opt-3" class="option-btn p-5 rounded-2xl text-left text-sm font-semibold text-gray-200">Г</button>
            </div>
        </div>
    </div>

    <div id="result-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border-2 border-amber-500/30 p-8 rounded-[2.5rem] max-w-md w-full text-center space-y-6">
            <div class="text-5xl text-amber-400"><i class="fas fa-trophy animate-bounce"></i></div>
            <h2 class="text-2xl font-black uppercase tracking-wider text-white">Оюн жыйынтыкталды!</h2>
            <p id="result-message-text" class="text-base font-medium text-gray-300 bg-white/5 p-4 rounded-2xl">Жыйынтык...</p>
            <div class="flex justify-center gap-6 text-sm font-bold text-gray-400">
                <div>Жигит упайы: <span id="res-jigit-score" class="text-orange-400 text-lg">0</span></div>
                <div>Кыз упайы: <span id="res-kyz-score" class="text-pink-400 text-lg">0</span></div>
            </div>
            <button onclick="location.reload()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-widest">Кайра ойноо</button>
        </div>
    </div>

    <script src="play-logic.js"></script>
</body>
</html>
