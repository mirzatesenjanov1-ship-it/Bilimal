<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай: Онлайн Тест | Bilimal.org</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #e2e8f0; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
            /* СҮРӨТТҮ ТОЛУК ЭКРАНГА ЧЫГАРУУ */
            background-image: linear-gradient(rgba(5, 10, 24, 0.65), rgba(5, 10, 24, 0.75)), url('kyz-jygyt.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* ПРОЗРАЧНЫЙ ЛОББИ КУТУСУ */
        .lobby-box {
            background: rgba(15, 23, 42, 0.35); /* Өтө тунук кылынды */
            backdrop-filter: blur(14px); /* Арткы сүрөттү кооз көрсөтүүчү эффект */
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .race-track {
            background: linear-gradient(to bottom, rgba(17, 24, 39, 0.9), rgba(15, 23, 42, 0.9));
            border-top: 4px solid #f59e0b;
            border-bottom: 4px solid #f59e0b;
            position: relative;
            overflow: hidden;
        }

        .option-btn {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <audio id="bg-music-menu" src="music-menu.mp3" loop></audio>
    <audio id="bg-music-game" src="music.mp3" loop></audio>

    <div id="lobby-container" class="w-full max-w-lg lobby-box rounded-[2.5rem] p-8 md:p-10 transition-all duration-500">
        
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-gradient-to-tr from-pink-500 to-amber-500 text-white text-2xl mb-3 shadow-lg">
                <i class="fas fa-heartbeat animate-pulse"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-black uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-pink-500">
                Кыз Куумай: Онлайн Тест
            </h1>
            <p id="quiz-info-text" class="text-xs text-gray-300 mt-2 font-semibold bg-white/10 py-1.5 px-4 rounded-full inline-block">
                Тест жүктөлүүдө...
            </p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-300 mb-2 ml-1">Оюнчунун аты-жөнү:</label>
                <input type="text" id="player-name" placeholder="Өз атыңызды жазыңыз..." 
                    class="w-full bg-black/40 border border-white/20 rounded-2xl px-5 py-3.5 text-sm text-white font-medium focus:outline-none focus:border-pink-500 transition-all">
            </div>

            <div class="border-t border-white/10 my-2"></div>

            <div class="space-y-1">
                <button onclick="createRoom()" class="w-full bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-black font-black py-4 rounded-2xl text-xs uppercase tracking-widest shadow-lg transition-all transform hover:-translate-y-0.5">
                    Бөлмө түзүү (Жигит 🐎)
                </button>
                <p class="text-[10px] text-center text-gray-400">Жаңы оюн бөлмөсүн түзүп, Жигит атын аласыз.</p>
            </div>

            <div class="relative flex py-1 items-center">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink mx-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">же кошулуу</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <div class="bg-black/20 p-4 rounded-2xl border border-white/10 space-y-3">
                <input type="number" id="room-code-input" placeholder="Бөлмө кодун киргизиңиз..." 
                    class="w-full bg-black/40 border border-white/20 rounded-xl px-4 py-2.5 text-center text-xs text-white font-bold focus:outline-none focus:border-emerald-500 tracking-widest">
                <button onclick="joinRoom()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-black py-3.5 rounded-xl text-xs uppercase tracking-widest shadow-lg transition-all transform hover:-translate-y-0.5">
                    Бөлмөгө кирүү (Кыз 🐎)
                </button>
            </div>
        </div>
    </div>

    <div id="game-arena" class="hidden w-full max-w-4xl space-y-6">
        
        <div class="flex flex-wrap justify-between items-center bg-slate-900/90 p-4 rounded-2xl border border-white/10 gap-4">
            <div class="flex items-center gap-4">
                <span id="display-room-code" class="bg-blue-600/30 border border-blue-500/40 text-blue-400 px-4 py-1.5 rounded-xl text-xs font-bold font-mono">БӨЛМӨ: ---</span>
                <span id="game-status-text" class="text-xs font-bold text-amber-400 uppercase tracking-wider animate-pulse">Кыздын кошулушун күтүүдө...</span>
            </div>
            <div class="flex items-center gap-6 text-sm font-bold">
                <div class="text-orange-400">Жигит: <span id="jigit-name-lbl">...</span> (<span id="jigit-score">0</span>)</div>
                <div class="text-pink-400">Кыз: <span id="kyz-name-lbl">...</span> (<span id="kyz-score">0</span>)</div>
            </div>
        </div>

        <div class="race-track h-52 rounded-3xl p-4 flex flex-col justify-between">
            <div class="relative w-full h-20 border-b border-white/5 flex items-center">
                <div id="kyz-track-container" class="absolute transition-all duration-500" style="left: 55%;">
                    <video id="v-girl" src="girl_run.mp4" autoplay loop muted playsinline class="h-14 object-contain"></video>
                    <span class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-pink-500 text-[9px] font-bold px-2 py-0.5 rounded-full text-black whitespace-nowrap" id="tag-kyz">Кыз</span>
                </div>
            </div>
            <div class="relative w-full h-20 flex items-center">
                <div id="jigit-track-container" class="absolute transition-all duration-500" style="left: 10%;">
                    <video id="v-boy" src="boy_run.mp4" autoplay loop muted playsinline class="h-14 object-contain"></video>
                    <span class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-amber-400 text-[9px] font-bold px-2 py-0.5 rounded-full text-black whitespace-nowrap" id="tag-jigit">Жигит</span>
                </div>
            </div>
        </div>

        <div id="quiz-box-container" class="hidden bg-slate-900/80 p-6 md:p-8 rounded-[2rem] border border-white/10 space-y-6">
            <div class="flex justify-between items-center text-xs font-bold text-gray-400">
                <span id="question-number-lbl" class="uppercase tracking-widest text-blue-400">Суроо №1</span>
                <span id="timer-lbl" class="bg-rose-500/10 text-rose-400 px-3 py-1 rounded-lg border border-rose-500/20">Убакыт: 20с</span>
            </div>
            <h2 id="question-text" class="text-lg md:text-xl font-bold leading-relaxed">Физикалык суроо жүктөлүүдө...</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="submitAnswer(0)" id="opt-0" class="option-btn p-5 rounded-2xl text-left text-sm font-semibold text-gray-200">Вариант А</button>
                <button onclick="submitAnswer(1)" id="opt-1" class="option-btn p-5 rounded-2xl text-left text-sm font-semibold text-gray-200">Вариант Б</button>
                <button onclick="submitAnswer(2)" id="opt-2" class="option-btn p-5 rounded-2xl text-left text-sm font-semibold text-gray-200">Вариант В</button>
                <button onclick="submitAnswer(3)" id="opt-3" class="option-btn p-5 rounded-2xl text-left text-sm font-semibold text-gray-200">Вариант Г</button>
            </div>
        </div>
    </div>

    <div id="result-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border-2 border-amber-500/30 p-8 rounded-[2.5rem] max-w-md w-full text-center space-y-6 shadow-2xl">
            <div class="text-5xl text-amber-400"><i class="fas fa-trophy animate-bounce"></i></div>
            <h2 class="text-2xl font-black uppercase tracking-wider text-white">Оюн жыйынтыкталды!</h2>
            <p id="result-message-text" class="text-base font-medium text-gray-300 leading-relaxed bg-white/5 p-4 rounded-2xl">
                Жыйынтык...
            </p>
            <div class="flex justify-center gap-6 text-sm font-bold text-gray-400 py-2">
                <div>Жигит упайы: <span id="res-jigit-score" class="text-orange-400 text-lg">0</span></div>
                <div>Кыз упайы: <span id="res-kyz-score" class="text-pink-400 text-lg">0</span></div>
            </div>
            <button onclick="location.reload()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-widest transition-all">
                Кайра ойноо
            </button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE ИШКЕ КИРГИЗҮҮ ---
        // Сураныч, өзүңүздүн реалдуу долбоордун API ачкычтарын бул жерге коюңуз!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // --- ӨЗГӨРМӨЛӨР ---
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject') || 'physics';
        const theme = urlParams.get('theme') || 'kinematika_20';

        let myRole = ""; 
        let roomRef = null;
        let roomCode = "";
        let currentRoomData = null;
        let playerName = "";
        
        let questions = [];
        let currentQuestionIdx = 0;
        let timerInterval = null;
        let timeLeft = 20;
        let isAnswered = false;

        const mockQuestions = [
            { q: "Ылдамдыктын эл аралык бирдиги кандай?", a: "м/с", options: ["м/с", "км/саат", "м*с", "кг/м"] },
            { q: "Ньютондун экинчи мыйзамынын формуласы кайсы?", a: "F = ma", options: ["F = ma", "V = s/t", "E = mc²", "P = mv"] }
        ];

        const menuMusic = document.getElementById("bg-music-menu");
        const gameMusic = document.getElementById("bg-music-game");

        document.body.addEventListener('click', () => {
            if(menuMusic.paused && !roomRef) { menuMusic.play().catch(()=>{}); }
        }, { once: true });

        document.addEventListener("DOMContentLoaded", () => {
            const themeName = theme.replace('_', ' ').toUpperCase();
            document.getElementById("quiz-info-text").innerHTML = `<i class="fas fa-book-open text-amber-400 mr-1"></i> Багыт: <span class="text-white">${themeName}</span>`;
        });

        // --- 2. БӨЛМӨ ТҮЗҮҮ (ЖИГИТ БАСКЫЧЫН ТОЛУК ОҢДОО) ---
        function createRoom() {
            playerName = document.getElementById("player-name").value.trim();
            if (!playerName) { alert("Сураныч, алгач атыңызды жазыңыз!"); return; }
            
            myRole = "jigit";
            roomCode = Math.floor(100 + Math.random() * 900).toString(); // 3 орундуу коопсуз код
            roomRef = db.ref('rooms/' + roomCode);
            
            // Базадан суроолорду алуу же mock колдонуу
            db.ref(`quizzes/${subject}/${theme}`).once('value').then((snapshot) => {
                let fetchedQuestions = snapshot.val();
                if(!fetchedQuestions || !Array.isArray(fetchedQuestions)) {
                    fetchedQuestions = mockQuestions; 
                }
                questions = fetchedQuestions;

                // Бөлмөнү базага ийгиликтүү жазуу
                return roomRef.set({
                    roomCode: roomCode,
                    subject: subject,
                    theme: theme,
                    jigitName: playerName,
                    kyzName: "",
                    jigitScore: 0,
                    kyzScore: 0,
                    jigitCurrentQuestion: 0,
                    kyzCurrentQuestion: 0,
                    status: "waiting",
                    isExtraRound: false,
                    questions: fetchedQuestions
                });
            }).then(() => {
                // Ийгиликтүү болгондо гана угууну жандырып, интерфейсти алмаштыруу
                initRoomListener();
                switchToArena();
            }).catch(err => {
                console.error("Firebase катасы, оффлайн режим иштеди:", err);
                questions = mockQuestions;
                startOfflineGame();
            });
        }

        // --- 3. БӨЛМӨГӨ КОШУЛУУ (КЫЗ) ---
        function joinRoom() {
            playerName = document.getElementById("player-name").value.trim();
            roomCode = document.getElementById("room-code-input").value.trim();
            
            if (!playerName) { alert("Сураныч, атыңызды жазыңыз!"); return; }
            if (!roomCode) { alert("Бөлмө кодун киргизиңиз!"); return; }

            myRole = "kyz";
            roomRef = db.ref('rooms/' + roomCode);

            roomRef.once('value').then((snapshot) => {
                if(!snapshot.exists()) {
                    alert("Бул коддуу бөлмө табылган жок!");
                    return;
                }
                let data = snapshot.val();
                if(data.kyzName !== "") {
                    alert("Бул бөлмө толуп калган!");
                    return;
                }

                questions = data.questions || mockQuestions;

                return roomRef.update({
                    kyzName: playerName,
                    status: "playing"
                });
            }).then(() => {
                initRoomListener();
                switchToArena();
            }).catch(err => alert("Кошулууда ката кетти!"));
        }

        function switchToArena() {
            document.getElementById("lobby-container").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            document.getElementById("display-room-code").innerText = `БӨЛМӨ: ${roomCode}`;
        }

        // РЕАЛДУУ УБАҚЫТТА БАЗАНЫ УГУУ
        function initRoomListener() {
            roomRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;
                currentRoomData = data;

                document.getElementById("jigit-name-lbl").innerText = data.jigitName || "...";
                document.getElementById("kyz-name-lbl").innerText = data.kyzName || "...";
                document.getElementById("jigit-score").innerText = data.jigitScore;
                document.getElementById("kyz-score").innerText = data.kyzScore;

                // Динамикалык кадамдар (Жигиттики чоңураак * 4.2, Кыздыкы * 2.5)
                let jigitLeft = 10 + (data.jigitScore * 4.2);
                let kyzLeft = 45 + (data.kyzScore * 2.5);

                document.getElementById("jigit-track-container").style.left = `${jigitLeft}%`;
                document.getElementById("kyz-track-container").style.left = `${kyzLeft}%`;

                if(data.status === "waiting") {
                    document.getElementById("game-status-text").innerText = "Кыздын кошулушун күтүүдө...";
                } 
                else if(data.status === "playing") {
                    document.getElementById("game-status-text").innerText = data.isExtraRound ? "КОШУМЧА РАУНД! ТЕҢ ЧЫГУУ" : "ЖАРЫШ БАШТАЛДЫ!";
                    
                    menuMusic.pause();
                    if(gameMusic.paused) { gameMusic.play().catch(()=>{}); }

                    document.getElementById("quiz-box-container").classList.remove("hidden");
                    
                    let myTargetIndex = (myRole === "jigit") ? data.jigitCurrentQuestion : data.kyzCurrentQuestion;
                    if(myTargetIndex !== currentQuestionIdx || (currentQuestionIdx === 0 && !timerInterval)) {
                        currentQuestionIdx = myTargetIndex;
                        showQuestion();
                    }
                } 
                else if(data.status === "finished") {
                    endGame(data);
                }
            });
        }

        function showQuestion() {
            if(currentQuestionIdx >= questions.length) {
                document.getElementById("quiz-box-container").innerHTML = `
                    <div class="text-center py-8 text-sm font-bold text-gray-300 animate-pulse">
                        <i class="fas fa-spinner fa-spin mr-2"></i> Каршылашыңыз тестти бүтүрүшүн күтүп жатасыз...
                    </div>`;
                checkGameEndCondition();
                return;
            }

            isAnswered = false;
            clearInterval(timerInterval);
            timeLeft = 20;
            document.getElementById("timer-lbl").innerText = `Убакыт: ${timeLeft}с`;

            let qData = questions[currentQuestionIdx];
            document.getElementById("question-number-lbl").innerText = `Суроо №${currentQuestionIdx + 1}`;
            document.getElementById("question-text").innerText = qData.q;

            for(let i=0; i<4; i++) {
                let btn = document.getElementById(`opt-${i}`);
                btn.innerText = qData.options[i];
                btn.className = "option-btn p-5 rounded-2xl text-left text-sm font-semibold text-gray-200 transition-all";
                btn.disabled = false;
            }

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById("timer-lbl").innerText = `Убакыт: ${timeLeft}с`;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    autoSubmitWrong();
                }
            }, 1000);
        }

        function submitAnswer(selectedIdx) {
            if(isAnswered) return;
            isAnswered = true;
            clearInterval(timerInterval);

            let qData = questions[currentQuestionIdx];
            let chosenOption = qData.options[selectedIdx];
            let isCorrect = (chosenOption === qData.a);

            let btn = document.getElementById(`opt-${selectedIdx}`);
            if(isCorrect) {
                btn.className = "p-5 rounded-2xl text-left text-sm font-bold bg-emerald-600 text-black";
            } else {
                btn.className = "p-5 rounded-2xl text-left text-sm font-bold bg-rose-600 text-white";
            }

            for(let i=0; i<4; i++) { document.getElementById(`opt-${i}`).disabled = true; }

            setTimeout(() => {
                let updates = {};
                if(myRole === "jigit") {
                    updates['jigitCurrentQuestion'] = currentQuestionIdx + 1;
                    if(isCorrect) updates['jigitScore'] = currentRoomData.jigitScore + 1;
                } else {
                    updates['kyzCurrentQuestion'] = currentQuestionIdx + 1;
                    if(isCorrect) updates['kyzScore'] = currentRoomData.kyzScore + 1;
                }
                roomRef.update(updates);
            }, 800);
        }

        function autoSubmitWrong() {
            isAnswered = true;
            let updates = {};
            if(myRole === "jigit") { updates['jigitCurrentQuestion'] = currentQuestionIdx + 1; } 
            else { updates['kyzCurrentQuestion'] = currentQuestionIdx + 1; }
            roomRef.update(updates);
        }

        function checkGameEndCondition() {
            if(!currentRoomData) return;
            if(currentRoomData.jigitCurrentQuestion >= questions.length && currentRoomData.kyzCurrentQuestion >= questions.length) {
                if(myRole === "jigit") {
                    if(currentRoomData.jigitScore === currentRoomData.kyzScore) {
                        let extraQs = [
                            { q: "КОШУМЧА РАУНД: Күчтүн бирдиги эмне?", a: "Ньютон", options: ["Ньютон", "Джоуль", "Паскаль", "Ватт"] },
                            { q: "КОШУМЧА РАУНД: Нурдун чагылуу бурчу түшүү бурчуна кандай болот?", a: "барабар", options: ["барабар", "чоң", "кичине", "каалагандай"] }
                        ];
                        let newQuestionSet = questions.concat(extraQs);
                        roomRef.update({
                            status: "playing",
                            isExtraRound: true,
                            questions: newQuestionSet
                        });
                    } else {
                        roomRef.update({ status: "finished" });
                    }
                }
            }
        }

        function endGame(data) {
            clearInterval(timerInterval);
            gameMusic.pause();
            
            const modal = document.getElementById("result-modal");
            const msgLbl = document.getElementById("result-message-text");
            
            document.getElementById("res-jigit-score").innerText = data.jigitScore;
            document.getElementById("res-kyz-score").innerText = data.kyzScore;

            if(data.jigitScore > data.kyzScore) {
                msgLbl.innerHTML = `<b class="text-orange-400">${data.jigitName}</b> деген жигит <b class="text-pink-400">${data.kyzName}</b> деген кызга жетти! 🎉`;
            } else {
                msgLbl.innerHTML = `<b class="text-orange-400">${data.jigitName}</b> деген жигиттен <b class="text-pink-400">${data.kyzName}</b> деген кыз качып кетти! 🐎💨`;
            }
            modal.classList.remove("hidden");
        }

        function startOfflineGame() {
            myRole = "jigit";
            switchToArena();
            document.getElementById("jigit-name-lbl").innerText = playerName;
            document.getElementById("kyz-name-lbl").innerText = "Компьютер (Кыз)";
            document.getElementById("game-status-text").innerText = "МАШЫГУУ РЕЖИМИ";
            document.getElementById("quiz-box-container").classList.remove("hidden");
            currentRoomData = { jigitScore: 0, kyzScore: 1 };
            showQuestion();
        }
    </script>
</body>
</html>
