<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай — Онлайн Физика Оюну</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4" style="background-color: #0b0f19;">

    <div id="game-container" class="w-full max-w-5xl flex flex-col gap-6">
        
        <div class="flex justify-between items-center bg-slate-900 border border-slate-800 p-4 rounded-xl text-white">
            <div class="bg-blue-600 px-3 py-1.5 rounded-lg font-bold text-sm">Бөлмө: <span id="room-id-display">----</span></div>
            <div class="font-bold tracking-wide uppercase text-amber-400">ЖАРЫШ БАШТАЛДЫ! 🏁</div>
            <div class="flex gap-4 text-sm font-semibold">
                <span class="text-orange-400">Жигит: <span id="score-jigit">0</span></span>
                <span class="text-pink-400">Кыз: <span id="score-kyz">0</span></span>
            </div>
        </div>

        <div class="h-48 bg-slate-950 border border-slate-900 rounded-2xl relative overflow-hidden p-4">
            <div id="player-jigit" class="absolute transition-all duration-500 flex flex-col items-center" style="left: 10%; bottom: 20px;">
                <span class="bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold mb-1">ЖИГИТ</span>
                <div class="w-12 h-12 bg-amber-600 rounded-full flex items-center justify-center text-xl">🏇</div>
                <span id="name-jigit" class="text-slate-400 text-xs mt-1">Илим</span>
            </div>

            <div id="player-kyz" class="absolute transition-all duration-500 flex flex-col items-center" style="left: 20%; bottom: 20px;">
                <span class="bg-pink-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold mb-1">КЫЗ</span>
                <div class="w-12 h-12 bg-emerald-600 rounded-full flex items-center justify-center text-xl">🐎</div>
                <span id="name-kyz" class="text-slate-400 text-xs mt-1">Билим</span>
            </div>
        </div>

        <div class="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-6 flex flex-col items-center gap-6 backdrop-blur-md">
            <div class="text-slate-400 text-xs font-bold tracking-wider uppercase">Суроо № <span id="current-question-num">1</span> / 20</div>
            
            <h2 id="question-text" class="text-white text-2xl font-bold text-center max-w-3xl leading-relaxed">
                Маалымат жүктөлүүдө...
            </h2>
            
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-4xl mt-2">
                </div>
        </div>

    </div>

    <script>
        // 1. ФИРЕБАСЕ ЖӨНӨКӨЙЛӨШТҮРҮҮ (Өзүңүздүн маалыматтарды коюңуз)
        const firebaseConfig = {
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        
        // Firebase'ди ишке киргизүү
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // URL даректен бөлмөнүн ID'син жана темасын автоматтык түрдө аныктоо
        const urlParams = new URLSearchParams(window.location.search);
        // Эгер URL'де бөлмө жазылбаса, тест үчүн "8838" бөлмөсүн ачат
        const roomId = urlParams.get('room') || "8838"; 
        
        document.getElementById("room-id-display").textContent = roomId;

        // 2. ФИРЕБАСЕДЕН РЕАЛДУУ УБАҚЫТТА СУРООНУ УГУУ (LISTENERS)
        // Бөлмөнүн ичиндеги учурдагы суроонун маалыматы өзгөргөндө иштейт
        database.ref(`rooms/${roomId}`).on('value', (snapshot) => {
            const roomData = snapshot.val();
            if (roomData) {
                // Оюнчулардын аттарын жана упайларын жаңыртуу
                if (roomData.jigitName) document.getElementById("name-jigit").textContent = roomData.jigitName;
                if (roomData.kyzName) document.getElementById("name-kyz").textContent = roomData.kyzName;
                if (roomData.jigitScore) document.getElementById("score-jigit").textContent = roomData.jigitScore;
                if (roomData.kyzScore) document.getElementById("score-kyz").textContent = roomData.kyzScore;
                
                // Суроонун номери
                if (roomData.currentQuestionIndex !== undefined) {
                    document.getElementById("current-question-num").textContent = roomData.currentQuestionIndex + 1;
                }

                // Учурдагы активдүү суроону алып, экранга чыгарууга жөнөтөбүз
                if (roomData.currentQuestion) {
                    displayCurrentQuestion(roomData.currentQuestion);
                } else {
                    document.getElementById("question-text").textContent = "Мугалим тарабынан суроо тандала элек...";
                }
            }
        });

        // 3. СУРОО ЖАНА ВАРИАНТТАРДЫ ЭКРАНГА ЧЫГАРУУ ФУНКЦИЯСЫ
        function displayCurrentQuestion(currentQuestion) {
            const questionTextElement = document.getElementById("question-text"); 
            const optionsContainer = document.getElementById("options-container"); 

            // Контейнерди тазалоо
            if (optionsContainer) optionsContainer.innerHTML = "";

            if (!currentQuestion) {
                if (questionTextElement) questionTextElement.textContent = "Суроо табылган жок.";
                return;
            }

            // Суроонун текстин жазуу
            const questionText = currentQuestion.text || currentQuestion.question || currentQuestion["суроо"] || "Текст бош";
            if (questionTextElement) questionTextElement.textContent = questionText;

            // Варианттарды базадан коопсуз издөө (Кирилл/Латын аралашып кетсе да табат)
            const variantA = currentQuestion.variantA || currentQuestion.variant_A || currentQuestion["вариантА"] || currentQuestion["а"];
            const variantB = currentQuestion.variantB || currentQuestion.variant_B || currentQuestion["вариантБ"] || currentQuestion["б"];
            const variantC = currentQuestion.variantC || currentQuestion.variant_C || currentQuestion["вариантВ"] || currentQuestion["в"];
            const variantD = currentQuestion.variantD || currentQuestion.variant_D || currentQuestion["вариантГ"] || currentQuestion["г"];

            // Бош эмес варианттарды массивге чогултуу
            const optionsList = [];
            if (variantA) optionsList.push({ key: "A", text: variantA });
            if (variantB) optionsList.push({ key: "B", text: variantB });
            if (variantC) optionsList.push({ key: "C", text: variantC });
            if (variantD) optionsList.push({ key: "D", text: variantD });

            // КАТАНЫ АНЫКТОО: Эгер варианттар жок болсо, экранга билдирүү чыгаруу
            if (optionsList.length === 0) {
                if (optionsContainer) {
                    optionsContainer.innerHTML = `
                        <div class="col-span-full border border-red-500/30 bg-red-500/10 text-red-400 p-4 rounded-xl text-center font-semibold text-sm">
                            ⚠️ Бул суроонун варианттары табылган жок! Панелден (Dashboard) текшериңиз.
                        </div>
                    `;
                }
                return;
            }

            // Варианттарды баскыч кылып экранга чыгаруу
            optionsList.forEach((option) => {
                const button = document.createElement("button");
                
                // Дизайн стилдери (Скриншоттогудай караңгы фон жана сары түстөр менен)
                button.className = "w-full text-left bg-slate-800/80 hover:bg-amber-500 hover:text-slate-950 text-slate-200 font-medium p-4 rounded-xl transition-all duration-200 border border-slate-700/60 shadow-md flex items-center gap-2 text-base";
                
                // Ички тексти: "А) Текст"
                button.innerHTML = `<span class="text-amber-400 font-bold font-mono group-hover:text-slate-950">${option.key})</span> ${option.text}`;
                
                // Туура жоопту аныктоо
                const correctAnswer = currentQuestion.correctAnswer || currentQuestion.rightAnswer || "A";

                // Басылгандагы функция
                button.onclick = function() {
                    handleAnswerSelection(option.key, option.text, correctAnswer);
                };

                optionsContainer.appendChild(button);
            });
        }

        // 4. ЖООПТУ ТЕКШЕРҮҮ ЖАНА ОЮНЧУНУ АЛДЫГА ЖЫЛДЫРУУ
        function handleAnswerSelection(selectedKey, selectedText, correctAnswer) {
            // Жооп туура келгенин текшерүү (тамгасы же тексти боюнча)
            const isCorrect = (selectedKey === correctAnswer) || (selectedText === correctAnswer);

            if (isCorrect) {
                alert("Туура жооп! Атчан алдыга жылат!");
                
                // Бул жерге упайды Firebase'ге кошуу кодун кошсоңуз болот:
                // database.ref(`rooms/${roomId}/jigitScore`).set(firebase.database.ServerValue.increment(10));
            } else {
                alert("Ката жооп! Кайра ойлонуп көрүңүз.");
            }
        }
    </script>
</body>
</html>
