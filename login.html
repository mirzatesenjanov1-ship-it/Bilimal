<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БилимАл — Текшерүү</title> <!-- -->
    
    <!-- 1. Firebase SDK Модулдарын кошуу (v10+) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 2. Өзүңүздүн Firebase долбооруңуздун конфигурациясын бул жерге коюңуз
        const firebaseConfig = {
            apiKey: "СИЗДИН_API_KEY",
            authDomain: "СИЗДИН_AUTH_DOMAIN",
            projectId: "СИЗДИН_PROJECT_ID",
            storageBucket: "СИЗДИН_STORAGE_BUCKET",
            messagingSenderId: "СИЗДИН_MESSAGING_SENDER_ID",
            appId: "СИЗДИН_APP_ID"
        };

        // Firebase'ди ишке киргизүү
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 3. Авторизация абалын текшерүү жана 404 катасыз туура багыттоо
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Колдонуучу ийгиликтүү кирди
                console.log("Колдонуучу кирди:", user.uid);
                // Бул жерге киргенден кийин аткарыла турган функцияларды жазсаңыз болот
            } else {
                // Колдонуучу кирген эмес, авторизация барагына багыттоо.
                //GitHub Pages'те 404 катасы чыкпас үчүн "/auth/" папкасы жок, түз эле login.html шилтемеси берилди.
                window.location.href = "https://bilimal.org/login.html"; //
            }
        });
    </script>
</head>
<body>
    <!-- Баракчанын мазмуну -->
    <div id="app">
        <p>Колдонуучунун авторизациясы текшерилүүдө...</p>
    </div>
</body>
</html>
