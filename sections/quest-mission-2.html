<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <title>🔥 Жашыл Өрөөн: Термодинамика</title>
    <script>window.MathJax = { tex: { inlineMath: [['$', '$']] } };</script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        body { background: #030712; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111827; padding: 25px; border-radius: 12px; max-width: 650px; margin: 30px auto; border-left: 5px solid #ef4444; }
        .btn { background: #ef4444; border: none; padding: 12px 30px; color: #fff; border-radius: 8px; cursor: pointer; display: block; margin: 20px auto; }
        .option { display: block; background: #1f2937; padding: 15px; margin: 10px 0; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔥 2-деңгээл: Изопроцесстер</h2>
        <p style="margin: 15px 0;">Изохоралык процесс учурунда ($V = \text{const}$) идеалдык газдын абсолюттук температурасы 3 эсе жогоруласа, анын басымы ($P$) кандай өзгөрөт?</p>
        <div class="option"><input type="radio" name="q2" value="A"> A) 3 эсе азаят</div>
        <div class="option"><input type="radio" name="q2" value="B"> B) Өзгөрүүсүз калат</div>
        <div class="option"><input type="radio" name="q2" value="C"> C) 3 эсе көбөйөт</div>
        <button class="btn" onclick="checkAnswer()">Жоопту текшерүү 🚀</button>
    </div>

    <script>
        function checkAnswer() {
            let ans = document.querySelector('input[name="q2"]:checked');
            if (ans && ans.value === "C") {
                alert("Керемет! Шарль мыйзамы боюнча басым температурага түз пропорционалдуу. 3-деңгээлге жол ачылды!");
                localStorage.setItem('bilimal_current_level', 3);
                window.location.href = 'quest-map.html';
            } else {
                alert("Ката! Шарль мыйзамын ($\frac{P}{T} = \\text{const}$) кайра карап чыгыңыз.");
            }
        }
    </script>
</body>
</html>
