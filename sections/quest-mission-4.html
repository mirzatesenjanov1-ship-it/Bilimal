<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <title>👁️ Оптика Лабораториясы</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        body { background: #030712; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111827; padding: 25px; border-radius: 12px; max-width: 650px; margin: 30px auto; border-left: 5px solid #10b981; }
        .btn { background: #10b981; border: none; padding: 12px 30px; color: #fff; border-radius: 8px; cursor: pointer; display: block; margin: 20px auto; }
        .option { display: block; background: #1f2937; padding: 15px; margin: 10px 0; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>👁️ 4-деңгээл: Геометриялык Оптика</h2>
        <p style="margin: 15px 0;">Чогултуучу линзанын фокус аралыгы $F = 20 \text{ см}$. Бул линзанын оптикалык күчү ($D$) эмнеге барабар?</p>
        <div class="option"><input type="radio" name="q4" value="A"> A) $0.05 \text{ дптр}$</div>
        <div class="option"><input type="radio" name="q4" value="B"> B) $5 \text{ дптр}$</div>
        <div class="option"><input type="radio" name="q4" value="C"> C) $2 \text{ дптр}$</div>
        <button class="btn" onclick="checkAnswer()">Жоопту текшерүү 🚀</button>
    </div>

    <script>
        function checkAnswer() {
            let ans = document.querySelector('input[name="q4"]:checked');
            if (ans && ans.value === "B") {
                alert("Азаматсыз! $D = \frac{1}{F} = \frac{1}{0.2} = 5 \text{ дптр}$. Акыркы финалдык Кванттык деңгээлге өттүңүз!");
                localStorage.setItem('bilimal_current_level', 5);
                window.location.href = '../quest-map.html';
            } else {
                alert("Жооп туура эмес. Фокус аралыгын метрге айландырууну унутпаңыз!");
            }
        }
    </script>
</body>
</html>
