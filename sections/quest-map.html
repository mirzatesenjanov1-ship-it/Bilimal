<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Island of Knowledge — Квест Картасы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #060614; color: #fff; min-height: 100vh; overflow-x: hidden; user-select: none; }

        /* Үстүнкү панель (Header) */
        .header-panel { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(10, 10, 30, 0.85); backdrop-filter: blur(10px); border-bottom: 2px solid rgba(0, 240, 255, 0.2); box-shadow: 0 4px 20px rgba(0,0,0,0.5); position: relative; z-index: 10; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ff00ff; box-shadow: 0 0 10px #ff00ff; object-fit: cover; }
        .user-meta h3 { font-size: 1rem; color: #fff; font-weight: 700; }
        .badge-lvl { background: #ff00ff; color: #fff; font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; display: inline-block; margin-top: 4px; }
        
        .map-title { font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; background: linear-gradient(to right, #00f0ff, #fff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 15px rgba(0,240,255,0.4); }
        
        .stats-container { display: flex; gap: 20px; }
        .stat-box { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 240, 255, 0.3); padding: 8px 16px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 0.95rem; }
        .stat-box.xp { color: #00f0ff; box-shadow: inset 0 0 10px rgba(0,240,255,0.2); }
        .stat-box.crystals { color: #ff00ff; box-shadow: inset 0 0 10px rgba(ff,0,ff,0.2); }

        /* Башкы интерфейс макети */
        .main-layout { display: flex; height: calc(100vh - 84px); position: relative; }

        /* Сол капталдагы Меню (Sidebar) */
        .sidebar { width: 90px; background: rgba(8, 8, 24, 0.9); border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 25px; z-index: 5; }
        .side-btn { width: 60px; height: 60px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #a5b4fc; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .side-btn span { font-size: 1.4rem; }
        .side-btn p { font-size: 0.65rem; margin-top: 4px; font-weight: bold; text-transform: uppercase; }
        .side-btn:hover, .side-btn.active { background: linear-gradient(135deg, rgba(0,240,255,0.2), rgba(112,0,255,0.2)); border-color: #00f0ff; color: #fff; box-shadow: 0 0 15px rgba(0,240,255,0.3); transform: scale(1.05); }

        /* Карта жайгашкан контейнер */
        .map-wrapper { flex: 1; position: relative; overflow: auto; background: #0b0b26; display: flex; justify-content: center; align-items: center; padding: 40px; }
        
        /* Жомоктук Жандуу Карта (Иллюстрацияланган SVG масштабдалат) */
        .island-map-svg { width: 1000px; height: 650px; background: radial-gradient(circle at 50% 50%, #151042 0%, #06051c 100%); border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,240,255,0.1); border: 1px solid rgba(255,255,255,0.05); position: relative; }

        /* Контурдук жолдорду жандантуучу стиль */
        .quest-path { stroke-dasharray: 8; animation: dash 30s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -1000; } }

        /* Деңгээлдердин интерактивдүү чекиттери */
        .node-group { cursor: pointer; }
        .node-circle { transition: 0.4s; }
        .node-group:hover .node-circle { r: 24; filter: url(#glow-neon); }
        .node-text { font-size: 12px; font-weight: 800; fill: #fff; text-anchor: middle; pointer-events: none; }
        .location-title { font-size: 11px; font-weight: 600; fill: #94a3b8; text-anchor: middle; pointer-events: none; }
        .node-group:hover .location-title { fill: #00f0ff; }

        /* Төмөнкү прогресс тилкеси */
        .bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(6, 6, 20, 0.9); border-top: 2px solid rgba(255, 0, 255, 0.15); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
        .progress-section { display: flex; align-items: center; gap: 20px; flex: 1; max-width: 600px; }
        .progress-label { font-size: 0.85rem; font-weight: 800; color: #ff00ff; white-space: nowrap; letter-spacing: 1px; }
        .progress-track { width: 100%; height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-fill { height: 100%; width: 25%; background: linear-gradient(90deg, #ff00ff, #00f0ff); box-shadow: 0 0 10px #00f0ff; transition: 0.5s; }
        
        .rewards-chests { display: flex; gap: 15px; font-size: 1.5rem; }
        .chest { opacity: 0.5; transform: scale(0.9); transition: 0.3s; cursor: not-allowed; }
        .chest.unlocked { opacity: 1; transform: scale(1.1); cursor: pointer; filter: drop-shadow(0 0 8px #ff00ff); }
        .chest.unlocked:hover { transform: scale(1.2) rotate(5deg); }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="user-info">
            <img src="../men.jpeg" alt="Колдонуучу" class="avatar">
            <div class="user-meta">
                <h3 id="user-email-display">окуучу@bilimal.org</h3>
                <span class="badge-lvl">LEVEL 1 (Жаңы катышуучу)</span>
            </div>
        </div>
        <div class="map-title">THE ISLAND OF KNOWLEDGE</div>
        <div class="stats-container">
            <div class="stat-box xp">🔷 <span id="xp-count">150</span> XP</div>
            <div class="stat-box crystals">🔮 <span id="crystal-count">10</span> Кристалл</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <a href="../index.html" class="side-btn"><span>🏠</span><p>Башкы</p></a>
            <div class="side-btn active"><span>🗺️</span><p>Карта</p></div>
            <a href="tests.html" class="side-btn"><span>📝</span><p>Квест</p></a>
            <div class="side-btn" onclick="alert('Багаж бош! Квесттерди аткарып буюм топтоңуз.')"><span>🎒</span><p>Багаж</p></div>
            <div class="side-btn" onclick="alert('Рейтинг жакында жаңыланат!')"><span>🏆</span><p>Рейтинг</p></div>
        </div>

        <div class="map-wrapper">
            <svg class="island-map-svg" viewBox="0 0 1000 650">
                <defs>
                    <filter id="glow-neon" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="6" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#0d0b36" />
                        <stop offset="100%" stop-color="#05031a" />
                    </linearGradient>
                    <radialGradient id="islandGrad" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#241a61" stop-opacity="0.8"/>
                        <stop offset="70%" stop-color="#120c38" stop-opacity="0.5"/>
                        <stop offset="100%" stop-color="#0a0724" stop-opacity="0"/>
                    </radialGradient>
                </defs>

                <rect width="1000" height="650" fill="url(#seaGrad)" />
                <circle cx="500" cy="325" r="400" fill="url(#islandGrad)" />

                <path d="M 150 100 Q 300 50 450 120 T 850 100" fill="none" stroke="rgba(0, 240, 255, 0.08)" stroke-width="40" stroke-linecap="round" filter="blur(10px)" />
                <path d="M 200 500 Q 500 580 800 450" fill="none" stroke="rgba(255, 0, 255, 0.05)" stroke-width="60" stroke-linecap="round" filter="blur(15px)" />

                <path class="quest-path" d="M 150 520 Q 200 430 300 390" fill="none" stroke="#00f0ff" stroke-width="3" />
                <path class="quest-path" d="M 300 390 Q 330 300 380 230" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" />
                <path class="quest-path" d="M 380 230 Q 450 200 520 160" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" />
                <path class="quest-path" d="M 520 160 Q 570 260 630 320" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" />
                <path class="quest-path" d="M 630 320 Q 690 420 760 480" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" />
                <path class="quest-path" d="M 760 480 Q 820 350 840 200" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" />

                <g class="node-group" onclick="loadLevel(1, 'Башталгыч үңкүр')">
                    <circle class="node-circle" cx="150" cy="520" r="18" fill="#111" stroke="#ff00ff" stroke-width="4" filter="url(#glow-neon)" />
                    <text class="node-text" x="150" y="524">1</text>
                    <text class="location-title" x="150" y="555">Beginner's Cave</text>
                </g>

                <g class="node-group" onclick="loadLevel(2, 'Жашыл өрөөн')">
                    <circle class="node-circle" cx="300" cy="390" r="18" fill="#00f0ff" stroke="#fff" stroke-width="3" />
                    <text class="node-text" x="300" y="394" fill="#000" style="fill: #000;">2</text>
                    <text class="location-title" x="300" y="425" style="fill: #00f0ff;">Green Valley</text>
                </g>

                <g class="node-group" onclick="lockedLevel()">
                    <circle class="node-circle" cx="380" cy="230" r="16" fill="#222" stroke="#444" stroke-width="3" />
                    <text class="node-text" x="380" y="234" fill="#666">3</text>
                    <text class="location-title" x="380" y="260">Stonehelm Town</text>
                </g>

                <g class="node-group" onclick="lockedLevel()">
                    <circle class="node-circle" cx="520" cy="160" r="16" fill="#222" stroke="#444" stroke-width="3" />
                    <text class="node-text" x="520" y="164" fill="#666">4</text>
                    <text class="location-title" x="520" y="190">Ancient Library</text>
                </g>

                <g class="node-group" onclick="lockedLevel()">
                    <circle class="node-circle" cx="630" cy="320" r="16" fill="#222" stroke="#444" stroke-width="3" />
                    <text class="node-text" x="630" y="324" fill="#666">5</text>
                    <text class="location-title" x="630" y="350">Crystal Caverns</text>
                </g>

                <g class="node-group" onclick="lockedLevel()">
                    <circle class="node-circle" cx="760" cy="480" r="16" fill="#222" stroke="#444" stroke-width="3" />
                    <text class="node-text" x="760" y="484" fill="#666">6</text>
                    <text class="location-title" x="760" y="510">Neon Academy</text>
                </g>

                <g class="node-group" onclick="lockedLevel()">
                    <circle class="node-circle" cx="840" cy="200" r="20" fill="#111" stroke="#ffaa00" stroke-width="3" />
                    <text class="node-text" x="840" y="204" fill="#666">👑</text>
                    <text class="location-title" x="840" y="235">Sky Academy</text>
                </g>
            </svg>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="progress-section">
            <div class="progress-label">ЖАЛПЫ ПРОГРЕСС:</div>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>
        <div class="rewards-chests">
            <div class="chest unlocked" onclick="openChest(1)">🎁</div>
            <div class="chest" onclick="alert('Бул сандыкка жетүү үчүн 45% прогресс керек!')">🔒</div>
            <div class="chest" onclick="alert('Бул сандыкка жетүү үчүн 80% прогресс керек!')">🔒</div>
            <div class="chest" onclick="alert('Финалдык супер сандык! Асман Академиясын бүтүрүңүз.')">👑</div>
        </div>
    </div>

    <script>
        // Колдонуучунун маалыматын LocalStorage'ден динамикалык жүктөө
        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('bilimal_user_email');
            if (savedEmail) {
                document.getElementById('user-email-display').innerText = savedEmail;
            }
        });

        function loadLevel(levelNum, levelName) {
            alert(`Сиз ${levelNum}-баскычты тандадыңыз: "${levelName}".\nФизика жана математика тапшырмалары жүктөлүүдө... 🚀`);
            window.location.href = 'tests.html';
        }

        function lockedLevel() {
            alert('Бул аймак азырынча кулпуланган! 🔒\nМурунку баскычтардагы тапшырмаларды ийгиликтүү аткарып, XP упайларын топтоңуз.');
        }

        function openChest(id) {
            alert('Куттуктайбыз! Биринчи сандыктан сизге 50 XP жана 5 Кристалл берилди! 🎉');
            document.getElementById('xp-count').innerText = "200";
            document.getElementById('crystal-count').innerText = "15";
        }
    </script>
</body>
</html>
