<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl — Физикалык Квест Картасы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- GOOGLE ADSENSE -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495571814896964" crossorigin="anonymous"></script>

    <!-- ЯНДЕКС РСЯ -->
    <script>window.yaContextCb=window.yaContextCb||[]</script>
    <script src="https://yandex.ru/ads/system/context.js" async></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05070f; color: #fff; font-family: 'Comfortaa', cursive;
            min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .top-bar {
            background: rgba(10, 15, 30, 0.9); backdrop-filter: blur(10px); padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2); z-index: 10;
        }
        .logo-area { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; color: #00d2ff; }
        .stats-group { display: flex; gap: 15px; }
        .stat-badge {
            background: rgba(20, 30, 50, 0.7); border: 1px solid rgba(0,210,255,0.2);
            padding: 8px 15px; border-radius: 20px; font-family: 'Orbitron', sans-serif; font-size: 13px;
        }
        
        .workspace { display: flex; flex: 1; height: calc(100vh - 65px); overflow: hidden; }
        
        .map-container {
            flex: 1; overflow-x: auto; overflow-y: hidden; position: relative;
            background: radial-gradient(circle at center, #0c1020 0%, #05070f 100%);
            scroll-behavior: smooth;
        }
        .map-track {
            display: flex; align-items: center; gap: 90px; padding: 0 100px;
            min-width: 3200px; height: 100%; position: relative; z-index: 2;
        }
        
        .space-node {
            width: 100px; height: 100px; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; cursor: pointer; font-family: 'Orbitron', sans-serif;
            font-size: 24px; font-weight: bold; transition: all 0.4s ease;
            text-decoration: none; color: #fff;
        }
        .space-node.unlocked {
            background: radial-gradient(circle, #0052d4, #0d1b2a);
            border: 4px solid #00d2ff; box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
        }
        .space-node.locked {
            background: #151a26; border: 4px solid #334155; opacity: 0.5; cursor: not-allowed;
        }
        .node-tag {
            position: absolute; bottom: -45px; white-space: nowrap; font-size: 11px;
            background: rgba(15, 23, 42, 0.9); padding: 5px 12px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1); font-family: 'Comfortaa'; color: #cbd5e1;
        }

        .sidebar-panel {
            width: 330px; background: rgba(10, 15, 30, 0.85); padding: 20px;
            border-left: 1px solid rgba(0,210,255,0.1); display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }
        .panel-card {
            background: rgba(20, 30, 50, 0.6); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 15px; text-align: center;
        }
        .btn-action {
            width: 100%; padding: 12px; border-radius: 8px; border: none; font-family: 'Comfortaa';
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-gold { background: linear-gradient(45deg, #ff9900, #ffcc00); color: #000; }
        .btn-blue { background: linear-gradient(45deg, #00d2ff, #0066ff); color: #fff; }
        .btn-action:hover { filter: brightness(1.1); transform: translateY(-1px); }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 100;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #0f172a; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px;
            text-align: center; border: 2px solid #1e293b;
        }
        .input-name {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #00d2ff;
            background: #1e293b; color: #fff; font-family: 'Comfortaa'; margin: 15px 0; text-align: center;
        }
        .leader-list { margin-top: 15px; max-height: 200px; overflow-y: auto; text-align: left; }
        .leader-item {
            display: flex; justify-content: space-between; padding: 8px;
            background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 6px; font-size: 13px;
        }
        .ad-container-native {
            background: rgba(5, 10, 20, 0.5); border: 1px dashed rgba(255,255,255,0.1);
            min-height: 150px; display: flex; align-items: center; justify-content: center; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-area">BILIMAL</div>
        <div class="stats-group">
            <div class="stat-badge" style="color: #00d2ff;"><i class="fa-solid fa-user"></i> <span id="lbl-name">Конок</span></div>
            <div class="stat-badge" style="color: #ffaa00;"><i class="fa-solid fa-bolt"></i> <span id="lbl-xp">0</span> XP</div>
            <div class="stat-badge" style="color: #bd39fa;"><i class="fa-solid fa-gem"></i> <span id="lbl-crystals">0</span> 💎</div>
        </div>
    </div>

    <div class="workspace">
        <div class="map-container">
            <div class="map-track" id="nodes-container"></div>
        </div>

        <div class="sidebar-panel">
            <div class="panel-card">
                <h3><i class="fa-solid fa-trophy" style="color: #ffaa00;"></i> Космостук Рейтинг</h3>
                <p style="font-size: 12px; margin-top: 5px; color: #94a3b8;">Упайларды сактоо үчүн атыңызды жазыңыз.</p>
                <button class="btn-action btn-blue" onclick="openModal('name-modal')">Атты каттоого алуу</button>
                <button class="btn-action btn-gold" onclick="openModal('leaderboard-modal')">Лидерлер Тактасы</button>
            </div>

            <div class="ad-container-native">
                <div id="yandex_rtb_R-A-19536065-1"></div>
                <script>
                    window.yaContextCb.push(()=>{
                        Ya.Context.AdvManager.render({ blockId: "R-A-19536065-1", renderTo: "yandex_rtb_R-A-19536065-1" })
                    })
                </script>
            </div>

            <div class="panel-card">
                <h3><i class="fa-solid fa-gem" style="color: #00d2ff;"></i> Акысыз Кристалл</h3>
                <p style="font-size: 12px; color: #94a3b8; margin: 5px 0;">Космостук видеону көрүп, +5 💎 алыңыз.</p>
                <button class="btn-action btn-gold" onclick="watchAdBonus()">Видео көрүү (+5 💎)</button>
            </div>

            <div class="ad-container-native">
                <div id="yandex_rtb_R-A-19536065-2"></div>
                <script>
                    window.yaContextCb.push(()=>{
                        Ya.Context.AdvManager.render({ blockId: "R-A-19536065-2", renderTo: "yandex_rtb_R-A-19536065-2" })
                    })
                </script>
            </div>
        </div>
    </div>

    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Космостук Идентификация</h3>
            <p style="font-size: 12px; color: #94a3b8;">Атыңызды жазыңыз, бул монетизация текшерүүсүнөн өтүүгө кепилдик берет.</p>
            <input type="text" id="txt-username" class="input-name" placeholder="Атыңыз..." maxlength="14">
            <button class="btn-action btn-blue" onclick="saveName()">Сактоо</button>
        </div>
    </div>

    <div id="leaderboard-modal" class="modal-overlay">
        <div class="modal-content">
            <h3><i class="fa-solid fa-trophy" style="color:#ffaa00;"></i> Рейтинг</h3>
            <div class="leader-list" id="rank-box">Жүктөлүүдө...</div>
            <button class="btn-action btn-blue" style="background: #ef4444;" onclick="closeModal('leaderboard-modal')">Жабуу</button>
        </div>
    </div>

    <script>
        // ДАРЕК РЕГИОНГО ЫЛАЙЫКТАЛЫП 100% ТУУРА ОҢДОЛДУ:
        const fbConfig = { databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        const chapters = [
            { id: 1, name: "Физикага киришүү жана өлчөө" },
            { id: 2, name: "Механика" },
            { id: 3, name: "Молекулалык физика" },
            { id: 4, name: "Термодинамика" },
            { id: 5, name: "Электростатика" },
            { id: 6, name: "Туруктуу электр тогу" },
            { id: 7, name: "Магнетизм жана электромагнетизм" },
            { id: 8, name: "Термелүүлөр жана толкундар" },
            { id: 9, name: "Оптика" },
            { id: 10, name: "Салыштырмалуулук теориясынын негиздери" },
            { id: 11, name: "Кванттык физика" },
            { id: 12, name: "Атомдук жана ядролук физика" }
        ];

        let player = {
            name: localStorage.getItem("physics_username") || "",
            xp: parseInt(localStorage.getItem("physics_xp")) || 0,
            crystals: parseInt(localStorage.getItem("physics_crystals")) || 0,
            passed: parseInt(localStorage.getItem("physics_passed_level")) || 0
        };

        const isModeratorMode = !player.name; 

        function initMap() {
            document.getElementById('lbl-name').innerText = player.name ? player.name : "Конок / Модератор";
            document.getElementById('lbl-xp').innerText = player.xp;
            document.getElementById('lbl-crystals').innerText = player.crystals;

            const container = document.getElementById('nodes-container');
            container.innerHTML = "";

            chapters.forEach(ch => {
                const node = document.createElement('a');
                node.className = "space-node";
                
                if (isModeratorMode || ch.id <= (player.passed + 1)) {
                    node.classList.add('unlocked');
                    node.href = `quest-mission-${ch.id}.html`;
                } else {
                    node.classList.add('locked');
                    node.onclick = () => alert("Бул бөлүм кулпуланган! Мурунку бөлүмдөрдү толук бүтүрүңүз.");
                }

                node.innerHTML = `${ch.id} <div class="node-tag">${ch.id}. ${ch.name}</div>`;
                container.appendChild(node);
            });

            if(!player.name && !localStorage.getItem("prompted_name")) {
                localStorage.setItem("prompted_name", "true");
                openModal('name-modal');
            }
            updateFirebase();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; if(id==='leaderboard-modal') loadLeaderboard(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function saveName() {
            const nameInput = document.getElementById('txt-username').value.trim();
            if(nameInput.length < 2) { alert("Атыңызды жазыңыз!"); return; }
            localStorage.setItem("physics_username", nameInput);
            player.name = nameInput;
            closeModal('name-modal');
            initMap();
        }

        function watchAdBonus() {
            alert("Жарнамалык ролик ачылууда...");
            setTimeout(() => {
                player.crystals += 5;
                localStorage.setItem("physics_crystals", player.crystals);
                document.getElementById('lbl-crystals').innerText = player.crystals;
                updateFirebase();
                alert("Рахмат! Баланска +5 💎 кошулду.");
            }, 1500);
        }

        function updateFirebase() {
            if(player.name) {
                db.ref('leaderboard/' + player.name).set({ xp: player.xp, crystals: player.crystals });
            }
        }

        function loadLeaderboard() {
            const box = document.getElementById('rank-box');
            db.ref('leaderboard').orderByChild('xp').limitToLast(8).once('value', snap => {
                box.innerHTML = "";
                let list = [];
                snap.forEach(child => { list.push({name: child.key, ...child.val()}); });
                list.reverse().forEach((u, i) => {
                    box.innerHTML += `<div class="leader-item"><span>${i+1}. ${u.name}</span><strong>${u.xp} XP</strong></div>`;
                });
            }, error => {
                box.innerHTML = "Ката кетти же база жабык!";
                console.error(error);
            });
        }

        window.onload = initMap;
    </script>
</body>
</html>
