<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <title>🚗 Механика Лабораториясы</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        body { background: #030712; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111827; padding: 25px; border-radius: 12px; max-width: 650px; margin: 30px auto; border-left: 5px solid #3b82f6; }
        .btn { background: #3b82f6; border: none; padding: 12px 30px; color: #fff; border-radius: 8px; cursor: pointer; display: block; margin: 20px auto; }
        .option { display: block; background: #1f2937; padding: 15px; margin: 10px 0; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚗 1-деңгээл: Кинематика жана Динамика</h2>
        <p style="margin: 15px 0;">Автоунаа ордунан козголуп, $a = 2 \text{ м/с}^2$ туруктуу ылдамдануу менен түз сызыктуу кыймылдай баштады. Алгачкы $t = 5 \text{ с}$ ичинде автоунаа канча жолду ($S$) басып өтөт?</p>
        <div class="option"><input type="radio" name="q1" value="A"> A) $10 \text{ м}$</div>
        <div class="option"><input type="radio" name="q1" value="B"> B) $25 \text{ м}$</div>
        <div class="option"><input type="radio" name="q1" value="C"> C) $50 \text{ м}$</div>
        <button class="btn" onclick="checkAnswer()">Жоопту текшерүү 🚀</button>
    </div>

    <script>
        function checkAnswer() {
            let ans = document.querySelector('input[name="q1"]:checked');
            if (ans && ans.value === "B") {
                alert("Туура! Жеңиш! $S = \frac{at^2}{2} = \frac{2 \cdot 25}{2} = 25 \text{ м}$. Кийинки деңгээл ачылды!");
                localStorage.setItem('bilimal_current_level', 2);
                window.location.href = '../quest-map.html';
            } else {
                alert("Ката! Формуланы кайра эстеп көрүңүз.");
            }
        }
    </script>
</body>
</html>
