<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бөлүм Тести — BilimAl</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- GOOGLE ADSENSE -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6467389100412852" crossorigin="anonymous"></script>
    <!-- ЯНДЕКС РСЯ -->
    <script>window.yaContextCb=window.yaContextCb||[]</script>
    <script src="https://yandex.ru/ads/system/context.js" async></script>

    <style>
        body { background: #0b0f19; color: #fff; font-family: 'Comfortaa', cursive; padding: 20px; }
        .quiz-container { max-width: 620px; margin: 140px auto 30px auto; background: #151f32; padding: 30px; border-radius: 16px; border: 1px solid #00d2ff; }
        .btn-opt { display: block; width: 100%; padding: 14px; margin: 10px 0; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; cursor: pointer; text-align: left; font-family: 'Comfortaa'; font-size: 14px; transition: 0.2s; }
        .btn-opt:hover { background: #00d2ff; color: #000; font-weight: bold; }
        .header-title { text-align: center; color: #00d2ff; margin-bottom: 25px; font-size: 20px; }
        .ad-top-static { max-width: 728px; min-height: 90px; margin: 0 auto; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- ЖОГОРКУ ЧОҢ РСЯ ЖАРНАМА БАННЕРИ (ЭҢ КӨП КИРЕШЕ БЕРГЕН БЛОК) -->
    <div class="ad-top-static">
        <div id="yandex_rtb_R-A-19536065-3"></div>
        <script>
            window.yaContextCb.push(()=>{
                Ya.Context.AdvManager.render({
                    blockId: "R-A-19536065-3",
                    renderTo: "yandex_rtb_R-A-19536065-3"
                })
            })
        </script>
    </div>

    <div class="quiz-container">
        <h2 class="header-title" id="chapter-header">Жүктөлүүдө...</h2>
        <div id="question-box">
            <p id="q-text" style="font-size: 16px; margin-bottom: 20px; line-height: 1.5;"></p>
            <div id="options-box"></div>
        </div>
    </div>

    <script>
        // АР БИР ФАЙЛДА УШУЛ ҮЧ ӨЗГӨРМӨНҮ ТЕМАГА ЖАРАША ӨЗГӨРТӨСҮЗ:
        const CHAPTER_ID = 1; 
        const CHAPTER_TITLE = "1-Бөлүм: Физикага киришүү жана өлчөө";
        
        const questions = [
            { q: "Эл аралык бирдиктер системасында (SI) узундуктун негизги бирдиги кайсы?", opts: ["Километр", "Метр", "Сантиметр", "Миллиметр"], ans: 1 },
            { q: "Төмөнкү куралдардын ичинен кайсынысы убакытты өлчөө үчүн колдонулат?", opts: ["Сызгыч", "Термометр", "Секундомер", "Барометр"], ans: 2 }
        ];

        let currentQ = 0;
        let earnedXP = 0;

        document.getElementById('chapter-header').innerText = CHAPTER_TITLE;

        function loadQuestion() {
            if(currentQ >= questions.length) {
                completeMission();
                return;
            }
            const q = questions[currentQ];
            document.getElementById('q-text').innerText = `${currentQ + 1}. ${q.q}`;
            const optBox = document.getElementById('options-box');
            optBox.innerHTML = "";
            
            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-opt";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx);
                optBox.appendChild(btn);
            });
        }

        function checkAnswer(idx) {
            if(idx === questions[currentQ].ans) {
                earnedXP += 50; 
                alert("Туура жооп! +50 XP");
            } else {
                alert("Ката жооп! Туура эмес багыт.");
            }
            currentQ++;
            loadQuestion();
        }

        function completeMission() {
            let passed = parseInt(localStorage.getItem("physics_passed_level")) || 0;
            if(CHAPTER_ID > passed) {
                localStorage.setItem("physics_passed_level", CHAPTER_ID);
            }
            
            let xp = parseInt(localStorage.getItem("physics_xp")) || 0;
            localStorage.setItem("physics_xp", xp + earnedXP);

            let crystals = parseInt(localStorage.getItem("physics_crystals")) || 0;
            localStorage.setItem("physics_crystals", crystals + 2);

            alert(`Бөлүм аяктады! Сиз ${earnedXP} XP жана 2 💎 сыйлык алдыңыз!`);
            window.location.href = "quest-map.html";
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
