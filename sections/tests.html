<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilimal - Тест Башкаруу Панели</title>
    <!-- Favicon 404 катасын болтурбоо үчүн -->
    <link rel="icon" href="data:,">
    <!-- Font Awesome CDN бир гана жолу кошулду -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Стилистикалык файл -->
    <link rel="stylesheet" href="/assets/css/tests.css">
</head>
<body>

    <!-- Мобилдик экрандар үчүн Hamburger баскычы -->
    <button class="mobile-toggle" id="mobileToggle" aria-label="Менюну ачуу">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Сол жактагы туруктуу айнек стилиндеги Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <span class="logo-white">Bilim</span><span class="logo-cyan">al</span>
        </div>
        <nav class="sidebar-menu">
            <button class="menu-item">
                <i class="fas fa-chart-pie"></i>
                <span>Башкаруу панели</span>
            </button>
            <button class="menu-item active">
                <i class="fas fa-sliders-h"></i>
                <span>Smart Test Builder</span>
            </button>
            <button class="menu-item">
                <i class="fas fa-graduation-cap"></i>
                <span>Жыйынтыктар</span>
            </button>
        </nav>
    </aside>

    <!-- Башкы контент бөлүгү -->
    <main class="main-content">
        
        <!-- Үстүнкү издөө жана жаңы тест түзүү панели -->
        <header class="top-bar">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="testSearchInput" placeholder="Тесттерди издөө...">
            </div>
            <button class="btn-create-test" id="createNewTestBtn">
                <i class="fas fa-plus"></i>
                <span>Жаңы Тест Түзүү</span>
            </button>
        </header>

        <!-- Статистика карточкалары -->
        <section class="stats-container">
            <div class="stat-card">
                <h3>Жалпы Тесттер</h3>
                <div class="stat-number cyan-glow" id="totalTestsCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Активдүү окуучулар</h3>
                <div class="stat-number green-glow" id="activeStudentsCount">0</div>
            </div>
        </section>

        <!-- Менин тесттерим бөлүгү (Таблица жана фильтрлер) -->
        <section class="tests-section-panel">
            <div class="panel-header">
                <h2>Менин тесттерим</h2>
                <div class="filters-container">
                    <select id="subjectFilter" class="custom-select">
                        <option value="all">Бардык предметтер</option>
                        <option value="physics">Физика</option>
                        <option value="astronomy">Астрономия</option>
                    </select>
                    <select id="statusFilter" class="custom-select">
                        <option value="all">Бардык статустар</option>
                        <option value="active">Активдүү</option>
                        <option value="draft">Черновик</option>
                    </select>
                </div>
            </div>

            <!-- Таблица үчүн респонсив каптама -->
            <div class="responsive-table-wrapper">
                <table class="cyber-table" id="myTestsTable">
                    <thead>
                        <tr>
                            <th>Аталышы</th>
                            <th>Предмет / Класс</th>
                            <th>Суроолор</th>
                            <th>Убакыт</th>
                            <th>Статус</th>
                            <th>Аракеттер</th>
                        </tr>
                    </thead>
                    <tbody id="testsTableBody">
                        <!-- Динамикалык саптар ушул жерге түшөт -->
                    </tbody>
                </table>
                <!-- Маалымат жок кездеги билдирүү -->
                <div class="no-data-message" id="noDataMessage">
                    Тесттер табылган жок. Жаңы тест түзүңүз!
                </div>
            </div>
        </section>

        <!-- Жарнама бөлүгү (Dashboard'дун эң ылдый жагында гана) -->
        <footer class="footer-ad-section">
            <div class="ad-title">Жарнамалык байланыш борбору</div>
            <div class="ad-container">
                <!-- Бул жерге AdSense же Adsterra скрипттери орнойт. Контейнер стили сакталды -->
                <div class="ad-placeholder">Жарнама</div>
            </div>
        </footer>

    </main>

    <!-- Скрипттерди башкаруу жана мобилдик меню үчүн чакан логика (HTMLде ката жаратпайт) -->
    <script>
        document.getElementById('mobileToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('open');
        });
    </script>
</body>
</html>
