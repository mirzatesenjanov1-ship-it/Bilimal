<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilimal.org - Таза Тест Конструктору</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #1e293b;
            --hover-bg: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        /* Негизги баскыч */
        .main-add-btn {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 210, 255, 0.2);
        }
        .main-add-btn:hover { background-color: #00b8e6; transform: translateY(-2px); }

        /* Тест блоктору */
        .test-block {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .test-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .block-title { font-weight: bold; color: var(--primary); font-size: 16px; }
        
        .btn-remove {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .btn-remove:hover { background-color: var(--danger); color: white; }

        /* Формат тандоочу меню (Блоктун ичинде) */
        .type-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px 0;
        }
        .type-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .type-card:hover { border-color: var(--primary); background-color: var(--hover-bg); }
        .type-card h4 { margin: 0 0 5px 0; color: var(--text-main); }
        .type-card p { margin: 0; font-size: 12px; color: var(--text-muted); }

        /* Жалпы форма элементтери */
        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 14px;
            box-sizing: border-box;
            margin-top: 5px;
        }
        textarea { resize: vertical; }
        label { font-size: 12px; color: var(--text-muted); }

        /* PISA формасы */
        .pisa-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        /* Варианттар */
        .option-item { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .option-item input[type="radio"] { transform: scale(1.2); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🛠 БилимАс: Акылдуу Тест Конструктору</h2>
    </div>

    <div id="testContainer"></div>

    <button class="main-add-btn" onclick="addEmptyBlock()">+ Жаңы суроо блогун кошуу</button>
</div>

<script>
    let blockCount = 0;

    // 1-КАДАМ: Бош блок кошуу
    function addEmptyBlock() {
        blockCount++;
        const container = document.getElementById("testContainer");

        const block = document.createElement("div");
        block.className = "test-block";
        block.id = `block-${blockCount}`;

        // Бош блоктун ичиндеги формат тандоо менюсу
        block.innerHTML = `
            <div class="test-block-header">
                <span class="block-title">Суроо #${blockCount} - Форматты тандаңыз</span>
                <button class="btn-remove" onclick="removeBlock(${blockCount})">Блокту өчүрүү</button>
            </div>
            <div class="type-selector" id="selector-${blockCount}">
                <div class="type-card" onclick="buildBlock(${blockCount}, 'simple')">
                    <h4>📝 Жөнөкөй текст</h4>
                    <p>Төрт варианттуу стандарттык тест</p>
                </div>
                <div class="type-card" onclick="buildBlock(${blockCount}, 'pisa')">
                    <h4>📊 PISA тест</h4>
                    <p>Анализ, логика, жана чоң тексттер</p>
                </div>
                <div class="type-card" onclick="buildBlock(${blockCount}, 'essay')">
                    <h4>🎧 Аудио / Эссе</h4>
                    <p>Ачык ой жүгүртүү жана диктант</p>
                </div>
            </div>
            <div id="content-${blockCount}"></div>
        `;

        container.appendChild(block);
        
        // Экранды жаңы кошулган блокко жылдыруу
        block.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 2-КАДАМ: Тандалган форматка жараша блокту куруу
    function buildBlock(id, type) {
        // Тандоо менюсун жашырабыз
        document.getElementById(`selector-${id}`).style.display = 'none';
        
        const contentDiv = document.getElementById(`content-${id}`);
        const headerTitle = document.querySelector(`#block-${id} .block-title`);

        if (type === 'simple') {
            headerTitle.innerHTML = `📝 Жөнөкөй Суроо #${id}`;
            contentDiv.innerHTML = `
                <label>Суроонун тексти:</label>
                <input type="text" placeholder="Мисалы: Ньютондун экинчи мыйзамынын формуласы кайсы?">
                
                <div style="margin-top: 15px;">
                    <label>Жооптун варианттары (Туура жоопту белгилеңиз):</label>
                    <div class="option-item"><input type="radio" name="correct-${id}"> <input type="text" placeholder="А варианты..."></div>
                    <div class="option-item"><input type="radio" name="correct-${id}"> <input type="text" placeholder="Б варианты..."></div>
                    <div class="option-item"><input type="radio" name="correct-${id}"> <input type="text" placeholder="В варианты..."></div>
                    <div class="option-item"><input type="radio" name="correct-${id}"> <input type="text" placeholder="Г варианты..."></div>
                </div>
            `;
        } else if (type === 'pisa') {
            headerTitle.innerHTML = `📊 PISA Блогу #${id}`;
            contentDiv.innerHTML = `
                <div class="pisa-grid">
                    <div>
                        <label>Окуя / Текст / Шарт (Сол жак бөлүк):</label>
                        <textarea placeholder="Бул жерге текстти жазыңыз..." style="height: 150px;"></textarea>
                        <label style="display:block; margin-top:10px;">Сүрөт же график тиркөө:</label>
                        <input type="file" style="font-size:12px;">
                    </div>
                    <div>
                        <label>Текстке тиешелүү суроо жана жооп талаасы (Оң жак бөлүк):</label>
                        <textarea placeholder="1-суроо: Графиктеги өзгөрүүнү түшүндүрүңүз..." style="height: 100px;"></textarea>
                        <div style="margin-top: 15px; padding: 10px; background: var(--bg-color); border: 1px dashed var(--border); border-radius: 6px;">
                            <label>Баалоо критерийи (Мугалим үчүн):</label>
                            <input type="text" placeholder="Мисалы: Толук жооп үчүн - 2 балл, жарым үчүн - 1 балл">
                        </div>
                    </div>
                </div>
            `;
        } else if (type === 'essay') {
            headerTitle.innerHTML = `🎧 Аудио-Диктант / Эссе #${id}`;
            contentDiv.innerHTML = `
                <label>Тапшырманын темасы же шарты:</label>
                <input type="text" placeholder="Мисалы: Электромагниттик индукция боюнча эссе жаз">
                
                <div style="margin-top: 15px; padding: 15px; border: 1px solid var(--border); border-radius: 6px; background-color: var(--bg-color);">
                    <label>Аудио файл жүктөө (Милдеттүү эмес):</label>
                    <div style="display: flex; gap: 15px; align-items: center; margin-top: 5px;">
                        <input type="file" accept="audio/*" style="width: auto;">
                        <span style="font-size: 12px; color: var(--text-muted);">же Шилтеме:</span>
                        <input type="text" placeholder="URL шилтеме...">
                    </div>
                </div>

                <div style="margin-top: 15px;">
                    <label>Жооптун минималдуу сөз саны (чектөө):</label>
                    <input type="number" placeholder="Мисалы: 150" style="width: 200px; display: block;">
                </div>
            `;
        }
    }

    // Блокту өчүрүү функциясы
    function removeBlock(id) {
        const block = document.getElementById(`block-${id}`);
        if (block) {
            block.style.opacity = '0';
            setTimeout(() => { block.remove(); }, 300);
        }
    }
</script>

</body>
</html>
