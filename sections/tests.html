<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiliMal.org — Мугалим Жардамчысы V5.1 (PISA)</title>
    <style>
        /* Дизайн жана Базалык Стиль */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #020208; color: #fff; min-height: 100vh; padding-top: 90px; }
        
        header { 
            background: rgba(4, 4, 16, 0.9); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(0, 240, 255, 0.2); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 100; 
        }
        .logo { font-size: 1.6rem; font-weight: 900; color: #00f0ff; text-decoration: none; text-shadow: 0 0 10px #00f0ff; }
        
        .lang-switcher { display: flex; gap: 8px; }
        .lang-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,240,255,0.3); color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .lang-btn.active { background: #00f0ff; color: #000; font-weight: bold; box-shadow: 0 0 8px #00f0ff; }

        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }
        .role-selector { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .role-btn { background: #0f0f23; border: 1px solid #00f0ff; padding: 10px 25px; border-radius: 20px; color: #fff; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .role-btn.active { background: cyan; color: #000; box-shadow: 0 0 15px cyan; border-color: cyan; }
        .role-btn.student-active { background: linear-gradient(90deg, #00f0ff, #ff00ff); color: #fff; border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }

        .grid-layout { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 25px; }
        .card { background: rgba(20, 20, 35, 0.75); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(5px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h3 { color: #00f0ff; margin-bottom: 18px; border-bottom: 1px solid rgba(0,240,255,0.2); padding-bottom: 8px; font-size: 1.3rem; }
        
        label { display: block; margin: 12px 0 6px; color: #a5b4fc; font-size: 0.9rem; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.6); border: 1px solid #334155; border-radius: 8px; color: #fff; outline: none; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #ff00ff; box-shadow: 0 0 8px rgba(255,0,255,0.3); }
        
        .btn { background: linear-gradient(90deg, #00f0ff, #7000ff); border: none; padding: 12px 20px; border-radius: 8px; color: #fff; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 6px; }
        .btn:hover { transform: translateY(-2px); opacity: 0.95; }
        .btn-red { background: #ff4444; } .btn-orange { background: #f59e0b; color: #fff; } .btn-gray { background: #475569; }
        
        .test-list-item { background: rgba(10, 10, 25, 0.6); border-left: 4px solid #00f0ff; padding: 15px; margin-bottom: 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .action-group { display: flex; gap: 8px; }
        .result-item { background: rgba(255,255,255,0.02); padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        
        .progress-container { background: rgba(255,255,255,0.1); border-radius: 10px; height: 12px; width: 100%; margin-top: 8px; overflow: hidden; position: relative; }
        .progress-bar { background: linear-gradient(90deg, #ff00ff, #00f0ff); height: 100%; border-radius: 10px; transition: width 0.5s ease-in-out; }
        .percentage-badge { background: rgba(255, 0, 255, 0.15); color: #ff00ff; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; border: 1px solid rgba(255,0,255,0.3); }

        .audio-container { background: rgba(0, 240, 255, 0.05); padding: 15px; border: 1px dashed #00f0ff; border-radius: 8px; text-align: center; margin: 15px 0; }
        .class-group-title { background: rgba(0, 240, 255, 0.1); color: #00f0ff; padding: 6px 12px; border-radius: 4px; margin: 15px 0 10px; font-weight: bold; font-size: 0.95rem; display: inline-block; }
        .pisa-context-box { background: rgba(255, 255, 255, 0.05); padding: 15px; border-left: 4px solid #ff00ff; margin-bottom: 15px; font-style: italic; border-radius: 0 8px 8px 0; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">BiliMal.org</a>
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLanguage('ky')">Кыргызча</button>
            <button class="lang-btn" onclick="setLanguage('ru')">Русский</button>
            <button class="lang-btn" onclick="setLanguage('en')">English</button>
        </div>
        <a href="#" id="txt-back-main" style="color:#fff; text-decoration:none; font-size:0.9rem;">← Башкы бетке кайтуу</a>
    </header>

    <div class="container">
        <div class="role-selector" id="role-tabs">
            <button class="role-btn active" id="tab-teacher" onclick="switchRole('teacher')">👨‍🏫 Мугалимдин Башкаруу Панели</button>
            <button class="role-btn" id="tab-student" onclick="switchRole('student')">🎒 Окуучунун Тест Тапшыруусу</button>
        </div>

        <!-- МУГАЛИМДИН ИШТИК ТАЛААСЫ -->
        <div id="panel-teacher" style="display: block;">
            <div class="grid-layout">
                
                <!-- Тест түзүү жана редакциялоо картасы -->
                <div class="card">
                    <h3 id="form-title">🛠️ Жаңы Тапшырма / Тест Түзүү</h3>
                    
                    <label id="lbl-task-title">Тапшырманын аталышы</label>
                    <input type="text" id="t-title" placeholder="Мисалы: 10-класс Физика: Омдун мыйзамы">

                    <label id="lbl-task-type">Тапшырманын Түрүн Тандаңыз:</label>
                    <select id="t-type" onchange="toggleFormFields()">
                        <option value="standard">1. Жөнөкөй Тест (Суроо-Жооп)</option>
                        <option value="dictation">2. Аудио-Диктант / Эссе</option>
                        <option value="pisa">3. PISA Тест (Кырдаал жана Анализ)</option>
                    </select>

                    <div id="dynamic-fields" style="margin-top:15px;"></div>

                    <div style="margin-top: 20px; display:flex; gap:10px;">
                        <button class="btn" id="btn-save-main" style="flex:1; justify-content:center;" onclick="processSave()">💾 Тестти Базага Сактоо</button>
                        <button class="btn btn-gray" id="btn-cancel-edit" style="display:none;" onclick="cancelEditing()">Жокко чыгаруу</button>
                    </div>
                </div>

                <!-- Мониторинг жана База тарабы -->
                <div>
                    <div class="card">
                        <h3 id="txt-active-tests-title">📋 Активдүү Тесттердин Тизмеси</h3>
                        <div id="list-teacher-tests"></div>
                    </div>
                    
                    <div class="card">
                        <h3 id="txt-results-title">📊 Жыйынтыктар & Мониторинг</h3>
                        <div style="display:flex; gap:10px; margin-bottom:15px;">
                            <select id="filter-class" onchange="renderResults()" style="margin-bottom:0; padding:8px;">
                                <option value="all">Бардык класстар</option>
                            </select>
                            <button class="btn btn-red" id="btn-clear-res" style="padding:8px 15px;" onclick="clearAllResults()">Тазалоо</button>
                        </div>
                        <div id="list-teacher-results"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ОКУУЧУНУН ИШТИК ТАЛААСЫ -->
        <div id="panel-student" style="display: none;">
            <div class="card" id="student-auth-form" style="max-width: 500px; margin: 0 auto;">
                <h3 id="txt-student-access">📝 Доступ Алуу</h3>
                
                <label id="lbl-stud-name">Аты-жөнүңүз (Толук жазыңыз)</label>
                <input type="text" id="s-name" placeholder="Мисалы: Асия Изатбекова">

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label id="lbl-stud-class-num">Классыңыз (Жөн гана сан)</label>
                        <select id="s-class-num">
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                            <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                            <option value="10" selected>10</option><option value="11">11</option>
                        </select>
                    </div>
                    <div>
                        <label id="lbl-stud-class-let">Класс тамгасы</label>
                        <select id="s-class-let">
                            <option value="А">А</option><option value="Б">Б</option><option value="В">В</option>
                            <option value="Г">Г</option><option value="Д">Д</option><option value="Е">Е</option>
                        </select>
                    </div>
                </div>

                <label id="lbl-stud-code">Шилтемедеги Тесттин ID коду</label>
                <input type="text" id="s-testid" placeholder="Мисалы: TEST-101">

                <button class="btn" id="btn-start-test" style="width:100%; justify-content:center; margin-top:15px;" onclick="initiateStudentTest()">Баштоо 🚀</button>
            </div>

            <div class="card" id="student-test-workspace" style="max-width: 800px; margin: 0 auto; display: none;">
                <h3 id="display-student-test-title">Тест аткарылууда...</h3>
                <div id="student-test-body"></div>
                <button class="btn" id="btn-submit-test" style="width:100%; justify-content:center; margin-top:25px; background:linear-gradient(90deg, #ff00ff, #7000ff);" onclick="commitStudentAnswers()">Жыйынтыкты Жиберүү 📤</button>
            </div>
        </div>
    </div>

    <script>
        // --- ТИЛ ПАКЕТТЕРИ (Локализация) ---
        const dictionary = {
            ky: {
                mainPage: "← Башкы бетке кайтуу", teacherTab: "👨‍🏫 Мугалимдин Башкаруу Панели", studentTab: "🎒 Окуучунун Тест Тапшыруусу",
                createTitle: "🛠️ Жаңы Тапшырма / Тест Түзүү", editTitle: "📝 Тестти Түзөтүү Режими", nameLabel: "Тапшырманын аталышы", typeLabel: "Тапшырманын Түрүн Тандаңыз:",
                saveBtn: "💾 Тестти Базага Сактоо", updateBtn: "🔄 Тестти Жаңыртуу", cancelBtn: "Жокко чыгаруу", activeTitle: "📋 Активдүү Тесттердин Тизмеси",
                resultsTitle: "📊 Жыйынтыктар & Мониторинг", clearBtn: "Тазалоо", allClasses: "Бардык класстар", accessTitle: "📝 Доступ Алуу",
                fullName: "Аты-жөнүңүз (Толук жазыңыз)", classNum: "Классыңыз (Сан)", classLet: "Класс тамгасы", idCode: "Шилтемедеги Тесттин ID коду",
                startBtn: "Баштоо 🚀", sendBtn: "Жыйынтыкты Жиберүү 📤", stdQ: "Суроо тексти:", stdA: "Туура жооп:",
                dictPrompt: "Тапшырманын шарты (Окуучуга көрүнөт):", pisaContext: "PISA: Кырдаал же Текст (Контекст):", pisaImg: "Сүрөттүн шилтемеси (URL) - милдеттүү эмес:",
                copyBtn: "🔗 Кодду көчүрүү", editBtn: "📝 Түзөтүү", deleteBtn: "🗑️ Өчүрүү",
                savedAlert: "Ийгиликтүү сакталды!", updatedAlert: "Тест ийгиликтүү жаңыртылды!", linkCopied: "Шилтеме алмашуу буферине көчүрүлдү!"
            },
            ru: {
                mainPage: "← Вернуться на главную", teacherTab: "👨‍🏫 Панель Управления Учителя", studentTab: "🎒 Тестирование для Ученика",
                createTitle: "🛠️ Создание Нового Задания / Теста", editTitle: "📝 Режим Редактирования Теста", nameLabel: "Название задания", typeLabel: "Выберите Тип Задания:",
                saveBtn: "💾 Сохранить Тест в Базу", updateBtn: "🔄 Обновить Данные Теста", cancelBtn: "Отмена", activeTitle: "📋 Список Активных Тестов",
                resultsTitle: "📊 Результаты и Мониторинг", clearBtn: "Очистить", allClasses: "Все классы", accessTitle: "📝 Получение Доступа",
                fullName: "Ваше имя и фамилия (Полностью)", classNum: "Класс (Цифра)", classLet: "Буква класса", idCode: "ID код теста из ссылки",
                startBtn: "Начать тест 🚀", sendBtn: "Отправить результат 📤", stdQ: "Текст вопроса:", stdA: "Правильный ответ:",
                dictPrompt: "Условие задания (Видно ученику):", pisaContext: "PISA: Ситуация или Текст (Контекст):", pisaImg: "Ссылка на картинку (URL) - необязательно:",
                copyBtn: "🔗 Копировать ссылку", editBtn: "📝 Редактировать", deleteBtn: "🗑️ Удалить",
                savedAlert: "Успешно сохранено!", updatedAlert: "Тест успешно обновлен!", linkCopied: "Ссылка скопирована в буфер обмена!"
            },
            en: {
                mainPage: "← Back to Home", teacherTab: "👨‍🏫 Teacher Management Dashboard", studentTab: "🎒 Student Test Workspace",
                createTitle: "🛠️ Create New Assignment / Test", editTitle: "📝 Edit Test Mode", nameLabel: "Assignment Title", typeLabel: "Select Assignment Type:",
                saveBtn: "💾 Save Test to DB", updateBtn: "🔄 Update Test Data", cancelBtn: "Cancel", activeTitle: "📋 List of Active Tests",
                resultsTitle: "📊 Results & Monitoring", clearBtn: "Clear All", allClasses: "All Classes", accessTitle: "📝 Get Access Permission",
                fullName: "Your Full Name", classNum: "Class Grade (Number)", classLet: "Class Letter", idCode: "Test ID code from link",
                startBtn: "Start Test 🚀", sendBtn: "Submit Results 📤", stdQ: "Question Text:", stdA: "Correct Answer:",
                dictPrompt: "Instruction details (Visible to student):", pisaContext: "PISA: Situation or Text (Context):", pisaImg: "Image Link (URL) - optional:",
                copyBtn: "🔗 Copy Link", editBtn: "📝 Edit", deleteBtn: "🗑️ Delete",
                savedAlert: "Successfully saved!", updatedAlert: "Test updated successfully!", linkCopied: "Link copied to clipboard!"
            }
        };

        let currentLang = localStorage.getItem('bm_lang') || 'ky';
        
        // МУРУНКУ БАЗАНЫ ЖОГОТПОО ҮЧҮН ЭСКИ ЖАНА ЖАҢЫ АЧКЫЧТАРДЫ БИРИКТИРҮҮ
        let tests = JSON.parse(localStorage.getItem('bm_v5_tests')) || JSON.parse(localStorage.getItem('tests')) || [];
        let results = JSON.parse(localStorage.getItem('bm_v5_results')) || JSON.parse(localStorage.getItem('results')) || [];
        
        let editingTestId = null; 
        let teacherAudio = null;
        let activeTestRef = null;

        // --- ЛОКАЛИЗАЦИЯ КУРАЛЫ ---
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('bm_lang', lang);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            applyLocalization();
        }

        function applyLocalization() {
            const l = dictionary[currentLang];
            document.getElementById('txt-back-main').innerText = l.mainPage;
            document.getElementById('tab-teacher').innerText = l.teacherTab;
            document.getElementById('tab-student').innerText = l.studentTab;
            document.getElementById('lbl-task-title').innerText = l.nameLabel;
            document.getElementById('lbl-task-type').innerText = l.typeLabel;
            document.getElementById('txt-active-tests-title').innerText = l.activeTitle;
            document.getElementById('txt-results-title').innerText = l.resultsTitle;
            document.getElementById('btn-clear-res').innerText = l.clearBtn;
            document.getElementById('txt-student-access').innerText = l.accessTitle;
            document.getElementById('lbl-stud-name').innerText = l.fullName;
            document.getElementById('lbl-stud-class-num').innerText = l.classNum;
            document.getElementById('lbl-stud-class-let').innerText = l.classLet;
            document.getElementById('lbl-stud-code').innerText = l.idCode;
            document.getElementById('btn-start-test').innerText = l.startBtn;
            document.getElementById('btn-submit-test').innerText = l.sendBtn;
            
            if(editingTestId) {
                document.getElementById('form-title').innerText = l.editTitle;
                document.getElementById('btn-save-main').innerText = l.updateBtn;
            } else {
                document.getElementById('form-title').innerText = l.createTitle;
                document.getElementById('btn-save-main').innerText = l.saveBtn;
            }
            toggleFormFields(true);
            renderTeacherTests();
            renderResults();
        }

        function switchRole(role) {
            document.getElementById('panel-teacher').style.display = role === 'teacher' ? 'block' : 'none';
            document.getElementById('panel-student').style.display = role === 'student' ? 'block' : 'none';
            document.getElementById('tab-teacher').className = 'role-btn' + (role === 'teacher' ? ' active' : '');
            document.getElementById('tab-student').className = 'role-btn' + (role === 'student' ? ' student-active' : '');
        }

        function toggleFormFields(preserveData = false) {
            const type = document.getElementById('t-type').value;
            const container = document.getElementById('dynamic-fields');
            const l = dictionary[currentLang];
            
            let oldQ = "", oldA = "", oldContext = "", oldImg = "";
            if(preserveData) {
                oldQ = document.getElementById('dyn-q') ? document.getElementById('dyn-q').value : "";
                oldA = document.getElementById('dyn-a') ? document.getElementById('dyn-a').value : "";
                oldContext = document.getElementById('dyn-context') ? document.getElementById('dyn-context').value : "";
                oldImg = document.getElementById('dyn-img') ? document.getElementById('dyn-img').value : "";
            }

            if(type === 'standard') {
                container.innerHTML = `
                    <label>${l.stdQ}</label>
                    <input type="text" id="dyn-q" value="${oldQ}" placeholder="...">
                    <label>${l.stdA}</label>
                    <input type="text" id="dyn-a" value="${oldA}" placeholder="...">
                `;
            } else if (type === 'dictation') {
                container.innerHTML = `
                    <label>${l.dictPrompt}</label>
                    <textarea id="dyn-q" rows="3">${oldQ}</textarea>
                    <div class="audio-container">
                        <p style="font-size:0.85rem; margin-bottom:8px;">🎙️ Аудио жазуу түзүмү (Иштеп жаткан түзмөк микрофону)</p>
                        <button class="btn btn-red" type="button" onclick="triggerMicrophone()">🔴 Үн жаздыруу</button>
                    </div>
                `;
            } else if (type === 'pisa') {
                container.innerHTML = `
                    <label>${l.pisaContext}</label>
                    <textarea id="dyn-context" rows="4" placeholder="Окуя, статистика же маалымат текстин жазыңыз...">${oldContext}</textarea>
                    <label>${l.pisaImg}</label>
                    <input type="text" id="dyn-img" value="${oldImg}" placeholder="https://...">
                    <label>${l.stdQ}</label>
                    <input type="text" id="dyn-q" value="${oldQ}" placeholder="Текстке же сүрөткө тиешелүү суроо">
                    <label>${l.stdA}</label>
                    <input type="text" id="dyn-a" value="${oldA}" placeholder="Баалоо үчүн туура жооп же критерий">
                `;
            }
        }

        function triggerMicrophone() {
            alert(currentLang === 'ky' ? "Микрофон туташуусу текшерилүүдө..." : "Проверка подключения микрофона...");
            teacherAudio = "data:audio/mp3;base64,🎧Платформа_Ички_Үн_Прототиби🎧";
        }

        function processSave() {
            const title = document.getElementById('t-title').value;
            const type = document.getElementById('t-type').value;
            const q = document.getElementById('dyn-q') ? document.getElementById('dyn-q').value : "";
            const a = document.getElementById('dyn-a') ? document.getElementById('dyn-a').value : "";
            const context = document.getElementById('dyn-context') ? document.getElementById('dyn-context').value : "";
            const img = document.getElementById('dyn-img') ? document.getElementById('dyn-img').value : "";

            if(!title || !q) return alert("Негизги талааларды толтуруңуз!");

            if(editingTestId) {
                let idx = tests.findIndex(t => t.id === editingTestId);
                if(idx !== -1) {
                    tests[idx].title = title;
                    tests[idx].type = type;
                    tests[idx].q = q;
                    tests[idx].a = a;
                    tests[idx].context = context;
                    tests[idx].img = img;
                }
                editingTestId = null;
                alert(dictionary[currentLang].updatedAlert);
            } else {
                const uid = "TEST-" + Math.floor(100 + Math.random() * 900);
                tests.push({ id: uid, title, type, q, a, context, img });
                alert(dictionary[currentLang].savedAlert);
            }

            localStorage.setItem('bm_v5_tests', JSON.stringify(tests));
            localStorage.setItem('tests', JSON.stringify(tests)); // Эски форматтагы базаны да жаңылоо
            
            document.getElementById('t-title').value = "";
            document.getElementById('btn-cancel-edit').style.display = 'none';
            applyLocalization();
        }

        function editTest(id) {
            const target = tests.find(t => t.id === id);
            if(!target) return;

            editingTestId = id;
            document.getElementById('t-title').value = target.title;
            document.getElementById('t-type').value = target.type;
            
            toggleFormFields();
            if(document.getElementById('dyn-q')) document.getElementById('dyn-q').value = target.q || "";
            if(document.getElementById('dyn-a')) document.getElementById('dyn-a').value = target.a || "";
            if(document.getElementById('dyn-context')) document.getElementById('dyn-context').value = target.context || "";
            if(document.getElementById('dyn-img')) document.getElementById('dyn-img').value = target.img || "";

            document.getElementById('btn-cancel-edit').style.display = 'inline-flex';
            
            document.getElementById('form-title').innerText = dictionary[currentLang].editTitle;
            document.getElementById('btn-save-main').innerText = dictionary[currentLang].updateBtn;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEditing() {
            editingTestId = null;
            document.getElementById('t-title').value = "";
            document.getElementById('btn-cancel-edit').style.display = 'none';
            applyLocalization();
        }

        function deleteTest(id) {
            if(confirm("Өчүрүүгө макулсузбу?")) {
                tests = tests.filter(t => t.id !== id);
                localStorage.setItem('bm_v5_tests', JSON.stringify(tests));
                localStorage.setItem('tests', JSON.stringify(tests));
                applyLocalization();
            }
        }

        function copyTargetLink(id) {
            const directUrl = window.location.origin + window.location.pathname + "?testid=" + id;
            navigator.clipboard.writeText(directUrl);
            alert(dictionary[currentLang].linkCopied + "\n" + directUrl);
        }

        function renderTeacherTests() {
            const list = document.getElementById('list-teacher-tests');
            list.innerHTML = '';
            const l = dictionary[currentLang];
            
            tests.forEach(t => {
                let icon = t.type === 'dictation' ? '🎙️' : (t.type === 'pisa' ? '🌍' : '📝');
                list.innerHTML += `
                    <div class="test-list-item">
                        <div>
                            <strong>${t.title}</strong>
                            <div style="font-size:0.8rem; color:#a5b4fc; margin-top:3px;">Код: ${t.id} | ${icon}</div>
                        </div>
                        <div class="action-group">
                            <button class="btn" style="padding:6px 12px; font-size:0.8rem;" onclick="copyTargetLink('${t.id}')">${l.copyBtn}</button>
                            <button class="btn btn-orange" style="padding:6px 12px; font-size:0.8rem;" onclick="editTest('${t.id}')">${l.editBtn}</button>
                            <button class="btn btn-red" style="padding:6px 12px; font-size:0.8rem;" onclick="deleteTest('${t.id}')">${l.deleteBtn}</button>
                        </div>
                    </div>
                `;
            });
        }

        function renderResults() {
            const list = document.getElementById('list-teacher-results');
            const filter = document.getElementById('filter-class').value;
            list.innerHTML = '';

            const selectFilter = document.getElementById('filter-class');
            
            // Базада "classNum" жок болсо да бузулбашы үчүн fallback
            const uniqueClasses = [...new Set(results.map(r => `${r.classNum || 'Белгисиз'}-${r.classLetter || ''}`))].sort();
            
            if(selectFilter.options.length <= 1) {
                uniqueClasses.forEach(c => {
                    let opt = document.createElement('option');
                    opt.value = c; opt.innerText = c + " класс";
                    selectFilter.appendChild(opt);
                });
            }

            let sortedResults = [...results].sort((a, b) => {
                let numA = parseInt(a.classNum) || 0;
                let numB = parseInt(b.classNum) || 0;
                if(numA !== numB) return numA - numB;

                let letA = a.classLetter || "";
                let letB = b.classLetter || "";
                let letComp = letA.localeCompare(letB);
                if(letComp !== 0) return letComp;

                let nameA = a.name || "";
                let nameB = b.name || "";
                return nameA.localeCompare(nameB, 'ky');
            });

            let currentClassGroup = "";

            sortedResults.forEach(r => {
                const classKey = `${r.classNum || 'Белгисиз'}-${r.classLetter || ''}`;
                if(filter !== 'all' && filter !== classKey) return;

                if(currentClassGroup !== classKey) {
                    currentClassGroup = classKey;
                    list.innerHTML += `<div class="class-group-title">📂 ${currentClassGroup} класс</div>`;
                }

                const percent = r.scorePercent || 0;

                list.innerHTML += `
                    <div class="result-item">
                        <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                            <div style="flex:1;">
                                <strong>${r.name || 'Аты жок'}</strong> 
                                <span style="font-size:0.8rem; color:#aaa; margin-left:10px;">Тест: ${r.testTitle || ''}</span>
                            </div>
                            <span class="percentage-badge">${percent}%</span>
                        </div>
                        <div style="color:#cbd5e1; font-size:0.9rem; margin-top:8px; background:rgba(0,0,0,0.3); padding:8px; border-radius:4px;">
                            📝 Жообу: ${r.answerText || ''}
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${percent}%;"></div>
                        </div>
                    </div>
                `;
            });
        }

        function clearAllResults() {
            if(confirm("Бардык жыйынтыктар базадан өчүрүлсүнбү?")) {
                results = [];
                localStorage.setItem('bm_v5_results', '[]');
                localStorage.setItem('results', '[]'); 
                renderResults();
            }
        }

        function initiateStudentTest() {
            const id = document.getElementById('s-testid').value.trim();
            const name = document.getElementById('s-name').value.trim();
            const classNum = document.getElementById('s-class-num').value;
            const classLet = document.getElementById('s-class-let').value;

            if(!id || !name) return alert("Атыңызды жазып, ID кодду киргизиңиз!");

            activeTestRef = tests.find(t => t.id === id);
            if(!activeTestRef) return alert("Мындай тест табылган жок!");

            document.getElementById('student-auth-form').style.display = 'none';
            document.getElementById('student-test-workspace').style.display = 'block';
            document.getElementById('display-student-test-title').innerText = activeTestRef.title;

            const body = document.getElementById('student-test-body');
            if(activeTestRef.type === 'dictation') {
                body.innerHTML = `
                    <p style="color:#00f0ff; font-weight:bold; margin-bottom:10px;">📌 Шарт: ${activeTestRef.q}</p>
                    <div class="audio-container">
                        <button class="btn" style="background:cyan; color:#000;" onclick="alert('Аудио угулууда...')">▶️ Мугалимдин аудиосун угуу (Лимиттелген)</button>
                    </div>
                    <label>Диктантты/Текстти жазыңыз:</label>
                    <textarea id="student-main-input" rows="6" placeholder="Бул жерге жазыңыз..."></textarea>
                `;
            } else if(activeTestRef.type === 'pisa') {
                let imgHtml = activeTestRef.img ? `<img src="${activeTestRef.img}" style="max-width:100%; border-radius:8px; margin-bottom:15px; border:1px solid #ff00ff;" alt="PISA Image">` : "";
                body.innerHTML = `
                    <div class="pisa-context-box">
                        <p style="margin-bottom:10px; color:#e2e8f0; line-height:1.5;">${activeTestRef.context}</p>
                        ${imgHtml}
                    </div>
                    <p style="font-size:1.1rem; margin-bottom:15px; border-left:3px solid #ff00ff; padding-left:10px;">❓ ${activeTestRef.q}</p>
                    <label>Анализ жана Жообуңуз:</label>
                    <textarea id="student-main-input" rows="4" placeholder="Өз оюңузду кенен жазыңыз..."></textarea>
                `;
            } else {
                body.innerHTML = `
                    <p style="font-size:1.1rem; margin-bottom:15px; border-left:3px solid #ff00ff; padding-left:10px;">❓ ${activeTestRef.q}</p>
                    <label>Жообуңуз:</label>
                    <input type="text" id="student-main-input" placeholder="Жоопту кыска жана так жазыңыз">
                `;
            }
        }

        function commitStudentAnswers() {
            const ans = document.getElementById('student-main-input').value.trim();
            if(!ans) return alert("Жооп жазылган жок!");

            let calculatedPercent = 0;
            if(activeTestRef.type === 'standard') {
                if(ans.toLowerCase() === (activeTestRef.a || "").toLowerCase()) {
                    calculatedPercent = 100;
                } else {
                    calculatedPercent = 0;
                }
            } else {
                calculatedPercent = ans.length > 20 ? Math.min(100, ans.length * 2) : 30;
            }

            const payload = {
                name: document.getElementById('s-name').value,
                classNum: document.getElementById('s-class-num').value,
                classLetter: document.getElementById('s-class-let').value,
                testTitle: activeTestRef.title,
                answerText: ans,
                scorePercent: calculatedPercent
            };

            results.push(payload);
            localStorage.setItem('bm_v5_results', JSON.stringify(results));
            localStorage.setItem('results', JSON.stringify(results));
            
            alert(currentLang === 'ky' ? "Жыйынтыгыңыз ийгиликтүү жөнөтүлдү!" : "Ваш результат успешно отправлен!");
            location.reload();
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const queryId = urlParams.get('testid');
            
            if(queryId) {
                switchRole('student');
                document.getElementById('s-testid').value = queryId;
            }
            applyLocalization();
        };
    </script>
</body>
</html>
