<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl.org - Мугалимдин Жеке Кабинети</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --success: #10b981;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #1e293b;
            --hover-bg: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); }
        .user-info { font-size: 14px; color: var(--success); background: rgba(16, 185, 129, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--success); }
        
        .main-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 25px; margin-bottom: 25px; }
        .card-title { font-size: 18px; font-weight: bold; color: var(--primary); margin-top: 0; margin-bottom: 20px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 12px; background-color: var(--bg-color);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); font-size: 14px; box-sizing: border-box;
        }

        .btn { padding: 12px 25px; font-size: 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-add { background-color: var(--primary); color: #000; width: 100%; margin-top: 10px; }
        .btn-save { background-color: var(--success); color: white; width: 100%; font-size: 16px; padding: 15px; margin-top: 20px; }
        .btn-danger { background-color: var(--danger); color: white; padding: 6px 12px; font-size: 13px; border-radius: 4px; border:none; cursor: pointer;}
        .btn-edit { background-color: #f59e0b; color: white; padding: 6px 12px; font-size: 13px; border-radius: 4px; border:none; cursor: pointer;}
        .btn-secondary { background: #1e293b; color: var(--text-main); border: 1px solid var(--border); font-size: 13px; padding: 6px 12px; border-radius: 4px; cursor:pointer;}

        .question-block { background: var(--bg-color); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-top: 15px; }
        .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .option-item { display: flex; align-items: center; gap: 10px; margin-top: 8px; }

        .test-list-item { background: var(--bg-color); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .test-item-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .badge-container { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .badge-code { background: rgba(0, 210, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        
        /* Жыйынтыктар таблицасы */
        .results-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        .results-table th, .results-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        .results-table th { color: var(--text-muted); }
        .grade-5 { color: #10b981; font-weight: bold; }
        .grade-4 { color: #3b82f6; font-weight: bold; }
        .grade-3 { color: #f59e0b; font-weight: bold; }
        .grade-2 { color: #ef4444; font-weight: bold; }

        .type-selector-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .type-btn { background: #1e293b; border: 1px solid var(--border); color: var(--text-muted); padding: 12px; border-radius: 6px; cursor: pointer; text-align: center; font-size: 13px;}
        .type-btn.active { background: rgba(0, 210, 255, 0.1); border-color: var(--primary); color: var(--primary); font-weight: bold; }

        .switch-container { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div class="container">
    <div class="navbar">
        <div class="logo">BiliMal.org</div>
        <div id="authStatusBlock" class="user-info">🔄 Колдонуучу текшерилүүдө...</div>
        <div>
            <a href="#" id="logoutBtn" style="color: var(--danger); text-decoration: none; font-size: 14px; margin-left: 15px; display:none;">Чыгуу 🚪</a>
        </div>
    </div>

    <div class="main-grid">
        
        <div>
            <div class="card">
                <div class="card-title" id="formFormTitle">🛠 Жаңы Тапшырма / Тест Түзүү</div>
                
                <input type="hidden" id="editingTestKey" value="">

                <div class="form-group">
                    <label>Тапшырманын аталышы (Темасы)</label>
                    <input type="text" id="mainTestTitle" placeholder="Мисалы: 10-класс Физика: Омдун мыйзамы">
                </div>

                <div class="form-group">
                    <label>Суроонун форматын тандаңыз:</label>
                    <div class="type-selector-grid">
                        <div class="type-btn active" id="type-simple" onclick="selectType('simple')">📝 Жөнөкөй текст</div>
                        <div class="type-btn" id="type-pisa" onclick="selectType('pisa')">📊 PISA Блогу</div>
                        <div class="type-btn" id="type-essay" onclick="selectType('essay')">🎧 Аудио / Эссе</div>
                    </div>
                    <button class="btn btn-add" id="addBlockBtn">+ Жаңы суроо блогун кошуу</button>
                </div>

                <div style="font-size: 14px; color: var(--text-muted); margin-top: 15px;">
                    Учурдагы суроолор: <strong id="questionCountBadge" style="color: var(--primary);">0</strong>
                </div>

                <div id="testQuestionsContainer"></div>

                <div class="switch-container">
                    <span>🛡️ Anti-Cheat V4 Кошуу</span>
                    <label class="switch">
                        <input type="checkbox" id="antiCheatToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <button class="btn btn-save" id="saveTestBtn">💾 Тестти маалымат базасына сактоо</button>
                <button class="btn btn-secondary" id="cancelEditBtn" style="width:100%; margin-top:10px; display:none;">❌ Түзөтүүнү жокко чыгаруу</button>
            </div>
        </div>

        <div>
            <div class="card">
                <div class="card-title">📋 Сиздин Активдүү Тесттериңиз</div>
                <div id="activeTestsList">
                    <div style="color: var(--text-muted); font-size: 14px; text-align: center; padding: 20px;">Сураныч, адегенде системага кириңиз...</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">📊 Жыйынтыктар & Мониторинг (Баалоо)</div>
                <div id="resultsMonitorContainer">
                    <div style="color: var(--text-muted); font-size: 14px; text-align: center; padding: 10px;">Жыйынтыктар жүктөлүүдө...</div>
                </div>
            </div>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
        authDomain: "bilimal-org.firebaseapp.com",
        databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bilimal-org",
        storageBucket: "bilimal-org.appspot.com",
        messagingSenderId: "241750360816",
        appId: "1:241750360816:web:6cb1f92e9e8f6bf7ad0f8a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentTeacherUid = null;
    let selectedQuestionType = 'simple';

    const testQuestionsContainer = document.getElementById("testQuestionsContainer");
    const questionCountBadge = document.getElementById("questionCountBadge");
    const activeTestsList = document.getElementById("activeTestsList");
    const resultsMonitorContainer = document.getElementById("resultsMonitorContainer");
    const saveTestBtn = document.getElementById("saveTestBtn");
    const editingTestKey = document.getElementById("editingTestKey");

    // Түр тандалгандагы визуалдык эффект
    window.selectType = function(type) {
        selectedQuestionType = type;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`type-${type}`).classList.add('active');
    }

    // 1. АВТОРИЗАЦИЯНЫ ТЕКШЕРҮҮ (Ар бир мугалим өзүнүкүн көрөт)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentTeacherUid = user.uid;
            document.getElementById("authStatusBlock").innerText = `👨‍🏫 Мугалим: ${user.email}`;
            document.getElementById("logoutBtn").style.display = "inline";
            
            // Базадан ушул мугалимдин маалыматын гана угуу
            loadTeacherTests();
            loadStudentResults();
        } else {
            // Эгер логин боло элек болсо, авторизация барагына багыттоо керек
            document.getElementById("authStatusBlock").innerText = "⚠️ Сиз кирген жоксуз!";
            activeTestsList.innerHTML = "<div style='color:var(--danger); text-align:center;'>Сураныч, катталып кириңиз!</div>";
            // window.location.href = "login.html"; // Логин барагыңыз бар болсо ачыңыз
        }
    });

    // Чыгуу функциясы
    document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

    // 2. СУРОО БЛОКТОРУН ТҮЗҮҮ
    document.getElementById("addBlockBtn").addEventListener("click", () => {
        addQuestionBlock({}, selectedQuestionType);
    });

    function addQuestionBlock(data = {}, type = 'simple') {
        const qId = data.id || Date.now();
        const qBlock = document.createElement("div");
        qBlock.className = "question-block";
        qBlock.id = `q-${qId}`;
        qBlock.setAttribute("data-type", type);

        let innerHTML = "";
        if (type === "simple") {
            const opts = data.options || [ {text:'', isCorrect:false}, {text:'', isCorrect:false}, {text:'', isCorrect:false}, {text:'', isCorrect:false} ];
            innerHTML = `
                <div class="block-header"><strong>📝 Жөнөкөй Суроо</strong> <button class="btn-danger" style="padding:2px 8px;" onclick="document.getElementById('q-${qId}').remove(); updateCount();">X</button></div>
                <input type="text" class="q-text" value="${data.question || ''}" placeholder="Суроону жазыңыз..." style="margin-bottom:10px;">
                ${opts.map((o, i) => `
                    <div class="option-item">
                        <input type="radio" name="radio-${qId}" ${o.isCorrect ? 'checked' : ''}> 
                        <input type="text" class="opt-text" value="${o.text || ''}" placeholder="${String.fromCharCode(65+i)} варианты...">
                    </div>
                `).join('')}
            `;
        } else if (type === "pisa") {
            innerHTML = `
                <div class="block-header"><strong>📊 PISA Блогу</strong> <button class="btn-danger" style="padding:2px 8px;" onclick="document.getElementById('q-${qId}').remove(); updateCount();">X</button></div>
                <textarea class="pisa-context" placeholder="Окуя / Контекст тексти..." style="margin-bottom:10px; height:80px;">${data.context || ''}</textarea>
                <input type="text" class="pisa-question" value="${data.question || ''}" placeholder="Бул текстке тиешелүү суроо..." style="margin-bottom:10px;">
                <input type="text" class="pisa-criteria" value="${data.criteria || ''}" placeholder="Баалоо критерийи (Мугалим үчүн)...">
            `;
        } else if (type === "essay") {
            innerHTML = `
                <div class="block-header"><strong>🎧 Аудио-Диктант / Эссе</strong> <button class="btn-danger" style="padding:2px 8px;" onclick="document.getElementById('q-${qId}').remove(); updateCount();">X</button></div>
                <input type="text" class="essay-topic" value="${data.topic || ''}" placeholder="Эссенин темасы же тапшырма шарты..." style="margin-bottom:10px;">
                <input type="text" class="essay-link" value="${data.audioLink || ''}" placeholder="Аудио шилтеме (же файл URL)..." style="margin-bottom:10px;">
                <input type="number" class="essay-min" value="${data.minWords || ''}" placeholder="Минималдуу сөз саны (чектөө)" style="width:200px;">
            `;
        }

        qBlock.innerHTML = innerHTML;
        testQuestionsContainer.appendChild(qBlock);
        updateCount();
    }

    window.updateCount = function() {
        questionCountBadge.innerText = document.querySelectorAll(".question-block").length;
    };

    // 3. САКТОО ЖАНА ӨЗГӨРТҮҮ (МУГАЛИМДИН UID ИЧИНЕ ЖАЗУУ)
    saveTestBtn.addEventListener("click", async () => {
        if (!currentTeacherUid) return;
        const testTitle = document.getElementById("mainTestTitle").value.trim();
        const antiCheatActive = document.getElementById("antiCheatToggle").checked;
        const blocks = document.querySelectorAll(".question-block");

        if (!testTitle) { alert("⚠️ Сураныч, Тесттин темасын жазыңыз!"); return; }
        if (blocks.length === 0) { alert("⚠️ Кеминде 1 суроо кошуңуз!"); return; }

        const preparedQuestions = [];
        blocks.forEach(block => {
            const type = block.getAttribute("data-type");
            let data = { type: type };

            if (type === "simple") {
                data.question = block.querySelector(".q-text").value;
                data.options = [];
                const txts = block.querySelectorAll(".opt-text");
                const rds = block.querySelectorAll("input[type='radio']");
                txts.forEach((t, i) => {
                    data.options.push({ text: t.value, isCorrect: rds[i].checked });
                });
            } else if (type === "pisa") {
                data.context = block.querySelector(".pisa-context").value;
                data.question = block.querySelector(".pisa-question").value;
                data.criteria = block.querySelector(".pisa-criteria").value;
            } else if (type === "essay") {
                data.topic = block.querySelector(".essay-topic").value;
                data.audioLink = block.querySelector(".essay-link").value;
                data.minWords = block.querySelector(".essay-min").value;
            }
            preparedQuestions.push(data);
        });

        saveTestBtn.disabled = true;
        
        let isEdit = editingTestKey.value !== "";
        let testKey = isEdit ? editingTestKey.value : push(ref(db, `teachers_data/${currentTeacherUid}/tests`)).key;
        let testCode = isEdit ? document.getElementById(`code-${testKey}`).innerText : "TEST-" + Math.floor(1000 + Math.random() * 9000);

        try {
            // Мугалимдин жеке папкасына сактоо
            await set(ref(db, `teachers_data/${currentTeacherUid}/tests/${testKey}`), {
                test_code: testCode,
                title: testTitle,
                anti_cheat: antiCheatActive,
                questions: preparedQuestions,
                created_at: Date.now()
            });

            // Окуучулар издей турган глобалдык издөө түйүнүн жаңыртуу
            await set(ref(db, `global_test_lookup/${testCode}`), {
                teacher_uid: currentTeacherUid,
                test_id: testKey
            });

            alert(isEdit ? "✅ Тест ийгиликтүү өзгөртүлдү!" : `✅ Жаңы тест базага кошулду! Коду: ${testCode}`);
            resetForm();
        } catch (e) {
            alert("Ката чыкты: " + e.message);
        } finally {
            saveTestBtn.disabled = false;
        }
    });

    // Түзөтүүнү жокко чыгаруу
    document.getElementById("cancelEditBtn").addEventListener("click", resetForm);

    function resetForm() {
        document.getElementById("mainTestTitle").value = "";
        testQuestionsContainer.innerHTML = "";
        editingTestKey.value = "";
        document.getElementById("formFormTitle").innerText = "🛠 Жаңы Тапшырма / Тест Түзүү";
        document.getElementById("cancelEditBtn").style.display = "none";
        updateCount();
    }

    // 4. ТЕСТТЕРДИН ТИЗМЕСИН ГЕНЕРАЦИЯЛОО ЖАНА РЕДАКЦИЯЛОО
    function loadTeacherTests() {
        const myTestsRef = ref(db, `teachers_data/${currentTeacherUid}/tests`);
        onValue(myTestsRef, (snapshot) => {
            activeTestsList.innerHTML = "";
            if (!snapshot.exists()) {
                activeTestsList.innerHTML = "<div style='color:var(--text-muted); text-align:center;'>Сизде азырынча тесттер жок.</div>";
                return;
            }

            snapshot.forEach((child) => {
                const key = child.key;
                const test = child.val();
                const item = document.createElement("div");
                item.className = "test-list-item";
                item.innerHTML = `
                    <div class="test-item-title">${test.title}</div>
                    <div class="badge-container">
                        <span class="badge badge-code">Код: <span id="code-${key}">${test.test_code}</span></span>
                        <span class="badge" style="background:#334155;">Суроолор: ${test.questions ? test.questions.length : 0}</span>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-edit" onclick="editTest('${key}')">✏️ Өзгөртүү</button>
                        <button class="btn-danger" style="padding:4px 10px;" onclick="deleteTest('${key}', '${test.test_code}')">🗑️ Өчүрүү</button>
                    </div>
                `;
                activeTestsList.appendChild(item);
            });
        });
    }

    // ТЕСТТИ КАЙРА РЕДАКЦИЯЛООГО АЛЫП КЕЛҮҮ ФУНКЦИЯСЫ
    window.editTest = function(key) {
        const testRef = ref(db, `teachers_data/${currentTeacherUid}/tests/${key}`);
        onValue(testRef, (snapshot) => {
            const test = snapshot.val();
            if (!test) return;

            document.getElementById("mainTestTitle").value = test.title;
            document.getElementById("antiCheatToggle").checked = test.anti_cheat;
            editingTestKey.value = key;

            document.getElementById("formFormTitle").innerText = "✏️ Тестти Өзгөртүү режими";
            document.getElementById("cancelEditBtn").style.display = "block";

            testQuestionsContainer.innerHTML = "";
            if(test.questions) {
                test.questions.forEach((q, index) => {
                    addQuestionBlock({...q, id: index}, q.type);
                });
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }, { onlyOnce: true });
    };

    // Тестти өчүрүү
    window.deleteTest = async function(key, code) {
        if(confirm("Бул тестти жана анын кодун өчүрүүнү каалайсызбы?")) {
            await remove(ref(db, `teachers_data/${currentTeacherUid}/tests/${key}`));
            await remove(ref(db, `global_test_lookup/${code}`));
        }
    }

    // 5. ОКУУЧУЛАРДЫН ЖЫЙЫНТЫКТАРЫН РЕАЛДЫК УБАГЫНДА МОНИТОРИНГ КЫЛУУ
    function loadStudentResults() {
        const resultsRef = ref(db, `teachers_data/${currentTeacherUid}/results`);
        onValue(resultsRef, (snapshot) => {
            if (!snapshot.exists()) {
                resultsMonitorContainer.innerHTML = "<div style='color:var(--text-muted); text-align:center; padding:15px;'>Окуучулардан азырынча жооп түшө элек.</div>";
                return;
            }

            let tableHTML = `
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Окуучу</th>
                            <th>Класс</th>
                            <th>Тест коду</th>
                            <th>Балл</th>
                            <th>Баа</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            snapshot.forEach((child) => {
                const res = child.val();
                tableHTML += `
                    <tr>
                        <td><strong>${res.student_name}</strong></td>
                        <td>${res.class}</td>
                        <td><span style="color:var(--primary)">${res.test_code}</span></td>
                        <td>${res.score}/${res.max_score}</td>
                        <td><span class="grade-${res.grade}">${res.grade}</span></td>
                    </tr>
                `;
            });

            tableHTML += `</tbody></table>`;
            resultsMonitorContainer.innerHTML = tableHTML;
        });
    }

</script>

</body>
</html>
