<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl - Мугалимдин Панели</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --success: #10b981;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); text-decoration: none; }
        .main-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .title { color: var(--primary); font-size: 20px; font-weight: bold; margin-top: 0; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 12px; background-color: var(--bg-color);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); font-size: 14px; box-sizing: border-box;
        }
        
        /* Баскычтардын стили сүрөттөгүдөй */
        .btn { padding: 12px 20px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background-color: var(--primary); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline.active { background: var(--primary); color: #000; }
        .btn-success { background-color: var(--success); color: white; width: 100%; margin-top: 15px; font-size: 16px; padding: 15px; }
        .btn-edit { background-color: #eab308; color: #000; padding: 8px 14px; font-size: 13px; border-radius: 6px; }
        .btn-delete { background-color: var(--danger); color: white; padding: 8px 14px; font-size: 13px; border-radius: 6px; }
        .btn-copy { background-color: #3b82f6; color: white; padding: 8px 14px; font-size: 13px; border-radius: 6px; }

        .test-item { background: #0f1422; border: 1px solid var(--border); padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        .test-meta-tags { display: flex; gap: 8px; margin-top: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tag { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .tag-code { background: rgba(0, 210, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 210, 255, 0.2); }
        .tag-type { background: rgba(241, 245, 249, 0.05); color: #cbd5e1; }
        .tag-count { background: rgba(241, 245, 249, 0.05); color: #cbd5e1; }

        .q-editor-block { border: 1px solid var(--border); border-left: 4px solid var(--primary); padding: 20px; margin-top: 20px; background: rgba(255,255,255,0.01); border-radius: 6px; position: relative; }
        .remove-q-btn { position: absolute; top: 15px; right: 15px; background: var(--danger); color: white; border: none; border-radius: 4px; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        
        .switch-group { display: flex; align-items: center; gap: 12px; margin-top: 5px; }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; min-width: 46px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

<div class="header">
    <a href="#" class="logo">BilimAl.org</a>
    <div style="background: rgba(0,210,255,0.1); padding: 8px 15px; border-radius: 20px; font-size: 14px; border: 1px solid var(--primary);">
        👤 Мугалим: <span id="teacherEmail">Текшерилүүдө...</span>
    </div>
</div>

<div class="main-layout">
    <div>
        <div class="card">
            <div class="title" id="editorModeTitle"><i class="fa-solid fa-pen-to-square"></i> Тез Түзүү режими</div>
            
            <div class="form-group">
                <label>Тапшырманын аталышы (Темасы):</label>
                <input type="text" id="testTitle" placeholder="Мисалы: 10-класс Механика ЖӨНӨКӨЙ ТЕСТ">
            </div>

            <div class="form-group">
                <label>Суроонун форматын тандаңыз:</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <button class="btn btn-outline active" id="btnTypeSimple" onclick="setQuestionType('simple')">📋 Жөнөкөй текст</button>
                    <button class="btn btn-outline" id="btnTypePisa" onclick="setQuestionType('pisa')">🗺️ PISA Блогу</button>
                    <button class="btn btn-outline" id="btnTypeEssay" onclick="setQuestionType('essay')">🎧 Audio / Эссе</button>
                </div>
            </div>

            <div id="questionsBuilderArea"></div>

            <button class="btn btn-primary" onclick="addQuestionBlock()" style="margin-top: 20px; background:transparent; border:1px dashed var(--primary); color:var(--primary); width:100%;">
                <i class="fa-solid fa-plus"></i> Жаңы суроо блогун кошуу
            </button>

            <div style="margin-top: 30px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 20px; border-radius: 8px;" id="extraRulesBlock">
                <h4 style="color: var(--primary); margin-top:0; margin-bottom:20px;"><i class="fa-solid fa-sliders"></i> Тесттин кошумча эрежелери</h4>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <label>Тапшыруунун чектөөсү:</label>
                        <select id="testAttemptsLimit">
                            <option value="unlimited" selected>Чектөөсүз (Каалаганча)</option>
                            <option value="1">1 жолу гана</option>
                            <option value="2">2 жолу</option>
                            <option value="3">3 жолу</option>
                        </select>
                    </div>
                    <div>
                        <label>Тесттин убактысы (Мүнөт):</label>
                        <input type="number" id="testDuration" placeholder="Чектөөсүз болсо бош калтырыңыз">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <label>Башталуу мөөнөтү (Дата/Убакыт):</label>
                        <input type="datetime-local" id="testStartTime">
                    </div>
                    <div>
                        <label>Аяктоо мөөнөтү (Дата/Убакыт):</label>
                        <input type="datetime-local" id="testEndTime">
                    </div>
                </div>

                <div class="switch-group">
                    <label class="switch">
                        <input type="checkbox" id="antiCheatToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span style="font-size:14px; color: var(--text-main);">Anti-Cheat Күйгүзүү (Башка терезеге өтүүнү бөгөттөө)</span>
                </div>
            </div>

            <button class="btn btn-success" id="saveTestBtn" onclick="saveTest()"><i class="fa-solid fa-floppy-disk"></i> Тестти сактоо жана кодун чыгаруу</button>
        </div>
    </div>

    <div>
        <div class="card">
            <div class="title"><i class="fa-solid fa-list-check"></i> Сиздин Активдүү Тесттериңиз</div>
            <div id="activeTestsList">Колдонуучу такталууда...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
        authDomain: "bilimal-org.firebaseapp.com",
        databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bilimal-org",
        storageBucket: "bilimal-org.appspot.com",
        messagingSenderId: "241750360816",
        appId: "1:241750360816:web:6cb1f92e9e8f6bf7ad0f8a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let teacherUid = null; 

    // КИРГЕН КОЛДОНУУЧУНУ ТЕКШЕРҮҮ ЖАНА ЖҮКТӨӨ
    onAuthStateChanged(auth, (user) => {
        if (user) {
            teacherUid = user.uid;
            document.getElementById("teacherEmail").innerText = user.email;
            loadActiveTests(); 
        } else {
            window.location.href = "../login.html"; 
        }
    });

    let currentSelectedType = "simple";
    let questionsArray = [];
    let editingTestId = null;

    window.setQuestionType = function(type) {
        currentSelectedType = type;
        
        document.getElementById("btnTypeSimple").classList.remove("active");
        document.getElementById("btnTypePisa").classList.remove("active");
        document.getElementById("btnTypeEssay").classList.remove("active");

        if(type === 'simple') document.getElementById("btnTypeSimple").classList.add("active");
        if(type === 'pisa') document.getElementById("btnTypePisa").classList.add("active");
        if(type === 'essay') document.getElementById("btnTypeEssay").classList.add("active");

        addQuestionBlock();
    }

    window.addQuestionBlock = function() {
        const area = document.getElementById("questionsBuilderArea");
        const qIndex = questionsArray.length;

        const qBlock = document.createElement("div");
        qBlock.className = "q-editor-block";
        qBlock.id = `q-block-${qIndex}`;
        qBlock.setAttribute("data-type", currentSelectedType);

        let innerHTML = `<button class="remove-q-btn" onclick="removeQuestionData(${qIndex})">✖</button>
                         <div style="margin-bottom:12px;"><strong>Суроо №${qIndex+1} (<span style="color:var(--primary);">${currentSelectedType.toUpperCase()}</span>)</strong></div>`;

        if (currentSelectedType === "simple") {
            innerHTML += `
                <input type="text" placeholder="Суроону жазыңыз" class="q-text" style="margin-bottom:10px;">
                <input type="number" placeholder="Балл (мисалы: 1)" class="q-points" value="1" style="margin-bottom:10px; width:120px;">
                <div class="options-area">
                    <input type="text" placeholder="А варианты" class="opt-text" style="margin-bottom:5px;">
                    <input type="text" placeholder="Б варианты" class="opt-text" style="margin-bottom:5px;">
                    <input type="text" placeholder="В варианты" class="opt-text" style="margin-bottom:5px;">
                    <input type="text" placeholder="Г варианты" class="opt-text" style="margin-bottom:5px;">
                    <input type="number" placeholder="Туура варианттын индекси (1-А, 2-Б, 3-В, 4-Г)" class="opt-correct" style="width:100%;">
                </div>
            `;
        } else if (currentSelectedType === "pisa") {
            innerHTML += `
                <textarea placeholder="Контекст (Окуя же текстти ушул жерге жазыңыз)" class="q-context" rows="4" style="margin-bottom:10px;"></textarea>
                <input type="text" placeholder="Суроону жазыңыз (Ачык суроо)" class="q-text" style="margin-bottom:10px;">
                <input type="number" placeholder="Максималдуу балл (мисалы: 30)" class="q-points" value="30" style="width:100%;">
            `;
        } else if (currentSelectedType === "essay") {
            innerHTML += `
                <input type="text" placeholder="Эссенин темасы же Диктанттын аталышы" class="q-topic" style="margin-bottom:10px;">
                <input type="text" placeholder="Аудио шилтемеси (Каалоочулар үчүн мп3 шилтеме)" class="q-audio" style="margin-bottom:10px;">
                <input type="number" placeholder="Минималдуу сөз саны (Мисалы: 50)" class="q-minwords" value="50" style="width:100%;">
                <input type="hidden" class="q-points" value="100">
            `;
        }

        qBlock.innerHTML = innerHTML;
        area.appendChild(qBlock);
        questionsArray.push({ type: currentSelectedType });
    }

    window.removeQuestionData = function(idx) {
        const target = document.getElementById(`q-block-${idx}`);
        if(target) target.remove();
        questionsArray[idx] = null;
    }

    // 💾 ТЕСТТИ САКТОО (ЖАҢЫ ЖАНА ӨЗГӨРТҮҮ)
    window.saveTest = async function() {
        if (!teacherUid) { alert("Ката: Мугалимдин профили аныктала элек!"); return; }
        const title = document.getElementById("testTitle").value.trim();
        if (!title) { alert("Тесттин темасын жазыңыз!"); return; }

        const finalQuestions = [];
        const blocks = document.querySelectorAll(".q-editor-block");

        blocks.forEach((b) => {
            const type = b.getAttribute("data-type");
            let qData = { type: type };

            if (type === "simple") {
                qData.question = b.querySelector(".q-text").value;
                qData.points = parseInt(b.querySelector(".q-points").value) || 1;
                qData.options = [];
                const opts = b.querySelectorAll(".opt-text");
                const correctInput = b.querySelector(".opt-correct").value;
                const correctIdx = correctInput ? parseInt(correctInput) - 1 : 0;
                
                opts.forEach((opt, oIdx) => {
                    qData.options.push({ text: opt.value, isCorrect: oIdx === correctIdx });
                });
            } else if (type === "pisa") {
                qData.context = b.querySelector(".q-context").value;
                qData.question = b.querySelector(".q-text").value;
                qData.points = parseInt(b.querySelector(".q-points").value) || 30;
            } else if (type === "essay") {
                qData.topic = b.querySelector(".q-topic").value;
                qData.audioLink = b.querySelector(".q-audio").value;
                qData.minWords = parseInt(b.querySelector(".q-minwords").value) || 50;
                qData.points = 100;
            }
            finalQuestions.push(qData);
        });

        if (finalQuestions.length === 0) { alert("Эч кандай суроо түзүлгөн жок!"); return; }

        const attemptsLimit = document.getElementById("testAttemptsLimit").value;
        const duration = document.getElementById("testDuration").value ? parseInt(document.getElementById("testDuration").value) : "unlimited";
        const startTime = document.getElementById("testStartTime").value || "";
        const endTime = document.getElementById("testEndTime").value || "";
        const antiCheat = document.getElementById("antiCheatToggle").checked;

        let testId = editingTestId;
        let testCode = "";

        if (!testId) {
            // Жаңы түзүлүп жатса
            testId = "TEST-" + Date.now();
            testCode = "TEST-" + Math.floor(1000 + Math.random() * 9000);
        } else {
            // Эски тест өзгөртүлүп жатса, мурунку кодун сактап калабыз
            const oldSnap = await get(ref(db, `teachers_data/${teacherUid}/tests/${testId}`));
            if (oldSnap.exists() && oldSnap.val().code) {
                testCode = oldSnap.val().code;
            } else {
                testCode = "TEST-" + Math.floor(1000 + Math.random() * 9000);
            }
        }

        const testPayload = {
            id: testId,
            code: testCode,
            title: title,
            type: finalQuestions.some(q => q.type !== 'simple') ? 'PISA' : 'SIMPLE',
            anti_cheat: antiCheat,
            attempts_limit: attemptsLimit,
            duration_minutes: duration,
            start_time: startTime,
            end_time: endTime,
            questions: finalQuestions
        };

        // Базага жазуу
        await set(ref(db, `teachers_data/${teacherUid}/tests/${testId}`), testPayload);
        await set(ref(db, `global_test_lookup/${testCode}`), {
            teacher_uid: teacherUid,
            test_id: testId
        });

        alert(`Тест ийгиликтүү сакталды! Окуучулар үчүн код: ${testCode}`);
        resetForm();
        loadActiveTests();
    }

    function resetForm() {
        document.getElementById("testTitle").value = "";
        document.getElementById("questionsBuilderArea").innerHTML = "";
        document.getElementById("testDuration").value = "";
        document.getElementById("testStartTime").value = "";
        document.getElementById("testEndTime").value = "";
        document.getElementById("testAttemptsLimit").value = "unlimited";
        questionsArray = [];
        editingTestId = null;
        document.getElementById("editorModeTitle").innerHTML = `<i class="fa-solid fa-pen-to-square"></i> Тез Түзүү режими`;
    }

    // 📋 СҮРӨТТӨГҮДӨЙ СУЛУУ ЖАНА ИШЕНИМДҮҮ ТИЗМӨЛӨӨ ФУНКЦИЯСЫ
    async function loadActiveTests() {
        if (!teacherUid) return;
        const listContainer = document.getElementById("activeTestsList");
        listContainer.innerHTML = "Жүктөлүүдө...";

        const snapshot = await get(ref(db, `teachers_data/${teacherUid}/tests`));
        if (!snapshot.exists()) {
            listContainer.innerHTML = "<div style='color:var(--text-muted); padding:10px;'>Активдүү тесттер табылган жок.</div>";
            return;
        }

        listContainer.innerHTML = "";
        snapshot.forEach((child) => {
            const test = child.val();
            // Эгер базада code же id талаасы жок болсо, түздөн-түз түйүндүн ачкычын колдонобуз (Ишенимдүү өчүрүү үчүн)
            const actualId = child.key; 
            const actualCode = test.code || "Жок";
            const actualType = test.type || "SIMPLE";
            const qCount = test.questions ? test.questions.length : 0;

            const div = document.createElement("div");
            div.className = "test-item";
            div.innerHTML = `
                <div>
                    <strong style="color:#fff; font-size:16px;">${test.title}</strong>
                    <div class="test-meta-tags">
                        <span class="tag tag-code">Код: ${actualCode}</span>
                        <span class="tag tag-type">Түрү: ${actualType}</span>
                        <span class="tag tag-count">Суроолор: ${qCount}</span>
                    </div>
                </div>
                <div style="display:flex; gap:10px; flex-wrap: wrap;">
                    <button class="btn btn-copy" onclick="copyLink('${actualCode}')"><i class="fa-solid fa-link"></i> Ссылканы көчүрүү</button>
                    <button class="btn btn-edit" onclick="editTest('${actualId}')"><i class="fa-solid fa-pen"></i> Өзгөртүү</button>
                    <button class="btn btn-delete" onclick="deleteTest('${actualId}', '${actualCode}')"><i class="fa-solid fa-trash-can"></i> Өчүрүү</button>
                </div>
            `;
            listContainer.appendChild(div);
        });
    }

    // 🔗 ШИЛТЕМЕНИ КОПИЯЛОО
    window.copyLink = function(code) {
        if(code === "Жок") { alert("Бул тесттин коду жок!"); return; }
        const testUrl = `${window.location.origin}/take-test.html?code=${code}`;
        navigator.clipboard.writeText(testUrl).then(() => {
            alert("Тестке шилтеме көчүрүлдү!");
        }).catch(err => {
            alert("Көчүрүүдө ката кетти: " + err);
        });
    }

    // ✏️ ӨЗГӨРТҮҮ РЕЖИМИНЕ КИРГИЗҮҮ ФУНКЦИЯСЫ
    window.editTest = async function(id) {
        resetForm();
        editingTestId = id;
        document.getElementById("editorModeTitle").innerHTML = `<i class="fa-solid fa-edit"></i> Тестти Өзгөртүү режими`;

        const snap = await get(ref(db, `teachers_data/${teacherUid}/tests/${id}`));
        if(snap.exists()) {
            const test = snap.val();
            document.getElementById("testTitle").value = test.title || "";
            document.getElementById("testAttemptsLimit").value = test.attempts_limit || "unlimited";
            document.getElementById("testDuration").value = test.duration_minutes && test.duration_minutes !== "unlimited" ? test.duration_minutes : "";
            document.getElementById("testStartTime").value = test.start_time || "";
            document.getElementById("testEndTime").value = test.end_time || "";
            document.getElementById("antiCheatToggle").checked = test.anti_cheat !== undefined ? test.anti_cheat : true;

            if (test.questions) {
                test.questions.forEach(q => {
                    currentSelectedType = q.type || "simple";
                    addQuestionBlock();
                    const lastBlock = document.querySelector("#questionsBuilderArea .q-editor-block:last-child");
                    
                    if (currentSelectedType === "simple") {
                        lastBlock.querySelector(".q-text").value = q.question || "";
                        lastBlock.querySelector(".q-points").value = q.points || 1;
                        const optsInputs = lastBlock.querySelectorAll(".opt-text");
                        if (q.options) {
                            q.options.forEach((opt, oIdx) => {
                                if(optsInputs[oIdx]) optsInputs[oIdx].value = opt.text || "";
                                if(opt.isCorrect) lastBlock.querySelector(".opt-correct").value = oIdx + 1;
                            });
                        }
                    } else if (currentSelectedType === "pisa") {
                        lastBlock.querySelector(".q-context").value = q.context || "";
                        lastBlock.querySelector(".q-text").value = q.question || "";
                        lastBlock.querySelector(".q-points").value = q.points || 30;
                    } else if (currentSelectedType === "essay") {
                        lastBlock.querySelector(".q-topic").value = q.topic || "";
                        lastBlock.querySelector(".q-audio").value = q.audioLink || "";
                        lastBlock.querySelector(".q-minwords").value = q.minWords || 50;
                    }
                });
            }
            // Формага автоматтык түрдө жылдыруу (scrolling)
            document.getElementById("testTitle").scrollIntoView({ behavior: 'smooth' });
        }
    }

    // 🗑️ ТЕСТТИ БАЗАДАН ТАТЫКТУУ ӨЧҮРҮҮ
    window.deleteTest = async function(id, code) {
        if(confirm("Бул тестти биротоло өчүрүүнү каалайсызбы? Баардык суроолор жана окуучулардын жыйынтыктары кошо өчөт!")) {
            try {
                // 1. Мугалимдин папкасынан өчүрүү
                await remove(ref(db, `teachers_data/${teacherUid}/tests/${id}`));
                
                // 2. Глобалдык издөө тутумунан кодун тазалоо
                if(code && code !== "Жок") {
                    await remove(ref(db, `global_test_lookup/${code}`));
                }
                
                alert("Тест ийгиликтүү өчүрүлдү!");
                if(editingTestId === id) resetForm();
                loadActiveTests();
            } catch (error) {
                alert("Өчүрүүдө ката келип чыкты: " + error.message);
            }
        }
    }
</script>
</body>
