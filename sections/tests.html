    <style>
        /* Жаңы тест түзүү үчүн кошумча модалдык терезенин стилдери */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 9, 20, 0.85);
            backdrop-filter: blur(10px);
            z-index: 200;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #0d1224;
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 20px;
            padding: 30px;
            width: 100%; max-width: 500px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .modal-header h2 { font-size: 20px; color: #00f2fe; }
        .close-modal { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: rgba(255,255,255,0.7); }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: #00f2fe; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-cancel { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 12px 20px; border-radius: 10px; cursor: pointer; }
        .btn-save { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; color: #060914; padding: 12px 25px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .action-btn { background: none; border: none; color: #00f2fe; cursor: pointer; margin-right: 10px; font-size: 14px; }
        .action-btn.delete { color: #ff4a4a; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .status-badge.active { background: rgba(0, 255, 163, 0.15); color: #00ffa3; }
        .status-badge.draft { background: rgba(255, 168, 0, 0.15); color: #ffa800; }
    </style>
</head>
<body>

        <i class="fas fa-bars"></i>
    </button>

    <!-- Туруктуу Сол меню (Sidebar) -->

        <div class="sidebar-logo">

                <span>Башкаруу панели</span>

        </nav>

    <!-- Негизги контент мейкиндиги -->
    <main class="main-content">
        
        <!-- Издөө талаасы жана Түзүү баскычы -->
        <header class="top-bar">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="testSearchInput" placeholder="Тесттерди издөө...">
            </div>
            <!-- 4-БАШКЫЧ: Жаңы Тест Түзүү баскычы -->
            <button class="btn-create-test" id="createNewTestBtn">
                <i class="fas fa-plus"></i>
                <span>Жаңы Тест Түзүү</span>
            </button>
        </header>

        <!-- Статистика панелдери -->
        <section class="stats-container">
            <div class="stat-card">
                <h3>Жалпы Тесттер</h3>
                <div class="stat-number cyan-glow" id="totalTestsCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Активдүү окуучулар</h3>
                <div class="stat-number green-glow" id="activeStudentsCount">0</div>
            </div>
        </section>

        <!-- Тесттердин таблицасы камтылган негизги блок -->
        <section class="tests-section-panel">
            <div class="panel-header">
                <h2>Менин тесттерим</h2>
                <div class="filters-container">
                    <select id="subjectFilter" class="custom-select">
                        <option value="all">Бардык предметтер</option>
                        <option value="physics">Физика</option>
                        <option value="astronomy">Астрономия</option>
                    </select>
                    <select id="statusFilter" class="custom-select">
                        <option value="all">Бардык статустар</option>
                        <option value="active">Активдүү</option>
                        <option value="draft">Черновик</option>
                    </select>
                </div>
            </div>

            <!-- Таблица -->
            <div class="responsive-table-wrapper">
                <table class="cyber-table" id="myTestsTable">
                    <thead>
                        <tr>
                            <th>Аталышы</th>
                            <th>Предмет / Класс</th>
                            <th>Суроолор</th>
                            <th>Убакыт</th>
                            <th>Статус</th>
                            <th>Аракеттер</th>
                        </tr>
                    </thead>
                    <tbody id="testsTableBody">
                        <!-- Маалыматтар динамикалык түрдө JavaScript аркылуу жүктөлөт -->
                    </tbody>
                </table>
                <!-- Маалымат жок кездеги билдирүү -->
                <div class="no-data-message" id="noDataMessage">
                    Тесттер табылган жок. Жаңы тест түзүңүз!
                </div>
            </div>
        </section>

        <!-- Жарнама бөлүмү -->
        <footer class="footer-ad-section">
            <div class="ad-title">Жарнамалык байланыш борбору</div>
            <div class="ad-flex-container">
                <!-- Google AdSense -->

                    <ins class="adsbygoogle"

                         data-ad-format="auto"

                </div>

                </div>

    <!-- Жаңы Тест Түзүү Модалдык Терезеси (Modal) -->
    <div class="modal" id="createTestModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Жаңы Тест Кошуу</h2>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <form id="createTestForm">
                <div class="form-group">
                    <label for="testTitle">Тесттин аталышы</label>
                    <input type="text" id="testTitle" placeholder="Мисалы: Ньютондун мыйзамдары" required>
                </div>
                <div class="form-group">
                    <label for="testSubject">Предметти тандаңыз</label>
                    <select id="testSubject" required>
                        <option value="physics">Физика</option>
                        <option value="astronomy">Астрономия</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="testClass">Класс</label>
                    <input type="text" id="testClass" placeholder="Мисалы: 9-класс" required>
                </div>
                <div class="form-group">
                    <label for="testDuration">Убактысы (мүнөт менен)</label>
                    <input type="number" id="testDuration" placeholder="Мисалы: 45" required>
                </div>
                <div class="form-group">
                    <label for="testStatus">Статус</label>
                    <select id="testStatus">
                        <option value="active">Активдүү</option>
                        <option value="draft">Черновик</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="cancelModalBtn">Жокко чыгаруу</button>
                    <button type="submit" class="btn-save">Сактоо</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Adsterra Social Bar Скрипти -->
    <script src="https://pl30202824.effectivecpmnetwork.com/2a/5b/af/2a5bafdd419add82a1af8ec0def99355.js" async></script>

    <!-- Firebase SDK жана Логикалар (Модулдук Скрипт) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Конфигурациясы
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            messagingSenderId: "241750360816",
            appId: "1:241750360816:web:a991434eb5afbc470d7835",
            measurementId: "G-9GSQV60QV0"
        };

        // Ишке киргизүү
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const database = getDatabase(app);

        // Маалыматтарды сактоо үчүн массив
        let allTests = [];

        // Элементтерди алуу
        const testsTableBody = document.getElementById('testsTableBody');
        const noDataMessage = document.getElementById('noDataMessage');
        const totalTestsCount = document.getElementById('totalTestsCount');
        const activeStudentsCount = document.getElementById('activeStudentsCount');
        
        const testSearchInput = document.getElementById('testSearchInput');
        const subjectFilter = document.getElementById('subjectFilter');
        const statusFilter = document.getElementById('statusFilter');

        // --- ФУНКЦИЯ: Таблицаны жаңыртуу жана Чыпкалоо ---
        function renderTable() {
            const searchText = testSearchInput.value.toLowerCase();
            const subjectVal = subjectFilter.value;
            const statusVal = statusFilter.value;

            // Сүйлөмдөрдү чыпкалоо
            const filtered = allTests.filter(test => {
                const matchesSearch = test.title.toLowerCase().includes(searchText);
                const matchesSubject = (subjectVal === 'all' || test.subject === subjectVal);
                const matchesStatus = (statusVal === 'all' || test.status === statusVal);
                return matchesSearch && matchesSubject && matchesStatus;
            });

            // Таблицаны тазалоо
            testsTableBody.innerHTML = '';

            if (filtered.length === 0) {
                noDataMessage.style.display = 'block';
            } else {
                noDataMessage.style.display = 'none';
                filtered.forEach(test => {
                    const tr = document.createElement('tr');
                    
                    const subjectText = test.subject === 'physics' ? 'Физика' : 'Астрономия';
                    const statusClass = test.status === 'active' ? 'status-badge active' : 'status-badge draft';
                    const statusName = test.status === 'active' ? 'Активдүү' : 'Черновик';

                    tr.innerHTML = `
                        <td><strong>${test.title}</strong></td>
                        <td>${subjectText} / ${test.classGroup}</td>
                        <td>${test.questionsCount || 0} суроо</td>
                        <td>${test.duration} мүнөт</td>
                        <td><span class="${statusClass}">${statusName}</span></td>
                        <td>
                            <button class="action-btn edit-btn" data-id="${test.id}"><i class="fas fa-edit"></i> Оңдоо</button>
                            <button class="action-btn delete delete-btn" data-id="${test.id}"><i class="fas fa-trash-alt"></i> Өчүрүү</button>
                        </td>
                    `;
                    testsTableBody.appendChild(tr);
                });

                // Өчүрүү баскычтарына окуя байлоо
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = this.getAttribute('data-id');
                        if(confirm('Бул тестти биротоло өчүрүүнү каалайсызбы?')) {
                            remove(ref(database, 'tests/' + id));
                        }
                    });
                });

                // Оңдоо баскычтарына окуя байлоо
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = this.getAttribute('data-id');
                        alert('Тестти өңдөө барагына өтүү: ID ' + id);
                    });
                });
            }
        }

        // --- Firebase'ден маалыматтарды реалдуу убакытта алуу ---
        const testsRef = ref(database, 'tests');
        onValue(testsRef, (snapshot) => {
            allTests = [];
            const data = snapshot.val();
            if (data) {
                for (let key in data) {
                    allTests.push({ id: key, ...data[key] });
                }
            }
            // Статистика сандарын жаңыртуу
            totalTestsCount.textContent = allTests.length;
            activeStudentsCount.textContent = Math.floor(allTests.length * 3.5) + 2; // Динамикалык симуляция
            
            renderTable();
        });

        // Издөө жана чыпкалоо окуялары
        testSearchInput.addEventListener('input', renderTable);
        subjectFilter.addEventListener('change', renderTable);
        statusFilter.addEventListener('change', renderTable);

        // --- МОДАЛДЫК ТЕРЕЗЕ БАШКАРУУ (Жаңы тест кошуу) ---
        const modal = document.getElementById('createTestModal');
        const createBtn = document.getElementById('createNewTestBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const cancelBtn = document.getElementById('cancelModalBtn');
        const form = document.getElementById('createTestForm');

        // Ачуу
        createBtn.addEventListener('click', () => { modal.style.display = 'flex'; });
        // Жабуу
        closeBtn.addEventListener('click', () => { modal.style.display = 'none'; });
        cancelBtn.addEventListener('click', () => { modal.style.display = 'none'; });
        window.addEventListener('click', (e) => { if(e.target === modal) modal.style.display = 'none'; });

        // Жаңы маалыматты Firebase'ге жазуу (Сактоо баскычы)
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newTestRef = push(ref(database, 'tests'));
            set(newTestRef, {
                title: document.getElementById('testTitle').value,
                subject: document.getElementById('testSubject').value,
                classGroup: document.getElementById('testClass').value,
                duration: parseInt(document.getElementById('testDuration').value),
                status: document.getElementById('testStatus').value,
                questionsCount: 0, // Жаңы түзүлгөндө суроолор 0 болот
                createdAt: new Date().toISOString()
            }).then(() => {
                modal.style.display = 'none';
                form.reset();
            }).catch(error => {
                alert("Ката кетти: " + error.message);
            });
        });
    </script>

    <!-- Баскычтардын багыттоо логикалары (Навигация) -->
    <script>
        // 1. Сол жактагы 3 негизги баскычтардын шилтемелери
        document.getElementById('navDashboard').addEventListener('click', function() {

        });

        document.getElementById('navTestBuilder').addEventListener('click', function() {
            window.location.href = '/sections/tests.html'; // Ушул баракча кайра жүктөлөт
        });

        document.getElementById('navResults').addEventListener('click', function() {
            window.location.href = '/sections/results.html'; // Жыйынтыктарга өтүү
        });

        // Мобилдик меню коду
        document.getElementById('mobileToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('open');
        });
    </script>
