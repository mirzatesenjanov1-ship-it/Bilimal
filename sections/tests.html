<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl.org - Акылдуу Тест Конструктору</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --success: #10b981;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #1e293b;
            --hover-bg: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        /* Тесттин жалпы маалымат блогу */
        .test-info-block {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid var(--primary); /* Башкалардан айырмаланып турушу үчүн көк чек */
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }
        .test-info-block h3 {
            margin-top: 0;
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 15px;
        }

        /* Баскычтардын блогу */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            margin-top: 20px;
        }
        .btn {
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }
        .main-add-btn {
            background-color: var(--primary);
            color: #000;
            box-shadow: 0 4px 6px rgba(0, 210, 255, 0.2);
        }
        .main-add-btn:hover { background-color: #00b8e6; transform: translateY(-2px); }
        
        .main-save-btn {
            background-color: var(--success);
            color: white;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
        }
        .main-save-btn:hover { background-color: #059669; transform: translateY(-2px); }
        .main-save-btn:disabled { background-color: #064e3b; cursor: not-allowed; transform: none; box-shadow: none;}

        /* Тест блоктору */
        .test-block {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .test-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .block-title { font-weight: bold; color: var(--primary); font-size: 16px; }
        
        .btn-remove {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .btn-remove:hover { background-color: var(--danger); color: white; }

        /* Формат тандоочу меню */
        .type-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px 0;
        }
        .type-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .type-card:hover { border-color: var(--primary); background-color: var(--hover-bg); }
        .type-card h4 { margin: 0 0 5px 0; color: var(--text-main); }
        .type-card p { margin: 0; font-size: 12px; color: var(--text-muted); }

        /* Жалпы форма элементтери */
        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 14px;
            box-sizing: border-box;
            margin-top: 5px;
        }
        textarea { resize: vertical; }
        label { font-size: 12px; color: var(--text-muted); }

        .pisa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .option-item { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .option-item input[type="radio"] { transform: scale(1.2); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🛠 BilimAl: Акылдуу Тест Конструктору</h2> 
    </div>

    <div class="test-info-block">
        <h3>📋 Тесттин жалпы маалыматы</h3>
        <label>Кайсы бөлүм же предмет боюнча түзүлдү?</label>
        <input type="text" id="mainTestTitle" placeholder="Мисалы: 10-класс Физика: Омдун мыйзамы (1-чейрек үчүн)">
    </div>

    <div id="testContainer"></div>

    <div class="action-buttons">
        <button class="btn main-add-btn" onclick="addEmptyBlock()">+ Жаңы суроо блогун кошуу</button>
        <button class="btn main-save-btn" onclick="saveTest()">💾 Тестти маалымат базасына сактоо</button>
    </div>
</div>

<script>
    let blockCount = 0;

    // 1. Бош блок кошуу функциясы
    function addEmptyBlock() {
        blockCount++;
        const container = document.getElementById("testContainer");

        const block = document.createElement("div");
        block.className = "test-block";
        block.id = `block-${blockCount}`;
        block.setAttribute('data-id', blockCount); 

        block.innerHTML = `
            <div class="test-block-header">
                <span class="block-title">Суроо #${blockCount} - Форматты тандаңыз</span>
                <button class="btn-remove" onclick="removeBlock(${blockCount})">Блокту өчүрүү</button>
            </div>
            <div class="type-selector" id="selector-${blockCount}">
                <div class="type-card" onclick="buildBlock(${blockCount}, 'simple')">
                    <h4>📝 Жөнөкөй текст</h4>
                    <p>Төрт варианттуу стандарттык тест</p>
                </div>
                <div class="type-card" onclick="buildBlock(${blockCount}, 'pisa')">
                    <h4>📊 PISA тест</h4>
                    <p>Анализ, логика, жана чоң тексттер</p>
                </div>
                <div class="type-card" onclick="buildBlock(${blockCount}, 'essay')">
                    <h4>🎧 Аудио / Эссе</h4>
                    <p>Ачык ой жүгүртүү жана диктант</p>
                </div>
            </div>
            <div id="content-${blockCount}"></div>
        `;

        container.appendChild(block);
        block.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 2. Блокту тандалган форматка жараша куруу
    function buildBlock(id, type) {
        document.getElementById(`selector-${id}`).style.display = 'none';
        const block = document.getElementById(`block-${id}`);
        block.setAttribute('data-type', type); 
        
        const contentDiv = document.getElementById(`content-${id}`);
        const headerTitle = document.querySelector(`#block-${id} .block-title`);

        if (type === 'simple') {
            headerTitle.innerHTML = `📝 Жөнөкөй Суроо #${id}`;
            contentDiv.innerHTML = `
                <label>Суроонун тексти:</label>
                <input type="text" class="q-text" placeholder="Мисалы: Ньютондун экинчи мыйзамынын формуласы кайсы?">
                
                <div style="margin-top: 15px;">
                    <label>Жооптун варианттары (Туура жоопту белгилеңиз):</label>
                    <div class="option-item"><input type="radio" name="correct-${id}"> <input type="text" class="opt-text" placeholder="А варианты..."></div>
                    <div class="option-item"><input type="radio" name="correct-${id}"> <input type="text" class="opt-text" placeholder="Б варианты..."></div>
                    <div class="option-item"><input type="radio" name="correct-${id}"> <input type="text" class="opt-text" placeholder="В варианты..."></div>
                    <div class="option-item"><input type="radio" name="correct-${id}"> <input type="text" class="opt-text" placeholder="Г варианты..."></div>
                </div>
            `;
        } else if (type === 'pisa') {
            headerTitle.innerHTML = `📊 PISA Блогу #${id}`;
            contentDiv.innerHTML = `
                <div class="pisa-grid">
                    <div>
                        <label>Окуя / Текст / Шарт (Сол жак бөлүк):</label>
                        <textarea class="pisa-context" placeholder="Бул жерге текстти жазыңыз..." style="height: 150px;"></textarea>
                    </div>
                    <div>
                        <label>Текстке тиешелүү суроо жана жооп талаасы (Оң жак бөлүк):</label>
                        <textarea class="pisa-questions" placeholder="1-суроо: Графиктеги өзгөрүүнү түшүндүрүңүз..." style="height: 100px;"></textarea>
                        <div style="margin-top: 15px; padding: 10px; background: var(--bg-color); border: 1px dashed var(--border); border-radius: 6px;">
                            <label>Баалоо критерийи (Мугалим үчүн):</label>
                            <input type="text" class="pisa-criteria" placeholder="Мисалы: Толук жооп үчүн - 2 балл, жарым үчүн - 1 балл">
                        </div>
                    </div>
                </div>
            `;
        } else if (type === 'essay') {
            headerTitle.innerHTML = `🎧 Аудио-Диктант / Эссе #${id}`;
            contentDiv.innerHTML = `
                <label>Тапшырманын темасы же шарты:</label>
                <input type="text" class="essay-topic" placeholder="Мисалы: Электромагниттик индукция боюнча эссе жаз">
                
                <div style="margin-top: 15px; padding: 15px; border: 1px solid var(--border); border-radius: 6px; background-color: var(--bg-color);">
                    <label>Аудио шилтеме (Милдеттүү эмес):</label>
                    <input type="text" class="essay-link" placeholder="Аудио файлдын URL шилтемеси...">
                </div>

                <div style="margin-top: 15px;">
                    <label>Жооптун минималдуу сөз саны (чектөө):</label>
                    <input type="number" class="essay-min" placeholder="Мисалы: 150" style="width: 200px; display: block;">
                </div>
            `;
        }
    }

    // 3. Блокту өчүрүү
    function removeBlock(id) {
        const block = document.getElementById(`block-${id}`);
        if (block) {
            block.style.opacity = '0';
            setTimeout(() => { block.remove(); }, 300);
        }
    }

    // 4. ТЕСТТИ САКТОО ЖАНА СЕРВЕРГЕ ЖӨНӨТҮҮ
    async function saveTest() {
        const testTitle = document.getElementById('mainTestTitle').value.trim();
        
        // Теманын жазылганын текшерүү
        if (!testTitle) {
            alert("⚠️ Сураныч, эң жогору жактагы 'Кайсы бөлүм же предмет боюнча түзүлдү?' деген жерди толтуруңуз!");
            document.getElementById('mainTestTitle').focus();
            return;
        }

        const blocks = document.querySelectorAll('.test-block[data-type]');
        const questionsData = [];

        if(blocks.length === 0) {
            alert("⚠️ Сактоо үчүн жок дегенде 1 суроо блогун толтуруңуз!");
            return;
        }

        blocks.forEach(block => {
            const id = block.getAttribute('data-id');
            const type = block.getAttribute('data-type');
            let blockData = { id: id, type: type };

            if (type === 'simple') {
                blockData.question = block.querySelector('.q-text').value;
                blockData.options = [];
                const optionInputs = block.querySelectorAll('.opt-text');
                const radioInputs = block.querySelectorAll(`input[name="correct-${id}"]`);
                
                optionInputs.forEach((opt, index) => {
                    blockData.options.push({
                        text: opt.value,
                        isCorrect: radioInputs[index].checked
                    });
                });
            } else if (type === 'pisa') {
                blockData.context = block.querySelector('.pisa-context').value;
                blockData.questions = block.querySelector('.pisa-questions').value;
                blockData.criteria = block.querySelector('.pisa-criteria').value;
            } else if (type === 'essay') {
                blockData.topic = block.querySelector('.essay-topic').value;
                blockData.audioLink = block.querySelector('.essay-link').value;
                blockData.minWords = block.querySelector('.essay-min').value;
            }
            questionsData.push(blockData);
        });

        // БАРДЫК МААЛЫМАТТЫ БИР ОБЪЕКТКЕ ЧОГУЛТУУ
        const finalPayload = {
            title: testTitle,
            questions: questionsData
        };

        const saveBtn = document.querySelector('.main-save-btn');
        const originalText = saveBtn.innerHTML;
        saveBtn.innerHTML = "⏳ Сакталууда...";
        saveBtn.disabled = true;

        try {
            const response = await fetch('save_test.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(finalPayload)
            });

            const result = await response.json();

            if (result.status === "success") {
                alert("✅ Ийгиликтүү! Тест маалымат базасына сакталды.\nТест коду: " + result.test_code);
            } else {
                alert("❌ Ката чыкты: " + result.message);
            }
        } catch (error) {
            console.error("Сервер катасы:", error);
            alert("❌ Серверге туташууда ката кетти. save_test.php файлы ордунда экенин текшериңиз.");
        } finally {
            saveBtn.innerHTML = originalText;
            saveBtn.disabled = false;
        }
    }
</script>

</body>
</html>
