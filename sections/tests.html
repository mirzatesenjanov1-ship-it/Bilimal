<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менин Тесттерим - Bilimal.org</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --danger: #ef4444;
            --success: #10b981;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--surface-color); padding: 20px; height: 100vh; border-right: 1px solid var(--border-color); position: fixed; }
        .main-content { margin-left: 260px; padding: 30px; width: calc(100% - 260px); box-sizing: border-box; }
        .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--surface-color); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .stat-card h3 { margin: 0 0 10px 0; color: var(--text-muted); font-size: 14px; }
        .stat-card .value { font-size: 28px; font-weight: bold; color: var(--primary); }
        .test-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .test-card { background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        .test-card h4 { margin: 0 0 10px 0; font-size: 18px; }
        .test-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; margin-top: auto; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; color: white; transition: 0.2s; }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }
        .btn-danger { background: var(--danger); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--surface-color); width: 600px; max-width: 90%; border-radius: 12px; padding: 25px; border: 1px solid var(--border-color); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
        .qr-container { display: flex; justify-content: center; margin: 20px 0; background: white; padding: 20px; border-radius: 8px; width: max-content; margin-inline: auto; }
        .form-control { width: 100%; padding: 10px; background: var(--bg-color); border: 1px solid var(--border-color); color: white; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--primary); margin-bottom: 40px;"><i class="fas fa-atom"></i> Bilimal</h2>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <a href="#" class="btn btn-primary"><i class="fas fa-file-alt"></i> Менин Тесттерим</a>
        <a href="/sections/test-builder.html" class="btn btn-outline"><i class="fas fa-plus"></i> Жаңы Тест Түзүү</a>
        <a href="#" class="btn btn-outline"><i class="fas fa-chart-bar"></i> Жыйынтыктар</a>
        <a href="#" class="btn btn-outline"><i class="fas fa-users"></i> Окуучулар</a>
    </div>
</div>

<div class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2>Башкаруу Панели</h2>
        <div style="display: flex; gap: 15px;">
            <input type="text" id="searchInput" class="form-control" style="width: 250px; margin: 0;" placeholder="Издөө...">
            <button class="btn btn-primary" onclick="loadTests()"><i class="fas fa-sync"></i></button>
        </div>
    </div>

    <div class="dashboard-stats" id="statsContainer">
        <div class="stat-card"><h3>Бардык Тесттер</h3><div class="value" id="statTotal">0</div></div>
        <div class="stat-card"><h3>Активдүү</h3><div class="value" id="statActive">0</div></div>
        <div class="stat-card"><h3>Тапшыргандар</h3><div class="value" id="statSubmits">0</div></div>
        <div class="stat-card"><h3>Орточо балл</h3><div class="value" id="statAvg">0%</div></div>
    </div>

    <div class="test-list" id="testListContainer">
        <!-- Tests will be loaded here via JS -->
    </div>
</div>

<!-- Test Settings / Share Modal -->
<div class="modal-overlay" id="testModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTestTitle">Тестти Башкаруу</h3>
            <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div style="margin-bottom: 20px;">
            <label>Окуучулар үчүн шилтеме:</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="shareLinkInput" class="form-control" readonly style="margin: 0;">
                <button class="btn btn-primary" onclick="copyLink()"><i class="fas fa-copy"></i></button>
            </div>
        </div>
        <div class="qr-container" id="qrcode"></div>
        <hr style="border-color: var(--border-color); margin: 20px 0;">
        <div class="btn-group" style="justify-content: space-between;">
            <div>
                <button class="btn btn-outline" onclick="exportResults('excel')"><i class="fas fa-file-excel"></i> Excel</button>
                <button class="btn btn-outline" onclick="exportResults('json')"><i class="fas fa-file-code"></i> JSON</button>
            </div>
            <div>
                <button class="btn btn-danger" onclick="deleteTest()"><i class="fas fa-trash"></i> Өчүрүү</button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="/assets/js/tests.js"></script>
</body>
</html>
