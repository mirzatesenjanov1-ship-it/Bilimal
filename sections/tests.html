<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl.org - Тест Борбору</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
        }

        /* Сайдбар (Сол меню) */
        .sidebar {
            width: 260px;
            background-color: #111622;
            border-right: 1px solid #1e2640;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00d2ff;
            text-decoration: none;
            margin-bottom: 10px;
            display: block;
        }

        .user-badge {
            background: rgba(0, 210, 255, 0.05);
            border: 1px solid #1e2640;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            color: #bdc3c7;
            word-break: break-all;
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-menu a {
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            display: block;
            background: #161f33;
            transition: 0.3s;
            font-size: 15px;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: #00d2ff;
            color: #0b0e14;
        }

        /* Негизги мазмун аймагы */
        .main-content {
            flex-grow: 1;
            padding: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            align-items: start;
            overflow-x: hidden;
        }

        .card {
            background-color: #111622;
            border: 1px solid #1e2640;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 25px;
        }

        .card-title {
            font-size: 18px;
            color: #00d2ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Форма элементтери */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #bdc3c7;
        }

        .form-control {
            width: 100%;
            background-color: #0b0e14;
            border: 1px solid #1e2640;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .form-control:focus {
            border-color: #00d2ff;
        }

        .format-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-format {
            background-color: #161f33;
            border: 1px solid #1e2640;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

        .btn-format.active, .btn-format:hover {
            border-color: #00d2ff;
            background-color: rgba(0, 210, 255, 0.1);
        }

        .btn-add-block {
            width: 100%;
            background: transparent;
            border: 1px dashed #00d2ff;
            color: #00d2ff;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            color: #ff4757;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-submit {
            width: 100%;
            background-color: #2ecc71;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        /* Жыйынтыктар тизмеси */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-excel {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .student-item {
            background-color: #161f33;
            border-left: 4px solid #34495e;
            border-radius: 6px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .student-item.success { border-left-color: #2ecc71; }
        .student-item.danger { border-left-color: #e74c3c; }

        .student-info h4 {
            font-size: 15px;
            margin-bottom: 4px;
        }

        .student-info p {
            font-size: 12px;
            color: #7f8c8d;
        }

        .student-meta {
            text-align: right;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .score {
            font-weight: bold;
            font-size: 16px;
        }

        .score.success { color: #2ecc71; }
        .score.danger { color: #e74c3c; }

        .actions-btn i {
            padding: 8px;
            background: #111622;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 5px;
        }

        .actions-btn .fa-eye { color: #f1c40f; }
        .actions-btn .fa-trash { color: #e74c3c; }

        .loading-text {
            color: #7f8c8d;
            font-style: italic;
            padding: 10px 0;
        }

        .question-block {
            background: #0b0e14;
            border: 1px solid #1e2640;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            position: relative;
        }

        .btn-remove-q {
            position: absolute;
            right: 15px;
            top: 15px;
            color: #e74c3c;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #1e2640; }
            .main-content { grid-template-columns: 1fr; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="../dashboard.html" class="logo">BilimAl.org</a>
        <div class="user-badge" id="userEmailBadge">
            <i class="fas fa-user-gradient"></i> Жүктөлүүдө...
        </div>
        <ul class="sidebar-menu">
            <li><a href="../dashboard.html"><i class="fas fa-arrow-left"></i> Башкы бетке</a></li>
            <li><a href="#" class="active"><i class="fas fa-plus-circle"></i> Тест Түзүү</a></li>
        </ul>
    </div>

    <div class="main-content">
        
        <div>
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-pen"></i> Тестти Түзүү режими
                </div>
                
                <div class="form-group">
                    <label>Тапшырманын аталышы (Темасы):</label>
                    <input type="text" id="testTitle" class="form-control" placeholder="Мисалы: 10-класс Механика ЖӨНӨКӨЙ ТЕСТ">
                </div>

                <label style="display:block; font-size:14px; margin-bottom:8px; color:#bdc3c7;">Суроонун форматын тандаңыз:</label>
                <div class="format-buttons">
                    <button class="btn-format active" data-format="text"><i class="fas fa-file-alt"></i> Жөнөкөй текст</button>
                    <button class="btn-format" data-format="pisa"><i class="fas fa-globe"></i> PISA Блогу</button>
                    <button class="btn-format" data-format="audio"><i class="fas fa-volume-up"></i> Audio / Эссе</button>
                </div>

                <div id="questionsContainer"></div>
                <button class="btn-add-block" id="addQuestionBtn"><i class="fas fa-plus"></i> Жаңы суроо блогун кошуу</button>

                <div class="form-group">
                    <label>Тапшыруунун чектөөсү:</label>
                    <select id="testLimit" class="form-control">
                        <option value="no-limit">Чектөөсүз (Каалаганча)</option>
                        <option value="1">1 жолу кирүүгө болот</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Тесттин убактысы (Мүнөт):</label>
                    <input type="number" id="testDuration" class="form-control" placeholder="Чектөөсүз болсо бош калтырыңыз">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="antiCheat" checked>
                    <label for="antiCheat" style="color:#ff4757; cursor:pointer;">Anti-Cheat Күйгүзүү (Башка терезеге өтүүнү бөгөттөө)</label>
                </div>

                <button class="btn-submit" id="saveTestBtn"><i class="fas fa-save"></i> Тестти сактоо</button>
            </div>

            <div class="card">
                <div class="card-title">
                    <i class="fas fa-list-ul"></i> Сиз түзгөн тесттердин тизмеси
                </div>
                <div id="createdTestsList">
                    <p class="loading-text">Тесттер жүктөлүүдө...</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="results-header">
                <div class="card-title" style="margin-bottom:0;">
                    <i class="fas fa-graduation-cap"></i> Окуучулардын жыйынтыктары (Түз эфир)
                </div>
                <button class="btn-excel"><i class="fas fa-file-excel"></i> Excel-ге жүктөө</button>
            </div>

            <div class="form-group">
                <select class="form-control" id="filterSelect">
                    <option>Бардык тесттердин жыйынтыктары</option>
                </select>
            </div>

            <div id="studentsList">
                <div class="student-item">
                    <div class="student-info">
                        <h4>Асан Үсөн жөнөкөй ТЕСТ 1</h4>
                        <p>10-класс Механика ЖӨНӨКӨЙ ТЕСТ • Коду: TEST-7673</p>
                    </div>
                    <div class="student-meta">
                        <span class="score">1/3</span>
                        <div class="actions-btn">
                            <i class="fas fa-eye"></i>
                            <i class="fas fa-trash"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 1. БУЛ ЖЕРГЕ ӨЗҮҢҮЗДҮН ФАЙРИБЕЙС КОНФИГДИ КОЮҢУЗ
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Firebase демилгелөө
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const database = firebase.database();
        const auth = firebase.auth();

        let currentUserId = null;
        let questionIdx = 0;
        let currentFormat = 'text';

        // Мугалим киргенин же кирбегенин текшерүү (Сиздин Firebase эрежеңизге ылайык)
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUserId = user.uid; // Корголгон uid алынды
                document.getElementById('userEmailBadge').innerHTML = `<i class="fas fa-user-gradient"></i> Мугалим:<br>${user.email}`;
                // Эми базадан ушул мугалимге тиешелүү тесттерди таап чыгарабыз
                listenToCreatedTests();
            } else {
                document.getElementById('userEmailBadge').innerHTML = `<i class="fas fa-exclamation-triangle"></i> Киришиңиз керек`;
                document.getElementById('createdTestsList').innerHTML = `<p class="loading-text" style="color:#e74c3c;">Катаны алдын алуу үчүн алгач аккаунтка кириңиз!</p>`;
            }
        });

        // Форматтарды которуштуруу
        const formatBtns = document.querySelectorAll('.btn-format');
        formatBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                formatBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFormat = btn.getAttribute('data-format');
            });
        });

        // Жаңы суроо кошуу
        const questionsContainer = document.getElementById('questionsContainer');
        document.getElementById('addQuestionBtn').addEventListener('click', () => {
            questionIdx++;
            const div = document.createElement('div');
            div.className = 'question-block';
            div.id = `q_block_${questionIdx}`;
            div.innerHTML = `
                <i class="fas fa-trash btn-remove-q" onclick="document.getElementById('q_block_${questionIdx}').remove()"></i>
                <div class="form-group">
                    <label>${questionIdx}-Суроо:</label>
                    <input type="text" class="form-control q-text" placeholder="Суроону жазыңыз">
                </div>
                <div class="form-group">
                    <input type="text" class="form-control q-ans" placeholder="Туура жообун киргизиңиз">
                </div>
            `;
            questionsContainer.appendChild(div);
        });

        // ТЕСТТИ САКТОО (Сиздин Firebase эрежеңиз боюнча туура дарекке жазуу)
        document.getElementById('saveTestBtn').addEventListener('click', () => {
            if (!currentUserId) {
                alert('Ката: Сиз авторизациядан өткөн эмессиз!');
                return;
            }

            const titleValue = document.getElementById('testTitle').value.trim();
            if (!titleValue) {
                alert('Сураныч, тесттин темасын жазыңыз!');
                return;
            }

            const questionsArray = [];
            document.querySelectorAll('.question-block').forEach(b => {
                const text = b.querySelector('.q-text').value;
                const ans = b.querySelector('.q-ans').value;
                if(text) questionsArray.push({ question: text, answer: ans });
            });

            const randomCode = 'TEST-' + Math.floor(1000 + Math.random() * 9000);

            const testData = {
                code: randomCode,
                title: titleValue,
                format: currentFormat,
                limit: document.getElementById('testLimit').value,
                duration: document.getElementById('testDuration').value || 'Чектөөсүз',
                antiCheat: document.getElementById('antiCheat').checked,
                questions: questionsArray
            };

            // 1-кадам: Мугалимдин жеке папкасына сактоо (teachers_data/$uid/) -> Эрежеге туура келет!
            database.ref('teachers_data/' + currentUserId + '/tests/' + randomCode).set(testData)
            .then(() => {
                // 2-кадам: Окуучулар код аркылуу таба алуусу үчүн ачык дарекке да көчүрүү
                return database.ref('global_test_lookup/' + randomCode).set({
                    teacherUid: currentUserId,
                    title: titleValue
                });
            })
            .then(() => {
                alert(`Тест ийгиликтүү сакталды! Коду: ${randomCode}`);
                // Форманы тазалоо
                document.getElementById('testTitle').value = '';
                document.getElementById('testDuration').value = '';
                questionsContainer.innerHTML = '';
                questionIdx = 0;
            })
            .catch(error => {
                console.error(error);
                alert("Ката кетти: Базага кирүүгө уруксат берилген жок!");
            });
        });

        // МУРУНКУ ТҮЗҮЛГӨН ТЕСТТЕРДИ БАЗАДАН АЛЫП ЧЫГАРУУ
        function listenToCreatedTests() {
            const testsRef = database.ref('teachers_data/' + currentUserId + '/tests');
            
            testsRef.on('value', (snapshot) => {
                const createdTestsList = document.getElementById('createdTestsList');
                const filterSelect = document.getElementById('filterSelect');
                
                createdTestsList.innerHTML = '';
                filterSelect.innerHTML = '<option>Бардык тесттердин жыйынтыктары</option>';

                if (!snapshot.exists()) {
                    createdTestsList.innerHTML = '<p class="loading-text">Түзүлгөн тесттер жок...</p>';
                    return;
                }

                snapshot.forEach((childSnapshot) => {
                    const testKey = childSnapshot.key;
                    const test = childSnapshot.val();
                    const qCount = test.questions ? test.questions.length : 0;

                    const item = document.createElement('div');
                    item.className = 'student-item';
                    item.style.borderLeftColor = '#00d2ff';
                    item.innerHTML = `
                        <div class="student-info">
                            <h4>${test.title}</h4>
                            <p>Убактысы: ${test.duration} мүнөт • Коду: <strong>${test.code}</strong> • Суроо: ${qCount}</p>
                        </div>
                        <div class="student-meta">
                            <div class="actions-btn">
                                <i class="fas fa-trash" title="Өчүрүү" onclick="deleteTest('${testKey}')"></i>
                            </div>
                        </div>
                    `;
                    createdTestsList.appendChild(item);

                    // Фильтрге кошуу
                    const opt = document.createElement('option');
                    opt.value = test.code;
                    opt.textContent = test.title;
                    filterSelect.appendChild(opt);
                });
            });
        }

        // ТЕСТТИ ӨЧҮРҮҮ ФУНКЦИЯСЫ
        window.deleteTest = function(testKey) {
            if (confirm('Бул тестти биротоло өчүрүүнү каалайсызбы?')) {
                // Жеке папкадан өчүрүү
                database.ref('teachers_data/' + currentUserId + '/tests/' + testKey).remove()
                .then(() => {
                    // Ачык папкадан да тазалоо
                    return database.ref('global_test_lookup/' + testKey).remove();
                })
                .catch(err => alert("Өчүрүүдө ката кетти: " + err.message));
            }
        }
    </script>
</body>
</html>
