<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акылдуу Сынак Борбору — BiliMal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: #050512; color: #fff; padding: 30px 5%; min-height: 100vh; }
        .quiz-card { max-width: 700px; margin: 40px auto; background: rgba(10,10,30,0.9); border: 2px solid rgba(255, 0, 255, 0.2); border-radius: 16px; padding: 35px; box-shadow: 0 0 30px rgba(255,0,255,0.1); }
        .status-box { display: flex; justify-content: space-between; background: rgba(255, 0, 85, 0.1); border: 1px solid #ff0055; padding: 12px; border-radius: 8px; margin-bottom: 25px; color: #ff3366; font-weight: bold; font-size: 0.9rem; }
        .q-title { font-size: 1.25rem; margin-bottom: 20px; color: #00f0ff; line-height: 1.5; }
        .ans-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .ans-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .ans-item:hover { background: rgba(0,240,255,0.06); border-color: #00f0ff; }
        .ans-item.active { background: rgba(255,0,255,0.15); border-color: #ff00ff; }
        .btn-action { background: #7000ff; border: none; color: white; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; float: right; }
        .btn-action:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px #00f0ff; }
    </style>
</head>
<body>

    <div class="quiz-card">
        <div class="status-box">
            <span>🛡️ ANTI-CHEAT V3: КӨЗӨМӨЛ ЖАНДУУ</span>
            <span id="warn-txt" style="color: #ff3366;">Эскертүү: 0 / 3</span>
        </div>

        <div id="quiz-engine">
            <div class="q-title" id="question-field">Жүктөлүүдө...</div>
            <div class="ans-list" id="answers-field"></div>
            <div style="overflow: hidden; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
                <span id="progress-field" style="color: #626c93; font-size: 0.9rem; line-height: 40px;">Суроо: 1/2</span>
                <button class="btn-action" onclick="submitAnswer()">Кийинки суроо →</button>
            </div>
        </div>

        <div id="result-engine" style="display: none; text-align: center; padding: 20px 0;">
            <h2 style="color: #00f0ff;">Тест жыйынтыкталды!</h2>
            <div id="final-score" style="font-size: 3.5rem; font-weight: 900; margin: 25px 0; color: #ff00ff; text-shadow: 0 0 20px #ff00ff;">0 / 0</div>
            <p id="cheat-log" style="color: #ff3366; font-weight: bold;"></p>
            <button class="btn-action" style="float: none; margin-top: 20px;" onclick="window.location.href='../dashboard.html'">Кабинетке кайтуу</button>
        </div>
    </div>

    <script>
        // 10-класстын Физика тест базасы (Формулалар жөнөкөй текст түрүндө берилди)
        const db = [
            { q: "Төмөндөгүлөрдүн ичинен чынжырдын бөлүгү үчүн Ом мыйзамынын туура формуласын көрсөтүңүз.", a: ["I = U / R", "R = I / U", "P = U * I", "A = F * s"], c: 0 },
            { q: "Идеалдык газдын абалынын негизги теңдемесин (Менделеев-Клапейрон теңдемеси) тапкыла.", a: ["F = m * a", "p * V = n * R * T", "E = m * c^2", "I = q / t"], c: 1 }
        ];

        let curIdx = 0, score = 0, userSelection = null, warnings = 0;

        function render() {
            userSelection = null;
            document.getElementById("question-field").innerText = db[curIdx].q;
            document.getElementById("progress-field").innerText = `Суроо: ${curIdx + 1} / ${db.length}`;
            const box = document.getElementById("answers-field");
            box.innerHTML = "";
            db[curIdx].a.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = "ans-item";
                div.innerText = item;
                div.onclick = () => {
                    document.querySelectorAll(".ans-item").forEach(el => el.classList.remove("active"));
                    div.classList.add("active");
                    userSelection = idx;
                };
                box.appendChild(div);
            });
        }

        function submitAnswer() {
            if(userSelection === null) return alert("Жооптун варианттарынан бирөөсүн тандаңыз!");
            if(userSelection === db[curIdx].c) score++;
            curIdx++;
            if(curIdx < db.length) render(); else finish(false);
        }

        function finish(isCheated) {
            document.getElementById("quiz-engine").style.display = "none";
            document.getElementById("result-engine").style.display = "block";
            if(isCheated) {
                document.getElementById("final-score").innerText = "0";
                document.getElementById("cheat-log").innerText = "⚠️ ШПАРГАЛКА ЖАСОО: Сынак учурунда башка терезелерге өткөнүңүз үчүн жыйынтыгыңыз жокко чыгарылды!";
            } else {
                document.getElementById("final-score").innerText = `${score} / ${db.length}`;
            }
        }

        // TAB SWITCH DETECTION (АКЫЛДУУ АНТИ-ЧИТ ТЕКШЕРҮҮ)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                warnings++;
                document.getElementById("warn-txt").innerText = `Эскертүү: ${warnings} / 3`;
                alert("⚠️ КӨҢҮЛ БУРУҢУЗ! Тесттен башка баракчага өтүүгө тыюу салынат! 3 эскертүүдөн кийин сынак автоматтык түрдө жабылат.");
                if(warnings >= 3) finish(true);
            }
        });

        render();
    </script>
    <script src="../assets/js/script.js"></script>
</body>
</html>
