<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiliMal — Мугалим Жардамчысы V3</title>
    <style>
        /* Базалык стилдер (Компакттуу) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #020208; color: #fff; min-height: 100vh; padding-top: 90px; }
        header { background: rgba(4, 4, 16, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding: 15px 5%; display: flex; justify-content: space-between; position: fixed; width: 100%; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 900; color: #00f0ff; text-decoration: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { background: #0f0f23; border: 1px solid #00f0ff; padding: 10px 20px; border-radius: 20px; color: #fff; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #00f0ff; color: #000; font-weight: bold; }
        .panel { display: none; } .panel.active { display: block; }

        .card { background: rgba(20, 20, 35, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h3 { color: #00f0ff; margin-bottom: 15px; border-bottom: 1px solid rgba(0,240,255,0.2); padding-bottom: 10px; }
        
        label { display: block; margin: 10px 0 5px; color: #a5b4fc; font-size: 0.9rem; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid #334155; border-radius: 6px; color: #fff; outline: none; }
        input:focus, textarea:focus { border-color: #ff00ff; }
        
        .btn { background: linear-gradient(90deg, #00f0ff, #7000ff); border: none; padding: 10px 15px; border-radius: 6px; color: #fff; cursor: pointer; font-weight: bold; }
        .btn:hover { opacity: 0.9; }
        .btn-red { background: #ff4444; } .btn-green { background: #10b981; }

        .audio-recorder { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; text-align: center; border: 1px dashed #00f0ff; }
        .pisa-context { background: #1e293b; padding: 15px; border-left: 4px solid #ff00ff; margin-bottom: 15px; border-radius: 4px; }
        
        .test-list-item { background: rgba(0,0,0,0.4); border-left: 3px solid #00f0ff; padding: 10px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .result-item { background: rgba(255,255,255,0.02); padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">BiliMal</a>
        <a href="#" style="color:#fff; text-decoration:none;">← Башкы бет</a>
    </header>

    <div class="container">
        <div class="tab-container" id="tabs">
            <button class="tab-btn active" onclick="switchTab('teacher')">👨‍🏫 Мугалим</button>
            <button class="tab-btn" onclick="switchTab('student')">🎒 Окуучу</button>
        </div>

        <div id="teacher-panel" class="panel active">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                
                <div class="card">
                    <h3>🛠️ Жаңы Тапшырма / Тест Түзүү</h3>
                    
                    <label>Тапшырманын аталышы</label>
                    <input type="text" id="t-title" placeholder="Мисалы: 1-чейрек диктанты">

                    <label>Тапшырманын Түрүн Тандаңыз:</label>
                    <select id="t-type" onchange="changeTestTypeUI()">
                        <option value="standard">1. Жөнөкөй Тест (Суроо-Жооп)</option>
                        <option value="dictation">2. Аудио-Диктант / Эссе</option>
                        <option value="pisa">3. PISA форматы (Текстти окуп түшүнүү)</option>
                    </select>

                    <div id="builder-area" style="margin-top: 20px;"></div>

                    <button class="btn" style="width:100%; margin-top:20px;" onclick="saveTest()">💾 Базага Сактоо</button>
                </div>

                <div>
                    <div class="card">
                        <h3>📋 Активдүү Тесттер</h3>
                        <div id="teacher-tests-list"></div>
                    </div>
                    
                    <div class="card">
                        <h3>📊 Келген Жооптор жана Эсселер</h3>
                        <button class="btn btn-red" style="font-size: 0.8rem; margin-bottom:10px;" onclick="clearResults()">Тазалоо</button>
                        <div id="teacher-results-list"></div>
                    </div>
                </div>

            </div>
        </div>

        <div id="student-panel" class="panel">
            <div class="card" id="student-auth" style="max-width: 400px; margin: 0 auto;">
                <h3>📝 Доступ</h3>
                <label>Аты-жөнүңүз</label>
                <input type="text" id="s-name">
                <label>Класс</label>
                <input type="text" id="s-class">
                <label>Тесттин ID коду</label>
                <input type="text" id="s-testid">
                <button class="btn" style="width:100%; margin-top:15px;" onclick="startTest()">Баштоо</button>
            </div>

            <div class="card" id="student-test-area" style="max-width: 700px; margin: 0 auto; display: none;">
                <h3 id="st-title">Тест...</h3>
                <div id="st-content"></div>
                <button class="btn btn-green" style="width:100%; margin-top:20px;" onclick="submitAnswers()">Жыйынтыкты Жиберүү</button>
            </div>
        </div>
    </div>

    <script>
        let tests = JSON.parse(localStorage.getItem('bm_v3_tests')) || [];
        let results = JSON.parse(localStorage.getItem('bm_v3_results')) || [];
        
        let currentTestType = 'standard';
        let teacherAudioBase64 = null;
        let studentAudioBase64 = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let currentActiveTest = null;
        let audioPlayCount = 0;

        function switchTab(role) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(role === 'teacher') {
                document.getElementById('teacher-panel').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                renderTeacherTests(); renderResults();
            } else {
                document.getElementById('student-panel').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }

        // --- МУГАЛИМ UI АЛМАШТЫРУУ ---
        function changeTestTypeUI() {
            currentTestType = document.getElementById('t-type').value;
            const area = document.getElementById('builder-area');
            area.innerHTML = '';
            teacherAudioBase64 = null;

            if(currentTestType === 'dictation') {
                area.innerHTML = `
                    <div class="audio-recorder">
                        <p style="margin-bottom:10px; color:#fff;">🎙️ Текстти/Эссени үнүңүз менен жаздырыңыз:</p>
                        <button class="btn btn-red" id="btn-record" onclick="toggleTeacherRecord()">🔴 Жаздырууну баштоо</button>
                        <audio id="teacher-audio-preview" controls style="display:none; width:100%; margin-top:10px;"></audio>
                    </div>
                    <label>Окуучу аудиону максимум канча жолу уга алат?</label>
                    <input type="number" id="max-plays" value="3" min="1" max="10">
                    <label>Тапшырманын шарты (Окуучуга көрүнөт)</label>
                    <textarea id="d-prompt" rows="3" placeholder="Мисалы: Аудиону кунт коюп угуп, катасыз жазыңыз. Жоопту текст менен же үн менен жөнөтсөңүз болот."></textarea>
                `;
            } else if(currentTestType === 'pisa') {
                area.innerHTML = `
                    <div class="pisa-context">
                        <label style="color:#00f0ff;">📖 Негизги Текст (Контекст):</label>
                        <textarea id="pisa-text" rows="5" placeholder="Бул жерге чоң текстти, макаланы же окуяны жазыңыз... Ушул тексттин негизинде суроолор берилет."></textarea>
                    </div>
                    <label>Суроо 1:</label>
                    <input type="text" id="pisa-q1" placeholder="Суроо...">
                    <input type="text" id="pisa-a1" placeholder="Туура жооп">
                `;
            } else {
                area.innerHTML = `
                    <p style="color:#a5b4fc; font-size:0.9rem;">Жөнөкөй тест режими.</p>
                    <label>Суроо:</label>
                    <input type="text" id="std-q">
                    <label>Туура жооп:</label>
                    <input type="text" id="std-a">
                `;
            }
        }

        // --- АУДИО ЖАЗДЫРУУ ЛОГИКАСЫ (Браузердин API'си) ---
        async function toggleTeacherRecord() {
            const btn = document.getElementById('btn-record');
            if(mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                btn.innerText = "🔴 Жаңыдан жаздыруу";
                btn.classList.remove('btn-green'); btn.classList.add('btn-red');
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { 'type' : 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            teacherAudioBase64 = reader.result;
                            const preview = document.getElementById('teacher-audio-preview');
                            preview.src = teacherAudioBase64;
                            preview.style.display = "block";
                        }
                    };
                    mediaRecorder.start();
                    btn.innerText = "⏹️ Жаздырууну токтотуу";
                    btn.classList.remove('btn-red'); btn.classList.add('btn-green');
                } catch(err) {
                    alert("Микрофонго уруксат берилген жок же браузер колдобойт!");
                }
            }
        }

        async function toggleStudentRecord() {
            const btn = document.getElementById('btn-s-record');
            if(mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                btn.innerText = "🎙️ Жаңыдан жаздыруу";
                btn.classList.remove('btn-red');
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { 'type' : 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            studentAudioBase64 = reader.result;
                            const preview = document.getElementById('student-audio-preview');
                            preview.src = studentAudioBase64;
                            preview.style.display = "block";
                        }
                    };
                    mediaRecorder.start();
                    btn.innerText = "⏹️ Токтотуу";
                    btn.classList.add('btn-red');
                } catch(err) {
                    alert("Микрофонго уруксат керек!");
                }
            }
        }

        // --- САКТОО ЖАНА КӨРСӨТҮҮ ---
        function saveTest() {
            const title = document.getElementById('t-title').value;
            if(!title) return alert("Аталышын жазыңыз!");

            let testObj = {
                id: "T-" + Math.floor(Math.random() * 9000),
                title: title,
                type: currentTestType,
                active: true
            };

            if(currentTestType === 'dictation') {
                if(!teacherAudioBase64) return alert("Аудио жаздырылган жок!");
                testObj.audioData = teacherAudioBase64;
                testObj.maxPlays = document.getElementById('max-plays').value;
                testObj.prompt = document.getElementById('d-prompt').value;
            } else if(currentTestType === 'pisa') {
                testObj.context = document.getElementById('pisa-text').value;
                testObj.q = document.getElementById('pisa-q1').value;
                testObj.a = document.getElementById('pisa-a1').value;
            } else {
                testObj.q = document.getElementById('std-q').value;
                testObj.a = document.getElementById('std-a').value;
            }

            tests.push(testObj);
            localStorage.setItem('bm_v3_tests', JSON.stringify(tests));
            renderTeacherTests();
            alert("Сакталды!");
        }

        function renderTeacherTests() {
            const list = document.getElementById('teacher-tests-list');
            list.innerHTML = '';
            tests.forEach(t => {
                let typeName = t.type === 'dictation' ? '🎙️ Диктант' : (t.type === 'pisa' ? '📖 PISA' : '📝 Стандарт');
                list.innerHTML += `
                    <div class="test-list-item">
                        <div>
                            <strong>${t.title}</strong>
                            <p style="font-size:0.8rem; color:#a5b4fc;">ID: ${t.id} | ${typeName}</p>
                        </div>
                        <button class="btn btn-red" onclick="deleteTest('${t.id}')">Өчүрүү</button>
                    </div>
                `;
            });
        }
        function deleteTest(id) { tests = tests.filter(t => t.id !== id); localStorage.setItem('bm_v3_tests', JSON.stringify(tests)); renderTeacherTests(); }

        // --- ОКУУЧУНУН РЕЖИМИ ---
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('testid')) {
                document.getElementById('tabs').style.display = 'none';
                document.getElementById('teacher-panel').remove();
                switchTab('student');
                document.getElementById('s-testid').value = urlParams.get('testid');
            } else {
                changeTestTypeUI(); renderTeacherTests(); renderResults();
            }
        };

        function startTest() {
            const id = document.getElementById('s-testid').value;
            currentActiveTest = tests.find(t => t.id === id);
            if(!currentActiveTest) return alert("Табылган жок!");

            document.getElementById('student-auth').style.display = 'none';
            document.getElementById('student-test-area').style.display = 'block';
            document.getElementById('st-title').innerText = currentActiveTest.title;
            
            const area = document.getElementById('st-content');
            studentAudioBase64 = null;

            if(currentActiveTest.type === 'dictation') {
                audioPlayCount = 0;
                area.innerHTML = `
                    <p style="color:#00f0ff; margin-bottom:15px;">${currentActiveTest.prompt}</p>
                    <div class="audio-recorder">
                        <button class="btn btn-green" id="s-play-btn" onclick="playDictation()">▶️ Мугалимди угуу</button>
                        <p id="play-limit-txt" style="margin-top:10px; font-size:0.9rem; color:#ff4444;">Угуу мүмкүнчүлүгү: ${currentActiveTest.maxPlays} жолу калды</p>
                        <audio id="s-dictation-audio" src="${currentActiveTest.audioData}" style="display:none;"></audio>
                    </div>
                    
                    <h4 style="margin:20px 0 10px;">Жообун жазуу:</h4>
                    <textarea id="s-answer-text" rows="5" placeholder="Эссени же диктантты ушул жерге жазыңыз..."></textarea>
                    
                    <h4 style="margin:20px 0 10px;">ЖЕ оозеки жооп берүү:</h4>
                    <button class="btn" id="btn-s-record" onclick="toggleStudentRecord()">🎙️ Үн менен жооп кайтаруу</button>
                    <audio id="student-audio-preview" controls style="display:none; width:100%; margin-top:10px;"></audio>
                `;
                
                const aud = document.getElementById('s-dictation-audio');
                aud.onended = () => {
                    document.getElementById('s-play-btn').innerText = "▶️ Кайталоо";
                    document.getElementById('s-play-btn').disabled = false;
                };

            } else if(currentActiveTest.type === 'pisa') {
                area.innerHTML = `
                    <div class="pisa-context" style="font-size:1.1rem; line-height:1.6;">
                        ${currentActiveTest.context}
                    </div>
                    <p style="font-weight:bold; margin-bottom:10px;">Суроо: ${currentActiveTest.q}</p>
                    <textarea id="s-answer-text" rows="3" placeholder="Жообуңузду кенен жазыңыз..."></textarea>
                `;
            } else {
                area.innerHTML = `
                    <p style="font-weight:bold; margin-bottom:10px;">${currentActiveTest.q}</p>
                    <input type="text" id="s-answer-text" placeholder="Жоопту жазыңыз">
                `;
            }
        }

        function playDictation() {
            const aud = document.getElementById('s-dictation-audio');
            const btn = document.getElementById('s-play-btn');
            const limitTxt = document.getElementById('play-limit-txt');
            
            if(audioPlayCount < currentActiveTest.maxPlays) {
                aud.play();
                audioPlayCount++;
                btn.disabled = true;
                btn.innerText = "Угулуп жатат...";
                limitTxt.innerText = `Угуу мүмкүнчүлүгү: ${currentActiveTest.maxPlays - audioPlayCount} жолу калды`;
                
                if(audioPlayCount >= currentActiveTest.maxPlays) {
                    btn.style.display = 'none';
                    limitTxt.innerText = "❌ Лимит бүттү! Эми уга албайсыз.";
                }
            }
        }

        function submitAnswers() {
            let textAns = document.getElementById('s-answer-text') ? document.getElementById('s-answer-text').value : "";
            
            let res = {
                name: document.getElementById('s-name').value,
                class: document.getElementById('s-class').value,
                testTitle: currentActiveTest.title,
                type: currentActiveTest.type,
                textAnswer: textAns,
                audioAnswer: studentAudioBase64
            };

            results.push(res);
            localStorage.setItem('bm_v3_results', JSON.stringify(results));
            alert("Жыйынтык жөнөтүлдү!");
            location.reload();
        }

        // --- ЖЫЙЫНТЫКТАРДЫ МУГАЛИМГЕ КӨРСӨТҮҮ ---
        function renderResults() {
            const list = document.getElementById('teacher-results-list');
            if(!list) return;
            list.innerHTML = '';
            results.forEach(r => {
                let audioHtml = r.audioAnswer ? `<audio controls src="${r.audioAnswer}" style="width:100%; margin-top:10px;"></audio>` : '';
                list.innerHTML += `
                    <div class="result-item">
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px; margin-bottom:10px;">
                            <strong>${r.name} (${r.class})</strong>
                            <span style="color:#00f0ff;">${r.testTitle}</span>
                        </div>
                        ${r.textAnswer ? `<p style="color:#e2e8f0; font-size:0.95rem; white-space:pre-wrap;">${r.textAnswer}</p>` : ''}
                        ${audioHtml}
                    </div>
                `;
            });
        }
        function clearResults() { if(confirm("Баарын өчүрөсүзбү?")) { results = []; localStorage.setItem('bm_v3_results', '[]'); renderResults(); } }
    </script>
</body>
</html>
