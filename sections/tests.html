<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiliMal.org — Тест Борбору</title>
    <style>
        /* --- БАЗАЛЫК СТИЛДЕР --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #05050f; color: #fff; min-height: 100vh; padding-top: 80px; }

        /* --- HEADER --- */
        header { 
            background: rgba(5, 5, 15, 0.9); backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(0, 240, 255, 0.2); 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: fixed; width: 100%; top: 0; z-index: 100; 
        }
        .logo { 
            font-size: 1.8rem; font-weight: 900; 
            background: linear-gradient(45deg, #00f0ff, #b533ff); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            text-decoration: none; 
        }
        .header-right { display: flex; gap: 15px; align-items: center; }
        .lang-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;}
        .lang-btn.active { background: #00f0ff; color: #000; border-color: #00f0ff; font-weight: bold; }
        .back-btn { color: #aaa; text-decoration: none; font-size: 0.9rem; }
        .back-btn:hover { color: #fff; }

        /* --- РОЛЬ ТАНДОО --- */
        .role-selector { display: flex; justify-content: center; gap: 15px; margin: 20px 0 40px; }
        .role-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid #333; color: #aaa; 
            padding: 12px 30px; border-radius: 25px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 1rem;
        }
        .role-btn.active-teacher { background: #00f0ff; color: #000; border-color: #00f0ff; box-shadow: 0 0 20px rgba(0,240,255,0.4); }
        .role-btn.active-student { background: #b533ff; color: #fff; border-color: #b533ff; box-shadow: 0 0 20px rgba(181,51,255,0.4); }

        /* --- КОНТЕЙНЕР ЖАНА ТОР (GRID) --- */
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        /* --- БЛОКТОР (CARDS) --- */
        .card { 
            background: rgba(15, 15, 25, 0.8); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 12px; padding: 30px; margin-bottom: 25px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .card h3 { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; font-size: 1.3rem; }
        .card h3.cyan { color: #00f0ff; text-shadow: 0 0 10px rgba(0,240,255,0.3); }
        .card h3.magenta { color: #ff3366; }

        /* --- ФОРМА ЭЛЕМЕНТТЕРИ --- */
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #a1a1aa; font-size: 0.9rem; margin-bottom: 8px; font-weight: 500;}
        input[type="text"], select, textarea { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.6); border: 1px solid #27273a; 
            border-radius: 8px; color: #fff; outline: none; transition: 0.3s; font-size: 0.95rem;
        }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: #b533ff; box-shadow: 0 0 10px rgba(181,51,255,0.2); }
        textarea { resize: vertical; min-height: 100px; }

        .flex-row { display: flex; gap: 15px; }
        .flex-row .form-group { flex: 1; }

        /* --- БАСКЫЧТАР --- */
        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; transition: 0.2s; color: #fff; font-size: 1rem;
        }
        .btn-primary { background: linear-gradient(90deg, #3366ff, #b533ff); box-shadow: 0 4px 15px rgba(181,51,255,0.3);}
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 4px 20px rgba(181,51,255,0.6); transform: translateY(-1px);}
        .btn-danger { background: #ef4444; color: white; width: auto; padding: 8px 16px; font-size: 0.85rem; border-radius: 6px;}
        .btn-danger:hover { background: #dc2626; }
        .btn-copy { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: auto; padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; cursor: pointer;}
        .btn-copy:hover { background: rgba(255,255,255,0.2); }

        /* --- ТИЗМЕЛЕР --- */
        .list-container { max-height: 500px; overflow-y: auto; padding-right: 5px;}
        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-thumb { background: #27273a; border-radius: 3px; }

        .list-item { 
            background: rgba(0,0,0,0.4); border: 1px solid #27273a; border-radius: 10px; 
            padding: 18px; margin-bottom: 12px; transition: 0.2s;
        }
        .list-item:hover { border-color: #4b4b6b; }
        .list-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;}
        .item-info h4 { color: #fff; font-size: 1.1rem; margin-bottom: 5px; }
        .item-info .badge { background: rgba(0,240,255,0.1); color: #00f0ff; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; border: 1px solid rgba(0,240,255,0.3); margin-right: 5px;}
        .item-actions { display: flex; gap: 8px; }
        
        /* Жыйынтыктар үчүн */
        .result-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 6px; margin-top: 10px; border-left: 3px solid #b533ff;}
        .result-status { font-weight: bold; font-size: 0.9rem; text-align: right; margin-top: 5px;}

        /* --- ПАНЕЛДЕРДИ ЖАШЫРУУ --- */
        .panel { display: none; animation: fadeIn 0.4s ease-in-out; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* --- ОКУУЧУ РЕЖИМИ ҮЧҮН --- */
        .student-test-area { max-width: 700px; margin: 0 auto; }
        .pisa-scenario { background: #0a0a14; padding: 25px; border-radius: 8px; border-left: 4px solid #b533ff; margin-bottom: 25px; line-height: 1.6; color: #e2e8f0; font-size: 1.05rem;}
        .question-box { background: rgba(0,240,255,0.05); padding: 20px; border-radius: 8px; border: 1px solid rgba(0,240,255,0.2); margin-bottom: 25px; font-size: 1.1rem;}
        
        /* Варианттар (Окуучу үчүн) */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .option-label { 
            display: block; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid #27273a; 
            border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .option-label:hover { background: rgba(255,255,255,0.05); border-color: #00f0ff; }
        .option-label input[type="radio"] { accent-color: #00f0ff; transform: scale(1.2); }
        
        /* Switch */
        .switch-container { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px;}
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00f0ff; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">BiliMal.org</a>
        <div class="header-right">
            <button class="lang-btn active">Кыргызча</button>
            <button class="lang-btn">Русский</button>
            <a href="#" class="back-btn">← Башкы бетке кайтуу</a>
        </div>
    </header>

    <div class="container">
        <div class="role-selector">
            <button class="role-btn active-teacher" id="btnTeacher" onclick="switchRole('teacher')">👩‍🏫 Мугалимдин Башкаруу Панели</button>
            <button class="role-btn" id="btnStudent" onclick="switchRole('student')">🎒 Окуучунун Тест Тапшыруусу</button>
        </div>

        <div id="teacherPanel" class="panel active">
            <div class="grid">
                
                <div class="card">
                    <h3 class="cyan">🛠 Жаңы Тапшырма / Тест Түзүү</h3>
                    
                    <div class="form-group">
                        <label>Тапшырманын аталышы (Темасы)</label>
                        <input type="text" id="testTitle" placeholder="Мисалы: 10-класс Физика: Омдун мыйзамы">
                    </div>
                    
                    <div class="form-group">
                        <label>Тапшырманын Түрүн Тандаңыз:</label>
                        <select id="testType" onchange="toggleFormFields()">
                            <option value="simple">1. Жөнөкөй Тест (А/Б варианттары менен)</option>
                            <option value="pisa">2. PISA Тест (Текст/Кырдаал жана Суроо)</option>
                            <option value="essay">3. Аудио-Диктант / Ачык Эссе</option>
                        </select>
                    </div>

                    <div id="dynamicFields">
                        </div>

                    <div class="switch-container">
                        <span style="font-size: 0.9rem; color: #a1a1aa; font-weight: bold;">🛡 Anti-Cheat V4 Кошуу</span>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <button class="btn btn-primary" onclick="saveTest()" style="margin-top: 15px;">💾 Тестти Базага Сактоо</button>
                </div>

                <div class="right-column">
                    
                    <div class="card">
                        <h3 class="cyan">📋 Активдүү Тесттердин Тизмеси</h3>
                        <div class="list-container" id="activeTestsList">
                            </div>
                    </div>

                    <div class="card">
                        <h3 class="cyan">📊 Жыйынтыктар & Мониторинг</h3>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
                            <select style="width: 60%; margin: 0; padding: 10px;"><option>Бардык класстар</option></select>
                            <button class="btn-danger" onclick="clearResults()">Тазалоо</button>
                        </div>
                        <div class="list-container" id="resultsList">
                            </div>
                    </div>

                </div>
            </div>
        </div>

        <div id="studentPanel" class="panel">
            
            <div class="card student-test-area" id="studentLoginArea">
                <h3 class="magenta">📝 Тестке Доступ Алуу</h3>
                <div class="form-group">
                    <label style="text-align: left;">Аты-жөнүңүз:</label>
                    <input type="text" id="studentName" placeholder="Мисалы: Асия">
                </div>
                <div class="form-group">
                    <label style="text-align: left;">Классыңыз:</label>
                    <select id="studentClass">
                        <option>10 "А" класс</option>
                        <option>10 "Б" класс</option>
                        <option>11 "А" класс</option>
                    </select>
                </div>
                <div class="form-group">
                    <label style="text-align: left;">Шилтемедеги Тесттин ID коду (Мугалимден алыңыз):</label>
                    <input type="text" id="studentTestId" placeholder="Мисалы: TEST-1234">
                </div>
                <button class="btn btn-primary" style="background: linear-gradient(90deg, #b533ff, #ff3366);" onclick="startTest()">Баштоо 🚀</button>
            </div>

            <div class="card student-test-area panel" id="studentTestProcessArea">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #27273a; padding-bottom: 15px; margin-bottom: 20px;">
                    <h3 class="cyan" id="displayTestTitle" style="margin: 0;">Тесттин аталышы</h3>
                    <span id="displayTestTypeBadge" class="badge" style="background: rgba(181,51,255,0.2); color: #b533ff; padding: 5px 10px; border-radius: 5px;">Тиби</span>
                </div>

                <div id="testContentArea">
                    </div>
                
                <button class="btn btn-primary" style="background: #00f0ff; color: #000; margin-top: 25px;" onclick="submitAnswer()">Жоопту Жөнөтүү ✅</button>
            </div>

            <div class="card student-test-area panel" id="studentSuccessArea" style="text-align: center; padding: 50px 20px;">
                <h2 style="color: #00f0ff; margin-bottom: 15px;">🎉 Ийгиликтүү аяктады!</h2>
                <p style="color: #a1a1aa; margin-bottom: 30px;">Сиздин жообуңуз мугалимге жөнөтүлдү. Жыйынтыгын мугалимден биле аласыз.</p>
                <button class="btn-copy" onclick="location.reload()" style="padding: 10px 20px;">Башка тест тапшыруу</button>
            </div>

        </div>
    </div>

    <script>
        let currentActiveTestForStudent = null;

        // --- 1. ФОРМАЛАРДЫ АЛМАШТЫРУУ (Мугалим) ---
        function toggleFormFields() {
            const type = document.getElementById('testType').value;
            const container = document.getElementById('dynamicFields');
            let html = '';

            if (type === 'simple') {
                html = `
                    <div class="form-group">
                        <label>Суроо тексти:</label>
                        <textarea id="t_question" placeholder="Суроону жазыңыз..."></textarea>
                    </div>
                    <div class="flex-row">
                        <div class="form-group">
                            <label>А варианты:</label>
                            <input type="text" id="t_optA" placeholder="Вариант А">
                        </div>
                        <div class="form-group">
                            <label>Б варианты:</label>
                            <input type="text" id="t_optB" placeholder="Вариант Б">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Туура жоопту тандаңыз:</label>
                        <select id="t_correctOpt">
                            <option value="A">А варианты туура</option>
                            <option value="B">Б варианты туура</option>
                        </select>
                    </div>
                `;
            } else if (type === 'pisa') {
                html = `
                    <div class="form-group">
                        <label>PISA: Негизги Текст / Окуя (Кырдаал):</label>
                        <textarea id="t_pisaText" placeholder="Бул жерге окуучу окуп түшүнө турган чоң текстти же кырдаалды жазыңыз..." style="min-height: 150px;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Текст боюнча суроо / Маселе:</label>
                        <textarea id="t_question" placeholder="Окуучу кандай суроого жооп бериши керек?"></textarea>
                    </div>
                `;
            } else if (type === 'essay') {
                html = `
                    <div class="form-group">
                        <label>Тапшырманын шарты (Окуучуга көрүнөт):</label>
                        <textarea id="t_question" placeholder="Эссенин темасын же диктанттын шартын жазыңыз..."></textarea>
                    </div>
                    <div class="form-group" style="border: 1px dashed #27273a; padding: 15px; border-radius: 8px; text-align: center;">
                        <span style="color: #a1a1aa; font-size: 0.9rem;">🎤 Аудио жазуу (Пландоодо)</span>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // --- 2. РОЛДОРДУ КОТОРУУ ---
        function switchRole(role) {
            document.getElementById('teacherPanel').classList.remove('active');
            document.getElementById('studentPanel').classList.remove('active');
            document.getElementById('btnTeacher').classList.remove('active-teacher');
            document.getElementById('btnStudent').classList.remove('active-student');

            if(role === 'teacher') {
                document.getElementById('teacherPanel').classList.add('active');
                document.getElementById('btnTeacher').classList.add('active-teacher');
                renderTests();
                renderResults();
            } else {
                document.getElementById('studentPanel').classList.add('active');
                document.getElementById('btnStudent').classList.add('active-student');
                
                // Reset student view
                document.getElementById('studentLoginArea').classList.add('active');
                document.getElementById('studentTestProcessArea').classList.remove('active');
                document.getElementById('studentSuccessArea').classList.remove('active');
            }
        }

        // --- 3. ТЕСТТИ САКТОО ---
        function saveTest() {
            const title = document.getElementById('testTitle').value.trim();
            const type = document.getElementById('testType').value;
            
            if (!title) { alert("Тесттин аталышын жазыңыз!"); return; }

            const testId = 'TEST-' + Math.floor(1000 + Math.random() * 9000);
            let newTest = { id: testId, title: title, type: type, date: new Date().toLocaleDateString() };

            if (type === 'simple') {
                newTest.question = document.getElementById('t_question').value.trim();
                newTest.optA = document.getElementById('t_optA').value.trim();
                newTest.optB = document.getElementById('t_optB').value.trim();
                newTest.correct = document.getElementById('t_correctOpt').value;
                if(!newTest.question || !newTest.optA || !newTest.optB) { alert("Суроону жана варианттарды толук толтуруңуз!"); return; }
            } 
            else if (type === 'pisa') {
                newTest.pisaText = document.getElementById('t_pisaText').value.trim();
                newTest.question = document.getElementById('t_question').value.trim();
                if(!newTest.pisaText || !newTest.question) { alert("PISA текстин жана суроону жазыңыз!"); return; }
            } 
            else if (type === 'essay') {
                newTest.question = document.getElementById('t_question').value.trim();
                if(!newTest.question) { alert("Тапшырманын шартын жазыңыз!"); return; }
            }

            let tests = JSON.parse(localStorage.getItem('biliMalTests')) || [];
            tests.push(newTest);
            localStorage.setItem('biliMalTests', JSON.stringify(tests));

            // Форманы тазалоо
            document.getElementById('testTitle').value = '';
            toggleFormFields(); 

            alert(`✅ Тест сакталды! ID: ${testId}`);
            renderTests();
        }

        // --- 4. ТЕСТТЕРДИ ЭКРАНГА ЧЫГАРУУ (Мугалим) ---
        function renderTests() {
            const container = document.getElementById('activeTestsList');
            container.innerHTML = '';
            let tests = JSON.parse(localStorage.getItem('biliMalTests')) || [];

            if (tests.length === 0) {
                container.innerHTML = '<p style="color: #666;">Тесттер жок.</p>'; return;
            }

            tests.reverse().forEach(test => {
                let typeName = test.type === 'simple' ? 'Жөнөкөй' : test.type === 'pisa' ? 'PISA Тест' : 'Эссе';
                
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="list-item-header">
                        <div class="item-info">
                            <h4>${test.title}</h4>
                            <span class="badge">Код: ${test.id}</span>
                            <span class="badge" style="color:#aaa; border-color:#333;">${typeName}</span>
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-copy" onclick="copyId('${test.id}')">🔗 Кодду көчүрүү</button>
                        <button class="btn-danger" onclick="deleteTest('${test.id}')">🗑</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function copyId(id) {
            navigator.clipboard.writeText(id);
            alert("Код көчүрүлдү: " + id);
        }

        function deleteTest(id) {
            if (confirm("Өчүрүүнү ырастайсызбы?")) {
                let tests = JSON.parse(localStorage.getItem('biliMalTests')) || [];
                tests = tests.filter(t => t.id !== id);
                localStorage.setItem('biliMalTests', JSON.stringify(tests));
                renderTests();
            }
        }

        // --- 5. ТЕСТТИ БАШТОО (Окуучу) ---
        function startTest() {
            const name = document.getElementById('studentName').value.trim();
            const sClass = document.getElementById('studentClass').value;
            const testId = document.getElementById('studentTestId').value.trim();

            if (!name || !testId) { alert("Атыңызды жана ID кодду жазыңыз!"); return; }

            let tests = JSON.parse(localStorage.getItem('biliMalTests')) || [];
            const foundTest = tests.find(t => t.id === testId);

            if (foundTest) {
                currentActiveTestForStudent = foundTest;
                currentActiveTestForStudent.studentName = name;
                currentActiveTestForStudent.studentClass = sClass;
                
                document.getElementById('studentLoginArea').classList.remove('active');
                document.getElementById('studentTestProcessArea').classList.add('active');
                
                document.getElementById('displayTestTitle').innerText = foundTest.title;
                
                let typeBadge = foundTest.type === 'simple' ? 'Жөнөкөй Тест' : foundTest.type === 'pisa' ? 'PISA Кырдаалдык Тест' : 'Эссе / Ачык суроо';
                document.getElementById('displayTestTypeBadge').innerText = typeBadge;

                const contentArea = document.getElementById('testContentArea');
                let html = '';

                if (foundTest.type === 'simple') {
                    html = `
                        <div class="question-box">${foundTest.question}</div>
                        <div class="options-grid">
                            <label class="option-label">
                                <input type="radio" name="studentAns" value="A"> А) ${foundTest.optA}
                            </label>
                            <label class="option-label">
                                <input type="radio" name="studentAns" value="B"> Б) ${foundTest.optB}
                            </label>
                        </div>
                    `;
                } else if (foundTest.type === 'pisa') {
                    html = `
                        <div class="pisa-scenario"><strong>Кырдаал (Окуу үчүн текст):</strong><br><br>${foundTest.pisaText}</div>
                        <div class="question-box"><strong>Суроо:</strong><br>${foundTest.question}</div>
                        <div class="form-group">
                            <label>Сиздин кеңири жообуңуз:</label>
                            <textarea id="studentTextAns" placeholder="Жоопту негиздеп жазыңыз..."></textarea>
                        </div>
                    `;
                } else if (foundTest.type === 'essay') {
                    html = `
                        <div class="question-box"><strong>Тапшырма:</strong><br>${foundTest.question}</div>
                        <div class="form-group">
                            <label>Жообуңуз / Эссеңиз:</label>
                            <textarea id="studentTextAns" placeholder="Бул жерге жазыңыз..."></textarea>
                        </div>
                    `;
                }
                contentArea.innerHTML = html;

            } else {
                alert("Ката! Мындай код менен тест табылган жок.");
            }
        }

        // --- 6. ЖООПТУ ЖӨНӨТҮҮ (Окуучу) ---
        function submitAnswer() {
            let answerVal = "";
            let status = "Текшерилүүдө";
            let color = "#b533ff";

            if (currentActiveTestForStudent.type === 'simple') {
                const selected = document.querySelector('input[name="studentAns"]:checked');
                if (!selected) { alert("Вариантты тандаңыз!"); return; }
                answerVal = selected.value; // A же B
                
                if (answerVal === currentActiveTestForStudent.correct) {
                    status = "Туура (100%)"; color = "#00f0ff";
                } else {
                    status = "Ката (0%)"; color = "#ef4444";
                }
                answerVal = answerVal === 'A' ? "А варианты" : "Б варианты";
            } else {
                answerVal = document.getElementById('studentTextAns').value.trim();
                if (!answerVal) { alert("Жоопту жазыңыз!"); return; }
                status = "Мугалим текшерет ⏳";
            }

            const resultObj = {
                student: currentActiveTestForStudent.studentName,
                sClass: currentActiveTestForStudent.studentClass,
                testId: currentActiveTestForStudent.id,
                testTitle: currentActiveTestForStudent.title,
                answer: answerVal,
                status: status,
                color: color,
                time: new Date().toLocaleTimeString()
            };

            let results = JSON.parse(localStorage.getItem('biliMalResults')) || [];
            results.push(resultObj);
            localStorage.setItem('biliMalResults', JSON.stringify(results));

            document.getElementById('studentTestProcessArea').classList.remove('active');
            document.getElementById('studentSuccessArea').classList.add('active');
        }

        // --- 7. ЖЫЙЫНТЫКТАРДЫ КӨРСӨТҮҮ (Мугалим) ---
        function renderResults() {
            const container = document.getElementById('resultsList');
            container.innerHTML = '';
            let results = JSON.parse(localStorage.getItem('biliMalResults')) || [];

            if (results.length === 0) {
                container.innerHTML = '<p style="color: #666;">Азырынча жооптор жок.</p>'; return;
            }

            results.reverse().forEach(res => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="item-info">
                        <h4>👤 ${res.student} <span style="font-size:0.8rem; color:#a1a1aa; font-weight:normal;">(${res.sClass} | ${res.time})</span></h4>
                        <p style="color: #a1a1aa; font-size: 0.85rem; margin-bottom: 8px;">Тест: ${res.testTitle}</p>
                        <div class="result-box">
                            <p style="font-size:0.9rem; color:#e2e8f0;">📝 <strong>Жооп:</strong> ${res.answer}</p>
                        </div>
                    </div>
                    <div class="result-status" style="color: ${res.color};">${res.status}</div>
                `;
                container.appendChild(div);
            });
        }

        function clearResults() {
            if(confirm("Бардык жоопторду тазалайсызбы?")) {
                localStorage.removeItem('biliMalResults');
                renderResults();
            }
        }

        // Башталгыч жүктөө
        window.onload = function() {
            toggleFormFields();
            renderTests();
            renderResults();
        };
    </script>
</body>
</html>
