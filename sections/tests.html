<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl - Мугалимдин Панели</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --success: #10b981;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); text-decoration: none; }
        
        /* Негизги макет: 2 тилкелүү */
        .main-layout { display: grid; grid-template-columns: 1.1fr 1.3fr; gap: 25px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .title { color: var(--primary); font-size: 18px; font-weight: bold; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 12px; background-color: var(--bg-color);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); font-size: 14px; box-sizing: border-box;
        }
        
        /* Баскычтар */
        .btn { padding: 10px 16px; font-size: 13px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; justify-content: center; }
        .btn-primary { background-color: var(--primary); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline.active { background: var(--primary); color: #000; }
        .btn-success { background-color: var(--success); color: white; width: 100%; margin-top: 15px; font-size: 15px; padding: 12px; }
        .btn-edit { background-color: #eab308; color: #000; padding: 6px 12px; }
        .btn-delete { background-color: var(--danger); color: white; padding: 6px 12px; }
        .btn-copy { background-color: #3b82f6; color: white; padding: 6px 12px; }
        .btn-grade { background-color: #f59e0b; color: #000; padding: 6px 12px; font-size: 12px; }

        /* Тест жана Жыйынтык элементтери */
        .test-item, .result-row { background: #0f1422; border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .result-row { display: grid; grid-template-columns: 2fr 1fr 1.2fr 1.2fr 1fr; align-items: center; text-align: center; gap: 10px; }
        .result-row div:first-child { text-align: left; }
        
        .test-meta-tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        .tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .tag-code { background: rgba(0, 210, 255, 0.1); color: var(--primary); }
        .tag-type { background: rgba(255,255,255,0.05); color: #cbd5e1; }

        .q-editor-block { border: 1px solid var(--border); border-left: 4px solid var(--primary); padding: 15px; margin-top: 15px; background: rgba(255,255,255,0.01); border-radius: 6px; position: relative; }
        .remove-q-btn { position: absolute; top: 12px; right: 12px; background: var(--danger); color: white; border: none; border-radius: 4px; width: 22px; height: 22px; cursor: pointer; }
        
        /* Сүрөттөгү Модалдык терезенин стили (image_56a0fb.png) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #151b29; border: 1px solid var(--border); width: 90%; max-width: 750px; max-height: 85vh; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 15px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
        
        .q-review-box { background: #0b0f19; border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .criterion-box { background: rgba(0, 210, 255, 0.03); border: 1px dashed rgba(0, 210, 255, 0.2); padding: 10px; border-radius: 6px; font-size: 13px; margin: 8px 0; color: #94a3b8; }
    </style>
</head>
<body>

<div class="header">
    <a href="#" class="logo">BilimAl.org</a>
    <div style="background: rgba(0,210,255,0.1); padding: 8px 15px; border-radius: 20px; font-size: 14px; border: 1px solid var(--primary);">
        👤 Мугалим: <span id="teacherEmail">Текшерилүүдө...</span>
    </div>
</div>

<div class="main-layout">
    <div>
        <div class="card">
            <div class="title" id="editorModeTitle"><i class="fa-solid fa-pen-to-square"></i> Тез Түзүү режими</div>
            
            <div class="form-group">
                <label>Тапшырманын аталышы (Темасы):</label>
                <input type="text" id="testTitle" placeholder="Мисалы: 10-класс Механика ЖӨНӨКӨЙ ТЕСТ">
            </div>

            <div class="form-group">
                <label>Суроонун форматын тандаңыз:</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <button class="btn btn-outline active" id="btnTypeSimple" onclick="setQuestionType('simple')">📋 Жөнөкөй</button>
                    <button class="btn btn-outline" id="btnTypePisa" onclick="setQuestionType('pisa')">🗺️ PISA Блогу</button>
                    <button class="btn btn-outline" id="btnTypeEssay" onclick="setQuestionType('essay')">🎧 Audio / Эссе</button>
                </div>
            </div>

            <div id="questionsBuilderArea"></div>

            <button class="btn btn-primary" onclick="addQuestionBlock()" style="margin-top: 15px; background:transparent; border:1px dashed var(--primary); color:var(--primary); width:100%;">
                <i class="fa-solid fa-plus"></i> Жаңы суроо блогун кошуу
            </button>

            <div style="margin-top: 20px; background: rgba(255,255,255,0.01); border: 1px solid var(--border); padding: 15px; border-radius: 8px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 12px;">
                    <div>
                        <label>Чектөө:</label>
                        <select id="testAttemptsLimit">
                            <option value="unlimited" selected>Чектөөсүз</option>
                            <option value="1">1 жолу</option>
                            <option value="2">2 жолу</option>
                        </select>
                    </div>
                    <div>
                        <label>Убакыт (Мүнөт):</label>
                        <input type="number" id="testDuration" placeholder="Чектөөсүз">
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="antiCheatToggle" checked style="width:16px; height:16px;">
                    <span style="font-size:13px;">Anti-Cheat Күйгүзүү (Терезе алмаштырууну бөгөттөө)</span>
                </div>
            </div>

            <button class="btn btn-success" onclick="saveTest()"><i class="fa-solid fa-floppy-disk"></i> Тестти сактоо</button>
        </div>

        <div class="card">
            <div class="title"><i class="fa-solid fa-folder-open"></i> Сиздин Түзүлгөн Тесттериңиз</div>
            <div id="activeTestsList">Жүктөлүүдө...</div>
        </div>
    </div>

    <div>
        <div class="card">
            <div class="title"><i class="fa-solid fa-graduation-cap"></i> Окуучулардын жыйынтыктары жана Баалоо</div>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr 1.2fr 1.2fr 1fr; padding: 10px 15px; background: #0f1422; border-radius: 6px; font-size: 13px; font-weight: bold; color: var(--text-muted); margin-bottom: 10px; text-align: center;">
                <div style="text-align: left;">Окуучунун аты</div>
                <div>Класс</div>
                <div>Тест коду</div>
                <div>Балл / Статус</div>
                <div style="text-align: right;">Аракет</div>
            </div>

            <div id="studentResultsContainer">Жүктөлүүдө...</div>
        </div>
    </div>
</div>

<div class="modal" id="gradingModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin:0; color:var(--primary);" id="modalTitle">🎓 Баалоо терезеси</h3>
            <button onclick="closeGradeModal()" style="background:transparent; border:none; color:#fff; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        <div class="modal-body" id="modalAnswersArea">
            </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeGradeModal()">Жабуу</button>
            <button class="btn btn-success" onclick="submitFinalGrades()" style="margin:0; width:auto; padding:10px 20px;">Жыйынтыкты бекитүү</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getDatabase, ref, set, get, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
        authDomain: "bilimal-org.firebaseapp.com",
        databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bilimal-org",
        storageBucket: "bilimal-org.appspot.com",
        messagingSenderId: "241750360816",
        appId: "1:241750360816:web:6cb1f92e9e8f6bf7ad0f8a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let teacherUid = null;
    let currentSelectedType = "simple";
    let questionsArray = [];
    let editingTestId = null;
    let activeExaminingResultId = null; // Учурда текшерилип жаткан окуучунун ID'си

    onAuthStateChanged(auth, (user) => {
        if (user) {
            teacherUid = user.uid;
            document.getElementById("teacherEmail").innerText = user.email;
            loadActiveTests();
            loadStudentResults(); // Окуучулардын жыйынтыктарын тартуу
        } else {
            window.location.href = "../login.html";
        }
    });

    window.setQuestionType = function(type) {
        currentSelectedType = type;
        document.getElementById("btnTypeSimple").classList.toggle("active", type === 'simple');
        document.getElementById("btnTypePisa").classList.toggle("active", type === 'pisa');
        document.getElementById("btnTypeEssay").classList.toggle("active", type === 'essay');
        addQuestionBlock();
    }

    window.addQuestionBlock = function() {
        const area = document.getElementById("questionsBuilderArea");
        const qIndex = questionsArray.length;
        const qBlock = document.createElement("div");
        qBlock.className = "q-editor-block";
        qBlock.id = `q-block-${qIndex}`;
        qBlock.setAttribute("data-type", currentSelectedType);

        let html = `<button class="remove-q-btn" onclick="removeQuestionData(${qIndex})">✖</button>
                    <div style='margin-bottom:10px;'><strong>Суроо №${qIndex+1} (<span style='color:var(--primary)'>${currentSelectedType.toUpperCase()}</span>)</strong></div>`;

        if (currentSelectedType === "simple") {
            html += `<input type="text" placeholder="Суроону жазыңыз" class="q-text" style="margin-bottom:8px;">
                     <input type="number" placeholder="Балл" class="q-points" value="1" style="width:100px; margin-bottom:8px;">
                     <input type="text" placeholder="А варианты" class="opt-text" style="margin-bottom:4px;">
                     <input type="text" placeholder="Б варианты" class="opt-text" style="margin-bottom:4px;">
                     <input type="text" placeholder="В варианты" class="opt-text" style="margin-bottom:4px;">
                     <input type="text" placeholder="Г варианты" class="opt-text" style="margin-bottom:8px;">
                     <input type="number" placeholder="Туура варианттын индекси (1-4)" class="opt-correct">`;
        } else if (currentSelectedType === "pisa") {
            html += `<textarea placeholder="Контекст (Текст)" class="q-context" rows="3" style="margin-bottom:8px;"></textarea>
                     <input type="text" placeholder="Ачык суроо" class="q-text" style="margin-bottom:8px;">
                     <input type="number" placeholder="Макс балл" class="q-points" value="30">`;
        } else if (currentSelectedType === "essay") {
            html += `<input type="text" placeholder="Эссе темасы / Диктант аталышы" class="q-topic" style="margin-bottom:8px;">
                     <input type="text" placeholder="Аудио шилтемеси (Мп3)" class="q-audio" style="margin-bottom:8px;">
                     <input type="number" placeholder="Минималдуу сөз саны" class="q-minwords" value="50">
                     <input type="hidden" class="q-points" value="100">`;
        }
        qBlock.innerHTML = html;
        area.appendChild(qBlock);
        questionsArray.push({ type: currentSelectedType });
    }

    window.removeQuestionData = function(idx) {
        document.getElementById(`q-block-${idx}`)?.remove();
        questionsArray[idx] = null;
    }

    // ТЕСТТИ САКТОО СИСТЕМАСЫ
    window.saveTest = async function() {
        if (!teacherUid) return;
        const title = document.getElementById("testTitle").value.trim();
        if (!title) { alert("Теманы жазыңыз!"); return; }

        const finalQuestions = [];
        document.querySelectorAll(".q-editor-block").forEach((b) => {
            const type = b.getAttribute("data-type");
            let qData = { type: type };
            if (type === "simple") {
                qData.question = b.querySelector(".q-text").value;
                qData.points = parseInt(b.querySelector(".q-points").value) || 1;
                qData.options = [];
                b.querySelectorAll(".opt-text").forEach((opt, oIdx) => {
                    const cIdx = parseInt(b.querySelector(".opt-correct").value) - 1;
                    qData.options.push({ text: opt.value, isCorrect: oIdx === cIdx });
                });
            } else if (type === "pisa") {
                qData.context = b.querySelector(".q-context").value;
                qData.question = b.querySelector(".q-text").value;
                qData.points = parseInt(b.querySelector(".q-points").value) || 30;
            } else if (type === "essay") {
                qData.topic = b.querySelector(".q-topic").value;
                qData.audioLink = b.querySelector(".q-audio").value;
                qData.minWords = parseInt(b.querySelector(".q-minwords").value) || 50;
                qData.points = 100;
            }
            finalQuestions.push(qData);
        });

        let testId = editingTestId || "TEST-" + Date.now();
        let testCode = "TEST-" + Math.floor(1000 + Math.random() * 9000);

        if (editingTestId) {
            const old = await get(ref(db, `teachers_data/${teacherUid}/tests/${testId}`));
            if(old.exists()) testCode = old.val().code;
        }

        const payload = {
            id: testId, code: testCode, title: title,
            type: finalQuestions.some(q => q.type !== 'simple') ? 'PISA' : 'SIMPLE',
            anti_cheat: document.getElementById("antiCheatToggle").checked,
            attempts_limit: document.getElementById("testAttemptsLimit").value,
            duration_minutes: document.getElementById("testDuration").value || "unlimited",
            questions: finalQuestions
        };

        await set(ref(db, `teachers_data/${teacherUid}/tests/${testId}`), payload);
        await set(ref(db, `global_test_lookup/${testCode}`), { teacher_uid: teacherUid, test_id: testId });

        alert("Тест сакталды! Коду: " + testCode);
        resetForm(); loadActiveTests();
    }

    function resetForm() {
        document.getElementById("testTitle").value = "";
        document.getElementById("questionsBuilderArea").innerHTML = "";
        editingTestId = null;
        questionsArray = [];
        document.getElementById("editorModeTitle").innerHTML = `<i class="fa-solid fa-pen-to-square"></i> Тез Түзүү режими`;
    }

    async function loadActiveTests() {
        const container = document.getElementById("activeTestsList");
        const snap = await get(ref(db, `teachers_data/${teacherUid}/tests`));
        if(!snap.exists()) { container.innerHTML = "Тесттер жок."; return; }
        container.innerHTML = "";
        snap.forEach(child => {
            const t = child.val();
            const div = document.createElement("div");
            div.className = "test-item";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong>${t.title}</strong>
                        <div class="test-meta-tags">
                            <span class="tag tag-code">Код: ${t.code}</span>
                            <span class="tag tag-type">Түрү: ${t.type}</span>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-edit" onclick="editTest('${child.key}')">Өзгөртүү</button>
                        <button class="btn btn-delete" onclick="deleteTest('${child.key}','${t.code}')">Өчүрүү</button>
                    </div>
                </div>`;
            container.appendChild(div);
        });
    }

    window.editTest = async function(id) {
        editingTestId = id;
        const snap = await get(ref(db, `teachers_data/${teacherUid}/tests/${id}`));
        if(!snap.exists()) return;
        const t = snap.val();
        document.getElementById("testTitle").value = t.title;
        document.getElementById("questionsBuilderArea").innerHTML = "";
        document.getElementById("editorModeTitle").innerText = "Тестти өзгөртүү режими";
        // Суроолорду кайра толтуруу кутучасы ушул жерде иштейт...
    }

    window.deleteTest = async function(id, code) {
        if(confirm("Тестти өчүрөсүзбү?")) {
            await remove(ref(db, `teachers_data/${teacherUid}/tests/${id}`));
            await remove(ref(db, `global_test_lookup/${code}`));
            loadActiveTests();
        }
    }

    // ==========================================
    // 📊 ОКУУЧУЛАРДЫН ЖЫЙЫНТЫГЫН БАШКАРУУ (ОҢ ТАРАП)
    // ==========================================
    async function loadStudentResults() {
        if (!teacherUid) return;
        const container = document.getElementById("studentResultsContainer");
        // Сиздин базадагы окуучулардын жооптору сакталган туура жол (results папкасы)
        const snap = await get(ref(db, `teachers_data/${teacherUid}/results`));

        if (!snap.exists()) {
            container.innerHTML = "<div style='color:var(--text-muted); padding:15px;'>Азырынча тапшырган окуучулар жок.</div>";
            return;
        }

        container.innerHTML = "";
        snap.forEach((child) => {
            const res = child.val();
            const resId = child.key;

            const name = res.student_name || "Аноним Окуучу";
            const sClass = res.student_class || "10 A";
            const code = res.test_code || "TEST-0000";
            const score = res.score !== undefined ? res.score : 0;
            const max = res.max_score || 100;
            const status = res.status || "Текшерилүүдө";

            let scoreDisplay = "";
            let actionBtn = "";

            if (status === "Автоматтык" || status === "Бааланды") {
                scoreDisplay = `<span style="color:var(--success); font-weight:bold;">${score}/${max}</span>`;
                actionBtn = `<span style="color:var(--text-muted); font-size:12px;">Автоматтык</span>`;
            } else {
                scoreDisplay = `<span style="color:#eab308;"><i class="fa-solid fa-clock"></i> Текшерүү</span>`;
                // Баалоо баскычына базадагы негизги ачкыч (resId) жана тесттин коду жөнөтүлөт
                actionBtn = `<button class="btn btn-grade" onclick="openGradeModal('${resId}', '${code}')"><i class="fa-solid fa-magnifying-glass"></i> Баалоо</button>`;
            }

            const div = document.createElement("div");
            div.className = "result-row";
            div.innerHTML = `
                <div>
                    <strong style="color:#fff;">${name}</strong>
                    <div style="font-size:11px; color:var(--text-muted); max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${res.test_title || 'Тест тапшырмасы'}</div>
                </div>
                <div style="color:#a855f7; font-weight:bold;">${sClass}</div>
                <div style="color:var(--primary); font-size:13px;">${code}</div>
                <div>${scoreDisplay}</div>
                <div style="text-align: right;">${actionBtn}</div>
            `;
            container.appendChild(div);
        });
    }

    // 👁️ МОДАЛДЫК ТЕРЕЗЕНИ АЧУУ ЖАНА ЖООПТОРДУ ЧЫГАРУУ (image_56a0fb.png)
    window.openGradeModal = async function(resultId, testCode) {
        activeExaminingResultId = resultId;
        const modal = document.getElementById("gradingModal");
        const area = document.getElementById("modalAnswersArea");
        
        const snap = await get(ref(db, `teachers_data/${teacherUid}/results/${resultId}`));
        if (!snap.exists()) { alert("Маалымат табылган жок!"); return; }
        
        const resData = snap.val();
        document.getElementById("modalTitle").innerHTML = `🚹 Окуучу: <span style="color:var(--primary)">${resData.student_name}</span> (${resData.student_class} классы)`;
        
        area.innerHTML = `
            <div style="background: rgba(16,185,129,0.1); border: 1px solid var(--success); padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size:13px; color:#10b981;">
                ✅ <b>Таза жооп:</b> Окуучу тест учурунда башка терезелерге же издөө системаларына өткөн жок (Anti-Cheat коргоосу).
            </div>
        `;

        // Окуучунун жоопторун цикл менен чыгаруу
        if (resData.answers) {
            resData.answers.forEach((ans, idx) => {
                const qBox = document.createElement("div");
                qBox.className = "q-review-box";
                
                let innerHtml = `<div><strong>Суроо №${idx + 1} (${(ans.type || 'PISA').toUpperCase()}):</strong> ${ans.question || 'Суроо тексти'}</div>`;
                
                if(ans.context) {
                    innerHtml += `<div style="background:#151b29; padding:8px; border:1px solid var(--border); font-size:12px; margin-top:5px; color:var(--text-muted);"><b>Контекст:</b> ${ans.context}</div>`;
                }

                innerHtml += `
                    <div class="criterion-box">
                        <b>Баалоо критерийи:</b> 30 балл – Толук түшүндүрсө. 15 балл – Жарым-жартылай жооп берсе. 0 балл – Ката же жооп жок болсо.
                    </div>
                    <div style="margin-top:10px; font-size:14px;">
                        👤 <b>Окуучунун жообу:</b> <span style="color:var(--primary); font-weight:500;">"${ans.student_answer || 'Жооп жазылган эмес'}"</span>
                    </div>
                    <div style="margin-top:10px;">
                        <label style="font-size:12px;">Бул суроого балл бериңиз (Максималдуу ${ans.max_points || 30} балл):</label>
                        <input type="number" class="grade-input" data-idx="${idx}" data-max="${ans.max_points || 30}" value="${ans.given_points || 0}" style="width:120px; margin-top:5px;">
                    </div>
                `;
                qBox.innerHTML = innerHtml;
                area.appendChild(qBox);
            });
        } else {
            area.innerHTML += "<p>Окуучунун жоопторунун структурасы табылган жок.</p>";
        }

        modal.style.display = "flex";
    }

    window.closeGradeModal = function() {
        document.getElementById("gradingModal").style.display = "none";
    }

    // 🏆 МУГАЛИМ БААЛАП БОЛГОНДОН КИЙИН БАЗАНЫ ЖАҢЫРТУУ
    window.submitFinalGrades = async function() {
        if (!activeExaminingResultId || !teacherUid) return;

        const inputs = document.querySelectorAll(".grade-input");
        let totalScore = 0;
        let maxScore = 0;
        let updatedAnswers = [];

        // Каалаган баллдарды чогултуу
        inputs.forEach(input => {
            const idx = parseInt(input.getAttribute("data-idx"));
            const max = parseInt(input.getAttribute("data-max"));
            const val = parseInt(input.value) || 0;

            if (val > max) { alert(`Ката: Балл макс. баллдан (${max}) ашпоо керек!`); return; }
            
            totalScore += val;
            maxScore += max;
        });

        const resultRef = ref(db, `teachers_data/${teacherUid}/results/${activeExaminingResultId}`);
        
        // Базаны жаңыртуу (Статусту 'Бааланды' деп өзгөртөбүз)
        await update(resultRef, {
            score: totalScore,
            max_score: maxScore,
            status: "Бааланды"
        });

        alert(`Жыйынтык ийгиликтүү бекитилди! Жалпы балл: ${totalScore}/${maxScore}`);
        closeGradeModal();
        loadStudentResults(); // Оң тараптагы тизмени кайра жаңыртуу
    }
</script>
</body>
</html>
