<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl.org - Акылдуу Тест Конструктору</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --success: #10b981;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #1e293b;
            --hover-bg: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .lang-btn { background: #000; border: 1px solid var(--border); color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .lang-btn.active { background: var(--primary); color: #000; font-weight: bold; }
        
        .alert-box {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: #fca5a5;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        
        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 12px; background-color: var(--bg-color);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-main);
            font-size: 14px; box-sizing: border-box;
        }

        .control-row { display: flex; gap: 15px; align-items: center; }
        .control-row select { flex: 2; }
        
        .btn { padding: 12px 25px; font-size: 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-add { background-color: var(--primary); color: #000; }
        .btn-save { background-color: var(--success); color: white; width: 100%; font-size: 16px; padding: 15px; margin-top: 20px; }
        .btn-save:disabled { background-color: #064e3b; color: var(--text-muted); cursor: not-allowed; }
        .btn-danger { background-color: var(--danger); color: white; padding: 6px 12px; font-size: 13px; border-radius: 4px; border:none;}
        .btn-secondary { background: #1e293b; color: var(--text-main); border: 1px solid var(--border); font-size: 13px; padding: 6px 12px; border-radius: 4px; cursor:pointer;}

        .question-block { background: var(--bg-color); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-top: 15px; }
        .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .option-item { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .option-item input[type="radio"] { transform: scale(1.2); }

        .test-list-item { background: var(--bg-color); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .test-item-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .badge-container { display: flex; gap: 8px; margin-bottom: 12px; }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .badge-code { background: rgba(0, 210, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .badge-count { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); border: 1px solid var(--border); }
        .badge-type { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }

        .switch-container { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div class="container">
    <!-- Жогорку Башкаруу панели -->
    <div class="navbar">
        <div class="logo">BiliMal.org</div>
        <div class="nav-right">
            <button class="lang-btn active">Кыргызча</button>
            <button class="lang-btn">Русский</button>
            <a href="#" style="color: var(--text-muted); text-decoration: none; font-size: 14px; margin-left: 15px;">← Башкы бетке кайтуу</a>
        </div>
    </div>

    <div class="main-grid">
        
        <!-- СОЛ ЖАК: ТЕСТ КУРАСТЫРУУЧУ -->
        <div>
            <div class="card">
                <div class="card-title">🛠 Жаңы Тапшырма / Тест Түзүү</div>
                
                <div class="form-group">
                    <label>Тапшырманын аталышы (Темасы)</label>
                    <input type="text" id="mainTestTitle" placeholder="Мисалы: 10-класс Физика: Омдун мыйзамы">
                </div>

                <div class="form-group">
                    <label>Тапшырманын Түрүн Тандаңыз:</label>
                    <div class="control-row">
                        <select id="questionTypeSelect">
                            <option value="simple">1. Жөнөкөй текст (Варианттары менен)</option>
                            <option value="pisa">2. PISA Блогу (Текст жана Талдоо)</option>
                            <option value="essay">3. Аудио-Диктант / Ачык Эссе</option>
                        </select>
                        <button class="btn btn-add" id="addBlockBtn">+ Суроону Кошуу</button>
                    </div>
                </div>

                <div style="font-size: 14px; color: var(--text-muted); margin-top: 15px;">
                    Учурдагы кошулган суроолор: <strong id="questionCountBadge" style="color: var(--primary);">0</strong>
                </div>

                <div id="testQuestionsContainer"></div>

                <div class="switch-container">
                    <span>🛡️ Anti-Cheat V4 Кошуу</span>
                    <label class="switch">
                        <input type="checkbox" id="antiCheatToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <button class="btn btn-save" id="saveTestBtn">💾 Тестти маалымат базасына сактоо</button>
            </div>
        </div>

        <!-- ОҢ ЖАК: БАЗАДАГЫ АКТИВДҮҮ ТЕСТТЕР -->
        <div>
            <div class="card">
                <div class="card-title">📋 Активдүү Тесттердин Тизмеси</div>
                <div id="activeTestsList">
                    <div style="color: var(--text-muted); font-size: 14px; text-align: center; padding: 20px;">Маалыматтар жүктөлүүдө...</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">📊 Жыйынтыктар & Мониторинг</div>
                <div class="form-group">
                    <select id="classFilterSelect">
                        <option value="all">Бардык класстар</option>
                    </select>
                </div>
                <div id="resultsMonitorContainer" style="color: var(--text-muted); font-size: 14px;">
                    Азырынча жооптор жок.
                </div>
            </div>
        </div>

    </div>
</div>

<!-- REALTIME DATABASE ТУТАШУУ (СИЗДИН ДАГЫ САКТАЛГАН API АЧКЫЧ МЕНЕН) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // Сиздин долбоордун толук жана такталган конфигурациясы
    const firebaseConfig = {
        apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28", 
        authDomain: "bilimal-org.firebaseapp.com",
        databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app/", 
        projectId: "bilimal-org",
        storageBucket: "bilimal-org.appspot.com",
        messagingSenderId: "241750360816",
        appId: "1:241750360816:web:6cb1f92e9e8f6bf7ad0f8a" // Сүрөттөгү проекттин номери боюнча автоматтык түрдө шайкеш келтирилди
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const testQuestionsContainer = document.getElementById("testQuestionsContainer");
    const questionCountBadge = document.getElementById("questionCountBadge");
    const activeTestsList = document.getElementById("activeTestsList");
    const saveTestBtn = document.getElementById("saveTestBtn");

    // СУРОО БЛОКТОРУН ДИНАМИКАЛЫК ТҮРДӨ ТҮЗҮҮ
    document.getElementById("addBlockBtn").addEventListener("click", () => {
        const type = document.getElementById("questionTypeSelect").value;
        const qId = Date.now();

        const qBlock = document.createElement("div");
        qBlock.className = "question-block";
        qBlock.id = `q-${qId}`;
        qBlock.setAttribute("data-type", type);

        let innerHTML = "";
        if (type === "simple") {
            innerHTML = `
                <div class="block-header"><strong>📝 Жөнөкөй Суроо</strong> <button class="btn-danger" style="padding:2px 8px;" onclick="document.getElementById('q-${qId}').remove(); updateCount();">X</button></div>
                <input type="text" class="q-text" placeholder="Суроону жазыңыз..." style="margin-bottom:10px;">
                <div class="option-item"><input type="radio" name="radio-${qId}"> <input type="text" class="opt-text" placeholder="А варианты..."></div>
                <div class="option-item"><input type="radio" name="radio-${qId}"> <input type="text" class="opt-text" placeholder="Б варианты..."></div>
                <div class="option-item"><input type="radio" name="radio-${qId}"> <input type="text" class="opt-text" placeholder="В варианты..."></div>
                <div class="option-item"><input type="radio" name="radio-${qId}"> <input type="text" class="opt-text" placeholder="Г варианты..."></div>
            `;
        } else if (type === "pisa") {
            innerHTML = `
                <div class="block-header"><strong>📊 PISA Блогу</strong> <button class="btn-danger" style="padding:2px 8px;" onclick="document.getElementById('q-${qId}').remove(); updateCount();">X</button></div>
                <textarea class="pisa-context" placeholder="Окуя / Контекст тексти..." style="margin-bottom:10px; height:80px;"></textarea>
                <input type="text" class="pisa-question" placeholder="Бул текстке тиешелүү суроо..." style="margin-bottom:10px;">
                <input type="text" class="pisa-criteria" placeholder="Баалоо критерийи (мугалим үчүн)...">
            `;
        } else if (type === "essay") {
            innerHTML = `
                <div class="block-header"><strong>🎧 Аудио-Диктант / Эссе</strong> <button class="btn-danger" style="padding:2px 8px;" onclick="document.getElementById('q-${qId}').remove(); updateCount();">X</button></div>
                <input type="text" class="essay-topic" placeholder="Эссенин темасы же тапшырма шарты..." style="margin-bottom:10px;">
                <input type="text" class="essay-link" placeholder="Аудио шилтеме же файл URL..." style="margin-bottom:10px;">
                <input type="number" class="essay-min" placeholder="Минималдуу сөз саны" style="width:150px;">
            `;
        }

        qBlock.innerHTML = innerHTML;
        testQuestionsContainer.appendChild(qBlock);
        updateCount();
    });

    window.updateCount = function() {
        const count = document.querySelectorAll(".question-block").length;
        questionCountBadge.innerText = count;
    };

    // БАЗАГА (СИЗДИН "tests" ТҮЙҮНҮҢҮЗГӨ) ЖАЗУУ
    saveTestBtn.addEventListener("click", async () => {
        const testTitle = document.getElementById("mainTestTitle").value.trim();
        const antiCheatActive = document.getElementById("antiCheatToggle").checked;
        const blocks = document.querySelectorAll(".question-block");

        if (!testTitle) { alert("⚠️ Сураныч, Тесттин темасын жазыңыз!"); return; }
        if (blocks.length === 0) { alert("⚠️ Кеминде 1 суроо кошуңуз!"); return; }

        const preparedQuestions = [];
        blocks.forEach(block => {
            const type = block.getAttribute("data-type");
            let data = { type: type };

            if (type === "simple") {
                data.question = block.querySelector(".q-text").value;
                data.options = [];
                const txts = block.querySelectorAll(".opt-text");
                const rds = block.querySelectorAll("input[type='radio']");
                txts.forEach((t, i) => {
                    data.options.push({ text: t.value, isCorrect: rds[i].checked });
                });
            } else if (type === "pisa") {
                data.context = block.querySelector(".pisa-context").value;
                data.question = block.querySelector(".pisa-question").value;
                data.criteria = block.querySelector(".pisa-criteria").value;
            } else if (type === "essay") {
                data.topic = block.querySelector(".essay-topic").value;
                data.audioLink = block.querySelector(".essay-link").value;
                data.minWords = block.querySelector(".essay-min").value;
            }
            preparedQuestions.push(data);
        });

        const testCode = "TEST-" + Math.floor(1000 + Math.random() * 9000);
        saveTestBtn.innerText = "⏳ Сакталууда...";
        saveTestBtn.disabled = true;

        try {
            // "tests" түйүнүнө маалымат кошуу
            const testsRef = ref(db, 'tests');
            const newTestRef = push(testsRef);
            
            await set(newTestRef, {
                test_code: testCode,
                title: testTitle,
                anti_cheat: antiCheatActive,
                questions: preparedQuestions,
                created_at: Date.now()
            });

            alert(`✅ Тест ийгиликтүү сакталды!\nКод: ${testCode}`);
            document.getElementById("mainTestTitle").value = "";
            testQuestionsContainer.innerHTML = "";
            updateCount();
        } catch (e) {
            console.error(e);
            alert("❌ Ката чыкты. Firebase Realtime Database эрежелерин жана интернет байланышты текшериңиз.");
        } finally {
            saveTestBtn.innerText = "💾 Тестти маалымат базасына сактоо";
            saveTestBtn.disabled = false;
        }
    });

    // РЕАЛДЫК УБАГЫНДА ТЕСТТЕРДИ ТИЗМЕЛӨӨ
    const testsRef = ref(db, 'tests');
    onValue(testsRef, (snapshot) => {
        activeTestsList.innerHTML = "";
        if (!snapshot.exists()) {
            activeTestsList.innerHTML = `<div style='color:var(--text-muted); font-size:14px; text-align:center;'>Азырынча активдүү тесттер жок.</div>`;
            return;
        }

        snapshot.forEach((childSnapshot) => {
            const testKey = childSnapshot.key;
            const test = childSnapshot.val();
            
            const qCount = test.questions ? test.questions.length : 0;
            const mainType = test.questions && test.questions[0] ? test.questions[0].type.toUpperCase() : "ТЕСТ";

            const item = document.createElement("div");
            item.className = "test-list-item";
            item.innerHTML = `
                <div class="test-item-title">${test.title}</div>
                <div class="badge-container">
                    <span class="badge badge-code">Код: ${test.test_code}</span>
                    <span class="badge badge-count">Суроолор: ${qCount}</span>
                    <span class="badge badge-type">${mainType}</span>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-secondary" onclick="navigator.clipboard.writeText('${test.test_code}'); alert('Код көчүрүлдү: ${test.test_code}')" style="flex:1; padding:5px;">📋 Кодду көчүрүү</button>
                    <button class="btn-danger" onclick="deleteTest('${testKey}')" style="border:none; border-radius:4px; padding:5px 10px; cursor:pointer;">🗑️ Өчүрүү</button>
                </div>
            `;
            activeTestsList.appendChild(item);
        });
    });

    // БАЗАДАН ТЕСТТИ ӨЧҮРҮҮ
    window.deleteTest = async function(key) {
        if (confirm("Бул тестти маалымат базасынан таптакыр өчүргүңүз келеби?")) {
            try {
                await remove(ref(db, `tests/${key}`));
            } catch (e) {
                alert("Өчүрүүдө ката кетти: " + e.message);
            }
        }
    };
</script>

</body>
</html>
