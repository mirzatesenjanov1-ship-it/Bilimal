<!DOCTYPE html>
<html lang="ky">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV6QV0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9GSQV6QV0');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BilimAl.org - Мугалимдин Панели</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --success: #10b981;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); text-decoration: none; }
        
        .main-layout { display: grid; grid-template-columns: 1.15fr 1.25fr; gap: 25px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .title { color: var(--primary); font-size: 18px; font-weight: bold; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 12px; background-color: var(--bg-color);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); font-size: 14px; box-sizing: border-box;
        }
        
        .btn { padding: 10px 16px; font-size: 13px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; justify-content: center; }
        .btn-primary { background-color: var(--primary); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-outline.active { background: #1a2a3a; border-color: var(--primary); color: var(--primary); }
        .btn-success { background-color: var(--success); color: white; width: 100%; margin-top: 15px; font-size: 15px; padding: 12px; }
        .btn-edit { background-color: #eab308; color: #000; }
        .btn-delete { background-color: var(--danger); color: white; padding: 10px; }
        .btn-copy { background-color: #3b82f6; color: white; }
        .btn-excel { background-color: #107c41; color: white; font-size: 12px; padding: 6px 12px; }

        .test-item { background: #0f1422; border: 1px solid var(--border); padding: 18px; border-radius: 8px; margin-bottom: 15px; }
        
        .results-header-row { display: grid; grid-template-columns: 0.4fr 2fr 0.6fr 1.2fr 1fr 1.4fr; padding: 10px; background: #0f1422; border-radius: 6px; font-size: 12px; font-weight: bold; color: var(--text-muted); margin-bottom: 10px; text-align: center; }
        .result-row { display: grid; grid-template-columns: 0.4fr 2fr 0.6fr 1.2fr 1fr 1.4fr; align-items: center; text-align: center; gap: 10px; background: #0f1422; border: 1px solid var(--border); padding: 14px; border-radius: 8px; margin-bottom: 10px; transition: 0.2s; }
        .result-row div:nth-child(2) { text-align: left; overflow: hidden; text-overflow: ellipsis; }
        
        .checked-row { border-left: 4px solid var(--success); background: rgba(16, 185, 129, 0.03); }
        
        .check-btn { font-size: 18px; color: var(--text-muted); cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .check-btn:hover { color: var(--success); transform: scale(1.15); }
        .check-active { color: var(--success) !important; }

        .test-meta-tags { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .tag { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .tag-code { background: rgba(0, 210, 255, 0.1); color: var(--primary); }
        .tag-type { background: rgba(255,255,255,0.05); color: #cbd5e1; }

        .q-editor-block { border: 1px solid var(--border); border-left: 4px solid var(--primary); padding: 15px; margin-top: 15px; background: rgba(255,255,255,0.01); border-radius: 6px; position: relative; }
        .remove-q-btn { position: absolute; top: 12px; right: 12px; background: var(--danger); color: white; border: none; border-radius: 4px; width: 22px; height: 22px; cursor: pointer; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .main-layout { grid-template-columns: 1fr; gap: 15px; }
            .card { padding: 15px; margin-bottom: 15px; }
            
            .type-selectors { grid-template-columns: 1fr !important; gap: 8px !important; }
            .limit-duration-block { grid-template-columns: 1fr !important; gap: 10px !important; }
            
            .results-header-row { display: none; }
            .result-row { 
                grid-template-columns: 1fr; 
                text-align: left; 
                position: relative; 
                padding: 15px; 
                gap: 8px;
            }
            .result-row div:nth-child(1) { position: absolute; top: 15px; right: 15px; }
            .result-row div:nth-child(2) { text-align: left; padding-right: 35px; }
            .result-row div:nth-child(5) { margin: 5px 0; }
            .result-row div:nth-child(6) { justify-content: flex-start; margin-top: 5px; }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="#" class="logo">BilimAl.org</a>
    <div style="background: rgba(0,210,255,0.1); padding: 8px 15px; border-radius: 20px; font-size: 14px; border: 1px solid var(--primary);">
        👤 Мугалим: <span id="teacherEmail">Идентификацияланууда...</span>
    </div>
</div>

<div class="main-layout">
    <div>
        <div class="card">
            <div class="title" id="editorModeTitle">✏️ Тестти Түзүү режими</div>
            
            <div class="form-group">
                <label>Тапшырманын аталышы (Темасы):</label>
                <input type="text" id="testTitle" placeholder="Мисалы: 10-класс Механика ЖӨНӨКӨЙ ТЕСТ">
            </div>

            <div class="form-group">
                <label>Суроонун форматын тандаңыз:</label>
                <div class="type-selectors" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <button class="btn btn-outline active" id="btnTypeSimple" onclick="setQuestionType('simple')">📋 Жөнөкөй текст</button>
                    <button class="btn btn-outline" id="btnTypePisa" onclick="setQuestionType('pisa')">🗺️ PISA Блогу</button>
                    <button class="btn btn-outline" id="btnTypeEssay" onclick="setQuestionType('essay')">🎧 Audio / Эссе</button>
                </div>
            </div>

            <div id="questionsBuilderArea"></div>

            <button class="btn btn-primary" onclick="addQuestionBlock()" style="margin-top: 15px; background:transparent; border:1px dashed var(--primary); color:var(--primary); width:100%;">
                <i class="fa-solid fa-plus"></i> Жаңы суроо блогун кошуу
            </button>

            <div style="margin-top: 20px; background: rgba(255,255,255,0.01); border: 1px solid var(--border); padding: 15px; border-radius: 8px;">
                <div class="limit-duration-block" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 12px;">
                    <div>
                        <label>Тапшыруунун чектөөсү:</label>
                        <select id="testAttemptsLimit">
                            <option value="unlimited" selected>Чектөөсүз (Каалаганча)</option>
                            <option value="1">1 жолу гана</option>
                            <option value="2">2 жолу</option>
                        </select>
                    </div>
                    <div>
                        <label>Тесттин убактысы (Мүнөт):</label>
                        <input type="number" id="testDuration" placeholder="Чектөөсүз болсо бош калтырыңыз">
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="antiCheatToggle" checked style="width:16px; height:16px;">
                    <span style="font-size:13px; font-weight: bold; color: #ff5252;">Anti-Cheat Күйгүзүү (Башка терезеге өтүүнү бөгөттөө)</span>
                </div>
            </div>

            <button class="btn btn-success" id="saveTestBtn" onclick="saveTest()"><i class="fa-solid fa-floppy-disk"></i> Тестти сактоо</button>
        </div>

        <div class="card">
            <div class="title">📁 Сиздин Түзүлгөн Тесттериңиз</div>
            <div id="activeTestsList">Колдонуучу текшерилүүдө...</div>
        </div>
    </div>

    <div>
        <div class="card">
            <div class="title" style="justify-content: space-between;">
                <span>🎓 Окуучулардын жыйынтыктары (Түз эфир)</span>
                <button class="btn btn-excel" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> Excel-ге жүктөө</button>
            </div>
            
            <div style="margin-bottom: 15px;">
                <select id="filterTestSelect" onchange="filterResultsByTest()" style="padding: 8px; font-size: 13px;">
                    <option value="all">Бардык тесттердин жыйынтыктары</option>
                </select>
            </div>
            
            <div class="results-header-row">
                <div><i class="fa-solid fa-square-check"></i></div>
                <div style="text-align: left;">Окуучунун аты</div>
                <div>Класс</div>
                <div>Тест коду</div>
                <div>Статус</div>
                <div style="text-align: right;">Аракеттер</div>
            </div>

            <div id="studentResultsContainer">Колдонуучу текшерилүүдө...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getDatabase, ref, set, get, remove, update, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
        authDomain: "bilimal-org.firebaseapp.com",
        databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bilimal-org",
        storageBucket: "bilimal-org.appspot.com",
        messagingSenderId: "241750360816",
        appId: "1:241750360816:web:6cb1f92e9e8f6bf7ad0f8a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let teacherUid = null;
    let currentSelectedType = "simple";
    let questionsArray = [];
    let editingTestId = null;
    let globalResultsCached = {};

    // ЭРЕЖЕЛЕРГЕ 100% ЫЛАЙЫКТАЛГАН КООПСУЗ АВТОРИЗАЦИЯ ТЕКШЕРҮҮСҮ
    onAuthStateChanged(auth, (user) => {
        if (user && user.uid) {
            teacherUid = user.uid;
            document.getElementById("teacherEmail").innerText = user.email;
            
            // Түзүлгөн эрежелер (auth.uid == $uid) коопсуз иштеши үчүн UID алынгандан КЕЙИН ГАНА базага кайрылабыз
            loadActiveTests(user.uid);
            listenToStudentResults(user.uid);
        } else {
            // Эгер телефон кэшинен улам убактылуу таппай жатса, логинге багыттоо
            document.getElementById("activeTestsList").innerText = "Авторизация жок. Багытталууда...";
            document.getElementById("studentResultsContainer").innerText = "Авторизация жок. Багытталууда...";
            setTimeout(() => {
                if (!auth.currentUser) {
                    window.location.href = "https://bilimal.org/login.html";
                }
            }, 2000);
        }
    });

    window.setQuestionType = function(type) {
        currentSelectedType = type;
        document.getElementById("btnTypeSimple").classList.toggle("active", type === 'simple');
        document.getElementById("btnTypePisa").classList.toggle("active", type === 'pisa');
        document.getElementById("btnTypeEssay").classList.toggle("active", type === 'essay');
        addQuestionBlock();
    }

    window.addQuestionBlock = function(savedData = null) {
        const area = document.getElementById("questionsBuilderArea");
        const qIndex = questionsArray.length;
        const qBlock = document.createElement("div");
        qBlock.className = "q-editor-block";
        qBlock.id = `q-block-${qIndex}`;
        
        const type = savedData ? (savedData.type || "simple") : currentSelectedType;
        qBlock.setAttribute("data-type", type);

        let html = `<button class="remove-q-btn" onclick="removeQuestionData(${qIndex})">✖</button>
                    <div style='margin-bottom:10px;'><strong>Суроо №${qIndex+1} (<span style='color:var(--primary)'>${type.toUpperCase()}</span>)</strong></div>`;

        if (type === "simple") {
            html += `<input type="text" placeholder="Суроону жазыңыз" class="q-text" style="margin-bottom:8px;">
                     <input type="number" placeholder="Балл" class="q-points" value="1" style="width:100px; margin-bottom:8px;">
                     <input type="text" placeholder="А варианты" class="opt-text" style="margin-bottom:4px;">
                     <input type="text" placeholder="Б варианты" class="opt-text" style="margin-bottom:4px;">
                     <input type="text" placeholder="В варианты" class="opt-text" style="margin-bottom:4px;">
                     <input type="text" placeholder="Г варианты" class="opt-text" style="margin-bottom:8px;">
                     <input type="number" placeholder="Туура варианттын индекси (1-4)" class="opt-correct">`;
        } else if (type === "pisa") {
            html += `<textarea placeholder="Контекст (Окуя)" class="q-context" rows="3" style="margin-bottom:8px;"></textarea>
                     <input type="text" placeholder="Ачык суроо" class="q-text" style="margin-bottom:8px;">
                     <input type="number" placeholder="Макс балл" class="q-points" value="30">`;
        } else if (type === "essay") {
            html += `<input type="text" placeholder="Эссе темасы" class="q-topic" style="margin-bottom:8px;">
                     <input type="text" placeholder="Аудио шилтеме" class="q-audio" style="margin-bottom:8px;">
                     <input type="number" placeholder="Минималдуу сөз саны" class="q-minwords" value="50">
                     <input type="hidden" class="q-points" value="100">`;
        }

        qBlock.innerHTML = html;
        area.appendChild(qBlock);

        if (savedData) {
            if (type === "simple") {
                qBlock.querySelector(".q-text").value = savedData.question || "";
                qBlock.querySelector(".q-points").value = savedData.points || 1;
                const fields = qBlock.querySelectorAll(".opt-text");
                if (savedData.options) {
                    savedData.options.forEach((opt, oidx) => {
                        if (fields[oidx]) fields[oidx].value = opt.text || "";
                        if (opt.isCorrect) qBlock.querySelector(".opt-correct").value = oidx + 1;
                    });
                }
            } else if (type === "pisa") {
                qBlock.querySelector(".q-context").value = savedData.context || "";
                qBlock.querySelector(".q-text").value = savedData.question || "";
                qBlock.querySelector(".q-points").value = savedData.points || 30;
            } else if (type === "essay") {
                qBlock.querySelector(".q-topic").value = savedData.topic || "";
                qBlock.querySelector(".q-audio").value = savedData.audioLink || "";
                qBlock.querySelector(".q-minwords").value = savedData.minWords || 50;
            }
        }
        questionsArray.push({ type: type });
    }

    window.removeQuestionData = function(idx) {
        document.getElementById(`q-block-${idx}`)?.remove();
        questionsArray[idx] = null;
    }

    window.saveTest = async function() {
        if (!teacherUid) { alert("Ката: Авторизация толук бүтө элек же ишке ашкан жок!"); return; }
        const title = document.getElementById("testTitle").value.trim();
        if (!title) { alert("Тесттин темасын жазыңыз!"); return; }

        const finalQuestions = [];
        document.querySelectorAll(".q-editor-block").forEach((b) => {
            const type = b.getAttribute("data-type");
            let qData = { type: type };
            
            if (type === "simple") {
                qData.question = b.querySelector(".q-text").value;
                qData.points = parseInt(b.querySelector(".q-points").value) || 1;
                qData.options = [];
                const correctIdx = (parseInt(b.querySelector(".opt-correct").value) - 1) || 0;
                b.querySelectorAll(".opt-text").forEach((opt, oIdx) => {
                    qData.options.push({ text: opt.value, isCorrect: oIdx === correctIdx });
                });
            } else if (type === "pisa") {
                qData.context = b.querySelector(".q-context").value;
                qData.question = b.querySelector(".q-text").value;
                qData.points = parseInt(b.querySelector(".q-points").value) || 30;
            } else if (type === "essay") {
                qData.topic = b.querySelector(".q-topic").value;
                qData.audioLink = b.querySelector(".q-audio").value;
                qData.minWords = parseInt(b.querySelector(".q-minwords").value) || 50;
                qData.points = 100;
            }
            finalQuestions.push(qData);
        });

        if(finalQuestions.length === 0) { alert("Суроо кошуңуз!"); return; }

        let testId = editingTestId || "TEST-" + Date.now();
        let testCode = "TEST-" + Math.floor(1000 + Math.random() * 9000);

        if (editingTestId) {
            const oldSnap = await get(ref(db, `teachers_data/${teacherUid}/tests/${testId}`));
            if (oldSnap.exists()) testCode = oldSnap.val().code || testCode;
        }

        const payload = {
            id: testId, code: testCode, title: title,
            type: finalQuestions.some(q => q.type !== 'simple') ? 'PISA' : 'SIMPLE',
            anti_cheat: document.getElementById("antiCheatToggle").checked,
            attempts_limit: document.getElementById("testAttemptsLimit").value,
            duration_minutes: document.getElementById("testDuration").value || "unlimited",
            questions: finalQuestions
        };

        try {
            await set(ref(db, `teachers_data/${teacherUid}/tests/${testId}`), payload);
            // global_test_lookup ачык (true) болгондуктан катасыз жазат
            await set(ref(db, `global_test_lookup/${testCode}`), { teacher_uid: teacherUid, test_id: testId });
            alert("Тест сакталды! Коду: " + testCode);
            resetForm(); loadActiveTests(teacherUid);
        } catch (e) {
            console.error(e);
            alert("Ката кетти: Базага жазууга укук берилген жок!");
        }
    }

    function resetForm() {
        document.getElementById("testTitle").value = "";
        document.getElementById("questionsBuilderArea").innerHTML = "";
        document.getElementById("testDuration").value = "";
        editingTestId = null;
        questionsArray = [];
        document.getElementById("editorModeTitle").innerText = "✏️ Тестти Түзүү режими";
    }

    async function loadActiveTests(verifiedUid) {
        const container = document.getElementById("activeTestsList");
        const filterSelect = document.getElementById("filterTestSelect");
        container.innerHTML = "Жүктөлүүдө..."; 
        
        try {
            // Түз ушул жерден тастыкталган UID аркылуу кайрылабыз
            const snap = await get(ref(db, `teachers_data/${verifiedUid}/tests`));
            if (!snap.exists()) { container.innerHTML = "Тесттер азырынча жок."; return; }
            
            container.innerHTML = "";
            filterSelect.innerHTML = `<option value="all">Бардык тесттердин жыйынтыктары</option>`;

            snap.forEach((child) => {
                const t = child.val();
                const actualId = child.key;
                
                const opt = document.createElement("option");
                opt.value = t.code;
                opt.innerText = t.title;
                filterSelect.appendChild(opt);

                const div = document.createElement("div");
                div.className = "test-item";
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                        <div>
                            <strong style="color:#fff; font-size:15px;">${t.title}</strong>
                            <div class="test-meta-tags">
                                <span class="tag tag-code">Код: ${t.code}</span>
                                <span class="tag tag-type">Түрү: ${t.type}</span>
                            </div>
                        </div>
                        <div style="display:flex; gap:8px; flex-wrap:wrap;">
                            <button class="btn btn-copy" onclick="copyLink('${t.code}')"><i class="fa-solid fa-link"></i> Код</button>
                            <button class="btn btn-edit" onclick="editTest('${actualId}')"><i class="fa-solid fa-pen"></i> Өзгөртүү</button>
                            <button class="btn btn-delete" onclick="deleteTest('${actualId}', '${t.code}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
                container.appendChild(div);
            });
        } catch (error) {
            console.error("Ката:", error);
            container.innerHTML = "<span style='color:var(--danger)'>Базадан маалымат алуу бөгөттөлдү. Кайра кириңиз.</span>";
        }
    }

    window.editTest = async function(id) {
        if (!teacherUid) return;
        resetForm(); editingTestId = id;
        document.getElementById("editorModeTitle").innerText = "🛠️ Тестти Өзгөртүү режими";
        const snap = await get(ref(db, `teachers_data/${teacherUid}/tests/${id}`));
        if (!snap.exists()) return;
        const t = snap.val();
        document.getElementById("testTitle").value = t.title || "";
        document.getElementById("testAttemptsLimit").value = t.attempts_limit || "unlimited";
        document.getElementById("testDuration").value = t.duration_minutes !== "unlimited" ? t.duration_minutes : "";
        document.getElementById("antiCheatToggle").checked = t.anti_cheat !== false;
        if (t.questions) t.questions.forEach(q => addQuestionBlock(q));
    }

    window.deleteTest = async function(id, code) {
        if (!teacherUid) return;
        if (confirm("Бул тестти өчүрүүнү каалайсызбы?")) {
            await remove(ref(db, `teachers_data/${teacherUid}/tests/${id}`));
            await remove(ref(db, `global_test_lookup/${code}`));
            loadActiveTests(teacherUid);
        }
    }

    window.copyLink = function(code) {
        const finalUrl = `https://bilimal.org/sections/take-test.html?code=${code}`;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(finalUrl).then(() => {
                alert("Тесттин шилтемеси көчүрүлдү!");
            }).catch(err => {
                prompt("Шилтемени кол менен көчүрүп алыңыз:", finalUrl);
            });
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = finalUrl;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert("Тесттин шилтемеси көчүрүлдү!");
            } catch (err) {
                prompt("Шилтемени көчүрүңүз:", finalUrl);
            }
            document.body.removeChild(textArea);
        }
    }

    function listenToStudentResults(verifiedUid) {
        const resultsRef = ref(db, `teachers_data/${verifiedUid}/results`);
        
        // Реалдуу убакытта коопсуз угуу
        onValue(resultsRef, (snap) => {
            if (!snap.exists()) {
                document.getElementById("studentResultsContainer").innerHTML = "<div style='color:var(--text-muted); padding:10px;'>Тапшырган окуучулар жок.</div>";
                globalResultsCached = {};
                return;
            }
            globalResultsCached = snap.val();
            filterResultsByTest();
        }, (error) => {
            console.error("Жыйынтык катасы:", error);
            document.getElementById("studentResultsContainer").innerHTML = "<span style='color:var(--danger)'>Жыйынтыктарды алууга эреже жол берген жок.</span>";
        });
    }

    window.filterResultsByTest = function() {
        const container = document.getElementById("studentResultsContainer");
        const filterValue = document.getElementById("filterTestSelect").value;
        container.innerHTML = "";
        let hasData = false;

        Object.keys(globalResultsCached).forEach((resId) => {
            const res = globalResultsCached[resId];
            if (filterValue !== "all" && res.test_code !== filterValue) return;
            hasData = true;

            const score = res.score !== undefined ? res.score : 0;
            const max = res.max_score || 100;
            const status = res.status || "Текшерилүүдө";
            const isChecked = status === "Бааланды";

            let statusHtml = "";
            if (status === "Процесс") {
                statusHtml = `<span style="color:#00d2ff; font-weight:bold;"><i class="fa-solid fa-spinner fa-spin"></i> Чечүүдө...</span>`;
            } else if (status === "Бөгөттөлдү") {
                statusHtml = `<span style="color:#ef4444; font-weight:bold;"><i class="fa-solid fa-ban"></i> АНТИЧИТ!</span>`;
            } else if (status === "Аяктады") {
                statusHtml = `<span style="color:#eab308; font-weight:bold;"><i class="fa-solid fa-hourglass"></i> Текшерүү</span>`;
            } else {
                statusHtml = `<span style="color:var(--success); font-weight:bold;">${score}/${max}</span>`;
            }

            const checkIcon = isChecked ? 'fa-solid fa-square-check check-active' : 'fa-regular fa-square';

            const div = document.createElement("div");
            div.className = `result-row ${isChecked ? 'checked-row' : ''}`;
            div.style.borderLeft = status === "Бөгөттөлдү" ? "4px solid #ef4444" : (status === "Процесс" ? "4px solid #00d2ff" : "");
            div.innerHTML = `
                <div class="check-btn" onclick="toggleResultCheck('${resId}', '${status}')">
                    <i class="${checkIcon}"></i>
                </div>
                <div>
                    <strong style="color:#fff;">${res.student_name || 'Окуучу'}</strong>
                    <div style="font-size:11px; color:var(--text-muted); text-overflow:ellipsis; white-space:nowrap; overflow:hidden; max-width:140px;">${res.test_title || 'Тест'}</div>
                </div>
                <div style="color:#a855f7; font-weight:bold;">${res.student_class || '—'}</div>
                <div style="color:var(--primary); font-size:13px;">${res.test_code || '—'}</div>
                <div>${statusHtml}</div>
                <div style="text-align: right; display:flex; gap:6px; justify-content: flex-end; align-items:center; flex-wrap:wrap;">
                    <button class="btn btn-delete" onclick="deleteResult('${resId}')"><i class="fa-solid fa-trash-can"></i></button>
                </div>`;
            container.appendChild(div);
        });

        if (!hasData) {
            container.innerHTML = "<div style='color:var(--text-muted); padding:10px;'>Бул тест боюнча жыйынтыктар табылган жок.</div>";
        }
    }

    window.toggleResultCheck = async function(resId, currentStatus) {
        if(!teacherUid || currentStatus === "Процесс") return;
        const nextStatus = currentStatus === "Бааланды" ? "Аяктады" : "Бааланды";
        await update(ref(db, `teachers_data/${teacherUid}/results/${resId}`), { status: nextStatus });
    }

    window.deleteResult = async function(resId) {
        if (!teacherUid) return;
        if (confirm("Бул жыйынтыкты өчүрүүнү каалайсызбы?")) {
            await remove(ref(db, `teachers_data/${teacherUid}/results/${resId}`));
        }
    }

    window.exportToExcel = function() {
        if (Object.keys(globalResultsCached).length === 0) return;
        let csvContent = "data:text/csv;charset=utf-8,\uFEFFОкуучунун аты,Классы,Тесттин аталышы,Тест коду,Топтогон балы,Максималдуу балл,Статусу\n";
        Object.values(globalResultsCached).forEach(res => {
            csvContent += `${res.student_name || '—'},${res.student_class || '—'},${res.test_title || '—'},${res.test_code || '—'},${res.score || 0},${res.max_score || 100},${res.status || '—'}\n`;
        });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `BilimAl_Жыйынтыктар.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
</script>
</body>
</html>
