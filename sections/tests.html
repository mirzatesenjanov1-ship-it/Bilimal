<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiliMal.org — Тест Борбору</title>
    <style>
        /* --- БАЗАЛЫК СТИЛДЕР --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #05050f; color: #fff; min-height: 100vh; padding-top: 80px; }

        /* --- HEADER --- */
        header { 
            background: rgba(5, 5, 15, 0.9); backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(0, 240, 255, 0.2); 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: fixed; width: 100%; top: 0; z-index: 100; 
        }
        .logo { 
            font-size: 1.8rem; font-weight: 900; 
            background: linear-gradient(45deg, #00f0ff, #b533ff); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            text-decoration: none; 
        }
        .header-right { display: flex; gap: 15px; align-items: center; }
        .lang-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .lang-btn.active { background: #00f0ff; color: #000; border-color: #00f0ff; font-weight: bold; }
        .back-btn { color: #aaa; text-decoration: none; font-size: 0.9rem; }
        .back-btn:hover { color: #fff; }

        /* --- РОЛЬ ТАНДОО --- */
        .role-selector { display: flex; justify-content: center; gap: 15px; margin: 20px 0 40px; }
        .role-btn { 
            background: transparent; border: 1px solid #333; color: #fff; 
            padding: 10px 25px; border-radius: 20px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .role-btn.active-teacher { background: #00f0ff; color: #000; border-color: #00f0ff; box-shadow: 0 0 15px rgba(0,240,255,0.4); }
        .role-btn.active-student { background: #b533ff; color: #fff; border-color: #b533ff; box-shadow: 0 0 15px rgba(181,51,255,0.4); }

        /* --- КОНТЕЙНЕР ЖАНА ТОР (GRID) --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }

        /* --- БЛОКТОР (CARDS) --- */
        .card { 
            background: rgba(15, 15, 25, 0.8); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 12px; padding: 25px; margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .card h3 { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1.2rem; }
        .card h3.cyan { color: #00f0ff; }
        .card h3.magenta { color: #ff3366; }

        /* --- ФОРМА ЭЛЕМЕНТТЕРИ --- */
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #888; font-size: 0.85rem; margin-bottom: 5px; }
        input[type="text"], select, textarea { 
            width: 100%; padding: 12px; background: #0a0a12; border: 1px solid #222; 
            border-radius: 6px; color: #fff; outline: none; transition: 0.3s; 
        }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: #b533ff; }
        textarea { resize: vertical; min-height: 80px; }

        /* --- БАСКЫЧТАР --- */
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; transition: 0.2s; color: #fff;
        }
        .btn-primary { background: linear-gradient(90deg, #3366ff, #b533ff); }
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(181,51,255,0.4); }
        .btn-danger { background: #ff4444; color: white; width: auto; padding: 8px 15px; font-size: 0.85rem; }
        .btn-danger:hover { background: #cc0000; }

        /* --- ТИЗМЕЛЕР --- */
        .list-item { 
            background: #0a0a12; border: 1px solid #222; border-radius: 8px; 
            padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; 
        }
        .item-info h4 { color: #fff; font-size: 1rem; margin-bottom: 5px; }
        .item-info p { color: #00f0ff; font-size: 0.8rem; }
        .result-text { color: #00f0ff; font-size: 0.9rem; font-weight: bold; }

        /* --- ПАНЕЛДЕРДИ ЖАШЫРУУ --- */
        .panel { display: none; }
        .panel.active { display: block; }
        
        /* --- ОКУУЧУ РЕЖИМИ ҮЧҮН --- */
        .student-test-area { text-align: center; max-width: 600px; margin: 0 auto; }
        .question-box { background: #0a0a12; padding: 20px; border-radius: 8px; border-left: 4px solid #00f0ff; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">BiliMal.org</a>
        <div class="header-right">
            <button class="lang-btn active">Кыргызча</button>
            <button class="lang-btn">Русский</button>
            <button class="lang-btn">English</button>
            <a href="#" class="back-btn">← Башкы бетке кайтуу</a>
        </div>
    </header>

    <div class="container">
        <div class="role-selector">
            <button class="role-btn active-teacher" id="btnTeacher" onclick="switchRole('teacher')">👩‍🏫 Мугалимдин Башкаруу Панели</button>
            <button class="role-btn" id="btnStudent" onclick="switchRole('student')">🎒 Окуучунун Тест Тапшыруусу</button>
        </div>

        <div id="teacherPanel" class="panel active">
            <div class="grid">
                
                <div class="card">
                    <h3 class="cyan">🛠 Жаңы Тапшырма / Тест Түзүү</h3>
                    
                    <div class="form-group">
                        <label>Тапшырманын аталышы</label>
                        <input type="text" id="testTitle" placeholder="Мисалы: 10-класс Физика: Омдун мыйзамы">
                    </div>
                    
                    <div class="form-group">
                        <label>Тапшырманын Түрүн Тандаңыз:</label>
                        <select id="testType">
                            <option value="simple">1. Жөнөкөй Тест (Суроо-Жооп)</option>
                            <option value="audio">2. Аудио-Диктант / Эссе</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Суроо тексти (же тапшырманын шарты):</label>
                        <textarea id="testQuestion" placeholder="Суроону же тапшырманы жазыңыз..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Туура жооп (Жөнөкөй тест үчүн гана):</label>
                        <input type="text" id="testAnswer" placeholder="Туура жоопту жазыңыз...">
                    </div>

                    <button class="btn btn-primary" onclick="saveTest()">💾 Тестти Базага Сактоо</button>
                </div>

                <div class="right-column">
                    
                    <div class="card">
                        <h3 class="cyan">📋 Активдүү Тесттердин Тизмеси</h3>
                        <div id="activeTestsList">
                            </div>
                    </div>

                    <div class="card">
                        <h3 class="cyan">📊 Жыйынтыктар & Мониторинг</h3>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                            <select style="width: 70%; margin: 0;"><option>Бардык класстар</option></select>
                            <button class="btn btn-danger" onclick="clearResults()">Тазалоо</button>
                        </div>
                        <div id="resultsList">
                            </div>
                    </div>

                </div>
            </div>
        </div>

        <div id="studentPanel" class="panel">
            <div class="card student-test-area" id="studentLoginArea">
                <h3 class="magenta">📝 Доступ Алуу</h3>
                <div class="form-group">
                    <label style="text-align: left;">Аты-жөнүңүз:</label>
                    <input type="text" id="studentName" placeholder="Мисалы: Асия">
                </div>
                <div class="form-group">
                    <label style="text-align: left;">Тесттин ID коду (Мугалимден алыңыз):</label>
                    <input type="text" id="studentTestId" placeholder="Мисалы: T-1234">
                </div>
                <button class="btn btn-primary" style="background: #b533ff;" onclick="startTest()">Баштоо 🚀</button>
            </div>

            <div class="card student-test-area panel" id="studentTestProcessArea">
                <h3 class="magenta" id="displayTestTitle">Тесттин аталышы</h3>
                <div class="question-box">
                    <p id="displayTestQuestion">Суроо бул жерде болот...</p>
                </div>
                <div class="form-group">
                    <label style="text-align: left;">Сиздин жообуңуз:</label>
                    <textarea id="studentAnswerInput" placeholder="Жоопту бул жерге жазыңыз..."></textarea>
                </div>
                <button class="btn btn-primary" style="background: #00f0ff; color: #000;" onclick="submitAnswer()">Жоопту Жөнөтүү ✅</button>
            </div>
        </div>

    </div>

    <script>
        // Глобалдык өзгөрмө учурдагы окуучунун тестин кармоо үчүн
        let currentActiveTestForStudent = null;

        // 1. Интерфейсти которуу (Мугалим / Окуучу)
        function switchRole(role) {
            document.getElementById('teacherPanel').classList.remove('active');
            document.getElementById('studentPanel').classList.remove('active');
            
            document.getElementById('btnTeacher').classList.remove('active-teacher');
            document.getElementById('btnStudent').classList.remove('active-student');

            if(role === 'teacher') {
                document.getElementById('teacherPanel').classList.add('active');
                document.getElementById('btnTeacher').classList.add('active-teacher');
                renderTests();
                renderResults();
            } else {
                document.getElementById('studentPanel').classList.add('active');
                document.getElementById('btnStudent').classList.add('active-student');
                // Окуучу киргенде кайра баштоо формасын көрсөтүү
                document.getElementById('studentLoginArea').classList.add('active');
                document.getElementById('studentTestProcessArea').classList.remove('active');
            }
        }

        // 2. Тестти сактоо (Мугалим)
        function saveTest() {
            const title = document.getElementById('testTitle').value.trim();
            const type = document.getElementById('testType').value;
            const question = document.getElementById('testQuestion').value.trim();
            const answer = document.getElementById('testAnswer').value.trim();

            if (!title || !question) {
                alert("Сураныч, тапшырманын аталышын жана суроосун толтуруңуз!");
                return;
            }

            // Кокус ID генерациялоо (Мисалы: T-4829)
            const testId = 'T-' + Math.floor(1000 + Math.random() * 9000);

            const newTest = {
                id: testId,
                title: title,
                type: type,
                question: question,
                correctAnswer: answer,
                date: new Date().toLocaleDateString()
            };

            // LocalStorage'ден эски тесттерди алуу
            let tests = JSON.parse(localStorage.getItem('biliMalTests')) || [];
            tests.push(newTest);
            
            // Кайра сактоо
            localStorage.setItem('biliMalTests', JSON.stringify(tests));

            // Форманы тазалоо
            document.getElementById('testTitle').value = '';
            document.getElementById('testQuestion').value = '';
            document.getElementById('testAnswer').value = '';

            alert(`Тест ийгиликтүү сакталды! ID: ${testId}\nБул кодду окуучуларга бериңиз.`);
            renderTests();
        }

        // 3. Тесттерди экранга чыгаруу (Мугалим)
        function renderTests() {
            const listContainer = document.getElementById('activeTestsList');
            listContainer.innerHTML = '';
            
            let tests = JSON.parse(localStorage.getItem('biliMalTests')) || [];

            if (tests.length === 0) {
                listContainer.innerHTML = '<p style="color: #666; font-size: 0.9rem;">Активдүү тесттер жок.</p>';
                return;
            }

            tests.forEach(test => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <div class="item-info">
                        <h4>${test.title}</h4>
                        <p>ID: ${test.id} | Түрү: ${test.type === 'simple' ? 'Суроо-Жооп' : 'Эссе'}</p>
                    </div>
                    <button class="btn-danger" onclick="deleteTest('${test.id}')">Өчүрүү</button>
                `;
                listContainer.appendChild(item);
            });
        }

        // 4. Тестти өчүрүү (Мугалим)
        function deleteTest(id) {
            if (confirm("Бул тестти өчүрүүнү каалайсызбы?")) {
                let tests = JSON.parse(localStorage.getItem('biliMalTests')) || [];
                tests = tests.filter(test => test.id !== id);
                localStorage.setItem('biliMalTests', JSON.stringify(tests));
                renderTests();
            }
        }

        // 5. Тестти баштоо (Окуучу)
        function startTest() {
            const studentName = document.getElementById('studentName').value.trim();
            const testId = document.getElementById('studentTestId').value.trim();

            if (!studentName || !testId) {
                alert("Аты-жөнүңүздү жана Тесттин ID кодун толтуруңуз!");
                return;
            }

            let tests = JSON.parse(localStorage.getItem('biliMalTests')) || [];
            const foundTest = tests.find(t => t.id === testId);

            if (foundTest) {
                currentActiveTestForStudent = foundTest;
                
                // Интерфейсти алмаштыруу
                document.getElementById('studentLoginArea').classList.remove('active');
                document.getElementById('studentTestProcessArea').classList.add('active');
                
                // Маалыматтарды коюу
                document.getElementById('displayTestTitle').innerText = foundTest.title;
                document.getElementById('displayTestQuestion').innerText = foundTest.question;
                document.getElementById('studentAnswerInput').value = '';
            } else {
                alert("Мындай ID менен тест табылган жок. Кодду туура жазганыңызды текшериңиз.");
            }
        }

        // 6. Жоопту жөнөтүү (Окуучу)
        function submitAnswer() {
            const studentName = document.getElementById('studentName').value.trim();
            const answerText = document.getElementById('studentAnswerInput').value.trim();

            if (!answerText) {
                alert("Жоопту жазыңыз!");
                return;
            }

            let status = "Текшерилүүдө";
            let color = "#aaa";

            // Эгер жөнөкөй тест болсо, автоматтык текшерүү
            if (currentActiveTestForStudent.type === 'simple' && currentActiveTestForStudent.correctAnswer) {
                if (answerText.toLowerCase() === currentActiveTestForStudent.correctAnswer.toLowerCase()) {
                    status = "Туура ✅";
                    color = "#00ff00";
                } else {
                    status = "Ката ❌";
                    color = "#ff4444";
                }
            } else {
                status = "Мугалим текшерет ⏳";
                color = "#00f0ff";
            }

            const resultObj = {
                student: studentName,
                testId: currentActiveTestForStudent.id,
                testTitle: currentActiveTestForStudent.title,
                answer: answerText,
                status: status,
                color: color,
                time: new Date().toLocaleTimeString()
            };

            let results = JSON.parse(localStorage.getItem('biliMalResults')) || [];
            results.push(resultObj);
            localStorage.setItem('biliMalResults', JSON.stringify(results));

            alert("Жообуңуз ийгиликтүү жөнөтүлдү!");
            
            // Баштапкы абалга кайтуу
            document.getElementById('studentTestProcessArea').classList.remove('active');
            document.getElementById('studentLoginArea').classList.add('active');
            document.getElementById('studentTestId').value = '';
        }

        // 7. Жыйынтыктарды чыгаруу (Мугалим)
        function renderResults() {
            const resultsContainer = document.getElementById('resultsList');
            resultsContainer.innerHTML = '';

            let results = JSON.parse(localStorage.getItem('biliMalResults')) || [];

            if (results.length === 0) {
                resultsContainer.innerHTML = '<p style="color: #666; font-size: 0.9rem;">Азырынча жооптор түшө элек.</p>';
                return;
            }

            // Акыркы түшкөн жооптор биринчи чыгышы үчүн тескери (reverse) кылабыз
            results.reverse().forEach(res => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <div class="item-info">
                        <h4>👤 ${res.student} <span style="font-size:0.8rem; color:#888;">(${res.time})</span></h4>
                        <p style="color: #aaa; margin: 5px 0;">Тест: ${res.testTitle} (${res.testId})</p>
                        <p style="color: #fff; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px;">📝 ${res.answer}</p>
                    </div>
                    <div class="result-text" style="color: ${res.color}; text-align: right;">
                        ${res.status}
                    </div>
                `;
                resultsContainer.appendChild(item);
            });
        }

        // 8. Жыйынтыктарды тазалоо (Мугалим)
        function clearResults() {
            if(confirm("Бардык окуучулардын жыйынтыктарын тазалайсызбы?")) {
                localStorage.removeItem('biliMalResults');
                renderResults();
            }
        }

        // Барак жүктөлгөндө мугалимдин панелиндеги маалыматтарды жаңылоо
        window.onload = function() {
            renderTests();
            renderResults();
        };
    </script>
</body>
</html>
