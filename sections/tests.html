<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiliMal — Санариптик Тест Борбору (Жаңыланган)</title>
    <style>
        /* Базалык Космостук Стилдер */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #020208; color: #fff; min-height: 100vh; padding-top: 100px; user-select: none; }
        
        header { background: rgba(4, 4, 16, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 240, 255, 0.15); padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; }
        .logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(45deg, #00f0ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 15px rgba(0,240,255,0.3); text-decoration: none; }
        .nav-links a { color: #a5b4fc; text-decoration: none; font-weight: 600; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .tab-container { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { background: rgba(15, 15, 35, 0.6); border: 1px solid rgba(0, 240, 255, 0.2); padding: 12px 30px; border-radius: 30px; color: #a5b4fc; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(90deg, #00f0ff, #7000ff); color: white; box-shadow: 0 0 15px rgba(0,240,255,0.4); border-color: transparent; }

        .panel { display: none; }
        .panel.active { display: block; }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }

        .card { background: rgba(10, 10, 25, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .card h3 { color: #00f0ff; margin-bottom: 20px; font-size: 1.4rem; text-shadow: 0 0 10px rgba(0,240,255,0.2); }

        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 0.9rem; font-weight: 600; }
        input[type="text"], input[type="number"], select, textarea, input[type="file"] { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 15px; outline: none; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #ff00ff; box-shadow: 0 0 8px rgba(255,0,255,0.2); }
        
        .btn { background: linear-gradient(90deg, #00f0ff, #7000ff); border: none; padding: 12px 20px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(0, 240, 255, 0.5); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
        .btn-small { padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; }

        /* Суроолорду куруучу стилдер */
        .question-builder { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .option-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .option-item input[type="text"] { margin-bottom: 0; }
        .option-item input[type="radio"] { transform: scale(1.5); margin-left: 10px; cursor: pointer; }
        .del-btn { background: rgba(255,0,0,0.2); color: #ff4444; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }

        .test-item { display: flex; flex-direction: column; gap: 10px; background: rgba(20, 20, 45, 0.5); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #00f0ff; }
        
        .class-group { margin-top: 20px; margin-bottom: 10px; color: #ff00ff; border-bottom: 1px solid rgba(255,0,255,0.3); padding-bottom: 5px; }
        .result-student { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .result-student.checked { opacity: 0.5; background: rgba(0,255,0,0.02); }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .b-green { background: rgba(0, 255, 0, 0.2); color: #00ff00; }
        .b-red { background: rgba(255, 0, 0, 0.2); color: #ff4444; }
        .b-orange { background: rgba(255, 165, 0, 0.2); color: orange; }

        .q-img-preview { max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo">BiliMal.org</a>
        <div class="nav-links">
            <a href="../index.html">← Башкы бетке кайтуу</a>
        </div>
    </header>

    <div class="container">
        <div class="tab-container" id="main-tab-container">
            <button class="tab-btn active" onclick="switchTab('teacher')">👨‍🏫 Мугалимдин Панели</button>
            <button class="tab-btn" onclick="switchTab('student')">🎒 Окуучунун Терезеси</button>
        </div>

        <div id="teacher-panel" class="panel active">
            <div class="grid-layout">
                <div>
                    <div class="card">
                        <h3 id="form-title">🛠️ Жаңы Тест Түзүү</h3>
                        <input type="hidden" id="edit-test-id" value="">

                        <label>Тесттин аталышы (Темасы)</label>
                        <input type="text" id="test-title" placeholder="Мисалы: Кыргыз тили - Синтаксис">
                        
                        <label>Окуучу канча жолу тапшыра алат?</label>
                        <select id="attempts-limit">
                            <option value="unlimited">Чектөөсүз</option>
                            <option value="1">1 жолу гана</option>
                            <option value="2">2 жолу</option>
                        </select>

                        <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
                        <h4 style="color:#fff; margin-bottom: 15px;">📝 Суроолорду кошуу</h4>
                        
                        <div id="questions-container">
                            </div>

                        <button class="btn btn-secondary" style="width: 100%; margin-bottom: 20px;" onclick="addQuestionUI()">+ Жаңы суроо кошуу</button>

                        <button class="btn" id="save-test-btn" style="width: 100%;" onclick="saveTest()">💾 Тестти Базага Сактоо</button>
                        <button class="btn btn-secondary" id="cancel-edit-btn" style="width: 100%; margin-top: 10px; display: none;" onclick="cancelEdit()">❌ Түзөтүүнү токтотуу</button>
                    </div>
                </div>

                <div>
                    <div class="card">
                        <h3>📋 Тесттердин Тизмеси</h3>
                        <div id="created-tests-container"></div>
                    </div>

                    <div class="card">
                        <h3>📊 Жыйынтыктар & Мониторинг</h3>
                        <button class="btn btn-secondary btn-small" onclick="clearResults()" style="margin-bottom: 15px;">🗑️ Бардык жыйынтыктарды тазалоо</button>
                        <div id="results-display"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="student-panel" class="panel">
            <div class="card" id="student-auth-card" style="max-width: 500px; margin: 0 auto;">
                <h3>📝 Доступ Алуу</h3>
                <label>Аты-жөнүңүз</label>
                <input type="text" id="student-name" placeholder="Мисалы: Асия Кадырова">
                
                <label>Классыңызды так жазыңыз</label>
                <input type="text" id="student-class" placeholder="Мисалы: 10 А, 11 Б">

                <label>Шилтемедеги Тесттин ID коду</label>
                <input type="text" id="student-test-id" placeholder="Мисалы: TEST-1234">
                
                <p id="auto-code-msg" style="font-size: 0.8rem; color:#a5b4fc; margin-top:-10px; margin-bottom:15px; display:none;">* Код автоматтык түрдө шилтемеден алынды.</p>

                <button class="btn" style="width:100%; justify-content: center;" onclick="startStudentTest()">Баштоо 🚀</button>
            </div>

            <div class="card" id="active-test-card" style="max-width: 700px; margin: 0 auto; display: none;">
                <h3 id="active-test-title" style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px;">Тест...</h3>
                
                <div id="student-questions-area">
                    </div>

                <button class="btn" style="width: 100%; margin-top: 20px;" onclick="submitAnswers()">Жыйынтыкты Жиберүү</button>
            </div>
            
            <div class="card" id="student-result-card" style="max-width: 500px; margin: 0 auto; display: none; text-align: center;">
                <h2 style="color: #00f0ff; margin-bottom: 15px;">Тест аяктады! 🎉</h2>
                <h1 id="res-score" style="font-size: 3rem; margin-bottom: 10px;">0%</h1>
                <h3 id="res-grade" style="color: #ff00ff; margin-bottom: 20px;">Баа: 2</h3>
                <p id="res-stats" style="color: #94a3b8; margin-bottom: 20px;"></p>
                <button class="btn" onclick="location.reload()">Башкы бетке кайтуу</button>
            </div>
        </div>
    </div>

    <script>
        // Жаңы форматтагы база
        let tests = JSON.parse(localStorage.getItem('bm_tests_v2')) || [];
        let results = JSON.parse(localStorage.getItem('bm_results_v2')) || [];
        
        // Тест куруу үчүн убактылуу массив
        let editingQuestions = [];
        let currentActiveTest = null;
        let currentStudentData = {};

        function switchTab(role) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            if(role === 'teacher') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('teacher-panel').classList.add('active');
                renderTeacherTests();
                renderResults();
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('student-panel').classList.add('active');
            }
        }

        // --- URL ШИЛТЕМЕСИН ТЕКШЕРҮҮ ---
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const testIdParam = urlParams.get('testid');
            
            if (testIdParam) {
                document.getElementById('main-tab-container').style.display = 'none'; 
                document.getElementById('teacher-panel').remove(); 
                switchTab('student');
                
                const studentIdInput = document.getElementById('student-test-id');
                studentIdInput.value = testIdParam;
                studentIdInput.setAttribute('readonly', 'true');
                studentIdInput.style.background = "rgba(0,240,255,0.1)";
                studentIdInput.style.borderColor = "#00f0ff";
                document.getElementById('auto-code-msg').style.display = 'block';
            } else {
                // Баштапкы бош суроо кошуу
                if(editingQuestions.length === 0) addQuestionUI();
                renderTeacherTests();
                renderResults();
            }
        };

        // ================= МУГАЛИМДИН ФУНКЦИЯЛАРЫ (БИЛДЕР) =================
        
        function addQuestionUI() {
            editingQuestions.push({
                text: "",
                image: null,
                options: ["Вариант 1", "Вариант 2"],
                correctIndex: 0
            });
            renderBuilder();
        }

        function removeQuestion(qIndex) {
            editingQuestions.splice(qIndex, 1);
            renderBuilder();
        }

        function addOption(qIndex) {
            editingQuestions[qIndex].options.push(`Жаңы вариант`);
            renderBuilder();
        }

        function removeOption(qIndex, optIndex) {
            if(editingQuestions[qIndex].options.length <= 2) {
                alert("Кеминде 2 вариант калышы керек!"); return;
            }
            editingQuestions[qIndex].options.splice(optIndex, 1);
            // Эгер өчүрүлгөн вариант туура жооп болсо, 0-индекске кайтаруу
            if(editingQuestions[qIndex].correctIndex >= editingQuestions[qIndex].options.length) {
                editingQuestions[qIndex].correctIndex = 0;
            }
            renderBuilder();
        }

        function handleImageUpload(event, qIndex) {
            const file = event.target.files[0];
            if (file) {
                if(file.size > 2 * 1024 * 1024) {
                    alert("Сүрөттүн көлөмү 2MB ашпоосу керек!"); return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    editingQuestions[qIndex].image = e.target.result;
                    renderBuilder();
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage(qIndex) {
            editingQuestions[qIndex].image = null;
            renderBuilder();
        }

        function renderBuilder() {
            const container = document.getElementById('questions-container');
            if(!container) return;
            container.innerHTML = "";

            editingQuestions.forEach((q, qIndex) => {
                let optionsHTML = "";
                q.options.forEach((opt, optIndex) => {
                    let isChecked = q.correctIndex === optIndex ? "checked" : "";
                    optionsHTML += `
                        <div class="option-item">
                            <input type="radio" name="correct_${qIndex}" onchange="editingQuestions[${qIndex}].correctIndex = ${optIndex}" ${isChecked} title="Ушул вариантты туура деп белгилөө">
                            <input type="text" value="${opt}" oninput="editingQuestions[${qIndex}].options[${optIndex}] = this.value" placeholder="Варианттын тексти">
                            <button class="del-btn" onclick="removeOption(${qIndex}, ${optIndex})" title="Вариантты өчүрүү">✖</button>
                        </div>
                    `;
                });

                let imgHTML = q.image 
                    ? `<img src="${q.image}" class="q-img-preview" style="display:block;"><button class="btn btn-secondary btn-small" onclick="removeImage(${qIndex})" style="margin-bottom:10px;">Сүрөттү алып салуу</button>` 
                    : `<input type="file" accept="image/*" onchange="handleImageUpload(event, ${qIndex})">`;

                container.innerHTML += `
                    <div class="question-builder">
                        <div style="display:flex; justify-content: space-between; margin-bottom:10px;">
                            <span style="color:#a5b4fc; font-weight:bold;">Суроо #${qIndex + 1}</span>
                            ${editingQuestions.length > 1 ? `<button class="del-btn" style="padding:4px 8px;" onclick="removeQuestion(${qIndex})">Суроону өчүрүү</button>` : ''}
                        </div>
                        <textarea rows="2" placeholder="Суроонун текстин жазыңыз..." style="width:100%; padding:10px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); color:#fff; border-radius:8px; margin-bottom:10px;" oninput="editingQuestions[${qIndex}].text = this.value">${q.text}</textarea>
                        
                        <label>Суроого сүрөт тиркөө (Милдеттүү эмес)</label>
                        ${imgHTML}

                        <label>Варианттар (Туура жоопту тегерекчеден белгилеңиз)</label>
                        ${optionsHTML}
                        <button class="btn btn-secondary btn-small" onclick="addOption(${qIndex})">+ Вариант кошуу</button>
                    </div>
                `;
            });
        }

        function saveTest() {
            const title = document.getElementById('test-title').value.trim();
            const limit = document.getElementById('attempts-limit').value;
            const editId = document.getElementById('edit-test-id').value;

            if(!title) { alert("Тесттин аталышын жазыңыз!"); return; }
            
            // Валидация
            let isValid = true;
            editingQuestions.forEach((q, i) => {
                if(!q.text.trim()) { alert(`Суроо #${i+1} бош калды!`); isValid = false; }
            });
            if(!isValid) return;

            const testObj = {
                id: editId ? editId : "TEST-" + Math.floor(1000 + Math.random() * 9000),
                title: title,
                limit: limit,
                active: true,
                questions: JSON.parse(JSON.stringify(editingQuestions)) // Deep copy
            };

            if(editId) {
                const index = tests.findIndex(t => t.id === editId);
                if(index !== -1) tests[index] = testObj;
                alert("Тест жаңыртылды!");
            } else {
                tests.push(testObj);
                alert("Жаңы тест түзүлдү!");
            }

            localStorage.setItem('bm_tests_v2', JSON.stringify(tests));
            cancelEdit();
            renderTeacherTests();
        }

        function editTest(id) {
            const test = tests.find(t => t.id === id);
            if(!test) return;

            document.getElementById('form-title').innerText = "✏️ Тестти Түзөтүү";
            document.getElementById('edit-test-id').value = test.id;
            document.getElementById('test-title').value = test.title;
            document.getElementById('attempts-limit').value = test.limit;
            
            editingQuestions = JSON.parse(JSON.stringify(test.questions));
            renderBuilder();

            const saveBtn = document.getElementById('save-test-btn');
            saveBtn.innerHTML = "💾 Өзгөртүүлөрдү Сактоо";
            saveBtn.style.background = "linear-gradient(90deg, #ff8c00, #ff0080)";
            document.getElementById('cancel-edit-btn').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            document.getElementById('form-title').innerText = "🛠️ Жаңы Тест Түзүү";
            document.getElementById('edit-test-id').value = "";
            document.getElementById('test-title').value = "";
            document.getElementById('attempts-limit').value = "unlimited";
            
            editingQuestions = [];
            addQuestionUI(); // reset to 1 empty question

            const saveBtn = document.getElementById('save-test-btn');
            saveBtn.innerHTML = "💾 Тестти Базага Сактоо";
            saveBtn.style.background = "linear-gradient(90deg, #00f0ff, #7000ff)";
            document.getElementById('cancel-edit-btn').style.display = "none";
        }

        function renderTeacherTests() {
            const container = document.getElementById('created-tests-container');
            if(!container) return;
            container.innerHTML = '';

            tests.forEach(test => {
                const item = document.createElement('div');
                item.className = 'test-item';
                const currentUrl = window.location.href.split('?')[0];
                const fullLink = `${currentUrl}?testid=${test.id}`;

                item.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <div>
                            <h4 style="color:#fff;">${test.title}</h4>
                            <p style="font-size:0.85rem; color:#94a3b8; margin-top:5px;">ID: <b style="color:#00f0ff">${test.id}</b> | Суроолор: ${test.questions.length}</p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
                        <button class="btn btn-secondary btn-small" onclick="navigator.clipboard.writeText('${fullLink}'); alert('Шилтеме көчүрүлдү!')">🔗 Копировать</button>
                        <button class="btn btn-secondary btn-small" style="color:orange; border-color:orange;" onclick="editTest('${test.id}')">✏️ Түзөтүү</button>
                        <button class="btn btn-secondary btn-small" style="color:#ff4444; border-color:#ff4444;" onclick="deleteTest('${test.id}')">🗑️ Өчүрүү</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function deleteTest(id) {
            if(confirm("Бул тестти толугу менен өчүрөсүзбү?")) {
                tests = tests.filter(t => t.id !== id);
                localStorage.setItem('bm_tests_v2', JSON.stringify(tests));
                renderTeacherTests();
            }
        }

        // ================= ЖЫЙЫНТЫКТАР (КЛАСС ЖАНА ГАЛОЧКА) =================
        function renderResults() {
            const display = document.getElementById('results-display');
            if(!display) return;
            display.innerHTML = '';

            if(results.length === 0) {
                display.innerHTML = '<p style="color:#94a3b8;">Жыйынтыктар жок.</p>';
                return;
            }

            // Класстар боюнча сорттоо, анан алфавит боюнча аты-жөнүн сорттоо
            const sortedResults = [...results].sort((a, b) => {
                const classA = a.studentClass.toUpperCase();
                const classB = b.studentClass.toUpperCase();
                if (classA < classB) return -1;
                if (classA > classB) return 1;
                return a.name.localeCompare(b.name);
            });

            let currentClassGroup = "";

            sortedResults.forEach(r => {
                // Жаңы класс башталганда Тег (Заголовок) кошуу
                if(r.studentClass.toUpperCase() !== currentClassGroup) {
                    currentClassGroup = r.studentClass.toUpperCase();
                    const groupHeader = document.createElement('h4');
                    groupHeader.className = 'class-group';
                    groupHeader.innerText = `КЛАСС: ${currentClassGroup}`;
                    display.appendChild(groupHeader);
                }

                const li = document.createElement('div');
                li.className = `result-student ${r.isChecked ? 'checked' : ''}`;
                
                let badgeClass = r.grade == "5" || r.grade == "4" ? "b-green" : (r.grade == "3" ? "b-orange" : "b-red");

                li.innerHTML = `
                    <div style="display: flex; align-items: center; gap:15px;">
                        <input type="checkbox" style="transform: scale(1.5); cursor:pointer;" ${r.isChecked ? 'checked' : ''} onchange="toggleResultCheck(${r.resId}, this.checked)" title="Текшерилди деп белгилөө">
                        <div>
                            <span style="font-weight:bold; color:#fff;">${r.name}</span>
                            <div style="font-size:0.75rem; color:#64748b;">Тест: ${r.testTitle}</div>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-weight: bold; font-size:1.1rem;">${r.percentage}%</div>
                        <span class="badge ${badgeClass}">Баа: ${r.grade}</span>
                    </div>
                `;
                display.appendChild(li);
            });
        }

        function toggleResultCheck(resId, isChecked) {
            const index = results.findIndex(r => r.resId === resId);
            if(index !== -1) {
                results[index].isChecked = isChecked;
                localStorage.setItem('bm_results_v2', JSON.stringify(results));
                renderResults(); // Визуалды жаңыртуу
            }
        }

        function clearResults() {
            if(confirm("Чын эле бардык жыйынтыктарды өчүрөсүзбү?")) {
                results = [];
                localStorage.setItem('bm_results_v2', JSON.stringify(results));
                renderResults();
            }
        }

        // ================= ОКУУЧУНУН ФУНКЦИЯЛАРЫ =================
        function startStudentTest() {
            const name = document.getElementById('student-name').value.trim();
            const sClass = document.getElementById('student-class').value.trim();
            const testId = document.getElementById('student-test-id').value.trim();

            if(!name || !sClass || !testId) { alert("Атыңызды, классыңызды жана кодду толук жазыңыз!"); return; }

            const targetTest = tests.find(t => t.id === testId);
            if(!targetTest) { alert("Мындай тест табылган жок!"); return; }

            // Лимитти текшерүү
            const safeLimit = targetTest.limit || 'unlimited';
            const previousAttempts = results.filter(r => r.name === name && r.testId === testId).length;
            if(safeLimit !== 'unlimited' && previousAttempts >= parseInt(safeLimit)) {
                alert(`Кечиресиз, сиз бул тестти ${previousAttempts} жолу тапшыргансыз. Сиздин лимит бүттү!`);
                return;
            }

            currentActiveTest = targetTest;
            currentStudentData = { name, studentClass: sClass, testId, testTitle: targetTest.title };

            document.getElementById('student-auth-card').style.display = 'none';
            document.getElementById('active-test-card').style.display = 'block';
            document.getElementById('active-test-title').innerText = targetTest.title;
            
            const area = document.getElementById('student-questions-area');
            area.innerHTML = "";

            targetTest.questions.forEach((q, qIndex) => {
                let optionsHTML = "";
                q.options.forEach((opt, optIndex) => {
                    optionsHTML += `
                        <label style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.03); padding:12px; border-radius:8px; margin-bottom:8px; cursor:pointer;">
                            <input type="radio" name="ans_${qIndex}" value="${optIndex}">
                            <span style="color:#fff;">${opt}</span>
                        </label>
                    `;
                });

                let imgHTML = q.image ? `<img src="${q.image}" style="max-width:100%; border-radius:8px; margin-bottom:15px; display:block;">` : '';

                area.innerHTML += `
                    <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                        <p style="font-size:1.1rem; margin-bottom:15px; font-weight:600; color:#fff;">${qIndex + 1}. ${q.text}</p>
                        ${imgHTML}
                        ${optionsHTML}
                    </div>
                `;
            });
        }

        function submitAnswers() {
            let correctCount = 0;
            const total = currentActiveTest.questions.length;
            let isAllAnswered = true;

            currentActiveTest.questions.forEach((q, qIndex) => {
                const selected = document.querySelector(`input[name="ans_${qIndex}"]:checked`);
                if(!selected) {
                    isAllAnswered = false;
                } else if(parseInt(selected.value) === q.correctIndex) {
                    correctCount++;
                }
            });

            if(!isAllAnswered) {
                if(!confirm("Сиз бардык суроолорго жооп берген жоксуз. Ошентсе да жыйынтыкты жибересизби?")) {
                    return;
                }
            }

            // Пайызды жана Бааны эсептөө
            const percentage = Math.round((correctCount / total) * 100);
            let grade = "2";
            if(percentage >= 85) grade = "5";
            else if(percentage >= 70) grade = "4";
            else if(percentage >= 50) grade = "3";

            const finalResult = {
                resId: Date.now(),
                name: currentStudentData.name,
                studentClass: currentStudentData.studentClass,
                testId: currentStudentData.testId,
                testTitle: currentStudentData.testTitle,
                correctCount: correctCount,
                total: total,
                percentage: percentage,
                grade: grade,
                isChecked: false // Мугалим текшере элек
            };

            results.push(finalResult);
            localStorage.setItem('bm_results_v2', JSON.stringify(results));

            // Жыйынтыкты окуучуга көрсөтүү
            document.getElementById('active-test-card').style.display = 'none';
            document.getElementById('student-result-card').style.display = 'block';
            
            document.getElementById('res-score').innerText = `${percentage}%`;
            document.getElementById('res-grade').innerText = `Баа: ${grade}`;
            document.getElementById('res-stats').innerText = `${total} суроонун ${correctCount} суроосуна туура жооп бердиңиз.`;
        }
    </script>
</body>
</html>
