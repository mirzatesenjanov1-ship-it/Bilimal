<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilimal - Мугалимдин Башкаруу Борбору</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV60QV0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date()); gtag('config', 'G-9GSQV60QV0');
    </script>
    <link rel="stylesheet" href="/assets/css/tests.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer type="module" src="/assets/js/firebase-config.js"></script>
    <script defer type="module" src="/assets/js/storage-fallback.js"></script>
    <script defer type="module" src="/assets/js/toast.js"></script>
    <script defer type="module" src="/assets/js/teacher-activity.js"></script>
    <script defer type="module" src="/assets/js/tests-dashboard.js"></script>
    <script defer type="module" src="/assets/js/ad-manager.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar-panel">
            <div class="brand-zone"><h2>Bilimal</h2></div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="window.location.href='/sections/tests.html'"><i class="fa-solid fa-chart-pie"></i> Башкаруу панели</button>
                <button class="nav-btn" onclick="window.location.href='/sections/test-builder.html'"><i class="fa-solid fa-wand-magic-sparkles"></i> Smart Test Builder</button>
                <button class="nav-btn" onclick="window.location.href='/sections/test-results.html'"><i class="fa-solid fa-graduation-cap"></i> Жыйынтыктар</button>
            </nav>
        </aside>
        <main class="main-content">
            <header class="top-bar" style="margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
                <input type="text" id="globalSearch" placeholder="Тесттерди издөө..." style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; padding:10px; border-radius:6px; width:300px;">
                <button id="btnCreateNewTest" class="btn-primary-glow"><i class="fa-solid fa-plus"></i> Жаңы Тест Түзүү</button>
            </header>
            <section class="quick-stats-row" style="display:flex; gap:20px; margin-bottom:20px;">
                <div class="data-glass-panel" style="flex:1; text-align:center;"><h4>Жалпы Тесттер</h4><div id="statTotalTests" style="font-size:32px; font-weight:bold; color:var(--neon-cyan);">0</div></div>
                <div class="data-glass-panel" style="flex:1; text-align:center;"><h4>Аудитория Tracker</h4><div id="statActiveStudents" style="font-size:32px; font-weight:bold; color:var(--neon-green);">0</div></div>
            </section>
            <div class="data-glass-panel">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <h3>Менин Тесттерим</h3>
                    <div>
                        <select id="filterSubject" style="background:#111; color:white; border-radius:4px; padding:6px; margin-right:10px;"><option value="all">Бардык предметтер</option><option value="Физика">Физика</option><option value="Астрономия">Астрономия</option></select>
                        <select id="filterStatus" style="background:#111; color:white; border-radius:4px; padding:6px;"><option value="all">Бардык статустар</option><option value="active">Active</option><option value="draft">Draft</option></select>
                    </div>
                </div>
                <div class="responsive-table-wrapper">
                    <table class="futuristic-table">
                        <thead><tr><th>Аталышы</th><th>Предмет / Класс</th><th>Суроолор</th><th>Убакыт</th><th>Статус</th><th>Аракеттер</th></tr></thead>
                        <tbody id="testsTableBody"><tr><td colspan="6" class="empty-state-text">Жүктөлүүдө...</td></tr></tbody>
                    </table>
                </div>
            </div>
            <div id="adsterraBanner728x90" style="margin-top:auto; text-align:center;"></div>
        </main>
    </div>
    <div id="globalModalContainer" class="modal-overlay-system" style="display: none;"><div class="modal-glass-window"><h3 id="globalModalTitle">Ырастоо</h3><div id="globalModalBody"></div></div></div>
</body>
</html>
