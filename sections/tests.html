<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiliMal — Мугалим Жардамчысы V4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #020208; color: #fff; min-height: 100vh; padding-top: 80px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { background: rgba(20, 20, 35, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        h3 { color: #00f0ff; margin-bottom: 15px; border-bottom: 1px solid rgba(0,240,255,0.2); padding-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid #334155; border-radius: 6px; color: #fff; margin-bottom: 10px; }
        .btn { background: linear-gradient(90deg, #00f0ff, #7000ff); border: none; padding: 10px 15px; border-radius: 6px; color: #fff; cursor: pointer; font-weight: bold; }
        .btn-red { background: #ff4444; }
        .test-list-item { background: rgba(0,0,0,0.4); border-left: 3px solid #00f0ff; padding: 15px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .result-item { background: rgba(255,255,255,0.02); padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="container">
    <!-- Мугалимдин Панели -->
    <div id="teacher-panel">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card">
                <h3>🛠️ Жаңы Тапшырма</h3>
                <input type="text" id="t-title" placeholder="Тапшырманын аталышы">
                <select id="t-type">
                    <option value="standard">1. Жөнөкөй Тест</option>
                    <option value="dictation">2. Аудио-Диктант</option>
                </select>
                <button class="btn" style="width:100%" onclick="saveTest()">💾 Сактоо</button>
            </div>
            <div>
                <div class="card">
                    <h3>📋 Активдүү Тесттер</h3>
                    <div id="teacher-tests-list"></div>
                </div>
                <div class="card">
                    <h3>📊 Жыйынтыктар</h3>
                    <button class="btn btn-red" onclick="clearResults()">Тазалоо</button>
                    <div id="teacher-results-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Окуучу үчүн кирүү бөлүгү -->
    <div id="student-view" class="card" style="display:none;">
        <h3 id="st-title">Тест</h3>
        <textarea id="s-answer" rows="5" placeholder="Жообуңузду жазыңыз..."></textarea>
        <button class="btn" onclick="submitAnswers()">Жиберүү</button>
    </div>
</div>

<script>
    let tests = JSON.parse(localStorage.getItem('bm_tests')) || [];
    let results = JSON.parse(localStorage.getItem('bm_results')) || [];

    function saveTest() {
        const title = document.getElementById('t-title').value;
        if(!title) return alert("Атын жазыңыз!");
        const newTest = { id: "T-" + Math.floor(Math.random() * 9000), title: title, type: document.getElementById('t-type').value };
        tests.push(newTest);
        localStorage.setItem('bm_tests', JSON.stringify(tests));
        renderTeacherTests();
    }

    function renderTeacherTests() {
        const list = document.getElementById('teacher-tests-list');
        list.innerHTML = '';
        tests.forEach(t => {
            const link = window.location.origin + window.location.pathname + '?testid=' + t.id;
            list.innerHTML += `
                <div class="test-list-item">
                    <div><strong>${t.title}</strong><br>
                    <button class="btn" style="padding:2px 5px; font-size:10px;" onclick="copyLink('${link}')">🔗 Ссылканы көчүрүү</button></div>
                    <button class="btn btn-red" onclick="deleteTest('${t.id}')">Өчүрүү</button>
                </div>`;
        });
    }

    function copyLink(link) {
        navigator.clipboard.writeText(link);
        alert("Шилтеме көчүрүлдү!");
    }

    function deleteTest(id) {
        tests = tests.filter(t => t.id !== id);
        localStorage.setItem('bm_tests', JSON.stringify(tests));
        renderTeacherTests();
    }

    function submitAnswers() {
        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('testid');
        const res = { name: "Окуучу", testId: testId, textAnswer: document.getElementById('s-answer').value };
        results.push(res);
        localStorage.setItem('bm_results', JSON.stringify(results));
        alert("Жыйынтык жөнөтүлдү!");
    }

    function renderResults() {
        const list = document.getElementById('teacher-results-list');
        list.innerHTML = '';
        results.forEach(r => {
            list.innerHTML += `<div class="result-item">${r.textAnswer}</div>`;
        });
    }

    function clearResults() { results = []; localStorage.setItem('bm_results', '[]'); renderResults(); }

    // Башталышы
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('testid')) {
            document.getElementById('teacher-panel').style.display = 'none';
            document.getElementById('student-view').style.display = 'block';
        } else {
            renderTeacherTests();
            renderResults();
        }
    };
</script>
</body>
</html>
