<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        function gtag(){dataLayer.push(arguments);}

    <!-- Google AdSense Негизги Скрипти (Жарнама иштеши үчүн милдеттүү) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495571814896964" crossorigin="anonymous"></script>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <!-- Негизги стилдер файлы -->
    <link rel="stylesheet" href="/assets/css/tests.css">
</head>
<body>

    <!-- Мобилдик менюну ачуучу баскыч -->
    <button class="mobile-toggle" id="mobileToggle" aria-label="Менюну ачуу">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Кибер Dashboard стилиндеги туруктуу Сол меню -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <span class="logo-white">Bilim</span><span class="logo-cyan">al</span>
        </div>
        <nav class="sidebar-menu">
            <button class="menu-item" id="navDashboard">
                <i class="fas fa-chart-pie"></i>
                <span>Башкаруу панели</span>
            </button>
            <button class="menu-item active" id="navTestBuilder">
                <i class="fas fa-sliders-h"></i>
                <span>Smart Test Builder</span>
            </button>
            <button class="menu-item" id="navResults">
                <i class="fas fa-graduation-cap"></i>
                <span>Жыйынтыктар</span>
            </button>
        </nav>
    </aside>

    <!-- Негизги контент мейкиндиги -->
    <main class="main-content">
        
        <!-- Издөө талаасы жана Аракет баскычы -->
        <header class="top-bar">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="testSearchInput" placeholder="Тесттерди издөө...">
            </div>
            <button class="btn-create-test" id="createNewTestBtn">
                <i class="fas fa-plus"></i>
                <span>Жаңы Тест Түзүү</span>
            </button>
        </header>

        <!-- Статистика панелдери -->
        <section class="stats-container">
            <div class="stat-card">
                <h3>Жалпы Тесттер</h3>
                <div class="stat-number cyan-glow" id="totalTestsCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Активдүү окуучулар</h3>
                <div class="stat-number green-glow" id="activeStudentsCount">0</div>
            </div>
        </section>

        <!-- Тесттердин таблицасы камтылган негизги блок -->
        <section class="tests-section-panel">
            <div class="panel-header">
                <h2>Менин тесттерим</h2>
                <div class="filters-container">
                    <select id="subjectFilter" class="custom-select">
                        <option value="all">Бардык предметтер</option>
                        <option value="physics">Физика</option>
                        <option value="astronomy">Астрономия</option>
                    </select>
                    <select id="statusFilter" class="custom-select">
                        <option value="all">Бардык статустар</option>
                        <option value="active">Активдүү</option>
                        <option value="draft">Черновик</option>
                    </select>
                </div>
            </div>

            <!-- Таблицаны ийкемдүү кылган каптама -->
            <div class="responsive-table-wrapper">
                <table class="cyber-table" id="myTestsTable">
                    <thead>
                        <tr>
                            <th>Аталышы</th>
                            <th>Предмет / Класс</th>
                            <th>Суроолор</th>
                            <th>Убакыт</th>
                            <th>Статус</th>
                            <th>Аракеттер</th>
                        </tr>
                    </thead>
                    <tbody id="testsTableBody">
                        <!-- Маалыматтар динамикалык түрдө JavaScript аркылуу кошулат -->
                    </tbody>
                </table>
                <!-- Маалымат жок кездеги индикатор -->
                <div class="no-data-message" id="noDataMessage">
                    Тесттер табылган жок. Жаңы тест түзүңүз!
                </div>
            </div>
        </section>

        <!-- Жарнама бөлүмү -->
        <footer class="footer-ad-section">
            <div class="ad-title">Жарнамалык байланыш борбору</div>
            
            <div class="ad-flex-container">
                <!-- 1. Google AdSense Блогу -->
                <div class="adsense-box">
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-1495571814896964"
                         data-ad-slot="1574613769"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                    <script>
                         (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                </div>

                <!-- 2. Adsterra Banner 728x90 Блогу -->
                <div class="adsterra-banner-box">
                    <script>
                        atOptions = {
                            'key' : '230e338703bb44150336cce1f0832fe3',
                            'format' : 'iframe',
                            'height' : 90,
                            'width' : 728,
                            'params' : {}
                        };
                    </script>
                    <script src="https://www.highperformanceformat.com/230e338703bb44150336cce1f0832fe3/invoke.js"></script>
                </div>
            </div>
        </footer>

    </main>

    <!-- Adsterra Social Bar Скрипти -->
    <script src="https://pl30202824.effectivecpmnetwork.com/2a/5b/af/2a5bafdd419add82a1af8ec0def99355.js" async></script>

    <!-- Firebase SDK жана Логикаларын Интеграциялоо (Модулдук түрү) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getDatabase } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Конфигурациясы
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            messagingSenderId: "241750360816",
            appId: "1:241750360816:web:a991434eb5afbc470d7835",
            measurementId: "G-9GSQV60QV0"
        };

        // Firebase'ди ишке киргизүү
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const database = getDatabase(app);

        // Firebase өзгөрмөлөрүн башка скрипттер колдоно алышы үчүн глобалдык терезеге байлайбыз
        window.firebaseApp = app;
        window.firebaseDatabase = database;
    </script>

    <!-- Мобилдик башкаруу скрипти -->
    <script>
        document.getElementById('mobileToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('open');
        });
    </script>
</body>
</html>
