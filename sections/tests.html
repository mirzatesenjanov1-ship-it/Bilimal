<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl.org - Тест Борбору</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0e14; color: #ffffff; display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px; background-color: #111622; border-right: 1px solid #1e2640; padding: 20px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0;
        }
        .logo { font-size: 24px; font-weight: bold; color: #00d2ff; text-decoration: none; display: block; }
        .user-badge { background: rgba(0, 210, 255, 0.05); border: 1px solid #1e2640; padding: 10px; border-radius: 8px; font-size: 13px; color: #bdc3c7; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-menu a { color: #fff; text-decoration: none; padding: 12px; border-radius: 6px; display: block; background: #161f33; font-size: 15px; }
        .sidebar-menu a.active { background: #00d2ff; color: #0b0e14; }

        .main-content { flex-grow: 1; padding: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; align-items: start; }
        .card { background-color: #111622; border: 1px solid #1e2640; border-radius: 12px; padding: 24px; }
        .card-title { font-size: 18px; color: #00d2ff; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 8px; color: #bdc3c7; }
        .form-control { width: 100%; background-color: #0b0e14; border: 1px solid #1e2640; color: #fff; padding: 12px; border-radius: 6px; }
        
        .format-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-format { background-color: #161f33; border: 1px solid #1e2640; color: #fff; padding: 10px; border-radius: 6px; cursor: pointer; }
        .btn-format.active { border-color: #00d2ff; background-color: rgba(0, 210, 255, 0.1); }
        .btn-submit { width: 100%; background-color: #2ecc71; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-excel { background-color: #27ae60; color: white; border: none; padding: 8px 14px; border-radius: 6px; }
        
        .student-item { background-color: #161f33; border-left: 4px solid #34495e; border-radius: 6px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .student-item.danger { border-left-color: #e74c3c; }
        .score { font-weight: bold; }

        /* АДСТЕРРА НАТИВДИК БАННЕР КУТУСУ */
        .adsterra-native-holder {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: #161f33;
            border-radius: 8px;
            border: 1px solid #1e2640;
        }
        .ad-mini-title {
            font-size: 11px;
            color: #7f8c8d;
            margin-bottom: 10px;
            text-align: center;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #1e2640; }
            .main-content { grid-template-columns: 1fr; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="../dashboard.html" class="logo">BilimAl.org</a>
        <div class="user-badge">👤 Мугалим:<br>mirzatestebesov51@gmail.com</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboard.html"><i class="fas fa-arrow-left"></i> Башкы бетке</a></li>
            <li><a href="#" class="active"><i class="fas fa-plus-circle"></i> Тест Түзүү</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-pen"></i> Тестти Түзүү режими</div>
            <div class="form-group">
                <label>Тапшырманын аталышы:</label>
                <input type="text" class="form-control" placeholder="10-класс Физика...">
            </div>
            <div class="format-buttons">
                <button class="btn-format active">Жөнөкөй</button>
                <button class="btn-format">PISA</button>
                <button class="btn-format">Эссе</button>
            </div>
            <button class="btn-submit"><i class="fas fa-save"></i> Тестти сактоо</button>
        </div>

        <div>
            <div class="card">
                <div class="results-header">
                    <div class="card-title"><i class="fas fa-graduation-cap"></i> Жыйынтыктар (Түз эфир)</div>
                    <button class="btn-excel">Excel</button>
                </div>
                
                <div id="studentsList">
                    <div class="student-item danger">
                        <div><h4>Окуучу Асан</h4><p>Код: TEST-9086</p></div>
                        <div><span class="score" style="color:#e74c3c;"><i class="fas fa-ban"></i> АНТИЧИТ!</span></div>
                    </div>
                </div>
            </div>
