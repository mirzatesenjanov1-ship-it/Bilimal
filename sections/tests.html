<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilimal.org - Тест Конструктору</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .controls {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        select, button, input[type="text"], textarea {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 14px;
        }
        button {
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-add {
            background-color: var(--primary);
            color: #000;
            border: none;
        }
        .btn-add:hover { background-color: #00b8e6; }
        .btn-remove {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            font-size: 12px;
        }
        .btn-remove:hover { background-color: #dc2626; }
        
        /* Тест блоктору */
        .test-block {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
        }
        .test-block-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--primary);
        }
        
        /* PISA формасы */
        .pisa-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .pisa-context textarea {
            width: 100%;
            height: 150px;
            resize: vertical;
        }
        
        /* Жөнөкөй варианттар */
        .options-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .option-item input[type="text"] { flex-grow: 1; }
        
        /* Anti-Cheat Эскертүү */
        .anti-cheat-banner {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            border: 1px solid var(--danger);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🛠 БилимАс: Тест / Тапшырма Конструктору</h2>
    </div>

    <div class="anti-cheat-banner">
        🛡 <b>Anti-Cheat режими активдүү:</b> Окуучу тест учурунда башка терезеге өтсө же текстти көчүрүүгө (Copy-Paste) аракет кылса, система автоматтык түрдө мугалимге белги берет.
    </div>

    <div class="controls">
        <select id="testType">
            <option value="simple">1. Жөнөкөй текст (Варианттары менен)</option>
            <option value="pisa">2. PISA Тест (Функционалдык сабаттуулук)</option>
            <option value="essay">3. Аудио-Диктант / Ачык Эссе</option>
        </select>
        <button class="btn-add" onclick="addTestBlock()">+ Блок Кошуу</button>
    </div>

    <div id="testContainer">
        <!-- Тесттер ушул жерге динамикалык түрдө кошулат -->
    </div>
</div>

<script>
    let blockCount = 0;

    function addTestBlock() {
        const type = document.getElementById("testType").value;
        const container = document.getElementById("testContainer");
        blockCount++;

        const block = document.createElement("div");
        block.className = "test-block";
        block.id = `block-${blockCount}`;

        let contentHTML = '';

        if (type === 'simple') {
            contentHTML = `
                <div class="test-block-header">
                    <span>📝 Жөнөкөй Суроо #${blockCount}</span>
                    <button class="btn-remove" onclick="removeBlock(${blockCount})">Өчүрүү</button>
                </div>
                <input type="text" style="width: 100%; box-sizing: border-box;" placeholder="Суроону жазыңыз... (Мисалы: Ньютондун экинчи мыйзамынын формуласы кайсы?)">
                <div class="options-container">
                    <div class="option-item"><input type="radio" name="correct-${blockCount}"> <input type="text" placeholder="А варианты (F = ma)"></div>
                    <div class="option-item"><input type="radio" name="correct-${blockCount}"> <input type="text" placeholder="Б варианты"></div>
                    <div class="option-item"><input type="radio" name="correct-${blockCount}"> <input type="text" placeholder="В варианты"></div>
                    <div class="option-item"><input type="radio" name="correct-${blockCount}"> <input type="text" placeholder="Г варианты"></div>
                </div>
            `;
        } else if (type === 'pisa') {
            contentHTML = `
                <div class="test-block-header">
                    <span>📊 PISA Тест Блогу #${blockCount} (Маалыматты анализдөө)</span>
                    <button class="btn-remove" onclick="removeBlock(${blockCount})">Өчүрүү</button>
                </div>
                <div class="pisa-grid">
                    <div class="pisa-context">
                        <label style="font-size: 12px; color: #94a3b8;">Окуя / Текст / Шарт:</label>
                        <textarea placeholder="Бул жерге кырдаалды же чоң текстти жазыңыз... (Мисалы: Ылдамдыгы 100 км/с болгон унаа...)"></textarea>
                        <input type="file" style="margin-top: 10px; width: 100%; font-size:12px;" title="График же сүрөт тиркөө">
                    </div>
                    <div>
                        <label style="font-size: 12px; color: #94a3b8;">Текстке тиешелүү суроолор:</label>
                        <textarea placeholder="1-суроо: Графиктеги өзгөрүүнү түшүндүрүңүз...&#10;2-суроо: Формула менен далилдеңиз..." style="width: 100%; height: 110px; resize: vertical;"></textarea>
                        <div style="margin-top: 10px; font-size: 12px;">
                            <input type="checkbox"> Окуучудан ачык жооп талап кылуу (толук жазуу түрүндө)
                        </div>
                    </div>
                </div>
            `;
        } else if (type === 'essay') {
            contentHTML = `
                <div class="test-block-header">
                    <span>🎧 Аудио-Диктант / Эссе #${blockCount}</span>
                    <button class="btn-remove" onclick="removeBlock(${blockCount})">Өчүрүү</button>
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <input type="text" placeholder="Эссенин темасы же тапшырманын шарты (Мисалы: Электромагниттик индукция боюнча эссе жаз)">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="file" accept="audio/*" style="font-size: 12px; color: #94a3b8;">
                        <span style="font-size: 12px; color: #94a3b8;">же Аудио шилтеме:</span>
                        <input type="text" placeholder="URL шилтеме..." style="flex-grow: 1;">
                    </div>
                    <label style="font-size: 12px; color: #94a3b8;">Окуучунун жооп жазуу талаасы (Көлөмүн чектөө):</label>
                    <input type="number" placeholder="Минималдуу сөз саны (мисалы: 150)" style="width: 250px;">
                    <textarea disabled placeholder="[Бул жерде окуучунун жооп жаза турган талаасы болот]" style="width: 100%; height: 100px; background-color: #0b0f19; opacity: 0.5;"></textarea>
                </div>
            `;
        }

        block.innerHTML = contentHTML;
        container.appendChild(block);
    }

    function removeBlock(id) {
        const block = document.getElementById(`block-${id}`);
        if (block) {
            block.style.opacity = '0';
            setTimeout(() => { block.remove(); }, 200); // Анимация менен өчүрүү
        }
    }
</script>

</body>
</html>
