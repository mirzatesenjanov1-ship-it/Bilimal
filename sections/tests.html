<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl — Башкаруу Панели</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="light-theme" id="app-body">

    <!-- ТҮНДҮК/КҮНДҮК ЖАНА МОБИЛЬ ТӨШӨЛМӨСҮ -->
    <header class="main-header">
        <button id="btn-mobile-menu-toggle" class="icon-btn" aria-label="Мобилдик меню">☰</button>
        <div class="search-box">
            <input type="text" id="input-global-search" placeholder="Издөө...">
            <button id="btn-global-search" class="primary-btn">Издөө</button>
        </div>
        <div class="header-actions">
            <button id="btn-notification-bell" class="icon-btn">🔔 <span class="badge" id="noti-count">0</span></button>
            <button id="btn-theme-toggle" class="icon-btn">🌙</button>
        </div>
    </header>

    <div class="app-container">
        <!-- СОЛ МЕНЮ (NAVIGATION) -->
        <aside id="sidebar-menu" class="sidebar">
            <nav>
                <button id="nav-btn-profile" class="nav-item">👤 Мугалим Профили</button>
                <button id="nav-btn-tests" class="nav-item active">📝 Тесттер</button>
                <button id="nav-btn-questions" class="nav-item">❓ Суроолор</button>
                <button id="nav-btn-classes" class="nav-item">👥 Класстар жана Окуучулар</button>
                <button id="nav-btn-analytics" class="nav-item">📊 Аналитика</button>
                <button id="nav-btn-admin" class="nav-item">👑 Админ Панель</button>
                <hr>
                <button id="nav-btn-logout" class="nav-item logout-btn">🚪 Чыгуу</button>
            </nav>
        </aside>

        <!-- НЕГИЗГИ МАЗМУН -->
        <main class="content-area">
            
            <!-- ТЕСТТЕР СЕКЦИЯСЫ -->
            <section id="section-tests-management">
                <div class="section-header">
                    <h2>Тесттерди Башкаруу</h2>
                    <div class="action-group">
                        <button id="btn-create-new-test" class="primary-btn">+ Жаңы тест түзүү</button>
                        <button id="btn-json-import" class="secondary-btn">📥 JSON Импорт</button>
                    </div>
                </div>

                <!-- ФИЛЬТРЛӨӨ ЖАНА СОРТТОО -->
                <div class="filter-bar">
                    <select id="select-test-filter-status">
                        <option value="all">Бардык тесттер</option>
                        <option value="active">Активдүү</option>
                        <option value="draft">Черновик</option>
                        <option value="archived">Архивделген</option>
                    </select>
                    <select id="select-test-sort">
                        <option value="date-desc">Алгач жаңылары</option>
                        <option value="date-asc">Алгач эскилери</option>
                        <option value="title">Аталышы боюнча</option>
                    </select>
                    <button id="btn-clear-test-filters" class="danger-btn">Фильтрди тазалоо</button>
                </div>

                <!-- ТЕСТТЕРДИН ТИЗМЕСИ -->
                <div id="tests-list-container" class="grid-container">
                    <!-- JavaScript аркылуу динамикалык түрдө толтурулат -->
                </div>

                <!-- ПАГИНАЦИЯ -->
                <div class="pagination-container">
                    <button id="btn-pagination-prev" class="secondary-btn">Артка</button>
                    <span id="span-pagination-info">Барак 1 / 1</span>
                    <button id="btn-pagination-next" class="secondary-btn">Алга</button>
                </div>
            </section>
        </main>
    </div>

    <!-- МОДАЛДЫК ТЕРЕЗЕ: ТЕСТ ТҮЗҮҮ / ТҮЗӨТҮҮ -->
    <div id="modal-test-editor" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">Тест Маалыматы</h3>
            <input type="hidden" id="input-test-id">
            <div class="form-group">
                <label for="input-test-title">Тесттин аталышы:</label>
                <input type="text" id="input-test-title" required>
            </div>
            
            <!-- СУРООЛОРДУ БАШКАРУУ БӨЛҮГҮ -->
            <div class="questions-management-inside-test">
                <h4>Суроолорду башкаруу</h4>
                <div class="question-actions-top">
                    <button id="btn-add-question" class="secondary-btn">+ Суроо кошуу</button>
                    <button id="btn-shuffle-questions" class="secondary-btn">🔀 Суроолорду аралаштыруу</button>
                </div>
                <div id="modal-questions-list" class="questions-list-box"></div>
            </div>

            <div class="modal-actions">
                <button id="btn-save-draft" class="secondary-btn">Черновик сактоо</button>
                <button id="btn-preview-test" class="secondary-btn">Алдын ала көрүү</button>
                <button id="btn-publish-test" class="primary-btn">Тестти жарыялоо</button>
                <button id="btn-modal-cancel" class="danger-btn">Жокко чыгаруу</button>
            </div>
        </div>
    </div>

    <!-- УНИВЕРСАЛДУУ ЫРАСТОО (CONFIRM) МОДАЛЫ -->
    <div id="modal-universal-confirm" class="modal hidden">
        <div class="modal-content text-center">
            <h3 id="confirm-modal-title">Ишенимдүүсүзбү?</h3>
            <p id="confirm-modal-message"></p>
            <div class="modal-actions justify-center">
                <button id="btn-modal-confirm-yes" class="danger-btn">Ооба</button>
                <button id="btn-modal-confirm-no" class="secondary-btn">Жок</button>
            </div>
        </div>
    </div>

    <!-- ТОАСТ БИЛДИРҮҮЛӨР КОНТЕЙНЕРИ -->
    <div id="toast-container" class="toast-container"></div>

</body>
</html>
