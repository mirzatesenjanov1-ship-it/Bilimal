<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сабактын Пландары — BiliMal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: #050512; color: #fff; padding: 40px 5%; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding-bottom: 15px; }
        .btn-back { border: 1px solid #00f0ff; color: #00f0ff; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; }
        .btn-back:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px #00f0ff; }
        .plan-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .plan-card { background: rgba(20, 20, 40, 0.8); border-left: 4px solid #ff00ff; padding: 20px; border-radius: 8px; transition: 0.3s; }
        .plan-card:hover { transform: translateX(5px); background: rgba(30, 30, 50, 0.9); }
        .plan-title { font-size: 1.2rem; color: #00f0ff; margin-bottom: 10px; }
        .btn-download { display: inline-block; margin-top: 15px; padding: 8px 15px; background: #2a2a4a; color: #fff; text-decoration: none; border-radius: 5px; font-size: 0.9rem; }
        .btn-download:hover { background: #00f0ff; color: #000; }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="btn-back">← Башкы бетке</a>
        <h1 style="color: #fff;">Мугалимдер үчүн Сабактын Пландары</h1>
        <div style="width: 100px;"></div>
    </header>

    <div class="plan-grid">
        <div class="plan-card">
            <div class="plan-title">Ом мыйзамы жана чынжырды куроо</div>
            <p style="color: #a5b4fc; font-size: 0.95rem;">10-класс үчүн 45 мүнөттүк сабактын деталдуу конспектиси жана көрсөтмөлүү куралдар.</p>
            <a href="#" class="btn-download">PDF Жүктөө ↓</a>
        </div>
        <div class="plan-card">
            <div style="border-left-color: #00f0ff;" class="plan-title">Атомдук жана Ядролук физика</div>
            <p style="color: #a5b4fc; font-size: 0.95rem;">Радиоактивдүүлүк жана жарым ажыроо мезгили боюнча презентациялык материалдар.</p>
            <a href="#" class="btn-download">PDF Жүктөө ↓</a>
        </div>
    </div>
    <script src="../assets/js/script.js"></script>
</body>
</html>
