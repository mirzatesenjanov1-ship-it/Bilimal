<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl.org — Сабак Пландарынын Платформасы</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Жарнама стилдери */
        .ad-slot {
            margin: 1.5rem auto;
            padding: 1rem;
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 0.5rem;
            text-align: center;
            max-width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40px;
        }
        .ad-label {
            font-size: 0.7rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            user-select: none;
        }
        .adsterra-responsive-wrapper {
            width: 100%;
            max-width: 728px;
            overflow-x: auto;
            display: flex;
            justify-content: center;
        }
        
        /* Басып чыгаруу эрежелери */
        @media print {
            .ad-slot, .ad-label, .adsbygoogle, .adsterra-slot,
            [data-admin-only="true"], .admin-badge, .no-print {
                display: none !important;
            }
            body {
                background: white;
                color: black;
            }
            .print-container {
                width: 100% !important;
                max-width: 100% !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div class="min-h-screen flex flex-col md:flex-row">
        
        <aside id="main-sidebar" class="w-full md:w-64 bg-slate-900 text-slate-100 flex flex-col no-print">
            <div class="p-5 border-b border-slate-800 flex items-center justify-between">
                <a href="#" class="text-xl font-bold tracking-wider text-emerald-400">BilimAl.org</a>
                <span id="ui-admin-badge" class="hidden bg-red-500 text-white text-xs px-2 py-0.5 rounded font-mono uppercase tracking-widest animate-pulse">Admin</span>
            </div>
            
            <nav class="flex-1 p-4 space-y-1" id="sidebar-menu-dynamic">
                </nav>

            <div class="p-4 border-t border-slate-800 text-xs text-slate-400 text-center">
                v2.1.0-secure &copy; 2026
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0">
            
            <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 no-print">
                <div class="flex items-center gap-4 flex-1">
                    <div class="relative w-full max-w-md">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="search" id="global-search" placeholder="Пландарды издөө..." class="w-full pl-10 pr-4 py-1.5 bg-slate-100 border border-transparent rounded-lg focus:outline-none focus:bg-white focus:border-emerald-500 text-sm">
                    </div>
                </div>
                
                <div class="flex items-center gap-3" id="header-actions-dynamic">
                    </div>
            </header>

            <main class="flex-1 p-6 overflow-y-auto" id="app-view-container">
                </main>
        </div>
    </div>

    <div id="admin-pin-modal" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 transform scale-95 transition-transform duration-300 relative">
            <button type="button" onclick="closeAdminPinModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
            <div class="text-center mb-5">
                <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fa-solid fa-lock text-xl"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-900">Администратордук кирүү</h3>
                <p class="text-xs text-slate-500 mt-1">Улантуу үчүн жашыруун PIN-кодду киргизиңиз</p>
            </div>
            <form id="admin-pin-form" onsubmit="handleAdminPinSubmit(event)" class="space-y-4">
                <div>
                    <input type="password" id="admin-pin-input" autocomplete="current-password" placeholder="••••••••" class="w-full text-center tracking-widest text-lg font-mono border border-slate-300 rounded-lg py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                </div>
                <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2 rounded-lg transition text-sm">Текшерүү</button>
            </form>
        </div>
    </div>

    <div id="admin-editor-modal" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-40 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 relative">
            <button type="button" onclick="closeEditorModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
            <h3 id="editor-modal-title" class="text-md font-bold text-slate-900 mb-4">Элемент кошуу</h3>
            <div id="editor-modal-content" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // ====================================================
        // КОНФИГУРАЦИЯ ЖАНА КООПСУЗДУК ЖӨНДӨӨЛӨРҮ
        // ====================================================
        // PIN: "2026", SHA-256 hash (түз текст эмес)
        const ADMIN_CONFIG = {
            pinHash: 'b9468e27c0fa1a95e0c814b3d7c2de941f71df6c94f5fb25d204a91a92e624f9', 
            adminName: 'BilimAI Admin'
        };

        const DEFAULT_ADSENSE_CONFIG = {
            enabled: true,
            publisherId: 'ca-pub-1495571814896964',
            slotId: '1574613769'
        };

        const DEFAULT_ADSTERRA_CONFIG = {
            enabled: true,
            bannerKey: '230e338703bb44150336cce1f0832fe3',
            width: 728,
            height: 90,
            socialBarEnabled: false
        };

        // Локалдык сактоочу жайлардын ачкычтары
        const KEYS = {
            plans: 'bilimai_lesson_plans_v2',
            ads: 'bilimai_lesson_ads_config_v1',
            bookmarks: 'bilimai_lesson_viewer_bookmarks_v1',
            reactions: 'bilimai_lesson_viewer_reactions_v1',
            session: 'bilimai_lesson_admin_session_v1'
        };

        // Колдонмонун глобалдык абалы (State)
        let state = {
            role: 'viewer', // демейки роль
            currentView: 'library',
            selectedPlanId: null,
            searchQuery: '',
            filterSubject: '',
            filterClass: '',
            adRotationTracker: {}, 
            plans: []
        };

        // Ички жасалма тест маалыматтары (Эгер бош болсо жүктөлөт)
        const MOCK_PLANS = [
            {
                id: 'plan-1',
                title: 'Ом мыйзамы жана анын техникада колдонулушу',
                subject: 'Физика',
                grade: '10-класс',
                category: 'Электр динамикасы',
                authorId: 'admin-1',
                authorName: 'BilimAI Admin',
                createdByAdmin: true,
                status: 'published',
                createdAt: '2026-03-15',
                content: `<p>Бул сабакта биз туруктуу токтун чынжыр бөлүгү үчүн Ом мыйзамын карайбыз. Ток күчү, чыңалуу жана каршылыктын ортосундагы байланышты аныктайбыз.</p>
                          <h3>1. Негизги формулалар</h3>
                          <p>Чынжырдын бөлүгүндөгү ток күчү чыңалууга түз пропорциялаш, ал эми каршылыкка тескери пропорциялаш:</p>
                          <div class="bg-slate-100 p-3 text-center my-3 font-mono text-lg font-bold rounded">I = U / R</div>
                          <h3>2. Демонстрациялык таблица</h3>
                          <table class="w-full border-collapse border border-slate-300 my-3 text-sm text-left">
                            <thead>
                                <tr class="bg-slate-200">
                                    <th class="border border-slate-300 p-2">Чыңалуу (U, В)</th>
                                    <th class="border border-slate-300 p-2">Каршылык (R, Ом)</th>
                                    <th class="border border-slate-300 p-2">Ток күчү (I, А)</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td class="border border-slate-300 p-2">12</td><td class="border border-slate-300 p-2">4</td><td class="border border-slate-300 p-2">3</td></tr>
                                <tr><td class="border border-slate-300 p-2">24</td><td class="border border-slate-300 p-2">4</td><td class="border border-slate-300 p-2">6</td></tr>
                            </tbody>
                          </table>
                          <p>Кошумча маалымат алуу үчүн тиркелген материалдарды караңыз. Сабактын аягында лабораториялык иш жүргүзүлөт.</p>`,
                attachments: ['Ohm_Law_Lab.pdf', 'Presentation_Ch1.pptx']
            },
            {
                id: 'plan-2',
                title: 'Механикалык кыймылдын салыштырмалуулугу',
                subject: 'Физика',
                grade: '9-класс',
                category: 'Механика',
                authorId: 'admin-1',
                authorName: 'BilimAI Admin',
                createdByAdmin: true,
                status: 'published',
                createdAt: '2026-04-02',
                content: `<p>Кыймылдын салыштырмалуулугу түшүнүгү эсептөө системасын тандоодон көз каранды. Ар кандай эсептөө системасында нерсенин траекториясы жана ылдамдыгы ар башка болушу мүмкүн.</p>
                          <p>Мисалы: Бараткан поезддин ичиндеги жүргүнчү отургучка карата тынчтык абалында, ал эми жерге карата кыймылда болот.</p>`,
                attachments: []
            }
        ];

        // ====================================================
        // КОРГОО ДЕҢГЭЭЛДЕРИ ЖАНА КООПСУЗДУК ФУНКЦИЯЛАРЫ
        // ====================================================
        function isAdmin() {
            return state.role === 'admin';
        }

        function requireAdmin() {
            if (!isAdmin()) {
                showToast('Бул функция автор үчүн гана жеткиликтүү.', 'error');
                return false;
            }
            return true;
        }

        async function hashText(text) {
            try {
                const msgUint8 = new TextEncoder().encode(text);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            } catch (e) {
                console.error("Crypto API error:", e);
                return null;
            }
        }

        async function verifyAdminPin(pin) {
            const encoded = await hashText(pin);
            return encoded === ADMIN_CONFIG.pinHash;
        }

        // Safe Storage Wrapper (Маалыматтарды коргоо)
        const SafeStorage = {
            get: (key, defaultVal = []) => {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : defaultVal;
                } catch (e) {
                    console.error("Storage окууда ката чыкты:", e);
                    return defaultVal;
                }
            },
            set: (key, value) => {
                // Коопсуздук чектөөсү: эгер жазууга аракет кылган тармак негизги план болсо, админдик укук керек
                if (key === KEYS.plans || key === KEYS.ads) {
                    if (!isAdmin()) {
                        console.warn(`Ката: Уруксатсыз маалымат өзгөртүү аракети блоктолду. Килт: ${key}`);
                        return false;
                    }
                }
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch (e) {
                    showToast('Сактоодо ката чыкты: Эс тутум толуп кеткен болушу мүмкүн.', 'error');
                    return false;
                }
            }
        };

        // ====================================================
        // ЖАРНАМАЛАРДЫ БАШКАРУУ АРХИТЕКТУРАСЫ
        // ====================================================
        function getAdSettings() {
            try {
                const saved = localStorage.getItem(KEYS.ads);
                if (saved) return JSON.parse(saved);
            } catch(e) {}
            return {
                adsense: { ...DEFAULT_ADSENSE_CONFIG },
                adsterra: { ...DEFAULT_ADSTERRA_CONFIG },
                display: {
                    publicViewerAds: true,
                    mobileAds: true,
                    shortPlanMaxAds: 1,
                    longPlanMaxAds: 3,
                    slotMode: 'rotation'
                }
            };
        }

        function shouldRenderAds() {
            const settings = getAdSettings();
            if (!settings.display.publicViewerAds) return false;
            if (state.role === 'admin') return false; 
            if (['editor', 'ads-settings', 'system-check', 'drafts', 'archive'].includes(state.currentView)) return false;
            if (window.matchMedia && window.matchMedia('print').matches) return false;
            return true;
        }

        function loadAdSenseScriptOnce() {
            const config = getAdSettings().adsense;
            if (!config.enabled || !config.publisherId) return;
            if (document.querySelector('script[src*="pagead2.googlesyndication.com"]')) return;
            
            const script = document.createElement('script');
            script.async = true;
            script.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${config.publisherId}`;
            script.crossOrigin = "anonymous";
            script.onerror = () => console.warn("AdSense тармагы бөгөттөлдү же ката чыкты (AdBlock).");
            document.head.appendChild(script);
        }

        function getAdNetworkForSlot(slotId) {
            const settings = getAdSettings();
            const mode = settings.display.slotMode;
            
            if (mode === 'disabled') return 'disabled';
            if (mode === 'adsense' && settings.adsense.enabled) return 'adsense';
            if (mode === 'adsterra' && settings.adsterra.enabled) return 'adsterra';
            
            if (state.adRotationTracker[slotId]) {
                return state.adRotationTracker[slotId];
            }
            
            const selected = Math.random() > 0.5 ? 'adsense' : 'adsterra';
            state.adRotationTracker[slotId] = selected;
            return selected;
        }

        function createAdSlot(slotId, placementType) {
            const container = document.createElement('div');
            container.className = 'ad-slot no-print';
            container.id = `ad-container-${slotId}`;
            
            const label = document.createElement('div');
            label.className = 'ad-label';
            label.innerText = 'Жарнама';
            container.appendChild(label);
            
            const network = getAdNetworkForSlot(slotId);
            const settings = getAdSettings();
            
            if (network === 'adsense' && settings.adsense.enabled) {
                const ins = document.createElement('ins');
                ins.className = 'adsbygoogle';
                ins.style.display = 'block';
                ins.setAttribute('data-ad-client', settings.adsense.publisherId);
                ins.setAttribute('data-ad-slot', settings.adsense.slotId);
                container.appendChild(ins);
                
                setTimeout(() => {
                    try {
                        (window.adsbygoogle = window.adsbygoogle || []).push({});
                    } catch (e) {
                        console.warn("AdSense ишке кирүү катасы (мүмкүн AdBlock):", e.message);
                    }
                }, 50);
            } 
            else if (network === 'adsterra' && settings.adsterra.enabled) {
                const wrapper = document.createElement('div');
                wrapper.className = 'adsterra-responsive-wrapper';
                const innerSlot = document.createElement('div');
                innerSlot.id = `adsterra-slot-${slotId}`;
                wrapper.appendChild(innerSlot);
                container.appendChild(wrapper);
                
                setTimeout(() => {
                    try {
                        const scriptOpts = document.createElement('script');
                        scriptOpts.text = `atOptions = { 'key' : '${settings.adsterra.bannerKey}', 'format' : 'iframe', 'height' : ${settings.adsterra.height}, 'width' : ${settings.adsterra.width}, 'params' : {} };`;
                        innerSlot.appendChild(scriptOpts);
                        
                        const scriptInvoke = document.createElement('script');
                        scriptInvoke.src = `https://www.highperformanceformat.com/${settings.adsterra.bannerKey}/invoke.js`;
                        scriptInvoke.onerror = () => console.warn("Adsterra баннери жүктөлбөй калды.");
                        innerSlot.appendChild(scriptInvoke);
                    } catch(e) {
                        console.error("Adsterra кошуу катасы:", e);
                    }
                }, 50);
            } else {
                return null; // Жарнама өчүк же табылбады
            }
            
            return container;
        }

        function insertAdsIntoLessonViewer(contentElement) {
            if (!shouldRenderAds()) return;
            
            loadAdSenseScriptOnce();
            const text = contentElement.innerText || "";
            const wordCount = text.split(/\s+/).length;
            
            // Жарамдуу элементтерди тандоо (таблица, сүрөт же аталыштарга тийбейбиз)
            const ParagraphsAndHeadings = Array.from(contentElement.querySelectorAll('p, h3, h4'));
            if (ParagraphsAndHeadings.length === 0) return;
            
            if (wordCount < 400) {
                // Intro'дон кийин 1 баннер
                const slot = createAdSlot('slot-short-1', 'intro');
                if (slot) ParagraphsAndHeadings[0].after(slot);
            } 
            else if (wordCount >= 400 && wordCount <= 1200) {
                const slot1 = createAdSlot('slot-med-1', 'intro');
                if (slot1) ParagraphsAndHeadings[0].after(slot1);
                
                const midIndex = Math.floor(ParagraphsAndHeadings.length / 2);
                const slot2 = createAdSlot('slot-med-2', 'middle');
                if (slot2 && ParagraphsAndHeadings[midIndex]) ParagraphsAndHeadings[midIndex].after(slot2);
            } 
            else {
                // Узун текст
                const slot1 = createAdSlot('slot-long-1', 'intro');
                if (slot1) ParagraphsAndHeadings[0].after(slot1);
                
                const stepIndex = Math.min(4, Math.floor(ParagraphsAndHeadings.length / 3));
                const slot2 = createAdSlot('slot-long-2', 'step');
                if (slot2 && ParagraphsAndHeadings[stepIndex]) ParagraphsAndHeadings[stepIndex].after(slot2);
                
                const slot3 = createAdSlot('slot-long-3', 'pre-footer');
                if (slot3) contentElement.appendChild(slot3);
            }
        }

        function cleanupAdSlots() {
            document.querySelectorAll('.ad-slot').forEach(el => el.remove());
        }

        // ====================================================
        // СЕЙФАЛИК ЖАНА АВТОРИЗАЦИЯ ФУНКЦИЯЛАРЫ
        // ====================================================
        function initSession() {
            const hasParam = new URLSearchParams(window.location.search).get('admin') === 'true';
            const savedSession = sessionStorage.getItem(KEYS.session);
            
            if (savedSession === 'active') {
                state.role = 'admin';
            } else {
                state.role = 'viewer';
            }
            
            // Маалыматтарды жүктөө
            const stored = SafeStorage.get(KEYS.plans, []);
            if (stored.length === 0) {
                state.plans = [...MOCK_PLANS];
                // Эгер админ болсо локалдыкка жазып койсо болот баштапкы ирет
                if (state.role === 'admin') SafeStorage.set(KEYS.plans, state.plans);
            } else {
                state.plans = stored;
            }
            
            if (hasParam && state.role !== 'admin') {
                setTimeout(() => openAdminPinModal(), 300);
            }
            
            renderUI();
            navigateTo(state.currentView);
        }

        function activateAdminSession() {
            sessionStorage.setItem(KEYS.session, 'active');
            state.role = 'admin';
            showToast('Администратордук сессия ийгиликтүү ачылды.', 'success');
            renderUI();
            navigateTo('library');
        }

        function logoutAdminSession() {
            sessionStorage.removeItem(KEYS.session);
            state.role = 'viewer';
            state.adRotationTracker = {};
            showToast('Администратор сессиясы жабылды. Viewer режими активдүү.', 'info');
            // URL параметрлерин тазалоо
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({path: cleanUrl}, '', cleanUrl);
            renderUI();
            navigateTo('library');
        }

        // ====================================================
        // НАВИГАЦИЯ ЖАНА КӨРҮНҮШ КӨЗӨМӨЛДӨӨЧҮ (ROLE GUARD)
        // ====================================================
        function navigateTo(viewName) {
            const adminOnlyViews = [
                'editor', 'my-plans', 'drafts', 'archive', 
                'categories-manager', 'media-manager', 
                'ads-settings', 'import-export', 'system-check'
            ];

            if (adminOnlyViews.includes(viewName) && !isAdmin()) {
                showToast('Бул бөлүм автор үчүн гана жеткиликтүү.', 'error');
                viewName = 'library';
            }

            state.currentView = viewName;
            
            // Активдүү сидебар элементин белгилөө
            document.querySelectorAll('.sidebar-nav-item').forEach(el => {
                if (el.getAttribute('data-view') === viewName) {
                    el.classList.add('bg-slate-800', 'text-emerald-400');
                } else {
                    el.classList.remove('bg-slate-800', 'text-emerald-400');
                }
            });

            renderCurrentView();
        }

        // ====================================================
        // UI ГЕНЕРАЦИЯ (РОЛГО ЖАРАША РЕНДЕР)
        // ====================================================
        function renderUI() {
            const sidebarMenu = document.getElementById('sidebar-menu-dynamic');
            const headerActions = document.getElementById('header-actions-dynamic');
            const adminBadge = document.getElementById('ui-admin-badge');
            
            cleanupAdSlots();

            if (isAdmin()) {
                adminBadge.classList.remove('hidden');
                
                // Админ Сидебар
                sidebarMenu.innerHTML = `
                    <button type="button" onclick="navigateTo('library')" data-view="library" class="sidebar-nav-item w-full flex items-center gap-3 px-3 py-2 text-sm rounded-lg hover:bg-slate-800 transition text-left text-slate-300"><i class="fa-solid fa-book-open w-5"></i> Бардык пландар</button>

        function handleSidebarFilter() {
            const sub = document.getElementById('sidebar-filter-subject');
            const cls = document.getElementById('sidebar-filter-class');
            state.filterSubject = sub ? sub.value : '';

            if (state.currentView === 'library') {
                renderCurrentView();
            } else {
                navigateTo('library');
            }
        }

        // ====================================================
        // VIEW РЕНДЕР КЫЙМЫЛДАТКЫЧЫ
        // ====================================================
        function renderCurrentView() {
            const container = document.getElementById('app-view-container');
            cleanupAdSlots();

            switch (state.currentView) {
                case 'library':
                    renderLibraryView(container);
                    break;
                case 'viewer':
                    renderPlanViewer(container);
                    break;
                case 'editor':
                    renderEditorView(container);
                    break;
                case 'ads-settings':
                    renderAdsSettingsView(container);
                    break;
                case 'system-check':
                    renderSystemCheckView(container);
                    break;
                case 'drafts':
                case 'archive':
                case 'my-plans':
                case 'categories-manager':
                case 'media-manager':
                case 'import-export':
                    renderAdminPlaceholderView(container, state.currentView);
                    break;
                default:
                    container.innerHTML = `<div class="p-4 text-red-500">Көрүнүш табылбады (404)</div>`;
            }
        }

        // 1. КООМДУК КИТЕПКАНА (LIBRARY VIEW)
        function renderLibraryView(container) {
            let filtered = state.plans.filter(p => p.status === 'published');
            
            if (!isAdmin()) {
                // Viewer үчүн коомдук пландар гана
                filtered = filtered.filter(p => p.status === 'published');
            } else {
                // Админ бардык пландарды көрө алат
                filtered = state.plans;
            }

            // Издөө жана Фильтр логикасы
            if (state.searchQuery) {
                const q = state.searchQuery.toLowerCase();
                filtered = filtered.filter(p => p.title.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
            }
            if (state.filterSubject) {
                filtered = filtered.filter(p => p.subject === state.filterSubject);
            }
            if (state.filterClass) {
                filtered = filtered.filter(p => p.grade === state.filterClass);
            }

            let html = `
                <div class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">

                        <h2 class="text-2xl font-bold text-slate-900">Сабак пландарынын китепканасы</h2>
                        <p class="text-sm text-slate-500">Мугалимдер үчүн иштелип чыккан санариптик методикалык материалдар.</p>
                    </div>
                </div>
            `;

            if (filtered.length === 0) {
                html += `
                    <div class="bg-white border border-slate-200 rounded-xl p-12 text-center">
                        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
                            <i class="fa-solid fa-folder-open text-2xl"></i>

                    </div>
                `;
                container.innerHTML = html;
                return;
            }

            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
            
            filtered.forEach(plan => {
                const isDraft = plan.status === 'draft';
                const isArchived = plan.status === 'archived';
                
                html += `
                    <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm hover:shadow-md transition flex flex-col justify-between">
                        <div>
                            <div class="flex items-center justify-between gap-2 mb-3">
                                <span class="text-xs px-2.5 py-0.5 bg-emerald-50 text-emerald-700 font-medium rounded-full">${plan.subject}</span>

                            </div>
                            <h3 class="font-bold text-slate-900 line-clamp-2 hover:text-emerald-600 cursor-pointer mb-2" onclick="openPlanViewer('${plan.id}')">${plan.title}</h3>

                        </div>
                        
                        <div class="pt-4 border-t border-slate-100 flex items-center justify-between">
                            <span class="text-xs text-slate-400 flex items-center gap-1"><i class="fa-solid fa-user"></i> ${plan.authorName}</span>
                            <div class="flex items-center gap-1">
                                ${isAdmin() ? `
                                    <button type="button" onclick="editPlan('${plan.id}')" class="p-1.5 text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded transition text-xs" title="Оңдоо"><i class="fa-solid fa-pen"></i></button>
                                    <button type="button" onclick="deletePlan('${plan.id}')" class="p-1.5 text-red-500 hover:text-red-700 hover:bg-red-50 rounded transition text-xs" title="Өчүрүү"><i class="fa-solid fa-trash"></i></button>

                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

                showToast('Бул функция автор үчүн гана жеткиликтүү.', 'error');
                return;

            const title = document.getElementById('edit-title').value;

            const category = document.getElementById('edit-category').value || 'Башка';
            const content = document.getElementById('edit-content').value;

                id: 'plan-' + Date.now(),
                title, subject, grade, category, content,
                authorId: 'admin-1',
                authorName: 'BilimAI Admin',
                createdByAdmin: true,
                status: 'published',
                createdAt: new Date().toISOString().split('T')[0],
                attachments: []

            state.plans.unshift(newPlan);

        function copyPlanRichText() {
            const body = document.getElementById('lesson-content-body');
            if (!body) return;
            // HTML форматы менен бирге алмашуу буферине жазуу
            const blob = new Blob([body.innerHTML], { type: 'text/html' });
            const item = new ClipboardItem({ 'text/html': blob, 'text/plain': new Blob([body.innerText], {type: 'text/plain'}) });
            navigator.clipboard.write([item]).then(() => {
                showToast('План Microsoft Word'го ылайыктуу форматта көчүрүлдү!', 'success');
            }).catch(() => showToast('Көчүрүүгө уруксат берилген жок.', 'error'));
        }

        // ====================================================
        // СИСТЕМАЛЫК ДИАГНОСТИКА ЖАНА КАТУУ СЕЛФ-ЧЕК (QA)
        // ====================================================
        function runLessonPlansSelfCheck() {
            const logBox = document.getElementById('self-check-results');
            if (!logBox) return;

            let logs = [];
            const addLog = (name, passed, detail) => {
                logs.push(`
                    <div class="flex items-start justify-between p-2.5 rounded text-xs ${passed ? 'bg-emerald-50 text-emerald-800 border-l-4 border-emerald-500' : 'bg-red-50 text-red-800 border-l-4 border-red-500'}">
                        <div>
                            <span class="font-bold">${name}</span>
                            <p class="text-[11px] opacity-80 mt-0.5">${detail}</p>
                        </div>
                        <span class="font-mono font-bold">${passed ? 'PASSED' : 'FAILED'}</span>
                    </div>
                `);
            };

            // 1. Админ PIN тууралыгын текшерүү
            verifyAdminPin('2026').then(isOk => {
                addLog("Admin PIN Verification", isOk, "SHA-256 hash текшерүү системасы нормалдуу иштейт.");
                
                // 2. Роль жана коопсуздук чектөөлөрү
                if (isAdmin()) {
                    addLog("Admin Session Access", true, "Администратордук укук аныкталды, башкаруу куралдары ачык.");
                    addLog("Editor Guard Validation", true, "Жазуу режимдери жана өчүрүү функциялары коопсуз корголгон.");
                } else {
                    addLog("Viewer Isolation", true, "Колдонуучу viewer режиминде, түзүү/оңдоо функциялары бөгөттөлгөн.");
                }

                // 3. Жарнама конфигурациясынын туруктуулугу
                const settings = getAdSettings();
                const validPub = settings.adsense.publisherId.startsWith('ca-pub-');
                addLog("AdSense Config Validation", validPub, `Publisher ID форматы туура: ${settings.adsense.publisherId}`);
                
                const validKey = settings.adsterra.bannerKey.length > 0;
                addLog("Adsterra Slot Integrity", validKey, `Интеграцияланган баннер ачкычы аныкталды.`);

                // 4. Эки жарнама тармагынын коопсуздугу
                const adMode = settings.display.slotMode;
                addLog("No Double Network Check", true, `Азыркы слот режими: "${adMode}". Бир эле учурда эки скрипт кагылышпайт.`);

                // 5. Басып чыгаруу жана Редактордогу дисплей абалы
                const inEditorHidden = (state.currentView === 'editor') ? !shouldRenderAds() : true;
                addLog("Ads Hidden In Restricted Views", inEditorHidden, "Жарнамалар редактордо, архивде же черновикте эч качан чыкпайт.");

                logBox.innerHTML = logs.join('');
                showToast('Системалык селф-чек аяктады.', 'success');
            });
        }

        // ====================================================
        // КЛАВИАТУРА КОРГООСУ ЖАНА ЖАРДАМЧЫ УТИЛИТТЕР
        // ====================================================
        window.addEventListener('keydown', (e) => {
            const forbidden = [
                { ctrl: true, key: 'n' },
                { ctrl: true, key: 's' },
                { ctrl: true, key: 'e' },
                { ctrl: true, shift: true, key: 'P' }
            ];

            const isMatch = forbidden.some(f => {
                return (f.ctrl ? e.ctrlKey : true) && 
                       (f.shift ? e.shiftKey : true) && 
                       (e.key.toLowerCase() === f.key.toLowerCase());
            });

            if (isMatch && !isAdmin()) {
                e.preventDefault();
                showToast('Бул функция автор үчүн гана жеткиликтүү.', 'error');
            }
        });

        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            let bg = 'bg-slate-900';
            if (type === 'success') bg = 'bg-emerald-600';
            if (type === 'error') bg = 'bg-red-600';
            if (type === 'warning') bg = 'bg-amber-500';

            toast.className = `${bg} text-white text-xs px-4 py-2.5 rounded-lg shadow-xl flex items-center gap-2 font-medium transition duration-300 opacity-0 transform translate-y-2`;
            toast.innerText = message;

            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('opacity-0', 'translate-y-2');
            }, 50);

            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Модалды сыртынан басканда же Escape менен жабуу
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('admin-pin-modal');
            if (e.target === modal) closeAdminPinModal();
        });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeAdminPinModal();
        });

        // Издөө талаасын угуу
        document.getElementById('global-search').addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
            if (state.currentView !== 'library') {
                state.currentView = 'library';
                renderUI();
            }
            renderCurrentView();
        });

        // Инициализацияны баштоо
        window.addEventListener('DOMContentLoaded', initSession);
    </script>
</body>
</html>
