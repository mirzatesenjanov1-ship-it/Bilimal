<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тамга Багы (Алиппе) — BiliMal</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5636365922849544"
     crossorigin="anonymous"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV6QV0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-9GSQV6QV0');
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #060314; color: #fff; min-height: 100vh; padding: 30px 4%; text-align: center; }
        
        .back-btn { display: inline-block; padding: 10px 20px; background: rgba(0, 240, 255, 0.1); color: #00f0ff; border: 1px solid #00f0ff; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 25px; float: left; transition: 0.3s; }
        .back-btn:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px rgba(0,240,255,0.4); }

        .title-box { clear: both; margin-top: 20px; margin-bottom: 30px; }
        h1 { font-size: 2.6rem; color: #ff0055; text-shadow: 0 0 20px rgba(255, 0, 85, 0.4); }
        p { color: #94a3b8; font-size: 1.1rem; margin-top: 5px; }

        /* ТИЛ ӨТМӨКТӨРҮ */
        .tabs-container { display: flex; max-width: 600px; margin: 0 auto 30px auto; gap: 10px; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { flex: 1; background: transparent; border: none; padding: 12px; color: #cbd5e1; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .tab-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .tab-btn.active { background: #ff0055; color: #fff; box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); }

        /* ТАМГАЛАРДЫН СЕТКАСЫ (Чоң жана балага ыңгайлуу) */
        .garden-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto; background: rgba(20, 15, 45, 0.6); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .letter-card { background: linear-gradient(135deg, #1f1a4a, #130f35); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; font-size: 2rem; font-weight: bold; color: #fff; padding: 15px 0; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; user-select: none; }
        .letter-card:hover { background: #ff0055; transform: scale(1.15) translateY(-5px); box-shadow: 0 0 20px rgba(255, 0, 85, 0.5); border-color: #ff0055; }

        /* ЭКРАНГА ЧЫГАРУУЧУ ЗОНА */
        .display-zone { max-width: 600px; margin: 30px auto; background: radial-gradient(circle, rgba(255,0,85,0.1), transparent); border-radius: 20px; padding: 30px; border: 1px dashed rgba(255,0,85,0.3); min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .big-letter { font-size: 5rem; font-weight: bold; color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.5); animation: pop 0.3s ease; }
        .word-text { font-size: 2rem; color: #00ff96; margin-top: 10px; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,150,0.2); }

        /* 🌐 ТИЛ ТАНДОО КУРАЛЫ */
        .floating-lang-box { position: fixed; bottom: 20px; right: 20px; background: rgba(15, 15, 35, 0.9); border: 1px solid #ffaa00; padding: 8px; border-radius: 30px; display: flex; gap: 6px; z-index: 9999; box-shadow: 0 5px 20px rgba(255, 170, 0, 0.3); backdrop-filter: blur(10px); }
        .floating-btn { background: transparent; border: none; color: #fff; font-size: 0.8rem; font-weight: bold; padding: 6px 12px; cursor: pointer; border-radius: 20px; transition: 0.3s; }
        .floating-btn:hover { background: #ffaa00; color: #000; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget { display: none !important; }
        body { top: 0px !important; }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="floating-lang-box">
        <button class="floating-btn" onclick="changeLanguage('ky')">KG</button>
        <button class="floating-btn" onclick="changeLanguage('ru')">RU</button>
        <button class="floating-btn" onclick="changeLanguage('en')">EN</button>
    </div>
    <div id="google_translate_element" style="display:none;"></div>

    <a href="kindergarten.html" class="back-btn">← Артка кайт</a>

    <div class="title-box">
        <h1>🍎 Тамга Багы дүйнөсү 🌳</h1>
        <p>Каалаган алиппеңизди тандап, тамгаларды басып, шайыр үн менен үйрөнүңүз!</p>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" id="tab-ky" onclick="loadAlphabet('ky')">🇰🇬 Кыргыз алиппеси</button>
        <button class="tab-btn" id="tab-ru" onclick="loadAlphabet('ru')">🇷🇺 Орус алиппеси</button>
        <button class="tab-btn" id="tab-en" onclick="loadAlphabet('en')">🇺🇸 Англис алиппеси</button>
    </div>

    <div class="garden-grid" id="garden-box"></div>

    <div class="display-zone">
        <div id="big-letter-view" class="big-letter">🍎</div>
        <div id="word-view" class="word-text">Тамганы бас!</div>
    </div>

    <script>
        const alphabets = {
            ky: [
                {l: 'А', w: 'Алма 🍎'}, {l: 'Б', w: 'Балык 🐟'}, {l: 'В', w: 'Вертолёт 🛸'}, {l: 'Г', w: 'Гүл 🌸'}, 
                {l: 'Д', w: 'Дарак 🌳'}, {l: 'Е', w: 'Енот 🦝'}, {l: 'Ё', w: 'Ёлка 🎄'}, {l: 'Ж', w: 'Жөжө 🐥'}, 
                {l: 'З', w: 'Пил (Зоопарк) 🐘'}, {l: 'И', w: 'Ит 🐶'}, {l: 'Й', w: 'Йогурт 🥛'}, {l: 'К', w: 'Көпөлөк 🦋'}, 
                {l: 'Л', w: 'Лимон 🍋'}, {l: 'М', w: 'Машина 🚗'}, {l: 'Н', w: 'Нан 🍞'}, {l: 'Ң', w: 'Деңиз 🌊'}, 
                {l: 'О', w: 'Оюнчук 🧸'}, {l: 'Ө', w: 'Өрдөк 🦆'}, {l: 'П', w: 'Пияз 🧅'}, {l: 'Р', w: 'Ракета 🚀'}, 
                {l: 'С', w: 'Саат ⏰'}, {l: 'Т', w: 'Төө 🐪'}, {l: 'У', w: 'Учак ✈️'}, {l: 'Ү', w: 'Үкү 🦉'}, 
                {l: 'Ф', w: 'Фонарь 🔦'}, {l: 'Х', w: 'Хамелеон 🦎'}, {l: 'Ц', w: 'Цирк 🎪'}, {l: 'Ч', w: 'Чычкан 🐭'}, 
                {l: 'Ш', w: 'Шар 🎈'}, {l: 'Щ', w: 'Щётка 🪥'}, {l: 'Ъ', w: 'Ажыратуу белгиси 🎯'}, {l: 'Ы', w: 'Ылай 🪵'}, 
                {l: 'Ь', w: 'Жумшартуу белгиси ✨'}, {l: 'Э', w: 'Эчки 🐐'}, {l: 'Ю', w: 'Юбка 👑'}, {l: 'Я', w: 'Ягода 🍓'}
            ],
            ru: [
                {l: 'А', w: 'Арбуз 🍉'}, {l: 'Б', w: 'Белка 🐿️'}, {l: 'В', w: 'Волк 🐺'}, {l: 'Г', w: 'Гриб 🍄'}, 
                {l: 'Д', w: 'Дом 🏠'}, {l: 'Е', w: 'Ежевика 🍇'}, {l: 'Ё', w: 'Ёж 🦔'}, {l: 'Ж', w: 'Жираф 🦒'},
                {l: 'З', w: 'Заяц 🐇'}, {l: 'И', w: 'Иголка 🪡'}, {l: 'Й', w: 'Йогурт 🥛'}, {l: 'К', w: 'Кот 🐱'},
                {l: 'Л', w: 'Лев 🦁'}, {l: 'М', w: 'Мишка 🐻'}, {l: 'Н', w: 'Носорог 🦏'}, {l: 'О', w: 'Обезьяна 🐒'},
                {l: 'П', w: 'Попугай 🦜'}, {l: 'Р', w: 'Рыба 🐟'}, {l: 'С', w: 'Слон 🐘'}, {l: 'Т', w: 'Тигр 🐯'},
                {l: 'У', w: 'Утка 🦆'}, {l: 'Ф', w: 'Фламинго 🦩'}, {l: 'Х', w: 'Хлеб 🍞'}, {l: 'Ц', w: 'Цветок 🌸'},
                {l: 'Ч', w: 'Черепаха 🐢'}, {l: 'Ш', w: 'Шарик 🎈'}, {l: 'Щ', w: 'Щётка 🪥'}, {l: 'Э', w: 'Экскаватор 🚜'},
                {l: 'Ю', w: 'Юла 🪀'}, {l: 'Я', w: 'Яблоко 🍎'}
            ],
            en: [
                {l: 'A', w: 'Apple 🍎'}, {l: 'B', w: 'Ball ⚽'}, {l: 'C', w: 'Cat 🐱'}, {l: 'D', w: 'Dog 🐶'},
                {l: 'E', w: 'Elephant 🐘'}, {l: 'F', w: 'Fish 🐟'}, {l: 'G', w: 'Grapes 🍇'}, {l: 'H', w: 'House 🏠'},
                {l: 'I', w: 'Ice Cream 🍦'}, {l: 'J', w: 'Juice 🧃'}, {l: 'K', w: 'Kite 🪁'}, {l: 'L', w: 'Lion 🦁'},
                {l: 'M', w: 'Monkey 🐒'}, {l: 'N', w: 'Nest 🪹'}, {l: 'O', w: 'Orange 🍊'}, {l: 'P', w: 'Pencil ✏️'},
                {l: 'Q', w: 'Queen 👑'}, {l: 'R', w: 'Rabbit 🐇'}, {l: 'S', w: 'Sun ☀️'}, {l: 'T', w: 'Train 🚂'},
                {l: 'U', w: 'Umbrella ☂️'}, {l: 'V', w: 'Van 🚐'}, {l: 'W', w: 'Watch ⌚'}, {l: 'X', w: 'Xylophone 🪘'},
                {l: 'Y', w: 'Yo-Yo 🪀'}, {l: 'Z', w: 'Zebra 🦓'}
            ]
        };

        function loadAlphabet(lang) {
            document.getElementById('tab-ky').classList.remove('active');
            document.getElementById('tab-ru').classList.remove('active');
            document.getElementById('tab-en').classList.remove('active');
            document.getElementById('tab-' + lang).classList.add('active');

            const container = document.getElementById('garden-box');
            container.innerHTML = '';

            alphabets[lang].forEach(item => {
                const block = document.createElement('div');
                block.className = 'letter-card';
                block.innerText = item.l;
                block.onclick = () => actionLetter(item.l, item.w, lang);
                container.appendChild(block);
            });
        }

        function actionLetter(letter, word, lang) {
            const letterView = document.getElementById('big-letter-view');
            const wordView = document.getElementById('word-view');

            letterView.innerText = letter;
            wordView.innerText = word + " ⭐";

            // CSS анимацияны кайра жандыруу
            letterView.style.animation = 'none';
            letterView.offsetHeight; 
            letterView.style.animation = 'pop 0.4s ease';

            // Электрондук үн коштоо (Текстти кепке айлантуу)
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let plainWord = word.split(' ')[0];
                let speechText = `${letter}, ${plainWord}`;
                let utterance = new SpeechSynthesisUtterance(speechText);
                
                if (lang === 'ky') utterance.lang = 'ky-KG';
                else if (lang === 'ru') utterance.lang = 'ru-RU';
                else if (lang === 'en') utterance.lang = 'en-US';
                
                window.speechSynthesis.speak(utterance);
            }
        }

        // Баракча ачылганда автоматтык түрдө кыргыз тилин жүктөө
        window.onload = () => { loadAlphabet('ky'); };
    </script>

    <script type="text/javascript">
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'ky', includedLanguages: 'ky,ru,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE, autoDisplay: false}, 'google_translate_element'); }
        function changeLanguage(langCode) { document.cookie = "googtrans=/ky/" + langCode + "; path=/"; document.cookie = "googtrans=/ky/" + langCode + "; domain=." + window.location.hostname + "; path=/"; window.location.reload(); }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
