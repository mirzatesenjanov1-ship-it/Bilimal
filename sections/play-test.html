<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Тапшыруу - Bilimal.org</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --surface: #1e293b; --primary: #3b82f6; --text: #f8fafc; --border: #334155; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .container { background: var(--surface); padding: 40px; border-radius: 12px; width: 100%; max-width: 600px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #cbd5e1; }
        .form-control { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #2563eb; }
        .test-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .test-header h1 { margin: 0 0 10px 0; color: #38bdf8; }
        .meta-tags { display: flex; justify-content: center; gap: 15px; font-size: 14px; color: #94a3b8; }
        #testInterface { display: none; }
        /* Anti-cheat overlay */
        #antiCheatWarning { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(239, 68, 68, 0.9); z-index: 9999; color: white; justify-content: center; align-items: center; flex-direction: column; text-align: center; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- ТАЛАП 4: Right Click блоктоо -->

<div id="antiCheatWarning">
    <i class="fas fa-exclamation-triangle" style="font-size: 60px; margin-bottom: 20px;"></i>
    Көңүл буруңуз! Тест учурунда терезени алмаштырууга тыюу салынган!
    <button class="btn" style="width: auto; margin-top: 20px; background: white; color: red;" onclick="hideWarning()">Түшүндүм</button>
</div>

<!-- ТАЛАП 3: Окуучунун каттоо формасы -->
<div class="container" id="registrationForm">
    <div class="test-header">
        <h1 id="pubTestTitle">Жүктөлүүдө...</h1>
        <div class="meta-tags">
            <span id="pubTestSubject"><i class="fas fa-book"></i> -</span>
            <span id="pubTestAuthor"><i class="fas fa-user-tie"></i> -</span>
            <span id="pubTestDuration"><i class="fas fa-clock"></i> - мин</span>
        </div>
    </div>
    
    <div class="form-group">
        <label>Атыңыз</label>
        <input type="text" id="studentName" class="form-control" required>
    </div>
    <div class="form-group">
        <label>Фамилияңыз</label>
        <input type="text" id="studentSurname" class="form-control" required>
    </div>
    <div class="form-group">
        <label>Класс</label>
        <input type="text" id="studentClass" class="form-control" required>
    </div>
    <div class="form-group">
        <label>Мектеп</label>
        <input type="text" id="studentSchool" class="form-control" required>
    </div>
    <button class="btn" onclick="startTest()">Тестти баштоо</button>
</div>

<div class="container" id="testInterface" style="max-width: 800px;">
    <!-- Test questions will be injected here by JS -->
    <div id="questionContainer"></div>
    <button class="btn" onclick="submitTest()" style="margin-top: 20px;">Жыйынтыктоо</button>
</div>

<script type="module" src="/assets/js/play-test.js"></script>
</body>
</html>
