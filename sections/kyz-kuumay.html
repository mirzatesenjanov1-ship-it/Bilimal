<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <title>🏇 КЫЗ КУУМАЙ: Улуттук Геймификация</title>
    <script>window.MathJax = { tex: { inlineMath: [['$', '$']] } };</script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        body { background: #292524; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #44403c; padding: 30px; border-radius: 12px; max-width: 750px; margin: 40px auto; border-left: 5px solid #eab308; }
        .animation-track { width: 100%; height: 80px; background: #78716c; border-radius: 8px; margin: 20px 0; position: relative; overflow: hidden; }
        .horse { position: absolute; font-size: 2rem; top: 20px; transition: left 3s ease-in-out; }
        .btn-run { background: #eab308; border: none; padding: 12px 35px; color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .option { background: #57534e; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🏇 УЛУТТУК ОЮН: КЫЗ КУУМАЙ СИМУЛЯЦИЯСЫ</h2>
        <p style="margin: 15px 0;">Улакчы кыз туруктуу $v_1 = 12 \text{ м/с}$ ылдамдык менен чаап баратат. Жигит кыздын артынан $S_0 = 30 \text{ м}$ аралыктан $v_2 = 15 \text{ м/с}$ ылдамдык менен кууп жөнөдү. Жигит кызды канча убакыттан ($t$) кийин кууп жетет?</p>
        
        <div class="animation-track">
            <div class="horse" id="horse-girl" style="left: 40px;">🏇👩</div>
            <div class="horse" id="horse-boy" style="left: 0px;">🏇👦</div>
        </div>

        <form id="game-form">
            <label class="option"><input type="radio" name="km" value="10"> $t = 10 \text{ с}$</label>
            <label class="option"><input type="radio" name="km" value="15"> $t = 15 \text{ с}$</label>
            <label class="option"><input type="radio" name="km" value="5"> $t = 5 \text{ с}$</label>
            <div style="text-align: center; margin-top: 20px;">
                <button type="button" class="btn-run" onclick="startRace()">Аттарды чаптыруу жана Текшерүү 🏁</button>
            </div>
        </form>
    </div>

    <script>
        function startRace() {
            const ans = document.querySelector('input[name="km"]:checked');
            if (!ans) { alert("Алгач жоопту тандаңыз!"); return; }

            // Аттардын чабыш анимациясы
            document.getElementById('horse-girl').style.left = "80%";
            document.getElementById('horse-boy').style.left = "80%";

            setTimeout(() => {
                if (ans.value === "10") {
                    alert("УРАА! Жигит кызды так 10 секундда кууп жетти! Салыштырмалуу ылдамдык: $v_{\text{сал}} = 15 - 12 = 3 \text{ м/с}$. Убакыт: $t = \frac{30}{3} = 10 \text{ с}$. Сиз бүткүл оюнду толук жеңдиңиз! 👑");
                    localStorage.setItem('bilimal_current_level', 1); // Оюнду кайра башына кайтаруу
                    window.location.href = '../quest-map.html';
                } else {
                    alert("Ката! Салыштырмалуу кыймылдын ылдамдыгын туура эмес эсептедиңиз. Аттар кайра артка кайтты.");
                    document.getElementById('horse-girl').style.left = "40px";
                    document.getElementById('horse-boy').style.left = "0px";
                }
            }, 3000);
        }
    </script>
</body>
</html>
