<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <title>🚀 АСТРОФИЗИКА: Космостук Экспедиция</title>
    <script>window.MathJax = { tex: { inlineMath: [['$', '$']] } };</script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        body { background: #09090b; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #18181b; padding: 30px; border-radius: 12px; max-width: 700px; margin: 40px auto; border-left: 5px solid #f43f5e; }
        .option { background: #27272a; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn { background: #f43f5e; border: none; padding: 15px 40px; color: #fff; border-radius: 25px; font-weight: bold; cursor: pointer; display: block; margin: 20px auto; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 6-ДЕҢГЕЭЛ: АСТРОФИЗИКА ЖАНА ОРБИТАЛАР</h2>
        <p style="margin: 20px 0; line-height: 1.6;">Жердин жасалма спутниги Жер бетине жакын тегерек орбитада айланып жүрүшү үчүн ага берилүүчү биринчи космостук ылдамдыктын формуласы кандай? (Мында $G$ — гравитациялык туруктуулук, $M$ — Жердин массасы, $R$ — Жердин радиусу).</p>
        <form id="q-form-6">
            <label class="option"><input type="radio" name="as1" value="A"> A) $v = \sqrt{\frac{G \cdot M}{R}}$</label>
            <label class="option"><input type="radio" name="as1" value="B"> B) $v = \frac{G \cdot M}{R^2}$</label>
            <label class="option"><input type="radio" name="as1" value="C"> C) $v = \sqrt{2 \cdot G \cdot M \cdot R}$</label>
            <button type="button" class="btn" onclick="checkLevel6()">Космостук масштабды бекитүү 🏁</button>
        </form>
    </div>
    <script>
        function checkLevel6() {
            const formData = new FormData(document.getElementById('q-form-6'));
            if (formData.get('as1') === "A") {
                alert("Ураа! Сиз космостук ылдамдыкты туура аныктадыңыз! Негизги теориялык деңгээлдер аяктады. Эми улуттук бонус деңгээли ачылды! 🏇");
                localStorage.setItem('bilimal_current_level', 7);
                window.location.href = 'kyz-kuumay.html';
            } else {
                alert("Ката! Бул борборго умтулуучу ылдамдыктын формуласы.");
            }
        }
    </script>
</body>
</html>
