<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Туруктуу электр тогу</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495571814896964" crossorigin="anonymous"></script>
    <script>window.yaContextCb=window.yaContextCb||[]</script>
    <script src="https://yandex.ru/ads/system/context.js" async></script>
    <style>
        body { background: #0b0f19; color: #fff; font-family: 'Comfortaa', cursive; padding: 20px; }
        .quiz-container { max-width: 620px; margin: 140px auto 30px auto; background: #151f32; padding: 30px; border-radius: 16px; border: 1px solid #00d2ff; }
        .btn-opt { display: block; width: 100%; padding: 14px; margin: 10px 0; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; cursor: pointer; text-align: left; font-family: 'Comfortaa'; font-size: 14px; transition: 0.2s; }
        .btn-opt:hover { background: #00d2ff; color: #000; font-weight: bold; }
        .header-title { text-align: center; color: #00d2ff; margin-bottom: 25px; font-size: 20px; }
        .ad-top-static { max-width: 728px; min-height: 90px; margin: 0 auto; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="ad-top-static">
        <div id="yandex_rtb_R-A-19536065-3"></div>
        <script>window.yaContextCb.push(()=>{Ya.Context.AdvManager.render({blockId: "R-A-19536065-3", renderTo: "yandex_rtb_R-A-19536065-3"})})</script>
    </div>
    <div class="quiz-container">
        <h2 class="header-title">6-Бөлүм: Туруктуу электр тогу</h2>
        <div id="question-box">
            <p id="q-text" style="font-size: 16px; margin-bottom: 20px; line-height: 1.5;"></p>
            <div id="options-box"></div>
        </div>
    </div>
    <script>
        const CHAPTER_ID = 6;
        const questions = [
            { q: "Чынжырдын бөлүгү үчүн Ом мыйзамынын формуласы кайсы?", opts: ["I = U / R", "P = I * I * R", "U = A / q", "R = p * l / S"], ans: 0 },
            { q: "Ток күчүн өлчөөчү курал эмне деп аталат?", opts: ["Вольтметр", "Амперметр", "Омметр", "Ваттметр"], ans: 1 }
        ];
        let currentQ = 0; let earnedXP = 0;
        function loadQuestion() {
            if(currentQ >= questions.length) { completeMission(); return; }
            const q = questions[currentQ];
            document.getElementById('q-text').innerText = `${currentQ + 1}. ${q.q}`;
            const optBox = document.getElementById('options-box'); optBox.innerHTML = "";
            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('button'); btn.className = "btn-opt"; btn.innerText = opt;
                btn.onclick = () => { if(idx === q.ans) { earnedXP += 50; }; currentQ++; loadQuestion(); };
                optBox.appendChild(btn);
            });
        }
        function completeMission() {
            let passed = parseInt(localStorage.getItem("physics_passed_level")) || 0;
            if(CHAPTER_ID > passed) localStorage.setItem("physics_passed_level", CHAPTER_ID);
            localStorage.setItem("physics_xp", (parseInt(localStorage.getItem("physics_xp")) || 0) + earnedXP);
            localStorage.setItem("physics_crystals", (parseInt(localStorage.getItem("physics_crystals")) || 0) + 2);
            alert(`Ийгиликтүү аяктады! +${earnedXP} XP жанданды.`);
            window.location.href = "quest-map.html";
        }
        window.onload = loadQuestion;
    </script>
</body>
</html>
