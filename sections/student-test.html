<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl — Тест Тапшыруу Системасы</title>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV60QV0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-9GSQV60QV0');
    </script>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/tests.css">
</head>
<body class="futuristic-hud student-body">
    <div class="stars-bg"></div>
    <div class="glow-overlay"></div>

    <div class="student-container">
        <!-- Toast System notifications -->
        <div id="studentToastContainer" class="toast-container"></div>

        <!-- AUTH / ACCESS SCREEN -->
        <div id="studentAuthBlock" class="hud-card student-gate-card">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-astronaut gate-icon cyan-glow"></i>
                <h2 id="gateTestTitle" class="mt-2">Тестке кирүү</h2>
                <p id="gateTestMeta" class="text-muted">Жүктөлүүдө...</p>
            </div>
            <form id="studentRegistrationForm" class="hud-form">
                <div class="form-group">
                    <label for="studentInputName">Аты-жөнүңүз (ФИО)*</label>
                    <input type="text" id="studentInputName" required placeholder="Мисалы: Садыков Алихан">
                </div>
                <div class="form-group">
                    <label for="studentInputClass">Классыңыз*</label>
                    <input type="text" id="studentInputClass" required placeholder="Мисалы: 9-А">
                </div>
                <div id="gatePinWrapper" class="form-group hidden">
                    <label for="studentInputPin">Тестке кирүү үчүн PIN-код*</label>
                    <input type="text" id="studentInputPin" placeholder="Мугалим берген код" maxlength="6">
                </div>
                <button type="submit" id="startTestBtn" class="hud-btn btn-primary btn-block mt-4">
                    <i class="fa-solid fa-play"></i> Тестти баштоо
                </button>
            </form>
        </div>

        <!-- ACTIVE TESTING RUNTIME HUD -->
        <div id="studentTestingBlock" class="hidden">
            <header class="testing-hud-header hud-card">
                <div class="test-identity">
                    <h3 id="runtimeTestTitle" class="cyan-glow">Тест жүрүүдө</h3>
                    <span id="runtimeStudentInfo" class="text-muted">Студент: -</span>
                </div>
                <div class="test-timer-hud" id="hudTimerWidget">
                    <i class="fa-solid fa-hourglass-half fa-spin-slow"></i>
                    <span id="runtimeCountdown">00:00</span>
                </div>
            </header>

            <div class="testing-workspace mt-4">
                <!-- Navigation panel for question indexes -->
                <div class="hud-card questions-navigation-hud">
                    <h4>Суроолор кутусу</h4>
                    <div class="q-matrix-grid" id="studentQuestionsMatrix">
                        <!-- Filled at runtime -->
                    </div>
                </div>

                <!-- Active question layout render -->
                <div class="hud-card question-display-card">
                    <div class="question-header-bar">
                        <span id="currentQuestionNumberLabel" class="question-badge">Суроо #1</span>
                        <span id="currentQuestionPointsLabel" class="points-badge">1 балл</span>
                    </div>
                    <div id="currentQuestionTextContainer" class="question-body-text mt-3">
                        Текст суроо...
                    </div>
                    <!-- Multimedia nodes container -->
                    <div id="questionMediaContainer" class="question-media-viewport mt-3 hidden"></div>
                    
                    <div id="questionOptionsContainer" class="options-render-zone mt-4">
                        <!-- Options generated based on types -->
                    </div>

                    <footer class="question-footer-navigation mt-5">
                        <button class="hud-btn btn-secondary" id="studentPrevQuestionBtn" disabled><i class="fa-solid fa-chevron-left"></i> Мурунку</button>
                        <button class="hud-btn btn-primary" id="studentNextQuestionBtn">Кийинки <i class="fa-solid fa-chevron-right"></i></button>
                        <button class="hud-btn btn-success hidden" id="studentSubmitTestBtn"><i class="fa-solid fa-circle-check"></i> Тестти аяктоо</button>
                    </footer>
                </div>
            </div>
        </div>

        <!-- POST-TEST RESULTS / FEEDBACK TERMINAL -->
        <div id="studentResultsBlock" class="hidden">
            <div class="hud-card result-terminal-card text-center">
                <i class="fa-solid fa-trophy trophy-icon yellow-glow animate-bounce"></i>
                <h2 class="cyan-glow mt-3">Тест ийгиликтүү аяктады!</h2>
                <p class="text-muted">Сиздин жыйынтыгыңыз туруктуу базага жазылды.</p>
                
                <div class="score-breakdown-hud mt-4">
                    <div class="score-circle">
                        <span id="resultPercentValue" class="percent">0%</span>
                        <span class="label">Жалпы көрсөткүч</span>
                    </div>
                    <div class="score-stats text-left">
                        <p><strong><i class="fa-solid fa-check text-success"></i> Туура жооптор:</strong> <span id="resultCorrectCount">0/0</span></p>
                        <p><strong><i class="fa-solid fa-star text-warning"></i> Топтолгон балл:</strong> <span id="resultPointsEarned">0</span></p>
                        <p><strong><i class="fa-solid fa-clock text-cyan"></i> Сарпталган убакыт:</strong> <span id="resultTimeSpent">0 мүнөт</span></p>
                    </div>
                </div>

                <!-- Safe Area for monetization banner placement -->
                <div class="adsense-safe-viewport mt-5">
                    <!-- Google AdSense Safe Frame -->
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-1495571814896964"
                         data-ad-slot="1574613769"></ins>
                    <script>
                         (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                </div>

                <!-- Adsterra 728x90 Banner Frame Integration -->
                <div class="adsterra-safe-viewport mt-4">
                    <script>
                        atOptions = {
                            'key' : '230e338703bb44150336cce1f0832fe3',
                            'format' : 'iframe',
                            'height' : 90,
                            'width' : 728,
                            'params' : {}
                        };
                    </script>
                    <script src="https://www.highperformanceformat.com/230e338703bb44150336cce1f0832fe3/invoke.js"></script>
                </div>
            </div>
        </div>
    </div>

    <!-- Core App Module Integration -->
    <script type="module" src="../assets/js/student-test.js"></script>
</body>
</html>
