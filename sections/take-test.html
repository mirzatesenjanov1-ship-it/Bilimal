<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl.org - Тест Тапшыруу</title>
    <!-- Google AdSense Скрипти -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-241750360816" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --success: #10b981;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
            user-select: none; /* Текст көчүрүүгө бөгөт коюу */
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 25px; margin-bottom: 25px; }
        .title { font-size: 22px; font-weight: bold; color: var(--primary); text-align: center; margin-bottom: 20px; }
        
        .ads-container {
            background: #111827;
            border: 1px dashed #374151;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            margin: 15px 0;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .ads-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        input[type="text"], select {
            width: 100%; padding: 12px; background-color: var(--bg-color);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); font-size: 14px; box-sizing: border-box;
        }
        
        .btn { width: 100%; padding: 14px; background-color: var(--success); color: white; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }

        .question-block { background: var(--bg-color); border: 1px solid var(--border); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .context-box { background: rgba(0, 210, 255, 0.05); border-left: 4px solid var(--primary); padding: 15px; margin-bottom: 15px; border-radius: 4px; font-style: italic; }
        .option-item { display: flex; align-items: center; gap: 12px; margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
        .option-item:hover { border-color: var(--primary); }
        
        .status-msg { text-align: center; color: var(--text-muted); font-size: 16px; padding: 40px; }
        .cheat-warning { color: var(--danger); font-weight: bold; text-align: center; margin-bottom: 15px; display: none; padding: 10px; border: 1px solid var(--danger); background: rgba(239, 68, 68, 0.1); border-radius: 6px; }
        
        textarea { width: 100%; padding: 12px; background-color: var(--bg-color); border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); font-size: 14px; box-sizing: border-box; height: 120px; resize: vertical; }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="cheatAlert" class="cheat-warning">⚠️ ЭСКЕРТҮҮ: Башка баракчага өтүүгө болбойт! Тест автоматтык түрдө жабылып калышы мүмкүн!</div>

    <!-- КАТТОО БЛОГУ -->
    <div id="authCard" class="card">
        <div class="title" id="testMainTitle">Тест жүктөлүүдө...</div>
        
        <div id="registrationForm" style="display: none;">
            <div class="form-group">
                <label>Аты-жөнүңүз (ФИО)</label>
                <input type="text" id="studentName" placeholder="Мисалы: Асанов Үсөн">
            </div>
            <div class="form-group">
                <label>Классыңыз (Мисалы: 11А, 11Б)</label>
                <input type="text" id="studentClass" placeholder="Мисалы: 11А">
            </div>
            <button class="btn" id="startTestBtn" style="background-color: var(--primary); color: #000;">Тестти баштоо 🚀</button>
            
            <!-- РЕКЛАМА БЛОК №1 -->
            <div class="ads-container">
                <div class="ads-label">Жарнама</div>
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-241750360816" data-ad-slot="7150360813" data-ad-format="auto" data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
        </div>
        
        <div id="loadingStatus" class="status-msg">Маалымат базасынан тест изделүүдө...</div>
    </div>

    <!-- ТЕСТТИН СУРООЛОРУ -->
    <div id="testContainer" style="display: none;">
        <div class="card">
            <div id="questionsDiv"></div>
            
            <!-- РЕКЛАМА БЛОК №2 -->
            <div class="ads-container">
                <div class="ads-label">Жарнама</div>
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-241750360816" data-ad-slot="7150360814" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <button class="btn" id="submitTestBtn">📋 Тестти аяктоо жана жыйынтыгын жиберүү</button>
        </div>
    </div>

    <!-- ЖЫЙЫНТЫК БАРАКЧАСЫ -->
    <div id="resultCard" class="card" style="display: none; text-align: center;">
        <div class="title" style="color: var(--success);">🎉 Тест ийгиликтүү тапшырылды!</div>
        <p style="font-size: 18px; margin: 20px 0;">Сиздин жыйынтыгыңыз түз эле мугалимдин журналына жөнөтүлдү.</p>
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;" id="finalScore">Балл: 0 / 0</div>
        <div style="font-size: 32px; font-weight: bold; color: var(--primary); margin-bottom: 25px;" id="finalGrade">Баа: 0</div>
        
        <!-- РЕКЛАМА БЛОК №3 -->
        <div class="ads-container" style="min-height: 250px;">
            <div class="ads-label">Сиз үчүн сунуштар</div>
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-241750360816" data-ad-slot="7150360815" data-ad-format="autorelaxed"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, get, set, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
        authDomain: "bilimal-org.firebaseapp.com",
        databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bilimal-org",
        storageBucket: "bilimal-org.appspot.com",
        messagingSenderId: "241750360816",
        appId: "1:241750360816:web:6cb1f92e9e8f6bf7ad0f8a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const testCode = urlParams.get('code');

    let teacherUid = null;
    let testId = null;
    let testData = null;
    let cheatCount = 0;
    let antiCheatEnabled = false;

    if (!testCode) {
        document.getElementById("loadingStatus").innerHTML = "❌ <span style='color:var(--danger)'>Ката: Тесттин коду табылган жок. Шилтемени мугалимден кайра сураңыз.</span>";
    } else {
        fetchTestMetaData();
    }

    async function fetchTestMetaData() {
        try {
            const lookupRef = ref(db, `global_test_lookup/${testCode}`);
            const snapshot = await get(lookupRef);
            
            if (snapshot.exists()) {
                const meta = snapshot.val();
                teacherUid = meta.teacher_uid;
                testId = meta.test_id;
                loadFullTest();
            } else {
                document.getElementById("loadingStatus").innerHTML = `❌ <span style='color:var(--danger)'>Ката: [${testCode}] коду базада жок же өчүрүлгөн.</span>`;
            }
        } catch (e) {
            document.getElementById("loadingStatus").innerText = "Байланыш катасы: " + e.message;
        }
    }

    async function loadFullTest() {
        try {
            const testRef = ref(db, `teachers_data/${teacherUid}/tests/${testId}`);
            const snapshot = await get(testRef);

            if (snapshot.exists()) {
                testData = snapshot.val();
                antiCheatEnabled = testData.anti_cheat !== undefined ? testData.anti_cheat : true;
                
                document.getElementById("testMainTitle").innerText = testData.title;
                document.getElementById("loadingStatus").style.display = "none";
                document.getElementById("registrationForm").style.display = "block";
            } else {
                document.getElementById("loadingStatus").innerHTML = "❌ <span style='color:var(--danger)'>Бул тест архивделген же өчүрүлгөн.</span>";
            }
        } catch (e) {
            document.getElementById("loadingStatus").innerText = "Жүктөө катасы: " + e.message;
        }
    }

    document.getElementById("startTestBtn").addEventListener("click", () => {
        const name = document.getElementById("studentName").value.trim();
        const sClass = document.getElementById("studentClass").value.trim().toUpperCase();

        if (!name || !sClass) {
            alert("Сураныч, аты-жөнүңүздү жана класыңызды толтуруңуз!");
            return;
        }

        document.getElementById("authCard").style.display = "none";
        document.getElementById("testContainer").style.display = "block";
        
        renderQuestions(testData.questions);

        if (antiCheatEnabled) {
            document.getElementById("cheatAlert").style.display = "block";
            activateAntiCheat();
        }
    });

    function renderQuestions(questions) {
        const container = document.getElementById("questionsDiv");
        container.innerHTML = "";

        if(!questions || questions.length === 0) {
            container.innerHTML = "<p>Бул тестте суроолор табылган жок.</p>";
            return;
        }

        questions.forEach((q, index) => {
            const block = document.createElement("div");
            block.className = "question-block";

            if (q.type === "simple") {
                block.innerHTML = `<p><strong>${index + 1}. ${q.question}</strong></p>`;
                if(q.options) {
                    q.options.forEach((opt, oIdx) => {
                        if(opt.text) {
                            block.innerHTML += `
                                <label class="option-item">
                                    <input type="radio" name="q-${index}" value="${oIdx}">
                                    <span>${opt.text}</span>
                                </label>
                            `;
                        }
                    });
                }
            } else if (q.type === "pisa") {
                block.innerHTML = `
                    <div class="context-box"><strong>Контекст:</strong><br>${q.context || ''}</div>
                    <p><strong>${index + 1}. ${q.question || ''}</strong></p>
                    <textarea id="pisa-${index}" placeholder="Бул жерге толук жообуңузду далилдеп жазыңыз..."></textarea>
                `;
            } else if (q.type === "essay") {
                let audioHTML = q.audioLink ? `<audio src="${q.audioLink}" controls></audio>` : '';
                block.innerHTML = `
                    <p><strong>${index + 1}. Тема: ${q.topic || ''}</strong></p>
                    ${audioHTML}
                    <p style="font-size:12px; color:var(--text-muted);">Минималдуу сөз саны: ${q.minWords || 0}</p>
                    <textarea id="essay-${index}" placeholder="Жоопту ушул жерге териңиз..."></textarea>
                `;
            }
            container.appendChild(block);
        });
    }

    function activateAntiCheat() {
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                cheatCount++;
                alert(`⚠️ ЭСКЕРТҮҮ: Башка баракчага өттүңүз! Тартип бузуу катталды. Калган мүмкүнчүлүк: ${3 - cheatCount}`);
                if (cheatCount >= 3) {
                    alert("❌ Сиз 3 жолу эрежени буздуңуз! Тест автоматтык түрдө аяктады.");
                    submitTest();
                }
            }
        });

        document.addEventListener("contextmenu", e => e.preventDefault());
        document.addEventListener("keydown", e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u')) {
                e.preventDefault();
                alert("🔒 Бул тестте текстти көчүрүүгө тыюу салынган!");
            }
        });
    }

    document.getElementById("submitTestBtn").addEventListener("click", () => {
        if (confirm("Тестти аяктап, мугалимге жиберүүнү каалайсызбы?")) {
            submitTest();
        }
    });

    // МУГАЛИМДИН ШКАЛАСЫ ЖАНА АЧЫК СУРООЛОР ҮЧҮН БААЛОО КАТТАЛЫШЫ
    async function submitTest() {
        let score = 0;
        let maxScore = 0;
        const studentAnswers = [];
        let isFullyAutomated = testData.type === "simple"; 

        testData.questions.forEach((q, index) => {
            let record = { type: q.type };

            if (q.type === "simple") {
                maxScore++;
                const selected = document.querySelector(`input[name="q-${index}"]:checked`);
                const answerIdx = selected ? parseInt(selected.value) : -1;
                
                record.selected_index = answerIdx;
                if (answerIdx !== -1 && q.options[answerIdx] && q.options[answerIdx].isCorrect) {
                    score++;
                }
            } else if (q.type === "pisa") {
                maxScore += 2; // PISA максималдуу 2 баллдык босого
                const pisaVal = document.getElementById(`pisa-${index}`);
                record.text_answer = pisaVal ? pisaVal.value.trim() : '';
                record.teacher_given_score = 0; 
            } else if (q.type === "essay") {
                maxScore += 10; // Эссе максималдуу 10 балл
                const essayVal = document.getElementById(`essay-${index}`);
                record.text_answer = essayVal ? essayVal.value.trim() : '';
                record.teacher_given_score = 0; 
            }
            studentAnswers.push(record);
        });

        let grade = "Текшерилүүдө ⏳";

        // Мугалим өзү орноткон шкала боюнча Жөнөкөй тестти дароо автоматтык баалоо
        if (isFullyAutomated) {
            const scale = testData.grading_scale || { min3: 0, min4: 0, min5: 0 };
            if (score >= scale.min5) grade = "5";
            else if (score >= scale.min4) grade = "4";
            else if (score >= scale.min3) grade = "3";
            else grade = "2";
        }

        const resultPayload = {
            student_name: document.getElementById("studentName").value.trim(),
            class: document.getElementById("studentClass").value.trim().toUpperCase(),
            test_code: testCode,
            test_title: testData.title,
            test_type: testData.type || 'simple',
            score: score, 
            max_score: maxScore,
            grade: grade,
            answers: studentAnswers,
            cheat_violations: cheatCount,
            submitted_at: Date.now()
        };

        try {
            const resultsRef = ref(db, `teachers_data/${teacherUid}/results`);
            const newResultRef = push(resultsRef);
            await set(newResultRef, resultPayload);

            document.getElementById("testContainer").style.display = "none";
            document.getElementById("cheatAlert").style.display = "none";
            document.getElementById("resultCard").style.display = "block";

            if (isFullyAutomated) {
                document.getElementById("finalScore").innerText = `Балл: ${score} / ${maxScore}`;
                document.getElementById("finalGrade").innerText = `Баа: ${grade}`;
            } else {
                document.getElementById("finalScore").innerText = `Жообуңуз ийгиликтүү кабыл алынды!`;
                document.getElementById("finalGrade").innerText = `Текшерилүүдө ⏳`;
                document.getElementById("finalGrade").style.color = "var(--text-muted)";
            }
        } catch (e) {
            alert("Жыйынтыкты жиберүүдө ката кетти: " + e.message);
        }
    }
</script>

</body>
</html>
