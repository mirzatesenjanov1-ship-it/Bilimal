<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl.org - Тест Тапшыруу</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --success: #10b981;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        input[type="text"], select {
            width: 100%; padding: 12px; background-color: var(--bg-color);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); font-size: 15px; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 12px; background-color: var(--primary);
            color: #000; font-size: 16px; font-weight: bold; border: none;
            border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .quiz-box { display: none; }
        .question-block { background: #0f1422; border: 1px solid var(--border); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .option-label { display: block; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 12px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .option-label:hover { border-color: var(--primary); background: rgba(0,210,255,0.02); }
        .option-label input { margin-right: 10px; }
        .timer-bar { background: #ff5252; color: #fff; padding: 10px; text-align: center; font-weight: bold; border-radius: 6px; margin-bottom: 20px; display: none; }
        .cheat-warning { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 6px; font-size: 13px; text-align: center; margin-bottom: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- КАТТОО ЭКРАНЫ -->
    <div id="authScreen">
        <h2>Салам! Тестке кош келдиңиз</h2>
        <p style="color:var(--text-muted); text-align:center; font-size:14px; margin-bottom:25px;">Сураныч, маалыматтарды так толтуруңуз.</p>
        
        <div class="form-group">
            <label>Аты-жөнүңүз (ФИО):</label>
            <input type="text" id="studentName" placeholder="Мисалы: Асан Үсөн уулу">
        </div>
        
        <div class="form-group">
            <label>Класыңызды тандаңыз:</label>
            <select id="studentClass">
                <option value="" disabled selected>-- Классты тандаңыз --</option>
            </select>
        </div>
        
        <button class="btn" onclick="startTestNow()"><i class="fa-solid fa-play"></i> Тестти баштоо</button>
    </div>

    <!-- ТЕСТ ТАПШЫРУУ ЭКРАНЫ -->
    <div id="quizScreen" class="quiz-box">
        <div class="cheat-warning" id="cheatCounterView">Эскертүү: Башка терезеге өтпөңүз!</div>
        <div class="timer-bar" id="timerDisplay">Убакыт: --:--</div>
        <h3 id="displayTestTitle" style="color:#fff; margin-bottom:20px;">Тест жүктөлүүдө...</h3>
        <div id="questionsContainer"></div>
        <button class="btn" style="background-color:var(--success); color:#fff;" onclick="finishTestAndSubmit(false)"><i class="fa-solid fa-paper-plane"></i> Жоопторду жөнөтүү</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, get, set, push, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
        authDomain: "bilimal-org.firebaseapp.com",
        databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bilimal-org",
        storageBucket: "bilimal-org.appspot.com",
        messagingSenderId: "241750360816",
        appId: "1:241750360816:web:6cb1f92e9e8f6bf7ad0f8a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let testCode = new URLSearchParams(window.location.search).get("code") || "";
    let teacherUid = null;
    let testId = null;
    let testData = null;
    let resultId = null; 
    let antiCheatActive = false;
    let countdownInterval = null;
    let leaveCount = 0; // 🔢 Окуучунун терезеден чыгуу санын эсептегич

    function generateClassOptions() {
        const select = document.getElementById("studentClass");
        const letters = ["А", "Б", "В", "Г", "Д"];
        for (let grade = 1; grade <= 12; grade++) {
            letters.forEach(letter => {
                const opt = document.createElement("option");
                opt.value = `${grade}-${letter}`;
                opt.innerText = `${grade}-${letter} классы`;
                select.appendChild(opt);
            });
        }
    }
    generateClassOptions();

    async function loadTestData() {
        if (!testCode) { alert("Тесттин коду табылган жок!"); return; }
        const lookup = await get(ref(db, `global_test_lookup/${testCode}`));
        if (!lookup.exists()) { alert("Мындай код менен тест табылган жок!"); return; }
        
        teacherUid = lookup.val().teacher_uid;
        testId = lookup.val().test_id;

        const testSnap = await get(ref(db, `teachers_data/${teacherUid}/tests/${testId}`));
        if (!testSnap.exists()) { alert("Тест маалыматы өчүрүлгөн!"); return; }
        testData = testSnap.val();
        antiCheatActive = testData.anti_cheat === true;
    }
    loadTestData();

    window.startTestNow = async function() {
        const name = document.getElementById("studentName").value.trim();
        const sClass = document.getElementById("studentClass").value;

        if (!name || !sClass) { alert("Атыңызды жазыңыз жана классты тандаңыз!"); return; }
        if (!testData) { alert("Тест толук жүктөлө элек, бир аз күтө туруңуз."); return; }

        document.getElementById("authScreen").style.display = "none";
        document.getElementById("quizScreen").style.display = "block";
        document.getElementById("displayTestTitle").innerText = testData.title;

        const resultRef = push(ref(db, `teachers_data/${teacherUid}/results`));
        resultId = resultRef.key;

        await set(resultRef, {
            student_name: name,
            student_class: sClass,
            test_code: testCode,
            test_title: testData.title,
            status: "Процесс", // Реалдуу убакытта мугалим "Чечүүдө..." деп көрөт
            timestamp: Date.now()
        });

        if (antiCheatActive) {
            setupAntiCheat();
        }

        renderQuestions();
        startTimer();
    }

    function setupAntiCheat() {
        const warningBox = document.getElementById("cheatCounterView");
        warningBox.style.display = "block";
        warningBox.innerText = "⚠️ Anti-Cheat КҮЙГҮЗҮЛДҮ! Башка терезеге өтсөңүз тест дароо жабылат! (Мүмкүнчүлүк: 3 жолу)";

        window.addEventListener("blur", logCheatAttempt);
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) logCheatAttempt();
        });
    }

    function logCheatAttempt() {
        if (!resultId) return;
        leaveCount++;
        
        const now = new Date();
        const timeStr = now.toLocaleTimeString();
        const warningBox = document.getElementById("cheatCounterView");

        if (leaveCount <= 3) {
            warningBox.innerText = `⚠️ ЭСКЕРТҮҮ! Сиз терезеден чыктыңыз! Калган мүмкүнчүлүк: ${3 - leaveCount}/3`;
            
            // Мугалимдин тактасына убактысы жана чыгуу номери менен заматта жазуу
            const logPushRef = push(ref(db, `teachers_data/${teacherUid}/results/${resultId}/logs`));
            set(logPushRef, {
                type: "leave",
                message: `⚠️ Окуучу терезеден чыкты [№${leaveCount}-жолу] (Шпаргалка коркунучу!)`,
                time: timeStr
            });
        } 
        
        // 🚨 Эгерде 3 жолудан ашып кетсе (4-жолу чыкканда) автоматтык түрдө куулат!
        if (leaveCount > 3) {
            window.removeEventListener("blur", logCheatAttempt);
            
            const logPushRef = push(ref(db, `teachers_data/${teacherUid}/results/${resultId}/logs`));
            set(logPushRef, {
                type: "kick",
                message: `🚫 ОКУУЧУ ТЕСТТЕН КУУЛДУ! 3төн ашык терезе алмаштырды.`,
                time: timeStr
            });
            
            finishTestAndSubmit(true); // Автоматтык түрдө бөгөттөп сактоо
        }
    }

    function renderQuestions() {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";
        if (!testData.questions) return;

        testData.questions.forEach((q, idx) => {
            const div = document.createElement("div");
            div.className = "question-block";
            
            if (q.type === "simple") {
                let optionsHtml = "";
                q.options.forEach((opt, oIdx) => {
                    optionsHtml += `<label class="option-label"><input type="radio" name="q-${idx}" value="${opt.text}"> ${opt.text}</label>`;
                });
                div.innerHTML = `<div><strong>Суроо №${idx+1}:</strong> ${q.question}</div><div style="margin-top:12px;">${optionsHtml}</div>`;
            } else if (q.type === "pisa") {
                div.innerHTML = `<div><strong>PISA Контекст:</strong><p style="background:#1c2333; padding:10px; border-radius:6px; font-size:14px; color:var(--text-muted);">${q.context}</p></div>
                                 <div><strong>Суроо №${idx+1}:</strong> ${q.question}</div>
                                 <textarea class="essay-answer" data-idx="${idx}" rows="3" style="width:100%; margin-top:10px; background:var(--bg-color); color:#fff; border:1px solid var(--border); padding:10px; border-radius:6px;" placeholder="Жообуңузду ушул жерге жазыңыз..."></textarea>`;
            } else if (q.type === "essay") {
                div.innerHTML = `<div><strong>Эссе темасы:</strong> <span style="color:var(--primary); font-weight:bold;">${q.topic}</span></div>
                                 ${q.audioLink ? `<div style="margin:10px 0;"><audio src="${q.audioLink}" controls style="width:100%;"></audio></div>` : ''}
                                 <div style="font-size:12px; color:var(--text-muted); margin-bottom:5px;">Минималдуу сөз саны: ${q.minWords}</div>
                                 <textarea class="essay-answer" data-idx="${idx}" rows="5" style="width:100%; background:var(--bg-color); color:#fff; border:1px solid var(--border); padding:10px; border-radius:6px;" placeholder="Эссени ушул жерге жазыңыз..."></textarea>`;
            }
            container.appendChild(div);
        });
    }

    function startTimer() {
        if (!testData.duration_minutes || testData.duration_minutes === "unlimited") return;
        let timeRemaining = parseInt(testData.duration_minutes) * 60;
        const display = document.getElementById("timerDisplay");
        display.style.display = "block";

        countdownInterval = setInterval(() => {
            let minutes = Math.floor(timeRemaining / 60);
            let seconds = timeRemaining % 60;
            display.innerText = `Убакыт калды: ${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            
            if (timeRemaining <= 0) {
                clearInterval(countdownInterval);
                finishTestAndSubmit(false);
            }
            timeRemaining--;
        }, 1000);
    }

    window.finishTestAndSubmit = async function(wasKicked = false) {
        if (countdownInterval) clearInterval(countdownInterval);
        window.removeEventListener("blur", logCheatAttempt);

        const savedAnswers = [];
        let autoScore = 0;
        let totalMaxPoints = 0;

        testData.questions.forEach((q, idx) => {
            let studentAns = "";
            let givenPoints = 0;

            if (q.type === "simple") {
                totalMaxPoints += (q.points || 1);
                const selected = document.querySelector(`input[name="q-${idx}"]:checked`);
                studentAns = selected ? selected.value : "";
                
                const correctOpt = q.options.find(o => o.isCorrect === true);
                if (correctOpt && correctOpt.text === studentAns) {
                    givenPoints = q.points || 1;
                    autoScore += givenPoints;
                }
            } else {
                totalMaxPoints += (q.points || 30);
                const txtArea = document.querySelector(`textarea[data-idx="${idx}"]`);
                studentAns = txtArea ? txtArea.value.trim() : "";
            }

            savedAnswers.push({
                question: q.question || q.topic || "Ачык суроо",
                student_answer: studentAns,
                max_points: q.points || (q.type === "essay" ? 100 : 30),
                given_points: givenPoints
            });
        });

        const isSimpleOnly = testData.type === 'SIMPLE';
        
        // Акыркы статус чечилет
        let finalStatus = isSimpleOnly ? "Бааланды" : "Аяктады";
        if (wasKicked) finalStatus = "Бөгөттөлдү";

        await update(ref(db, `teachers_data/${teacherUid}/results/${resultId}`), {
            answers: savedAnswers,
            score: wasKicked ? 0 : autoScore, // Эгер бөгөттөлсө 0 баллга айланат
            max_score: totalMaxPoints,
            status: finalStatus
        });

        if(wasKicked) {
            document.body.innerHTML = `<div style="text-align:center; padding:50px;"><h2 style="color:#ef4444;">🚫 ТЕСТТЕН БӨГӨТТӨЛДҮҢҮЗ!</h2><p>Сиз 3 жолудан ашык башка терезеге (шпаргалкага) өттүңүз. Жыйынтыгыңыз жокко чыгарылды жана мугалимге билдирилди!</p></div>`;
        } else {
            alert("Тест аяктады!");
            document.body.innerHTML = `<div style="text-align:center; padding:50px;"><h2 style="color:var(--success);">🎉 Тест аяктады!</h2><p>Жоопторуңуз мугалимге ийгиликтүү жөнөтүлдү.</p></div>`;
        }
    }
</script>
</body>
</html>
