<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl - Тест Аткаруу Барагы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b29;
            --primary: #00d2ff;
            --success: #10b981;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 60px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .title { color: var(--primary); font-size: 22px; font-weight: bold; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        input[type="text"], select, textarea {
            width: 100%; padding: 12px; background-color: var(--bg-color);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); font-size: 14px; box-sizing: border-box;
        }
        .btn { padding: 12px 25px; font-size: 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-primary { background-color: var(--primary); color: #000; }
        .btn-success { background-color: var(--success); color: white; margin-top: 25px; font-size: 16px; padding: 15px; }
        
        .q-block { background: var(--bg-color); border: 1px solid var(--border); padding: 20px; border-radius: 8px; margin-top: 20px; }
        .q-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; line-height: 1.5; }
        .option-label { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .option-label:hover { border-color: var(--primary); background: rgba(0, 210, 255, 0.05); }
        input[type="radio"] { width: 18px; height: 18px; cursor: pointer; }
        
        .cheat-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.98); z-index: 9999; justify-content: center; align-items: center;
            flex-direction: column; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .cheat-box { max-width: 500px; background: var(--card-bg); border: 2px solid var(--danger); padding: 30px; border-radius: 12px; }
        
        /* ⏱️ Таймердин стили */
        #testTimerDisplay {
            position: fixed; top: 20px; right: 20px; background: #ef4444; color: #fff;
            padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none; font-size: 15px;
        }
    </style>
</head>
<body>

<div id="testTimerDisplay">⏱️ Убакыт: --:--</div>

<div id="cheatOverlay" class="cheat-overlay">
    <div class="cheat-box">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 50px; color: var(--danger); margin-bottom: 15px;"></i>
        <h2 style="color: #fff; margin-top: 0;">ЭСКЕРТҮҮ!</h2>
        <p style="color: var(--text-muted); font-size: 15px; line-height: 1.6;">
            Тест учурунда башка терезеге өтүүгө же браузерди жашырууга таптакыр тыюу салынат! Бул аракет мугалимге билдирилди.
        </p>
        <button class="btn btn-primary" onclick="closeCheatOverlay()" style="margin-top: 15px;">Тестти улантуу ↩</button>
    </div>
</div>

<div class="container">
    <div class="card" id="startCard">
        <div class="title"><i class="fa-solid fa-user-graduate"></i> Тестке катталуу</div>
        <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">
            Сураныч, маалыматыңызды туура жазыңыз. Мугалим койгон убакыт жана чектөөлөр автоматтык түрдө колдонулат.
        </div>
        <div class="form-group">
            <label>Аты-жөнүңүз (ФИО):</label>
            <input type="text" id="studentName" placeholder="Мисалы: Асан Үсөн уулу">
        </div>
        <div class="form-group">
            <label>Классыңыз:</label>
            <input type="text" id="studentClass" placeholder="Мисалы: 11-Б">
        </div>
        <button class="btn btn-primary" id="startTestBtn">Тестти баштоо 🚀</button>
    </div>

    <div id="testContentCard" class="card" style="display: none;">
        <div id="testHeaderTitle" class="title" style="font-size: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 15px;">Жүктөлүүдө...</div>
        <div id="dynamicQuestionsArea"></div>
        <button class="btn btn-success" id="submitAnswersBtn">🏁 Тестти аяктоо жана жыйынтыкты жиберүү</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
        authDomain: "bilimal-org.firebaseapp.com",
        databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bilimal-org",
        storageBucket: "bilimal-org.appspot.com",
        messagingSenderId: "241750360816",
        appId: "1:241750360816:web:6cb1f92e9e8f6bf7ad0f8a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const testCode = urlParams.get('code');

    let globalTestData = null;
    let globalTeacherUid = null;
    let globalTestId = null;
    let myResultKey = null;
    let focusLossCount = 0; 
    let isTestActive = false; 
    let timerInterval = null;

    if (!testCode) {
        document.getElementById("startCard").innerHTML = "<div style='color:var(--danger); text-align:center;'>Ката: Тесттин коду табылган жок!</div>";
    } else {
        fetchTestMetaData();
    }

    async function fetchTestMetaData() {
        try {
            const lookupRef = ref(db, `global_test_lookup/${testCode}`);
            const lookupSnap = await get(lookupRef);
            if (!lookupSnap.exists()) {
                document.getElementById("startCard").innerHTML = "<div style='color:var(--danger); text-align:center;'>Мындай код менен тест табылган жок!</div>";
                return;
            }
            const meta = lookupSnap.val();
            globalTeacherUid = meta.teacher_uid;
            globalTestId = meta.test_id;

            const testRef = ref(db, `teachers_data/${globalTeacherUid}/tests/${globalTestId}`);
            const testSnap = await get(testRef);
            if (testSnap.exists()) {
                globalTestData = testSnap.val();
            }
        } catch (e) { console.error(e); }
    }

    document.getElementById("startTestBtn").addEventListener("click", () => {
        const name = document.getElementById("studentName").value.trim();
        const sClass = document.getElementById("studentClass").value.trim();

        if (!name || !sClass) { alert("Сураныч, маалыматтарды толтуруңуз!"); return; }
        if (!globalTestData) { alert("Тест жүктөлө элек, бир аз күтө туруңуз..."); return; }

        // ⏱️ АВТОМАТТАШТЫРУУ ТЕКШЕРҮҮЛӨРҮ
        const currentTime = Date.now();

        // А. Башталуу убактысын текшерүү
        if (globalTestData.start_time) {
            const startTimeStamp = new Date(globalTestData.start_time).getTime();
            if (currentTime < startTimeStamp) {
                alert(`🔒 Бул тест мугалим тарабынан бөгөттөлгөн! Ачыла турган убактысы: ${globalTestData.start_time}`);
                return;
            }
        }

        // Б. Аяктоо мөөнөтүн текшерүү
        if (globalTestData.end_time) {
            const endTimeStamp = new Date(globalTestData.end_time).getTime();
            if (currentTime > endTimeStamp) {
                alert("❌ Кечигип калдыңыз! Бул тестти тапшыруу убактысы бүтүп калган.");
                return;
            }
        }

        // В. Кирүү мүмкүнчүлүгүнүн санын (Чектөөнү) текшерүү
        if (globalTestData.attempts_limit && globalTestData.attempts_limit !== "unlimited") {
            const maxAttempts = parseInt(globalTestData.attempts_limit);
            let localAttempts = parseInt(localStorage.getItem(`attempts_${testCode}`)) || 0;
            
            if (localAttempts >= maxAttempts) {
                alert(`🚫 Сиз бул тестти максималдуу тапшыруу мүмкүнчүлүгүнөн (${maxAttempts} жолу) колдонуп бүткөнсүз! Кирүүгө тыюу салынат.`);
                return;
            }
            localStorage.setItem(`attempts_${testCode}`, localAttempts + 1);
        }

        // Катталуу аяктады, тестти баштоо
        myResultKey = "RES-" + Date.now() + "-" + Math.floor(Math.random() * 1000);
        document.getElementById("startCard").style.display = "none";
        document.getElementById("testContentCard").style.display = "block";
        document.getElementById("testHeaderTitle").innerText = `📚 Тема: ${globalTestData.title}`;

        renderQuestions(globalTestData.questions);
        isTestActive = true;
        saveLiveCheatProgress();

        // Г. Таймерди иштетүү (минута коюлган болсо)
        if (globalTestData.duration_minutes && globalTestData.duration_minutes !== "unlimited") {
            startTestTimer(parseInt(globalTestData.duration_minutes));
        }
    });

    function startTestTimer(minutesLimit) {
        let timeLeftSeconds = minutesLimit * 60;
        const timerDisplay = document.getElementById("testTimerDisplay");
        timerDisplay.style.display = "block";

        timerInterval = setInterval(() => {
            let mins = Math.floor(timeLeftSeconds / 60);
            let secs = timeLeftSeconds % 60;
            secs = secs < 10 ? "0" + secs : secs;

            timerDisplay.innerText = `⏱️ Убакыт: ${mins}:${secs}`;

            if (timeLeftSeconds <= 0) {
                clearInterval(timerInterval);
                timerDisplay.innerText = "Убакыт бүттү! ⏳";
                alert("⏰ Сизге берилген убакыт бүттү! Жоопторуңуз мугалимге автоматтык түрдө жөнөтүлөт.");
                forceSubmitAnswers(); // Мажбурлап жөнөтүү функциясы
            }
            timeLeftSeconds--;
        }, 1000);
    }

    function renderQuestions(questions) {
        const area = document.getElementById("dynamicQuestionsArea");
        area.innerHTML = "";
        if (!questions) return;

        questions.forEach((q, idx) => {
            const block = document.createElement("div");
            block.className = "q-block";
            block.setAttribute("data-type", q.type || "simple");

            if (q.type === "simple" || !q.type) {
                let optionsHTML = "";
                if (q.options) {
                    q.options.forEach((opt, oIdx) => {
                        optionsHTML += `
                            <label class="option-label">
                                <input type="radio" name="q-radio-${idx}" value="${oIdx}">
                                <span>${opt.text}</span>
                            </label>
                        `;
                    });
                }
                block.innerHTML = `
                    <div class="q-title">${idx + 1}. ${q.question} <span style="color:var(--primary); font-size:12px;">(макс. ${q.points || 1} балл)</span></div>
                    <div>${optionsHTML}</div>
                `;
            } else if (q.type === "pisa") {
                block.innerHTML = `
                    <div class="q-title">${idx + 1}. [PISA Тапшырмасы]</div>
                    <div style="background:rgba(255,255,255,0.02); padding:12px; border-radius:6px; border-left:3px solid var(--primary); font-size:14px; margin-bottom:15px; color:var(--text-muted); line-height:1.6; white-space:pre-wrap;">${q.context}</div>
                    <div class="q-title" style="font-size:15px;">Суроо: ${q.question} <span style="color:var(--primary); font-size:12px;">(макс. ${q.points || 2} балл)</span></div>
                    <textarea class="text-answer-input" rows="4" placeholder="Жообуңузду ушул жерге негиздеп жазыңыз..."></textarea>
                `;
            } else if (q.type === "essay") {
                let audioHTML = q.audioLink ? `<div style="margin-bottom:12px;"><audio src="${q.audioLink}" controls style="width:100%;"></audio></div>` : "";
                block.innerHTML = `
                    <div class="q-title">${idx + 1}. [Эссе / Диктант Тапшырмасы]</div>
                    <p style="font-size:14px; color:var(--text-muted); line-height:1.5;">${q.topic}</p>
                    ${audioHTML}
                    <div style="font-size:12px; color:var(--danger); margin-bottom:8px;">Минималдуу сөз саны: ${q.minWords || 0} сөз</div>
                    <textarea class="text-answer-input" rows="8" placeholder="Текстти ушул жерге жазыңыз..."></textarea>
                `;
            }
            area.appendChild(block);
        });
    }

    // Anti-Cheat реалдуу убакытта базага жазуу
    function saveLiveCheatProgress() {
        if (!isTestActive || !globalTestData.anti_cheat) return;
        const name = document.getElementById("studentName").value.trim();
        const sClass = document.getElementById("studentClass").value.trim();
        
        set(ref(db, `teachers_data/${globalTeacherUid}/results/${myResultKey}`), {
            student_name: name,
            class: sClass,
            test_code: testCode,
            test_title: globalTestData.title,
            focus_loss_count: focusLossCount,
            score: 0,
            max_score: calculateMaxScore(),
            grade: "Текшерилүүдө ⏳",
            is_reviewed: false,
            answers: []
        });
    }

    function triggerCheatDetected() {
        if (!isTestActive || !globalTestData.anti_cheat) return;
        focusLossCount++;
        document.getElementById("cheatOverlay").style.display = "flex";
        saveLiveCheatProgress();
    }

    window.closeCheatOverlay = function() {
        document.getElementById("cheatOverlay").style.display = "none";
    }

    // Стабилдүү бөгөттөөлөр
    window.addEventListener('blur', () => { triggerCheatDetected(); });
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') { triggerCheatDetected(); } });
    document.addEventListener('copy', (e) => { e.preventDefault(); alert('❌ Текстти көчүрүүгө тыюу салынган!'); });
    document.addEventListener('paste', (e) => { e.preventDefault(); alert('❌ Сырттан текст чаптоого тыюу салынган!'); });
    document.addEventListener('contextmenu', (e) => { e.preventDefault(); });

    function calculateMaxScore() {
        let max = 0;
        if(globalTestData && globalTestData.questions) {
            globalTestData.questions.forEach(q => max += (parseInt(q.points) || 1));
        }
        return max;
    }

    // КАТАРДАН ЖӨНӨТҮҮ (ОКУУЧУ ӨЗҮ БАССА)
    document.getElementById("submitAnswersBtn").addEventListener("click", () => {
        if (confirm("Тестти аяктап, жыйынтыкты мугалимге жөнөтөсүзбү?")) {
            forceSubmitAnswers();
        }
    });

    // МАНЕВДҮҮ / АВТОМАТТЫК ЖӨНӨТҮҮ ФУНКЦИЯСЫ
    async function forceSubmitAnswers() {
        if (!isTestActive) return;
        isTestActive = false; // Бөгөттөөлөр токтойт
        if(timerInterval) clearInterval(timerInterval);
        document.getElementById("testTimerDisplay").style.display = "none";
        document.getElementById("submitAnswersBtn").disabled = true;

        const qBlocks = document.querySelectorAll(".q-block");
        const studentAnswersArray = [];
        let totalScore = 0;

        qBlocks.forEach((block, idx) => {
            const type = block.getAttribute("data-type");
            const originalQ = globalTestData.questions[idx];
            let ansData = { type: type, selected_index: -1, text_answer: "", teacher_given_score: 0 };

            if (type === "simple") {
                const radio = block.querySelector(`input[name="q-radio-${idx}"]:checked`);
                if (radio) {
                    const selIdx = parseInt(radio.value);
                    ansData.selected_index = selIdx;
                    if (originalQ.options[selIdx] && originalQ.options[selIdx].isCorrect) {
                        totalScore += (parseInt(originalQ.points) || 1);
                    }
                }
            } else {
                const txt = block.querySelector(".text-answer-input");
                ansData.text_answer = txt ? txt.value.trim() : "";
            }
            studentAnswersArray.push(ansData);
        });

        let maxScore = calculateMaxScore();
        let percent = (totalScore / maxScore) * 100;
        let finalGrade = "2";

        if (globalTestData.type === "simple") {
            if (percent >= 85) finalGrade = "5";
            else if (percent >= 70) finalGrade = "4";
            else if (percent >= 40) finalGrade = "3";
        } else {
            finalGrade = "Текшерилүүдө ⏳";
        }

        const name = document.getElementById("studentName").value.trim();
        const sClass = document.getElementById("studentClass").value.trim();
        const finalResultRef = ref(db, `teachers_data/${globalTeacherUid}/results/${myResultKey}`);
        
        try {
            await set(finalResultRef, {
                student_name: name,
                class: sClass,
                test_code: testCode,
                test_title: globalTestData.title,
                score: totalScore,
                max_score: maxScore,
                grade: finalGrade,
                focus_loss_count: focusLossCount,
                is_reviewed: false,
                answers: studentAnswersArray,
                submitted_at: Date.now()
            });

            document.getElementById("testContentCard").innerHTML = `
                <div style="text-align:center; padding:20px 0;">
                    <i class="fa-solid fa-circle-check" style="font-size:60px; color:var(--success); margin-bottom:20px;"></i>
                    <h2 style="color:#fff;">Тест аяктады!</h2>
                    <p style="color:var(--text-muted);">Жоопторуңуз базага ийгиликтүү сакталды.</p>
                </div>
            `;
        } catch (e) { alert("Ката: " + e.message); }
    }
</script>
</body>
</html>
