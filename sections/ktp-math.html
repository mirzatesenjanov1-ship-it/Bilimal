<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математика жана Алгебра КТП | BilimAl</title>
    <style>
        :root {
            --bg-color: #03030c;
            --card-bg: rgba(10, 10, 25, 0.85);
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --primary-accent: #00f0ff;
            --border-glow: rgba(0, 240, 255, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 4%;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-link, .admin-login-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0, 240, 255, 0.15);
            color: var(--primary-accent);
            border: 1px solid var(--primary-accent);
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .back-link:hover, .admin-login-btn:hover {
            background: var(--primary-accent);
            color: #000;
            box-shadow: 0 0 15px rgba(0,240,255,0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            padding-bottom: 25px;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(0,240,255,0.3);
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* 🔒 АДМИН ПАНЕЛЬ СТИЛИ */
        .admin-panel {
            display: none;
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid #ff00ff;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.1);
        }

        .admin-panel h2 {
            color: #ff00ff;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .admin-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .admin-form input, .admin-form textarea {
            background: #0d0d21;
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 6px;
            padding: 12px;
            color: #fff;
            font-size: 0.95rem;
        }

        .admin-form input:focus, .admin-form textarea:focus {
            border-color: #ff00ff;
            outline: none;
        }

        .admin-form button {
            background: #ff00ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .admin-form button:hover {
            background: #00f0ff;
            color: #000;
            box-shadow: 0 0 15px rgba(0,240,255,0.5);
        }

        /* КАРТАЛАРДЫН СЕТКАСЫ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .ktp-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            position: relative;
        }

        .ktp-card:hover {
            border-color: var(--primary-accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,240,255,0.2);
        }

        .ktp-card h3 {
            margin-top: 0;
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 12px;
        }

        .ktp-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .download-btn {
            display: block;
            text-align: center;
            background: rgba(0, 240, 255, 0.1);
            color: var(--primary-accent);
            border: 1px solid var(--primary-accent);
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .download-btn:hover {
            background: var(--primary-accent);
            color: #000;
        }

        .delete-btn {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff0055;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="#" onclick="window.close(); return false;" class="back-link">← Терезени жабуу</a>
        <button class="admin-login-btn" id="loginBtn" onclick="toggleAdmin()">Администратор</button>
    </div>
    
    <div class="header">
        <h1>Математика жана Алгебра боюнча КТП (Пландар)</h1>
        <p>Бардык класстар үчүн даяр бекитилген календарлык-тематикалык пландарды Excel форматында жүктөп алыңыз.</p>
    </div>

    <!-- 🔒 Жаңы план кошуу үчүн жашыруун Админ-панель -->
    <div class="admin-panel" id="adminPanel">
        <h2>🔧 Администратор панели (Жаңы КТП кошуу)</h2>
        <div class="admin-form">
            <input type="text" id="classTitle" placeholder="Мисалы: 9-класс — Алгебра" required>
            <textarea id="classDesc" placeholder="Кыскача түшүндүрмөсү, саат саны..." rows="2" required></textarea>
            <input type="text" id="fileUrl" placeholder="Файлдын дареги (Мисалы: files/plan9.xlsx)" required>
            <button onclick="addNewKtp()">Планды кошуу</button>
        </div>
    </div>

    <!-- КТП Карталары жайгаша турган жер -->
    <div class="grid" id="ktpGrid">
        <!-- Стандарттык базалык КТПлар автоматтык түрдө скрипт аркылуу төмөндө жүктөлөт -->
    </div>

    <script>
        // Баштапкы даяр КТПлардын тизмеси (База)
        const defaultKtpList = [
            { id: 1, title: "5-класс — Математика", desc: "Жылдык жалпы сааты: 170 саат (жумасына 5 саат). Иерархиясы жана чейректерге бөлүнүшү так көрсөтүлгөн.", url: "files/math_5_класс_ктп.xlsx" },
            { id: 2, title: "6-класс — Математика", desc: "Жылдык жалпы сааты: 170 саат (жумасына 5 саат). Мамлекеттик стандартка ылайыкталган даяр КТП.", url: "files/math_6_класс_ктп.xlsx" },
            { id: 3, title: "7-класс — Алгебра", desc: "Жылдык жалпы сааты: 102 саат (жумасына 3 саат). Сызыктуу теңдемелер, функциялар жана даражалар бөлүмдөрү менен.", url: "files/algebra_7_класс_ктп.xlsx" },
            { id: 4, title: "7-класс — Геометрия", desc: "Жылдык жалпы сааты: 68 саат (жумасына 2 саат). Геометриянын баштапкы түшүнүктөрү жана үч бурчтуктар.", url: "files/geometry_7_класс_ктп.xlsx" },
            { id: 5, title: "8-класс — Алгебра", desc: "Жылдык жалпы сааты: 102 саат (жумасына 3 саат). Квадраттык тамырлар, теңдемелер жана барабарсыздыктар камтылган.", url: "files/algebra_8_класс_ктп.xlsx" },
            { id: 6, title: "8-класс — Геометрия", desc: "Жылдык жалпы сааты: 68 саат (жумасына 2 саат). Төрт бурчтуктар, Пифагор теоремасы жана аянттарды эсептөө.", url: "files/geometry_8_класс_ктп.xlsx" }
        ];

        let isAdmin = false;
        // Сырсөздү ушул жерден өзгөртүп алсаңыз болот (Азыркысы: admin777)
        const ADMIN_PASSWORD = "admin777"; 

        // Ички эс тутумдан маалыматтарды окуу
        let customKtpList = JSON.parse(localStorage.getItem('customKtpList')) || [];

        function renderKtp() {
            const grid = document.getElementById('ktpGrid');
            grid.innerHTML = '';
            
            // Базалык жана сиз кошкон КТПларды бириктирүү
            const allKtp = [...defaultKtpList, ...customKtpList];

            allKtp.forEach(item => {
                const card = document.createElement('div');
                card.className = 'ktp-card';
                card.innerHTML = `
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                    <a href="${item.url}" class="download-btn" download>Excel жүктөө</a>
                    <button class="delete-btn" onclick="deleteKtp(${item.id})">Өчүрүү</button>
                `;
                
                // Эгер админ режими күйүп турса, өчүрүү баскычын көрсөтүү
                if (isAdmin) {
                    card.querySelector('.delete-btn').style.display = 'block';
                }

                grid.appendChild(card);
            });
        }

        // Админ режимге кирүү / чыгуу
        function toggleAdmin() {
            if (!isAdmin) {
                const pass = prompt("Администратордун сырсөзүн киргизиңиз:");
                if (pass === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.getElementById('adminPanel').style.display = 'block';
                    document.getElementById('loginBtn').innerText = 'Админден чыгуу';
                    document.getElementById('loginBtn').style.background = '#ff00ff';
                    document.getElementById('loginBtn').style.color = '#fff';
                    renderKtp();
                } else if (pass !== null) {
                    alert("Ката сырсөз!");
                }
            } else {
                isAdmin = false;
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('loginBtn').innerText = 'Администратор';
                document.getElementById('loginBtn').style.background = 'rgba(0, 240, 255, 0.15)';
                document.getElementById('loginBtn').style.color = 'var(--primary-accent)';
                renderKtp();
            }
        }

        // Жаңы КТП кошуу функциясы
        function addNewKtp() {
            const title = document.getElementById('classTitle').value;
            const desc = document.getElementById('classDesc').value;
            const url = document.getElementById('fileUrl').value;

            if (!title || !desc || !url) {
                alert("Сураныч, бардык талааларды толтуруңуз!");
                return;
            }

            const newKtp = {
                id: Date.now(), // уникалдуу ID үчүн
                title: title,
                desc: desc,
                url: url
            };

            customKtpList.push(newKtp);
            localStorage.setItem('customKtpList', JSON.stringify(customKtpList));
            
            // Талааларды тазалоо
            document.getElementById('classTitle').value = '';
            document.getElementById('classDesc').value = '';
            document.getElementById('fileUrl').value = '';

            renderKtp();
            alert("Жаңы календарлык план ийгиликтүү кошулду!");
        }

        // КТПны өчүрүү функциясы
        function deleteKtp(id) {
            // Базалык пландар өчпөйт, сиз кошкондор гана өчөт
            if (defaultKtpList.some(item => item.id === id)) {
                alert("Базалык стандарттык пландарды өчүрүүгө болбойт!");
                return;
            }

            if (confirm("Бул КТПны өчүрүүнү каалайсызбы?")) {
                customKtpList = customKtpList.filter(item => item.id !== id);
                localStorage.setItem('customKtpList', JSON.stringify(customKtpList));
                renderKtp();
            }
        }

        // Баракча ачылганда пландарды көрсөтүү
        renderKtp();
    </script>
</body>
</html>
