<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <title>⚡ Алтын Төбө: Электродинамика</title>
    <script>window.MathJax = { tex: { inlineMath: [['$', '$']] } };</script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        body { background: #030712; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111827; padding: 25px; border-radius: 12px; max-width: 650px; margin: 30px auto; border-left: 5px solid #eab308; }
        .btn { background: #eab308; color:#000; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; display: block; margin: 20px auto; font-weight:bold; }
        .option { display: block; background: #1f2937; padding: 15px; margin: 10px 0; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>⚡ 3-деңгээл: Чынжырдын бөлүгү үчүн Ом мыйзамы</h2>
        <p style="margin: 15px 0;">Кедергиси $R = 5 \text{ Ом}$ болгон өткөргүчтөн $I = 2 \text{ А}$ ток өтүп жатат. Өткөргүчтүн учтарындагы чыңалуу ($U$) эмнеге барабар?</p>
        <div class="option"><input type="radio" name="q3" value="A"> A) $2.5 \text{ В}$</div>
        <div class="option"><input type="radio" name="q3" value="B"> B) $10 \text{ В}$</div>
        <div class="option"><input type="radio" name="q3" value="C"> C) $7 \text{ В}$</div>
        <button class="btn" onclick="checkAnswer()">Жоопту текшерүү 🚀</button>
    </div>

    <script>
        function checkAnswer() {
            let ans = document.querySelector('input[name="q3"]:checked');
            if (ans && ans.value === "B") {
                alert("Туура! Ом мыйзамы боюнча: $U = I \\cdot R = 2 \\cdot 5 = 10 \\text{ В}$. Кийинки деңгээл ачылды!");
                localStorage.setItem('bilimal_current_level', 4);
                window.location.href = 'quest-map.html';
            } else {
                alert("Ката! Формуланы кайра караңыз.");
            }
        }
    </script>
</body>
</html>
