<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilimal - Жыйынтыктар Борбору</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV60QV0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date()); gtag('config', 'G-9GSQV60QV0');
    </script>
    <link rel="stylesheet" href="/assets/css/tests.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer type="module" src="/assets/js/firebase-config.js"></script>
    <script defer type="module" src="/assets/js/toast.js"></script>
    <script defer type="module" src="/assets/js/teacher-activity.js"></script>
    <script defer type="module" src="/assets/js/annual-report.js"></script>
    <script defer type="module" src="/assets/js/test-results.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar-panel">
            <div class="brand-zone"><h2>Bilimal</h2></div>
            <nav class="nav-menu">
                <button class="nav-btn" onclick="window.location.href='/sections/tests.html'"><i class="fa-solid fa-chart-pie"></i> Башкаруу панели</button>
                <button class="nav-btn" onclick="window.location.href='/sections/test-builder.html'"><i class="fa-solid fa-wand-magic-sparkles"></i> Smart Test Builder</button>
                <button class="nav-btn active" onclick="window.location.href='/sections/test-results.html'"><i class="fa-solid fa-graduation-cap"></i> Жыйынтыктар</button>
            </nav>
        </aside>
        <main class="main-content">
            <div class="data-glass-panel" style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h2>Окуучулардын Жыйынтыктары</h2>
                    <p style="font-size:12px; color:rgba(255,255,255,0.5);">Чыныгы убакыт режиминде баалоо журналы.</p>
                </div>
                <button id="btnDownloadReports" class="btn-primary-glow"><i class="fa-solid fa-file-excel"></i> Excel CSV Жүктөө (UTF-8 BOM)</button>
            </div>
            <div class="data-glass-panel" style="display:flex; gap:15px;">
                <select id="resFilterClass" style="flex:1; padding:10px; background:#111; color:white; border-radius:6px; border:1px solid #333;"><option value="all">Бардык класстар</option></select>
                <select id="resFilterTest" style="flex:1; padding:10px; background:#111; color:white; border-radius:6px; border:1px solid #333;"><option value="all">Бардык тесттер</option></select>
                <select id="resFilterSubject" style="display:none;"><option value="all"></option></select>
            </div>
            <div id="classesResultsContainer"></div>
        </main>
    </div>
    <div id="globalModalContainer" class="modal-overlay-system" style="display:none;"><div class="modal-glass-window" style="max-width:600px;"><h3 id="globalModalTitle">Билдирүү</h3><div id="globalModalBody"></div></div></div>
