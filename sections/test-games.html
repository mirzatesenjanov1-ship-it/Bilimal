<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оюн-Тесттер — BiliMal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: #04040d; color: #fff; padding: 40px 5%; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding-bottom: 15px; }
        .btn-back { border: 1px solid #00f0ff; color: #00f0ff; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; }
        .btn-back:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px #00f0ff; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 20px; }
        .game-card { background: rgba(15, 15, 40, 0.6); border: 1px solid rgba(255, 0, 255, 0.2); border-radius: 15px; padding: 25px; text-align: center; transition: 0.3s; }
        .game-card:hover { transform: translateY(-5px); border-color: #00f0ff; box-shadow: 0 5px 25px rgba(0, 240, 255, 0.2); }
        .game-title { font-size: 1.3rem; color: #00f0ff; margin: 15px 0 10px; }
        .btn-play { background: linear-gradient(90deg, #ff00ff, #7000ff); border: none; color: white; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <script>
        // АЧЫЛГАНДА ЭҢ БИРИНЧИ VIP ТЕКШЕРҮҮ КҮЧҮНӨ КИРЕТ
        const premiumUntil = localStorage.getItem('bilimal_premium_until');
        if (!premiumUntil || parseInt(premiumUntil) < new Date().getTime()) {
            alert("Бул премиум оюн бөлүмү! Сураныч, адегенде МБанк аркылуу жазылууну активдештириңиз.");
            window.location.href = '../auth/payment.html';
        }
    </script>

    <header>
        <a href="../dashboard.html" class="btn-back">← Кабинетке</a>
        <h1 style="background: linear-gradient(45deg, #00f0ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Улуттук Оюн Симуляциялары</h1>
        <div style="width: 90px;"></div>
    </header>

    <div class="games-grid">
        <div class="game-card">
            <div style="font-size: 3.5rem;">🐎</div>
            <div class="game-title">Кыз Куумай: Физика Онлайн</div>
            <p style="color:#7e8bbd; font-size:0.9rem; margin-bottom:20px;">Ылдамдык, тезденүү жана аралык формулалары боюнча реалдуу убакыттагы интерактивдүү жарыш оюну.</p>
            <button class="btn-play" onclick="alert('Кыз Куумай оюну башталууда...')">ОЙНОО</button>
        </div>

        <div class="game-card">
            <div style="font-size: 3.5rem;">🪢</div>
            <div class="game-title">Аркан Тартыш: Күч Энергиясы</div>
            <p style="color:#7e8bbd; font-size:0.9rem; margin-bottom:20px;">Ньютондун үчүнчү закону жана күчтөрдүн вектордук тең салмактуулугу боюнча динамикалык мелдеши.</p>
            <button class="btn-play" onclick="alert('Аркан Тартыш оюну жакын арада кошулат!')" style="background:#222; color:#555; cursor:not-allowed;">КҮТҮҮДӨ</button>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
</body>
</html>
