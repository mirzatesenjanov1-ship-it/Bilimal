<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilimal - Башкы Администратордук Панель</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV60QV0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date()); gtag('config', 'G-9GSQV60QV0');
    </script>
    <link rel="stylesheet" href="/assets/css/tests.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer type="module" src="/assets/js/firebase-config.js"></script>
    <script defer type="module" src="/assets/js/toast.js"></script>
    <script defer type="module" src="/assets/js/admin-dashboard.js"></script>
    <script defer type="module" src="/assets/js/ad-manager.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar-panel" style="background:#0f0f1a;">
            <div class="brand-zone"><h2 style="color:var(--neon-purple);">Admin Panel</h2></div>
            <nav class="nav-menu">
                <button class="nav-btn active"><i class="fa-solid fa-user-shield"></i> Системалык Мониторинг</button>
            </nav>
        </aside>
        <main class="main-content">
            <div class="data-glass-panel" style="border-left: 4px solid var(--neon-purple);">
                <h2>Башкы Системалык Администратордук Башкаруу Борбору</h2>
                <p>Бардык катталган мугалимдерди жана реалдуу убакыттагы аракеттердин журналын көзөмөлдөө.</p>
            </div>
            <div class="stats-grid" style="display:flex; gap:20px; margin-bottom:20px;">
                <div class="data-glass-panel" style="flex:1; text-align:center;"><h4>Катталган Мугалимдер</h4><div id="adminStatTeachers" style="font-size:32px; font-weight:bold; color:var(--neon-purple);">0</div></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="data-glass-panel">
                    <h3>Мугалимдердин Активдүү Тизмеси</h3>
                    <table class="futuristic-table">
                        <thead><tr><th>Колдонуучу</th><th>Предмети</th><th>Абалы</th><th>Аракеттер</th></tr></thead>
                        <tbody id="adminTeachersTableBody"></tbody>
                    </table>
                </div>
                <div class="data-glass-panel">
                    <h3>Глобалдык Окуялар Журналы (Акыркы 20 лог)</h3>
                    <div id="adminActivityLog" style="max-height:300px; overflow-y:auto; font-family:monospace; color:#bbb;"></div>
                </div>
            </div>
            <div id="adsterraBanner728x90" style="margin-top:auto; text-align:center;"></div>
        </main>
    </div>
</body>
</html>
