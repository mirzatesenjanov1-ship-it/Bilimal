<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find The Country — BiliMal</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV6QV0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9GSQV6QV0');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #030310; color: #fff; padding: 30px 4%; text-align: center; }
        .back-btn { display: inline-block; padding: 8px 16px; border: 1px solid #e11d48; color: #e11d48; text-decoration: none; border-radius: 6px; margin-bottom: 25px; float: left; font-weight: bold; }
        .game-card { max-width: 600px; margin: 50px auto; background: rgba(25,20,40,0.8); border: 1px solid #e11d48; border-radius: 20px; padding: 35px; }
        .target { font-size: 1.8rem; color: #ffaa00; margin: 20px 0; font-weight: bold; }
        .map-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .map-btn { background: #1e1b4b; border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; color: #fff; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .map-btn:hover { border-color: #00ff96; background: rgba(0,255,150,0.1); }
        #fb { margin-top: 20px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <a href="geography-main.html" class="back-btn">← Артка</a>
    <div class="game-card">
        <h2>🏳️ Өлкөнү Тап оюну ("Find The Country")</h2>
        <div class="target">Казакстанды тап!</div>
        
        <div class="map-options">
            <button class="map-btn" onclick="checkAns(false, this)">Өзбекстан</button>
            <button class="map-btn" onclick="checkAns(true, this)">Казакстан</button>
            <button class="map-btn" onclick="checkAns(false, this)">Кыргызстан</button>
            <button class="map-btn" onclick="checkAns(false, this)">Кытай</button>
        </div>
        <div id="fb"></div>
    </div>
    <script>
        function checkAns(isCorrect, btn) {
            const fb = document.getElementById('fb');
            if(isCorrect) {
                btn.style.background = '#00ff96';
                btn.style.color = '#000';
                fb.innerHTML = "<span style='color:#00ff96;'>🟢 Туура! Упай +10 ⭐</span>";
                let currentXp = parseInt(localStorage.getItem('geo_xp') || 0);
                localStorage.setItem('geo_xp', currentXp + 10);
            } else {
                btn.style.background = '#e11d48';
                fb.innerHTML = "<span style='color:#e11d48;'>🔴 Кайра аракет кыл 🔄</span>";
            }
        }
    </script>
</body>
</html>
