<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Океан Квести — BiliMal</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV6QV0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9GSQV6QV0');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #030310; color: #fff; padding: 30px 4%; text-align: center; }
        .back-btn { display: inline-block; padding: 8px 16px; border: 1px solid #06b6d4; color: #06b6d4; text-decoration: none; border-radius: 6px; float: left; font-weight: bold; }
        .box { max-width: 600px; margin: 50px auto; background: rgba(20,30,50,0.8); border: 1px solid #06b6d4; border-radius: 20px; padding: 35px; }
        .target { font-size: 1.4rem; color: #06b6d4; margin: 20px 0; font-weight: bold; }
        .quest-btn { background: #1e1b4b; border: 1px solid #06b6d4; padding: 15px; border-radius: 10px; color: #fff; width: 100%; margin-top: 10px; cursor: pointer; font-size: 1.1rem; }
        #fb { margin-top: 20px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <a href="geography-main.html" class="back-btn">← Артка</a>
    <div class="box">
        <h2>🌊 Океан жана дарыя квести</h2>
        <div class="target">Тапшырма: Амазонка дарыясын тап!</div>

        <button class="quest-btn" onclick="check(false)">Нил дарыясы</button>
        <button class="quest-btn" onclick="check(true)">Амазонка дарыясын тап</button>
        <button class="quest-btn" onclick="check(false)">Тынч океан</button>
        <div id="fb"></div>
    </div>
    <script>
        function check(ok) {
            const fb = document.getElementById('fb');
            if(ok) {
                fb.innerHTML = "<span style='color:#00ff96;'>🌊 Суу анимациясы иштеди! Туура таптыңыз! +15 XP</span>";
                let currentXp = parseInt(localStorage.getItem('geo_xp') || 0);
                localStorage.setItem('geo_xp', currentXp + 15);
            } else {
                fb.innerHTML = "<span style='color:#ef4444;'>Бул башка гидрологиялык объект. Жакшылап издеңиз.</span>";
            }
        }
    </script>
</body>
</html>
