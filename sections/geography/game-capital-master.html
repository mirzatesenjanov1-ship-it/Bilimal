<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Master — BiliMal</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV6QV0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9GSQV6QV0');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #030310; color: #fff; padding: 30px 4%; text-align: center; }
        .back-btn { display: inline-block; padding: 8px 16px; border: 1px solid #f59e0b; color: #f59e0b; text-decoration: none; border-radius: 6px; float: left; font-weight: bold; }
        .game-box { max-width: 600px; margin: 50px auto; background: rgba(30,25,50,0.8); border: 1px solid #f59e0b; border-radius: 20px; padding: 35px; }
        .quest { font-size: 1.4rem; margin: 25px 0; color: #cbd5e1; }
        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .choice-btn { background: #1e1b4b; border: 1px solid #f59e0b; padding: 15px; border-radius: 10px; color: #fff; font-size: 1.1rem; cursor: pointer; }
        .choice-btn:hover { background: rgba(245,158,11,0.2); }
        #fb { margin-top: 20px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <a href="geography-main.html" class="back-btn">← Артка</a>
    <div class="game-box">
        <h2>🏛️ Capital Master — Борбор Шаарлар</h2>
        <div class="quest">Кыргызстандын борбор шаары кайсы?</div>

        <div class="choice-grid">
            <button class="choice-btn" onclick="check(true)">А) Бишкек</button>
            <button class="choice-btn" onclick="check(false)">Б) Ташкент</button>
            <button class="choice-btn" onclick="check(false)">В) Душанбе</button>
            <button class="choice-btn" onclick="check(false)">Г) Астана</button>
        </div>
        <div id="fb"></div>
    </div>
    <script>
        function check(ok) {
            const fb = document.getElementById('fb');
            if(ok) {
                fb.innerHTML = "<span style='color:#00ff96;'>🎉 Туура! +20 XP Билим упайы берилди!</span>";
                let currentXp = parseInt(localStorage.getItem('geo_xp') || 0);
                localStorage.setItem('geo_xp', currentXp + 20);
            } else {
                fb.innerHTML = "<span style='color:#ef4444;'>Кайра ойлонуп көр 😊</span>";
            }
        }
    </script>
</body>
</html>
