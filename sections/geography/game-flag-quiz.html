<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag Quiz — BiliMal</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV6QV0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9GSQV6QV0');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #030310; color: #fff; padding: 30px 4%; text-align: center; }
        .back-btn { display: inline-block; padding: 8px 16px; border: 1px solid #3b82f6; color: #3b82f6; text-decoration: none; border-radius: 6px; float: left; font-weight: bold; }
        .box { max-width: 600px; margin: 50px auto; background: rgba(20,25,50,0.8); border: 1px solid #3b82f6; border-radius: 20px; padding: 35px; }
        .flag { font-size: 5rem; margin: 20px 0; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: #1e1b4b; border: 1px solid #3b82f6; padding: 15px; border-radius: 10px; color: #fff; font-size: 1.1rem; cursor: pointer; }
        #fb { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <a href="geography-main.html" class="back-btn">← Артка</a>
    <div class="box">
        <h2>🚩 Тууну таануу оюну</h2>
        <div class="flag">🇯🇵</div>
        <p style="font-size: 1.2rem; margin-bottom: 20px;">Бул кайсы мамлекеттин туусу?</p>

        <div class="options">
            <button class="btn" onclick="ans(true)">Япония</button>
            <button class="btn" onclick="ans(false)">Кытай</button>
            <button class="btn" onclick="ans(false)">Корея</button>
            <button class="btn" onclick="ans(false)">Таиланд</button>
        </div>
        <div id="fb" style="font-size: 1.2rem;"></div>
    </div>
    <script>
        function ans(correct) {
            const fb = document.getElementById('fb');
            if(correct) {
                fb.innerHTML = "<span style='color:#00ff96;'>🎯 Абдан туура! Бул Япония!</span>";
                let currentXp = parseInt(localStorage.getItem('geo_xp') || 0);
                localStorage.setItem('geo_xp', currentXp + 15);
            } else {
                fb.innerHTML = "<span style='color:#ef4444;'>Жакшылап карап көрүңүз 🧐</span>";
            }
        }
    </script>
</body>
</html>
