<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Климат лабораториясы — BiliMal</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV6QV0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9GSQV6QV0');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #030712; color: #fff; padding: 30px 5%; }
        .back-btn { display: inline-block; padding: 8px 16px; border: 1px solid #00ff96; color: #00ff96; text-decoration: none; border-radius: 6px; margin-bottom: 25px; font-weight: bold; }
        .lab-box { max-width: 700px; margin: 0 auto; background: rgba(15,23,42,0.8); border: 1px solid #00ff96; border-radius: 20px; padding: 30px; text-align: center; }
        .slider-group { margin: 20px 0; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #00ff96; }
        input[type=range] { width: 100%; }
        .weather-anim { font-size: 5rem; margin: 30px 0; height: 100px; }
    </style>
</head>
<body>
    <a href="geography-main.html" class="back-btn">← Башкы бетке</a>
    <div class="lab-box">
        <h1>🌦️ Климат жана аба ырайы лабораториясы</h1>
        <p>Атмосфера көрсөткүчтөрүн өзгөртүп, симуляцияны байкаңыз:</p>

        <div class="slider-group">
            <label>Температура: <span id="temp-val">25</span>°C</label>
            <input type="range" id="temp-range" min="-30" max="40" value="25" oninput="updateClimate()">
        </div>

        <div class="weather-anim" id="weather-icon">☀️</div>
        <h2 id="weather-status">Күн ачык</h2>
    </div>

    <script>
        function updateClimate() {
            const temp = document.getElementById('temp-range').value;
            document.getElementById('temp-val').innerText = temp;
            const icon = document.getElementById('weather-icon');
            const status = document.getElementById('weather-status');

            if(temp <= 0) {
                icon.innerText = "❄️";
                status.innerText = "Аба ырайы суук, кар жаашы мүмкүн";
            } else if (temp > 0 && temp <= 15) {
                icon.innerText = "🌧️";
                status.innerText = "Салкын, жамгыр жаашы мүмкүн";
            } else if (temp > 15 && temp <= 30) {
                icon.innerText = "☀️";
                status.innerText = "Жайлуу жылуу, күн ачык";
            } else {
                icon.innerText = "🌪️";
                status.innerText = "Абдан ысык, кургакчылык же катуу шамал";
            }
        }
    </script>
</body>
</html>
