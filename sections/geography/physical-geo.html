<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физикалык география — BiliMal</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV6QV0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9GSQV6QV0');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #050512; color: #fff; padding: 30px 5%; }
        .back-btn { display: inline-block; padding: 8px 16px; border: 1px solid #ffaa00; color: #ffaa00; text-decoration: none; border-radius: 6px; font-weight: bold; margin-bottom: 25px; }
        .back-btn:hover { background: #ffaa00; color: #000; }
        .container { max-width: 800px; margin: 0 auto; background: rgba(20,20,40,0.8); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,170,0,0.2); }
        .object-btn { background: #1e1b4b; border: 1px solid #ffaa00; padding: 15px; border-radius: 10px; color: #fff; margin-top: 15px; cursor: pointer; width: 100%; text-align: left; font-size: 1.1rem; }
        .object-btn:hover { background: rgba(255,170,0,0.2); }
    </style>
</head>
<body>
    <a href="geography-main.html" class="back-btn">← Башкы бетке</a>
    <div class="container">
        <h1>🏔️ Физикалык география жана 3D рельеф</h1>
        <p>Жердин рельефтик объектилерин тандап изилдеңиз:</p>

        <button class="object-btn" onclick="showObject('Эверест чокусу', '8848,86 м', 'Гималай тоолору', 'Дүйнөдөгү эң бийик чоку. Ал Непал менен Кытайдын чек арасында жайгашкан.')">🏔️ Эверест чокусу</button>
        <button class="object-btn" onclick="showObject('Амазонка дарыясы', '6992 км', 'Түштүк Америка', 'Дүйнөдөгү эң суусу көп жана эң узун дарыялардын бири.')">🌊 Амазонка дарыясы</button>

        <div id="details" style="margin-top: 25px; display: none; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px;">
            <h2 id="obj-name" style="color: #ffaa00;"></h2>
            <p style="margin-top: 10px;"><strong>Өлчөмү/Бийиктиги:</strong> <span id="obj-size"></span></p>
            <p><strong>Жайгашкан жери:</strong> <span id="obj-loc"></span></p>
            <p style="margin-top: 10px; color: #cbd5e1;" id="obj-desc"></p>
        </div>
    </div>
    <script>
        function showObject(name, size, loc, desc) {
            document.getElementById('details').style.display = 'block';
            document.getElementById('obj-name').innerText = name;
            document.getElementById('obj-size').innerText = size;
            document.getElementById('obj-loc').innerText = loc;
            document.getElementById('obj-desc').innerText = desc;
        }
    </script>
</body>
</html>
