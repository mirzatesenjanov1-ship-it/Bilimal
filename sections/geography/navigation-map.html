<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта жана навигация — BiliMal</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV6QV0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9GSQV6QV0');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #050512; color: #fff; padding: 30px 5%; }
        .back-btn { display: inline-block; padding: 8px 16px; border: 1px solid #a855f7; color: #a855f7; text-decoration: none; border-radius: 6px; margin-bottom: 25px; font-weight: bold; }
        .box { max-width: 700px; margin: 0 auto; background: rgba(30,20,50,0.8); border: 1px solid #a855f7; border-radius: 16px; padding: 30px; text-align: center; }
        .compass { font-size: 5rem; margin: 20px 0; display: inline-block; transition: 0.5s; }
        .btn { background: #a855f7; border: none; padding: 10px 20px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <a href="geography-main.html" class="back-btn">← Башкы бетке</a>
    <div class="box">
        <h1>🧭 Карта жана Навигация бөлүмү</h1>
        <p>Компас жана горизонттун тараптары менен иштөөнү үйрөнүңүз:</p>
        
        <div class="compass" id="compass-pic">🧭</div>
        <h2 id="direction">Түндүк (North)</h2>

        <div style="margin-top: 20px;">
            <button class="btn" onclick="rotateCompass(0, 'Түндүк (North)')">Түндүк</button>
            <button class="btn" onclick="rotateCompass(90, 'Чыгыш (East)')">Чыгыш</button>
            <button class="btn" onclick="rotateCompass(180, 'Түштүк (South)')">Түштүк</button>
            <button class="btn" onclick="rotateCompass(270, 'Батыш (West)')">Батыш</button>
        </div>
    </div>
    <script>
        function rotateCompass(deg, text) {
            document.getElementById('compass-pic').style.transform = `rotate(${deg}deg)`;
            document.getElementById('direction').innerText = text;
        }
    </script>
</body>
</html>
