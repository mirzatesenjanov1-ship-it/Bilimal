<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilimal - Smart Test Builder</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9GSQV60QV0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date()); gtag('config', 'G-9GSQV60QV0');
    </script>
    <link rel="stylesheet" href="/assets/css/tests.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer type="module" src="/assets/js/firebase-config.js"></script>
    <script defer type="module" src="/assets/js/storage-fallback.js"></script>
    <script defer type="module" src="/assets/js/toast.js"></script>
    <script defer type="module" src="/assets/js/teacher-activity.js"></script>
    <script defer type="module" src="/assets/js/test-builder.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar-panel">
            <div class="brand-zone"><h2>Bilimal</h2></div>
            <nav class="nav-menu">
                <button class="nav-btn" onclick="window.location.href='/sections/tests.html'"><i class="fa-solid fa-chart-pie"></i> Башкаруу панели</button>
                <button class="nav-btn active" onclick="window.location.href='/sections/test-builder.html'"><i class="fa-solid fa-wand-magic-sparkles"></i> Smart Test Builder</button>
                <button class="nav-btn" onclick="window.location.href='/sections/test-results.html'"><i class="fa-solid fa-graduation-cap"></i> Жыйынтыктар</button>
            </nav>
        </aside>
        <main class="main-content" style="flex-direction:row; gap:20px;">
            <div style="width:300px; display:flex; flex-direction:column; gap:15px;">
                <div class="data-glass-panel">
                    <h3>Параметрлер</h3>
                    <form id="testConfigForm">
                        <label style="font-size:12px;">Тесттин Аталышы *</label>
                        <input type="text" id="builderTestTitle" required style="width:100%; padding:8px; margin-bottom:10px; background:#111; color:white; border:1px solid #333; border-radius:4px;">
                        <label style="font-size:12px;">Предмет *</label>
                        <input type="text" id="builderTestSubject" placeholder="Физика" required style="width:100%; padding:8px; margin-bottom:10px; background:#111; color:white; border:1px solid #333; border-radius:4px;">
                        <label style="font-size:12px;">Класс</label>
                        <input type="text" id="builderTestGrades" placeholder="11-А" style="width:100%; padding:8px; margin-bottom:10px; background:#111; color:white; border:1px solid #333; border-radius:4px;">
                        <label style="font-size:12px;">Убакыт чектөөсү (мүнөт)</label>
                        <input type="number" id="builderTimeLimit" value="40" style="width:100%; padding:8px; margin-bottom:10px; background:#111; color:white; border:1px solid #333; border-radius:4px;">
                        <label style="font-size:12px;">Аракет чектөөсү</label>
                        <input type="number" id="builderAttemptLimit" value="1" style="width:100%; padding:8px; margin-bottom:15px; background:#111; color:white; border:1px solid #333; border-radius:4px;">
                        
                        <h4 style="margin-bottom:8px;">Античит Настройкасы</h4>
                        <label style="display:block; font-size:12px; margin-bottom:4px;"><input type="checkbox" id="acFullscreen"> Толук экран</label>
                        <label style="display:block; font-size:12px; margin-bottom:4px;"><input type="checkbox" id="acTabSwitch" checked> Вкладка алмашууну бөгөттөө</label>
                        <label style="display:block; font-size:12px; margin-bottom:4px;"><input type="checkbox" id="acBlockTab"> 3 жолудан кийин жабуу</label>
                        <label style="display:block; font-size:12px; margin-bottom:4px;"><input type="checkbox" id="acNoCopyPaste" checked> Көчүрүүгө бөгөт</label>
                        <label style="display:block; font-size:12px; margin-bottom:15px;"><input type="checkbox" id="acNoRightClick" checked> Оң кликти өчүрүү</label>

                        <button type="submit" class="btn-primary-glow" style="width:100%; margin-bottom:8px;">Жарыялоо</button>
                        <button type="button" id="btnSaveDraft" class="btn-secondary-glow" style="width:100%;">Черновик катары сактоо</button>
                    </form>
                </div>
            </div>
            <div style="flex:1; display:flex; flex-direction:column;">
                <div class="data-glass-panel" style="flex:1; overflow-y:auto;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h2>Конструктор аянты</h2>
                        <button class="btn-primary-glow" onclick="window.uiComponents.openBlockSelector('root')"><i class="fa-solid fa-circle-plus"></i> Жаңы блок кошуу</button>
                    </div>
                    <div id="builderBlocksContainer"></div>
                </div>
            </div>
        </main>
    </div>
    <div id="blockSelectorModal" class="modal-overlay-system" style="display:none;">
        <div class="modal-glass-window">
            <h3>Суроонун же Блоктун Түрү</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                <button class="block-type-card btn-secondary-glow" data-type="question">Стандарттык Суроо</button>
                <button class="block-type-card btn-secondary-glow" data-type="text">Текст Блок</button>
                <button class="block-type-card btn-secondary-glow" data-type="image">Сүрөт Блок</button>
                <button class="block-type-card btn-secondary-glow" data-type="formula">Формула Блок</button>
            </div>
        </div>
    </div>
    <div id="globalModalContainer" class="modal-overlay-system" style="display:none;"><div class="modal-glass-window"><h3 id="globalModalTitle">Билдирүү</h3><div id="globalModalBody"></div></div></div>
</body>
</html>
