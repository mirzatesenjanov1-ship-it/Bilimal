<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жаңы тест түзүү | MUGALIM.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-8 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-2xl glass-card p-8 rounded-[2.5rem]">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-blue-500">Жаңы тест түзүү</h2>
            <a href="teacher-dashboard.html" class="text-gray-400 hover:text-white"><i class="fas fa-arrow-left mr-2"></i> Панелге кайтуу</a>
        </div>

        <div class="space-y-4 mb-6">
            <label class="block text-xs font-bold uppercase text-gray-400">Тесттин аталышы</label>
            <input id="quiz-title-input" type="text" placeholder="Мисалы: Кыргыз тили 5-класс" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500">
        </div>

        <div id="questions-list" class="space-y-6 mb-6">
            </div>

        <button onclick="addQuestionField()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 py-4 rounded-xl font-bold text-xs uppercase tracking-widest transition-all mb-4">
            <i class="fas fa-plus mr-2 text-blue-500"></i> Суроо кошуу
        </button>

        <button onclick="saveQuizToFirebase()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-black text-xs uppercase tracking-widest transition-all">
            Тестти сактоо жана жарыялоо
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUserId = null;
        auth.onAuthStateChanged(user => { if (user) { currentUserId = user.uid; } else { window.location.href = 'login.html'; } });

        let questionCount = 0;

        function addQuestionField() {
            questionCount++;
            const container = document.getElementById('questions-list');
            const qHtml = `
                <div class="p-6 bg-white/5 rounded-2xl border border-white/5 relative question-item">
                    <p class="text-sm font-bold mb-3 text-blue-400">Суроо #${questionCount}</p>
                    <input type="text" placeholder="Суроону жазыңыз" class="q-text w-full bg-white/10 border border-white/5 rounded-xl p-3 text-white mb-3 focus:outline-none">
                    <div class="space-y-2">
                        <input type="text" placeholder="Вариант А" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                        <input type="text" placeholder="Вариант Б" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                        <input type="text" placeholder="Вариант В" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                        <input type="text" placeholder="Вариант Г" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                    </div>
                    <input type="number" placeholder="Туура варианттын индекси (0, 1, 2 же 3)" class="q-correct w-full bg-blue-500/10 border border-blue-500/20 rounded-xl p-2 text-xs text-blue-400 mt-3 focus:outline-none">
                </div>
            `;
            container.insertAdjacentHTML('beforeend', qHtml);
        }

        function saveQuizToFirebase() {
            const title = document.getElementById('quiz-title-input').value.trim();
            if (!title) return alert("Тесттин аталышын жазыңыз!");

            const qElements = document.querySelectorAll('.question-item');
            const questions = [];

            qElements.forEach(el => {
                const text = el.querySelector('.q-text').value.trim();
                const opts = Array.from(el.querySelectorAll('.q-opt')).map(i => i.value.trim()).filter(i => i !== "");
                const correct = parseInt(el.querySelector('.q-correct').value);

                if (text && opts.length > 0) {
                    questions.push({ questionText: text, options: opts, correctAnswer: correct });
                }
            });

            if (questions.length === 0) return alert("Жок дегенде бир суроо толук жазылышы керек!");

            const newQuizRef = database.ref('tests').push();
            newQuizRef.set({
                id: newQuizRef.key,
                title: title,
                authorUid: currentUserId,
                questions: questions
            }).then(() => {
                alert("Тест ийгиликтүү сакталды!");
                window.location.href = "teacher-dashboard.html";
            });
        }

        // Баштапкы бир талаа кошуу
        addQuestionField();
    </script>
</body>
</html>
