<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест түзүү | MUGALIM.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-style { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; width: 100%; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #3b82f6; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Жогорку навигация -->
        <div class="flex justify-between items-center mb-8">
            <a href="teacher-dashboard.html" class="text-gray-400 hover:text-white transition"><i class="fas fa-arrow-left mr-2"></i> Панелге кайтуу</a>
            <h1 class="text-2xl font-black text-blue-500 uppercase">Жаңы тест түзүү</h1>
        </div>

        <!-- Тесттин негизги маалыматы -->
        <div class="glass-card p-6 rounded-3xl mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Тесттин аталышы</label>
                    <input type="text" id="test-title" placeholder="Мисалы: Молекулалык физика" class="input-style">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Класс</label>
                    <select id="test-class" class="input-style">
                        <option value="7">7-класс</option>
                        <option value="8">8-класс</option>
                        <option value="9">9-класс</option>
                        <option value="10">10-класс</option>
                        <option value="11">11-класс</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Суроолордун тизмеси -->
        <div id="questions-container">
            <!-- Суроолор ушул жерге кошулат -->
        </div>

        <!-- Башкаруу баскычтары -->
        <div class="flex flex-col md:flex-row gap-4 mt-8">
            <button onclick="addQuestion()" class="flex-1 bg-blue-600/20 border border-blue-500 text-blue-400 py-4 rounded-2xl font-bold hover:bg-blue-600 hover:text-white transition">
                <i class="fas fa-plus mr-2"></i> Суроо кошуу
            </button>
            <button onclick="saveTest()" class="flex-1 bg-green-600 py-4 rounded-2xl font-bold text-white shadow-lg shadow-green-600/20 hover:bg-green-500 transition">
                <i class="fas fa-save mr-2"></i> Тестти сактоо
            </button>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Сиздин Firebase конфигурацияңыз
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.firebaseio.com",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        let questionCount = 0;

        // Жаңы суроо блогун кошуу
        function addQuestion() {
            questionCount++;
            const container = document.getElementById('questions-container');
            const qHtml = `
                <div class="glass-card p-6 rounded-3xl mt-6 border-l-4 border-blue-500" id="q-block-${questionCount}">
                    <div class="flex justify-between mb-4">
                        <span class="font-black text-blue-500">СУРОО #${questionCount}</span>
                        <button onclick="document.getElementById('q-block-${questionCount}').remove()" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <input type="text" placeholder="Суроону жазыңыз..." class="input-style mb-4 q-text">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div class="flex items-center gap-2">
                            <input type="radio" name="correct-${questionCount}" value="0" checked>
                            <input type="text" placeholder="А варианты" class="input-style text-sm opt-0">
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="radio" name="correct-${questionCount}" value="1">
                            <input type="text" placeholder="Б варианты" class="input-style text-sm opt-1">
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="radio" name="correct-${questionCount}" value="2">
                            <input type="text" placeholder="В варианты" class="input-style text-sm opt-2">
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="radio" name="correct-${questionCount}" value="3">
                            <input type="text" placeholder="Г варианты" class="input-style text-sm opt-3">
                        </div>
                    </div>
                    <p class="text-[10px] text-gray-500 mt-3">* Тегерекчени белгилөө менен туура жоопту тандаңыз</p>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', qHtml);
        }

        // Тестти Firebase базасына сактоо
        function saveTest() {
            const user = auth.currentUser;
            if (!user) { alert("Кайра кириңиз!"); return; }

            const title = document.getElementById('test-title').value;
            const testClass = document.getElementById('test-class').value;
            const questions = [];

            const blocks = document.querySelectorAll('[id^="q-block-"]');
            blocks.forEach(block => {
                const qText = block.querySelector('.q-text').value;
                const options = [
                    block.querySelector('.opt-0').value,
                    block.querySelector('.opt-1').value,
                    block.querySelector('.opt-2').value,
                    block.querySelector('.opt-3').value
                ];
                const correct = block.querySelector(`input[name^="correct-"]:checked`).value;

                questions.push({ qText, options, correct });
            });

            if(!title || questions.length === 0) {
                alert("Аталышын жана суроолорду толтуруңуз!");
                return;
            }

            // Маалыматты базага жөнөтүү
            const newTestRef = database.ref('tests/' + user.uid).push();
            newTestRef.set({
                title: title,
                class: testClass,
                questions: questions,
                author: user.email,
                createdAt: Date.now()
            }).then(() => {
                alert("Тест ийгиликтүү сакталды!");
                window.location.href = "teacher-dashboard.html";
            });
        }

        // Биринчи суроону автоматтык түрдө кошуу
        addQuestion();
    </script>
</body>
</html>
