<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жаңы тест түзүү | MUGALIM.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .kyrgyz-btn { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .kyrgyz-btn:hover { background: #3b82f6; color: white; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-3xl glass-card p-6 md:p-8 rounded-[2.5rem]">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-blue-500 uppercase tracking-tight">Профессионалдык Тест Конструктору</h2>
            <a href="teacher-dashboard.html" class="text-gray-400 hover:text-white text-sm"><i class="fas fa-arrow-left mr-2"></i> Кайтуу</a>
        </div>

        <div class="p-6 bg-white/5 rounded-2xl border border-white/5 mb-6 space-y-4">
            <h3 class="text-sm font-black uppercase tracking-widest text-blue-400"><i class="fas fa-sliders-h mr-2"></i> Тесттин башкаруу жөндөөлөрү</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 font-bold uppercase mb-2">Таймер (мүнөт менен)</label>
                    <input id="quiz-time" type="number" value="20" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-blue-500">
                </div>
                <div class="flex items-center gap-3 pt-6">
                    <input id="shuffle-questions" type="checkbox" class="w-5 h-5 text-blue-600 bg-white/5 border-white/10 rounded focus:ring-0">
                    <label class="text-xs text-gray-300 font-bold uppercase cursor-pointer" for="shuffle-questions">Суроолорду аралаштыруу</label>
                </div>
                <div class="flex items-center gap-3 pt-6">
                    <input id="show-results-instantly" type="checkbox" checked class="w-5 h-5 text-blue-600 bg-white/5 border-white/10 rounded focus:ring-0">
                    <label class="text-xs text-gray-300 font-bold uppercase cursor-pointer" for="show-results-instantly">Жыйынтыкты дароо көрсөтүү</label>
                </div>
            </div>
        </div>

        <div class="p-4 bg-blue-900/10 border border-blue-500/20 rounded-2xl mb-6 flex items-center justify-between">
            <span class="text-xs font-bold text-blue-400 uppercase tracking-wider"><i class="fas fa-keyboard mr-2"></i> Кыргыз тамгалары (Текст талаасына басыңыз):</span>
            <div class="flex gap-2">
                <button type="button" class="kyrgyz-btn" onclick="insertChar('Ө')">Ө</button>
                <button type="button" class="kyrgyz-btn" onclick="insertChar('ө')">ө</button>
                <button type="button" class="kyrgyz-btn" onclick="insertChar('Ү')">Ү</button>
                <button type="button" class="kyrgyz-btn" onclick="insertChar('ү')">ү</button>
                <button type="button" class="kyrgyz-btn" onclick="insertChar('Ң')">Ң</button>
                <button type="button" class="kyrgyz-btn" onclick="insertChar('ң')">ң</button>
            </div>
        </div>

        <div class="space-y-4 mb-6">
            <label class="block text-xs font-bold uppercase text-gray-400">Тесттин аталышы</label>
            <input id="quiz-title-input" type="text" placeholder="Мисалы: Сүйлөмдүн бир өңчөй мүчөлөрү - 6-класс" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500 font-bold">
        </div>

        <div id="questions-list" class="space-y-6 mb-6"></div>

        <button onclick="addQuestionField()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 py-4 rounded-xl font-bold text-xs uppercase tracking-widest transition-all mb-4">
            <i class="fas fa-plus mr-2 text-blue-500"></i> Жаңы суроо кошуу
        </button>

        <button onclick="saveQuizToFirebase()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 py-4 rounded-xl font-black text-xs uppercase tracking-widest transition-all shadow-xl shadow-blue-900/20">
            Тестти сактоо жана жарыялоо
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUserId = null;
        let lastFocusedInput = null;
        
        auth.onAuthStateChanged(user => { if (user) { currentUserId = user.uid; } else { window.location.href = 'login.html'; } });

        document.addEventListener('focusin', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                lastFocusedInput = e.target;
            }
        });

        function insertChar(char) {
            if (lastFocusedInput) {
                const start = lastFocusedInput.selectionStart;
                const end = lastFocusedInput.selectionEnd;
                const text = lastFocusedInput.value;
                lastFocusedInput.value = text.substring(0, start) + char + text.substring(end);
                lastFocusedInput.focus();
                lastFocusedInput.setSelectionRange(start + 1, start + 1);
            }
        }

        let questionCount = 0;

        function addQuestionField() {
            questionCount++;
            const container = document.getElementById('questions-list');
            const qHtml = `
                <div class="p-6 bg-white/5 rounded-2xl border border-white/5 relative question-item animate-fade-in">
                    <p class="text-sm font-bold mb-3 text-blue-400">Суроо #${questionCount}</p>
                    <input type="text" placeholder="Суроону жазыңыз (Каалаган сөздү белгилеп кыргыз тамгаларын кошуңуз)" class="q-text w-full bg-white/10 border border-white/5 rounded-xl p-3 text-white mb-3 focus:outline-none focus:border-blue-500">
                    <div class="space-y-2">
                        <input type="text" placeholder="Вариант А" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                        <input type="text" placeholder="Вариант Б" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                        <input type="text" placeholder="Вариант В" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                        <input type="text" placeholder="Вариант Г" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                    </div>
                    <input type="number" placeholder="Туура варианттын индекси (0, 1, 2 же 3)" class="q-correct w-full bg-blue-500/10 border border-blue-500/20 rounded-xl p-2 text-xs text-blue-400 mt-3 focus:outline-none">
                </div>
            `;
            container.insertAdjacentHTML('beforeend', qHtml);
        }

        function saveQuizToFirebase() {
            const title = document.getElementById('quiz-title-input').value.trim();
            if (!title) return alert("Тесттин аталышын жазыңыз!");

            const timeLimit = document.getElementById('quiz-time').value || 20;
            const shuffle = document.getElementById('shuffle-questions').checked;
            const instantResult = document.getElementById('show-results-instantly').checked;

            const qElements = document.querySelectorAll('.question-item');
            const questions = [];

            qElements.forEach(el => {
                const text = el.querySelector('.q-text').value.trim();
                const opts = Array.from(el.querySelectorAll('.q-opt')).map(i => i.value.trim()).filter(i => i !== "");
                const correct = parseInt(el.querySelector('.q-correct').value);

                if (text && opts.length > 0) {
                    questions.push({ questionText: text, options: opts, correctAnswer: correct });
                }
            });

            if (questions.length === 0) return alert("Кем дегенде бир суроо жазыңыз!");

            const newQuizRef = database.ref('tests').push();
            newQuizRef.set({
                id: newQuizRef.key,
                title: title,
                authorUid: currentUserId,
                questions: questions,
                settings: {
                    timeLimit: parseInt(timeLimit),
                    shuffle: shuffle,
                    instantResult: instantResult
                }
            }).then(() => {
                alert("Профессионалдык тест жарыяланды!");
                window.location.href = "teacher-dashboard.html";
            });
        }

        addQuestionField();
    </script>
</body>
</html>
