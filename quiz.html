<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест аткаруу | MUGALIM.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .loading-spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; hieght: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="loading-block" class="text-center flex flex-col items-center gap-4">
        <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
        <p class="font-bold uppercase tracking-widest text-sm text-gray-400">Тест даярдалууда...</p>
    </div>

    <div id="error-block" class="hidden text-center max-w-sm p-8 glass-card rounded-[2rem]">
        <div class="text-red-500 text-5xl mb-4"><i class="fas fa-exclamation-circle"></i></div>
        <h3 class="text-xl font-black mb-2">Байланыш үзүлдү</h3>
        <p class="text-gray-400 text-sm mb-6">Тест табылган жок же шилтеме ката.</p>
        <button onclick="window.history.back()" class="bg-blue-600 px-6 py-3 rounded-xl font-bold uppercase text-xs tracking-widest">Артка кайтуу</button>
    </div>

    <div id="quiz-block" class="hidden w-full max-w-2xl glass-card p-8 rounded-[2.5rem]">
        <h2 id="quiz-title" class="text-2xl font-black mb-6 text-blue-400">Тесттин аталышы</h2>
        <hr class="border-white/5 mb-6">
        <div id="questions-container" class="space-y-6"></div>
        <button onclick="submitQuiz()" class="mt-8 w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-black uppercase text-xs tracking-widest transition-all">Жыйынтыкты жөнөтүү</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // URL даректен тесттин IDсин кыркып алуу (?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('id');

        if (!quizId) {
            showError();
        } else {
            // Firebase'ден ушул IDге таандык тестти тартып келүү
            database.ref('tests/' + quizId).once('value').then((snapshot) => {
                const quizData = snapshot.val();
                if (quizData) {
                    renderQuiz(quizData);
                } else {
                    showError();
                }
            }).catch(() => showError());
        }

        function showError() {
            document.getElementById('loading-block').classList.add('hidden');
            document.getElementById('error-block').classList.remove('hidden');
        }

        function renderQuiz(data) {
            document.getElementById('loading-block').classList.add('hidden');
            document.getElementById('quiz-block').classList.remove('hidden');
            document.getElementById('quiz-title').innerText = data.title || "Аталышы жок тест";

            const container = document.getElementById('questions-container');
            container.innerHTML = "";

            if (data.questions) {
                // Эгер суроолор объект же массив түрүндө болсо айлантуу
                const qList = Object.values(data.questions);
                qList.forEach((q, index) => {
                    let optionsHtml = "";
                    if (q.options) {
                        q.options.forEach((opt, oIdx) => {
                            optionsHtml += `
                                <label class="flex items-center gap-3 p-4 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:bg-white/10 transition-all">
                                    <input type="radio" name="q_${index}" value="${oIdx}" class="w-4 h-4 text-blue-500">
                                    <span>${opt}</span>
                                </label>
                            `;
                        });
                    }

                    container.innerHTML += `
                        <div class="space-y-3">
                            <p class="font-bold text-lg">${index + 1}. ${q.questionText || q.title}</p>
                            <div class="grid grid-cols-1 gap-2">${optionsHtml}</div>
                        </div>
                    `;
                });
            }
        }

        function submitQuiz() {
            alert("Тест аяктады! Жыйынтык базага жөнөтүлдү.");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
