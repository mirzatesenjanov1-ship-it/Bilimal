<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест аткаруу | BILIMAL.ORG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #e2e8f0; 
            font-family: 'Montserrat', sans-serif; 
            user-select: none; 
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none;
            -webkit-touch-callout: none;
        }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .question-page { display: none; }
        .question-page.active { display: block; animation: slideIn 0.3s ease-in-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .circle-progress { transform: rotate(-90deg); transition: stroke-dashoffset 1s ease-in-out; }
        
        /* 🔥 МАКСИМАЛДУУ ИИГЕ (GOOGLE LENS) КАРШЫ СТИЛДЕР */
        .anti-lens-text {
            position: relative;
            /* Көзгө көрүнбөгөн өтө кичинекей кокустук көлөкөлөр Google Lens'ти адаштырат */
            text-shadow: 0.1px 0.1px 0px rgba(255,255,255,0.05), -0.1px -0.1px 0px rgba(0,0,0,0.1);
            letter-spacing: -0.01em;
        }

        /* Тексттин артына жыш водяной знак таштоо (ИИ текстти тааный албай калат) */
        .watermark-bg {
            position: relative;
            overflow: hidden;
        }
        .watermark-bg::before {
            content: "BILIMAL.ORG ANTI CHEAT PROTECTION BILIMAL.ORG";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03; /* Окуучуга такыр тоскоол болбойт, бирок ИИ сканерлерин чаташтырат */
            font-size: 10px;
            line-height: 12px;
            word-wrap: break-word;
            pointer-events: none;
            user-select: none;
        }

        /* Экрандан чыкканда баарын капкара кылып жабуучу көлөкө */
        #secure-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050a18;
            z-index: 99999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        @media print {
            body { display: none !important; }
        }
    </style>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495571814896964" crossorigin="anonymous"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="secure-overlay">
        <div class="text-red-500 text-6xl mb-4"><i class="fas fa-eye-slash"></i></div>
        <h1 class="text-2xl font-black uppercase text-white tracking-wide">Коопсуздук режими бузулду!</h1>
        <p class="text-gray-400 mt-2 px-6 max-w-md text-sm leading-relaxed">Экранды сканерлөөгө, издөөгө же башка тиркемелерди активдештирүүгө тыюу салынат.</p>
        <button onclick="restoreQuizFocus()" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-xl text-xs uppercase tracking-wider transition-all">Тестти улантуу</button>
    </div>

    <div class="w-full max-w-5xl text-center mb-4 opacity-80" style="min-height: 90px;">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-1495571814896964"
             data-ad-slot="1574613769"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
    </div>

    <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-4 gap-6">
        
        <div class="hidden md:flex flex-col items-center justify-start opacity-80">
            <div class="w-full glass-card rounded-[2rem] p-2 min-h-[450px]">
                <ins class="adsbygoogle"
                     style="display:block; min-width:160px; min-height:450px;"
                     data-ad-client="ca-pub-1495571814896964"
                     data-ad-slot="1574613769"
                     data-ad-format="auto"></ins>
                <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
            </div>
        </div>

        <div class="md:col-span-3 w-full flex flex-col justify-center">
            
            <div id="auth-block" class="w-full glass-card p-8 rounded-[2rem] text-center">
                <h3 class="text-xl font-black mb-4 text-blue-400 uppercase">BILIMAL.ORG | ТЕСТ СИСТЕМАСЫ</h3>
                <input id="student-name" type="text" placeholder="Аты-жөнүңүз (Мисалы: Асанов Темир)" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white text-center font-bold text-lg mb-4 focus:outline-none focus:border-blue-500">
                <button onclick="checkAndStartQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-black uppercase text-xs tracking-widest transition-all">Тестти баштоо</button>
            </div>

            <div id="error-block" class="hidden text-center p-8 glass-card rounded-[2rem]">
                <div id="error-icon" class="text-red-500 text-5xl mb-4"><i class="fas fa-user-slash"></i></div>
                <h3 id="error-title" class="text-xl font-black mb-2 text-white"></h3>
                <p id="error-desc" class="text-gray-400 text-sm leading-relaxed"></p>
            </div>

            <div id="result-block" class="hidden w-full glass-card p-8 rounded-[2.5rem] text-center flex flex-col items-center">
                <h2 class="text-2xl font-black text-emerald-400 mb-6 uppercase">Тест аяктады</h2>
                <div class="relative w-44 h-44 mb-6">
                    <svg class="w-full h-full">
                        <circle cx="88" cy="88" r="76" stroke="rgba(255,255,255,0.05)" stroke-width="12" fill="transparent"/>
                        <circle id="animated-circle" cx="88" cy="88" r="76" stroke="#10b981" stroke-width="12" fill="transparent" class="circle-progress" stroke-dasharray="477.5" stroke-dashoffset="477.5"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="result-percent" class="text-4xl font-black text-white">0%</span>
                        <span id="result-score-text" class="text-xs text-gray-400 font-bold uppercase mt-1">0/0 Балл</span>
                    </div>
                </div>
                <p id="result-notice" class="text-gray-400 text-sm mb-4">Жообуңуз мугалимге жөнөтүлдү.</p>
                
                <div class="w-full mt-4 border-t border-white/5 pt-4" style="min-height: 60px;">
                    <ins class="adsbygoogle"
                         style="display:block; text-align:center;"
                         data-ad-layout="in-article"
                         data-ad-format="fluid"
                         data-ad-client="ca-pub-1495571814896964"
                         data-ad-slot="1574613769"></ins>
                    <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
                </div>
            </div>

            <div id="quiz-block" class="hidden w-full glass-card p-8 rounded-[2.5rem] watermark-bg">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 id="quiz-title" class="text-lg font-black text-white uppercase truncate max-w-[250px]">BILIMAL</h2>
                        <div class="flex gap-4 text-xs font-bold text-gray-400 mt-1">
                            <span id="progress-text">Суроо: 1 / 1</span>
                            <span class="text-amber-400"><i class="fas fa-clock mr-1"></i> <span id="timer-display">00:00</span></span>
                        </div>
                    </div>
                    <div class="text-xs bg-red-500/20 text-red-400 font-bold px-3 py-1 rounded-full"><i class="fas fa-shield-alt mr-1"></i> Anti-Cheat v3.0</div>
                </div>
                
                <div class="w-full h-1 bg-white/5 rounded-full mb-6 overflow-hidden">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-300"></div>
                </div>

                <div id="questions-container" class="min-h-[200px]"></div>

                <div class="w-full my-6 pt-4 border-t border-white/5 text-center opacity-80" style="min-height: 65px;">
                    <ins class="adsbygoogle"
                         style="display:block; text-align:center;"
                         data-ad-layout="in-article"
                         data-ad-format="fluid"
                         data-ad-client="ca-pub-1495571814896964"
                         data-ad-slot="1574613769"></ins>
                    <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
                </div>

                <div class="flex justify-between items-center mt-4">
                    <button id="prev-btn" onclick="changeQuestion(-1)" class="bg-white/5 text-white px-5 py-2.5 rounded-xl font-bold text-xs uppercase hover:bg-white/10 transition-all">Артка</button>
                    <button id="next-btn" onclick="changeQuestion(1)" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-xs uppercase hover:bg-blue-700 transition-all">Кийинки</button>
                    <button id="submit-btn" onclick="submitQuiz()" class="hidden bg-emerald-600 text-white px-6 py-2.5 rounded-xl font-black text-xs uppercase hover:bg-emerald-700 transition-all">Аяктоо</button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('id');
        
        let quizData = null, studentName = "", cheatCount = 0, isQuizActive = false;
        let currentQuestionIndex = 0, totalQuestionsCount = 0, timeLeft = 0, timerInterval = null, qList = [];
        let initialHeight = 0, initialWidth = 0;

        function checkAndStartQuiz() {
            studentName = document.getElementById('student-name').value.trim();
            if (!studentName) return alert("Атыңызды жазыңыз!");
            if (!quizId) return alert("Ката шилтеме! Тесттин ID мааниси табылган жок.");

            database.ref('tests/' + quizId).once('value').then((snapshot) => {
                quizData = snapshot.val();
                if (!quizData) return showSystemError("Ката", "Мындай ID менен тест базадан табылган жок.");
                if (quizData.status === "closed") {
                    showSystemError("Тест жабык!", "Кечиреиз, бул тест мугалим тарабынан жабылган.");
                    document.getElementById('error-icon').innerHTML = `<i class="fas fa-lock text-amber-500"></i>`;
                    return;
                }

                let localAttempts = parseInt(localStorage.getItem('attempts_' + quizId)) || 0;
                let maxAttempts = (quizData.settings && quizData.settings.maxAttempts) ? quizData.settings.maxAttempts : "1";

                if (maxAttempts !== "unlimited" && localAttempts >= parseInt(maxAttempts)) {
                    showSystemError("Мүмкүнчүлүк бүттү!", `Сиз бул тестти буга чейин ${localAttempts} жолу тапшыргансыз. Мугалим максималдуу ${maxAttempts} жолу тапшырууга уруксат берген.`);
                    document.getElementById('error-icon').innerHTML = `<i class="fas fa-exclamation-triangle text-red-500"></i>`;
                    return;
                }

                document.getElementById('auth-block').classList.add('hidden');
                renderQuiz();
            }).catch(err => { showSystemError("Ката кети", "Ката пайда болду: " + err.message); });
        }

        function showSystemError(title, desc) {
            document.getElementById('auth-block').classList.add('hidden');
            document.getElementById('quiz-block').classList.add('hidden');
            document.getElementById('error-title').innerText = title;
            document.getElementById('error-desc').innerText = desc;
            document.getElementById('error-block').classList.remove('hidden');
        }

        // Текстти ИИ окуй албай тургандай кылып DOM элементтерине коргоо менен чачуу
        function obfuscateText(text) {
            return text.split(' ').map(word => {
                return `<span class="anti-lens-text inline-block">${word}</span>`;
            }).join(' ');
        }

        function renderQuiz() {
            document.getElementById('quiz-block').classList.remove('hidden');
            document.getElementById('quiz-title').innerText = quizData.title;
            isQuizActive = true;

            initialHeight = window.innerHeight;
            initialWidth = window.innerWidth;

            qList = Object.values(quizData.questions);
            if (quizData.settings && quizData.settings.shuffle) qList = qList.sort(() => Math.random() - 0.5);
            totalQuestionsCount = qList.length;

            timeLeft = (quizData.settings && quizData.settings.timeLimit ? quizData.settings.timeLimit : 20) * 60;
            startTimer();

            const container = document.getElementById('questions-container');
            container.innerHTML = "";

            qList.forEach((q, index) => {
                let innerHtml = "";
                if(q.type === 'text') {
                    innerHtml = `<textarea id="open_ans_${index}" onpaste="return false;" placeholder="Жообуңузду кенен жазыңыз (Көчүрүп келип чаптоого тыюу салынат)..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white min-h-[120px] focus:outline-none focus:border-purple-500 text-sm"></textarea>`;
                } else {
                    let optionsHtml = "";
                    q.options.forEach((opt, oIdx) => {
                        optionsHtml += `
                            <label class="flex items-center gap-3 p-4 bg-white/5 border border-white/5 rounded-xl cursor-pointer hover:bg-white/10 transition-all">
                                <input type="radio" name="q_${index}" value="${oIdx}" class="w-4 h-4 accent-blue-500">
                                <span class="text-sm text-gray-200 anti-lens-text">${obfuscateText(opt)}</span>
                            </label>`;
                    });
                    innerHtml = `<div class="grid grid-cols-1 gap-2">${optionsHtml}</div>`;
                }

                container.innerHTML += `
                    <div id="q-page-${index}" class="question-page space-y-4">
                        <p class="font-bold text-lg text-white leading-relaxed select-none">${index + 1}. ${obfuscateText(q.questionText)}</p>
                        ${innerHtml}
                    </div>`;
            });

            updatePageVisibility();
            activateSuperAntiCheat();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) { clearInterval(timerInterval); submitQuiz(); } 
                else { timeLeft--; document.getElementById('timer-display').innerText = Math.floor(timeLeft/60).toString().padStart(2,'0') + ":" + (timeLeft%60).toString().padStart(2,'0'); }
            }, 1000);
        }

        // ==========================================
        // 🔥 АБСОЛЮТТУК АНТИ-ЧИТ СИСТЕМА v3.0 (LENS-BLUR КОРГОО)
        // ==========================================
        function activateSuperAntiCheat() {
            window.addEventListener('resize', handleResizeCheating);
            document.addEventListener('visibilitychange', handleVisibilityCheating);
            document.addEventListener('contextmenu', (e) => e.preventDefault());

            // ⚡ GOOGLE LENS / ПОИСК ПО ЭКРАНУ КАРМОО: фокусту жоготкондо экранды дароо жабабыз
            window.addEventListener('blur', () => {
                if (isQuizActive) {
                    document.getElementById('secure-overlay').style.display = 'flex';
                }
            });

            // Кайра терезеге кайтса, эскертүү санын көбөйтөбүз
            window.addEventListener('focus', () => {
                // Коопсуздук катмары жабык болсо гана эскертүү беребиз
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === "F12" || e.keyCode === 123) { e.preventDefault(); return false; }
                if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return false; }
                if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
                if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 83)) { e.preventDefault(); return false; }
                if (e.ctrlKey && e.keyCode === 80) { e.preventDefault(); triggerBlock("Шпиондук аракет!", "Тест баракчасын басып чыгарууга же сактоого тыюу салынат!"); }
            });

            document.addEventListener('selectstart', (e) => e.preventDefault());
        }

        // Коопсуздук калканчын жаап, тестке кайтуу (жана уурдануу упайын кошуу)
        function restoreQuizFocus() {
            if (!isQuizActive) return;
            document.getElementById('secure-overlay').style.display = 'none';
            cheatCount++;
            
            if (cheatCount >= 3) {
                triggerBlock("Автоматтык бөгөттөө!", "Google Lens же башка тиркемени иштетүүгө аракет кылганыңыз үчүн тест жабылды.");
            } else {
                alert(`Эскертүү: ${cheatCount}/3. Экранды издөөгө салууга же бөтөн аракеттерге тыюу салынат! Кийинкисинде бөгөттөлөсүз.`);
            }
        }

        function handleResizeCheating() {
            if (!isQuizActive) return;
            let heightDiff = Math.abs(window.innerHeight - initialHeight);
            let widthDiff = Math.abs(window.innerWidth - initialWidth);

            if (widthDiff > (initialWidth * 0.25) || heightDiff > (initialHeight * 0.45)) {
                triggerBlock("Шпиондук режим аныкталды!", "Телефондо кошумча терезе ачууга же экранды бөлүүгө тыюу салынат!");
            }
        }

        function handleVisibilityCheating() {
            if (document.visibilityState === 'hidden' && isQuizActive) {
                cheatCount++;
                if (cheatCount >= 3) {
                    triggerBlock("Автоматтык бөгөттөө!", "Башка тиркемеге же өтмөккө көп өткөнүңүз үчүн тест жабылды.");
                } else {
                    alert(`Эскертүү: ${cheatCount}/3. Башка жакка өтүүгө тыюу салынат! Кийинкисинде бөгөттөлөсүз.`);
                }
            }
        }

        function triggerBlock(title, message) {
            clearInterval(timerInterval); 
            isQuizActive = false;
            document.getElementById('secure-overlay').style.display = 'none';
            
            let currentAttempts = parseInt(localStorage.getItem('attempts_' + quizId)) || 0;
            localStorage.setItem('attempts_' + quizId, currentAttempts + 1);

            database.ref('results/' + quizId + '_' + studentName.replace(/\s+/g, '_')).set({
                studentName: studentName, 
                quizTitle: quizData.title, 
                teacherUid: quizData.authorUid,
                score: 0, 
                totalQuestions: totalQuestionsCount, 
                tabCheats: 3, 
                isBlocked: true, 
                percent: 0,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => { showSystemError(title, message); });
        }

        function updatePageVisibility() {
            document.querySelectorAll('.question-page').forEach(p => p.classList.remove('active'));
            document.getElementById(`q-page-${currentQuestionIndex}`).classList.add('active');
            document.getElementById('progress-text').innerText = `Суроо: ${currentQuestionIndex + 1} / ${totalQuestionsCount}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / totalQuestionsCount) * 100}%`;
            document.getElementById('prev-btn').style.visibility = currentQuestionIndex === 0 ? 'hidden' : 'visible';
            
            if (currentQuestionIndex === totalQuestionsCount - 1) {
                document.getElementById('next-btn').classList.add('hidden');
                document.getElementById('submit-btn').classList.remove('hidden');
            } else {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('submit-btn').classList.add('hidden');
            }
        }

        function changeQuestion(dir) { currentQuestionIndex += dir; updatePageVisibility(); }

        function submitQuiz() {
            clearInterval(timerInterval); 
            isQuizActive = false;
            document.getElementById('secure-overlay').style.display = 'none';

            let correctAnswersCount = 0, choiceTotal = 0, openAnswers = [];

            qList.forEach((q, index) => {
                if(q.type === 'text') {
                    const textElement = document.getElementById(`open_ans_${index}`);
                    const textVal = textElement ? textElement.value.trim() : "";
                    openAnswers.push({ questionText: q.questionText, studentResponse: textVal });
                } else {
                    choiceTotal++;
                    const selected = document.querySelector(`input[name="q_${index}"]:checked`);
                    if (selected && parseInt(selected.value) === q.correctAnswer) correctAnswersCount++;
                }
            });

            const percent = choiceTotal > 0 ? Math.round((correctAnswersCount / choiceTotal) * 100) : 100;

            let currentAttempts = parseInt(localStorage.getItem('attempts_' + quizId)) || 0;
            localStorage.setItem('attempts_' + quizId, currentAttempts + 1);

            database.ref('results/' + quizId + '_' + studentName.replace(/\s+/g, '_')).set({
                studentName: studentName, 
                quizTitle: quizData.title, 
                teacherUid: quizData.authorUid,
                score: correctAnswersCount, 
                totalQuestions: choiceTotal, 
                tabCheats: cheatCount,
                isBlocked: false,
                openAnswers: openAnswers.length > 0 ? openAnswers : null, 
                percent: percent,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('quiz-block').classList.add('hidden');
                document.getElementById('result-block').classList.remove('hidden');
                
                if(quizData.settings && quizData.settings.instantResult === false) {
                    document.getElementById('result-notice').innerText = "Ачык суроолор камтылган. Мугалим текшерген соң жыйынтыгын билдирет.";
                    document.getElementById('result-score-text').innerText = "Текшерилет";
                    document.getElementById('result-percent').innerText = "...";
                } else {
                    document.getElementById('result-score-text').innerText = `${correctAnswersCount} / ${choiceTotal} Балл`;
                    document.getElementById('result-percent').innerText = `${percent}%`;
                    document.getElementById('animated-circle').style.strokeDashoffset = 477.5 - (percent / 100) * 477.5;
                }
            }).catch(err => { alert("Ката кетти: " + err.message); });
        }
    </script>
</body>
</html>
