<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест аткаруу | BILIMAL.ORG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; user-select: none; -webkit-user-select: none; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .question-page { display: none; }
        .question-page.active { display: block; animation: slideIn 0.3s ease-in-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* Тегерек пайыздык анимациянын стили */
        .circle-progress { transform: rotate(-90deg); transition: stroke-dashoffset 1s ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-4xl text-center mb-4 opacity-75">
        <span class="text-[9px] uppercase tracking-widest text-gray-500 block mb-1">Жарнама</span>
        <div class="w-full bg-white/5 border border-white/5 rounded-xl min-h-[90px] flex items-center justify-center">
            
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495571814896964" crossorigin="anonymous"></script>
            <ins class="adsbygoogle"
                 style="display:block; width:100%; max-height:90px;"
                 data-ad-client="ca-pub-1495571814896964"
                 data-ad-slot="1574613769"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
            
        </div>
    </div>

    <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-4 gap-6">
        
        <div class="hidden md:flex flex-col items-center justify-start opacity-75">
            <span class="text-[9px] uppercase tracking-widest text-gray-500 mb-1">Жарнама</span>
            <div class="w-full bg-white/5 border border-white/5 rounded-[2rem] min-h-[450px] flex items-center justify-center p-2">
                <ins class="adsbygoogle"
                     style="display:block; width:100%; height:100%; min-height:450px;"
                     data-ad-client="ca-pub-1495571814896964"
                     data-ad-slot="1574613769"
                     data-ad-format="auto"></ins>
                <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
            </div>
        </div>

        <div class="md:col-span-3 w-full flex flex-col justify-center">
            
            <div id="auth-block" class="w-full glass-card p-8 rounded-[2rem] text-center">
                <h3 class="text-xl font-black mb-4 text-blue-400 uppercase tracking-tight">Тестке кирүү</h3>
                <p class="text-xs text-gray-400 mb-6">Жыйынтык мугалимге туура барышы үчүн аты-жөнүңүздү катасыз жазыңыз.</p>
                <input id="student-name" type="text" placeholder="Аты-жөнүңүз" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500 mb-4 text-center font-bold text-lg">
                <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-black uppercase text-xs tracking-widest transition-all">Тестти баштоо</button>
            </div>

            <div id="error-block" class="hidden text-center p-8 glass-card rounded-[2rem]">
                <div class="text-red-500 text-5xl mb-4"><i class="fas fa-user-slash"></i></div>
                <h3 id="error-title" class="text-xl font-black mb-2">Ката</h3>
                <p id="error-desc" class="text-gray-400 text-sm"></p>
            </div>

            <div id="result-block" class="hidden w-full glass-card p-8 rounded-[2.5rem] text-center flex flex-col items-center">
                <h2 class="text-2xl font-black text-emerald-400 mb-6 uppercase tracking-wider">Тесттин Жыйынтыгы</h2>
                
                <div class="relative w-44 h-44 mb-6">
                    <svg class="w-full h-full">
                        <circle cx="88" cy="88" r="76" stroke="rgba(255,255,255,0.05)" stroke-width="12" fill="transparent"/>
                        <circle id="animated-circle" cx="88" cy="88" r="76" stroke="#10b981" stroke-width="12" fill="transparent" class="circle-progress" stroke-dasharray="477.5" stroke-dashoffset="477.5"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="result-percent" class="text-4xl font-black italic text-white">0%</span>
                        <span id="result-score-text" class="text-xs text-gray-400 font-bold uppercase mt-1">0/0 Балл</span>
                    </div>
                </div>
                <p class="text-gray-400 text-sm mb-6">Сиздин жоопторуңуз текшерилип, мугалимдин жеке кабинетине сакталды.</p>
                <button onclick="window.location.reload()" class="bg-white/5 hover:bg-white/10 px-8 py-3 rounded-xl text-xs font-bold uppercase tracking-widest transition-all">Кайра жүктөө</button>
            </div>

            <div id="quiz-block" class="hidden w-full glass-card p-8 rounded-[2.5rem]">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 id="quiz-title" class="text-lg font-black text-white uppercase">Жүктөлүүдө...</h2>
                        <div class="flex gap-4 text-xs font-bold text-gray-400 mt-1">
                            <span id="progress-text">Суроо: 1 / 1</span>
                            <span class="text-amber-400"><i class="fas fa-clock mr-1"></i> <span id="timer-display">00:00</span></span>
                        </div>
                    </div>
                    <div class="text-xs bg-red-500/20 text-red-400 font-bold px-3 py-1 rounded-full"><i class="fas fa-shield-alt mr-1"></i> Anti-Cheat</div>
                </div>
                
                <div class="w-full h-1 bg-white/5 rounded-full mb-6 overflow-hidden">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-300" style="width: 0%"></div>
                </div>

                <div id="questions-container" class="min-h-[200px]"></div>

                <div class="flex justify-between items-center mt-6 pt-4 border-t border-white/5">
                    <button id="prev-btn" onclick="changeQuestion(-1)" class="opacity-50 pointer-events-none bg-white/5 text-white px-5 py-2.5 rounded-xl font-bold text-xs uppercase transition-all">Артка</button>
                    <button id="next-btn" onclick="changeQuestion(1)" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-xs uppercase transition-all">Кийинки</button>
                    <button id="submit-btn" onclick="submitQuiz()" class="hidden bg-emerald-600 text-white px-6 py-2.5 rounded-xl font-black text-xs uppercase transition-all">Аяктоо</button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('id');

        let quizData = null;
        let studentName = "";
        let cheatCount = 0;
        let isQuizActive = false;
        let currentQuestionIndex = 0;
        let totalQuestionsCount = 0;
        let timeLeft = 0;
        let timerInterval = null;
        let qList = [];

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('paste', e => e.preventDefault());

        function startQuiz() {
            studentName = document.getElementById('student-name').value.trim();
            if (!studentName) return alert("Атыңызды жазыңыз!");

            document.getElementById('auth-block').classList.add('hidden');

            if(!quizId) {
                showSystemError("Ката", "Тесттин шилтемеси туура эмес же ID табылган жок.");
                return;
            }

            database.ref('tests/' + quizId).once('value').then((snapshot) => {
                quizData = snapshot.val();
                if (quizData) { renderQuiz(); } else { showSystemError("Ката", "Мындай тест базада жок."); }
            }).catch(() => showSystemError("Ката", "Интернет байланышын текшериңиз."));
        }

        function showSystemError(title, desc) {
            document.getElementById('quiz-block').classList.add('hidden');
            document.getElementById('error-title').innerText = title;
            document.getElementById('error-desc').innerText = desc;
            document.getElementById('error-block').classList.remove('hidden');
        }

        function renderQuiz() {
            document.getElementById('quiz-block').classList.remove('hidden');
            document.getElementById('quiz-title').innerText = quizData.title;
            isQuizActive = true;

            qList = Object.values(quizData.questions);
            
            // ЖӨНДӨӨЛӨРДҮ ТЕКШЕРҮҮ: СУРООЛОРДУ АРАЛАШТЫРУУ
            if (quizData.settings && quizData.settings.shuffle) {
                qList = qList.sort(() => Math.random() - 0.5);
            }

            totalQuestionsCount = qList.length;

            // ЖӨНДӨӨЛӨРДҮ ТЕКШЕРҮҮ: ТАЙМЕРДИ КҮЙГҮЗҮҮ
            const minutes = (quizData.settings && quizData.settings.timeLimit) ? quizData.settings.timeLimit : 20;
            timeLeft = minutes * 60;
            startTimer();

            const container = document.getElementById('questions-container');
            container.innerHTML = "";

            qList.forEach((q, index) => {
                let optionsHtml = "";
                q.options.forEach((opt, oIdx) => {
                    optionsHtml += `
                        <label class="flex items-center gap-3 p-4 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:bg-white/10 transition-all">
                            <input type="radio" name="q_${index}" value="${oIdx}" class="w-4 h-4 text-blue-500">
                            <span class="text-sm text-gray-200">${opt}</span>
                        </label>
                    `;
                });
                container.innerHTML += `
                    <div id="q-page-${index}" class="question-page space-y-4">
                        <p class="font-bold text-lg text-white leading-relaxed">${index + 1}. ${q.questionText}</p>
                        <div class="grid grid-cols-1 gap-2">${optionsHtml}</div>
                    </div>
                `;
            });

            updatePageVisibility();
            document.addEventListener('visibilitychange', handleCheating);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitQuiz();
                } else {
                    timeLeft--;
                    const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                    const s = (timeLeft % 60).toString().padStart(2, '0');
                    document.getElementById('timer-display').innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function handleCheating() {
            if (document.visibilityState === 'hidden' && isQuizActive) {
                cheatCount++;
                database.ref('results/' + quizId + '_' + studentName.replace(/\s+/g, '_')).update({
                    studentName: studentName, quizTitle: quizData.title, teacherUid: quizData.authorUid, tabCheats: cheatCount, isBlocked: cheatCount >= 3
                });
                if (cheatCount >= 3) {
                    clearInterval(timerInterval);
                    isQuizActive = false;
                    showSystemError("Бөгөттөлдүңүз!", "Сиз 3 жолу башка терезеге өткөнүңүз үчүн тест автоматтык түрдө токтотулду!");
                } else {
                    alert(`ЭСКЕРТҮҮ: Сыртка чыгууга тыюу салынган! Эскертүү: ${cheatCount}/3`);
                }
            }
        }

        function updatePageVisibility() {
            document.querySelectorAll('.question-page').forEach(page => page.classList.remove('active'));
            document.getElementById(`q-page-${currentQuestionIndex}`).classList.add('active');

            document.getElementById('progress-text').innerText = `Суроо: ${currentQuestionIndex + 1} / ${totalQuestionsCount}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / totalQuestionsCount) * 100}%`;

            document.getElementById('prev-btn').style.visibility = currentQuestionIndex === 0 ? 'hidden' : 'visible';
            
            if (currentQuestionIndex === totalQuestionsCount - 1) {
                document.getElementById('next-btn').classList.add('hidden');
                document.getElementById('submit-btn').classList.remove('hidden');
            } else {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('submit-btn').classList.add('hidden');
            }
        }

        function changeQuestion(dir) {
            currentQuestionIndex += dir;
            updatePageVisibility();
        }

        function submitQuiz() {
            clearInterval(timerInterval);
            isQuizActive = false;

            let correctAnswersCount = 0;

            qList.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q_${index}"]:checked`);
                if (selected && parseInt(selected.value) === q.correctAnswer) { correctAnswersCount++; }
            });

            const percent = Math.round((correctAnswersCount / totalQuestionsCount) * 100);

            database.ref('results/' + quizId + '_' + studentName.replace(/\s+/g, '_')).set({
                studentName: studentName, quizTitle: quizData.title, teacherUid: quizData.authorUid, score: correctAnswersCount, totalQuestions: totalQuestionsCount, tabCheats: cheatCount, isBlocked: cheatCount >= 3
            }).then(() => {
                document.getElementById('quiz-block').classList.add('hidden');
                document.getElementById('result-block').classList.remove('hidden');
                
                document.getElementById('result-score-text').innerText = `${correctAnswersCount} / ${totalQuestionsCount} Балл`;
                document.getElementById('result-percent').innerText = `${percent}%`;
                
                const circle = document.getElementById('animated-circle');
                const radius = circle.r.baseVal.value;
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (percent / 100) * circumference;
                
                setTimeout(() => {
                    circle.style.strokeDashoffset = offset;
                }, 200);
            });
        }
    </script>
</body>
</html>
