<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест тапшыруу | MUGALIM.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-card { transition: 0.3s; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.05); }
        .option-card:hover { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; }
        .option-card.selected { background: #3b82f6; border-color: #3b82f6; color: white; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="quiz-container" class="max-w-2xl w-full">
        <!-- Жүктөө анимациясы -->
        <div id="loader" class="text-center">
            <i class="fas fa-spinner fa-spin text-5xl text-blue-500 mb-4"></i>
            <p class="font-bold uppercase tracking-widest">Тест даярдалууда...</p>
        </div>

        <!-- Тесттин мазмуну -->
        <div id="quiz-content" class="hidden">
            <div class="glass-card p-8 rounded-[2.5rem] relative overflow-hidden">
                <div class="flex justify-between items-center mb-8">
                    <span id="question-number" class="text-xs font-black bg-blue-600 px-4 py-2 rounded-full uppercase tracking-widest">Суроо 1/10</span>
                    <div id="timer" class="text-blue-400 font-bold"><i class="fas fa-clock mr-2"></i>--:--</div>
                </div>

                <h2 id="question-text" class="text-2xl md:text-3xl font-black mb-8 leading-tight">...</h2>

                <div id="options-container" class="grid gap-4">
                    <!-- Варианттар ушул жерге чыгат -->
                </div>

                <button id="next-btn" class="w-full mt-10 bg-gradient-to-r from-blue-600 to-purple-600 p-5 rounded-2xl font-black uppercase tracking-widest hover:opacity-90 transition-all shadow-lg shadow-blue-900/20">
                    Кийинки суроо
                </button>
            </div>
        </div>

        <!-- Жыйынтык баракчасы -->
        <div id="result-content" class="hidden glass-card p-12 rounded-[3rem] text-center">
            <div class="w-24 h-24 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-trophy text-4xl text-green-500"></i>
            </div>
            <h2 class="text-4xl font-black mb-2 uppercase">Тест аяктады!</h2>
            <p id="score-text" class="text-gray-400 font-bold mb-8 uppercase tracking-widest">Сиздин жыйынтык: 0/0</p>
            <button onclick="location.reload()" class="bg-white text-black px-10 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-gray-200 transition-all">
                Кайра баштоо
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // URL'ден ID алуу
        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('id');

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let selectedOption = null;

        if (testId) {
            database.ref('tests/' + testId).once('value', (snapshot) => {
                const testData = snapshot.val();
                if (testData && testData.questions) {
                    currentQuestions = Object.values(testData.questions);
                    document.title = testData.title + " | MUGALIM.AI";
                    startQuiz();
                } else {
                    alert("Тест табылган жок!");
                }
            });
        }

        function startQuiz() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('quiz-content').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            selectedOption = null;
            
            document.getElementById('question-number').innerText = `Суроо ${currentIndex + 1}/${currentQuestions.length}`;
            document.getElementById('question-text').innerText = q.text;
            
            const optionsDiv = document.getElementById('options-container');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option-card p-5 rounded-2xl font-bold flex items-center gap-4';
                btn.innerHTML = `<span class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-xs">${String.fromCharCode(65 + idx)}</span> ${opt}`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedOption = idx;
                };
                optionsDiv.appendChild(btn);
            });
        }

        document.getElementById('next-btn').onclick = () => {
            if (selectedOption === null) {
                alert("Сураныч, бир вариантты тандаңыз!");
                return;
            }

            if (selectedOption === currentQuestions[currentIndex].correct) {
                score++;
            }

            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result-content').classList.remove('hidden');
            document.getElementById('score-text').innerText = `Сиздин жыйынтык: ${score}/${currentQuestions.length}`;
        }
    </script>
</body>
</html>
