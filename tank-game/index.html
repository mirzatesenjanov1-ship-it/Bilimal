<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Shoot 2D - BilimAl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0c0f12;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .top-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #131920;
            border-radius: 10px 10px 0 0;
            border: 1px solid #1f2937;
        }
        .back-btn {
            background: #00bcd4;
            color: #000;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #00e5ff;
            box-shadow: 0 0 10px #00e5ff;
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .stat-item span {
            color: #00e5ff;
        }
        .game-container {
            position: relative;
            background: #050709;
            border: 4px solid #10b981;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        canvas {
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 0 0 6px 6px;
        }
        .overlay h1 {
            font-size: 42px;
            margin-bottom: 20px;
            color: #ff0055;
            text-shadow: 0 0 15px #ff0055;
        }
        .overlay p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #a0aec0;
        }
        .start-btn {
            background: #ff0055;
            color: #fff;
            padding: 12px 35px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff0055;
            transition: 0.3s;
        }
        .start-btn:hover {
            background: #ff3377;
            box-shadow: 0 0 25px #ff3377;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="../index.html" class="back-btn">← Башкы бетке кайт</a>
        <div class="stats">
            <div class="stat-item">Упай: <span id="score-val">0</span></div>
            <div class="stat-item">Өмүр: <span id="lives-val">3</span></div>
            <div class="stat-item">Деңгээл: <span id="level-val">1</span></div>
            <div class="stat-item">Душмандар: <span id="enemies-val">5</span></div>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="840" height="560"></canvas>
        
        <div id="start-overlay" class="overlay">
            <h1 id="overlay-title">TANK SHOOT 2D</h1>
            <p id="overlay-desc">Базаны коргоңуз жана бардык душмандарды жок кылыңыз!</p>
            <button class="start-btn" onclick="startGame()">Оюнду баштоо</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Элементтердин көлөмү (сетка)
        const TILE_SIZE = 40; 
        const COLS = canvas.width / TILE_SIZE; // 21
        const ROWS = canvas.height / TILE_SIZE; // 14

        // Оюндун абалы
        let gameState = {
            score: 0,
            lives: 3,
            level: 1,
            maxEnemiesThisLevel: 5,
            enemiesDefeated: 0,
            running: false
        };

        // Башкаруу баскычтары
        let keys = {};

        // Карта коддору: 0: Бош, 1: Кыш (бузулат), 2: Темир (бузулбайт), 3: Суу (өтө албайт, ок өтөт), 4: Бадал (жашынат)
        let map = [];

        // Карта генерациясы (Деңгээлге жараша өзгөрөт)
        function generateMap(level) {
            let baseMap = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            
            // Четтерин бош калтырып, ортолоруна ар кандай тоскоолдуктарды кошуу
            for (let r = 1; r < ROWS - 2; r++) {
                for (let c = 1; c < COLS - 1; c++) {
                    // Базанын айланасын бош кармоо
                    if (r >= ROWS - 4 && c >= 8 && c <= 12) continue;

                    let rand = Math.random();
                    if (rand < 0.15) {
                        baseMap[r][c] = 1; // Кыш
                    } else if (rand < 0.20) {
                        baseMap[r][c] = 2; // Темир
                    } else if (rand < 0.23 && level > 1) {
                        baseMap[r][c] = 3; // Суу (Деңгээл 2ден баштап)
                    } else if (rand < 0.28) {
                        baseMap[r][c] = 4; // Бадал
                    }
                }
            }

            // БАЗАНЫ КУРУУ (Ар дайым төмөнкү ортодо)
            baseMap[ROWS-1][10] = 9; // Базанын Туусу (Оюнчу коргой турган негизги чекит)
            baseMap[ROWS-1][9] = 1;  // Айланасындагы коргоо кыштары
            baseMap[ROWS-2][9] = 1;
            baseMap[ROWS-2][10] = 1;
            baseMap[ROWS-2][11] = 1;
            baseMap[ROWS-1][11] = 1;

            return baseMap;
        }

        // Класстар
        class Tank {
            constructor(x, y, type, side) {
                this.x = x;
                this.y = y;
                this.w = TILE_SIZE - 4;
                this.h = TILE_SIZE - 4;
                this.dir = "up"; // up, down, left, right
                this.type = type; // player, normal, fast, heavy
                this.side = side; // friendly, enemy
                
                // Түрүнө жараша касиеттер
                if (type === "player") {
                    this.speed = 3;
                    this.hp = 1;
                    this.color = "#10b981";
                } else if (type === "fast") {
                    this.speed = 4;
                    this.hp = 1;
                    this.color = "#f59e0b";
                } else if (type === "heavy") {
                    this.speed = 1.5;
                    this.hp = 3;
                    this.color = "#ef4444";
                } else { // normal enemy
                    this.speed = 2;
                    this.hp = 1;
                    this.color = "#3b82f6";
                }

                this.shield = 0; // Калкан убактысы
                this.lastShot = 0;
            }

            draw() {
                // Эгер бадалдын ичинде болсо жана душман болсо, көрүнбөй калат (шарттуу түрдө)
                let currentTile = map[Math.floor((this.y + this.h/2)/TILE_SIZE)][Math.floor((this.x + this.w/2)/TILE_SIZE)];
                if (currentTile === 4 && this.side === "enemy") {
                    ctx.globalAlpha = 0.15; // Жарым жартылай көлөкө
                }

                // Калкан эффекти
                if (this.shield > 0 && this.side === "friendly") {
                    ctx.strokeStyle = "#00e5ff";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x + this.w/2, this.y + this.h/2, TILE_SIZE/2 + 2, 0, Math.PI*2);
                    ctx.stroke();
                }

                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.w, this.h);

                // Дуло (Танктын багыты)
                ctx.fillStyle = "#fff";
                let barrelSize = 6;
                if (this.dir === "up") ctx.fillRect(this.x + this.w/2 - barrelSize/2, this.y - 8, barrelSize, 10);
                if (this.dir === "down") ctx.fillRect(this.x + this.w/2 - barrelSize/2, this.y + this.h, barrelSize, 10);
                if (this.dir === "left") ctx.fillRect(this.x - 8, this.y + this.h/2 - barrelSize/2, 10, barrelSize);
                if (this.dir === "right") ctx.fillRect(this.x + this.w, this.y + this.h/2 - barrelSize/2, 10, barrelSize);

                ctx.globalAlpha = 1.0; // Альфаны калыбына келтирүү
            }

            move() {
                let nextX = this.x;
                let nextY = this.y;

                if (this.dir === "up") nextY -= this.speed;
                if (this.dir === "down") nextY += this.speed;
                if (this.dir === "left") nextX -= this.speed;
                if (this.dir === "right") nextX += this.speed;

                if (!this.checkCollision(nextX, nextY)) {
                    this.x = nextX;
                    this.y = nextY;
                } else if (this.side === "enemy") {
                    // Эгер душман тоскоолдукка такалса, багытын кокусунан өзгөртөт
                    const dirs = ["up", "down", "left", "right"];
                    this.dir = dirs[Math.floor(Math.random() * dirs.length)];
                }
            }

            checkCollision(nx, ny) {
                // Экрандан чыгып кетпөө
                if (nx < 0 || nx + this.w > canvas.width || ny < 0 || ny + this.h > canvas.height) return true;

                // Картадагы блоктор менен кагылышуу (Танк Суудан (3) да өтө албайт)
                let checkPoints = [
                    {x: nx, y: ny},
                    {x: nx + this.w, y: ny},
                    {x: nx, y: ny + this.h},
                    {x: nx + this.w, y: ny + this.h}
                ];

                for (let pt of checkPoints) {
                    let cellX = Math.floor(pt.x / TILE_SIZE);
                    let cellY = Math.floor(pt.y / TILE_SIZE);
                    
                    if (cellY >= 0 && cellY < ROWS && cellX >= 0 && cellX < COLS) {
                        let block = map[cellY][cellX];
                        if (block === 1 || block === 2 || block === 3 || block === 9) {
                            return true;
                        }
                    }
                }
                return false;
            }

            shoot() {
                let now = Date.now();
                let cooldown = this.type === "player" ? 400 : 1500;
                if (now - this.lastShot > cooldown) {
                    let bx = this.x + this.w / 2;
                    let by = this.y + this.h / 2;
                    bullets.push(new Bullet(bx, by, this.dir, this.side));
                    this.lastShot = now;
                }
            }
        }

        class Bullet {
            constructor(x, y, dir, side) {
                this.x = x;
                this.y = y;
                this.dir = dir;
                this.side = side;
                this.speed = 6;
                this.r = 3;
                this.active = true;
            }

            draw() {
                ctx.fillStyle = this.side === "friendly" ? "#00e5ff" : "#ff0055";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.fill();
            }

            update() {
                if (this.dir === "up") this.y -= this.speed;
                if (this.dir === "down") this.y += this.speed;
                if (this.dir === "left") this.x -= this.speed;
                if (this.dir === "right") this.x += this.speed;

                // Экрандан чыкса жок кылуу
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.active = false;
                    return;
                }

                // Блокторго тийүү логикасы
                let cellX = Math.floor(this.x / TILE_SIZE);
                let cellY = Math.floor(this.y / TILE_SIZE);

                if (cellY >= 0 && cellY < ROWS && cellX >= 0 && cellX < COLS) {
                    let block = map[cellY][cellX];
                    if (block === 1) { // Кыш бузулат
                        map[cellY][cellX] = 0;
                        this.active = false;
                    } else if (block === 2) { // Темир бузулбайт
                        this.active = false;
                    } else if (block === 9) { // БАЗА ТАЛКАЛАНДЫ
                        map[cellY][cellX] = 0; // Тууну жок кылуу
                        this.active = false;
                        gameOver(false); // Оюн бүткөнүн жарыялоо
                    }
                }
            }
        }

        class Bonus {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.w = 30;
                this.h = 30;
                this.type = type; // shield, star, bomb
                this.spawnTime = Date.now();
                this.duration = 10000; // 10 секунд жашайт
            }

            draw() {
                ctx.save();
                if (this.type === "shield") {
                    ctx.fillStyle = "#00e5ff";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#00e5ff";
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                } else if (this.type === "star") {
                    ctx.fillStyle = "#eab308";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#eab308";
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                } else if (this.type === "bomb") {
                    ctx.fillStyle = "#ef4444";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#ef4444";
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                }
                ctx.restore();
            }
        }

        // Оюн объекттеринин массивдери
        let player;
        let enemies = [];
        let bullets = [];
        let bonuses = [];
        let enemySpawnTimer = 0;

        // Оюнду тазалоо жана баштоо
        function startGame() {
            document.getElementById("start-overlay").style.display = "none";
            
            map = generateMap(gameState.level);
            player = new Tank(7 * TILE_SIZE + 2, (ROWS - 1) * TILE_SIZE + 2, "player", "friendly");
            
            enemies = [];
            bullets = [];
            bonuses = [];
            gameState.enemiesDefeated = 0;
            gameState.running = true;
            
            // Биринчи 2 душманды дароо чыгаруу
            spawnEnemy();
            spawnEnemy();

            updateUI();
        }

        function spawnEnemy() {
            if (enemies.length + gameState.enemiesDefeated >= gameState.maxEnemiesThisLevel) return;

            // Картанын үстүнкү үч чекитинен кокусунан чыгуу
            const spawnPoints = [
                {x: 1 * TILE_SIZE, y: 0},
                {x: 10 * TILE_SIZE, y: 0},
                {x: 19 * TILE_SIZE, y: 0}
            ];
            let pt = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];

            // Душмандын түрүн кокусунан аныктоо (Күчтүү же Ылдам)
            let rand = Math.random();
            let type = "normal";
            if (rand > 0.7) type = "fast";
            else if (rand > 0.4 && gameState.level > 1) type = "heavy";

            enemies.push(new Tank(pt.x + 2, pt.y + 2, type, "enemy"));
        }

        // Бонус жаратуу
        function spawnBonus() {
            let types = ["shield", "star", "bomb"];
            let randType = types[Math.floor(Math.random() * types.length)];
            let rx = Math.floor(Math.random() * (canvas.width - 40)) + 20;
            let ry = Math.floor(Math.random() * (canvas.height - 120)) + 40;
            bonuses.push(new Bonus(rx, ry, randType));
        }

        // Баскычтарды угуу
        window.addEventListener("keydown", e => { keys[e.key] = true; });
        window.addEventListener("keyup", e => { keys[e.key] = false; });

        function handleInput() {
            if (!gameState.running) return;

            if (keys["ArrowUp"] || keys["w"]) { player.dir = "up"; player.move(); }
            else if (keys["ArrowDown"] || keys["s"]) { player.dir = "down"; player.move(); }
            else if (keys["ArrowLeft"] || keys["a"]) { player.dir = "left"; player.move(); }
            else if (keys["ArrowRight"] || keys["d"]) { player.dir = "right"; player.move(); }

            if (keys[" "] || keys["f"]) { player.shoot(); }
        }

        // Кагылышууларды текшерүү (Абсолюттук туура тик бурчтук кесилиши)
        function rectCollision(r1, r2) {
            return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
        }

        // Негизги жаңыртуу логикасы
        function update() {
            handleInput();

            if (!gameState.running) return;

            // Калкандардын убактысын азайтуу
            if (player.shield > 0) player.shield--;

            // Окторду жаңыртуу
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.update();

                if (!b.active) {
                    bullets.splice(i, 1);
                    continue;
                }

                // Ок Танктарга тийдиби?
                if (b.side === "friendly") {
                    // Оюнчунун огу душмандарга тийгенде
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let enemy = enemies[j];
                        // Окту кутуча катары текшерүү
                        if (rectCollision({x: b.x - b.r, y: b.y - b.r, w: b.r*2, h: b.r*2}, enemy)) {
                            b.active = false;
                            enemy.hp--;
                            if (enemy.hp <= 0) {
                                // Бонус чыгуу мүмкүнчүлүгү (30%)
                                if (Math.random() < 0.3) spawnBonus();
                                enemies.splice(j, 1);
                                gameState.score += enemy.type === "heavy" ? 30 : 10;
                                gameState.enemiesDefeated++;
                            }
                            bullets.splice(i, 1);
                            break;
                        }
                    }
                } else {
                    // Душмандын огу оюнчуга тийгенде
                    if (rectCollision({x: b.x - b.r, y: b.y - b.r, w: b.r*2, h: b.r*2}, player)) {
                        b.active = false;
                        bullets.splice(i, 1);
                        
                        if (player.shield <= 0) {
                            gameState.lives--;
                            if (gameState.lives <= 0) {
                                gameOver(false);
                            } else {
                                // Жаңы өмүр келгенде убактылуу калкан берүү
                                player.x = 7 * TILE_SIZE + 2;
                                player.y = (ROWS - 1) * TILE_SIZE + 2;
                                player.shield = 120; // 2 секунд калкан
                            }
                        }
                    }
                }
            }

            // Душмандарды башкаруу жана кыймылдатуу
            for (let enemy of enemies) {
                enemy.move();
                // Кокусунан ок атуу логикасы
                if (Math.random() < 0.02) {
                    enemy.shoot();
                }
            }

            // Душмандарды убакыт менен кошуу
            enemySpawnTimer++;
            if (enemySpawnTimer > 120) { // Ар 2 секунд сайын
                spawnEnemy();
                enemySpawnTimer = 0;
            }

            // Бонустарды чогултуу
            for (let i = bonuses.length - 1; i >= 0; i--) {
                let bonus = bonuses[i];
                // 10 сек өтсө бонусту өчүрүү
                if (Date.now() - bonus.spawnTime > bonus.duration) {
                    bonuses.splice(i, 1);
                    continue;
                }

                if (rectCollision(player, bonus)) {
                    if (bonus.type === "shield") {
                        player.shield = 300; // 5 секунд өлбөстүк
                    } else if (bonus.type === "star") {
                        gameState.score += 50; // Кошумча упай
                    } else if (bonus.type === "bomb") {
                        // Экрандагы бардык душмандарды жардыруу
                        gameState.score += enemies.length * 10;
                        gameState.enemiesDefeated += enemies.length;
                        enemies = [];
                    }
                    bonuses.splice(i, 1);
                }
            }

            // Жеңиш шарттары (Кийинки деңгээлге өтүү)
            if (gameState.enemiesDefeated >= gameState.maxEnemiesThisLevel) {
                nextLevel();
            }

            updateUI();
        }

        // Сүрөт тартуу процессору
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Картаны жана блокторду тартуу
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let block = map[r][c];
                    if (block === 1) { // Кыш
                        ctx.fillStyle = "#b45309";
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE - 1, TILE_SIZE - 1);
                    } else if (block === 2) { // Темир
                        ctx.fillStyle = "#64748b";
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE - 1, TILE_SIZE - 1);
                        // Темирдин ички рельефи
                        ctx.strokeStyle = "#475569";
                        ctx.strokeRect(c * TILE_SIZE + 4, r * TILE_SIZE + 4, TILE_SIZE - 9, TILE_SIZE - 9);
                    } else if (block === 3) { // Суу
                        ctx.fillStyle = "#1d4ed8";
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else if (block === 9) { // БАЗА / ТУУ
                        ctx.fillStyle = "#d97706";
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = "#fff";
                        ctx.font = "20px Arial";
                        ctx.fillText("👑", c * TILE_SIZE + 8, r * TILE_SIZE + 28);
                    }
                }
            }

            // 2. Бонустарды тартуу
            for (let bonus of bonuses) bonus.draw();

            // 3. Оюнчуну жана душмандарды тартуу
            if (player) player.draw();
            for (let enemy of enemies) enemy.draw();

            // 4. Окторду тартуу
            for (let bullet of bullets) bullet.draw();

            // 5. Бадалдарды эң үстүнө тартуу (Танктар ичинде көрүнбөй калышы үчүн)
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (map[r][c] === 4) { // Бадал
                        ctx.fillStyle = "rgba(22, 163, 74, 0.85)";
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
        }

        // Интерфейсти жаңыртуу
        function updateUI() {
            document.getElementById("score-val").innerText = gameState.score;
            document.getElementById("lives-val").innerText = gameState.lives;
            document.getElementById("level-val").innerText = gameState.level;
            
            let rem = gameState.maxEnemiesThisLevel - gameState.enemiesDefeated;
            document.getElementById("enemies-val").innerText = rem >= 0 ? rem : 0;
        }

        // Кийинки деңгээлге өтүү логикасы
        function nextLevel() {
            gameState.level++;
            gameState.maxEnemiesThisLevel += 2; // Душмандарды көбөйтүү
            gameState.running = false;
            
            document.getElementById("overlay-title").innerText = `${gameState.level - 1}-ДЕҢГЭЭЛ КҮҮРӨТҮЛДҮ!`;
            document.getElementById("overlay-desc").innerText = `Даяр болуңуз, кийинки ${gameState.level}-деңгээл татаалыраак!`;
            document.getElementById("start-overlay").style.display = "flex";
        }

        // Оюн бүткөндө
        function gameOver(success) {
            gameState.running = false;
            document.getElementById("overlay-title").innerText = "ОЮН СУНУШТАЛДЫ (GAME OVER)";
            document.getElementById("overlay-desc").innerText = `Сиздин акыркы упайыңыз: ${gameState.score}. База талкаланды же өмүрүңүз бүттү.`;
            
            // Калыбына келтирүү
            gameState.level = 1;
            gameState.maxEnemiesThisLevel = 5;
            gameState.score = 0;
            gameState.lives = 3;

            document.getElementById("start-overlay").style.display = "flex";
        }

        // Оюндун негизги цикли (Game Loop)
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Баштапкы ишке киргизүү
        gameLoop();
    </script>
</body>
</html>
