<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Battle 2D - BilimAl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #0c0f12;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-y: auto;
        }
        .top-bar {
            width: 100%;
            max-width: 440px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 25, 35, 0.9);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #1f2937;
            font-size: 14px;
            font-weight: bold;
        }
        .back-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .stats {
            display: flex;
            gap: 12px;
            color: #4cd137;
            font-size: 12px;
        }
        .stats span span {
            color: #00a8ff;
        }
        .game-container {
            position: relative;
            background: #000;
            border: 3px solid #2ed573;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.3);
            padding: 2px;
        }
        canvas {
            display: block;
            border-radius: 4px;
        }
        .mobile-controls {
            margin-top: 15px;
            width: 100%;
            max-width: 440px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 58px);
            grid-template-rows: repeat(3, 58px);
            gap: 6px;
        }
        .control-btn {
            background: #2f3542;
            border: 2px solid #57606f;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            cursor: pointer;
            touch-action: none;
        }
        .control-btn:active, .control-btn.active {
            background: #059669;
        }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        
        .fire-btn {
            width: 80px;
            height: 80px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50%;
            border: none;
            background: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
            cursor: pointer;
            touch-action: none;
        }
        .fire-btn:active {
            background: #cc0044;
            transform: scale(0.95);
        }
        .adsense-container {
            margin-top: 20px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            padding: 10px;
            border: 1px dashed #374151;
            border-radius: 6px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="back-btn" onclick="location.href='index.html'">✕ Меню</button>
        <div class="stats">
            <span>Упай: <span id="score-val">0</span></span>
            <span>Өмүр: <span id="lives-val">3</span></span>
            <span>Раунд: <span id="round-val">1</span></span>
            <span>Танк: <span id="tank-lvl">Lvl 1</span></span>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="mobile-controls">
        <div class="d-pad">
            <div class="control-btn btn-up" data-dir="up">▲</div>
            <div class="control-btn btn-left" data-dir="left">◀</div>
            <div class="control-btn btn-right" data-dir="right">▶</div>
            <div class="control-btn btn-down" data-dir="down">▼</div>
        </div>
        <button class="fire-btn" id="fireBtn">FIRE</button>
    </div>

    <div class="adsense-container">
        ЖАРНАМА / РЕКЛАМА
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const COLS = 13;
        const ROWS = 13;
        const TILE_SIZE = 32;

        canvas.width = COLS * TILE_SIZE;
        canvas.height = ROWS * TILE_SIZE;

        let score = 0;
        let lives = 3;
        let round = 1;
        let tankLevel = 1;
        let gameOver = false;

        const TILE_EMPTY = 0;
        const TILE_BRICK = 1;   
        const TILE_STEEL = 2;   
        const TILE_BASE = 9;    

        let map = [];

        function initMap() {
            map = [];
            for (let r = 0; r < ROWS; r++) {
                map[r] = [];
                for (let c = 0; c < COLS; c++) {
                    map[r][c] = TILE_EMPTY;
                }
            }

            // Классикалык ретро вертикалдуу узун дубалдардын генерациясы
            for (let c = 1; c < COLS; c += 2) {
                for (let r = 1; r < ROWS - 1; r++) {
                    if (r === 5 || r === 6) continue; // Ортоңку жолду ачык калтыруу
                    
                    if (Math.random() < 0.75) {
                        map[r][c] = TILE_BRICK;
                    } else if (Math.random() < 0.15) {
                        map[r][c] = TILE_STEEL;
                    }
                }
            }

            // База жана танктар чыга турган жерлерди тазалоо
            map[0][0] = TILE_EMPTY; map[0][6] = TILE_EMPTY; map[0][12] = TILE_EMPTY;
            map[12][4] = TILE_EMPTY;

            // Бүркүт чеби
            map[12][5] = TILE_BRICK;
            map[11][5] = TILE_BRICK;
            map[11][6] = TILE_BRICK;
            map[11][7] = TILE_BRICK;
            map[12][7] = TILE_BRICK;

            map[12][6] = TILE_BASE;
        }

        const player = {
            x: 4 * TILE_SIZE + 3,
            y: 12 * TILE_SIZE + 3,
            size: 26,
            speed: 2,
            dir: 'up',
            moving: false,
            lastFire: 0,
            fireCooldown: 400
        };

        let bullets = [];
        let enemies = [];
        const MAX_ENEMIES_ON_SCREEN = 4;
        let totalEnemiesThisRound = 10;
        let enemiesSpawned = 0;
        let lastEnemySpawn = 0;

        // Клавиатура башкаруусу
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
            if (e.code === 'Space') playerFire();
        });
        window.addEventListener('keyup', e => { keys[e.code] = false; });

        // Сенсордук мобилдик башкаруу
        const controlBtns = document.querySelectorAll('.control-btn');
        let activeTouchDir = null;

        controlBtns.forEach(btn => {
            btn.addEventListener('touchstart', e => {
                e.preventDefault();
                activeTouchDir = btn.getAttribute('data-dir');
                btn.classList.add('active');
            }, {passive: false});
            btn.addEventListener('touchend', e => {
                e.preventDefault();
                if (activeTouchDir === btn.getAttribute('data-dir')) activeTouchDir = null;
                btn.classList.remove('active');
            }, {passive: false});
        });

        // Атуу баскычын оптималдаштыруу
        const fireBtn = document.getElementById('fireBtn');
        fireBtn.addEventListener('touchstart', e => {
            e.preventDefault();
            playerFire();
        }, {passive: false});
        fireBtn.addEventListener('click', e => {
            e.preventDefault();
            playerFire();
        });

        function playerFire() {
            const now = Date.now();
            if (now - player.lastFire > player.fireCooldown && !gameOver) {
                createBullet(player.x, player.y, player.size, player.dir, true);
                player.lastFire = now;
            }
        }

        // ОКТУН ТУУРА ЖАНА ЖУМШАК УЧУУ АЛГОРИТМИ (Каталар толук оңдолду)
        function createBullet(tx, ty, tSize, dir, isPlayer) {
            let bx = tx + tSize / 2;
            let by = ty + tSize / 2;
            let vx = 0, vy = 0;
            const bSpeed = 4; // Сүрөттөгүдөй жумшак учуу ылдамдыгы

            if (dir === 'up')    { vy = -bSpeed; by = ty - 2; }
            if (dir === 'down')  { vy = bSpeed;  by = ty + tSize + 2; }
            if (dir === 'left')  { vx = -bSpeed; bx = tx - 2; }
            if (dir === 'right') { vx = bSpeed;  bx = tx + tSize + 2; }

            bullets.push({ x: bx - 2, y: by - 2, w: 4, h: 4, vx: vx, vy: vy, isPlayer: isPlayer });
        }

        function spawnEnemy() {
            if (enemiesSpawned >= totalEnemiesThisRound || enemies.length >= MAX_ENEMIES_ON_SCREEN) return;
            const now = Date.now();
            if (now - lastEnemySpawn < 3000) return;

            const spawnPoints = [4, 6 * TILE_SIZE + 3, 12 * TILE_SIZE - 30];
            const rx = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
            
            enemies.push({
                x: rx,
                y: 4,
                size: 26,
                speed: 1,
                dir: 'down',
                lastDirChange: 0,
                lastFire: 0
            });

            enemiesSpawned++;
            lastEnemySpawn = now;
        }

        function checkWallCollision(x, y, size) {
            if (x < 0 || x + size > canvas.width || y < 0 || y + size > canvas.height) return true;

            const startC = Math.floor(x / TILE_SIZE);
            const endC = Math.floor((x + size) / TILE_SIZE);
            const startR = Math.floor(y / TILE_SIZE);
            const endR = Math.floor((y + size) / TILE_SIZE);

            for (let r = startR; r <= endR; r++) {
                for (let c = startC; c <= endC; c++) {
                    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                        if (map[r][c] !== TILE_EMPTY) return true;
                    }
                }
            }
            return false;
        }

        function update() {
            if (gameOver) return;

            // Оюнчу кыймылы
            let nextX = player.x;
            let nextY = player.y;
            player.moving = false;

            if (keys['ArrowUp'] || activeTouchDir === 'up') {
                player.dir = 'up'; nextY -= player.speed; player.moving = true;
            } else if (keys['ArrowDown'] || activeTouchDir === 'down') {
                player.dir = 'down'; nextY += player.speed; player.moving = true;
            } else if (keys['ArrowLeft'] || activeTouchDir === 'left') {
                player.dir = 'left'; nextX -= player.speed; player.moving = true;
            } else if (keys['ArrowRight'] || activeTouchDir === 'right') {
                player.dir = 'right'; nextX += player.speed; player.moving = true;
            }

            if (player.moving && !checkWallCollision(nextX, nextY, player.size)) {
                player.x = nextX;
                player.y = nextY;
            }

            // Душмандар логикасы
            spawnEnemy();
            const now = Date.now();

            enemies.forEach((enemy) => {
                let ex = enemy.x;
                let ey = enemy.y;

                if (now - enemy.lastDirChange > 2000 || Math.random() < 0.01) {
                    const dirs = ['up', 'down', 'left', 'right'];
                    enemy.dir = dirs[Math.floor(Math.random() * dirs.length)];
                    enemy.lastDirChange = now;
                }

                if (enemy.dir === 'up') ey -= enemy.speed;
                if (enemy.dir === 'down') ey += enemy.speed;
                if (enemy.dir === 'left') ex -= enemy.speed;
                if (enemy.dir === 'right') ex += enemy.speed;

                if (!checkWallCollision(ex, ey, enemy.size)) {
                    enemy.x = ex;
                    enemy.y = ey;
                } else {
                    const dirs = ['up', 'down', 'left', 'right'];
                    enemy.dir = dirs[Math.floor(Math.random() * dirs.length)];
                }

                if (now - enemy.lastFire > 2000 && Math.random() < 0.2) {
                    createBullet(enemy.x, enemy.y, enemy.size, enemy.dir, false);
                    enemy.lastFire = now;
                }
            });

            // Октордун учушу жана тийүү логикасы
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                    continue;
                }

                const tileC = Math.floor((b.x + b.w/2) / TILE_SIZE);
                const tileR = Math.floor((b.y + b.h/2) / TILE_SIZE);

                if (tileR >= 0 && tileR < ROWS && tileC >= 0 && tileC < COLS) {
                    const tileType = map[tileR][tileC];
                    if (tileType === TILE_BRICK) {
                        map[tileR][tileC] = TILE_EMPTY; 
                        bullets.splice(i, 1);
                        continue;
                    } else if (tileType === TILE_STEEL) {
                        bullets.splice(i, 1); 
                        continue;
                    } else if (tileType === TILE_BASE) {
                        map[tileR][tileC] = TILE_EMPTY;
                        gameOver = true;
                        bullets.splice(i, 1);
                        setTimeout(() => { alert("Штаб талкаланды! Оюн бүттү."); location.reload(); }, 100);
                        return;
                    }
                }

                // Танктарга тийүү
                if (b.isPlayer) {
                    let hitEnemy = false;
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let enemy = enemies[j];
                        if (b.x > enemy.x && b.x < enemy.x + enemy.size && b.y > enemy.y && b.y < enemy.y + enemy.size) {
                            enemies.splice(j, 1);
                            hitEnemy = true;
                            score += 100;
                            document.getElementById('score-val').innerText = score;

                            if (score >= 500 && tankLevel === 1) { tankLevel = 2; player.speed = 2.5; }
                            if (score >= 1200 && tankLevel === 2) { tankLevel = 3; player.fireCooldown = 250; }
                            document.getElementById('tank-lvl').innerText = "Lvl " + tankLevel;

                            if (enemies.length === 0 && enemiesSpawned >= totalEnemiesThisRound) {
                                round++;
                                document.getElementById('round-val').innerText = round;
                                totalEnemiesThisRound += 3;
                                enemiesSpawned = 0;
                                initMap();
                            }
                            break;
                        }
                    }
                    if (hitEnemy) {
                        bullets.splice(i, 1);
                        continue;
                    }
                } else {
                    if (b.x > player.x && b.x < player.x + player.size && b.y > player.y && b.y < player.y + player.size) {
                        bullets.splice(i, 1);
                        lives--;
                        document.getElementById('lives-val').innerText = lives;
                        if (lives <= 0) {
                            gameOver = true;
                            setTimeout(() => { alert("Танкыңыз талкаланды! Оюн бүттү."); location.reload(); }, 100);
                        } else {
                            player.x = 4 * TILE_SIZE + 3;
                            player.y = 12 * TILE_SIZE + 3;
                            player.dir = 'up';
                        }
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Карта
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (map[r][c] === TILE_BRICK) {
                        ctx.fillStyle = '#b33939'; 
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE - 1, TILE_SIZE - 1);
                        ctx.strokeStyle = '#2c3e50';
                        ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else if (map[r][c] === TILE_STEEL) {
                        ctx.fillStyle = '#747d8c'; 
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#f1f2f6';
                        ctx.fillRect(c * TILE_SIZE + 4, r * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                    } else if (map[r][c] === TILE_BASE) {
                        ctx.beginPath();
                        ctx.arc(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2 - 2, 0, Math.PI * 2);
                        ctx.fillStyle = '#ffa500'; ctx.fill();
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    }
                }
            }

            // Оюнчу танк
            ctx.fillStyle = '#2ed573'; 
            if (tankLevel === 2) ctx.fillStyle = '#00a8ff'; 
            if (tankLevel === 3) ctx.fillStyle = '#eccc68'; 
            ctx.fillRect(player.x, player.y, player.size, player.size);

            ctx.fillStyle = '#ffffff';
            if (player.dir === 'up') ctx.fillRect(player.x + player.size/2 - 3, player.y - 4, 6, 8);
            if (player.dir === 'down') ctx.fillRect(player.x + player.size/2 - 3, player.y + player.size - 4, 6, 8);
            if (player.dir === 'left') ctx.fillRect(player.x - 4, player.y + player.size/2 - 3, 8, 6);
            if (player.dir === 'right') ctx.fillRect(player.x + player.size - 4, player.y + player.size/2 - 3, 8, 6);

            // Душмандар
            enemies.forEach(enemy => {
                ctx.fillStyle = '#ff4757'; 
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

                ctx.fillStyle = '#ffa500';
                if (enemy.dir === 'up') ctx.fillRect(enemy.x + enemy.size/2 - 3, enemy.y - 4, 6, 8);
                if (enemy.dir === 'down') ctx.fillRect(enemy.x + enemy.size/2 - 3, enemy.y + enemy.size - 4, 6, 8);
                if (enemy.dir === 'left') ctx.fillRect(enemy.x - 4, enemy.y + enemy.size/2 - 3, 8, 6);
                if (enemy.dir === 'right') ctx.fillRect(enemy.x + enemy.size - 4, enemy.y + enemy.size/2 - 3, 8, 6);
            });

            // Октор
            ctx.fillStyle = '#ff3838';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x + b.w/2, b.y + b.h/2, b.w/2 + 1, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initMap();
        gameLoop();
    </script>
</body>
</html>
