<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БилимАл Танк - Клан Борбору</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="top-nav">
        <button id="btn-battle" class="nav-btn">⚔ САЛГЫЛАШУУ ТАЛААСЫ</button>
        <button id="btn-clan" class="nav-btn active">🛡 КЛАН БОРБОРУ</button>
    </nav>

    <section id="battle-section" class="hidden">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </section>

    <section id="clan-section" class="clan-container">
        <aside class="sidebar">
            <ul>
                <li onclick="showTab('overview')">📊 Overview</li>
                <li onclick="showTab('shop')">🛒 Shop</li>
                <li onclick="showTab('chat')">💬 Chat</li>
            </ul>
        </aside>

        <main class="content-area">
            <div id="tab-overview" class="tab-content active">
                <h2>Steel Wolves #SW1123</h2>
                <p>Клан Деңгээли: 8 / 100</p>
                <div class="stats">Жалпы салгылашуулар: 454</div>
            </div>

            <div id="tab-shop" class="tab-content hidden">
                <h2>Аскердик Магазин</h2>
                <div class="shop-items">
                    <div class="item">
                        <img src="assets/heavy_tank.png" alt="Оор Танк">
                        <h3>Оор Танк (Heavy)</h3>
                        <p>Баасы: 500 Кристалл</p>
                        <button onclick="buyItem('heavy_tank', 500)">Сатып алуу</button>
                    </div>
                    <div class="item">
                        <img src="assets/shield_powerup.png" alt="Калкан">
                        <h3>Калкан генератору</h3>
                        <p>Баасы: 150 Кристалл</p>
                        <button onclick="buyItem('shield', 150)">Сатып алуу</button>
                    </div>
                </div>
            </div>
        </main>
    </section>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="js/clan-ui.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
