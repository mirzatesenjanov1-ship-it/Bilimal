<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>БилимАл Танк - Бүркүттөр Кагылышуусу</title>
    
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #090c10;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Жогорку статистика жана Апгрейд панели */
        #ui-top-panel {
            width: 100%;
            max-width: 1100px;
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            border-bottom: 3px solid #30363d;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .info-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .clan-badge {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .crystal-box {
            color: #00e5ff;
            font-weight: bold;
            font-size: 15px;
            background: rgba(0, 229, 255, 0.1);
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            display: inline-flex;
            align-items: center;
            box-shadow: inset 0 0 8px rgba(0,229,255,0.2);
        }

        /* Меню - Жакшыртуу баскычтары */
        #upgrade-menu {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-upgrade {
            background: linear-gradient(135deg, #21262d 0%, #161b22 100%);
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .btn-upgrade:not(:disabled):hover {
            border-color: #f2a104;
            color: #fff;
            background: linear-gradient(135deg, #f2a104 0%, #ff6d00 100%);
            box-shadow: 0 0 10px rgba(242,161,4,0.4);
        }
        .btn-upgrade:active { transform: scale(0.95); }
        .btn-upgrade:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Оюн аянтчасы */
        #game-wrapper {
            position: relative;
            width: 1100px;
            height: 620px;
            max-width: 100vw;
            margin-top: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
            background-color: #030508;
            border: 4px solid #30363d;
            border-radius: 10px;
            width: 100%;
            height: 100%;
        }

        /* Мобилдик башкаруу баскычтары */
        #mobile-ui {
            display: none;
            position: fixed;
            bottom: 25px;
            left: 0;
            width: 100%;
            padding: 0 40px;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 100;
        }

        .joystick-container {
            width: 150px;
            height: 150px;
            background: rgba(22, 27, 34, 0.6);
            border: 3px solid rgba(242, 161, 4, 0.4);
            border-radius: 50%;
            position: relative;
            pointer-events: auto;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
        }

        .touch-btn {
            background: transparent;
            border: none;
            color: #8b949e;
            font-weight: bold;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .touch-btn:active { color: #f2a104; background: rgba(242,161,4,0.15); }
        .btn-up    { grid-area: up; border-radius: 50% 50% 0 0; }
        .btn-down  { grid-area: down; border-radius: 0 0 50% 50%; }
        .btn-left  { grid-area: left; border-radius: 50% 0 0 50%; }
        .btn-right { grid-area: right; border-radius: 0 50% 50% 0; }

        #fire-button {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #da3633 0%, #891614 100%);
            border: 3px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: bold;
            font-size: 15px;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(218,54,51,0.4);
            pointer-events: auto;
            cursor: pointer;
        }
        #fire-button:active { transform: scale(0.9); }

        /* Кулактандыруу терезеси */
        #win-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #161b22;
            border: 3px solid #f2a104;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(242, 161, 4, 0.4);
            z-index: 1000;
            width: 90%;
            max-width: 420px;
        }

        #win-modal h2 { margin: 0 0 8px 0; color: #f2a104; font-size: 24px; }
        #win-modal p { margin: 0 0 20px 0; font-size: 15px; color: #c9d1d9; }
        #win-modal button {
            background: #f2a104; color: #0d1117; border: none;
            padding: 10px 24px; font-weight: bold; font-size: 14px;
            border-radius: 6px; cursor: pointer;
        }
        #win-modal button:hover { background: #ffb726; }
    </style>
</head>
<body>

    <div id="ui-top-panel">
        <div class="info-group">
            <div id="player-clan-tag" class="clan-badge">Жүктөлүүдө...</div>
            <div>
                <span class="crystal-box">💎 Кристалл: <span id="ui-crystals">25</span></span>
            </div>
        </div>
        
        <div id="upgrade-menu">
            <button class="btn-upgrade" id="upg-hp" onclick="buyUpgrade('hp', 3)">
                <span>🛡️ Макс HP+</span>
                <span style="color:#f2a104;">3 💎 (Жаңыртуу)</span>
            </button>
            <button class="btn-upgrade" id="upg-speed" onclick="buyUpgrade('speed', 4)">
                <span>⚡ Ылдамдык+</span>
                <span style="color:#f2a104;">4 💎 (Жаңыртуу)</span>
            </button>
            <button class="btn-upgrade" id="upg-dmg" onclick="buyUpgrade('damage', 5)">
                <span>💥 Ок Күчү+</span>
                <span style="color:#f2a104;">5 💎 (Жаңыртуу)</span>
            </button>
            <button class="btn-upgrade" id="upg-fort" onclick="buyUpgrade('fort', 6)">
                <span>🧱 Чепти калыбына келтирүү</span>
                <span style="color:#f2a104;">6 💎 (Жаңыртуу)</span>
            </button>
        </div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="mobile-ui">
        <div class="joystick-container">
            <button class="touch-btn btn-up" id="touch-up">▲</button>
            <button class="touch-btn btn-left" id="touch-left">◀</button>
            <button class="touch-btn btn-right" id="touch-right">▶</button>
            <button class="touch-btn btn-down" id="touch-down">▼</button>
        </div>
        <button id="fire-button">ОТ АТ</button>
    </div>

    <div id="win-modal">
        <h2 id="win-title">🏆 ЖЕҢИШ!</h2>
        <p id="win-desc">Оюн аяктады.</p>
        <button onclick="restartBattlefield()">Кийинки салгылашуу</button>
    </div>

<script>
// =========================================================================
// 1. КОНФИГУРАЦИЯ ЖАНА АБАЛ
// =========================================================================
const BLOCK_SIZE = 40;            
const MAP_COLS = 50;             
const MAP_ROWS = 30;
const WORLD_WIDTH = MAP_COLS * BLOCK_SIZE;   
const WORLD_HEIGHT = MAP_ROWS * BLOCK_SIZE;  

const VIEW_WIDTH = 1100; 
const VIEW_HEIGHT = 620;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = VIEW_WIDTH;
canvas.height = VIEW_HEIGHT;

let camera = { x: 0, y: 0 };
let localPlayerId = "player_me";
let players = {};
let bullets = [];
let particles = [];    
let crystals = [];     
let mapData = [];      

let localCrystals = 25; // Баштапкы кристалл саны

// Бүркүт базалары
let blueEagle = { x: 100, y: WORLD_HEIGHT / 2, hp: 600, maxHp: 600, clan: "КӨК КЛАН", level: 1 };
let redEagle = { x: WORLD_WIDTH - 100, y: WORLD_HEIGHT / 2, hp: 600, maxHp: 600, clan: "КЫЗЫЛ КЛАН", level: 1 };

// Мобилдик тууралоо
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 1025;
if (isMobile) {
    let mobUi = document.getElementById('mobile-ui');
    if(mobUi) mobUi.style.display = 'flex';
}

// =========================================================================
// 2. КАРТАНЫ ЖАНА КОРГООЧУ ЧЕПТИ ГЕНЕРАЦИЯЛОО
// =========================================================================
function buildWorld() {
    let matrix = [];
    for (let r = 0; r < MAP_ROWS; r++) {
        matrix[r] = [];
        for (let c = 0; c < MAP_COLS; c++) {
            if (r === 0 || r === MAP_ROWS - 1 || c === 0 || c === MAP_COLS - 1) {
                matrix[r][c] = 2; // Темир чек ара
            } else if (Math.random() < 0.12 && (c > 7 && c < MAP_COLS - 8)) {
                matrix[r][c] = 1; // Кыш блок
            } else {
                matrix[r][c] = 0;
            }
        }
    }
    return matrix;
}

// Бүркүттүн айланасын тазалап жана айланасына атайын чеп куруу
function buildEagleFortress(eagle, isLeft) {
    let ec = Math.floor(eagle.x / BLOCK_SIZE);
    let er = Math.floor(eagle.y / BLOCK_SIZE);

    // Алгач мейкиндикти бошотобуз
    for (let r = er - 4; r <= er + 4; r++) {
        for (let c = isLeft ? 0 : ec - 4; c < (isLeft ? ec + 5 : MAP_COLS); c++) {
            if (r > 0 && r < MAP_ROWS - 1 && c > 0 && c < MAP_COLS - 1) {
                mapData[r][c] = 0;
            }
        }
    }

    // Бүркүттү курчаган тик бурчтуу коргоочу кыш чептер
    let startC = isLeft ? ec + 2 : ec - 3;
    for (let r = er - 2; r <= er + 2; r++) {
        if (r >= 0 && r < MAP_ROWS) {
            mapData[r][startC] = 1; // Негизги алдыңкы чеп дубалы
        }
    }
    mapData[er - 2][isLeft ? ec + 1 : ec - 2] = 1;
    mapData[er + 2][isLeft ? ec + 1 : ec - 2] = 1;
}

function initGame() {
    mapData = buildWorld();
    buildEagleFortress(blueEagle, true);
    buildEagleFortress(redEagle, false);

    // Локалдык оюнчу (Көк Танк)
    players[localPlayerId] = {
        id: localPlayerId,
        x: 220,
        y: WORLD_HEIGHT / 2,
        angle: 0,
        clan: "КӨК КЛАН",
        hp: 150, maxHp: 150,
        damage: 30, speed: 4.5,
        stats: { hpLevel: 1, speedLevel: 1, dmgLevel: 1 },
        lastShot: 0
    };

    // Каршылаш Бот (Кызыл Танк)
    let botId = "enemy_bot";
    players[botId] = {
        id: botId,
        x: WORLD_WIDTH - 220,
        y: WORLD_HEIGHT / 2 + 60,
        angle: 180,
        clan: "КЫЗЫЛ КЛАН",
        hp: 150, maxHp: 150,
        damage: 30, speed: 4.2,
        stats: { hpLevel: 1, speedLevel: 1, dmgLevel: 1 },
        lastShot: 0
    };
}

initGame();

// =========================================================================
// 3. БАШКАРУУ СИСТЕМАСЫ
// =========================================================================
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

const touchStates = { Up: false, Down: false, Left: false, Right: false };
setupMobileListeners('touch-up', 'Up');
setupMobileListeners('touch-down', 'Down');
setupMobileListeners('touch-left', 'Left');
setupMobileListeners('touch-right', 'Right');

let fireBtn = document.getElementById('fire-button');
if(fireBtn) {
    fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); triggerShot(); });
}

function setupMobileListeners(id, dir) {
    let el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart', (e) => { e.preventDefault(); touchStates[dir] = true; });
    el.addEventListener('touchend', (e) => { e.preventDefault(); touchStates[dir] = false; });
}

function updateMovement() {
    let p = players[localPlayerId];
    if (!p || p.hp <= 0) return;

    let nextX = p.x; let nextY = p.y;
    let isMoving = false;

    if (keys['KeyW'] || keys['ArrowUp'] || touchStates.Up) { nextY -= p.speed; p.angle = 270; isMoving = true; }
    else if (keys['KeyS'] || keys['ArrowDown'] || touchStates.Down) { nextY += p.speed; p.angle = 90; isMoving = true; }
    else if (keys['KeyA'] || keys['ArrowLeft'] || touchStates.Left) { nextX -= p.speed; p.angle = 180; isMoving = true; }
    else if (keys['KeyD'] || keys['ArrowRight'] || touchStates.Right) { nextX += p.speed; p.angle = 0; isMoving = true; }

    if (isMoving && !checkCollision(nextX, nextY)) {
        p.x = nextX; p.y = nextY;
    }

    if (keys['Space']) triggerShot();

    // Жөнөкөй Бот жасалма интеллекти
    updateBotAI();
}

function triggerShot() {
    let p = players[localPlayerId];
    if (!p || p.hp <= 0) return;
    let now = Date.now();
    if (now - p.lastShot > 300) {
        shootBullet(p);
        p.lastShot = now;
    }
}

function checkCollision(x, y) {
    let size = BLOCK_SIZE / 2 - 2;
    let points = [{x: x-size, y: y-size}, {x: x+size, y: y-size}, {x: x-size, y: y+size}, {x: x+size, y: y+size}];
    for (let pt of points) {
        let c = Math.floor(pt.x / BLOCK_SIZE);
        let r = Math.floor(pt.y / BLOCK_SIZE);
        if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) return true;
        if (mapData[r][c] > 0) return true;
    }
    // Бүркүттөр менен кагылышуу
    if(Math.hypot(x - blueEagle.x, y - blueEagle.y) < 35) return true;
    if(Math.hypot(x - redEagle.x, y - redEagle.y) < 35) return true;
    return false;
}

function updateBotAI() {
    let bot = players["enemy_bot"];
    if (!bot || bot.hp <= 0) return;
    
    // Бот мезгил-мезгили менен көк базага карай жылып, ок атат
    let target = blueEagle;
    let diffX = target.x - bot.x;
    let diffY = target.y - bot.y;
    
    if (Math.abs(diffX) > Math.abs(diffY)) {
        bot.angle = diffX > 0 ? 0 : 180;
        let step = diffX > 0 ? bot.speed : -bot.speed;
        if (!checkCollision(bot.x + step, bot.y)) bot.x += step;
    } else {
        bot.angle = diffY > 0 ? 90 : 270;
        let step = diffY > 0 ? bot.speed : -bot.speed;
        if (!checkCollision(bot.x, bot.y + step)) bot.y += step;
    }

    if (Math.random() < 0.04) {
        shootBullet(bot);
    }
}

// =========================================================================
// 4. ОКТОР, ЭФФЕКТТЕР ЖАНА КАГЫЛЫШУУ
// =========================================================================
function shootBullet(owner) {
    let rad = (owner.angle * Math.PI) / 180;
    bullets.push({
        ownerId: owner.id,
        clan: owner.clan,
        damage: owner.damage,
        x: owner.x + Math.cos(rad) * 24,
        y: owner.y + Math.sin(rad) * 24,
        vx: Math.cos(rad) * 10,
        vy: Math.sin(rad) * 10,
        active: true
    });
}

function addExplosion(x, y, color, count=10) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            color: color, radius: Math.random() * 3 + 1, alpha: 1
        });
    }
}

function updatePhysics() {
    // Бөлүкчөлөр
    for (let i = particles.length - 1; i >= 0; i--) {
        let pt = particles[i];
        pt.x += pt.vx; pt.y += pt.vy; pt.alpha -= 0.05;
        if (pt.alpha <= 0) particles.splice(i, 1);
    }

    // Октордун механикасы
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy;

        if (b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT) {
            bullets.splice(i, 1); continue;
        }

        let c = Math.floor(b.x / BLOCK_SIZE);
        let r = Math.floor(b.y / BLOCK_SIZE);

        if (r >= 0 && r < MAP_ROWS && c >= 0 && c < MAP_COLS) {
            if (mapData[r][c] === 1) { // Кыш дубал кыйрады
                mapData[r][c] = 0;
                bullets.splice(i, 1);
                addExplosion(b.x, b.y, "#bd6a1a", 12);
                if (Math.random() < 0.35) {
                    crystals.push({ x: c * BLOCK_SIZE + 20, y: r * BLOCK_SIZE + 20 });
                }
                continue;
            } else if (mapData[r][c] === 2) { // Темир блокко тийгенде
                bullets.splice(i, 1);
                addExplosion(b.x, b.y, "#78909c", 6);
                continue;
            }
        }

        // Бүркүттөргө тийгенде
        if (b.clan !== "КӨК КЛАН" && Math.hypot(b.x - blueEagle.x, b.y - blueEagle.y) < 28) {
            blueEagle.hp -= b.damage; bullets.splice(i, 1);
            addExplosion(b.x, b.y, "#ff1744", 15);
            checkBattleEnd(); continue;
        }
        if (b.clan !== "КЫЗЫЛ КЛАН" && Math.hypot(b.x - redEagle.x, b.y - redEagle.y) < 28) {
            redEagle.hp -= b.damage; bullets.splice(i, 1);
            addExplosion(b.x, b.y, "#ff1744", 15);
            checkBattleEnd(); continue;
        }

        // Танкаларга тийгенде
        for (let pId in players) {
            let target = players[pId];
            if (target.hp <= 0 || b.clan === target.clan) continue;
            if (Math.hypot(b.x - target.x, b.y - target.y) < 20) {
                target.hp -= b.damage;
                bullets.splice(i, 1);
                addExplosion(b.x, b.y, "#ffeb3b", 10);
                if (target.hp <= 0) {
                    target.hp = 0;
                    addExplosion(target.x, target.y, "#ff3d00", 25);
                    // Бот өлгөндө кристалл таштайт
                    if(target.id !== localPlayerId) {
                        localCrystals += 8; // Бонус кристалл
                    }
                    setTimeout(() => { // Кайра тирилүү
                        target.hp = target.maxHp;
                        target.x = target.clan === "КӨК КЛАН" ? 220 : WORLD_WIDTH - 220;
                        target.y = WORLD_HEIGHT / 2;
                    }, 4000);
                }
                break;
            }
        }
    }

    // Кристаллдарды чогултуу
    let lp = players[localPlayerId];
    if (lp && lp.hp > 0) {
        for (let i = crystals.length - 1; i >= 0; i--) {
            if (Math.hypot(lp.x - crystals[i].x, lp.y - crystals[i].y) < 25) {
                localCrystals += 1;
                addExplosion(crystals[i].x, crystals[i].y, "#00ffff", 8);
                crystals.splice(i, 1);
            }
        }
    }
}

function checkBattleEnd() {
    if (blueEagle.hp <= 0) { blueEagle.hp = 0; finishMatch("КЫЗЫЛ КЛАН"); }
    else if (redEagle.hp <= 0) { redEagle.hp = 0; finishMatch("КӨК КЛАН"); }
}

function finishMatch(winner) {
    if(winner === "КӨК КЛАН") {
        blueEagle.level += 1; // Утканда Кландын деңгээли авто көтөрүлөт
        localCrystals += 15; // Жеңиш бонустары
    } else {
        redEagle.level += 1;
    }
    document.getElementById('win-title').innerText = `🏆 Жеңүүчү: ${winner}!`;
    document.getElementById('win-desc').innerText = `Каршылаштын Бүркүт базасы талкаланды. Клан деңгээли жогорулады!`;
    document.getElementById('win-modal').style.display = 'block';
}

function restartBattlefield() {
    document.getElementById('win-modal').style.display = 'none';
    blueEagle.hp = blueEagle.maxHp;
    redEagle.hp = redEagle.maxHp;
    bullets = []; crystals = []; particles = [];
    initGame();
}

// =========================================================================
// 5. МЕНЮ ЖАНА ЖАКШЫРТУУ ОПЕРАЦИЯЛАРЫ
// =========================================================================
function buyUpgrade(type, cost) {
    let p = players[localPlayerId];
    if (!p || localCrystals < cost) return;

    localCrystals -= cost;
    if (type === 'hp') {
        p.stats.hpLevel += 1; p.maxHp += 30; p.hp = p.maxHp;
    } else if (type === 'speed') {
        p.stats.speedLevel += 1; p.speed += 0.5;
    } else if (type === 'damage') {
        p.stats.dmgLevel += 1; p.damage += 8;
    } else if (type === 'fort') {
        // Чепти толугу менен кайра калыбына келтирип куруу
        buildEagleFortress(blueEagle, true);
        blueEagle.hp = blueEagle.maxHp;
        addExplosion(blueEagle.x, blueEagle.y, "#00ff00", 20);
    }
    addExplosion(p.x, p.y, "#f2a104", 15);
}

function updateUI() {
    let p = players[localPlayerId];
    if(!p) return;

    document.getElementById('ui-crystals').innerText = localCrystals;
    document.getElementById('player-clan-tag').innerText = `🛡️ КӨК КЛАН (Сиз) | Клан Лвл: ${blueEagle.level} | Ок Күчү: Lv.${p.stats.dmgLevel} | Ылдамдык: Lv.${p.stats.speedLevel}`;
    
    document.getElementById('upg-hp').disabled = localCrystals < 3;
    document.getElementById('upg-speed').disabled = localCrystals < 4;
    document.getElementById('upg-dmg').disabled = localCrystals < 5;
    document.getElementById('upg-fort').disabled = localCrystals < 6;
}

// =========================================================================
// 6. КАМЕРА ЖАНА КАНВАСКА СҮРӨТ ТАРТУУ
// =========================================================================
function updateCamera() {
    let p = players[localPlayerId];
    if (!p) return;
    camera.x = p.x - VIEW_WIDTH / 2;
    camera.y = p.y - VIEW_HEIGHT / 2;

    if (camera.x < 0) camera.x = 0;
    if (camera.y < 0) camera.y = 0;
    if (camera.x > WORLD_WIDTH - VIEW_WIDTH) camera.x = WORLD_WIDTH - VIEW_WIDTH;
    if (camera.y > WORLD_HEIGHT - VIEW_HEIGHT) camera.y = WORLD_HEIGHT - VIEW_HEIGHT;
}

function drawEagleBase(eagle) {
    let size = 50;
    let isBlue = eagle.clan === "КӨК КЛАН";
    
    ctx.save();
    // Базанын айланасындагы жарык нур
    ctx.shadowBlur = 15;
    ctx.shadowColor = isBlue ? "#00e5ff" : "#ff1744";

    ctx.fillStyle = isBlue ? "#0d47a1" : "#b71c1c";
    ctx.strokeStyle = isBlue ? "#00e5ff" : "#ff1744";
    ctx.lineWidth = 3;
    
    // Бүркүттүн башкы логотиби (Үч бурчтук формасында туруктуу чеп)
    ctx.beginPath();
    ctx.moveTo(eagle.x, eagle.y - size/2);
    ctx.lineTo(eagle.x + size/2, eagle.y + size/2);
    ctx.lineTo(eagle.x - size/2, eagle.y + size/2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Ысымы
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 11px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(`🦅 БҮРКҮТ [Lv.${eagle.level}]`, eagle.x, eagle.y - 35);

    // Өмүр тилкеси (HP Bar)
    ctx.fillStyle = "#21262d";
    ctx.fillRect(eagle.x - 30, eagle.y - 28, 60, 5);
    ctx.fillStyle = isBlue ? "#00e676" : "#ff5252";
    ctx.fillRect(eagle.x - 30, eagle.y - 28, (eagle.hp / eagle.maxHp) * 60, 5);
    ctx.restore();
}

function render() {
    ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Торчо ( Сетка фон )
    ctx.strokeStyle = "#161b22";
    ctx.lineWidth = 1;
    for (let x = 0; x < WORLD_WIDTH; x += BLOCK_SIZE) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_HEIGHT); ctx.stroke();
    }
    for (let y = 0; y < WORLD_HEIGHT; y += BLOCK_SIZE) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_WIDTH, y); ctx.stroke();
    }

    // Картадагы Блокторду тартуу
    for (let r = 0; r < MAP_ROWS; r++) {
        for (let c = 0; c < MAP_COLS; c++) {
            if (mapData[r][c] === 1) { // Кыш блок
                ctx.fillStyle = "#8a4f2a";
                ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                ctx.strokeStyle = "#5c341a";
                ctx.strokeRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
            } else if (mapData[r][c] === 2) { // Темир блок
                ctx.fillStyle = "#2d3748";
                ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
            }
        }
    }

    // Кристаллдар
    for (let cry of crystals) {
        ctx.fillStyle = "#00e5ff";
        ctx.shadowBlur = 10; ctx.shadowColor = "#00e5ff";
        ctx.beginPath(); ctx.arc(cry.x, cry.y, 6, 0, 2 * Math.PI); ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Бүркүт базалары
    drawEagleBase(blueEagle);
    drawEagleBase(redEagle);

    // Танкалар
    for (let id in players) {
        let t = players[id];
        if (t.hp <= 0) continue;

        ctx.save();
        ctx.translate(t.x, t.y);
        ctx.rotate((t.angle * Math.PI) / 180);
        
        // Танктын корпусу
        ctx.fillStyle = t.clan === "КӨК КЛАН" ? "#1f6feb" : "#f85149";
        ctx.fillRect(-16, -16, 32, 32);
        // Танктын огу (Дуло)
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, -3, 22, 6);
        ctx.restore();

        // Маалыматтары
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 11px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(t.id === localPlayerId ? "Сиз (Көк Танк)" : "Бот (Каршылаш)", t.x, t.y - 25);

        // HP тилкеси
        ctx.fillStyle = "#21262d";
        ctx.fillRect(t.x - 15, t.y - 20, 30, 4);
        ctx.fillStyle = "#238636";
        ctx.fillRect(t.x - 15, t.y - 20, (t.hp / t.maxHp) * 30, 4);
    }

    // Октор
    ctx.fillStyle = "#f2a104";
    for (let b of bullets) {
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, 2 * Math.PI); ctx.fill();
    }

    // Эффекттер
    for (let pt of particles) {
        ctx.save(); ctx.globalAlpha = pt.alpha; ctx.fillStyle = pt.color;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.radius, 0, 2 * Math.PI); ctx.fill();
        ctx.restore();
    }

    ctx.restore();
}

// =========================================================================
// 7. ОЮНДУН НЕГЫЗГЫ АЙЛАНЫШЫ
// =========================================================================
function gameLoop() {
    updateMovement();
    updatePhysics();
    updateCamera();
    render();
    updateUI();
    requestAnimationFrame(gameLoop);
}

// Оюнду коопсуз ишке киргизүү
gameLoop();
</script>

</body>
</html>
