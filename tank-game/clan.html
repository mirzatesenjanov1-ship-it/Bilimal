<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>БилимАл Танк - Бүркүттөр Кагылышуусу & Клан Борбору</title>
    
    <style>
        /* =========================================================================
           ОБЩИЙ СТИЛЬ ЖАНА ТЕМА (Military Modern Dark UI)
           ========================================================================= */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f2a104; }

        body {
            margin: 0;
            padding: 0;
            background-color: #090c10;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Башкы Навигация Башкаруусу */
        #main-nav {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px 10px 0 10px;
            z-index: 20;
        }
        .nav-tab-btn {
            background: linear-gradient(180deg, #21262d 0%, #161b22 100%);
            border: 2px solid #30363d;
            color: #8b949e;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-tab-btn.active {
            border-color: #f2a104;
            color: #fff;
            background: linear-gradient(180deg, #f2a104 0%, #cc7a00 100%);
            box-shadow: 0 0 15px rgba(242, 161, 4, 0.4);
        }

        /* Экран катмарлары */
        .app-view {
            display: none;
            width: 100%;
            max-width: 1200px;
            animation: fadeIn 0.4s ease-in-out;
        }
        .app-view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================================================
           ОЮН ТАРАПТЫН UI СТИЛДЕРИ
           ========================================================================= */
        #ui-top-panel {
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            border: 3px solid #30363d;
            border-top: none;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            margin-bottom: 15px;
        }
        .info-group { display: flex; flex-direction: column; gap: 4px; }
        .clan-badge { font-size: 16px; font-weight: 800; letter-spacing: 0.5px; color: #58a6ff; }
        .crystal-box {
            color: #00e5ff; font-weight: bold; font-size: 15px;
            background: rgba(0, 229, 255, 0.1); padding: 5px 14px;
            border-radius: 20px; border: 1px solid rgba(0, 229, 255, 0.3);
            display: inline-flex; align-items: center;
        }
        #upgrade-menu { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-upgrade {
            background: linear-gradient(135deg, #21262d 0%, #161b22 100%);
            color: #c9d1d9; border: 1px solid #30363d; padding: 8px 12px;
            font-size: 11px; font-weight: bold; border-radius: 6px;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .btn-upgrade:not(:disabled):hover {
            border-color: #f2a104; color: #fff;
            background: linear-gradient(135deg, #f2a104 0%, #ff6d00 100%);
            box-shadow: 0 0 10px rgba(242,161,4,0.4);
        }
        .btn-upgrade:disabled { opacity: 0.3; cursor: not-allowed; }

        #game-wrapper {
            position: relative; width: 100%; height: 600px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border-radius: 10px; overflow: hidden;
        }
        canvas { display: block; background-color: #030508; border: 4px solid #30363d; width: 100%; height: 100%; }

        /* =========================================================================
           КЛАН БОРБОРУНУН UI СТИЛДЕРИ (clan.html)
           ========================================================================= */
        #clan-container {
            position: relative; background: #0d1117;
            border: 3px solid #30363d; border-radius: 12px;
            margin-top: 15px; min-height: 700px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* Анимацияланган Аскердик Фон */
        .animated-bg {
            position: absolute; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 1; opacity: 0.04;
            background-image: radial-gradient(#f2a104 1px, transparent 0);
            background-size: 24px 24px;
        }
        .searchlight {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(242,161,4,0.15) 0%, transparent 70%);
            z-index: 1; pointer-events: none;
            animation: sweep 12px infinite alternate ease-in-out;
        }
        @keyframes sweep {
            0% { transform: translate(-10%, 10%); }
            100% { transform: translate(80%, 40%); }
        }

        /* Клан Хедери */
        .clan-header {
            position: relative; z-index: 2; padding: 20px;
            background: linear-gradient(90deg, #161b22 0%, #0d1117 100%);
            border-bottom: 3px solid #30363d;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .clan-main-title {
            font-size: 28px; font-weight: 900; letter-spacing: 2px;
            color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 10px;
        }
        .clan-main-title span { color: #f2a104; }
        
        .player-clan-card {
            display: flex; align-items: center; gap: 12px;
            background: rgba(33, 38, 45, 0.8); padding: 8px 16px;
            border-radius: 8px; border: 1px solid #30363d;
        }
        .p-avatar { width: 42px; height: 42px; background: #f2a104; border-radius: 50%; border: 2px solid #fff; }
        .p-details { display: flex; flex-direction: column; font-size: 12px; }
        .p-name { font-weight: bold; color: #fff; font-size: 14px; }
        .p-rank { color: #58a6ff; font-weight: bold; }

        /* Ички Структура: Сол меню жана Мазмун */
        .clan-body { position: relative; z-index: 2; display: flex; flex: 1; min-height: 600px; }
        
        .clan-sidebar {
            width: 220px; background: #161b22; border-right: 3px solid #30363d;
            display: flex; flex-direction: column; padding: 15px 0; gap: 4px;
        }
        .menu-item {
            background: transparent; border: none; color: #c9d1d9;
            padding: 14px 24px; text-align: left; font-size: 14px; font-weight: bold;
            cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 12px;
            border-left: 4px solid transparent;
        }
        .menu-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .menu-item.active {
            background: rgba(242, 161, 4, 0.1); color: #f2a104;
            border-left-color: #f2a104;
        }

        .clan-content-viewport { flex: 1; padding: 25px; background: rgba(13, 17, 23, 0.85); overflow-y: auto; }

        /* Формалар жана Баскычтар UI */
        .military-btn {
            background: linear-gradient(180deg, #238636 0%, #1f6e30 100%);
            color: white; border: 1px solid #2ea44f; padding: 10px 20px;
            font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .military-btn:hover:not(:disabled) { filter: brightness(1.2); }
        .military-btn.danger { background: linear-gradient(180deg, #da3633 0%, #a61c1a 100%); border-color: #f85149; }
        .military-input {
            background: #0d1117; border: 1px solid #30363d; color: white;
            padding: 10px 14px; border-radius: 6px; font-size: 14px;
        }
        .military-input:focus { border-color: #f2a104; outline: none; }

        /* Таблица стилдери */
        .military-table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 15px; }
        .military-table th { background: #161b22; padding: 12px; border-bottom: 2px solid #30363d; color: #8b949e; font-size: 13px; }
        .military-table td { padding: 12px; border-bottom: 1px solid #21262d; font-size: 14px; }
        .military-table tr:hover { background: rgba(255,255,255,0.02); }

        /* Прогресс бар стили */
        .p-bar-container { background: #21262d; border-radius: 4px; overflow: hidden; height: 16px; position: relative; margin: 10px 0; }
        .p-bar-fill { background: linear-gradient(90deg, #f2a104, #ff6d00); height: 100%; width: 0; transition: width 0.5s ease; }

        /* Чат Багыты */
        .chat-box { height: 400px; border: 1px solid #30363d; background: #090c10; border-radius: 8px; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-msg { background: #161b22; padding: 10px; border-radius: 8px; border-left: 3px solid #f2a104; max-width: 85%; }
        .chat-msg.mail { border-left-color: #da3633; background: rgba(218,54,51,0.05); }
        .msg-header { display: flex; gap: 10px; font-size: 11px; color: #8b949e; margin-bottom: 4px; }
        .msg-author { font-weight: bold; color: #58a6ff; }
        .chat-input-area { padding: 10px; border-top: 1px solid #30363d; display: flex; gap: 10px; }

        /* Согуш Картасы */
        .war-map-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .enemy-base-card {
            background: #161b22; border: 2px solid #30363d; border-radius: 8px; padding: 15px;
            text-align: center; position: relative; transition: 0.3s;
        }
        .enemy-base-card:hover { border-color: #da3633; transform: translateY(-3px); }

        /* Реалдуу убакыттагы Билдирмелер (Notification Center) */
        #notification-toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 8px; }
        .toast-alert { background: #161b22; border: 1px solid #f2a104; color: white; padding: 12px 20px; border-radius: 6px; font-size: 13px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Мобилдик Башкаруу Баскычтары */
        #mobile-ui { display: none; position: fixed; bottom: 25px; left: 0; width: 100%; padding: 0 40px; justify-content: space-between; align-items: center; pointer-events: none; z-index: 100; }
        .joystick-container { width: 150px; height: 150px; background: rgba(22, 27, 34, 0.6); border: 3px solid rgba(242, 161, 4, 0.4); border-radius: 50%; position: relative; pointer-events: auto; display: grid; grid-template-areas: ". up ." "left . right" ". down ."; }
        .touch-btn { background: transparent; border: none; color: #8b949e; font-weight: bold; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        .touch-btn:active { color: #f2a104; background: rgba(242,161,4,0.15); }
        .btn-up { grid-area: up; border-radius: 50% 50% 0 0; }
        .btn-down { grid-area: down; border-radius: 0 0 50% 50%; }
        .btn-left { grid-area: left; border-radius: 50% 0 0 50%; }
        .btn-right { grid-area: right; border-radius: 0 50% 50% 0; }
        #fire-button { width: 90px; height: 90px; background: linear-gradient(135deg, #da3633 0%, #891614 100%); border: 3px solid rgba(255, 255, 255, 0.2); color: white; font-weight: bold; font-size: 15px; border-radius: 50%; box-shadow: 0 8px 20px rgba(218,54,51,0.4); pointer-events: auto; cursor: pointer; }
        #fire-button:active { transform: scale(0.9); }

        /* Модал терезелер */
        #win-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161b22; border: 3px solid #f2a104; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 0 0 40px rgba(242, 161, 4, 0.4); z-index: 1000; width: 90%; max-width: 420px; }
        #win-modal h2 { margin: 0 0 8px 0; color: #f2a104; font-size: 24px; }
        #win-modal p { margin: 0 0 20px 0; font-size: 15px; color: #c9d1d9; }
        #win-modal button { background: #f2a104; color: #0d1117; border: none; padding: 10px 24px; font-weight: bold; font-size: 14px; border-radius: 6px; cursor: pointer; }
        
        @media(max-width: 1024px) {
            .clan-body { flex-direction: column; }
            .clan-sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; overflow-x: auto; }
            .menu-item { padding: 10px 15px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <nav id="main-nav">
        <button class="nav-tab-btn active" onclick="switchAppView('game-view')">⚔️ Салгылашуу Талаасы</button>
        <button class="nav-tab-btn" onclick="switchAppView('clan-view')">🛡️ Клан Борбору</button>
    </nav>

    <main id="game-view" class="app-view active">
        <div id="ui-top-panel">
            <div class="info-group">
                <div id="player-clan-tag" class="clan-badge">Жүктөлүүдө...</div>
                <div>
                    <span class="crystal-box">💎 Кристалл: <span id="ui-crystals">25</span></span>
                </div>
            </div>
            
            <div id="upgrade-menu">
                <button class="btn-upgrade" id="upg-hp" onclick="buyUpgrade('hp', 3)">
                    <span>🛡️ Макс HP+</span>
                    <span style="color:#f2a104;">3 💎</span>
                </button>
                <button class="btn-upgrade" id="upg-speed" onclick="buyUpgrade('speed', 4)">
                    <span>⚡ Ылдамдык+</span>
                    <span style="color:#f2a104;">4 💎</span>
                </button>
                <button class="btn-upgrade" id="upg-dmg" onclick="buyUpgrade('damage', 5)">
                    <span>💥 Ок Күчү+</span>
                    <span style="color:#f2a104;">5 💎</span>
                </button>
                <button class="btn-upgrade" id="upg-fort" onclick="buyUpgrade('fort', 6)">
                    <span>🧱 Чепти оңдоо</span>
                    <span style="color:#f2a104;">6 💎</span>
                </button>
            </div>
        </div>

        <div id="game-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>
    </main>

    <main id="clan-view" class="app-view">
        <div id="clan-container">
            <div class="animated-bg"></div>
            <div class="searchlight"></div>

            <header class="clan-header">
                <div class="clan-main-title">🛡️ CLAN <span>CENTER</span></div>
                
                <div class="player-clan-card">
                    <div class="p-avatar" style="background: #1f6feb;"></div>
                    <div class="p-details">
                        <span class="p-name" id="user-nick">SteelCommander</span>
                        <span>Деңгээл: <b style="color: #f2a104;">45</b> (XP: 14,250)</span>
                        <span class="p-rank">Ролу: Leader</span>
                    </div>
                </div>
            </header>

            <div class="clan-body">
                <aside class="clan-sidebar">
                    <button class="menu-item active" onclick="switchClanTab(this, 'overview')">📊 Overview</button>
                    <button class="menu-item" onclick="switchClanTab(this, 'members')">👥 Members</button>
                    <button class="menu-item" onclick="switchClanTab(this, 'war')">⚔️ War</button>
                    <button class="menu-item" onclick="switchClanTab(this, 'chat')">💬 Chat</button>
                    <button class="menu-item" onclick="switchClanTab(this, 'events')">📅 Events</button>
                    <button class="menu-item" onclick="switchClanTab(this, 'donations')">💎 Donations</button>
                    <button class="menu-item" onclick="switchClanTab(this, 'shop')">🛒 Shop</button>
                    <button class="menu-item" onclick="switchClanTab(this, 'leaderboard')">🏆 Leaderboard</button>
                    <button class="menu-item" onclick="switchClanTab(this, 'settings')">⚙️ Settings</button>
                </aside>

                <section class="clan-content-viewport" id="clan-tab-content">
                    </section>
            </div>
        </div>
    </main>

    <div id="notification-toast-container"></div>

    <div id="mobile-ui">
        <div class="joystick-container">
            <button class="touch-btn btn-up" id="touch-up">▲</button>
            <button class="touch-btn btn-left" id="touch-left">◀</button>
            <button class="touch-btn btn-right" id="touch-right">▶</button>
            <button class="touch-btn btn-down" id="touch-down">▼</button>
        </div>
        <button id="fire-button">ОТ АТ</button>
    </div>

    <div id="win-modal">
        <h2 id="win-title">🏆 ЖЕҢИШ!</h2>
        <p id="win-desc">Оюн аяктады.</p>
        <button onclick="restartBattlefield()">Кийинки салгылашуу</button>
    </div>

<script>
// =========================================================================
// 1. ДЕКЛАРАЦИЯЛАР, ОЮНДУН СИСТЕМАЛЫК КОНФИГУРАЦИЯСЫ
// =========================================================================
const BLOCK_SIZE = 40; const MAP_COLS = 50; const MAP_ROWS = 30;
const WORLD_WIDTH = MAP_COLS * BLOCK_SIZE; const WORLD_HEIGHT = MAP_ROWS * BLOCK_SIZE;
const VIEW_WIDTH = 1100; const VIEW_HEIGHT = 600;

const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
canvas.width = VIEW_WIDTH; canvas.height = VIEW_HEIGHT;

let camera = { x: 0, y: 0 };
let localPlayerId = "player_me";
let players = {}; let bullets = []; let particles = []; let crystals = []; let mapData = [];
let localCrystals = 25;

// Бүркүт базалары
let blueEagle = { x: 100, y: WORLD_HEIGHT / 2, hp: 600, maxHp: 600, clan: "КӨК КЛАН", level: 8 };
let redEagle = { x: WORLD_WIDTH - 100, y: WORLD_HEIGHT / 2, hp: 600, maxHp: 600, clan: "КЫЗЫЛ КЛАН", level: 7 };

// Имитациялык Клан Маалымат Банкы (State)
let clanState = {
    name: "Steel Wolves", tag: "#SW1123", level: 8, xp: 76500, maxRank: 100,
    wins: 342, losses: 112, totalBattles: 454, warRating: 2850, worldRank: 42, countryRank: 1,
    description: "Бул БилимАл танк оюнундагы эң күчтүү жана уюшкан расмий аскердик клан. **Эрежелер катаал:** Кландык согуштарга катышуу милдеттүү!",
    joinType: "Invite Only", minLevel: 20, reqTrophies: 1500, language: "Kyrgyz", country: "Kyrgyzstan"
};

// Мүчөлөрдүн тизмеси
let clanMembers = [
    { name: "SteelCommander", role: "Leader", lvl: 45, tLvl: 10, xp: 99400, status: "🟢 Online", contrib: 5200, coins: 45000, stars: 84, mvp: 12 },
    { name: "TankDestroyer", role: "Co-Leader", lvl: 42, tLvl: 9, xp: 81200, status: "🟢 Online", contrib: 4100, coins: 32000, stars: 71, mvp: 9 },
    { name: "Alatoo_Warrior", role: "Commander", lvl: 38, tLvl: 8, xp: 62000, status: "🟡 Away", contrib: 3500, coins: 12000, stars: 55, mvp: 4 },
    { name: "Bishkek_Man", role: "Veteran", lvl: 35, tLvl: 8, xp: 54000, status: "⚫ Offline", contrib: 2800, coins: 19000, stars: 42, mvp: 3 },
    { name: "Kyrgyz_Eagle", role: "Elite", lvl: 31, tLvl: 7, xp: 41000, status: "🟢 Online", contrib: 1900, coins: 8500, stars: 30, mvp: 2 },
    { name: "Recruit_01", role: "Recruit", lvl: 22, tLvl: 5, xp: 18000, status: "⚫ Offline", contrib: 400, coins: 2000, stars: 6, mvp: 0 }
];

let joinRequests = [ { name: "NewbieTanker", lvl: 25, trophies: 1600 } ];
let chatLog = [
    { sender: "TankDestroyer", role: "Co-Leader", text: "Эртеңки согушка баары даярбы?", time: "13:42" },
    { sender: "Kyrgyz_Eagle", role: "Elite", text: "Ооба, мен окторду жана куралды максималдуу деңгээлге көтөрдүм! 🔥", time: "13:45" }
];
let treasuryLogs = [
    { user: "SteelCommander", action: "Салды", amount: "500 💎 Кристалл" },
    { user: "TankDestroyer", action: "Салды", amount: "10,000 🪙 Монета" }
];

// Мобилдик түзмөктөрдү аныктоо
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 1025;
if (isMobile) { document.getElementById('mobile-ui').style.display = 'flex'; }

// =========================================================================
// 2. SPA БАШКАРУУ СИСТЕМА СӨЗДҮГҮ ЖАНА АЛМАШТЫРУУЛАР
// =========================================================================
function switchAppView(viewId) {
    document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(viewId).classList.add('active');
    event.currentTarget.classList.add('active');
}

// Кландык Табдарды AJAX стилинде алмаштыруу функциясы
function switchClanTab(btnElement, tabName) {
    document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
    btnElement.classList.add('active');
    
    const viewport = document.getElementById('clan-tab-content');
    viewport.innerHTML = `<div style="color:#8b949e; font-size:14px;">Сурам аткарылууда (AJAX)...</div>`;
    
    // Имитациялык сервердик кечигүү (SPA эффекти)
    setTimeout(() => {
        viewport.innerHTML = renderClanTabContent(tabName);
    }, 150);
}

// =========================================================================
// 3. КЛАНДЫК БАРАКТАРДЫН HTML ШАБЛОНДОРУН ГЕНЕРАЦИЯЛОО (RENDERERS)
// =========================================================================
function renderClanTabContent(tab) {

// 4. КЛАНДЫК ИНТЕРФЕЙСТИ КУБАТТАНДЫРУУЧУ ФУНКЦИЯЛАР (АКЦИЯЛАР)
// =========================================================================
function triggerToast(message) {
    const container = document.getElementById('notification-toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast-alert';
    toast.innerText = `🔔 ${message}`;
    container.appendChild(toast);
    setTimeout(() => { toast.remove(); }, 3500);
}

function sendChatMessage() {
    const input = document.getElementById('chat-input-field');
    if(!input.value.trim()) return;
    chatLog.push({ sender: "SteelCommander", role: "Leader", text: input.value, time: "Учурда" });
    input.value = "";
    document.getElementById('clan-tab-content').innerHTML = renderClanTabContent('chat');
    // Скроллду автоматтык түрдө төмөн түшүрүү
    let scr = document.getElementById('chat-scroller');
    if(scr) scr.scrollTop = scr.scrollHeight;
}

function sendClanMail() {
    const input = document.getElementById('clan-mail-input');
    if(!input.value.trim()) return;
    chatLog.push({ sender: "SteelCommander (МАЙЛ)", role: "Leader", text: `📢 БАРДЫККА БИЛДИРҮҮ: ${input.value}`, time: "Учурда" });
    triggerToast("Кландык маанилүү почта жөнөтүлдү!");
    input.value = "";
    document.getElementById('clan-tab-content').innerHTML = renderClanTabContent('chat');
}

function kickMember(name) {
    clanMembers = clanMembers.filter(m => m.name !== name);
    triggerToast(`${name} кландан ийгиликтүү чыгарылды.`);
    document.getElementById('clan-tab-content').innerHTML = renderClanTabContent('members');
}

function acceptRequest() {
    if(joinRequests.length > 0) {
        let req = joinRequests.pop();
        clanMembers.push({ name: req.name, role: "Recruit", lvl: req.lvl, tLvl: 5, xp: 12000, status: "🟢 Online", contrib: 0, coins: 500, stars: 0, mvp: 0 });
        triggerToast(`${req.name} кланга кошулду.`);
        document.getElementById('clan-tab-content').innerHTML = renderClanTabContent('members');
    }
}

function rejectRequest() {
    if(joinRequests.length > 0) {
        let req = joinRequests.pop();
        triggerToast(`${req.name} сурамы четке кагылды.`);
        document.getElementById('clan-tab-content').innerHTML = renderClanTabContent('members');
    }
}

function donateToClan(resource) {
    treasuryLogs.unshift({ user: "SteelCommander", action: "Салды", amount: resource });
    triggerToast(`Казынага ${resource} ийгиликтүү кошулду. Салым жогорулады!`);
    document.getElementById('clan-tab-content').innerHTML = renderClanTabContent('donations');
}

function saveClanSettings() {
    clanState.name = document.getElementById('set-clan-name').value;
    clanState.joinType = document.getElementById('set-join-type').value;
    clanState.minLevel = parseInt(document.getElementById('set-min-lvl').value);
    triggerToast("Клан орнотуулары серверде жаңыртылды!");
}

function disbandClan() {
    if(confirm("Чын эле кланды өчүргүңүз келеби? Бул аракетти артка кайтаруу мүмкүн эмес!")) {
        triggerToast("Клан ийгиликтүү таркатылды.");
        location.reload();
    }
}

function simulateAutocomplete() {
    let text = document.getElementById('search-member-input').value;
    let box = document.getElementById('autocomplete-box');
    if(text.length > 1) {
        box.innerText = `Сунушталат: ${text}__Pro, ${text}_Sniper, Mega_${text}`;
    } else {
        box.innerText = "";
    }
}

function sendClanInvite() {
    let inp = document.getElementById('search-member-input');
    if(inp && inp.value) {
        triggerToast(`${inp.value} оюнчусуна кошулуу чакыруусу кетти.`);
        inp.value = "";
    }
}

// 5. КАНВАС ОЮНДУН МЕХАНИКАСЫ (BATTLEFIELD CORE ENGINE)
// =========================================================================
function buildWorld() {
    let matrix = [];
    for (let r = 0; r < MAP_ROWS; r++) {
        matrix[r] = [];
        for (let c = 0; c < MAP_COLS; c++) {
            if (r === 0 || r === MAP_ROWS - 1 || c === 0 || c === MAP_COLS - 1) {
                matrix[r][c] = 2; 
            } else if (Math.random() < 0.12 && (c > 7 && c < MAP_COLS - 8)) {
                matrix[r][c] = 1; 
            } else {
                matrix[r][c] = 0;
            }
        }
    }
    return matrix;
}

function buildEagleFortress(eagle, isLeft) {
    let ec = Math.floor(eagle.x / BLOCK_SIZE);
    let er = Math.floor(eagle.y / BLOCK_SIZE);
    for (let r = er - 4; r <= er + 4; r++) {
        for (let c = isLeft ? 0 : ec - 4; c < (isLeft ? ec + 5 : MAP_COLS); c++) {
            if (r > 0 && r < MAP_ROWS - 1 && c > 0 && c < MAP_COLS - 1) { mapData[r][c] = 0; }
        }
    }
    let startC = isLeft ? ec + 2 : ec - 3;
    for (let r = er - 2; r <= er + 2; r++) {
        if (r >= 0 && r < MAP_ROWS) { mapData[r][startC] = 1; }
    }
    mapData[er - 2][isLeft ? ec + 1 : ec - 2] = 1;
    mapData[er + 2][isLeft ? ec + 1 : ec - 2] = 1;
}

function initGame() {
    mapData = buildWorld();
    buildEagleFortress(blueEagle, true);
    buildEagleFortress(redEagle, false);

    players[localPlayerId] = {
        id: localPlayerId, x: 220, y: WORLD_HEIGHT / 2, angle: 0, clan: "КӨК КЛАН",
        hp: 150, maxHp: 150, damage: 30, speed: 4.5,
        stats: { hpLevel: 1, speedLevel: 1, dmgLevel: 1 }, lastShot: 0
    };

    players["enemy_bot"] = {
        id: "enemy_bot", x: WORLD_WIDTH - 220, y: WORLD_HEIGHT / 2 + 60, angle: 180, clan: "КЫЗЫЛ КЛАН",
        hp: 150, maxHp: 150, damage: 30, speed: 4.2, stats: { hpLevel: 1, speedLevel: 1, dmgLevel: 1 }, lastShot: 0
    };
}
initGame();

// Клавиатура башкаруусу
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

const touchStates = { Up: false, Down: false, Left: false, Right: false };
setupMobileListeners('touch-up', 'Up');
setupMobileListeners('touch-down', 'Down');
setupMobileListeners('touch-left', 'Left');
setupMobileListeners('touch-right', 'Right');

let fireBtn = document.getElementById('fire-button');
if(fireBtn) { fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); triggerShot(); }); }

function setupMobileListeners(id, dir) {
    let el = document.getElementById(id); if (!el) return;
    el.addEventListener('touchstart', (e) => { e.preventDefault(); touchStates[dir] = true; });
    el.addEventListener('touchend', (e) => { e.preventDefault(); touchStates[dir] = false; });
}

function updateMovement() {
    let p = players[localPlayerId]; if (!p || p.hp <= 0) return;
    let nextX = p.x; let nextY = p.y; let isMoving = false;

    if (keys['KeyW'] || keys['ArrowUp'] || touchStates.Up) { nextY -= p.speed; p.angle = 270; isMoving = true; }
    else if (keys['KeyS'] || keys['ArrowDown'] || touchStates.Down) { nextY += p.speed; p.angle = 90; isMoving = true; }
    else if (keys['KeyA'] || keys['ArrowLeft'] || touchStates.Left) { nextX -= p.speed; p.angle = 180; isMoving = true; }
    else if (keys['KeyD'] || keys['ArrowRight'] || touchStates.Right) { nextX += p.speed; p.angle = 0; isMoving = true; }

    if (isMoving && !checkCollision(nextX, nextY)) { p.x = nextX; p.y = nextY; }
    if (keys['Space']) triggerShot();
    updateBotAI();
}

function triggerShot() {
    let p = players[localPlayerId]; if (!p || p.hp <= 0) return;
    let now = Date.now();
    if (now - p.lastShot > 300) { shootBullet(p); p.lastShot = now; }
}

function checkCollision(x, y) {
    let size = BLOCK_SIZE / 2 - 2;
    let points = [{x: x-size, y: y-size}, {x: x+size, y: y-size}, {x: x-size, y: y+size}, {x: x+size, y: y+size}];
    for (let pt of points) {
        let c = Math.floor(pt.x / BLOCK_SIZE); let r = Math.floor(pt.y / BLOCK_SIZE);
        if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) return true;
        if (mapData[r][c] > 0) return true;
    }
    if(Math.hypot(x - blueEagle.x, y - blueEagle.y) < 35) return true;
    if(Math.hypot(x - redEagle.x, y - redEagle.y) < 35) return true;
    return false;
}

function updateBotAI() {
    let bot = players["enemy_bot"]; if (!bot || bot.hp <= 0) return;
    let target = blueEagle; let diffX = target.x - bot.x; let diffY = target.y - bot.y;
    
    if (Math.abs(diffX) > Math.abs(diffY)) {
        bot.angle = diffX > 0 ? 0 : 180; let step = diffX > 0 ? bot.speed : -bot.speed;
        if (!checkCollision(bot.x + step, bot.y)) bot.x += step;
    } else {
        bot.angle = diffY > 0 ? 90 : 270; let step = diffY > 0 ? bot.speed : -bot.speed;
        if (!checkCollision(bot.x, bot.y + step)) bot.y += step;
    }
    if (Math.random() < 0.03) { shootBullet(bot); }
}

function shootBullet(owner) {
    let rad = (owner.angle * Math.PI) / 180;
    bullets.push({
        ownerId: owner.id, clan: owner.clan, damage: owner.damage,
        x: owner.x + Math.cos(rad) * 24, y: owner.y + Math.sin(rad) * 24,
        vx: Math.cos(rad) * 9, vy: Math.sin(rad) * 9
    });
}

function addExplosion(x, y, color, count=10) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5,
            color: color, radius: Math.random() * 3 + 1, alpha: 1
        });
    }
}

function updatePhysics() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let pt = particles[i]; pt.x += pt.vx; pt.y += pt.vy; pt.alpha -= 0.04;
        if (pt.alpha <= 0) particles.splice(i, 1);
    }

    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i]; b.x += b.vx; b.y += b.vy;
        if (b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT) { bullets.splice(i, 1); continue; }

        let c = Math.floor(b.x / BLOCK_SIZE); let r = Math.floor(b.y / BLOCK_SIZE);
        if (r >= 0 && r < MAP_ROWS && c >= 0 && c < MAP_COLS) {
            if (mapData[r][c] === 1) {
                mapData[r][c] = 0; bullets.splice(i, 1); addExplosion(b.x, b.y, "#bd6a1a", 12);
                if (Math.random() < 0.4) crystals.push({ x: c * BLOCK_SIZE + 20, y: r * BLOCK_SIZE + 20 });
                continue;
            } else if (mapData[r][c] === 2) { bullets.splice(i, 1); addExplosion(b.x, b.y, "#78909c", 6); continue; }
        }

        if (b.clan !== "КӨК КЛАН" && Math.hypot(b.x - blueEagle.x, b.y - blueEagle.y) < 28) {
            blueEagle.hp -= b.damage; bullets.splice(i, 1); addExplosion(b.x, b.y, "#ff1744", 15); checkBattleEnd(); continue;
        }
        if (b.clan !== "КЫЗЫЛ КЛАН" && Math.hypot(b.x - redEagle.x, b.y - redEagle.y) < 28) {
            redEagle.hp -= b.damage; bullets.splice(i, 1); addExplosion(b.x, b.y, "#ff1744", 15); checkBattleEnd(); continue;
        }

        for (let pId in players) {
            let target = players[pId]; if (target.hp <= 0 || b.clan === target.clan) continue;
            if (Math.hypot(b.x - target.x, b.y - target.y) < 20) {
                target.hp -= b.damage; bullets.splice(i, 1); addExplosion(b.x, b.y, "#ffeb3b", 10);
                if (target.hp <= 0) {
                    target.hp = 0; addExplosion(target.x, target.y, "#ff3d00", 25);
                    if(target.id !== localPlayerId) { localCrystals += 8; triggerToast("Бот талкаланды! +8 💎"); }
                    setTimeout(() => {
                        target.hp = target.maxHp;
                        target.x = target.clan === "КӨК КЛАН" ? 220 : WORLD_WIDTH - 220; target.y = WORLD_HEIGHT / 2;
                    }, 4000);
                }
                break;
            }
        }
    }

    let lp = players[localPlayerId];
    if (lp && lp.hp > 0) {
        for (let i = crystals.length - 1; i >= 0; i--) {
            if (Math.hypot(lp.x - crystals[i].x, lp.y - crystals[i].y) < 25) {
                localCrystals += 1; addExplosion(crystals[i].x, crystals[i].y, "#00ffff", 8); crystals.splice(i, 1);
            }
        }
    }
}

function checkBattleEnd() {
    if (blueEagle.hp <= 0) { blueEagle.hp = 0; finishMatch("КЫЗЫЛ КЛАН"); }
    else if (redEagle.hp <= 0) { redEagle.hp = 0; finishMatch("КӨК КЛАН"); }
}

function finishMatch(winner) {
    if(winner === "КӨК КЛАН") { localCrystals += 20; clanState.xp += 1500; clanState.wins += 1; } 
    else { clanState.losses += 1; }
    document.getElementById('win-title').innerText = `🏆 Жеңүүчү: ${winner}!`;
    document.getElementById('win-desc').innerText = `Салгылашуу аяктады. Кландын жалпы тажрыйбасы (XP) жогорулады!`;
    document.getElementById('win-modal').style.display = 'block';
}

function restartBattlefield() {
    document.getElementById('win-modal').style.display = 'none';
    blueEagle.hp = blueEagle.maxHp; redEagle.hp = redEagle.maxHp;
    bullets = []; crystals = []; particles = []; initGame();
}

function buyUpgrade(type, cost) {
    let p = players[localPlayerId]; if (!p || localCrystals < cost) return;
    localCrystals -= cost;
    if (type === 'hp') { p.stats.hpLevel += 1; p.maxHp += 30; p.hp = p.maxHp; } 
    else if (type === 'speed') { p.stats.speedLevel += 1; p.speed += 0.4; } 
    else if (type === 'damage') { p.stats.dmgLevel += 1; p.damage += 10; } 
    else if (type === 'fort') { buildEagleFortress(blueEagle, true); blueEagle.hp = blueEagle.maxHp; }
    addExplosion(p.x, p.y, "#f2a104", 15);
}

function updateUI() {
    let p = players[localPlayerId]; if(!p) return;
    document.getElementById('ui-crystals').innerText = localCrystals;
    document.getElementById('player-clan-tag').innerText = `🛡️ КӨК КЛАН | Ок кубаты: Lv.${p.stats.dmgLevel} | Ылдамдык: Lv.${p.stats.speedLevel}`;
    document.getElementById('upg-hp').disabled = localCrystals < 3;
    document.getElementById('upg-speed').disabled = localCrystals < 4;
    document.getElementById('upg-dmg').disabled = localCrystals < 5;
    document.getElementById('upg-fort').disabled = localCrystals < 6;
}

function updateCamera() {
    let p = players[localPlayerId]; if (!p) return;
    camera.x = p.x - VIEW_WIDTH / 2; camera.y = p.y - VIEW_HEIGHT / 2;
    if (camera.x < 0) camera.x = 0; if (camera.y < 0) camera.y = 0;
    if (camera.x > WORLD_WIDTH - VIEW_WIDTH) camera.x = WORLD_WIDTH - VIEW_WIDTH;
    if (camera.y > WORLD_HEIGHT - VIEW_HEIGHT) camera.y = WORLD_HEIGHT - VIEW_HEIGHT;
}

function drawEagleBase(eagle) {
    let size = 50; let isBlue = eagle.clan === "КӨК КЛАН";
    ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = isBlue ? "#00e5ff" : "#ff1744";
    ctx.fillStyle = isBlue ? "#0d47a1" : "#b71c1c"; ctx.strokeStyle = isBlue ? "#00e5ff" : "#ff1744"; ctx.lineWidth = 3;
    
    ctx.beginPath(); ctx.moveTo(eagle.x, eagle.y - size/2); ctx.lineTo(eagle.x + size/2, eagle.y + size/2); ctx.lineTo(eagle.x - size/2, eagle.y + size/2); ctx.closePath();
    ctx.fill(); ctx.stroke();
    
    ctx.shadowBlur = 0; ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(`🦅 БҮРКҮТ [Lv.${eagle.level}]`, eagle.x, eagle.y - 35);
    ctx.fillStyle = "#21262d"; ctx.fillRect(eagle.x - 30, eagle.y - 28, 60, 5);
    ctx.fillStyle = isBlue ? "#00e676" : "#ff5252"; ctx.fillRect(eagle.x - 30, eagle.y - 28, (eagle.hp / eagle.maxHp) * 60, 5);
    ctx.restore();
}

function render() {
    ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
    ctx.save(); ctx.translate(-camera.x, -camera.y);

    ctx.strokeStyle = "#161b22"; ctx.lineWidth = 1;
    for (let x = 0; x < WORLD_WIDTH; x += BLOCK_SIZE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_HEIGHT); ctx.stroke(); }
    for (let y = 0; y < WORLD_HEIGHT; y += BLOCK_SIZE) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_WIDTH, y); ctx.stroke(); }

    for (let r = 0; r < MAP_ROWS; r++) {
        for (let c = 0; c < MAP_COLS; c++) {
            if (mapData[r][c] === 1) {
                ctx.fillStyle = "#8a4f2a"; ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
            } else if (mapData[r][c] === 2) {
                ctx.fillStyle = "#2d3748"; ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
            }
        }
    }

    for (let cry of crystals) {
        ctx.fillStyle = "#00e5ff"; ctx.shadowBlur = 10; ctx.shadowColor = "#00e5ff";
        ctx.beginPath(); ctx.arc(cry.x, cry.y, 6, 0, 2 * Math.PI); ctx.fill(); ctx.shadowBlur = 0;
    }

    drawEagleBase(blueEagle); drawEagleBase(redEagle);

    for (let id in players) {
        let t = players[id]; if (t.hp <= 0) continue;
        ctx.save(); ctx.translate(t.x, t.y); ctx.rotate((t.angle * Math.PI) / 180);
        ctx.fillStyle = t.clan === "КӨК КЛАН" ? "#1f6feb" : "#f85149"; ctx.fillRect(-16, -16, 32, 32);
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, -3, 22, 6); ctx.restore();

        ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(t.id === localPlayerId ? "Сиз (Көк Танк)" : "Каршылаш Бот", t.x, t.y - 25);
        ctx.fillStyle = "#21262d"; ctx.fillRect(t.x - 15, t.y - 20, 30, 4);
        ctx.fillStyle = "#238636"; ctx.fillRect(t.x - 15, t.y - 20, (t.hp / t.maxHp) * 30, 4);
    }

    ctx.fillStyle = "#f2a104";
    for (let b of bullets) { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, 2 * Math.PI); ctx.fill(); }
    for (let pt of particles) {
        ctx.save(); ctx.globalAlpha = pt.alpha; ctx.fillStyle = pt.color;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.radius, 0, 2 * Math.PI); ctx.fill(); ctx.restore();
    }
    ctx.restore();
}

// Оюндун башкы туруктуу айлануусу (Game Loop)
function gameLoop() {
    updateMovement();
    updatePhysics();
    updateCamera();
    render();
    updateUI();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
