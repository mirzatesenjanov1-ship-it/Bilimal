<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БилимАл Танк Оюну - Кландар Согушу</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(33, 150, 243, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        #header-bar {
            width: 1000px;
            background-color: #1a1a1a;
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        #btn-leave {
            background-color: #e53935;
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-left: 20px;
            transition: background 0.2s;
        }

        #btn-leave:hover {
            background-color: #c62828;
        }

        #clan-info-display {
            color: #ff3d00;
            font-weight: bold;
            font-size: 14px;
            margin-right: 20px;
            text-align: right;
        }

        canvas {
            display: block;
            background-color: #000;
            border: 4px solid #2196F3;
            border-top: none;
        }

        /* Ыңгайлаштырылган Alert Модалдык терезеси (Браузердин alert'и оюнду катырып таштабашы үчүн) */
        #custom-alert {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            color: #000;
            padding: 30px 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        #custom-alert h2 {
            margin-top: 0;
            font-size: 20px;
        }

        #custom-alert button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
        }

        #custom-alert button:hover {
            background-color: #1e88e5;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="header-bar">
            <button id="btn-leave">✕ Баш тартуу</button>
            <div id="clan-info-display">Сиз: КЫЗЫЛ ТАНК (Оң тарап)</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="custom-alert">
            <h2 id="alert-message">Сообщение с bilimal.org:</h2>
            <button onclick="closeAlert()">OK</button>
        </div>
    </div>

<script>
// =========================================================================
// 1. ОЮНДУН ЖАЛПЫ ЖӨНДӨӨЛӨРҮ ЖАНА ОПТИМИЗАЦИЯ КӨРСӨТКҮЧТӨРҮ
// =========================================================================
const BLOCK_SIZE = 40;          // Танканын жана блоктордун көлөмү (КИЧИРЕЙБЕЙТ)
const MAP_COLS = 120;           // 100 оюнчу кенен батышы үчүн чоңойтулган карта (120х120 блок)
const MAP_ROWS = 120;
const WORLD_WIDTH = MAP_COLS * BLOCK_SIZE;   // Жалпы картанын туурасы: 4800px
const WORLD_HEIGHT = MAP_ROWS * BLOCK_SIZE;  // Жалпы картанын бийиктиги: 4800px

// Экранда колдонуучуга көрүнүп турган аймактын өлчөмү (Viewport)
const VIEW_WIDTH = 1000; 
const VIEW_HEIGHT = 600;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = VIEW_WIDTH;
canvas.height = VIEW_HEIGHT;

// Камера объекти (Оюнчуну картанын борборунда ээрчип жүрөт)
let camera = { x: 0, y: 0 };

// Оюндун катышуучуларынын маалымат базасы
let localPlayerId = "player_" + Math.random().toString(36).substr(2, 9);
let players = {};
let bullets = [];
let mapData = [];

// =========================================================================
// 2. ЧОҢ КАРТАНЫ ГЕНЕРАЦИЯЛОО (ТОСКООЛДУКТАР ЖАНА ДУБАЛДАР)
// =========================================================================
function createWorldMap() {
    let matrix = [];
    for (let r = 0; r < MAP_ROWS; r++) {
        matrix[r] = [];
        for (let c = 0; c < MAP_COLS; c++) {
            // Сырткы чекиттерге өтпөс боз дубалдарды орнотуу
            if (r === 0 || r === MAP_ROWS - 1 || c === 0 || c === MAP_COLS - 1) {
                matrix[r][c] = 2; // Боз темир дубал (бузулбайт)
            } 
            // Картанын ичине туш келди кыш дубалдарды жайгаштыруу
            else if (Math.random() < 0.07 && (c > 4 && c < MAP_COLS - 5)) {
                matrix[r][c] = 1; // Күрөң кыш дубал (ок тийгенде бузулат)
            } else {
                matrix[r][c] = 0; // Бош аянтча
            }
        }
    }
    return matrix;
}
mapData = createWorldMap();

// Локалдык оюнчуну кокусунан бир кланга кошуу (Көк же Кызыл)
let isBlueClan = Math.random() > 0.5;
let myClanType = isBlueClan ? "КӨК ТАНК" : "КЫЗЫЛ ТАНК";
let myClanName = "Ноутбук клан";

// Интерфейстеги жазууну жаңыртуу
document.getElementById('clan-info-display').innerText = `Сиз: ${myClanType} ("${myClanName}")`;
if(isBlueClan) {
    document.getElementById('clan-info-display').style.color = "#2196F3";
}

players[localPlayerId] = {
    id: localPlayerId,
    x: isBlueClan ? 150 : WORLD_WIDTH - 150,
    y: Math.random() * (WORLD_HEIGHT - 300) + 150,
    angle: isBlueClan ? 0 : 180,
    clan: myClanType,
    clanName: myClanName,
    hp: 100,
    maxHp: 100,
    level: 1,
    title: "T-Lv.1",
    speed: 4,
    lastShot: 0
};

// Тест иретинде каршылаштарга танк кошуп коюу (мисалы, көрүү үчүн)
let enemyId = "enemy_bot_1";
players[enemyId] = {
    id: enemyId,
    x: isBlueClan ? WORLD_WIDTH - 250 : 250,
    y: players[localPlayerId].y + 40,
    angle: isBlueClan ? 180 : 0,
    clan: isBlueClan ? "КЫЗЫЛ ТАНК" : "КӨК ТАНК",
    clanName: "КАРА ТУЛПАР КЛАНЫ",
    hp: 100,
    maxHp: 100,
    level: 2,
    title: "T-Lv.2",
    speed: 4,
    lastShot: 0
};

// =========================================================================
// 3. БАШКАРУУ СИСТЕМАСЫ
// =========================================================================
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    // Прокрутканы (барактын жылышын) токтотуу
    if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
        e.preventDefault();
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function handlePlayerMovement() {
    let p = players[localPlayerId];
    if (!p || p.hp <= 0) return;

    let nextX = p.x;
    let nextY = p.y;
    let isMoving = false;

    if (keys['KeyW'] || keys['ArrowUp']) {
        nextY -= p.speed;
        p.angle = 270;
        isMoving = true;
    } else if (keys['KeyS'] || keys['ArrowDown']) {
        nextY += p.speed;
        p.angle = 90;
        isMoving = true;
    } else if (keys['KeyA'] || keys['ArrowLeft']) {
        nextX -= p.speed;
        p.angle = 180;
        isMoving = true;
    } else if (keys['KeyD'] || keys['ArrowRight']) {
        nextX += p.speed;
        p.angle = 0;
        isMoving = true;
    }

    // Танка тоскоолдуктарга же дубалга тийбесе гана жылат
    if (isMoving && !checkWallCollision(nextX, nextY)) {
        p.x = nextX;
        p.y = nextY;
    }

    // Ок атуу (Боштук - Space баскычы)
    if (keys['Space']) {
        let currentTime = Date.now();
        if (currentTime - p.lastShot > 400) { // Ок атуулардын ортосундагы тыныгуу (400мс)
            fireBullet(p);
            p.lastShot = currentTime;
        }
    }

    // Башка оюнчуларга маалымат жиберүү (Firebase жаңыртуу коду ушул жерге келет)
    // firebase.database().ref('players/' + localPlayerId).update({ x: p.x, y: p.y, angle: p.angle, hp: p.hp });
}

function checkWallCollision(x, y) {
    let sizeHalf = BLOCK_SIZE / 2;
    // Танканын төрт бурчунун координаттарын текшерүү
    let boundingPoints = [
        {x: x - sizeHalf + 2, y: y - sizeHalf + 2},
        {x: x + sizeHalf - 2, y: y - sizeHalf + 2},
        {x: x - sizeHalf + 2, y: y + sizeHalf - 2},
        {x: x + sizeHalf - 2, y: y + sizeHalf - 2}
    ];

    for (let pt of boundingPoints) {
        let col = Math.floor(pt.x / BLOCK_SIZE);
        let row = Math.floor(pt.y / BLOCK_SIZE);

        if (col < 0 || col >= MAP_COLS || row < 0 || row >= MAP_ROWS) return true;
        if (mapData[row][col] > 0) return true; 
    }
    return false;
}

function fireBullet(player) {
    let rad = (player.angle * Math.PI) / 180;
    // Окту танканын мурдунан чыгаруу
    let startX = player.x + Math.cos(rad) * (BLOCK_SIZE / 2 + 6);
    let startY = player.y + Math.sin(rad) * (BLOCK_SIZE / 2 + 6);

    let bulletObj = {
        id: "bullet_" + player.id + "_" + Date.now(),
        ownerId: player.id,
        clan: player.clan,
        x: startX,
        y: startY,
        vx: Math.cos(rad) * 9, // Октун ылдамдыгы
        vy: Math.sin(rad) * 9,
        active: true
    };
    bullets.push(bulletObj);
    
    // Эгер тармактык синхрондоштуруу болсо:
    // firebase.database().ref('bullets/' + bulletObj.id).set(bulletObj);
}

// =========================================================================
// 4. ОКТОРДУН КАГЫЛЫШУУСУ ЖАНА КАРА ЭКРАНДЫ ОҢДОО
// =========================================================================
function processGameLogic() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        if (!b.active) {
            bullets.splice(i, 1);
            continue;
        }

        // Окту жылдыруу
        b.x += b.vx;
        b.y += b.vy;

        // 1. Картанын сыртына чыгып кетсе жок кылуу
        if (b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT) {
            b.active = false;
            continue;
        }

        // 2. Дубалдарга тийгендигин текшерүү
        let currentCol = Math.floor(b.x / BLOCK_SIZE);
        let currentRow = Math.floor(b.y / BLOCK_SIZE);

        if (currentRow >= 0 && currentRow < MAP_ROWS && currentCol >= 0 && currentCol < MAP_COLS) {
            let cellType = mapData[currentRow][currentCol];
            if (cellType === 1) { // Күрөң дубал бузулат
                mapData[currentRow][currentCol] = 0;
                b.active = false;
                continue;
            } else if (cellType === 2) { // Боз дубалга тийсе ок өзү эле өчөт
                b.active = false;
                continue;
            }
        }

        // 3. ОКТОР БИРИ-БИРИНЕ ТИЙГЕНДЕ ОРТОДО ЖОК БОЛУШУ (Сиздин сурам)
        for (let j = 0; j < bullets.length; j++) {
            let b2 = bullets[j];
            if (b.id !== b2.id && b.ownerId !== b2.ownerId && b2.active) {
                let distanceBetweenBullets = Math.hypot(b.x - b2.x, b.y - b2.y);
                if (distanceBetweenBullets < 10) { // Эки ок кагылышты
                    b.active = false;
                    b2.active = false;
                    break;
                }
            }
        }
        if (!b.active) continue;

        // 4. Ок танкага тийгенде (Эки тарапка тең зыян жетет, бир тараптуу эмес)
        for (let pId in players) {
            let targetPlayer = players[pId];
            if (targetPlayer.hp <= 0) continue;

            // Өзүнүн огу өзүнө жана өзүнүн кланындагыларга зыян келтирбейт
            if (b.ownerId !== targetPlayer.id && b.clan !== targetPlayer.clan) {
                let hitDistance = Math.hypot(b.x - targetPlayer.x, b.y - targetPlayer.y);
                if (hitDistance < (BLOCK_SIZE / 2 + 3)) {
                    targetPlayer.hp -= 25; // Ок тийгенде 25 HP кетет
                    b.active = false;

                    if (targetPlayer.hp <= 0) {
                        targetPlayer.hp = 0;
                        triggerWinNotification(b.clan, targetPlayer.clanName);
                    }
                    break;
                }
            }
        }
    }
}

function triggerWinNotification(winnerClan, loserClanName) {
    // Оюн катып, экран кара болуп калбашы үчүн кыска мөөнөттүү тыныгуу менен терезе ачылат
    setTimeout(() => {
        let msg = `🏆 ${winnerClan.toUpperCase()} ЖЕҢДИ!\n(${loserClanName} талкаланды)`;
        document.getElementById('alert-message').innerText = msg;
        document.getElementById('custom-alert').style.display = 'block';
    }, 50);
}

function closeAlert() {
    document.getElementById('custom-alert').style.display = 'none';
    // Оюнду кайра жаңылоо логикасы:
    location.reload();
}

// =========================================================================
// 5. КАМЕРА ЖАНА КӨРҮНҮҮЧҮ АЙМАКТЫ ТАРТУУ (RENDER SYSTEM)
// =========================================================================
function adjustCameraPosition() {
    let myTank = players[localPlayerId];
    if (!myTank) return;

    // Камера дайыма жергиликтүү оюнчуну борборго алат
    camera.x = myTank.x - VIEW_WIDTH / 2;
    camera.y = myTank.y - VIEW_HEIGHT / 2;

    // Камера чоң дүйнөнүн четтеринен чыгып кетпейт
    if (camera.x < 0) camera.x = 0;
    if (camera.y < 0) camera.y = 0;
    if (camera.x > WORLD_WIDTH - VIEW_WIDTH) camera.x = WORLD_WIDTH - VIEW_WIDTH;
    if (camera.y > WORLD_HEIGHT - VIEW_HEIGHT) camera.y = WORLD_HEIGHT - VIEW_HEIGHT;
}

function renderGraphics() {
    // 1. Ар бир кадрда экранды толук тазалоо (Кара экрандын алдын алат)
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

    ctx.save();
    // Камеранын багыты боюнча координаталарды жылдыруу
    ctx.translate(-camera.x, -camera.y);

    // Оптимизация: Камерага көрүнгөн гана блокторду таап чыгуу (Талкаланбаш үчүн)
    let minCol = Math.floor(camera.x / BLOCK_SIZE);
    let maxCol = Math.ceil((camera.x + VIEW_WIDTH) / BLOCK_SIZE);
    let minRow = Math.floor(camera.y / BLOCK_SIZE);
    let maxRow = Math.ceil((camera.y + VIEW_HEIGHT) / BLOCK_SIZE);

    if (minCol < 0) minCol = 0;
    if (maxCol >= MAP_COLS) maxCol = MAP_COLS - 1;
    if (minRow < 0) minRow = 0;
    if (maxRow >= MAP_ROWS) maxRow = MAP_ROWS - 1;

    // Картаны чийүү
    for (let r = minRow; r <= maxRow; r++) {
        for (let c = minCol; c <= maxCol; c++) {
            let tile = mapData[r][c];
            if (tile === 1) {
                ctx.fillStyle = "#A0522D"; // Кыш дубалдын түсү
                ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
            } else if (tile === 2) {
                ctx.fillStyle = "#506070"; // Корголгон дубалдын түсү
                ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
            }
        }
    }

    // Танкаларды чийүү
    for (let id in players) {
        let tank = players[id];
        
        // Маанилер undefined болсо ката бербеши үчүн коопсуздук текшерүүсү
        if (!tank || tank.hp <= 0) continue;

        // Камерадан сырткары өтө алыс жайгашкан танкаларды чийбей өтүү (Иштешин тездетет)
        if (tank.x < camera.x - BLOCK_SIZE || tank.x > camera.x + VIEW_WIDTH + BLOCK_SIZE ||
            tank.y < camera.y - BLOCK_SIZE || tank.y > camera.y + VIEW_HEIGHT + BLOCK_SIZE) {
            continue;
        }

        ctx.save();
        ctx.translate(tank.x, tank.y);
        ctx.rotate((tank.angle * Math.PI) / 180);

        // Танкалардын кландык түстөрү
        let isCurrentBlue = (tank.clan && (tank.clan.includes("КӨК") || tank.clan.includes("КОК")));
        ctx.fillStyle = isCurrentBlue ? "#2196F3" : "#F44336";
        
        // Негизги танк корпусу (Өлчөмү туруктуу бойдон сакталат)
        ctx.fillRect(-BLOCK_SIZE / 2, -BLOCK_SIZE / 2, BLOCK_SIZE, BLOCK_SIZE);

        // Танканын үстүнкү ак багыттоочу сызыгы (оозу)
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, -3, BLOCK_SIZE / 2 + 5, 6);
        ctx.restore();

        // Танканын үстүндөгү жазуу тексттери (Коопсуз маанилер менен)
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 11px sans-serif";
        ctx.textAlign = "center";
        
        let displayClanName = tank.clan ? tank.clan : "ТАНК";
        let displaySubClan = tank.clanName ? tank.clanName : "Клан";
        let displayTitle = tank.title ? tank.title : "T-Lv.1";

        ctx.fillText(`${displayClanName} ("${displaySubClan}")`, tank.x, tank.y - 35);
        ctx.fillStyle = "#00FFFF";
        ctx.fillText(displayTitle, tank.x, tank.y - 22);

        // Жашоо көрсөткүчү (HP Bar)
        ctx.fillStyle = "#FF0000";
        ctx.fillRect(tank.x - 20, tank.y - 15, 40, 4);
        ctx.fillStyle = "#00FF00";
        let hpRatio = tank.hp / tank.maxHp;
        if (hpRatio < 0) hpRatio = 0;
        ctx.fillRect(tank.x - 20, tank.y - 15, hpRatio * 40, 4);

        // Кландын логотиби же тегерекчеси
        ctx.beginPath();
        ctx.arc(tank.x - 15, tank.y - 45, 7, 0, 2 * Math.PI);
        ctx.fillStyle = isCurrentBlue ? "#0026ff" : "#b70000";
        ctx.fill();
    }

    // Окторду чийүү
    ctx.fillStyle = "#FFEB3B"; // Жаркыраган сары ок
    for (let b of bullets) {
        if (!b.active) continue;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, 2 * Math.PI);
        ctx.fill();
    }

    ctx.restore(); 
}

// =========================================================================
// 6. ОЮНДУН НЕГИЗГИ АЙЛАНЫШ ЦИКЛИ (GAME LOOP)
// =========================================================================
function mainGameLoop() {
    try {
        handlePlayerMovement();
        processGameLogic();
        adjustCameraPosition();
        renderGraphics();
    } catch (error) {
        console.error("Оюндун негизги иштөө кадамдарында ката катталды: ", error);
    }
    requestAnimationFrame(mainGameLoop);
}

// Оюнду баштоо
mainGameLoop();
</script>

</body>
</html>
