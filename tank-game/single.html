<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Battle 2D - Singleplayer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #0c0f12;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-y: auto;
        }
        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 25, 35, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #1f2937;
            font-size: 14px;
            font-weight: bold;
        }
        .back-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .stats {
            display: flex;
            gap: 15px;
            color: #4cd137;
        }
        .stats span span {
            color: #00a8ff;
        }
        .game-container {
            position: relative;
            background: #000;
            border: 3px solid #2ed573;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.3);
        }
        canvas {
            display: block;
        }
        .mobile-controls {
            margin-top: 15px;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 8px;
        }
        .control-btn {
            background: #2f3542;
            border: 2px solid #57606f;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }
        .control-btn:active, .control-btn.active {
            background: #059669;
        }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        
        .fire-btn {
            width: 80px;
            height: 80px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50%;
            border: none;
            background: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
            cursor: pointer;
        }
        .fire-btn:active {
            background: #cc0044;
            transform: scale(0.95);
        }
        .adsense-container {
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 10px;
            border: 1px dashed #374151;
            border-radius: 6px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="back-btn" onclick="location.href='index.html'">✕ Менюго кайт</button>
        <div class="stats">
            <span>Упай: <span id="score-val">0</span></span>
            <span>Өмүр: <span id="lives-val">3</span></span>
            <span>Раунд: <span id="round-val">1</span></span>
            <span>Танк: <span id="tank-lvl">Lvl 1</span></span>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="mobile-controls">
        <div class="d-pad">
            <div class="control-btn btn-up" data-dir="up">▲</div>
            <div class="control-btn btn-left" data-dir="left">◀</div>
            <div class="control-btn btn-right" data-dir="right">▶</div>
            <div class="control-btn btn-down" data-dir="down">▼</div>
        </div>
        <button class="fire-btn" id="fireBtn">FIRE</button>
    </div>

    <div class="adsense-container">
        ЖАРНАМА / РЕКЛАМА
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Картанын торчолору (Оригинал Танки 1990 өлчөмү: 13x13 блок)
        const COLS = 13;
        const ROWS = 13;
        const TILE_SIZE = 32; // Ар бир блоктун пиксель өлчөмү

        canvas.width = COLS * TILE_SIZE;
        canvas.height = ROWS * TILE_SIZE;

        // Оюндун глобалдык өзгөрмөлөрү
        let score = 0;
        let lives = 3;
        let round = 1;
        let tankLevel = 1;
        let gameOver = false;

        // Блоктордун түрлөрү
        const TILE_EMPTY = 0;
        const TILE_BRICK = 1;   // Кирпич (октон бузулат)
        const TILE_STEEL = 2;   // Темир (кадимки октон бузулбайт)
        const TILE_BASE = 9;    // Бүркүт (Штаб)

        let map = [];

        // Картаны түзүү функциясы
        function initMap() {
            map = [];
            // Бардык жерди бош кылып толтуруу
            for (let r = 0; r < ROWS; r++) {
                map[r] = [];
                for (let c = 0; c < COLS; c++) {
                    map[r][c] = TILE_EMPTY;
                }
            }

            // Рандомный тоскоолдуктарды жаратуу (бирок ортосуна жана штабка тийбейбиз)
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    // Танктар чыга турган жерлерди жана эң астынкы борборду бош калтыруу
                    if ((r === 0 && (c === 0 || c === 6 || c === 12)) || (r === 12 && c === 4)) {
                        continue;
                    }
                    
                    // Эң астынкы ортодогу Бүркүт жана анын коргоо чеби турган зонага тийбөө
                    if (r >= 11 && c >= 5 && c <= 7) {
                        continue;
                    }

                    // Башка жерлерге рандомный кирпич же темир коюу
                    if (Math.random() < 0.25) {
                        map[r][c] = TILE_BRICK;
                    } else if (Math.random() < 0.05) {
                        map[r][c] = TILE_STEEL;
                    }
                }
            }

            // === БҮРКҮТ КОРГООЧУ ЧЕБИН ОРНОТУУ (П-ТАМГАСЫ СЫЯКТУУ ТУРУКТУУ ДУБАЛ) ===
            map[12][5] = TILE_BRICK; // Сол капталы
            map[11][5] = TILE_BRICK; // Сол өйдөкү бурчу
            map[11][6] = TILE_BRICK; // Үстүнкү чатыры
            map[11][7] = TILE_BRICK; // Оң өйдөкү бурчу
            map[12][7] = TILE_BRICK; // Оң капталы

            // ӨЗГӨРҮҮСҮЗ ТУРУКТУУ БҮРКҮТ (ШТАБ) — Картанын эң астынкы так ортосу
            map[12][6] = TILE_BASE;
        }

        // Оюнчунун танкы
        const player = {
            x: 4 * TILE_SIZE,
            y: 12 * TILE_SIZE,
            size: 26,
            speed: 2,
            dir: 'up',
            moving: false,
            lastFire: 0,
            fireCooldown: 500
        };

        // Тизмелер
        let bullets = [];
        let enemies = [];
        const MAX_ENEMIES_ON_SCREEN = 4;
        let totalEnemiesThisRound = 10;
        let enemiesSpawned = 0;
        let lastEnemySpawn = 0;

        // Клавиатураны угуу
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', e => { keys[e.code] = false; });

        // Мобилдик башкаруу
        const controlBtns = document.querySelectorAll('.control-btn');
        let activeTouchDir = null;

        controlBtns.forEach(btn => {
            btn.addEventListener('touchstart', e => {
                e.preventDefault();
                activeTouchDir = btn.getAttribute('data-dir');
                btn.classList.add('active');
            });
            btn.addEventListener('touchend', e => {
                e.preventDefault();
                activeTouchDir = null;
                btn.classList.remove('active');
            });
        });

        document.getElementById('fireBtn').addEventListener('click', playerFire);
        document.getElementById('fireBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            playerFire();
        });

        function playerFire() {
            const now = Date.now();
            if (now - player.lastFire > player.fireCooldown && !gameOver) {
                createBullet(player.x + player.size/2, player.y + player.size/2, player.dir, true);
                player.lastFire = now;
            }
        }

        function createBullet(cx, cy, dir, isPlayer) {
            let vx = 0, vy = 0;
            const bSpeed = 5;
            if (dir === 'up') vy = -bSpeed;
            if (dir === 'down') vy = bSpeed;
            if (dir === 'left') vx = -bSpeed;
            if (dir === 'right') vx = bSpeed;

            bullets.push({ x: cx - 3, y: cx - 3, w: 6, h: 6, vx: vx, vy: vy, isPlayer: isPlayer });
        }

        function spawnEnemy() {
            if (enemiesSpawned >= totalEnemiesThisRound || enemies.length >= MAX_ENEMIES_ON_SCREEN) return;
            const now = Date.now();
            if (now - lastEnemySpawn < 3000) return;

            const spawnPoints = [0, 6 * TILE_SIZE, 12 * TILE_SIZE];
            const rx = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
            
            enemies.push({
                x: rx,
                y: 0,
                size: 26,
                speed: 1,
                dir: 'down',
                lastDirChange: 0,
                lastFire: 0
            });

            enemiesSpawned++;
            lastEnemySpawn = now;
        }

        // Кагылышууларды текшерүү (Стенкалар менен)
        function checkWallCollision(x, y, size) {
            if (x < 0 || x + size > canvas.width || y < 0 || y + size > canvas.height) return true;

            const startC = Math.floor(x / TILE_SIZE);
            const endC = Math.floor((x + size) / TILE_SIZE);
            const startR = Math.floor(y / TILE_SIZE);
            const endR = Math.floor((y + size) / TILE_SIZE);

            for (let r = startR; r <= endR; r++) {
                for (let c = startC; c <= endC; c++) {
                    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                        if (map[r][c] !== TILE_EMPTY) return true;
                    }
                }
            }
            return false;
        }

        // Жаңыртуу борбору
        function update() {
            if (gameOver) return;

            // Оюнчунун кыймылы
            let nextX = player.x;
            let nextY = player.y;
            player.moving = false;

            if (keys['ArrowUp'] || activeTouchDir === 'up') {
                player.dir = 'up'; nextY -= player.speed; player.moving = true;
            } else if (keys['ArrowDown'] || activeTouchDir === 'down') {
                player.dir = 'down'; nextY += player.speed; player.moving = true;
            } else if (keys['ArrowLeft'] || activeTouchDir === 'left') {
                player.dir = 'left'; nextX -= player.speed; player.moving = true;
            } else if (keys['ArrowRight'] || activeTouchDir === 'right') {
                player.dir = 'right'; nextX += player.speed; player.moving = true;
            }

            if (keys['Space']) playerFire();

            if (player.moving && !checkWallCollision(nextX, nextY, player.size)) {
                player.x = nextX;
                player.y = nextY;
            }

            // Душмандардын логикасы
            spawnEnemy();
            const now = Date.now();

            enemies.forEach((enemy, index) => {
                let ex = enemy.x;
                let ey = enemy.y;

                if (now - enemy.lastDirChange > 2000 || Math.random() < 0.02) {
                    const dirs = ['up', 'down', 'left', 'right'];
                    enemy.dir = dirs[Math.floor(Math.random() * dirs.length)];
                    enemy.lastDirChange = now;
                }

                if (enemy.dir === 'up') ey -= enemy.speed;
                if (enemy.dir === 'down') ey += enemy.speed;
                if (enemy.dir === 'left') ex -= enemy.speed;
                if (enemy.dir === 'right') ex += enemy.speed;

                if (!checkWallCollision(ex, ey, enemy.size)) {
                    enemy.x = ex;
                    enemy.y = ey;
                } else {
                    const dirs = ['up', 'down', 'left', 'right'];
                    enemy.dir = dirs[Math.floor(Math.random() * dirs.length)];
                }

                if (now - enemy.lastFire > 1500 && Math.random() < 0.3) {
                    createBullet(enemy.x + enemy.size/2, enemy.y + enemy.size/2, enemy.dir, false);
                    enemy.lastFire = now;
                }
            });

            // Октордун кыймылы жана тийүүсү
            bullets.forEach((b, bIdx) => {
                b.x += b.vx;
                b.y += b.vy;

                // Экрандан чыгып кетсе өчүрүү
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(bIdx, 1);
                    return;
                }

                // Стенкаларга тийүүсү
                const tileC = Math.floor(b.x / TILE_SIZE);
                const tileR = Math.floor(b.y / TILE_SIZE);

                if (tileR >= 0 && tileR < ROWS && tileC >= 0 && tileC < COLS) {
                    const tileType = map[tileR][tileC];
                    if (tileType === TILE_BRICK) {
                        map[tileR][tileC] = TILE_EMPTY; // Кирпич бузулду
                        bullets.splice(bIdx, 1);
                        return;
                    } else if (tileType === TILE_STEEL) {
                        bullets.splice(bIdx, 1); // Темир бузулбайт
                        return;
                    } else if (tileType === TILE_BASE) {
                        // Бүркүт атылды! Оюн бүттү
                        map[tileR][tileC] = TILE_EMPTY;
                        gameOver = true;
                        bullets.splice(bIdx, 1);
                        alert("Штаб талкаланды! Оюн бүттү.");
                        return;
                    }
                }

                // Октун танктарга тийүүсү
                if (b.isPlayer) {
                    enemies.forEach((enemy, eIdx) => {
                        if (b.x > enemy.x && b.x < enemy.x + enemy.size && b.y > enemy.y && b.y < enemy.y + enemy.size) {
                            enemies.splice(eIdx, 1);
                            bullets.splice(bIdx, 1);
                            score += 100;
                            document.getElementById('score-val').innerText = score;

                            // Танк進化 (Эволюция) деңгээли упайга карап өсөт
                            if (score >= 500 && tankLevel === 1) { tankLevel = 2; player.speed = 3; }
                            if (score >= 1200 && tankLevel === 2) { tankLevel = 3; player.fireCooldown = 300; }
                            document.getElementById('tank-lvl').innerText = "Lvl " + tankLevel;

                            // Кийинки раундду текшерүү
                            if (enemies.length === 0 && enemiesSpawned >= totalEnemiesThisRound) {
                                round++;
                                document.getElementById('round-val').innerText = round;
                                totalEnemiesThisRound += 5;
                                enemiesSpawned = 0;
                                initMap();
                            }
                        }
                    });
                } else {
                    // Душмандын огу оюнчуга тийсе
                    if (b.x > player.x && b.x < player.x + player.size && b.y > player.y && b.y < player.y + player.size) {
                        bullets.splice(bIdx, 1);
                        lives--;
                        document.getElementById('lives-val').innerText = lives;
                        if (lives <= 0) {
                            gameOver = true;
                            alert("Танкыңыз талкаланды! Оюн бүттү.");
                        } else {
                            // Кайра баштапкы ордуна коюу
                            player.x = 4 * TILE_SIZE;
                            player.y = 12 * TILE_SIZE;
                            player.dir = 'up';
                        }
                    }
                }
            });
        }

        // Экранга тартуу борбору
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Картаны тартуу
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (map[r][c] === TILE_BRICK) {
                        ctx.fillStyle = '#b33939'; // Кирпич өңү
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE - 1, TILE_SIZE - 1);
                        ctx.strokeStyle = '#2c3e50';
                        ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else if (map[r][c] === TILE_STEEL) {
                        ctx.fillStyle = '#747d8c'; // Темир өңү
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#f1f2f6';
                        ctx.fillRect(c * TILE_SIZE + 4, r * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                    } else if (map[r][c] === TILE_BASE) {
                        // БҮРКҮТ (ШТАБ) — Алтын сары түстөгү тегерек
                        ctx.beginPath();
                        ctx.arc(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2 - 2, 0, Math.PI * 2);
                        ctx.fillStyle = '#ffa500';
                        ctx.fill();
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            }

            // Оюнчунун танкын тартуу
            ctx.fillStyle = '#2ed573'; // Жашыл танк
            if (tankLevel === 2) ctx.fillStyle = '#00a8ff'; // Көк танк
            if (tankLevel === 3) ctx.fillStyle = '#eccc68'; // Алтын танк
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Танктын маңдайын (Ооз багытын) көрсөтүү
            ctx.fillStyle = '#ffffff';
            if (player.dir === 'up') ctx.fillRect(player.x + player.size/2 - 3, player.y - 4, 6, 8);
            if (player.dir === 'down') ctx.fillRect(player.x + player.size/2 - 3, player.y + player.size - 4, 6, 8);
            if (player.dir === 'left') ctx.fillRect(player.x - 4, player.y + player.size/2 - 3, 8, 6);
            if (player.dir === 'right') ctx.fillRect(player.x + player.size - 4, player.y + player.size/2 - 3, 8, 6);

            // Душмандарды тартуу
            enemies.forEach(enemy => {
                ctx.fillStyle = '#ff4757'; // Кызыл душман танкы
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

                ctx.fillStyle = '#ffa500';
                if (enemy.dir === 'up') ctx.fillRect(enemy.x + enemy.size/2 - 3, enemy.y - 4, 6, 8);
                if (enemy.dir === 'down') ctx.fillRect(enemy.x + enemy.size/2 - 3, enemy.y + enemy.size - 4, 6, 8);
                if (enemy.dir === 'left') ctx.fillRect(enemy.x - 4, enemy.y + enemy.size/2 - 3, 8, 6);
                if (enemy.dir === 'right') ctx.fillRect(enemy.x + enemy.size - 4, enemy.y + enemy.size/2 - 3, 8, 6);
            });

            // Окторду тартуу
            ctx.fillStyle = '#ff3838';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x + b.w/2, b.y + b.h/2, b.w/2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Оюндун негизги цикли
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Баштоо
        initMap();
        gameLoop();
    </script>
</body>
</html>
