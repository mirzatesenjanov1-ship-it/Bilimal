    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #0c0f12;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #gameCanvas {
            background: #111827;
            border: 2px solid #10b981;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
            display: block;
        }

        /* 🚀 АРАЛЫК ЖАРНАМА ЭКРАНЫНЫН СТИЛИ (ОЮНДУ КАТЫРБАЙТ) */
        #ad-interstitial-overlay {
            display: none; /* Демейки абалда жабык турат */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 15, 18, 0.96);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .ad-box-container {
            text-align: center;
            max-width: 420px;
            width: 90%;
            padding: 30px;
            border: 2px solid #10b981;
            border-radius: 20px;
            background: #1f2937;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.3);
        }
        .ad-title {
            color: #00e5ff;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        .ad-subtitle {
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 20px;
        }
        /* Алып келинген Adsterra баннеринин орду */
        .adsterra-placement {
            min-height: 250px;
            width: 300px;
            background: rgba(0, 0, 0, 0.4);
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px dashed rgba(16, 185, 129, 0.3);
        }
        .ad-timer {
            font-weight: bold;
            color: #10b981;
            font-size: 16px;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
