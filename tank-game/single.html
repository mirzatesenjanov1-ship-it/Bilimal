<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Battle 2D - Ultimate Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #0c0f12;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            overflow-y: auto;
        }
        .top-bar {
            width: 100%;
            max-width: 440px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #1e2530 0%, #11161e 100%);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #2d3748;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .back-btn {
            background: linear-gradient(135deg, #ff4757 0%, #ee5253 100%);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: transform 0.1s;
            box-shadow: 0 2px 8px rgba(255, 71, 87, 0.4);
        }
        .back-btn:active { transform: scale(0.95); }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 11px;
            font-weight: bold;
            max-width: 70%;
        }
        .stats span { color: #a4b0be; }
        .stats span span { color: #2ed573; }
        .stats span #lives-val { color: #ff4757; }
        .stats span #round-val { color: #ffa500; }
        .stats span #tank-lvl { color: #00a8ff; }

        .game-container {
            position: relative;
            background: #050508;
            border: 4px solid #1e2530;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            padding: 4px;
        }
        canvas {
            display: block;
            border-radius: 10px;
            background: #000;
        }
        .mobile-controls {
            margin-top: 15px;
            width: 100%;
            max-width: 440px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 8px;
        }
        .control-btn {
            background: linear-gradient(135deg, #2f3542 0%, #1e222b 100%);
            border: 1px solid #57606f;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1f2f6;
            font-size: 22px;
            cursor: pointer;
        }
        .control-btn:active, .control-btn.active {
            background: linear-gradient(135deg, #2ed573 0%, #26af5f 100%);
            border-color: #2ed573;
        }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        
        .fire-btn {
            width: 85px;
            height: 85px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff0055 0%, #dd0044 100%);
            box-shadow: 0 6px 15px rgba(255, 0, 85, 0.4);
            cursor: pointer;
        }
        .fire-btn:active { transform: scale(0.92); }
        .adsense-container {
            margin-top: 15px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            padding: 10px;
            border: 1px dashed #4b5563;
            border-radius: 10px;
            font-size: 11px;
            color: #9ca3af;
            background: rgba(20, 25, 35, 0.4);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="back-btn" onclick="location.href='index.html'">✕ Меню</button>
        <div class="stats">
            <span>Упай: <span id="score-val">0</span></span>
            <span>Өмүр: <span id="lives-val">3</span></span>
            <span>Раунд: <span id="round-val">1</span></span>
            <span>Танк: <span id="tank-lvl">Lvl 1</span></span>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="mobile-controls">
        <div class="d-pad">
            <div class="control-btn btn-up" data-dir="up">▲</div>
            <div class="control-btn btn-left" data-dir="left">◀</div>
            <div class="control-btn btn-right" data-dir="right">▶</div>
            <div class="control-btn btn-down" data-dir="down">▼</div>
        </div>
        <button class="fire-btn" id="fireBtn">FIRE</button>
    </div>

    <div class="adsense-container">
        ЖАРНАМА / РЕКЛАМА
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const COLS = 13; const ROWS = 13; const TILE_SIZE = 32;
        canvas.width = COLS * TILE_SIZE; canvas.height = ROWS * TILE_SIZE;

        let score = 0; let lives = 3; let round = 1; let tankLevel = 1; let gameOver = false;
        
        // Жаңы карта элементтери
        const TILE_EMPTY = 0; const TILE_BRICK = 1; const TILE_STEEL = 2; 
        const TILE_WATER = 3; const TILE_BUSH = 4; const TILE_BASE = 9;

        let map = []; let bullets = []; let enemies = []; let particles = []; let bonuses = []; let tracks = [];

        const MAX_ENEMIES_ON_SCREEN = 4;
        let totalEnemiesThisRound = 10; let enemiesSpawned = 0; let lastEnemySpawn = 0;

        // Модификаторлор (Бонустар үчүн)
        let freezeTimer = 0; 
        let steelBaseTimer = 0;

        let roundTransition = true;
        let transitionTimer = 180; 
        let transitionText = "РАУНД 1";

        function initMap() {
            map = [];
            for (let r = 0; r < ROWS; r++) {
                map[r] = [];
                for (let c = 0; c < COLS; c++) { map[r][c] = TILE_EMPTY; }
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if ((r === 0 && (c === 0 || c === 6 || c === 12)) || (r === 12 && c === 4)) continue;
                    if (r >= 11 && c >= 5 && c <= 7) continue;

                    let rand = Math.random();
                    if (rand < 0.18) { map[r][c] = TILE_BRICK; } 
                    else if (rand < 0.22) { map[r][c] = TILE_BUSH; } // Бадалдар
                    else if (rand < 0.25) { map[r][c] = TILE_WATER; } // Суу элементтери
                    else if (rand < 0.28) { map[r][c] = TILE_STEEL; }
                }
            }
            buildBaseWalls(false);
        }

        function buildBaseWalls(isSteel) {
            const type = isSteel ? TILE_STEEL : TILE_BRICK;
            map[12][5] = type; map[11][5] = type; map[11][6] = type; 
            map[11][7] = type; map[12][7] = type; 
            map[12][6] = TILE_BASE;
        }

        const player = {
            x: 4 * TILE_SIZE + 3, y: 12 * TILE_SIZE + 3,
            size: 26, speed: 2, dir: 'up', moving: false,
            lastFire: 0, fireCooldown: 350, spawnProtected: 0 
        };

        function startTransition(text) {
            roundTransition = true;
            transitionTimer = 180;
            transitionText = text;
            bullets = [];
            enemies = [];
            bonuses = [];
            tracks = [];
            freezeTimer = 0;
            steelBaseTimer = 0;
            player.x = 4 * TILE_SIZE + 3;
            player.y = 12 * TILE_SIZE + 3;
            player.dir = 'up';
            player.spawnProtected = 120; 
        }

        function createExplosion(x, y, color = '#ff4757', count = 12) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    alpha: 1, size: Math.random() * 4 + 2, color: color
                });
            }
        }

        function spawnBonus(x, y) {
            if (Math.random() < 0.5) { // 50% мүмкүнчүлүк
                const types = ['star', 'shield', 'clock', 'bomb', 'shovel']; 
                const type = types[Math.floor(Math.random() * types.length)];
                
                // Бонус түшкөн жердеги кирпичти тазалоо (Кирпичтин астында калбаш үчүн)
                const c = Math.floor(x / TILE_SIZE);
                const r = Math.floor(y / TILE_SIZE);
                if(r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                    if(map[r][c] === TILE_BRICK) map[r][c] = TILE_EMPTY;
                }

                bonuses.push({ x: x, y: y, size: 22, type: type, pulse: 0 });
            }
        }

        function addTrack(x, y, dir) {
            tracks.push({ x: x + 4, y: y + 4, w: 18, h: 18, alpha: 0.6, dir: dir });
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3; let x = cx; let y = cy; let step = Math.PI / spikes;
            ctx.beginPath(); ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius; y = cy + Math.sin(rot) * outerRadius; ctx.lineTo(x, y); rot += step;
                x = cx + Math.cos(rot) * innerRadius; y = cy + Math.sin(rot) * innerRadius; ctx.lineTo(x, y); rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius); ctx.closePath();
            ctx.fillStyle = '#ffcc00'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.stroke();
        }

        // Башкаруу логикасы
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();
        });
        window.addEventListener('keyup', e => { keys[e.code] = false; });

        const controlBtns = document.querySelectorAll('.control-btn');
        let activeTouchDir = null;

        controlBtns.forEach(btn => {
            btn.addEventListener('touchstart', e => { e.preventDefault(); activeTouchDir = btn.getAttribute('data-dir'); btn.classList.add('active'); });
            btn.addEventListener('touchend', e => { e.preventDefault(); if (activeTouchDir === btn.getAttribute('data-dir')) activeTouchDir = null; btn.classList.remove('active'); });
        });

        document.getElementById('fireBtn').addEventListener('touchstart', (e) => { e.preventDefault(); playerFire(); });
        document.getElementById('fireBtn').addEventListener('click', playerFire);

        function playerFire() {
            if (roundTransition || gameOver) return;
            const now = Date.now();
            if (now - player.lastFire > player.fireCooldown) {
                createBullet(player.x, player.y, player.size, player.dir, true);
                player.lastFire = now;
            }
        }

        function createBullet(tx, ty, tSize, dir, isPlayer) {
            let bx = tx + tSize / 2 - 2; let by = ty + tSize / 2 - 2;
            let vx = 0, vy = 0; const bSpeed = 6;

            if (dir === 'up') { vy = -bSpeed; by = ty - 6; }
            if (dir === 'down') { vy = bSpeed; by = ty + tSize + 2; }
            if (dir === 'left') { vx = -bSpeed; bx = tx - 6; }
            if (dir === 'right') { vx = bSpeed; bx = tx + tSize + 2; }

            bullets.push({ x: bx, y: by, w: 5, h: 5, vx: vx, vy: vy, isPlayer: isPlayer });
        }

        function spawnEnemy() {
            if (enemiesSpawned >= totalEnemiesThisRound || enemies.length >= MAX_ENEMIES_ON_SCREEN || roundTransition) return;
            const now = Date.now();
            if (now - lastEnemySpawn < 2500) return;

            const spawnPoints = [3, 6 * TILE_SIZE + 3, 12 * TILE_SIZE + 3];
            const rx = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
            
            // Душмандардын 3 түрү: кадимки (red), тез (yellow), оор (purple)
            const randType = Math.random();
            let eType = 'normal'; let eSpeed = 1.2; let eHp = 1; let eColor = '#ff4757';
            
            if (randType < 0.25) { eType = 'fast'; eSpeed = 2.0; eHp = 1; eColor = '#ffeb3b'; } 
            else if (randType < 0.45) { eType = 'heavy'; eSpeed = 0.8; eHp = 3; eColor = '#9c27b0'; }

            enemies.push({
                x: rx, y: 3, size: 26, speed: eSpeed + (round * 0.05),
                dir: 'down', lastDirChange: 0, lastFire: 0, type: eType, hp: eHp, maxHp: eHp, color: eColor
            });
            enemiesSpawned++; lastEnemySpawn = now;
        }

        // Кагылышууларды текшерүү (Суу кошулду)
        function checkCollision(x, y, size, ignoreWater = false) {
            if (x < 0 || x + size > canvas.width || y < 0 || y + size > canvas.height) return true;
            const startC = Math.floor(x / TILE_SIZE); const endC = Math.floor((x + size) / TILE_SIZE);
            const startR = Math.floor(y / TILE_SIZE); const endR = Math.floor((y + size) / TILE_SIZE);

            for (let r = startR; r <= endR; r++) {
                for (let c = startC; c <= endC; c++) {
                    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                        const tile = map[r][c];
                        if (tile === TILE_BRICK || tile === TILE_STEEL || tile === TILE_BASE) return true;
                        if (tile === TILE_WATER && !ignoreWater) return true; // Суудан танктар өтө албайт
                    }
                }
            }
            return false;
        }

        // Танктардын өз ара кагылышуусун текшерүү (Танктар бири-биринин ичине кирбейт)
        function checkTankCollision(x, y, size, self) {
            // Оюнчу менен кагылышуу
            if (self !== player) {
                if (x < player.x + player.size && x + size > player.x && y < player.y + player.size && y + size > player.y) return true;
            }
            // Душмандар менен кагылышуу
            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                if (e === self) continue;
                if (x < e.x + e.size && x + size > e.x && y < e.y + e.size && y + size > e.y) return true;
            }
            return false;
        }

        function update() {
            if (gameOver) return;

            if (roundTransition) {
                transitionTimer--;
                if (player.spawnProtected > 0) player.spawnProtected--;
                if (transitionTimer <= 0) { roundTransition = false; }
                return; 
            }

            if (player.spawnProtected > 0) player.spawnProtected--;
            
            // Таймерлерди азайтуу
            if (freezeTimer > 0) freezeTimer--;
            if (steelBaseTimer > 0) {
                steelBaseTimer--;
                if (steelBaseTimer <= 0) buildBaseWalls(false); // Мөөнөтү бүткөндө кайра кирпич болот
            }

            // Иш издерин өчүрүү анимациясы
            for (let i = tracks.length - 1; i >= 0; i--) {
                tracks[i].alpha -= 0.005;
                if (tracks[i].alpha <= 0) tracks.splice(i, 1);
            }

            // Оюнчу кыймылы
            let nextX = player.x; let nextY = player.y; player.moving = false;
            if (keys['ArrowUp'] || activeTouchDir === 'up') { player.dir = 'up'; nextY -= player.speed; player.moving = true; }
            else if (keys['ArrowDown'] || activeTouchDir === 'down') { player.dir = 'down'; nextY += player.speed; player.moving = true; }
            else if (keys['ArrowLeft'] || activeTouchDir === 'left') { player.dir = 'left'; nextX -= player.speed; player.moving = true; }
            else if (keys['ArrowRight'] || activeTouchDir === 'right') { player.dir = 'right'; nextX += player.speed; player.moving = true; }

            if (keys['Space']) playerFire();
            
            if (player.moving && !checkCollision(nextX, nextY, player.size) && !checkTankCollision(nextX, nextY, player.size, player)) { 
                if (Math.random() < 0.15) addTrack(player.x, player.y, player.dir);
                player.x = nextX; player.y = nextY; 
            }

            // Бонустарды чогултуу
            bonuses.forEach((bonus, index) => {
                bonus.pulse += 0.08;
                if (player.x < bonus.x + bonus.size && player.x + player.size > bonus.x &&
                    player.y < bonus.y + bonus.size && player.y + player.size > bonus.y) {
                    
                    createExplosion(bonus.x + bonus.size/2, bonus.y + bonus.size/2, '#00a8ff', 20);
                    
                    if (bonus.type === 'star') {
                        score += 200;
                        if (tankLevel < 3) {
                            tankLevel++;
                            player.speed = tankLevel === 2 ? 2.5 : 3;
                            player.fireCooldown = tankLevel === 2 ? 280 : 180;
                            document.getElementById('tank-lvl').innerText = "Lvl " + tankLevel;
                        }
                    } else if (bonus.type === 'shield') {
                        lives++;
                        document.getElementById('lives-val').innerText = lives;
                    } else if (bonus.type === 'clock') {
                        freezeTimer = 300; // 5 секунд душмандар катат
                    } else if (bonus.type === 'bomb') {
                        enemies.forEach(e => createExplosion(e.x + e.size/2, e.y + e.size/2, '#ff9f43', 25));
                        score += enemies.length * 100;
                        enemies = [];
                        checkRoundEnd();
                    } else if (bonus.type === 'shovel') {
                        steelBaseTimer = 600; // 10 секунд болот чеп
                        buildBaseWalls(true);
                    }
                    
                    document.getElementById('score-val').innerText = score;
                    bonuses.splice(index, 1);
                }
            });

            // Душмандар логикасы
            spawnEnemy();
            const now = Date.now();

            enemies.forEach((enemy) => {
                if (freezeTimer > 0) return; // Саат бонусу иштеп жатса душмандар катып турат

                let ex = enemy.x; let ey = enemy.y;
                
                // Жасалма Интеллект (AI): 65% Бүркүт тарапка (ылдый-ортого) багытталат
                if (now - enemy.lastDirChange > 1200 || Math.random() < 0.02) {
                    let dirs = ['up', 'down', 'left', 'right'];
                    if (Math.random() < 0.65) {
                        let targetX = 6 * TILE_SIZE; let targetY = 12 * TILE_SIZE;
                        let diffX = targetX - enemy.x; let diffY = targetY - enemy.y;
                        if (Math.abs(diffY) > Math.abs(diffX)) {
                            enemy.dir = diffY > 0 ? 'down' : 'up';
                        } else {
                            enemy.dir = diffX > 0 ? 'right' : 'left';
                        }
                    } else {
                        enemy.dir = dirs[Math.floor(Math.random() * dirs.length)];
                    }
                    enemy.lastDirChange = now;
                }

                if (enemy.dir === 'up') ey -= enemy.speed;
                if (enemy.dir === 'down') ey += enemy.speed;
                if (enemy.dir === 'left') ex -= enemy.speed;
                if (enemy.dir === 'right') ex += enemy.speed;

                if (!checkCollision(ex, ey, enemy.size) && !checkTankCollision(ex, ey, enemy.size, enemy)) { 
                    if (Math.random() < 0.1) addTrack(enemy.x, enemy.y, enemy.dir);
                    enemy.x = ex; enemy.y = ey; 
                } else {
                    const dirs = ['up', 'down', 'left', 'right']; 
                    enemy.dir = dirs[Math.floor(Math.random() * dirs.length)];
                }

                // Ок атуу жыштыгы танктын түрүнө жараша
                let shootChance = enemy.type === 'fast' ? 0.4 : 0.2;
                if (now - enemy.lastFire > 1500 && Math.random() < shootChance) {
                    createBullet(enemy.x, enemy.y, enemy.size, enemy.dir, false);
                    enemy.lastFire = now;
                }
            });

            // Бөлүкчөлөр
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
                if (p.alpha <= 0) particles.splice(i, 1);
            }

            // Октор (Суунун үстүнөн уча берет, ошондуктан ignoreWater = true)
            for (let bIdx = bullets.length - 1; bIdx >= 0; bIdx--) {
                let b = bullets[bIdx]; b.x += b.vx; b.y += b.vy;

                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(bIdx, 1); continue;
                }

                const tileC = Math.floor((b.x + b.w/2) / TILE_SIZE);
                const tileR = Math.floor((b.y + b.h/2) / TILE_SIZE);

                if (tileR >= 0 && tileR < ROWS && tileC >= 0 && tileC < COLS) {
                    const tileType = map[tileR][tileC];
                    if (tileType === TILE_BRICK) {
                        createExplosion(b.x, b.y, '#b33939');
                        map[tileR][tileC] = TILE_EMPTY; bullets.splice(bIdx, 1); continue;
                    } else if (tileType === TILE_STEEL) {
                        createExplosion(b.x, b.y, '#747d8c');
                        bullets.splice(bIdx, 1); continue;
                    } else if (tileType === TILE_BASE) {
                        createExplosion(b.x, b.y, '#ffa500', 35);
                        map[tileR][tileC] = TILE_EMPTY; gameOver = true; bullets.splice(bIdx, 1);
                        alert("Штаб талкаланды! Оюн бүттү."); return;
                    }
                }

                if (b.isPlayer) {
                    let hitEnemy = false;
                    for (let eIdx = enemies.length - 1; eIdx >= 0; eIdx--) {
                        let enemy = enemies[eIdx];
                        if (b.x + b.w > enemy.x && b.x < enemy.x + enemy.size && b.y + b.h > enemy.y && b.y < enemy.y + enemy.size) {
                            enemy.hp--;
                            createExplosion(b.x, b.y, '#ff4757', 8);
                            
                            if(enemy.hp <= 0) {
                                createExplosion(enemy.x + enemy.size/2, enemy.y + enemy.size/2, enemy.color, 22);
                                spawnBonus(enemy.x, enemy.y); 
                                enemies.splice(eIdx, 1); score += 100;
                                document.getElementById('score-val').innerText = score;
                                checkRoundEnd();
                            }
                            hitEnemy = true; break;
                        }
                    }
                    if (hitEnemy) { bullets.splice(bIdx, 1); continue; }
                } else {
                    if (player.spawnProtected <= 0 && b.x + b.w > player.x && b.x < player.x + player.size && b.y + b.h > player.y && b.y < player.y + player.size) {
                        createExplosion(player.x + player.size/2, player.y + player.size/2, '#2ed573', 25);
                        bullets.splice(bIdx, 1); lives--;
                        document.getElementById('lives-val').innerText = lives;

                        if (lives <= 0) { gameOver = true; alert("Танкыңыз талкаланды! Оюн бүттү."); } 
                        else { startTransition("ТАНК ЖАРАЛДЫ!"); } 
                        continue;
                    }
                }
            }
        }

        function checkRoundEnd() {
            if (enemies.length === 0 && enemiesSpawned >= totalEnemiesThisRound) {
                round++;
                document.getElementById('round-val').innerText = round;
                totalEnemiesThisRound += 2; enemiesSpawned = 0;
                initMap();
                startTransition("РАУНД " + round);
            }
        }

        function drawTank(x, y, size, dir, color, barrelColor, hp = 1, maxHp = 1) {
            ctx.fillStyle = color; ctx.fillRect(x + 4, y + 4, size - 8, size - 8);
            ctx.fillStyle = barrelColor; ctx.fillRect(x, y, 4, size); ctx.fillRect(x + size - 4, y, 4, size);
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(x + size/2, y + size/2, 4, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = barrelColor;
            if (dir === 'up') ctx.fillRect(x + size/2 - 2, y - 4, 4, 8);
            if (dir === 'down') ctx.fillRect(x + size/2 - 2, y + size - 4, 4, 8);
            if (dir === 'left') ctx.fillRect(x - 4, y + size/2 - 2, 8, 4);
            if (dir === 'right') ctx.fillRect(x + size - 4, y + size/2 - 2, 8, 4);

            // Оор танктар үчүн HP сызыгы
            if (maxHp > 1) {
                ctx.fillStyle = '#ff4757'; ctx.fillRect(x, y - 6, size, 3);
                ctx.fillStyle = '#2ed573'; ctx.fillRect(x, y - 6, size * (hp / maxHp), 3);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Иш издерин тартуу
            tracks.forEach(t => {
                ctx.save(); ctx.globalAlpha = t.alpha; ctx.fillStyle = 'rgba(255,255,255,0.12)';
                ctx.fillRect(t.x, t.y, t.w, t.h); ctx.restore();
            });

            // Төмөнкү карта элементтери (Суу, Суунун үстүнөн баары көрүнөт)
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const tile = map[r][c];
                    if (tile === TILE_BRICK) {
                        ctx.fillStyle = '#b33939'; ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#5c1d1d'; ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else if (tile === TILE_STEEL) {
                        ctx.fillStyle = '#57606f'; ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#a4b0be'; ctx.fillRect(c * TILE_SIZE + 4, r * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                    } else if (tile === TILE_WATER) {
                        ctx.fillStyle = '#1e3799'; ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#4a69bd'; ctx.fillRect(c * TILE_SIZE + 2, r * TILE_SIZE + 4, TILE_SIZE - 4, 4); // Толкун
                    } else if (tile === TILE_BASE) {
                        ctx.fillStyle = '#1e222b'; ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.beginPath(); ctx.arc(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2 - 2, 0, Math.PI * 2);
                        ctx.fillStyle = '#ffa500'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.stroke();
                    }
                }
            }

            // Бонустар
            bonuses.forEach(bonus => {
                ctx.save();
                let scale = 1 + Math.sin(bonus.pulse) * 0.1;
                ctx.translate(bonus.x + bonus.size/2, bonus.y + bonus.size/2);
                ctx.scale(scale, scale);

                if (bonus.type === 'star') drawStar(0, 0, 5, bonus.size/2, bonus.size/4);
                else {
                    ctx.beginPath(); ctx.arc(0, 0, bonus.size/2, 0, Math.PI*2);
                    ctx.fillStyle = bonus.type==='shield'?'#00a8ff':bonus.type==='clock'?'#9c27b0':bonus.type==='bomb'?'#ff9f43':'#4cd137';
                    ctx.fill(); ctx.strokeStyle = '#fff'; ctx.stroke();
                    ctx.fillStyle = '#fff'; ctx.font = '11px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    let icon = bonus.type==='shield'?'🛡️':bonus.type==='clock'?'⏰':bonus.type==='bomb'?'💣':'🛠️';
                    ctx.fillText(icon, 0, 0);
                }
                ctx.restore();
            });

            // Душмандар
            enemies.forEach(enemy => { drawTank(enemy.x, enemy.y, enemy.size, enemy.dir, enemy.color, '#ffa500', enemy.hp, enemy.maxHp); });

            // Оюнчу
            let pColor = tankLevel === 1 ? '#2ed573' : tankLevel === 2 ? '#00a8ff' : '#ffa500';
            drawTank(player.x, player.y, player.size, player.dir, pColor, '#fff');

            if (player.spawnProtected > 0) {
                ctx.strokeStyle = '#00a8ff'; ctx.lineWidth = 3; ctx.beginPath();
                ctx.arc(player.x + player.size/2, player.y + player.size/2, player.size - 2, 0, Math.PI*2); ctx.stroke();
            }

            // Октор
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x + b.w/2, b.y + b.h/2, b.w/2, 0, Math.PI * 2); ctx.fill(); });

            // Жогорку карта элементтери (Бадалдар - танктарды жаап турат)
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (map[r][c] === TILE_BUSH) {
                        ctx.fillStyle = '#26de81'; ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#20bf6b'; ctx.fillRect(c * TILE_SIZE + 4, r * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                    }
                }
            }

            // Бөлүкчөлөр
            particles.forEach(p => {
                ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); ctx.restore();
            });

            // Экрандык күтүү тексти
            if (roundTransition) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
                ctx.fillText(transitionText, canvas.width / 2, canvas.height / 2 - 10);
                ctx.fillStyle = '#2ed573'; ctx.font = '13px Arial';
                ctx.fillText("Даярданыңыз... " + Math.ceil(transitionTimer / 60), canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        initMap();
        startTransition("РАУНД 1");
        gameLoop();
    </script>
</body>
</html>
