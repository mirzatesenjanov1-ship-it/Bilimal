<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай | Физика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050a18] text-white h-screen flex flex-col overflow-hidden font-sans">

    <header class="flex justify-between items-center p-4 bg-[#0f172a] border-b border-white/10 shadow-lg z-20 relative">
        <a href="../index.html" class="text-pink-400 hover:text-white transition bg-white/5 px-4 py-2 rounded-lg border border-white/10"><i class="fas fa-arrow-left mr-2"></i> Оюндар</a>
        <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400 uppercase tracking-wider hidden md:block">Кыз Куумай</h1>
        <div class="flex gap-3 font-bold text-sm md:text-lg">
            <div class="bg-white/5 px-3 py-2 rounded-lg text-amber-400 border border-white/10"><i class="fas fa-star mr-1"></i> <span id="score">0</span></div>
            <div class="bg-white/5 px-3 py-2 rounded-lg text-rose-400 border border-white/10"><i class="fas fa-clock mr-1"></i> <span id="time">60</span>s</div>
        </div>
    </header>

    <div id="level-selection" class="absolute inset-0 z-50 bg-[#050a18]/95 backdrop-blur-md flex flex-col items-center justify-center p-6">
        <h2 class="text-4xl md:text-5xl font-black text-white mb-8 text-center">Бөлүмдү тандаңыз</h2>
        <div id="level-buttons" class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-4xl w-full">
            </div>
    </div>

    <div class="game-area relative flex-grow overflow-hidden bg-gradient-to-b from-sky-900 to-indigo-900">
        <div class="mountains absolute bottom-24 w-[200%] h-64 opacity-50"></div>
        <div class="ground absolute bottom-0 w-[200%] h-24 bg-green-800 border-t-4 border-green-600"></div>

        <div id="girl" class="character absolute bottom-6 transition-all duration-700 ease-out z-10" style="left: 60%;">
            <div class="text-6xl drop-shadow-xl">🏇‍♀️</div>
            <div class="text-center text-xs font-bold text-pink-300 mt-1 bg-black/60 px-2 rounded-full">Кыз</div>
        </div>

        <div id="boy" class="character absolute bottom-4 transition-all duration-700 ease-out z-10" style="left: 10%;">
            <div class="text-7xl drop-shadow-xl">🏇‍♂️</div>
            <div class="text-center text-xs font-bold text-blue-300 mt-1 bg-black/60 px-2 rounded-full">Жигит</div>
        </div>
    </div>

    <div class="bg-[#0f172a] p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.8)] z-20 border-t border-white/10 relative">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <span id="current-level-badge" class="text-xs font-bold bg-pink-500/20 text-pink-400 px-3 py-1 rounded-full uppercase tracking-widest border border-pink-500/30">Тандала элек</span>
            </div>
            <h2 id="question-text" class="text-xl md:text-2xl font-bold text-center mb-6 text-white leading-relaxed">Оюн башталууда...</h2>
            
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-black/90 hidden flex-col justify-center items-center z-50 backdrop-blur-sm p-4">
        <div class="bg-[#0f172a] p-10 rounded-[2.5rem] text-center max-w-md w-full border border-white/10 shadow-2xl">
            <div id="result-icon" class="text-6xl mb-4"></div>
            <h2 id="result-title" class="text-3xl font-black mb-2 text-white">...</h2>
            <p id="result-desc" class="text-gray-400 text-sm mb-8">Сиздин упайыңыз: <span id="final-score" class="font-bold text-amber-400 text-2xl ml-2"></span></p>
            <button onclick="location.reload()" class="bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-bold py-4 px-8 rounded-xl text-lg w-full transition shadow-lg uppercase tracking-wider">
                <i class="fas fa-redo mr-2"></i> Кайра ойноо
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
