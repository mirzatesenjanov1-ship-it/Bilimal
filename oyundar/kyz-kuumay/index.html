<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай | Физика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden font-sans">

    <header class="flex justify-between items-center p-4 bg-gray-800 border-b border-gray-700 shadow-lg z-10">
        <a href="../index.html" class="text-blue-400 hover:text-white transition bg-gray-700 px-4 py-2 rounded-lg"><i class="fas fa-arrow-left mr-2"></i> Оюндар бөлүмүнө кайтуу</a>
        <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400 uppercase tracking-wider">Кыз Куумай: Физика</h1>
        <div class="flex gap-4 font-bold text-lg">
            <div class="bg-gray-700 px-4 py-2 rounded-lg text-green-400"><i class="fas fa-star mr-1"></i> Упай: <span id="score">0</span></div>
            <div class="bg-gray-700 px-4 py-2 rounded-lg text-red-400"><i class="fas fa-clock mr-1"></i> <span id="time">60</span> сек</div>
        </div>
    </header>

    <div class="game-area relative flex-grow overflow-hidden bg-sky-900">
        <div class="mountains absolute bottom-32 w-[200%] h-48 opacity-70"></div>
        
        <div class="ground absolute bottom-0 w-[200%] h-32 bg-green-800 border-t-4 border-green-600"></div>

        <div id="girl" class="character absolute bottom-10 transition-all duration-700 ease-out z-10" style="left: 60%;">
            <div class="text-5xl drop-shadow-xl">🏇‍♀️</div>
            <div class="text-center text-xs font-bold text-pink-300 mt-1 bg-black/50 px-2 rounded-full">Кыз</div>
        </div>

        <div id="boy" class="character absolute bottom-8 transition-all duration-700 ease-out z-10" style="left: 10%;">
            <div class="text-6xl drop-shadow-xl">🏇‍♂️</div>
            <div class="text-center text-xs font-bold text-blue-300 mt-1 bg-black/50 px-2 rounded-full">Жигит</div>
        </div>
        
        <div class="absolute bottom-10 right-10 h-32 w-2 border-l-4 border-dashed border-white z-0 opacity-50"></div>
    </div>

    <div class="bg-gray-800 p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-20">
        <div class="max-w-4xl mx-auto">
            <h2 id="question-text" class="text-2xl md:text-3xl font-bold text-center mb-6 text-white leading-tight">Оюн башталууда...</h2>
            
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-black/90 hidden flex-col justify-center items-center z-50 backdrop-blur-sm">
        <div class="bg-gray-800 p-10 rounded-3xl text-center max-w-md border border-gray-700 shadow-2xl">
            <h2 id="result-title" class="text-4xl font-black mb-4">...</h2>
            <p id="result-desc" class="text-gray-300 text-lg mb-8">Сиздин упайыңыз: <span id="final-score" class="font-bold text-white text-2xl"></span></p>
            <button onclick="location.reload()" class="bg-gradient-to-r from-pink-500 to-orange-500 hover:from-pink-600 hover:to-orange-600 text-white font-bold py-3 px-8 rounded-xl text-xl w-full transition transform hover:scale-105 shadow-lg">
                <i class="fas fa-redo mr-2"></i> Кайра ойноо
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
