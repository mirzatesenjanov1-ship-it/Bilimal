<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чоңдуктар жана Бирдиктер | Mugalim.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050a18; color: white; font-family: sans-serif; }
        .card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            cursor: pointer; 
            transition: 0.3s;
        }
        .card.selected { border-color: #3b82f6; background: rgba(59,130,246,0.2); }
        .card.matched { visibility: hidden; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center">
    <div class="w-full max-w-4xl flex justify-between mb-8">
        <a href="index.html" class="text-blue-400">← Артка</a>
        <h1 class="text-2xl font-bold">Физикалык чоңдуктар</h1>
        <div id="score">Упай: 0</div>
    </div>

    <div id="game-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl">
        </div>

    <script>
        const pairs = [
            {q: "Күч", a: "Ньютон"},
            {q: "Убакыт", a: "Секунд"},
            {q: "Масса", a: "Килограмм"},
            {q: "Ылдамдык", a: "м/с"},
            {q: "Басым", a: "Паскаль"},
            {q: "Тартуу күчү", a: "Жердин тартылуусу"}
        ];

        let cards = [];
        pairs.forEach(p => {
            cards.push({text: p.q, match: p.a});
            cards.push({text: p.a, match: p.q});
        });
        cards.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('game-grid');
        let selected = [];
        let score = 0;

        cards.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card p-6 rounded-xl text-center font-bold h-24 flex items-center justify-center';
            div.innerText = item.text;
            div.onclick = () => {
                if (selected.length < 2 && !div.classList.contains('selected')) {
                    div.classList.add('selected');
                    selected.push({el: div, text: item.text});
                    if (selected.length === 2) setTimeout(checkMatch, 500);
                }
            };
            grid.appendChild(div);
        });

        function checkMatch() {
            const [c1, c2] = selected;
            const isMatch = pairs.some(p => (p.q === c1.text && p.a === c2.text) || (p.a === c1.text && p.q === c2.text));

            if (isMatch) {
                c1.el.classList.add('matched');
                c2.el.classList.add('matched');
                score += 10;
                document.getElementById('score').innerText = "Упай: " + score;
            } else {
                c1.el.classList.remove('selected');
                c2.el.classList.remove('selected');
            }
            selected = [];
        }
    </script>
</body>
</html>
