<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <title>Физикалык чоңдуктар оюну</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .game-card { cursor: pointer; transition: 0.3s; }
        .game-card:active { transform: scale(0.95); }
        .match-success { background-color: #22c55e !important; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-3xl font-bold mb-8 text-blue-400">Физикалык чоңдуктар жана бирдиктер</h1>
        <p class="mb-8 text-gray-400">Төмөндөгү чоңдуктарды алардын туура өлчөө бирдиктери менен жупташтырыңыз!</p>
        
        <div id="game-board" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>

        <div id="result" class="mt-10 hidden">
            <h2 class="text-2xl font-bold text-green-500">Куттуктайбыз! Сиз баарын таптыңыз! 🎉</h2>
            <button onclick="location.reload()" class="mt-4 bg-blue-600 px-6 py-2 rounded-full">Кайра баштоо</button>
        </div>
    </div>

    <script>
        const data = [
            { name: 'Күч', unit: 'Ньютон' },
            { name: 'Масса', unit: 'Килограмм' },
            { name: 'Убакыт', unit: 'Секунд' },
            { name: 'Тартуу күчү', unit: 'Жердин тартылуусу' },
            { name: 'Ылдамдык', unit: 'м/с' },
            { name: 'Басым', unit: 'Паскаль' }
        ];

        let cards = [];
        data.forEach(item => {
            cards.push({ text: item.name, match: item.unit });
            cards.push({ text: item.unit, match: item.name });
        });

        // Карточкаларды аралаштыруу
        cards.sort(() => Math.random() - 0.5);

        const board = document.getElementById('game-board');
        let firstCard = null;
        let matches = 0;

        cards.forEach(cardData => {
            const div = document.createElement('div');
            div.className = 'game-card bg-gray-800 p-6 rounded-xl border border-gray-700 text-lg font-bold flex items-center justify-center h-24 text-center';
            div.innerText = cardData.text;
            
            div.onclick = () => {
                if (div.classList.contains('match-success')) return;
                
                div.classList.add('bg-blue-600');
                
                if (!firstCard) {
                    firstCard = div;
                } else if (firstCard !== div) {
                    if (firstCard.innerText === cardData.match) {
                        firstCard.classList.add('match-success');
                        div.classList.add('match-success');
                        matches++;
                        if (matches === data.length) document.getElementById('result').classList.remove('hidden');
                    } else {
                        const temp = firstCard;
                        setTimeout(() => {
                            temp.classList.remove('bg-blue-600');
                            div.classList.remove('bg-blue-600');
                        }, 500);
                    }
                    firstCard = null;
                }
            };
            board.appendChild(div);
        });
    </script>
</body>
</html>
