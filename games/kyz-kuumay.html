<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай: Физика | Mugalim.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap');
        
        body {
            background: #020617;
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .track {
            position: relative;
            height: 250px;
            background: linear-gradient(transparent 50%, rgba(59, 130, 246, 0.1) 100%);
            border-bottom: 2px solid #1e293b;
            overflow: hidden;
        }

        .horse {
            position: absolute;
            bottom: 20px;
            transition: left 1s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 3rem;
        }

        #rider { left: 5%; z-index: 10; }
        #girl { left: 60%; filter: drop-shadow(0 0 10px #f472b6); }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-answer {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .btn-answer:hover {
            background: #3b82f6;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="track mt-10">
        <div id="girl" class="horse">🏇‍♀️</div>
        <div id="rider" class="horse">🏇‍♂️</div>
        
        <div class="absolute inset-0 flex items-center justify-around opacity-10 pointer-events-none">
            <div class="w-1 h-full bg-white rotate-12"></div>
            <div class="w-1 h-full bg-white rotate-12"></div>
            <div class="w-1 h-full bg-white rotate-12"></div>
        </div>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-2xl glass-panel p-8 rounded-[2.5rem] text-center shadow-2xl">
            <div id="game-ui">
                <p id="question-text" class="text-2xl font-bold mb-8 leading-relaxed">Суроо жүктөлүүдө...</p>
                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div id="win-screen" class="hidden">
                <h2 class="text-4xl font-black text-pink-500 mb-4">ЖЕТТИҢИЗ!</h2>
                <p class="text-gray-400 mb-6">Сиз бардык физикалык тоскоолдуктарды жеңдиңиз.</p>
                <button onclick="location.reload()" class="px-8 py-3 bg-blue-600 rounded-full font-bold">КАЙРА ОЙНОО</button>
            </div>
        </div>
    </main>

    <script>
        const questions = [
            { q: "Ылдамдыктын бирдиги кайсы?", a: ["м/с", "кг", "Н", "Па"], correct: 0 },
            { q: "Күчтү эмне менен өлчөйбүз?", a: ["Термометр", "Динамометр", "Барометр", "Сызыкчы"], correct: 1 },
            { q: "Инерция деген эмне?", a: ["Кыймыл", "Тынчтык", "Ылдамдыкты сактоо", "Токтоо"], correct: 2 },
            { q: "Басымдын формуласы кайсы?", a: ["P=F/S", "F=ma", "E=mc²", "v=s/t"], correct: 0 },
            { q: "Ньютондун 2-закону?", a: ["F=ma", "P=mv", "E=mgh", "U=IR"], correct: 0 }
        ];

        let currentIdx = 0;
        let riderPos = 5;
        let girlPos = 60;

        function displayQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            q.a.forEach((ans, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-answer p-5 rounded-2xl font-bold text-lg';
                btn.innerText = ans;
                btn.onclick = () => checkAnswer(index);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(idx) {
            if (idx === questions[currentIdx].correct) {
                riderPos += 15;
                document.getElementById('rider').style.left = riderPos + '%';
                currentIdx++;

                if (riderPos >= girlPos) {
                    endGame();
                } else if (currentIdx < questions.length) {
                    displayQuestion();
                }
            } else {
                // Жаңылышса ат артка кетет
                riderPos = Math.max(5, riderPos - 5);
                document.getElementById('rider').style.left = riderPos + '%';
                alert("Ката! Ат чарчап калды.");
            }
        }

        function endGame() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            document.getElementById('rider').style.left = (girlPos + 5) + '%';
        }

        displayQuestion();
    </script>
</body>
</html>
