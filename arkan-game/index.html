<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аркан Тартыш: Күч Энергиясы — BilimAl</title>
    
    <script>window.yaContextCb=window.yaContextCb||[]</script>
    <script src="https://yandex.ru/ads/system/context.js" async></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #050510; color: #fff; overflow: hidden; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #gameCanvas { display: block; width: 100%; height: 55%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Мугалимдин башкаруу панели */
        #setup-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; background: #070716; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
        .setup-container { background: rgba(15, 15, 40, 0.95); border: 2px solid #00f0ff; border-radius: 16px; padding: 25px; width: 750px; max-width: 100%; box-shadow: 0 0 30px rgba(0, 240, 255, 0.2); }
        .setup-title { font-size: 1.8rem; color: #00f0ff; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 6px; color: #aaa; font-weight: 600; }
        .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,240,255,0.3); padding: 10px; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; }
        textarea.form-input { height: 100px; resize: none; font-family: monospace; font-size: 0.9rem; }
        
        .saved-tests-box { background: rgba(0, 0, 0, 0.4); border: 1px dashed rgba(0, 240, 255, 0.3); padding: 10px; border-radius: 10px; margin-bottom: 12px; max-height: 100px; overflow-y: auto; }
        .test-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; background: rgba(255,255,255,0.03); border-radius: 6px; margin-bottom: 6px; }
        .btn-select { background: #00f0ff; color: #000; border: none; padding: 4px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-delete { background: #ff0055; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; margin-left: 18px; }
        
        .action-row { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 12px; }
        .btn-save { background: transparent; border: 2px solid #ff00ff; color: #ff00ff; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-start { background: linear-gradient(90deg, #ff00ff, #7000ff); border: none; color: white; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1.2rem; }

        /* Оюн интерфейси */
        #ui-layer { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        .top-bar { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 20; }
        .btn-exit { background: rgba(15, 15, 40, 0.85); border: 2px solid #00f0ff; color: #00f0ff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .score-box { background: rgba(15, 15, 40, 0.85); padding: 10px 25px; border-radius: 8px; border: 1px solid rgba(0, 240, 255, 0.2); font-size: 1.2rem; display: flex; gap: 20px; }
        
        /* Төмөнкү Тест Контейнери */
        .duel-container { display: flex; width: 100%; height: 45%; position: absolute; bottom: 0; left: 0; background: #070716; border-top: 3px solid #7000ff; z-index: 20; padding-bottom: 60px; overflow-y: auto; }
        
        .quiz-side { width: 50%; height: 100%; padding: 20px; display: flex; flex-direction: column; justify-content: flex-start; position: relative; }
        .left-side { border-right: 1px solid rgba(0, 240, 255, 0.15); }
        .right-side { border-left: 1px solid rgba(255, 0, 85, 0.15); }
        .side-header { font-size: 1.15rem; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .question-text { font-size: 1.1rem; font-weight: 600; line-height: 1.4; min-height: 50px; margin-bottom: 15px; width: 100%; color: #fff; }
        
        /* ЖАҢЫЛАНГАН ИЙКЕМДҮҮ БАБЫЛМА СТИЛИ */
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; align-items: start; }
        .answer-btn { 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            color: #fff; 
            padding: 10px 14px; 
            border-radius: 8px; 
            font-size: 0.95rem; 
            font-weight: 600; 
            cursor: pointer; 
            text-align: left;
            line-height: 1.3;
            word-wrap: break-word;
            white-space: normal;
            height: auto;
            min-height: 45px;
            display: flex;
            align-items: center;
        }
        
        .left-side .side-header { color: #00f0ff; }
        .left-side .answer-btn:hover { background: linear-gradient(90deg, #0055ff, #00f0ff); color: #000; }
        .right-side .side-header { color: #ff0055; }
        .right-side .answer-btn:hover { background: linear-gradient(90deg, #ff0055, #ff00aa); color: #fff; }
        .waiting-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 7, 22, 0.95); display: none; flex-direction: column; justify-content: center; align-items: center; font-size: 1.4rem; font-weight: bold; z-index: 30; }
        
        /* Модалдык терезе */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #0f0f2d; border: 3px solid #00f0ff; padding: 40px; border-radius: 20px; text-align: center; width: 500px; max-width: 90%; }
        .modal-title { font-size: 2.2rem; font-weight: bold; margin-bottom: 15px; }
        .modal-btn { background: #00f0ff; color: #000; border: none; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 25px; }

        /* ЖАРНАМА СТИЛДЕРИ */
        .yandex-top-ad {
            width: 100%; max-width: 728px; height: 90px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: center; align-items: center; border-radius: 4px;
        }
        .yandex-bottom-sticky-ad {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50px;
            background: #04040c; border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 40; display: flex; justify-content: center; align-items: center; pointer-events: auto;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="./komuzakbakai.mp3" loop></audio>

    <div id="setup-layer">
        <div class="yandex-top-ad" id="yandex_rtb_R-A-19536065-1">
            <span style="color: #444; font-size: 0.8rem;">Жарнама (Яндекс)</span>
        </div>

        <div class="setup-container">
            <div class="setup-title">🪢 Аркан Тартыш: Мугалимдин Панели</div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px;">
                <div class="form-group">
                    <label>Сол команданын аты (Көк):</label>
                    <input type="text" id="leftTeamInput" class="form-input" value="Көк Танк">
                </div>
                <div class="form-group">
                    <label>Оң команданын аты (Кызыл):</label>
                    <input type="text" id="rightTeamInput" class="form-input" value="Кара Тулпар">
                </div>
            </div>

            <div class="form-group">
                <label>Сакталган даяр тесттер:</label>
                <div class="saved-tests-box" id="savedTestsList"></div>
            </div>

            <div class="form-group">
                <label>Тесттин мазмуну:</label>
                <textarea id="questionsTextArea" class="form-input"></textarea>
            </div>

            <div class="action-row">
                <input type="text" id="testNameInput" class="form-input" placeholder="Тестке ат бериңиз">
                <button class="btn-save" id="saveTestBtn">Тестти Сактоо 💾</button>
            </div>

            <button class="btn-start" id="startGameBtn">Оюнду Баштоо 🚀</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar interactive">
            <a class="btn-exit" href="../sections/test-games.html">← Чыгуу</a>
            <div class="score-box">
                <div><span id="leftTeamLabel" style="color: #00f0ff;">Сол</span>: <span id="leftScoreDisplay" style="font-weight:bold; color: #00f0ff;">0</span></div>
                <div style="color: #444;">|</div>
                <div><span id="rightTeamLabel" style="color: #ff0055;">Оң</span>: <span id="rightScoreDisplay" style="font-weight:bold; color: #ff0055;">0</span></div>
            </div>
        </div>

        <div class="duel-container interactive">
            <div class="quiz-side left-side">
                <div class="side-header">
                    <span id="leftSideName">Көк Команда</span>
                    <span id="leftProgress">Суроо: 1/25</span>
                </div>
                <div class="question-text" id="leftQuestionText">Жүктөлүүдө...</div>
                <div class="answers-grid" id="leftAnswersGrid"></div>
                <div class="waiting-overlay" id="leftWaitingOverlay">
                    <span>🏁 БАРДЫК ТЕСТ БҮТТҮ!</span>
                </div>
            </div>

            <div class="quiz-side right-side">
                <div class="side-header">
                    <span id="rightSideName">Кызыл Команда</span>
                    <span id="rightProgress">Суроо: 1/25</span>
                </div>
                <div class="question-text" id="rightQuestionText">Жүктөлүүдө...</div>
                <div class="answers-grid" id="rightAnswersGrid"></div>
                <div class="waiting-overlay" id="rightWaitingOverlay">
                    <span>🏁 БАРДЫК ТЕСТ БҮТТҮ!</span>
                </div>
            </div>
        </div>
    </div>

    <div class="yandex-bottom-sticky-ad" id="yandex_rtb_R-A-19536065-2">
        <span style="color: #444; font-size: 0.75rem;">Жарнама бирдиги (Яндекс Төмөнкү Тилке)</span>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-title" id="resultTitle">ЖЕҢИШ! 🎉</div>
            <p id="resultDesc" style="color: #ccc; line-height: 1.6; font-size: 1.1rem; margin-top: 15px; text-align: left;"></p>
            <button class="modal-btn" onclick="window.location.href='../sections/test-games.html'">Оюн бетине кайтуу</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bgMusic');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.55;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const testTopics = [
            { q: "Ньютондун 3-закону кандай айтылат?", a: "Аракет күчү каршы аракет күчүнө модулу боюнча барабар, багыты боюнча карама-акыркы", w: ["Күч ылдамдыкка түз пропорциялуу", "Инерция дайыма сакталат", "Нерсе тынч абалын сактай албайт"] },
            { q: "Күчтүн бирдиги эмне?", a: "Ньютон", w: ["Джоуль", "Ватт", "Паскаль"] },
            { q: "Жердин тартылуу күчү кандай тамга менен белгиленет?", a: "F_оор", w: ["N", "P", "F_сүрт"] }
        ];

        let leftTeam = { name: "Көк Танк", score: 0, index: 0, correctCount: 0, finished: false };
        let rightTeam = { name: "Кара Тулпар", score: 0, index: 0, correctCount: 0, finished: false };
        let parsedQuestions = [];
        let gameActive = false;
        let startTime = 0;
        let ropeOffset = 0;
        let targetRopeOffset = 0;
        let animationPulse = 0;

        const defaultQuestionsText = testTopics.map(t => `${t.q}\n*${t.a}\n${t.w.join('\n')}`).join('\n\n');
        document.getElementById('questionsTextArea').value = defaultQuestionsText;

        function loadSavedTests() {
            const container = document.getElementById('savedTestsList');
            container.innerHTML = '';
            const saved = JSON.parse(localStorage.getItem('arkan_saved_tests') || '{}');
            Object.keys(saved).forEach(name => {
                const div = document.createElement('div');
                div.className = 'test-item';
                div.innerHTML = `<span>${name}</span><div><button class="btn-select" onclick="selectTest('${name}')">Тандоо</button><button class="btn-delete" onclick="deleteTest('${name}')">❌</button></div>`;
                container.appendChild(div);
            });
        }

        window.selectTest = function(name) {
            const saved = JSON.parse(localStorage.getItem('arkan_saved_tests') || '{}');
            if (saved[name]) {
                document.getElementById('questionsTextArea').value = saved[name];
                document.getElementById('testNameInput').value = name;
            }
        };

        window.deleteTest = function(name) {
            const saved = JSON.parse(localStorage.getItem('arkan_saved_tests') || '{}');
            delete saved[name];
            localStorage.setItem('arkan_saved_tests', JSON.stringify(saved));
            loadSavedTests();
        };

        document.getElementById('saveTestBtn').addEventListener('click', () => {
            const name = document.getElementById('testNameInput').value.trim();
            const text = document.getElementById('questionsTextArea').value.trim();
            if (!name || !text) return alert('Тесттин атын жана мазмунун жазыңыз!');
            const saved = JSON.parse(localStorage.getItem('arkan_saved_tests') || '{}');
            saved[name] = text;
            localStorage.setItem('arkan_saved_tests', JSON.stringify(saved));
            loadSavedTests();
            alert('Тест ийгиликтүү сакталды!');
        });

        loadSavedTests();

        function parseQuestions(text) {
            const blocks = text.split('\n\n');
            const result = [];
            blocks.forEach(b => {
                const lines = b.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length >= 2) {
                    const q = lines[0];
                    let a = '';
                    const w = [];
                    lines.slice(1).forEach(l => {
                        if (l.startsWith('*')) a = l.substring(1).trim();
                        else w.push(l);
                    });
                    if (!a && w.length > 0) a = w.shift();
                    result.push({ q, a, w });
                }
            });
            return result;
        }

        document.getElementById('startGameBtn').addEventListener('click', () => {
            const text = document.getElementById('questionsTextArea').value.trim();
            parsedQuestions = parseQuestions(text);
            if (parsedQuestions.length === 0) return alert('Тест форматы туура эмес!');

            leftTeam.name = document.getElementById('leftTeamInput').value.trim() || "Көк Команда";
            rightTeam.name = document.getElementById('rightTeamInput').value.trim() || "Кызыл Команда";

            document.getElementById('leftSideName').innerText = leftTeam.name;
            document.getElementById('rightSideName').innerText = rightTeam.name;
            document.getElementById('leftTeamLabel').innerText = leftTeam.name;
            document.getElementById('rightTeamLabel').innerText = rightTeam.name;

            document.getElementById('setup-layer').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';

            try { bgMusic.play(); } catch(e){}

            gameActive = true;
            startTime = performance.now();
            leftTeam.index = 0; leftTeam.score = 0; leftTeam.correctCount = 0; leftTeam.finished = false;
            rightTeam.index = 0; rightTeam.score = 0; rightTeam.correctCount = 0; rightTeam.finished = false;
            ropeOffset = 0; targetRopeOffset = 0; animationPulse = 0;

            renderSide('left');
            renderSide('right');
            requestAnimationFrame(drawGame);
        });

        function renderSide(side) {
            const team = (side === 'left') ? leftTeam : rightTeam;
            const progressEl = document.getElementById(`${side}Progress`);
            const questionEl = document.getElementById(`${side}QuestionText`);
            const gridEl = document.getElementById(`${side}AnswersGrid`);

            if (team.index >= parsedQuestions.length) {
                team.finished = true;
                document.getElementById(`${side}WaitingOverlay`).style.display = 'flex';
                checkGameCompletion();
                return;
            }

            progressEl.innerText = `Суроо: ${team.index + 1}/${parsedQuestions.length}`;
            const currentQuiz = parsedQuestions[team.index];
            questionEl.innerText = currentQuiz.q;
            gridEl.innerHTML = '';

            const shuffledAnswers = [currentQuiz.a, ...currentQuiz.w].sort(() => Math.random() - 0.5);
            shuffledAnswers.forEach(ans => {
                const button = document.createElement('button');
                button.className = 'answer-btn';
                button.innerText = ans;
                button.onclick = () => handleSelection(side, ans, currentQuiz.a);
                gridEl.appendChild(button);
            });
        }

        function handleSelection(side, selectedAnswer, correctAnswer) {
            if (!gameActive) return;
            const team = (side === 'left') ? leftTeam : rightTeam;

            if (selectedAnswer === correctAnswer) {
                team.score += 100;
                team.correctCount++;
                targetRopeOffset += (side === 'left') ? -60 : 60;
            } else {
                targetRopeOffset += (side === 'left') ? 35 : -35;
            }

            document.getElementById(`${side}ScoreDisplay`).innerText = team.score;
            team.index++;
            renderSide(side);
        }

        function checkGameCompletion() {
            if (leftTeam.finished && rightTeam.finished && gameActive) {
                gameActive = false;
                try { bgMusic.pause(); } catch(e){}

                const modal = document.getElementById('resultModal');
                const title = document.getElementById('resultTitle');
                const desc = document.getElementById('resultDesc');

                const totalDuration = ((performance.now() - startTime) / 1000).toFixed(2);
                let winnerName = "";
                let winReason = "";

                if (leftTeam.correctCount > rightTeam.correctCount) {
                    winnerName = leftTeam.name;
                    title.style.color = "#00f0ff";
                    winReason = `🏆 <b>${leftTeam.name}</b> көбүрөөк туура жооп берди!`;
                } else if (rightTeam.correctCount > leftTeam.correctCount) {
                    winnerName = rightTeam.name;
                    title.style.color = "#ff0055";
                    winReason = `🏆 <b>${rightTeam.name}</b> көбүрөөк туура жооп берди!`;
                } else {
                    winReason = `🤝 Упайлар тең чыкты!`;
                    title.style.color = "#fff";
                }

                title.innerHTML = winnerName ? `🏆 ${winnerName} ЖЕҢДИ!` : "🤝 ТЕҢ ЧЫГУУ!";
                desc.innerHTML = `
                    ${winReason}<br><br>
                    ⏱️ Жалпы убакыт: <b>${totalDuration} сек</b><br><br>
                    📊 <b>Жыйынтык:</b><br>
                    • ${leftTeam.name}: ${leftTeam.correctCount} туура жооп<br>
                    • ${rightTeam.name}: ${rightTeam.correctCount} туура жооп
                `;
                modal.style.display = 'flex';
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerY = canvas.height * 0.7;
            const centerX = canvas.width / 2 + ropeOffset;

            animationPulse += 0.12;

            let skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.65);
            skyGradient.addColorStop(0, '#0f2027');
            skyGradient.addColorStop(1, '#203a43');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height * 0.65);

            ctx.beginPath();
            ctx.moveTo(30, centerY);
            ctx.lineTo(canvas.width - 30, centerY);
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 7;
            ctx.stroke();

            ctx.beginPath();
            ctx.rect(centerX - 4, centerY - 15, 8, 30);
            ctx.fillStyle = '#ff0000';
            ctx.fill();

            drawTeam(canvas.width * 0.25 + ropeOffset, centerY, '#00f0ff', leftTeam.name, false, animationPulse);
            drawTeam(canvas.width * 0.75 + ropeOffset, centerY, '#ff0055', rightTeam.name, true, animationPulse);

            ropeOffset += (targetRopeOffset - ropeOffset) * 0.05;

            if (gameActive) requestAnimationFrame(drawGame);
        }

        function drawTeam(startX, centerY, color, teamName, isRightSide, pulse) {
            ctx.fillStyle = color;
            ctx.font = "bold 15px 'Segoe UI', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(teamName, startX + (isRightSide ? 50 : -50), centerY - 80);

            for (let i = 0; i < 3; i++) {
                let distanceBetweenPlayers = isRightSide ? (i * 45) : -(i * 45);
                let leanX = Math.sin(pulse + i) * 6; 
                
                let x = startX + distanceBetweenPlayers + leanX;
                let y = centerY;

                ctx.beginPath();
                ctx.arc(x, y - 45, 13, 0, Math.PI * 2);
                ctx.fill();

                ctx.lineWidth = 8;
                ctx.strokeStyle = color;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(x, y - 32);
                ctx.lineTo(x - (isRightSide ? -5 : 5), y + 10); 
                ctx.stroke();

                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(x, y - 18);
                ctx.lineTo(x + (isRightSide ? -25 : 25), y);
                ctx.stroke();

                ctx.lineWidth = 7;
                ctx.beginPath();
                ctx.moveTo(x - (isRightSide ? -5 : 5), y + 10);
                ctx.lineTo(x - 15, y + 40); 
                ctx.moveTo(x - (isRightSide ? -5 : 5), y + 10);
                ctx.lineTo(x + 15, y + 40); 
                ctx.stroke();
            }
        }
    </script>

    <script>
        window.yaContextCb.push(()=>{
            Ya.Context.AdvManager.render({
                renderTo: 'yandex_rtb_R-A-19536065-1',
                blockId: 'R-A-19536065-1'
            });
            Ya.Context.AdvManager.render({
                renderTo: 'yandex_rtb_R-A-19536065-2',
                blockId: 'R-A-19536065-2'
            });
        });
    </script>
</body>
</html>
