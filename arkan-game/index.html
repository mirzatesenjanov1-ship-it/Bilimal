<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аркан Тартыш: Күч Энергиясы — BilimAl</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #050510; color: #fff; overflow: hidden; width: 100vw; height: 100vh; }
        
        #gameCanvas { display: block; width: 100%; height: 55%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Мугалимдин башкаруу панели */
        #setup-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; background: #070716; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .setup-container { background: rgba(15, 15, 40, 0.95); border: 2px solid #00f0ff; border-radius: 16px; padding: 30px; width: 750px; max-width: 100%; box-shadow: 0 0 30px rgba(0, 240, 255, 0.2); }
        .setup-title { font-size: 1.8rem; color: #00f0ff; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #aaa; font-weight: 600; }
        .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,240,255,0.3); padding: 12px; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; }
        .form-input:focus { border-color: #ff00ff; box-shadow: 0 0 10px rgba(255,0,255,0.3); }
        textarea.form-input { height: 120px; resize: none; font-family: monospace; font-size: 0.9rem; line-height: 1.5; }
        
        .saved-tests-box { background: rgba(0, 0, 0, 0.4); border: 1px dashed rgba(0, 240, 255, 0.3); padding: 12px; border-radius: 10px; margin-bottom: 15px; max-height: 120px; overflow-y: auto; }
        .test-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 6px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-select { background: #00f0ff; color: #000; border: none; padding: 5px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-delete { background: #ff0055; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.85rem; margin-left: 8px; }
        
        .action-row { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 15px; }
        .btn-save { background: transparent; border: 2px solid #ff00ff; color: #ff00ff; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #ff00ff; color: #fff; }
        .btn-start { background: linear-gradient(90deg, #ff00ff, #7000ff); border: none; color: white; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1.2rem; transition: 0.3s; }
        .btn-start:hover { transform: scale(1.01); box-shadow: 0 0 20px rgba(255, 0, 255, 0.5); }

        /* Негизги оюн интерфейси */
        #ui-layer { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        /* Жогорку упайлар панели */
        .top-bar { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 20; }
        .btn-exit { background: rgba(15, 15, 40, 0.85); border: 2px solid #00f0ff; color: #00f0ff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; text-decoration: none; backdrop-filter: blur(5px); }
        .btn-exit:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px #00f0ff; }
        .score-box { background: rgba(15, 15, 40, 0.85); padding: 10px 25px; border-radius: 8px; border: 1px solid rgba(0, 240, 255, 0.2); font-size: 1.2rem; display: flex; gap: 20px; backdrop-filter: blur(5px); }
        
        /* Төмөнкү Тест Контейнери */
        .duel-container { display: flex; width: 100%; height: 45%; position: absolute; bottom: 0; left: 0; background: #070716; border-top: 3px solid #7000ff; z-index: 20; }
        
        .quiz-side { width: 50%; height: 100%; padding: 25px; display: flex; flex-direction: column; justify-content: flex-start; position: relative; }
        .left-side { border-right: 1px solid rgba(0, 240, 255, 0.15); }
        .right-side { border-left: 1px solid rgba(255, 0, 85, 0.15); }

        .side-header { font-size: 1.15rem; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .question-text { font-size: 1.1rem; font-weight: 600; line-height: 1.5; min-height: 65px; margin-bottom: 20px; width: 100%; color: #fff; overflow-y: auto; }
        
        /* Варианттардын сеткасы */
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
        .answer-btn { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.12); color: #fff; padding: 15px 20px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; text-align: left; line-height: 1.3; display: block; width: 100%; }
        
        .left-side .side-header { color: #00f0ff; }
        .left-side .answer-btn:hover { background: linear-gradient(90deg, #0055ff, #00f0ff); border-color: transparent; color: #000; box-shadow: 0 0 12px rgba(0, 240, 255, 0.4); transform: translateY(-2px); }
        
        .right-side .side-header { color: #ff0055; }
        .right-side .answer-btn:hover { background: linear-gradient(90deg, #ff0055, #ff00aa); border-color: transparent; color: #fff; box-shadow: 0 0 12px rgba(255, 0, 85, 0.4); transform: translateY(-2px); }

        /* Күтүү терезеси */
        .waiting-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 7, 22, 0.95); backdrop-filter: blur(8px); display: none; flex-direction: column; justify-content: center; align-items: center; font-size: 1.4rem; font-weight: bold; color: #fff; z-index: 30; text-align: center; border-radius: 4px; }
        
        /* Жыйынтык модалдык терезеси */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #0f0f2d; border: 3px solid #00f0ff; padding: 40px; border-radius: 20px; text-align: center; width: 500px; max-width: 90%; box-shadow: 0 0 30px rgba(0,240,255,0.3); }
        .modal-title { font-size: 2.2rem; font-weight: bold; margin-bottom: 15px; }
        .modal-btn { background: #00f0ff; color: #000; border: none; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 25px; transition: 0.2s; }
        .modal-btn:hover { background: #ff00ff; color: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <audio id="bgMusic" src="./komuzakbakai.mp3" loop></audio>

    <div id="setup-layer">
        <div class="setup-container">
            <div class="setup-title">🪢 Аркан Тартыш: Мугалимдин Панели</div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px;">
                <div class="form-group">
                    <label>Сол команданын аты (Көк):</label>
                    <input type="text" id="leftTeamInput" class="form-input" value="Көк Танк">
                </div>
                <div class="form-group">
                    <label>Оң команданын аты (Кызыл):</label>
                    <input type="text" id="rightTeamInput" class="form-input" value="Кара Тулпар">
                </div>
            </div>

            <div class="form-group">
                <label>Сакталган даяр тесттер:</label>
                <div class="saved-tests-box" id="savedTestsList"></div>
            </div>

            <div class="form-group">
                <label>Тесттин мазмуну (Формат: Суроо | Вариант1 | Вариант2 | Вариант3 | Вариант4 | 0):</label>
                <textarea id="questionsTextArea" class="form-input"></textarea>
            </div>

            <div class="action-row">
                <input type="text" id="testNameInput" class="form-input" placeholder="Тестке ат бериңиз">
                <button class="btn-save" id="saveTestBtn">Тестти Сактоо 💾</button>
            </div>

            <button class="btn-start" id="startGameBtn">Оюнду Баштоо 🚀</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar interactive">
            <a class="btn-exit" href="../sections/test-games.html">← Чыгуу</a>
            <div class="score-box">
                <div><span id="leftTeamLabel" style="color: #00f0ff;">Сол</span>: <span id="leftScoreDisplay" style="font-weight:bold; color: #00f0ff;">0</span></div>
                <div style="color: #444;">|</div>
                <div><span id="rightTeamLabel" style="color: #ff0055;">Оң</span>: <span id="rightScoreDisplay" style="font-weight:bold; color: #ff0055;">0</span></div>
            </div>
        </div>

        <div class="duel-container interactive">
            <div class="quiz-side left-side">
                <div class="side-header">
                    <span id="leftSideName">Көк Команда</span>
                    <span id="leftProgress">Суроо: 1/25</span>
                </div>
                <div class="question-text" id="leftQuestionText">Жүктөлүүдө...</div>
                <div class="answers-grid" id="leftAnswersGrid"></div>
                <div class="waiting-overlay" id="leftWaitingOverlay">
                    <span>🏁 БАРДЫК ТЕСТ БҮТТҮ!</span>
                    <span style="font-size:0.9rem; color:#aaa; font-weight:normal; margin-top:8px;">Экинчи топту күтүңүз...</span>
                </div>
            </div>

            <div class="quiz-side right-side">
                <div class="side-header">
                    <span id="rightSideName">Кызыл Команда</span>
                    <span id="rightProgress">Суроо: 1/25</span>
                </div>
                <div class="question-text" id="rightQuestionText">Жүктөлүүдө...</div>
                <div class="answers-grid" id="rightAnswersGrid"></div>
                <div class="waiting-overlay" id="rightWaitingOverlay">
                    <span>🏁 БАРДЫК ТЕСТ БҮТТҮ!</span>
                    <span style="font-size:0.9rem; color:#aaa; font-weight:normal; margin-top:8px;">Экинчи топту күтүңүз...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-title" id="resultTitle">ЖЕҢИШ! 🎉</div>
            <p id="resultDesc" style="color: #ccc; line-height: 1.6; font-size: 1.1rem; margin-top: 15px; text-align: left;"></p>
            <button class="modal-btn" onclick="window.location.href='../sections/test-games.html'">Оюн бетине кайтуу</button>
        </div>
    </div>

    <script type="module" src="./js/game.js"></script>
</body>
</html>
