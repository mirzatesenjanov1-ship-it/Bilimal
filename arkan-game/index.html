<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аркан Тартыш — BilimAl</title>
    <style>
        /* Базалык Clean Code стилдери */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #0b0c10; color: #fff; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* 2.5D Графика тартылуучу негизги Canvas */
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); /* Убактылуу табият фону */
        }

        /* Окуучу үчүн UI интерфейс катмары */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* UI аркасындагы баскычтарга тоскоол болбошу үчүн */
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            pointer-events: auto;
        }

        .btn-exit {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn-exit:hover { background: #00f0ff; color: #000; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar">
            <button class="btn-exit" onclick="window.history.back()">← Артка</button>
            <h2 style="text-shadow: 0 2px 10px rgba(0,0,0,0.5);">Упай: <span id="scoreDisplay">0</span></h2>
        </div>
        </div>

    <script type="module" src="./js/game.js"></script>
</body>
</html>
