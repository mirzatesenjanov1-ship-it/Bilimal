<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аркан Тартыш: Күч Энергиясы — BiliMal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #050510; color: #fff; overflow: hidden; width: 100vw; height: 100vh; }
        
        #gameCanvas { display: block; width: 100%; height: 55%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Орнотуулар катмары (Setup Screen) */
        #setup-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: #070716; display: flex; justify-content: center; align-items: center; overflow-y: auto; padding: 20px; }
        .setup-container { background: rgba(15, 15, 40, 0.95); border: 2px solid #00f0ff; border-radius: 16px; padding: 30px; width: 750px; max-width: 100%; box-shadow: 0 0 30px rgba(0, 240, 255, 0.2); }
        .setup-title { font-size: 1.8rem; color: #00f0ff; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #aaa; font-weight: 600; }
        .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,240,255,0.3); padding: 12px; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; }
        .form-input:focus { border-color: #ff00ff; box-shadow: 0 0 10px rgba(255,0,255,0.3); }
        textarea.form-input { height: 140px; resize: none; font-family: monospace; font-size: 0.9rem; line-height: 1.5; }
        
        /* Жаңы кошулган Сакталган Тесттердин Тизмеси */
        .saved-tests-box { background: rgba(0, 0, 0, 0.4); border: 1px dashed rgba(0, 240, 255, 0.3); padding: 15px; border-radius: 10px; margin-bottom: 15px; max-height: 150px; overflow-y: auto; }
        .test-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 6px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .test-item:hover { background: rgba(0, 240, 255, 0.08); }
        .btn-select { background: #00f0ff; color: #000; border: none; padding: 5px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-delete { background: #ff0055; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.85rem; margin-left: 8px; }
        
        .action-row { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 15px; }
        .btn-save { background: transparent; border: 2px solid #ff00ff; color: #ff00ff; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #ff00ff; color: #fff; box-shadow: 0 0 15px rgba(255,0,255,0.4); }

        .btn-start { background: linear-gradient(90deg, #ff00ff, #7000ff); border: none; color: white; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1.2rem; transition: 0.3s; margin-top: 5px; }
        .btn-start:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 0, 255, 0.5); }
        .hint { font-size: 0.8rem; color: #7e8bbd; margin-top: 5px; line-height: 1.4; }

        /* Ички Оюн UI Катмары */
        #ui-layer { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; flex-direction: column; justify-content: space-between; }
        .interactive { pointer-events: auto; }
        
        /* Жогорку панель */
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 20px 30px; position: absolute; top: 0; left: 0; z-index: 15; }
        .btn-exit { background: rgba(255, 255, 255, 0.05); border: 2px solid #00f0ff; color: #00f0ff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .btn-exit:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px #00f0ff; }
        .score-box { background: rgba(0, 0, 0, 0.7); padding: 10px 25px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); font-size: 1.2rem; display: flex; gap: 20px; backdrop-filter: blur(5px); }
        
        /* Ылдыйкы Кош Катмарлуу Тест Панели */
        .duel-container { display: flex; width: 100%; height: 45%; position: absolute; bottom: 0; left: 0; background: rgba(5, 5, 15, 0.95); border-top: 3px solid #7000ff; z-index: 12; }
        
        .quiz-side { width: 50%; height: 100%; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .left-side { border-right: 2px dashed rgba(0, 240, 255, 0.3); }
        .right-side { border-left: 2px dashed rgba(255, 0, 85, 0.3); }

        .side-header { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .question-text { font-size: 1.1rem; font-weight: 600; line-height: 1.4; min-height: 50px; margin-bottom: 15px; }
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex-grow: 1; }
        
        .answer-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.15); color: #fff; padding: 12px; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.2s; text-align: left; display: flex; align-items: center; }
        
        .left-side .side-header { color: #00f0ff; }
        .left-side .answer-btn:hover { background: linear-gradient(90deg, #0055ff, #00f0ff); border-color: transparent; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
        
        .right-side .side-header { color: #ff0055; }
        .right-side .answer-btn:hover { background: linear-gradient(90deg, #ff0055, #ff00aa); border-color: transparent; box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); }

        .waiting-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 20, 0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; font-size: 1.4rem; font-weight: bold; color: #fff; z-index: 5; text-align: center; padding: 20px; }
        
        /* Финалдык терезе */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #0f0f2d; border: 3px solid #00f0ff; padding: 40px; border-radius: 20px; text-align: center; max-width: 500px; box-shadow: 0 0 30px rgba(0,240,255,0.3); }
        .modal-title { font-size: 2.2rem; font-weight: bold; margin-bottom: 15px; }
        .modal-btn { background: #00f0ff; color: #000; border: none; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .modal-btn:hover { background: #ff00ff; color: #fff; box-shadow: 0 0 15px #ff00ff; }
    </style>
</head>
<body>

    <div id="setup-layer">
        <div class="setup-container">
            <div class="setup-title">🪢 Аркан Тартыш: Мугалимдин Башкаруу Панели</div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px;">
                <div class="form-group">
                    <label>Сол команданын аты (Көк):</label>
                    <input type="text" id="leftTeamInput" class="form-input" value="Көк Танк">
                </div>
                <div class="form-group">
                    <label>Оң команданын аты (Кызыл):</label>
                    <input type="text" id="rightTeamInput" class="form-input" value="Кара Тулпар">
                </div>
            </div>

            <div class="form-group">
                <label>Сакталган даяр тесттердин тизмеси:</label>
                <div class="saved-tests-box" id="savedTestsList">
                    </div>
            </div>

            <div class="form-group">
                <label>Тесттин суроолору жана варианттары:</label>
                <textarea id="questionsTextArea" class="form-input" placeholder="Суроолорду ушул жерге жазыңыз же даяр тизмеден тандаңыз..."></textarea>
            </div>

            <div class="action-row">
                <input type="text" id="testNameInput" class="form-input" placeholder="Тестке ат бериңиз (Мисалы: 10-класс Оордук Күчү)">
                <button class="btn-save" id="saveTestBtn">Тестти Сактоо 💾</button>
            </div>

            <button class="btn-start" id="startGameBtn">Оюнду Баштоо 🚀</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar interactive">
            <button class="btn-exit" onclick="window.location.href='../sections/test-games.html'">← Чыгуу</button>
            <div class="score-box">
                <div><span id="leftTeamLabel" style="color: #00f0ff;">Сол</span>: <span id="leftScoreDisplay" style="font-weight:bold; color: #00f0ff;">0</span></div>
                <div style="color: #444;">|</div>
                <div><span id="rightTeamLabel" style="color: #ff0055;">Оң</span>: <span id="rightScoreDisplay" style="font-weight:bold; color: #ff0055;">0</span></div>
            </div>
        </div>

        <div class="duel-container interactive">
            
            <div class="quiz-side left-side" id="leftQuizSide">
                <div class="side-header">
                    <span id="leftSideName">Көк Команда</span>
                    <span id="leftProgress">Суроо: 1/25</span>
                </div>
                <div class="question-text" id="leftQuestionText">Жүктөлүүдө...</div>
                <div class="answers-grid" id="leftAnswersGrid"></div>
                <div class="waiting-overlay" id="leftWaitingOverlay">Жооптор кабыл алынды!</div>
            </div>

            <div class="quiz-side right-side" id="rightQuizSide">
                <div class="side-header">
                    <span id="rightSideName">Кызыл Команда</span>
                    <span id="rightProgress">Суроо: 1/25</span>
                </div>
                <div class="question-text" id="rightQuestionText">Жүктөлүүдө...</div>
                <div class="answers-grid" id="rightAnswersGrid"></div>
                <div class="waiting-overlay" id="rightWaitingOverlay">Жооптор кабыл алынды!</div>
            </div>

        </div>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-title" id="resultTitle">ЖЕҢИШ! 🎉</div>
            <p id="resultDesc" style="color: #aaa; line-height: 1.6; font-size: 1.1rem; margin-top: 15px;"></p>
            <button class="modal-btn" onclick="window.location.href='../sections/test-games.html'">Оюн бетине кайтуу</button>
        </div>
    </div>

    <script type="module" src="./js/game.js"></script>
</body>
</html>
