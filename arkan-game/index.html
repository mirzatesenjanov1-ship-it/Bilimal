<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аркан Тартыш: Күч Энергиясы — BiliMal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #050510; color: #fff; overflow: hidden; width: 100vw; height: 100vh; }
        
        #gameCanvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Орнотуулар катмары (Setup Screen) */
        #setup-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: #070716; display: flex; justify-content: center; align-items: center; overflow-y: auto; padding: 20px; }
        .setup-container { background: rgba(15, 15, 40, 0.95); border: 2px solid #00f0ff; border-radius: 16px; padding: 30px; width: 650px; max-width: 100%; box-shadow: 0 0 30px rgba(0, 240, 255, 0.2); }
        .setup-title { font-size: 1.8rem; color: #00f0ff; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #aaa; font-weight: 600; }
        .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,240,255,0.3); padding: 12px; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; }
        .form-input:focus { border-color: #ff00ff; box-shadow: 0 0 10px rgba(255,0,255,0.3); }
        textarea.form-input { height: 150px; resize: none; font-family: monospace; font-size: 0.9rem; }
        .btn-start { background: linear-gradient(90deg, #ff00ff, #7000ff); border: none; color: white; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1.2rem; transition: 0.3s; margin-top: 10px; }
        .btn-start:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 0, 255, 0.5); }
        .hint { font-size: 0.8rem; color: #7e8bbd; margin-top: 5px; line-height: 1.4; }

        /* Ички Оюн UI Катмары */
        #ui-layer { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; padding: 30px; flex-direction: column; justify-content: space-between; }
        .interactive { pointer-events: auto; }
        
        /* Жогорку панель */
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .btn-exit { background: rgba(255, 255, 255, 0.05); border: 2px solid #00f0ff; color: #00f0ff; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .btn-exit:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px #00f0ff; }
        .score-box { background: rgba(0, 0, 0, 0.6); padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); font-size: 1.1rem; display: flex; gap: 20px; }
        
        /* Суроолор жана Жооптор панели */
        .quiz-container { background: rgba(10, 10, 30, 0.85); border: 2px solid #7000ff; border-radius: 16px; padding: 25px; width: 650px; max-width: 90%; margin: 0 auto 20px auto; box-shadow: 0 10px 30px rgba(112, 0, 255, 0.3); backdrop-filter: blur(10px); transition: transform 0.3s ease-in-out; }
        .question-text { font-size: 1.2rem; font-weight: 600; text-align: center; margin-bottom: 20px; line-height: 1.5; color: #00f0ff; }
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .answer-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; text-align: left; }
        .answer-btn:hover { background: linear-gradient(90deg, #ff00ff, #7000ff); border-color: transparent; transform: scale(1.02); box-shadow: 0 0 15px rgba(255, 0, 255, 0.4); }
        
        /* Финалдык терезе */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #0f0f2d; border: 3px solid #00f0ff; padding: 40px; border-radius: 20px; text-align: center; max-width: 450px; box-shadow: 0 0 30px rgba(0,240,255,0.3); }
        .modal-title { font-size: 2rem; font-weight: bold; margin-bottom: 15px; }
        .modal-btn { background: #00f0ff; color: #000; border: none; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .modal-btn:hover { background: #ff00ff; color: #fff; box-shadow: 0 0 15px #ff00ff; }
    </style>
</head>
<body>

    <div id="setup-layer">
        <div class="setup-container">
            <div class="setup-title">🪢 Аркан Тартыш: Оюн Баштоо</div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Сол команданын аты (Сиз):</label>
                    <input type="text" id="leftTeamInput" class="form-input" value="Көк Танк">
                </div>
                <div class="form-group">
                    <label>Оң команданын аты:</label>
                    <input type="text" id="rightTeamInput" class="form-input" value="Кара Тулпар">
                </div>
            </div>

            <div class="form-group">
                <label>Мугалимдин тесттерин киргизиңиз (Ар бир суроо жаңы саптан):</label>
                <textarea id="questionsTextArea" class="form-input" placeholder="Суроо шаблон форматы төмөндөгүдөй болуш керек..."></textarea>
                <div class="hint">
                    Формат: <b>Суроо текста | Вариант1 | Вариант2 | Вариант3 | Вариант4 | Туура жооптун индекси (0-3)</b><br>
                    Каалаганча суроо (мисалы 25 суроо) кошсоңуз болот. Баары жаңы саптан жазылат.
                </div>
            </div>

            <button class="btn-start" id="startGameBtn">Оюнду баштаар</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar interactive">
            <button class="btn-exit" onclick="window.location.href='../sections/test-games.html'">← Чыгуу</button>
            <div class="score-box">
                <div><span id="leftTeamLabel" style="color: #00f0ff;">Сол</span>: <span id="leftScoreDisplay" style="font-weight:bold;">0</span></div>
                <div style="color: #555;">|</div>
                <div><span id="rightTeamLabel" style="color: #ff0055;">Оң</span>: <span id="rightScoreDisplay" style="font-weight:bold;">0</span></div>
            </div>
        </div>

        <div class="quiz-container interactive" id="quizContainer">
            <div class="question-text" id="questionText">Суроо...</div>
            <div class="answers-grid" id="answersGrid"></div>
        </div>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-title" id="resultTitle">ЖЕҢИШ! 🎉</div>
            <p id="resultDesc" style="color: #aaa; line-height: 1.6; font-size: 1.1rem; margin-top: 15px;"></p>
            <button class="modal-btn" onclick="window.location.href='../sections/test-games.html'">Оюн бетине кайтуу</button>
        </div>
    </div>

    <script type="module" src="./js/game.js"></script>
</body>
</html>
