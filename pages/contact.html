<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Байланыш — BiliMal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #020208; color: #fff; min-height: 100vh; padding: 40px 5%; line-height: 1.6; }
        .container { max-width: 700px; margin: 0 auto; background: rgba(12, 12, 28, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .back-btn { display: inline-block; padding: 8px 16px; background: rgba(0, 240, 255, 0.1); border: 1px solid #00f0ff; color: #00f0ff; border-radius: 6px; text-decoration: none; font-weight: bold; margin-bottom: 30px; transition: 0.3s; font-size: 0.9rem; }
        .back-btn:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px rgba(0,240,255,0.3); }
        h1 { color: #00f0ff; font-size: 2rem; margin-bottom: 20px; border-bottom: 2px solid rgba(0, 240, 255, 0.2); padding-bottom: 15px; }
        .contact-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .method-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; text-align: center; transition: 0.3s; }
        .method-card:hover { border-color: #ff00ff; background: rgba(255,255,255,0.05); }
        .method-icon { font-size: 2rem; margin-bottom: 10px; }
        .method-title { font-weight: bold; color: #a5b4fc; margin-bottom: 5px; }
        .method-value { color: #fff; font-size: 0.95rem; text-decoration: none; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #94a3b8; font-size: 0.9rem; margin-bottom: 8px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; outline: none; transition: 0.3s; }
        .form-group input:focus, .form-group textarea:focus { border-color: #00f0ff; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
        button { width: 100%; background: linear-gradient(90deg, #00f0ff, #7000ff); border: none; padding: 14px; border-radius: 8px; color: #fff; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 25px rgba(0, 240, 255, 0.5); transform: translateY(-2px); }
        footer { margin-top: 30px; text-align: center; color: #64748b; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-btn">← Башкы бетке кайтуу</a>
    
    <h1>Байланышуу борбору</h1>
    
    <div class="contact-methods">
        <div class="method-card">
            <div class="method-icon">📧</div>
            <div class="method-title">Электрондук почта</div>
            <a href="mailto:info@bilimal.org" class="method-value">info@bilimal.org</a>
        </div>
        <div class="method-card">
            <div class="method-icon">💬</div>
            <div class="method-title">WhatsApp Колдоо</div>
            <a href="https://wa.me/996556400477" target="_blank" class="method-value">+996 556 400 477</a>
        </div>
    </div>

    <h2 style="color: #a5b4fc; font-size: 1.2rem; margin-bottom: 15px;">Сунуш же сурооңуз барбы? Кат жазыңыз:</h2>
    
    <form onsubmit="sendFeedback(event)">
        <div class="form-group">
            <label>Атыңыз</label>
            <input type="text" id="contact-name" placeholder="Атыңызды киргизиңиз" required>
        </div>
        <div class="form-group">
            <label>Почтаңыз же Телефонуңуз</label>
            <input type="text" id="contact-info" placeholder="Байланыш маалыматыңыз" required>
        </div>
        <div class="form-group">
            <label>Катыңыздын мазмуну</label>
            <textarea id="contact-message" rows="5" placeholder="Бул жерге жазыңыз..." required></textarea>
        </div>
        <button type="submit">Жөнөтүү 🚀</button>
    </form>

    <footer>
        &copy; 2026 BiliMal.org — Каттар 24 сааттын ичинде каралат.
    </footer>
</div>

<script>
    function sendFeedback(e) {
        e.preventDefault();
        alert('Рахмат! Сиздин билдирүүңүз кабыл алынды. Жакын арада байланышабыз.');
        document.getElementById('contact-name').value = '';
        document.getElementById('contact-info').value = '';
        document.getElementById('contact-message').value = '';
    }
</script>

</body>
</html>
