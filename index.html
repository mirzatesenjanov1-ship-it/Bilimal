<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilimAl — Физика Дүйнөсү</title>
    <style>
        /* Башкы беттин негизги стилдери */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #050510;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            /* Скролл иштеши үчүн overflow касиети туураланды */
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        /* Космос фону толугу менен арткы планда бекитилди */
        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
        }

        /* Башкы беттин негизги мазмуну үчүн контейнер (эгер кошумча элементтер болсо) */
        .main-content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 80vh; /* Квест баннери ылдый түшүшү үчүн боштук */
            box-sizing: border-box;
        }

        /* Квест баннери эми так ушул стилдин негизинде беттин эң этегинде жайгашат */
        #quest-banner-container {
            position: relative;
            z-index: 20; 
            width: 100%;
            max-width: 1200px;
            margin: 50px auto 30px auto; /* Өйдө жагынан боштук таштап, этегине түшүрөт */
            padding: 0 20px;
            box-sizing: border-box;
            clear: both;
        }

        /* Модалдык терезелер үчүн туруктуу стиль */
        .modal-overlay {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(5, 5, 15, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; 
        }
        
        .modal-content {
            background: #101025; 
            padding: 40px; 
            border-radius: 16px; 
            border: 2px solid #00f0ff; 
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            max-width: 400px;
            width: 90%;
            z-index: 10000;
        }

        .modal-content input {
            margin: 10px 0; 
            padding: 12px; 
            width: 100%; 
            box-sizing: border-box;
            background: #1a1a35;
            border: 1px solid #333366;
            color: #fff;
            border-radius: 6px;
        }

        .modal-content button {
            padding: 12px 24px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            border-radius: 6px;
            margin: 5px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <div class="main-content-wrapper">
        </div>

    <div id="quest-banner-container"></div>

    <div id="login-modal" class="modal-overlay" style="display: flex;">
        <div class="modal-content">
            <h2>BilimAl долбооруна кош келиңиз!</h2>
            <input type="email" id="email-input" placeholder="Электрондук почта (Email)">
            <input type="password" id="password-input" placeholder="Пароль (кеминде 6 белги)">
            <br>
            <label style="font-size: 13px; display: block; margin: 10px 0; cursor: pointer;">
                <input type="checkbox" id="policy-checkbox" style="width: auto; margin-right: 5px;"> Купуялык саясатына макулмун
            </label>
            <button onclick="loginUser()" style="background: #00f0ff; color: #000;">Кирүү</button>
            <button onclick="loginAsGuest()" style="background: #333355; color: #fff;">Конок катары кирүү</button>
        </div>
    </div>

    <div id="story-modal" class="modal-overlay" style="display: none;"></div>

    <script>
        // --- ГЛОБАЛДЫК ӨЗГӨРМӨЛӨРДҮ АНЫКТОО ---
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');

        let bhRotation = 0;
        const BH_OFFSET_X = 0.75; 
        const BH_OFFSET_Y = 0.4;

        let starsLayer1 = [], starsLayer2 = [], starsLayer3 = [];
        let dustClouds = [];
        let atoms = [{ x: 200, y: 300, r: 40, angle: 0 }, { x: 450, y: 150, r: 50, angle: 1 }];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initSpaceObjects();
        }

        function initSpaceObjects() {
            starsLayer1 = []; starsLayer2 = []; starsLayer3 = []; dustClouds = [];
            for(let i=0; i<40; i++) {
                starsLayer1.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, speed: 0.1, radius: 0.8, alpha: Math.random(), twinkleSpeed: 0.005, twinkleDir: 1, isStatic: false });
                starsLayer2.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, speed: 0.2, radius: 1.2, alpha: Math.random(), twinkleSpeed: 0.01, twinkleDir: 1, isStatic: false });
                starsLayer3.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, speed: 0.4, radius: 1.8, alpha: Math.random(), twinkleSpeed: 0.02, twinkleDir: 1, isStatic: true });
            }
            for(let i=0; i<5; i++) {
                dustClouds.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    radius: Math.random()*150 + 100, vx: (Math.random() - 0.5) * 0.2,
                    color: 'rgba(100, 30, 200, ', alpha: Math.random() * 0.05 + 0.02
                });
            }
        }

        function renderStars(layer, baseBrightness) {
            ctx.fillStyle = baseBrightness;
            layer.forEach(star => {
                star.x -= star.speed;
                if (star.x < 0) star.x = canvas.width;
                if (!star.isStatic) {
                    star.alpha += star.twinkleSpeed * star.twinkleDir;
                    if (star.alpha >= 1) { star.alpha = 1; star.twinkleDir = -1; }
                    else if (star.alpha <= 0.1) { star.alpha = 0.1; star.twinkleDir = 1; }
                }
                ctx.globalAlpha = star.alpha;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }

        function renderNebula() {
            dustClouds.forEach(dust => {
                dust.x += dust.vx;
                if (dust.x < -dust.radius) dust.x = canvas.width + dust.radius;
                if (dust.x > canvas.width + dust.radius) dust.x = -dust.radius;

                let grad = ctx.createRadialGradient(dust.x, dust.y, 0, dust.x, dust.y, dust.radius);
                grad.addColorStop(0, dust.color + dust.alpha + ')');
                grad.addColorStop(1, 'rgba(0,0,0,0)');

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(dust.x, dust.y, dust.radius, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function renderAstrophysicalBlackHole(x, y) {
            bhRotation += 0.005; 
            const bhRadius = Math.min(canvas.width, canvas.height) * 0.07; 

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-12 * Math.PI / 180 + bhRotation); 
            
            let diskGrad = ctx.createLinearGradient(-bhRadius * 4, 0, bhRadius * 4, 0);
            diskGrad.addColorStop(0, 'rgba(255, 90, 20, 0.1)');  
            diskGrad.addColorStop(0.3, 'rgba(255, 160, 50, 0.6)'); 
            diskGrad.addColorStop(0.7, 'rgba(180, 240, 255, 0.9)'); 
            diskGrad.addColorStop(1, 'rgba(100, 200, 255, 0.2)');

            ctx.beginPath();
            ctx.ellipse(0, 0, bhRadius * 3.5, bhRadius * 0.8, 0, Math.PI, Math.PI * 2);
            ctx.lineWidth = bhRadius * 0.5;
            ctx.strokeStyle = diskGrad;
            ctx.stroke();

            let innerDiskGrad = ctx.createLinearGradient(-bhRadius * 2.5, 0, bhRadius * 2.5, 0);
            innerDiskGrad.addColorStop(0, 'rgba(0,0,0,0)');
            innerDiskGrad.addColorStop(0.8, 'rgba(255, 255, 255, 0.7)'); innerDiskGrad.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.beginPath();
            ctx.ellipse(0, 0, bhRadius * 2.5, bhRadius * 0.4, 0, Math.PI, Math.PI * 2);
            ctx.lineWidth = bhRadius * 0.2;
            ctx.strokeStyle = innerDiskGrad;
            ctx.stroke();
            ctx.restore();

            let ringGrad = ctx.createRadialGradient(x, y, bhRadius * 0.95, x, y, bhRadius * 1.8);
            ringGrad.addColorStop(0, '#000000');
            ringGrad.addColorStop(0.08, 'rgba(255, 255, 255, 0.9)'); 
            ringGrad.addColorStop(0.2, 'rgba(255, 140, 50, 0.5)');  
            ringGrad.addColorStop(0.7, 'rgba(50, 20, 80, 0.15)');
            ringGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = ringGrad;
            ctx.beginPath();
            ctx.arc(x, y, bhRadius * 1.8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(x, y, bhRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-12 * Math.PI / 180 + bhRotation); 
            
            ctx.beginPath();
            ctx.ellipse(0, 0, bhRadius * 3.5, bhRadius * 0.8, 0, 0, Math.PI);
            ctx.lineWidth = bhRadius * 0.5;
            ctx.strokeStyle = diskGrad;
            ctx.stroke();

            ctx.beginPath();
            ctx.ellipse(0, 0, bhRadius * 2.5, bhRadius * 0.4, 0, 0, Math.PI);
            ctx.lineWidth = bhRadius * 0.2;
            ctx.strokeStyle = innerDiskGrad;
            ctx.stroke();
            ctx.restore();
        }

        function drawAtom(atom) {
            atom.angle += 0.02;
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(atom.x, atom.y, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = 'rgba(0, 240, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.save();
            ctx.translate(atom.x, atom.y);
            ctx.rotate(Math.PI / 4);
            ctx.beginPath();
            ctx.ellipse(0, 0, atom.r, atom.r / 2, 0, 0, Math.PI * 2);
            ctx.stroke();
            
            let e1x = atom.r * Math.cos(atom.angle);
            let e1y = (atom.r / 2) * Math.sin(atom.angle);
            ctx.fillStyle = '#00f0ff';
            ctx.beginPath();
            ctx.arc(e1x, e1y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            ctx.save();
            ctx.translate(atom.x, atom.y);
            ctx.rotate(-Math.PI / 4);
            ctx.beginPath();
            ctx.ellipse(0, 0, atom.r, atom.r / 2, 0, 0, Math.PI * 2);
            ctx.stroke();
            
            let e2x = atom.r * Math.cos(-atom.angle * 1.2);
            let e2y = (atom.r / 2) * Math.sin(-atom.angle * 1.2);
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(e2x, e2y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            renderNebula();
            renderStars(starsLayer1, '#777777'); 
            renderStars(starsLayer2, '#bbbbbb'); 
            renderStars(starsLayer3, '#ffffff'); 

            let bhX = canvas.width * BH_OFFSET_X;
            let bhY = canvas.height * BH_OFFSET_Y;
            renderAstrophysicalBlackHole(bhX, bhY);

            atoms.forEach(atom => drawAtom(atom));
            requestAnimationFrame(animate);
        }

        // --- БРАУЗЕР ОКУЯЛАРЫ ЖАНА АВТОРИЗАЦИЯ ЛОГИКАСЫ ---
        window.addEventListener('resize', resizeCanvas);
        
        window.addEventListener('DOMContentLoaded', () => {
            resizeCanvas();
            animate();
            
            // Квест баннерин коопсуз жүктөө
            fetch('sections/quest-banner.html')
                .then(response => {
                    if (!response.ok) throw new Error('Баннер файлы серверден табылган жок');
                    return response.text();
                })
                .then(data => {
                    document.getElementById('quest-banner-container').innerHTML = data;
                })
                .catch(err => console.error('Квест баннерин жүктөөдө ката чыкты:', err));
            
            // Авторизацияны текшерүү
            const userEmail = localStorage.getItem('bilimal_user_email');
            const userPass = localStorage.getItem('bilimal_user_pass');
            
            if (userEmail && userPass) {
                document.getElementById('login-modal').style.display = 'none';
                checkStoryStatus();
            }
        });

        function loginUser() {
            const emailInput = document.getElementById('email-input').value;
            const passwordInput = document.getElementById('password-input').value;
            const policyCheckbox = document.getElementById('policy-checkbox').checked;
            
            if (!policyCheckbox) {
                alert('Сураныч, Купуялык саясатынын шарттарына макулдугуңузду билдириңиз!');
                return;
            }

            if (emailInput.includes('@') && emailInput.includes('.') && passwordInput.length >= 6) {
                localStorage.setItem('bilimal_user_email', emailInput);
                localStorage.setItem('bilimal_user_pass', passwordInput);
                localStorage.setItem('bilimal_user_role', 'user');
                
                document.getElementById('login-modal').style.display = 'none';
                alert('Кош келиңиз! Ийгиликтүү кирдиңиз.');
                checkStoryStatus();
            } else if (passwordInput.length < 6) {
                alert('Пароль кеминде 6 белгиден турушу керек!');
            } else {
                alert('Сураныч, туура электрондук почта жазыңыз.');
            }
        }

        function loginAsGuest() {
            localStorage.setItem('bilimal_user_email', 'guest@bilimal.org');
            localStorage.setItem('bilimal_user_pass', 'guest12345');
            localStorage.setItem('bilimal_user_role', 'guest'); 
            
            document.getElementById('login-modal').style.display = 'none';
            alert('Конок режими ийгиликтүү иштетилди! Бардык мазмун ачык.');
            checkStoryStatus();
        }

        function checkStoryStatus() {
            const storySeen = localStorage.getItem('bilimal_story_seen');
            if (!storySeen) {
                fetch('sections/quest-intro.html')
                    .then(response => {
                        if (!response.ok) throw new Error('Окуя файлы табылбады');
                        return response.text();
                    })
                    .then(data => {
                        const modal = document.getElementById('story-modal');
                        modal.innerHTML = data;
                        modal.style.display = 'flex';
                        document.body.style.overflow = 'hidden';
                    })
                    .catch(err => console.error('Окуяны жүктөөдө ката:', err));
            }
        }

        function startQuestJourney() {
            localStorage.setItem('bilimal_story_seen', 'true');
            document.getElementById('story-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
            alert('Саякат башталды! Сизге 1-деңгээлдеги Механика Өрөөнү ачылды! 🚀');
        }
    </script>

    <script src="https://pl30202824.effectivecpmnetwork.com/2a/5b/af/2a5bafd419add82a1af8ec0def99355.js"></script>

</body>
