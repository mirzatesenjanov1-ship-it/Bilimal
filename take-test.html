<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест тапшыруу | Mugalim.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: 0.3s; }
        .option-btn:hover { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
        .option-btn.selected { background: #3b82f6; color: white; border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <!-- Тесттин башы -->
        <div id="test-intro" class="text-center mb-10">
            <h1 id="display-test-title" class="text-3xl font-black mb-2 text-blue-400 uppercase tracking-tighter">Жүктөлүүдө...</h1>
            <p id="display-test-info" class="text-gray-400">Суроолор даярдалып жатат...</p>
        </div>

        <!-- Тест суроолорунун контейнери -->
        <div id="quiz-container"></div>

        <!-- Жыйынтык баскычы -->
        <div class="mt-10 text-center">
            <button id="finish-btn" onclick="calculateResult()" class="hidden bg-green-600 text-white px-10 py-4 rounded-2xl font-black hover:bg-green-500 transition shadow-lg shadow-green-600/20">
                ТЕСТТИ АЯКТОО
            </button>
        </div>

        <!-- Жыйынтык терезеси -->
        <div id="result-modal" class="hidden glass-card fixed inset-0 z-50 flex items-center justify-center p-6">
            <div class="bg-[#0f172a] p-10 rounded-[3rem] border border-blue-500/30 text-center max-w-sm w-full">
                <h2 class="text-2xl font-black mb-4">Сиздин жыйынтыгыңыз:</h2>
                <div id="score-display" class="text-6xl font-black text-blue-500 mb-6">0/0</div>
                <button onclick="window.location.href='index.html'" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Башкы бетке кайтуу</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Сиздин Firebase конфигурацияңыз (bilimal.org)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.firebaseio.com",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentQuestions = [];
        let userAnswers = {};

        // Тестти базадан алуу (Мисалы, URL'деги ID аркылуу)
        function loadTest() {
            // Убактылуу тестти класс боюнча издөө (кийин ID'ге алмаштырса болот)
            database.ref('tests').once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    // Биринчи табылган тестти алабыз (мисал катары)
                    const firstTeacher = Object.keys(data)[0];
                    const firstTestId = Object.keys(data[firstTeacher])[0];
                    const test = data[firstTeacher][firstTestId];

                    document.getElementById('display-test-title').innerText = test.title;
                    document.getElementById('display-test-info').innerText = test.class + "-класс | Автор: " + test.author;
                    
                    currentQuestions = test.questions;
                    renderQuestions();
                }
            });
        }

        function renderQuestions() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = "";
            
            currentQuestions.forEach((q, index) => {
                let optionsHtml = "";
                q.options.forEach((opt, optIndex) => {
                    optionsHtml += `
                        <div class="option-btn p-4 rounded-xl mb-2 flex items-center gap-3" 
                             onclick="selectOption(${index}, ${optIndex}, this)">
                            <div class="w-6 h-6 border-2 border-blue-500 rounded-full flex items-center justify-center text-[10px]">
                                ${['А', 'Б', 'В', 'Г'][optIndex]}
                            </div>
                            <span>${opt}</span>
                        </div>
                    `;
                });

                container.innerHTML += `
                    <div class="glass-card p-6 rounded-3xl mb-6">
                        <p class="text-sm font-bold text-blue-500 mb-2">СУРОО ${index + 1}</p>
                        <h3 class="text-xl font-bold mb-6">${q.qText}</h3>
                        ${optionsHtml}
                    </div>
                `;
            });
            document.getElementById('finish-btn').classList.remove('hidden');
        }

        function selectOption(qIdx, optIdx, element) {
            // Мурунку тандоону алып салуу
            const parent = element.parentElement;
            parent.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            
            // Жаңысын кошуу
            element.classList.add('selected');
            userAnswers[qIdx] = optIdx;
        }

        function calculateResult() {
            let score = 0;
            currentQuestions.forEach((q, index) => {
                if (userAnswers[index] == q.correct) {
                    score++;
                }
            });

            document.getElementById('score-display').innerText = `${score} / ${currentQuestions.length}`;
            document.getElementById('result-modal').classList.remove('hidden');
        }

        window.onload = loadTest;
    </script>
</body>
</html>
