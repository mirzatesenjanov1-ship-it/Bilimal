<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кванттык Тест Борбору — BiliMal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; }
        body { background: #050512; color: #fff; min-height: 100vh; padding: 20px 5%; }
        
        .test-window { max-width: 750px; margin: 30px auto; background: rgba(10,10,30,0.8); border: 2px solid rgba(0, 240, 255, 0.2); border-radius: 15px; padding: 30px; box-shadow: 0 0 30px rgba(0,240,255,0.1); position: relative; }
        
        /* Anti-Cheat v3 Эскертүү панели */
        .anticheat-statusbar { display: flex; justify-content: space-between; background: rgba(255, 0, 0, 0.1); border: 1px solid #ff0055; padding: 10px 15px; border-radius: 8px; margin-bottom: 25px; color: #ff3366; font-size: 0.9rem; font-weight: bold; }
        
        .question-title { font-size: 1.3rem; margin-bottom: 20px; color: #00f0ff; line-height: 1.4; }
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        
        .option-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option-item:hover { background: rgba(0, 240, 255, 0.08); border-color: #00f0ff; }
        .option-item.selected { background: rgba(255, 0, 255, 0.15); border-color: #ff00ff; }
        
        .nav-buttons { display: flex; justify-content: space-between; }
        .btn-nav { background: #7000ff; border: none; color: white; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-nav:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px #00f0ff; }
        
        .result-screen { text-align: center; padding: 40px 20px; display: none; }
        .score-text { font-size: 3rem; font-weight: 900; color: #ff00ff; margin: 20px 0; text-shadow: 0 0 20px #ff00ff; }
    </style>
</head>
<body>

    <div class="test-window">
        <!-- ANTI-CHEAT V3 БАРЫ -->
        <div class="anticheat-statusbar">
            <span>🛡️ ANTI-CHEAT V3 АКТИВДҮҮ</span>
            <span id="warning-counter">Эскертүүлөр: 0 / 3</span>
        </div>

        <!-- ТЕСТ ИНТЕРФЕЙСИ -->
        <div id="quiz-box">
            <div class="question-title" id="question-text">Суроо жүктөлүүдө...</div>
            <div class="options-list" id="options-container">
                <!-- Варианттар динамикалык түрдө кошулат -->
            </div>
            <div class="nav-buttons">
                <span style="color: #626c93; align-self: center;" id="progress-text">Суроо: 1/2</span>
                <button class="btn-nav" id="next-btn" onclick="nextQuestion()">Кийинки суроо →</button>
            </div>
        </div>

        <!-- ЖЫЙЫНТЫК ЭКРАНЫ -->
        <div class="result-screen" id="result-box">
            <h2>Тест аяктады!</h2>
            <p>Сиздин кванттык көрсөткүчүңүз:</p>
            <div class="score-text" id="score-display">0 / 0</div>
            <p id="cheat-notice" style="color: #ff3366; font-size: 0.9rem; margin-top: 10px;"></p>
            <button class="btn-nav" style="margin-top: 20px;" onclick="location.href='../../dashboard.html'">Панелге кайтуу</button>
        </div>
    </div>

    <!-- --- СУРООЛОР ЖАНА АНТИ-ЧИТ СКРИПТИ --- -->
    <script>
        // 1. ТЕСТТИК МААЛЫМАТТАР (10-класс Физика)
        const quizData = [
            {
                question: "Чынжырдын бөлүгү үчүн Омдун законунун формуласы кандай көрсөтүлөт?",
                options: ["$I = \frac{U}{R}$", "$R = \frac{I}{U}$", "$P = U \cdot I$", "$A = F \cdot s$"],
                correct: 0
            },
            {
                question: "Идеалдык газдын абалынын теңдемесин (Менделеев-Клапейрон теңдемеси) тапкыла.",
                options: ["$F = m \cdot a$", "$p \cdot V = \nu \cdot R \cdot T$", "$E = m \cdot c^2$", "$I = \frac{q}{t}$"],
                correct: 1
            }
        ];

        let currentQuestionIdx = 0;
        let score = 0;
        let selectedOptionIdx = null;

        function loadQuestion() {
            selectedOptionIdx = null;
            const currentData = quizData[currentQuestionIdx];
            document.getElementById("question-text").innerText = currentData.question;
            document.getElementById("progress-text").innerText = `Суроо: ${currentQuestionIdx + 1} / ${quizData.length}`;
            
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            
            currentData.options.forEach((option, idx) => {
                const div = document.createElement("div");
                div.className = "option-item";
                div.innerText = option;
                div.onclick = () => selectOption(div, idx);
                container.appendChild(div);
            });
        }

        function selectOption(element, idx) {
            const items = document.querySelectorAll(".option-item");
            items.forEach(item => item.classList.remove("selected"));
            element.classList.add("selected");
            selectedOptionIdx = idx;
        }

        function nextQuestion() {
            if (selectedOptionIdx === null) {
                alert("Сураныч, бир вариантты тандаңыз!");
                return;
            }
            if (selectedOptionIdx === quizData[currentQuestionIdx].correct) {
                score++;
            }
            
            currentQuestionIdx++;
            if (currentQuestionIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults(false);
            }
        }

        function showResults(cheated = false) {
            document.getElementById("quiz-box").style.display = "none";
            document.getElementById("result-box").style.display = "block";
            if (cheated) {
                document.getElementById("score-display").innerText = "0";
                document.getElementById("cheat-notice").innerText = "⚠️ ШПАРГАЛКА КОЛДОНУУ: Башка терезеге өткөндүгүңүз үчүн жыйынтык жокко чыгарылды!";
            } else {
                document.getElementById("score-display").innerText = `${score} / ${quizData.length}`;
            }
        }

        loadQuestion();

        /* ========================================================
           2. ANTI-CHEAT СИСТЕМА v3 (Акылдуу бөгөттөө жана Таб текшерүү)
           ======================================================== */
        let cheatWarnings = 0;

        // Эгер колдонуучу башка табга өтсө же браузерди кичирейтсе (Шпаргалка издесе)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                cheatWarnings++;
                document.getElementById("warning-counter").innerText = `Эскертүүлөр: ${cheatWarnings} / 3`;
                alert("⚠️ ЭСКЕРТҮҮ! Тест учурунда башка бетке өтүүгө тыюу салынат! Кийинкисинде тест жабылат.");
                
                if (cheatWarnings >= 3) {
                    showResults(true); // Тестти дароо нөл упай менен бүтүрүү
                }
            }
        });

        // Классикалык бөгөттөөлөр (Оң баскыч, Код көрүү, Көчүрүү)
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || 
               (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 67)) || 
               (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 67 || e.keyCode === 83))) {
                e.preventDefault();
                alert("🔒 Бул бет корголгон! Аракет бөгөттөлдү.");
                return false;
            }
        });
    </script>
</body>
</html>
