<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiliMal.org — Кванттык жана Космостук илимдер порталы</title>
    
    <style>
        /* --- КВАНТТЫК ЖАНА КОСМОСТУК СТИЛДЕР (Theme Cosmic) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none; /* Текстти белгилөөгө тыюу салуу (Anti-cheat) */
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510; /* Терең космостук кара түс */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* Анимациялуу фон үчүн Canvas */
        #quantum-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Жогорку Google AdSense Рекламалык Блок орду */
        .ads-top-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 728px;
            height: 90px;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(0, 240, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
        }
        .ads-label {
            position: absolute;
            top: -10px;
            left: 10px;
            font-size: 10px;
            color: rgba(0, 240, 255, 0.5);
            background: #050510;
            padding: 0 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Борбордук Сүрдүү жана Кооз Кирүү Карточкасы (Glassmorphism) */
        .login-universe-container {
            position: relative;
            z-index: 10;
            background: rgba(10, 10, 30, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(0, 240, 255, 0.25);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.15), 0 0 15px rgba(255, 0, 255, 0.1);
            transition: all 0.5s ease;
        }

        .login-universe-container:hover {
            border-color: rgba(255, 0, 255, 0.5);
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.25);
        }

        /* Логотип жана Башкы Сүрдүү Жазуулар */
        .portal-logo {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #00f0ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .portal-subtitle {
            font-size: 0.95rem;
            color: #8fa0dd;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Киргизүү Ирегеси (Form Inputs) */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(0, 240, 255, 0.2);
            outline: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .input-field:focus {
            border-color: #00f0ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* Космостук Импульстуу Баскыч */
        .btn-portal-enter {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #00f0ff, #7000ff);
            border: none;
            outline: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(112, 0, 255, 0.4);
        }

        .btn-portal-enter:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.6);
            background: linear-gradient(90deg, #7000ff, #ff00ff);
        }

        .btn-portal-enter:active {
            transform: translateY(1px);
        }

        /* Төмөнкү маалыматтык билдирүү */
        .info-notice {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #626c93;
            line-height: 1.4;
        }

        /* Төмөнкү Google AdSense Рекламалык Блок орду */
        .ads-bottom-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 728px;
            height: 90px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 0, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <canvas id="quantum-canvas"></canvas>

    <div class="ads-top-container">
        <span class="ads-label">Google AdSense Реклама</span>
        </div>

    <div class="login-universe-container">
        <div class="portal-logo">BILIMAL</div>
        <div class="portal-subtitle">Кванттык билим берүү порталы</div>
        
        <form id="authForm">
            <div class="input-group">
                <input type="email" id="userEmail" class="input-field" placeholder="Электрондук почтаңызды жазыңыз" required autocomplete="off">
            </div>
            <button type="submit" class="btn-portal-enter">ПОРТАЛГА КИРҮҮ</button>
        </form>

        <div class="info-notice">
            Платформага кирүү үчүн почтаңызды жазыңыз. Сабактын пландары жана оюн-тесттер сыяктуу премиум материалдар МБанк аркылуу кошулат.
        </div>
    </div>

    <div class="ads-bottom-container">
        <span class="ads-label">Google AdSense Реклама</span>
        </div>


    <script>
        /* ========================================================
           1. КВАНТТЫК БӨЛҮКЧӨЛӨР АНИМАЦИЯСЫ (Quantum Particles Engine)
           ======================================================== */
        const canvas = document.getElementById('quantum-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        const numberOfParticles = 85; // Бөлүкчөлөрдүн саны (Оптималдуу)

        // Экран өлчөмүнө ылайыктоо
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Бөлүкчөнүн объектиси
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1; // Өлчөмү
                this.speedX = (Math.random() - 0.5) * 1.2; // Кванттык хаостук ылдамдык
                this.speedY = (Math.random() - 0.5) * 1.2;
                this.color = Math.random() > 0.5 ? '#00f0ff' : '#ff00ff'; // Көк же Кызгылт кванттар
            }
            // Жаңыртуу
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Экрандан чыгып кетсе кайра кайтаруу
                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }
            // Чийүү
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Бөлүкчөлөр массивдерин түзүү
        function init() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // Бөлүкчөлөрдүн ортосундагы кванттык байланыштарды (сызыктарды) чийүү
        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    // Эгер эки бөлүкчө жакын болсо, ортосуна сызык чийилет (Энергия торчосу)
                    if (distance < 120) {
                        opacityValue = 1 - (distance / 120);
                        ctx.strokeStyle = particlesArray[a].color === '#00f0ff' 
                            ? `rgba(0, 240, 255, ${opacityValue * 0.25})` 
                            : `rgba(255, 0, 255, ${opacityValue * 0.25})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Анимация циклы
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Космостук караңгы фонду сактоо
            ctx.fillStyle = 'rgba(5, 5, 16, 0.3)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connectParticles();
            requestAnimationFrame(animate);
        }

        init();
        animate();


        /* ========================================================
           2. АУТЕНТИФИКАЦИЯ (Локалык логика - кийин Firebase кошулат)
           ======================================================== */
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('userEmail').value.trim().toLowerCase();

            if (email) {
                // Почтаны сактап, ички негизги бетке (dashboard.html) багыттайбыз
                localStorage.setItem('bilimal_user_email', email);
                
                alert("Кванттык мейкиндикке кирүү аткарылууда: " + email);
                window.location.href = 'dashboard.html'; 
            }
        </script>

        <script>
            // Маウス оң баскычын бөгөттөө (Контексттик менюну жабуу)
            document.addEventListener('contextmenu', event => event.preventDefault());

            // Клавиатурадагы кооптуу комбинацияларды бөгөттөө (F12, Ctrl+Shift+I, Ctrl+U, Ctrl+C)
            document.addEventListener('keydown', function(e) {
                // F12 баскычы
                if (e.keyCode === 123) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+I (Изучить код) же Ctrl+Shift+C
                if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 67)) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+U (Просмотр кода страницы)
                if (e.ctrlKey && e.keyCode === 85) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+C (Копировать)
                if (e.ctrlKey && e.keyCode === 67) {
                    e.preventDefault();
                    return false;
                }
            });
        </script>
</body>
</html>
