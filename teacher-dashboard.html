<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUGALIM.AI | Мугалимдин панели</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #e2e8f0; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0;
        }

        /* Каптал менюну бекитүү */
        .sidebar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100; /* Башка элементтердин астында калбашы үчүн */
        }

        /* Баскычтарды эң үстүнкү катмарга чыгаруу */
        .action-btn {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer !important;
            position: relative;
            z-index: 200; /* Маанилүү: баскыч эң үстүндө болушу керек */
            transition: 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .nav-link {
            cursor: pointer;
            z-index: 200;
        }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar (Сол жактагы меню) -->
    <aside class="sidebar w-64 p-6 flex flex-col fixed h-full">
        <div class="mb-10 px-4 text-xl font-black text-blue-500 tracking-tighter">MUGALIM.AI</div>
        
        <nav class="space-y-4 flex-1">
            <div onclick="window.location.href='teacher-dashboard.html'" class="nav-link flex items-center gap-3 px-4 py-3 font-bold uppercase text-[10px] tracking-widest text-white bg-blue-600/20 rounded-xl">
                <i class="fas fa-th-large"></i> Башкы бет
            </div>
            <div onclick="window.location.href='create-test.html'" class="nav-link flex items-center gap-3 px-4 py-3 font-bold uppercase text-[10px] tracking-widest text-gray-400 hover:text-white transition-all">
                <i class="fas fa-plus-circle"></i> Жаңы тест түзүү
            </div>
            <div onclick="window.location.href='my-tests.html'" class="nav-link flex items-center gap-3 px-4 py-3 font-bold uppercase text-[10px] tracking-widest text-gray-400 hover:text-white transition-all">
                <i class="fas fa-file-alt"></i> Менин тесттерим
            </div>
            <div onclick="window.location.href='results.html'" class="nav-link flex items-center gap-3 px-4 py-3 font-bold uppercase text-[10px] tracking-widest text-gray-400 hover:text-white transition-all">
                <i class="fas fa-chart-bar"></i> Жыйынтыктар
            </div>
        </nav>

        <button onclick="logoutNow()" class="mt-auto flex items-center gap-3 px-4 py-3 text-red-400 font-bold uppercase text-[10px] tracking-widest hover:bg-red-500/10 rounded-xl transition-all">
            <i class="fas fa-sign-out-alt"></i> Чыгуу
        </button>
    </aside>

    <!-- Негизги бөлүк (Main) -->
    <main class="ml-64 flex-1 p-10">
        <header class="mb-12">
            <p class="text-gray-400 font-medium">Кутман таң, Мугалим!</p>
            <h2 class="text-3xl font-black mt-2">Бүгүн окуучуларды эмне менен таң калтырабыз?</h2>
        </header>

        <!-- Статистика -->
        <div class="grid grid-cols-3 gap-6 mb-16">
            <div class="background: rgba(15, 23, 42, 0.6) p-8 rounded-[2rem] border border-white/5">
                <p class="text-[9px] font-black uppercase tracking-widest text-gray-500 mb-4">Менин тесттерим</p>
                <h3 id="test-count-val" class="text-6xl font-black italic">...</h3>
            </div>
            <div class="background: rgba(15, 23, 42, 0.6) p-8 rounded-[2rem] border border-white/5">
                <p class="text-[9px] font-black uppercase tracking-widest text-gray-500 mb-4">Тапшырган окуучулар</p>
                <h3 id="student-count-val" class="text-6xl font-black italic">...</h3>
            </div>
            <div class="background: rgba(15, 23, 42, 0.6) p-8 rounded-[2rem] border border-white/5">
                <p class="text-[9px] font-black uppercase tracking-widest text-gray-500 mb-4">Активдүүлүк</p>
                <h3 class="text-6xl font-black italic text-blue-500">A+</h3>
            </div>
        </div>

        <!-- Ыкчам баскычтар -->
        <h4 class="font-black uppercase tracking-[0.3em] text-xs mb-8">Ыкчам аракеттер</h4>
        <div class="grid grid-cols-4 gap-6">
            <div onclick="window.location.href='create-test.html'" class="action-btn p-8 rounded-[2rem] flex flex-col items-center gap-4 text-center">
                <div class="w-12 h-12 bg-blue-600/20 rounded-xl flex items-center justify-center text-blue-500"><i class="fas fa-plus"></i></div>
                <span class="font-bold uppercase text-[9px] tracking-widest">Тест түзүү</span>
            </div>
            <div onclick="window.location.href='results.html'" class="action-btn p-8 rounded-[2rem] flex flex-col items-center gap-4 text-center">
                <div class="w-12 h-12 bg-purple-600/20 rounded-xl flex items-center justify-center text-purple-500"><i class="fas fa-chart-line"></i></div>
                <span class="font-bold uppercase text-[9px] tracking-widest">Аналитика</span>
            </div>
            <div onclick="window.location.href='profile.html'" class="action-btn p-8 rounded-[2rem] flex flex-col items-center gap-4 text-center">
                <div class="w-12 h-12 bg-orange-600/20 rounded-xl flex items-center justify-center text-orange-500"><i class="fas fa-user"></i></div>
                <span class="font-bold uppercase text-[9px] tracking-widest">Профиль</span>
            </div>
            <div onclick="logoutNow()" class="action-btn p-8 rounded-[2rem] flex flex-col items-center gap-4 text-center">
                <div class="w-12 h-12 bg-red-600/20 rounded-xl flex items-center justify-center text-red-500"><i class="fas fa-power-off"></i></div>
                <span class="font-bold uppercase text-[9px] tracking-widest">Чыгуу</span>
            </div>
        </div>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const uid = user.uid;
                // Статистиканы жаңыртуу
                database.ref('tests').orderByChild('authorUid').equalTo(uid).on('value', (s) => {
                    document.getElementById('test-count-val').innerText = s.numChildren() || 0;
                });
                database.ref('results').orderByChild('teacherUid').equalTo(uid).on('value', (s) => {
                    document.getElementById('student-count-val').innerText = s.numChildren() || 0;
                });
            } else {
                window.location.href = 'login.html';
            }
        });

        function logoutNow() {
            auth.signOut().then(() => { window.location.href = 'login.html'; });
        }
    </script>
</body>
</html>
