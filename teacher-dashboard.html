<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUGALIM.AI | Мугалимдин панели</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #e2e8f0; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Каптал меню өз ордунда туруктуу турат */
        .sidebar { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.05); 
            width: 18rem; 
            flex-shrink: 0;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 50;
        }

        /* Негизги мазмун менюну капталдап турат */
        .main-content {
            flex: 1;
            margin-left: 18rem; 
            padding: 2.5rem;
            position: relative;
            z-index: 10;
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        /* Панелдерди жана баскычтарды активдүү (clickable) кылуучу стилдер */
        .clickable-panel {
            cursor: pointer !important;
            display: block;
            position: relative;
            z-index: 20;
            transition: all 0.3s ease;
        }

        .clickable-panel:hover {
            transform: translateY(-5px); 
            border-color: #3b82f6; 
            background: rgba(59, 130, 246, 0.1);
        }

        .clickable-panel:active {
            transform: scale(0.98);
        }

        .nav-link { 
            transition: 0.3s; 
            color: #94a3b8; 
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
        }
        
        .nav-link:hover, .nav-link.active { 
            color: white; 
            background: rgba(59, 130, 246, 0.1); 
            border-radius: 12px; 
        }
    </style>
</head>
<body>

    <aside class="sidebar p-6 flex flex-col">
        <div class="mb-10 px-4 text-2xl font-black text-blue-500 tracking-tighter">MUGALIM.AI</div>
        <nav class="space-y-2 flex-1">
            <a href="teacher-dashboard.html" class="nav-link active font-bold uppercase text-[11px] tracking-widest">
                <i class="fas fa-th-large w-5"></i> Башкы бет
            </a>
            <a href="create-test.html" class="nav-link font-bold uppercase text-[11px] tracking-widest">
                <i class="fas fa-plus-circle w-5"></i> Жаңы тест түзүү
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="mb-12">
            <p class="text-gray-400 font-medium mb-1">Кутман таң, Мугалим!</p>
            <h2 class="text-3xl font-black">Бүгүн окуучуларды эмне менен таң калтырабыз?</h2>
        </header>

        <div class="grid grid-cols-3 gap-8 mb-16">
            <a href="my-tests.html" class="clickable-panel glass-card p-10 rounded-[2.5rem]">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4">Менин тесттерим</p>
                <h3 id="test-count-display" class="text-7xl font-black italic">0</h3>
            </a>
            
            <a href="cabinet.html" class="clickable-panel glass-card p-10 rounded-[2.5rem]">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4">Тапшырган окуучулар</p>
                <h3 id="student-count-display" class="text-7xl font-black italic">0</h3>
            </a>
            
            <a href="cabinet.html" class="clickable-panel glass-card p-10 rounded-[2.5rem]">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4">Активдүүлүк</p>
                <h3 class="text-7xl font-black italic text-blue-500">A+</h3>
            </a>
        </div>

        <h4 class="font-black uppercase tracking-[0.3em] text-sm mb-8">
            <i class="fas fa-bolt text-yellow-400 mr-2"></i> Ыкчам аракеттер
        </h4>
        
        <div class="grid grid-cols-4 gap-6">
            <a href="create-test.html" class="clickable-panel glass-card p-8 rounded-[2rem] flex flex-col items-center text-center">
                <div class="w-14 h-14 bg-blue-600/20 rounded-2xl flex items-center justify-center text-blue-500 mb-4">
                    <i class="fas fa-plus text-xl"></i>
                </div>
                <span class="font-black uppercase text-[10px] tracking-widest">Тест түзүү</span>
            </a>
            
            <a href="my-tests.html" class="clickable-panel glass-card p-8 rounded-[2rem] flex flex-col items-center text-center">
                <div class="w-14 h-14 bg-purple-600/20 rounded-2xl flex items-center justify-center text-purple-500 mb-4">
                    <i class="fas fa-file-alt text-xl"></i>
                </div>
                <span class="font-black uppercase text-[10px] tracking-widest">Менин тесттерим</span>
            </a>
            
            <a href="cabinet.html" class="clickable-panel glass-card p-8 rounded-[2rem] flex flex-col items-center text-center">
                <div class="w-14 h-14 bg-orange-600/20 rounded-2xl flex items-center justify-center text-orange-500 mb-4">
                    <i class="fas fa-user-cog text-xl"></i>
                </div>
                <span class="font-black uppercase text-[10px] tracking-widest">Кабинет</span>
            </a>
            
            <div onclick="handleLogout()" class="clickable-panel glass-card p-8 rounded-[2rem] flex flex-col items-center text-center">
                <div class="w-14 h-14 bg-red-600/20 rounded-2xl flex items-center justify-center text-red-500 mb-4">
                    <i class="fas fa-power-off text-xl"></i>
                </div>
                <span class="font-black uppercase text-[10px] tracking-widest">Чыгуу</span>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        auth.onAuthStateChanged((user) => {
            if (user) {
                const uid = user.uid;
                database.ref('tests').orderByChild('authorUid').equalTo(uid).on('value', (s) => {
                    document.getElementById('test-count-display').innerText = s.numChildren() || 0;
                });
                database.ref('results').orderByChild('teacherUid').equalTo(uid).on('value', (s) => {
                    document.getElementById('student-count-display').innerText = s.numChildren() || 0;
                });
            } else {
                window.location.href = 'login.html';
            }
        });

        function handleLogout() {
            auth.signOut().then(() => { window.location.href = 'login.html'; });
        }
    </script>
</body>
</html>
