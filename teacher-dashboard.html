<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Башкаруу панели | MUGALIM.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-link:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .hero-text { background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Капталдагы меню (Sidebar) -->
    <aside class="w-64 glass-card border-r border-white/10 hidden md:flex flex-col">
        <div class="p-6">
            <div class="text-xl font-black text-blue-500 tracking-tighter uppercase">Mugalim.AI</div>
        </div>
        <nav class="flex-grow px-4 space-y-2">
            <a href="teacher-dashboard.html" class="sidebar-link flex items-center p-3 rounded-xl transition font-bold text-blue-400">
                <i class="fas fa-home mr-3"></i> Башкы бет
            </a>
            <a href="create-test.html" class="sidebar-link flex items-center p-3 rounded-xl transition">
                <i class="fas fa-plus-circle mr-3"></i> Жаңы тест түзүү
            </a>
            <a href="view-results.html" class="sidebar-link flex items-center p-3 rounded-xl transition">
                <i class="fas fa-chart-line mr-3"></i> Жыйынтыктар
            </a>
            <a href="#" class="sidebar-link flex items-center p-3 rounded-xl transition">
                <i class="fas fa-file-alt mr-3"></i> Менин сабактарым
            </a>
            <a href="#" class="sidebar-link flex items-center p-3 rounded-xl transition">
                <i class="fas fa-users mr-3"></i> Окуучулар
            </a>
        </nav>
        <div class="p-4 border-t border-white/10">
            <button onclick="logout()" class="w-full flex items-center p-3 text-red-400 hover:bg-red-500/10 rounded-xl transition font-bold">
                <i class="fas fa-sign-out-alt mr-3"></i> Чыгуу
            </button>
        </div>
    </aside>

    <!-- Негизги бөлүм -->
    <main class="flex-grow p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black">Кош келиңиз, <span id="user-email" class="text-blue-400">...</span>!</h1>
                <p class="text-gray-400">Бүгүн кандай жаңылыктар бар?</p>
            </div>
            <div class="flex items-center space-x-4">
                <div class="glass-card px-4 py-2 rounded-xl text-sm font-bold border-blue-500/30">
                    Статус: <span class="text-green-400">Мугалим</span>
                </div>
            </div>
        </header>

        <!-- Статистика карталары -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-card p-6 rounded-3xl border-l-4 border-blue-500">
                <div class="text-gray-400 text-sm font-bold uppercase tracking-widest mb-2">Жалпы тесттер</div>
                <div id="total-tests-count" class="text-4xl font-black">0</div>
            </div>
            <div class="glass-card p-6 rounded-3xl border-l-4 border-purple-500">
                <div class="text-gray-400 text-sm font-bold uppercase tracking-widest mb-2">Жалпы тапшыргандар</div>
                <div id="total-students-count" class="text-4xl font-black">0</div>
            </div>
            <div class="glass-card p-6 rounded-3xl border-l-4 border-green-500">
                <div class="text-gray-400 text-sm font-bold uppercase tracking-widest mb-2">Менин рейтингим</div>
                <div class="text-4xl font-black">#1</div>
            </div>
        </div>

        <!-- Иш аракеттер -->
        <h2 class="text-2xl font-bold mb-6 italic">Ыкчам аракеттер</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <!-- Тест түзүү баскычы -->
            <button onclick="window.location.href='create-test.html'" class="glass-card p-8 rounded-3xl hover:border-blue-500 transition text-center group">
                <i class="fas fa-plus text-3xl mb-4 text-blue-500 group-hover:scale-125 transition"></i>
                <div class="font-bold uppercase text-xs tracking-tighter">Тест түзүү</div>
            </button>
            
            <!-- Жыйынтыктар баскычы -->
            <button onclick="window.location.href='view-results.html'" class="glass-card p-8 rounded-3xl hover:border-purple-500 transition text-center group">
                <i class="fas fa-chart-line text-3xl mb-4 text-purple-500 group-hover:scale-125 transition"></i>
                <div class="font-bold uppercase text-xs tracking-tighter">Жыйынтыктар</div>
            </button>

            <button class="glass-card p-8 rounded-3xl hover:border-green-500 transition text-center group">
                <i class="fas fa-upload text-3xl mb-4 text-green-500 group-hover:scale-125 transition"></i>
                <div class="font-bold uppercase text-xs tracking-tighter">План жүктөө</div>
            </button>
            
            <button class="glass-card p-8 rounded-3xl hover:border-yellow-500 transition text-center group">
                <i class="fas fa-cog text-3xl mb-4 text-yellow-500 group-hover:scale-125 transition"></i>
                <div class="font-bold uppercase text-xs tracking-tighter">Ырастоолор</div>
            </button>
        </div>
    </main>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.firebaseio.com",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const database = firebase.database();

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('user-email').innerText = user.email;
                fetchStats(user.uid);
            } else {
                window.location.href = "cabinet.html";
            }
        });

        // Статистиканы базадан реалдуу убакытта алуу
        function fetchStats(uid) {
            // Тесттердин санын алуу
            database.ref(`tests/${uid}`).on('value', (snapshot) => {
                const count = snapshot.numChildren();
                document.getElementById('total-tests-count').innerText = count;
            });

            // Жалпы тапшырган окуучулардын санын алуу
            database.ref(`results/${uid}`).on('value', (snapshot) => {
                let totalResults = 0;
                snapshot.forEach((test) => {
                    totalResults += test.numChildren();
                });
                document.getElementById('total-students-count').innerText = totalResults;
            });
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = "index.html";
            });
        }
    </script>
</body>
</html>
