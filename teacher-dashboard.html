<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мугалимдин кабинети | BILIMAL.ORG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495571814896964" crossorigin="anonymous"></script>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto space-y-8">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white/5 p-6 rounded-[2rem] border border-white/5">
            <div>
                <h1 class="text-2xl font-black text-white uppercase tracking-tight">BILIMAL.ORG <span class="text-blue-500 text-sm font-normal lowercase">панель</span></h1>
                <p id="teacher-email" class="text-xs text-gray-400 mt-1">Жүктөлүүдө...</p>
            </div>
            <div class="flex flex-wrap gap-3 w-full md:w-auto">
                <button onclick="exportTableToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs uppercase tracking-wider px-5 py-3.5 rounded-xl transition-all shadow-lg shadow-emerald-900/20">
                    <i class="fas fa-file-excel mr-2"></i> Excel жүктөө
                </button>
                <a href="create-test.html" class="text-center bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold text-xs uppercase tracking-widest px-6 py-3.5 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                    <i class="fas fa-plus mr-2"></i> Жаңы тест түзүү
                </a>
                <button onclick="logout()" class="bg-white/5 hover:bg-red-500/20 text-gray-300 hover:text-red-400 p-3.5 rounded-xl transition-all border border-white/5">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <div class="space-y-4 lg:col-span-1">
                <h3 class="text-sm font-black uppercase tracking-widest text-blue-400 px-2"><i class="fas fa-folder-open mr-2"></i> Менин тесттерим</h3>
                <div id="my-quizzes-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                    <p class="text-xs text-gray-500 p-4">Тесттер жүктөлүүдө...</p>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-sm font-black uppercase tracking-widest text-emerald-400"><i class="fas fa-chart-bar mr-2"></i> Окуучулардын жыйынтыктары</h3>
                    <button onclick="clearAllResults()" class="text-[10px] uppercase font-bold text-red-400 hover:text-red-300 bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20">
                        <i class="fas fa-trash-alt mr-1"></i> Тазалоо
                    </button>
                </div>

                <div class="glass-card rounded-[2rem] overflow-hidden border border-white/5">
                    <div class="overflow-x-auto">
                        <table id="results-table" class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-white/5 text-[10px] uppercase tracking-wider font-bold text-gray-400 border-b border-white/5">
                                    <th class="p-4 pl-6">Окуучу</th>
                                    <th class="p-4">Тесттин аталышы</th>
                                    <th class="p-4 text-center">Упай (Баа)</th>
                                    <th class="p-4 text-center">Коопсуздук / Ачык суроо</th>
                                </tr>
                            </thead>
                            <tbody id="results-table-body" class="text-sm divide-y divide-white/5">
                                <tr>
                                    <td colspan="4" class="p-8 text-center text-xs text-gray-500">Азырынча жыйынтыктар жок...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="w-full opacity-80 mt-4">
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-format="autorelaxed"
                         data-ad-client="ca-pub-1495571814896964"
                         data-ad-slot="1574613769"></ins>
                    <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
                </div>
            </div>

        </div>
    </div>

    <div id="essay-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="w-full max-w-xl glass-card p-6 rounded-[2rem] space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="font-black uppercase text-sm text-purple-400">Окуучунун ачык жооптору</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div id="essay-modal-content" class="space-y-4 max-h-[400px] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUserId = null, quizSettingsMap = {}, rawResultsData = [];

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById('teacher-email').innerText = `Мугалим: ${user.email}`;
                loadTeacherData();
            } else {
                window.location.href = 'login.html';
            }
        });

        function loadTeacherData() {
            database.ref('tests').orderByChild('authorUid').equalTo(currentUserId).on('value', snapshot => {
                const list = document.getElementById('my-quizzes-list');
                list.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.values(data).forEach(quiz => {
                        quizSettingsMap[quiz.id] = quiz.settings || { grade5: 85, grade4: 70 };
                        const url = `http://bilimal.org/quiz.html?id=${quiz.id}`;
                        list.innerHTML += `
                            <div class="glass-card p-4 rounded-2xl border border-white/5 space-y-3">
                                <p class="font-bold text-sm text-white truncate">${quiz.title}</p>
                                <div class="grid grid-cols-3 gap-2">
                                    <button onclick="navigator.clipboard.writeText('${url}'); alert('Шилтеме көчүрүлдү!');" class="bg-blue-500/10 text-blue-400 py-1.5 rounded-lg text-[10px] font-bold border border-blue-500/20">Шилтеме</button>
                                    <a href="create-test.html?edit=${quiz.id}" class="text-center bg-amber-500/10 text-amber-400 py-1.5 rounded-lg text-[10px] font-bold border border-amber-500/20">Түзөтүү</a>
                                    <button onclick="if(confirm('Өчүрөсүзбү?')) database.ref('tests/${quiz.id}').remove();" class="bg-red-500/10 text-red-400 py-1.5 rounded-lg text-[10px] border border-red-500/20">Өчүрүү</button>
                                </div>
                            </div>`;
                    });
                } else {
                    list.innerHTML = `<p class="text-xs text-gray-500 text-center py-4">Тесттериңиз жок.</p>`;
                }
                loadResults();
            });
        }

        function loadResults() {
            database.ref('results').orderByChild('teacherUid').equalTo(currentUserId).on('value', snapshot => {
                const tableBody = document.getElementById('results-table-body');
                tableBody.innerHTML = "";
                rawResultsData = [];
                const data = snapshot.val();

                if (data) {
                    Object.keys(data).forEach(key => {
                        const res = data[key];
                        const quizId = key.split('_')[0];
                        const settings = quizSettingsMap[quizId] || { grade5: 85, grade4: 70 };
                        const percent = res.percent !== undefined ? res.percent : (Math.round((res.score / res.totalQuestions) * 100) || 0);
                        
                        let grade = "3";
                        if (percent >= settings.grade5) grade = "5";
                        else if (percent >= settings.grade4) grade = "4";
                        if (res.totalQuestions === 0) grade = "Текшерилет";

                        let cheatStatus = `<span class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded-md border border-emerald-500/20">Таза</span>`;
                        if (res.tabCheats > 0) cheatStatus = `<span class="text-xs bg-amber-500/10 text-amber-400 px-2 py-1 rounded-md border border-amber-500/20">Чыкты: ${res.tabCheats}</span>`;
                        if (res.isBlocked) cheatStatus = `<span class="text-xs bg-red-500/20 text-red-400 px-2 py-1 rounded-md border border-red-500/30 font-bold">Бөгөт!</span>`;

                        let openAnsBtn = "";
                        if(res.openAnswers) {
                            openAnsBtn = `<button onclick="viewEssay('${key}')" class="ml-2 bg-purple-500/20 text-purple-300 px-2 py-0.5 rounded text-[11px] font-bold border border-purple-500/30">Жооптор</button>`;
                        }

                        rawResultsData.push({ "Окуучу": res.studentName, "Тест": res.quizTitle, "Упай": `${res.score}/${res.totalQuestions}`, "Пайыз": `${percent}%`, "Баа": grade, "Эреже бузуу саны": res.tabCheats });

                        tableBody.innerHTML += `
                            <tr class="hover:bg-white/[0.02] transition-all">
                                <td class="p-4 pl-6 font-bold text-white">${res.studentName}</td>
                                <td class="p-4 text-gray-400 truncate max-w-[180px]">${res.quizTitle}</td>
                                <td class="p-4 text-center">
                                    <span class="font-black text-white">${res.score}/${res.totalQuestions}</span>
                                    <span class="ml-2 px-2 py-0.5 bg-blue-500/20 text-blue-400 rounded text-xs font-bold">${grade}</span>
                                </td>
                                <td class="p-4 text-center">${cheatStatus} ${openAnsBtn}</td>
                            </tr>`;
                    });
                } else {
                    tableBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500 text-xs">Жыйынтыктар жок.</td></tr>`;
                }
            });
        }

        function exportTableToExcel() {
            if(rawResultsData.length === 0) return alert("Маалымат жок!");
            const worksheet = XLSX.utils.json_to_sheet(rawResultsData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Жыйынтыктар");
            XLSX.writeFile(workbook, "BILIMAL_Жыйынтыктар.xlsx");
        }

        function viewEssay(resultKey) {
            database.ref('results/' + resultKey + '/openAnswers').once('value').then(snapshot => {
                const answers = snapshot.val();
                const content = document.getElementById('essay-modal-content');
                content.innerHTML = "";
                if(answers) {
                    answers.forEach(a => {
                        content.innerHTML += `
                            <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                                <p class="text-xs font-bold text-purple-400 mb-1">Суроо: ${a.questionText}</p>
                                <p class="text-sm text-gray-200 bg-black/30 p-2.5 rounded-lg whitespace-pre-wrap">${a.studentResponse || '(Жооп жок)'}</p>
                            </div>`;
                    });
                    document.getElementById('essay-modal').classList.remove('hidden');
                }
            });
        }

        function closeModal() { document.getElementById('essay-modal').classList.add('hidden'); }
        function clearAllResults() { if(confirm('Баарын тазалайсызбы?')) database.ref('results').remove(); }
        function logout() { auth.signOut().then(() => window.location.href = 'login.html'); }
    </script>
</body>
</html>
