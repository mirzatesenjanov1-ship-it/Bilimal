<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мугалимдин панели | MUGALIM.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #e2e8f0; 
            font-family: 'Montserrat', sans-serif; 
        }

        .sidebar {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-5px);
        }

        .nav-link {
            transition: 0.3s;
            color: #94a3b8;
        }

        .nav-link:hover, .nav-link.active {
            color: white;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 12px;
        }

        .action-btn {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .action-btn:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Каптал меню (Sidebar) -->
    <aside class="sidebar w-72 p-6 flex flex-col fixed h-full">
        <div class="mb-10 px-4">
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">MUGALIM<span class="text-white">.AI</span></h1>
        </div>

        <nav class="space-y-2 flex-1">
            <a href="#" class="nav-link active flex items-center gap-4 px-4 py-4 font-bold uppercase text-[11px] tracking-widest">
                <i class="fas fa-th-large"></i> Башкы бет
            </a>
            <a href="create-test.html" class="nav-link flex items-center gap-4 px-4 py-4 font-bold uppercase text-[11px] tracking-widest">
                <i class="fas fa-plus-circle"></i> Жаңы тест түзүү
            </a>
            <a href="my-tests.html" class="nav-link flex items-center gap-4 px-4 py-4 font-bold uppercase text-[11px] tracking-widest">
                <i class="fas fa-file-alt"></i> Менин тесттерим
            </a>
            <a href="results.html" class="nav-link flex items-center gap-4 px-4 py-4 font-bold uppercase text-[11px] tracking-widest">
                <i class="fas fa-chart-bar"></i> Жыйынтыктар
            </a>
            <a href="students.html" class="nav-link flex items-center gap-4 px-4 py-4 font-bold uppercase text-[11px] tracking-widest">
                <i class="fas fa-users"></i> Окуучулар
            </a>
        </nav>

        <button id="logout-btn" class="mt-auto flex items-center gap-4 px-4 py-4 text-red-400 font-bold uppercase text-[11px] tracking-widest hover:text-red-300">
            <i class="fas fa-sign-out-alt"></i> Чыгуу
        </button>
    </aside>

    <!-- Негизги бөлүк (Main Content) -->
    <main class="ml-72 flex-1 p-10">
        
        <header class="mb-12">
            <p class="text-gray-400 font-medium mb-1">Кутман таң, Мугалим!</p>
            <h2 class="text-3xl font-black">Бүгүн окуучуларды эмне менен таң калтырабыз?</h2>
        </header>

        <!-- Статистика -->
        <div class="grid grid-cols-3 gap-8 mb-16">
            <div class="glass-card p-10 rounded-[2.5rem] relative overflow-hidden">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4">Менин тесттерим</p>
                <h3 id="test-count-display" class="text-7xl font-black italic italic">...</h3>
                <i class="fas fa-file-invoice absolute -bottom-4 -right-4 text-8xl opacity-5"></i>
            </div>

            <div class="glass-card p-10 rounded-[2.5rem] relative overflow-hidden">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4">Тапшырган окуучулар</p>
                <h3 id="student-count-display" class="text-7xl font-black italic">...</h3>
                <i class="fas fa-user-graduate absolute -bottom-4 -right-4 text-8xl opacity-5"></i>
            </div>

            <div class="glass-card p-10 rounded-[2.5rem] relative overflow-hidden">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-4">Активдүүлүк</p>
                <h3 class="text-7xl font-black italic text-blue-500">A+</h3>
                <i class="fas fa-rocket absolute -bottom-4 -right-4 text-8xl opacity-5"></i>
            </div>
        </div>

        <!-- Ыкчам аракеттер -->
        <section>
            <h4 class="flex items-center gap-3 font-black uppercase tracking-[0.3em] text-sm mb-8">
                <i class="fas fa-bolt text-yellow-400"></i> Ыкчам аракеттер
            </h4>

            <div class="grid grid-cols-4 gap-6">
                <button onclick="location.href='create-test.html'" class="action-btn p-8 rounded-[2rem] flex flex-col items-center gap-4">
                    <div class="w-14 h-14 bg-blue-600/20 rounded-2xl flex items-center justify-center text-blue-500">
                        <i class="fas fa-plus text-xl"></i>
                    </div>
                    <span class="font-black uppercase text-[10px] tracking-widest">Тест түзүү</span>
                </button>

                <button class="action-btn p-8 rounded-[2rem] flex flex-col items-center gap-4">
                    <div class="w-14 h-14 bg-purple-600/20 rounded-2xl flex items-center justify-center text-purple-500">
                        <i class="fas fa-chart-pie text-xl"></i>
                    </div>
                    <span class="font-black uppercase text-[10px] tracking-widest">Аналитика</span>
                </button>

                <button class="action-btn p-8 rounded-[2rem] flex flex-col items-center gap-4">
                    <div class="w-14 h-14 bg-orange-600/20 rounded-2xl flex items-center justify-center text-orange-500">
                        <i class="fas fa-user-cog text-xl"></i>
                    </div>
                    <span class="font-black uppercase text-[10px] tracking-widest">Профиль</span>
                </button>

                <button id="quick-logout" class="action-btn p-8 rounded-[2rem] flex flex-col items-center gap-4">
                    <div class="w-14 h-14 bg-red-600/20 rounded-2xl flex items-center justify-center text-red-500">
                        <i class="fas fa-power-off text-xl"></i>
                    </div>
                    <span class="font-black uppercase text-[10px] tracking-widest">Чыгуу</span>
                </button>
            </div>
        </section>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Сиздин Firebase конфигурацияңыз
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Колдонуучунун абалын текшерүү жана маалыматтарды жүктөө
        auth.onAuthStateChanged((user) => {
            if (user) {
                const uid = user.uid;

                // 1. Мугалимдин тесттеринин санын алуу
                database.ref('tests').orderByChild('authorUid').equalTo(uid).on('value', (snapshot) => {
                    const testCount = snapshot.numChildren() || 0;
                    document.getElementById('test-count-display').innerText = testCount;
                });

                // 2. Окуучулардын тапшырган тесттеринин санын алуу
                // Бул үчүн quiz.html'де 'teacherUid' сакталышы керек
                database.ref('results').orderByChild('teacherUid').equalTo(uid).on('value', (snapshot) => {
                    const studentCount = snapshot.numChildren() || 0;
                    document.getElementById('student-count-display').innerText = studentCount;
                });

            } else {
                // Эгер кирбеген болсо, логин баракчасына жиберүү
                window.location.href = 'login.html';
            }
        });

        // Чыгуу функциясы
        document.getElementById('logout-btn').onclick = () => auth.signOut();
        document.getElementById('quick-logout').onclick = () => auth.signOut();
    </script>
</body>
</html>
