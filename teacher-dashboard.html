<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мугалимдин Жеке Кабинети | Bilimal.org</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .dashboard-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-text { background: linear-gradient(to right, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-btn.active { background-color: #f59e0b; color: #000; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row items-center justify-between gap-4 mb-8 border-b border-white/10 pb-6">
            <div>
                <h1 class="text-3xl font-black hero-text uppercase tracking-tight">МУГАЛИМДИН БАШКАРУУ ПАНЕЛИ</h1>
                <p class="text-xs text-gray-400 mt-1">Иштеп жаткан мугалим: <span id="teacher-email-display" class="text-cyan-400 font-bold">Жүктөлүүдө...</span></p>
            </div>
            <div class="flex gap-3">
                <a href="games/index.html" class="bg-blue-600/20 text-blue-400 border border-blue-500/30 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition"><i class="fas fa-gamepad mr-1"></i> Оюндар менюсу</a>
                <button onclick="logoutTeacher()" class="bg-rose-600/20 text-rose-400 border border-rose-500/30 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-rose-600 hover:text-white transition"><i class="fas fa-sign-out-alt mr-1"></i> Чыгуу</button>
            </div>
        </header>

        <div class="flex gap-4 mb-6">
            <button onclick="switchTab('results-tab')" id="btn-results-tab" class="tab-btn active px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition flex items-center gap-2"><i class="fas fa-users"></i> Окуучулардын жыйынтыктары</button>
            <button onclick="switchTab('quiz-tab')" id="btn-quiz-tab" class="tab-btn bg-white/5 text-gray-300 px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition flex items-center gap-2"><i class="fas fa-plus-circle"></i> Тест кошуу / Түзөтүү</button>
        </div>

        <div id="tab-results-content" class="space-y-6">
            <div class="dashboard-card p-6 rounded-3xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-sm font-bold text-amber-400 uppercase tracking-wide flex items-center gap-2"><i class="fas fa-trophy"></i> Жетишкендиктер жана Анти-чит көзөмөлү</h2>
                    <button onclick="loadAllScoresFromDatabase()" class="bg-cyan-500 hover:bg-cyan-600 text-black px-4 py-2 rounded-xl text-xs font-bold transition"><i class="fas fa-sync-alt"></i> Базаны жаңыртуу</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-gray-300">
                        <thead class="text-xs uppercase bg-white/5 text-gray-400 border-b border-white/10">
                            <tr>
                                <th class="p-4">Окуучунун аты-жөнү</th>
                                <th class="p-4">Классы / Тайпасы</th>
                                <th class="p-4">Упай (Тест)</th>
                                <th class="p-4">Анти-чит абалы</th>
                                <th class="p-4">Аракет</th>
                            </tr>
                        </thead>
                        <tbody id="students-scores-table" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-quiz-content" class="space-y-6 hidden">
            <div class="dashboard-card p-6 rounded-3xl grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">1. Предметти тандаңыз:</label>
                    <select id="quiz-subject" onchange="checkAndLoadExistingQuiz()" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition">
                        <option value="Физика">Физика</option>
                        <option value="Математика">Математика</option>
                        <option value="Кыргыз тили">Кыргыз тили</option>
                        <option value="Астрономия">Астрономия</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">2. Теманын аталышы (мис: Механика):</label>
                    <input type="text" id="quiz-theme" oninput="checkAndLoadExistingQuiz()" placeholder="Теманы киргизип Enter басыңыз..." class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition">
                    <span id="load-status" class="text-[11px] block mt-1 font-semibold"></span>
                </div>
            </div>

            <div id="questions-wrapper" class="space-y-6"></div>

            <div class="flex justify-end p-6 dashboard-card rounded-3xl">
                <button onclick="saveFullQuizToFirebase()" class="bg-amber-500 hover:bg-amber-600 text-black px-8 py-4 rounded-xl font-black text-sm uppercase tracking-widest transition shadow-lg">
                    <i class="fas fa-save mr-2"></i> Тестти базага сактоо / Жаңыртуу 💾
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('teacher-email-display').innerText = user.email;
                generateQuestionFields(); 
                loadAllScoresFromDatabase(); 
            } else {
                window.location.href = "index.html";
            }
        });

        function logoutTeacher() { auth.signOut(); }

        function switchTab(tabName) {
            if (tabName === 'results-tab') {
                document.getElementById('tab-results-content').classList.remove('hidden');
                document.getElementById('tab-quiz-content').classList.add('hidden');
                document.getElementById('btn-results-tab').className = "tab-btn active px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition flex items-center gap-2";
                document.getElementById('btn-quiz-tab').className = "tab-btn bg-white/5 text-gray-300 px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition flex items-center gap-2";
            } else {
                document.getElementById('tab-results-content').classList.add('hidden');
                document.getElementById('tab-quiz-content').classList.remove('hidden');
                document.getElementById('btn-quiz-tab').className = "tab-btn active px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition flex items-center gap-2";
                document.getElementById('btn-results-tab').className = "tab-btn bg-white/5 text-gray-300 px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition flex items-center gap-2";
            }
        }

        function loadAllScoresFromDatabase() {
            const tableBody = document.getElementById('students-scores-table');
            db.ref('results').on('value', (snapshot) => {
                const data = snapshot.val();
                tableBody.innerHTML = ""; 
                if (!data) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500">Азырынча упайлар каттала элек.</td></tr>`;
                    return;
                }
                Object.keys(data).forEach(id => {
                    const item = data[id];
                    const row = document.createElement('tr');
                    row.className = "hover:bg-white/5 transition";
                    row.innerHTML = `
                        <td class="p-4 font-semibold text-white">${item.name || item.studentName || "Окуучу"}</td>
                        <td class="p-4 text-gray-400">${item.class || item.grade || "8-класс"}</td>
                        <td class="p-4 font-bold text-cyan-400">${item.score || 0}/${item.maxScore || 30}</td>
                        <td class="p-4"><span class="bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-md text-[11px] font-bold">${item.cheat || "Таза"}</span></td>
                        <td class="p-4"><button onclick="db.ref('results/${id}').remove()" class="text-gray-500 hover:text-rose-400"><i class="fas fa-trash-alt"></i></button></td>
                    `;
                    tableBody.appendChild(row);
                });
            });
        }

        function generateQuestionFields() {
            const container = document.getElementById('questions-wrapper');
            container.innerHTML = "";
            for (let i = 1; i <= 20; i++) {
                const block = document.createElement('div');
                block.className = "dashboard-card p-6 rounded-[2rem] bg-white/5";
                block.innerHTML = `
                    <div class="mb-4">
                        <span class="bg-cyan-500/10 text-cyan-400 px-3 py-1 rounded-md text-[10px] font-black">СУРОО №${i}</span>
                        <input type="text" id="q-${i}-text" placeholder="Суроону жазыңыз..." class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white mt-2">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="q-${i}-a" placeholder="Вариант А (Дайыма ТУУРА ЖООПТУ жазыңыз)" class="w-full bg-emerald-500/5 border border-emerald-500/20 rounded-xl px-4 py-2.5 text-xs text-white">
                        <input type="text" id="q-${i}-b" placeholder="Ката вариант 1" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white">
                        <input type="text" id="q-${i}-c" placeholder="Ката variant 2" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white">
                        <input type="text" id="q-${i}-d" placeholder="Ката вариант 3" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white">
                    </div>
                `;
                container.appendChild(block);
            }
        }

        function safeFirebasePath(text) {
            if (!text) return 'default';
            let converted = text.toLowerCase().trim();
            const dict = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','ң':'ng','о':'o','ө':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ү':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'shch','ы':'y','э':'e','ю':'yu','я':'ya'};
            let result = '';
            for (let char of converted) { result += dict[char] !== undefined ? dict[char] : (/[a-z0-9_]/.test(char) ? char : (char === ' ' ? '_' : '')); }
            return result;
        }

        function checkAndLoadExistingQuiz() {
            const rawSubject = document.getElementById('quiz-subject').value;
            const rawTheme = document.getElementById('quiz-theme').value.trim();
            const statusSpan = document.getElementById('load-status');
            if (!rawTheme) return;

            const safeSub = safeFirebasePath(rawSubject);
            const safeThm = safeFirebasePath(rawTheme);

            statusSpan.innerText = "Базадан эски маалыматтар изделүүдө...";
            statusSpan.className = "text-[11px] text-amber-400 font-semibold";

            db.ref(`quizzes/${safeSub}/${safeThm}`).once('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.questions) {
                    statusSpan.innerText = "Эски тест табылды жана автоматтык түрдө толтурулду! ✔";
                    statusSpan.className = "text-[11px] text-emerald-400 font-semibold";
                    for (let i = 1; i <= 20; i++) {
                        const qData = data.questions[`q${i}`];
                        if (qData) {
                            document.getElementById(`q-${i}-text`).value = qData.question || "";
                            document.getElementById(`q-${i}-a`).value = qData.a || "";
                            document.getElementById(`q-${i}-b`).value = qData.b || "";
                            document.getElementById(`q-${i}-c`).value = qData.c || "";
                            document.getElementById(`q-${i}-d`).value = qData.d || "";
                        }
                    }
                } else {
                    statusSpan.innerText = "Бул тема боюнча жаңы бош тест түзүлүүдө.";
                    statusSpan.className = "text-[11px] text-cyan-400 font-semibold";
                }
            });
        }

        function saveFullQuizToFirebase() {
            const rawSubject = document.getElementById('quiz-subject').value;
            const rawTheme = document.getElementById('quiz-theme').value.trim();
            if (!rawTheme) return alert("Адегенде теманын аталышын жазыңыз!");

            const safeSub = safeFirebasePath(rawSubject);
            const safeThm = safeFirebasePath(rawTheme);
            const quizQuestions = {};
            
            for (let i = 1; i <= 20; i++) {
                quizQuestions[`q${i}`] = {
                    question: document.getElementById(`q-${i}-text`).value.trim(),
                    a: document.getElementById(`q-${i}-a`).value.trim(),
                    b: document.getElementById(`q-${i}-b`).value.trim(),
                    c: document.getElementById(`q-${i}-c`).value.trim(),
                    d: document.getElementById(`q-${i}-d`).value.trim()
                };
            }

            db.ref(`quizzes/${safeSub}/${safeThm}`).set({
                title: rawTheme,
                questions: quizQuestions,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => alert("Тест ийгиликтүү сакталды жана жаңыртылды!"));
        }
    </script>
</body>
</html>
