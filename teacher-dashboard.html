<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мугалимдин панели | MUGALIM.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .sidebar { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.5); }
        .nav-link { transition: 0.3s; border-radius: 12px; }
        .nav-link:hover, .nav-link.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .gradient-text { background: linear-gradient(45deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- Капталдагы меню (Sidebar) -->
    <aside class="sidebar w-64 hidden md:flex flex-col p-6 fixed h-full">
        <div class="mb-10">
            <h1 class="text-2xl font-black tracking-tighter text-blue-500 uppercase">Mugalim.ai</h1>
        </div>
        <nav class="flex-1 space-y-2">
            <a href="#" class="nav-link active flex items-center gap-3 p-3 font-bold text-sm uppercase tracking-wider">
                <i class="fas fa-home"></i> Башкы бет
            </a>
            <a href="create-test.html" class="nav-link flex items-center gap-3 p-3 font-bold text-sm uppercase tracking-wider text-gray-400">
                <i class="fas fa-plus-circle"></i> Жаңы тест түзүү
            </a>
            <a href="#" class="nav-link flex items-center gap-3 p-3 font-bold text-sm uppercase tracking-wider text-gray-400">
                <i class="fas fa-chart-line"></i> Жыйынтыктар
            </a>
            <a href="#" class="nav-link flex items-center gap-3 p-3 font-bold text-sm uppercase tracking-wider text-gray-400">
                <i class="fas fa-users"></i> Окуучулар
            </a>
        </nav>
        <div class="mt-auto pt-6 border-t border-white/5">
            <button onclick="logout()" class="text-red-400 hover:text-red-300 font-bold text-sm uppercase tracking-widest flex items-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Чыгуу
            </button>
        </div>
    </aside>

    <!-- Негизги мазмун -->
    <main class="flex-1 md:ml-64 p-6 md:p-12">
        <!-- Жогорку бөлүк -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h2 class="text-3xl md:text-5xl font-black mb-2">Кош келиңиз, <span id="user-display-name" class="gradient-text">...</span>!</h2>
                <p class="text-gray-400 font-medium">Бүгүн окуучуларды эмне менен таң калтырабыз?</p>
            </div>
            <div class="bg-green-500/10 border border-green-500/20 px-4 py-2 rounded-full flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-green-500 text-xs font-black uppercase tracking-widest">Статус: Мугалим</span>
            </div>
        </div>

        <!-- Статистикалык карточкалар -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-card p-8 rounded-[2rem] relative overflow-hidden group">
                <div class="relative z-10">
                    <p class="text-xs font-black text-gray-500 uppercase tracking-[0.2em] mb-4">Менин тесттерим</p>
                    <div class="text-6xl font-black tracking-tighter" id="test-count">0</div>
                </div>
                <i class="fas fa-file-signature absolute -right-4 -bottom-4 text-8xl text-blue-500/10 group-hover:text-blue-500/20 transition-all"></i>
            </div>

            <div class="glass-card p-8 rounded-[2rem] relative overflow-hidden group border-purple-500/20">
                <div class="relative z-10">
                    <p class="text-xs font-black text-gray-500 uppercase tracking-[0.2em] mb-4">Тапшырган окуучулар</p>
                    <div class="text-6xl font-black tracking-tighter">0</div>
                </div>
                <i class="fas fa-user-graduate absolute -right-4 -bottom-4 text-8xl text-purple-500/10 group-hover:text-purple-500/20 transition-all"></i>
            </div>

            <div class="glass-card p-8 rounded-[2rem] relative overflow-hidden group border-green-500/20">
                <div class="relative z-10">
                    <p class="text-xs font-black text-gray-500 uppercase tracking-[0.2em] mb-4">Активдүүлүк</p>
                    <div class="text-6xl font-black tracking-tighter uppercase">A+</div>
                </div>
                <i class="fas fa-rocket absolute -right-4 -bottom-4 text-8xl text-green-500/10 group-hover:text-green-500/20 transition-all"></i>
            </div>
        </div>

        <!-- Ыкчам аракеттер -->
        <h3 class="text-xl font-black uppercase tracking-widest mb-6 flex items-center gap-3">
            <i class="fas fa-bolt text-yellow-400"></i> Ыкчам аракеттер
        </h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <a href="create-test.html" class="glass-card p-6 rounded-3xl text-center flex flex-col items-center gap-4 hover:bg-blue-600 group transition-all">
                <div class="w-12 h-12 rounded-2xl bg-blue-500/20 flex items-center justify-center group-hover:bg-white/20">
                    <i class="fas fa-plus text-blue-400 group-hover:text-white"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-widest">Тест түзүү</span>
            </a>
            <!-- Башка баскычтар... -->
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Firebase конфигурациясы (Сөзсүз Бельгия сервери болушу керек)
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            messagingSenderId: "241750360816",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const database = firebase.database();

        // Колдонуучуну текшерүү жана маалыматтарды жүктөө
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Колдонуучунун атын чыгаруу (email'ден алынат же displayName)
                const userName = user.displayName || user.email.split('@')[0];
                document.getElementById('user-display-name').innerText = userName;

                // Ушул мугалимдин тесттерин эсептөө
                loadStats(user.uid);
            } else {
                window.location.replace("cabinet.html");
            }
        });

        function loadStats(uid) {
            // "tests" бөлүмүнөн authorUid боюнча издөө
            database.ref('tests').orderByChild('authorUid').equalTo(uid).on('value', (snapshot) => {
                const count = snapshot.numChildren();
                document.getElementById('test-count').innerText = count;
            }, (error) => {
                console.error("Маалымат алууда ката:", error);
            });
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.replace("cabinet.html");
            });
        }
    </script>
</body>
</html>
