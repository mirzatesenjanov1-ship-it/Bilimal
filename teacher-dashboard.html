<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мугалимдин кабинети | BILIMAL.ORG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white/5 p-6 rounded-[2rem] border border-white/5">
            <div>
                <h1 class="text-2xl font-black text-white uppercase tracking-tight">BILIMAL.ORG <span class="text-blue-500 text-sm font-normal lowercase">панель</span></h1>
                <p id="teacher-email" class="text-xs text-gray-400 mt-1">Жүктөлүүдө...</p>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <a href="create-test.html" class="flex-1 md:flex-none text-center bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold text-xs uppercase tracking-widest px-6 py-3.5 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                    <i class="fas fa-plus mr-2"></i> Жаңы тест түзүү
                </a>
                <button onclick="logout()" class="bg-white/5 hover:bg-red-500/20 text-gray-300 hover:text-red-400 p-3.5 rounded-xl transition-all border border-white/5">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-4">
                <h3 class="text-sm font-black uppercase tracking-widest text-blue-400 px-2"><i class="fas fa-folder-open mr-2"></i> Менин тесттерим</h3>
                <div id="my-quizzes-list" class="space-y-3 max-h-[550px] overflow-y-auto pr-2">
                    <p class="text-xs text-gray-500 p-4">Тесттер жүктөлүүдө...</p>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-sm font-black uppercase tracking-widest text-emerald-400"><i class="fas fa-chart-bar mr-2"></i> Окуучулардын жыйынтыктары</h3>
                    <button onclick="clearAllResults()" class="text-[10px] uppercase font-bold text-red-400 hover:text-red-300 bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20">
                        <i class="fas fa-trash-alt mr-1"></i> Тазалоо
                    </button>
                </div>

                <div class="glass-card rounded-[2rem] overflow-hidden border border-white/5">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-white/5 text-[10px] uppercase tracking-wider font-bold text-gray-400 border-b border-white/5">
                                    <th class="p-4 pl-6">Окуучу</th>
                                    <th class="p-4">Тесттин аталышы</th>
                                    <th class="p-4 text-center">Балл (Пайызы)</th>
                                    <th class="p-4 text-center">Анти-чит абалы</th>
                                </tr>
                            </thead>
                            <tbody id="results-table-body" class="text-sm divide-y divide-white/5">
                                <tr>
                                    <td colspan="4" class="p-8 text-center text-xs text-gray-500">Азырынча жыйынтыктар жок...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUserId = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById('teacher-email').innerText = `Мугалим: ${user.email}`;
                loadTeacherData();
            } else {
                window.location.href = 'login.html';
            }
        });

        function loadTeacherData() {
            database.ref('tests').orderByChild('authorUid').equalTo(currentUserId).on('value', snapshot => {
                const quizListContainer = document.getElementById('my-quizzes-list');
                quizListContainer.innerHTML = "";
                
                const data = snapshot.val();
                if (data) {
                    Object.values(data).forEach(quiz => {
                        const quizUrl = `http://bilimal.org/quiz.html?id=${quiz.id}`;
                        
                        quizListContainer.innerHTML += `
                            <div class="glass-card p-4 rounded-2xl border border-white/5 space-y-3">
                                <p class="font-bold text-sm text-white truncate">${quiz.title}</p>
                                <div class="grid grid-cols-3 gap-2">
                                    <button onclick="copyToClipboard('${quizUrl}')" class="bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white py-2 rounded-lg text-[10px] font-bold transition-all border border-blue-500/20" title="Шилтеме көчүрүү">
                                        <i class="fas fa-copy"></i> Шилтеме
                                    </button>
                                    <a href="create-test.html?edit=${quiz.id}" class="text-center bg-amber-500/10 text-amber-400 hover:bg-amber-500 hover:text-white py-2 rounded-lg text-[10px] font-bold transition-all border border-amber-500/20" title="Түзөтүү киргизүү">
                                        <i class="fas fa-edit"></i> Түзөтүү
                                    </a>
                                    <button onclick="deleteQuiz('${quiz.id}')" class="bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white py-2 rounded-lg text-[10px] transition-all border border-red-500/20" title="Өчүрүү">
                                        <i class="fas fa-trash"></i> Өчүрүү
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    quizListContainer.innerHTML = `<p class="text-xs text-gray-500 p-4 text-center bg-white/5 rounded-2xl border border-white/5">Сизде азырынча тест жок.</p>`;
                }
            });

            database.ref('results').orderByChild('teacherUid').equalTo(currentUserId).on('value', snapshot => {
                const tableBody = document.getElementById('results-table-body');
                tableBody.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        const res = data[key];
                        const percent = Math.round((res.score / res.totalQuestions) * 100) || 0;
                        
                        let cheatStatus = `<span class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded-md border border-emerald-500/20"><i class="fas fa-check-circle mr-1"></i> Таза</span>`;
                        if (res.tabCheats > 0) {
                            cheatStatus = `<span class="text-xs bg-amber-500/10 text-amber-400 px-2 py-1 rounded-md border border-amber-500/20"><i class="fas fa-exclamation-triangle mr-1"></i> Чыкты: ${res.tabCheats}</span>`;
                        }
                        if (res.isBlocked) {
                            cheatStatus = `<span class="text-xs bg-red-500/20 text-red-400 px-2 py-1 rounded-md border border-red-500/30 font-bold"><i class="fas fa-ban mr-1"></i> БӨГӨТ!</span>`;
                        }

                        tableBody.innerHTML += `
                            <tr class="hover:bg-white/[0.02] transition-all">
                                <td class="p-4 pl-6 font-bold text-white">${res.studentName}</td>
                                <td class="p-4 text-gray-400 max-w-[200px] truncate">${res.quizTitle}</td>
                                <td class="p-4 text-center">
                                    <span class="font-black text-white">${res.score}/${res.totalQuestions}</span>
                                    <span class="text-xs text-gray-400 block mt-0.5">(${percent}%)</span>
                                </td>
                                <td class="p-4 text-center">${cheatStatus}</td>
                            </tr>
                        `;
                    });
                } else {
                    tableBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-xs text-gray-500">Жыйынтыктар жок...</td></tr>`;
                }
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert("Тесттин шилтемеси көчүрүлдү!"));
        }

        function deleteQuiz(quizId) {
            if (confirm("Бул тестти өчүрүүнү каалайсызбы?")) { database.ref('tests/' + quizId).remove(); }
        }

        function clearAllResults() {
            if (confirm("Бардык жыйынтыктарды өчүрөсүзбү?")) {
                database.ref('results').orderByChild('teacherUid').equalTo(currentUserId).once('value', snapshot => {
                    const data = snapshot.val();
                    if (data) { Object.keys(data).forEach(key => database.ref('results/' + key).remove()); }
                });
            }
        }

        function logout() { auth.signOut().then(() => { window.location.href = 'login.html'; }); }
    </script>
</body>
</html>
