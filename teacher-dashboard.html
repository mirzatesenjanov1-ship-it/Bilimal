<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мугалимдин Жеке Кабинети | Bilimal.org</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .dashboard-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hero-text {
            background: linear-gradient(to right, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div id="auth-container" class="fixed inset-0 bg-[#050a18] flex items-center justify-center z-50">
        <div class="dashboard-card p-8 rounded-[2rem] w-full max-w-md border border-white/10 shadow-2xl">
            <h2 class="text-2xl font-black text-center text-amber-400 uppercase tracking-wide mb-2">BILIMAL.ORG ПОРТАЛЫ</h2>
            <p class="text-xs text-gray-400 text-center mb-6">Мугалимдер үчүн интерактивдүү Кыз Куумай оюну жана тесттик база.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Электрондук почта (Email):</label>
                    <input type="email" id="auth-email" placeholder="example@gmail.com" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Пароль жазыңыз:</label>
                    <input type="password" id="auth-password" placeholder="••••••••" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <button onclick="loginTeacher()" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-black font-black text-xs uppercase tracking-widest py-4 rounded-xl transition shadow-lg mt-2">
                    Улантуу жана Кирүү <i class="fas fa-arrow-right ml-1"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="main-dashboard" class="max-w-6xl mx-auto hidden">
        <header class="flex flex-col md:flex-between md:flex-row items-center justify-between gap-4 mb-8 border-b border-white/10 pb-6">
            <div>
                <h1 class="text-3xl font-black hero-text uppercase tracking-tight">Мугалимдин Башкаруу Панели</h1>
                <p class="text-xs text-gray-400 mt-1">Колдонуучу: <span id="teacher-email-display" class="text-cyan-400 font-bold"></span></p>
            </div>
            <div class="flex gap-3">
                <a href="games/index.html" class="bg-blue-600/20 text-blue-400 border border-blue-500/30 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition"><i class="fas fa-gamepad mr-1"></i> Оюндар менюсу</a>
                <button onclick="logoutTeacher()" class="bg-rose-600/20 text-rose-400 border border-rose-500/30 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-rose-600 hover:text-white transition"><i class="fas fa-sign-out-alt mr-1"></i> Чыгуу</button>
            </div>
        </header>

        <div class="dashboard-card p-6 rounded-3xl mb-8 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2"><i class="fas fa-book-open text-cyan-400 mr-1"></i> 1. Предметти тандаңыз:</label>
                <select id="quiz-subject" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition cursor-pointer">
                    <option value="Физика">Физика</option>
                    <option value="Математика">Математика</option>
                    <option value="Кыргыз тили">Кыргыз тили</option>
                    <option value="Астрономия">Астрономия</option>
                    <option value="Химия">Химия</option>
                    <option value="Биология">Биология</option>
                    <option value="Тарых">Тарых</option>
                    <option value="Информатика">Информатика</option>
                </select>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2"><i class="fas fa-tags text-pink-400 mr-1"></i> 2. Теманын аталышы (Жаңы же Түзөтүү):</label>
                <input type="text" id="quiz-theme" placeholder="Мисалы: Механика же Динамика" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition">
            </div>
        </div>

        <div id="questions-wrapper" class="space-y-6 mb-8"></div>

        <div class="flex flex-col md:flex-row items-center justify-between p-6 dashboard-card rounded-3xl gap-4">
            <p class="text-xs text-gray-400 max-w-xl"><i class="fas fa-info-circle text-amber-400 mr-1"></i> <strong>Вариант А</strong> талаасына дайыма <strong>ТУУРА ЖООПТУ</strong> жазыңыз. Оюн иштегенде варианттарды окуучуларга автоматтык түрдө аралаштырып (Рандом) чачып берет.</p>
            <button onclick="saveFullQuizToFirebase()" class="w-full md:w-auto bg-amber-500 hover:bg-amber-600 text-black px-8 py-4 rounded-xl font-black text-sm uppercase tracking-widest transition shadow-lg flex items-center justify-center gap-2">
                <i class="fas fa-save"></i> ОЮН БАЗАСЫН ЖАҢЫРТУУ
            </button>
        </div>
    </div>

    <script>
        // Коопсуз Firebase Конфигурациясы
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.database();

        // 1. Авторизация абалын текшерүү
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                document.getElementById('teacher-email-display').innerText = user.email;
                generateQuestionFields(); // Экранга 20 суроону куруу
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('main-dashboard').classList.add('hidden');
            }
        });

        // Кирүү функциясы
        function loginTeacher() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("Почта жана паролду жазыңыз!");

            auth.signInWithEmailAndPassword(email, password)
                .catch(err => alert("Кирүүдө ката кетти: " + err.message));
        }

        // Чыгуу функциясы
        function logoutTeacher() {
            auth.signOut();
        }

        // 2. Экранга 20 даана суроонун блогун чыгаруу
        function generateQuestionFields() {
            const container = document.getElementById('questions-wrapper');
            container.innerHTML = "";

            for (let i = 1; i <= 20; i++) {
                const block = document.createElement('div');
                block.className = "dashboard-card p-6 rounded-[2rem] border-white/5 bg-white/5";
                block.innerHTML = `
                    <div class="mb-4">
                        <span class="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-wider">Суроо №${i}</span>
                        <input type="text" id="q-${i}-text" placeholder="Бул жерге суроону жазыңыз..." class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition mt-2">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider block mb-1">Вариант А (Туура Жооп):</label>
                            <input type="text" id="q-${i}-a" placeholder="Туура жооп" class="w-full bg-emerald-500/5 border border-emerald-500/20 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-emerald-500 transition">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-rose-400 uppercase tracking-wider block mb-1">Вариант Б (Ката вариант):</label>
                            <input type="text" id="q-${i}-b" placeholder="Ката жооп 1" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-cyan-500 transition">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-rose-400 uppercase tracking-wider block mb-1">Вариант В (Ката вариант):</label>
                            <input type="text" id="q-${i}-c" placeholder="Ката жооп 2" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-cyan-500 transition">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-rose-400 uppercase tracking-wider block mb-1">Вариант Г (Ката variant):</label>
                            <input type="text" id="q-${i}-d" placeholder="Ката жооп 3" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-cyan-500 transition">
                        </div>
                    </div>
                `;
                container.appendChild(block);
            }
        }

        // Кирилди коопсуз латын форматына өткөрүү
        function safeFirebasePath(text) {
            if (!text) return 'default';
            let converted = text.toLowerCase().trim();
            const dict = {
                'а':'a', 'б':'b', 'в':'v', 'г':'g', 'д':'d', 'е':'e', 'ё':'yo', 'ж':'zh', 'з':'z',
                'и':'i', 'й':'y', 'к':'k', 'л':'l', 'м':'m', 'н':'n', 'ң':'ng', 'о':'o', 'ө':'o',
                'п':'p', 'р':'r', 'с':'s', 'т':'t', 'у':'u', 'ү':'u', 'ф':'f', 'х':'h', 'ц':'ts',
                'ч':'ch', 'ш':'sh', 'щ':'shch', 'ы':'y', 'э':'e', 'ю':'yu', 'я':'ya'
            };
            let result = '';
            for (let char of converted) {
                if (dict[char] !== undefined) result += dict[char];
                else if (/[a-z0-9_]/.test(char)) result += char;
                else if (char === ' ' || char === '-' || char === '_') result += '_';
            }
            return result.replace(/__+/g, '_').replace(/^_+|_+$/g, '');
        }

        // 3. Маалыматты Firebase'ге сактоо (Анти-чит жана СУРООЛОР)
        function saveFullQuizToFirebase() {
            const rawSubject = document.getElementById('quiz-subject').value;
            const rawTheme = document.getElementById('quiz-theme').value.trim();

            if (!rawTheme) {
                alert("Сураныч, адегенде Теманын аталышын жазыңыз!");
                return;
            }

            const safeSub = safeFirebasePath(rawSubject);
            const safeThm = safeFirebasePath(rawTheme);

            const quizQuestions = {};
            
            // 20 суроону тең текшерип жыйноо
            for (let i = 1; i <= 20; i++) {
                const txt = document.getElementById(`q-${i}-text`).value.trim();
                const ansA = document.getElementById(`q-${i}-a`).value.trim();
                const ansB = document.getElementById(`q-${i}-b`).value.trim();
                const ansC = document.getElementById(`q-${i}-c`).value.trim();
                const ansD = document.getElementById(`q-${i}-d`).value.trim();

                if (!txt || !ansA || !ansB || !ansC || !ansD) {
                    alert(`Ката! Сиз №${i} суроону же анын варианттарын бош калтырдыңыз!`);
                    return;
                }

                quizQuestions[`q${i}`] = {
                    question: txt,
                    a: ansA, // Дайыма Туура Жооп
                    b: ansB,
                    c: ansC,
                    d: ansD
                };
            }

            // Бардыгы жайында болсо quizzes папкасына жазуу (PERMISSION_DENIED катасы жоюлат)
            db.ref(`quizzes/${safeSub}/${safeThm}`).set({
                title: rawTheme,
                questions: quizQuestions,
                author: auth.currentUser.email,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            })
            .then(() => {
                alert("Ийгиликтүү! Тест базасы жаңыртылды. Окуучулар 'Интерактивдүү Оюндар' барагынан ойносо болот!");
            })
            .catch((err) => {
                alert("Ката чыкты: " + err.message + "\nFirebase Rules текшериңиз.");
            });
        }
    </script>
</body>
</html>
