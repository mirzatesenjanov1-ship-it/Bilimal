<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Башкаруу панели | MUGALIM.AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #e2e8f0; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .sidebar-link { transition: 0.3s; color: #94a3b8; }
        .sidebar-link:hover, .sidebar-link.active { 
            background: rgba(59, 130, 246, 0.1); 
            color: #3b82f6; 
        }

        .hero-text { 
            background: linear-gradient(to right, #3b82f6, #8b5cf6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.5);
        }

        /* Скроллду кооздоо */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050a18; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 glass-card border-r border-white/10 hidden md:flex flex-col sticky top-0 h-screen z-50">
        <div class="p-8">
            <div class="text-2xl font-black text-blue-500 tracking-tighter uppercase">Mugalim.AI</div>
        </div>
        
        <nav class="flex-grow px-4 space-y-2">
            <a href="teacher-dashboard.html" class="sidebar-link active flex items-center p-4 rounded-2xl font-bold">
                <i class="fas fa-home mr-3 text-lg"></i> Башкы бет
            </a>
            <a href="create-test.html" class="sidebar-link flex items-center p-4 rounded-2xl font-bold">
                <i class="fas fa-plus-circle mr-3 text-lg"></i> Жаңы тест түзүү
            </a>
            <a href="view-results.html" class="sidebar-link flex items-center p-4 rounded-2xl font-bold">
                <i class="fas fa-chart-line mr-3 text-lg"></i> Жыйынтыктар
            </a>
            <a href="#" class="sidebar-link flex items-center p-4 rounded-2xl font-bold opacity-50 cursor-not-allowed">
                <i class="fas fa-users mr-3 text-lg"></i> Окуучулар (Жакында)
            </a>
        </nav>

        <div class="p-6 border-t border-white/10">
            <button onclick="logout()" class="w-full flex items-center p-4 text-red-400 hover:bg-red-500/10 rounded-2xl transition font-bold">
                <i class="fas fa-sign-out-alt mr-3 text-lg"></i> Чыгуу
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-6 md:p-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-black tracking-tight">Кош келиңиз, <span id="user-email" class="hero-text">...</span>!</h1>
                <p class="text-gray-400 mt-2 font-medium">Бүгүн окуучуларды эмне менен таң калтырабыз?</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="glass-card px-5 py-2.5 rounded-2xl text-xs font-black border-blue-500/30 uppercase tracking-widest flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span>
                    Статус: Мугалим
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-card stat-card p-8 rounded-[2rem] border-l-4 border-blue-500 shadow-xl shadow-blue-900/10">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-2">Менин тесттерим</p>
                        <h3 id="total-tests-count" class="text-5xl font-black italic">0</h3>
                    </div>
                    <i class="fas fa-file-signature text-blue-500/20 text-4xl"></i>
                </div>
            </div>

            <div class="glass-card stat-card p-8 rounded-[2rem] border-l-4 border-purple-500 shadow-xl shadow-purple-900/10">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-2">Тапшырган окуучулар</p>
                        <h3 id="total-students-count" class="text-5xl font-black italic">0</h3>
                    </div>
                    <i class="fas fa-user-graduate text-purple-500/20 text-4xl"></i>
                </div>
            </div>

            <div class="glass-card stat-card p-8 rounded-[2rem] border-l-4 border-green-500 shadow-xl shadow-green-900/10">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-2">Активдүүлүк</p>
                        <h3 class="text-5xl font-black italic">А+</h3>
                    </div>
                    <i class="fas fa-rocket text-green-500/20 text-4xl"></i>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <h2 class="text-2xl font-black mb-8 flex items-center">
            <i class="fas fa-bolt text-yellow-400 mr-3"></i> Ыкчам аракеттер
        </h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <button onclick="window.location.href='create-test.html'" class="glass-card p-10 rounded-[2.5rem] hover:border-blue-500 group relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-600/10 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                <i class="fas fa-plus text-4xl mb-6 text-blue-500 group-hover:rotate-90 transition-transform"></i>
                <div class="font-black uppercase text-sm tracking-widest">Тест түзүү</div>
            </button>
            
            <button onclick="window.location.href='view-results.html'" class="glass-card p-10 rounded-[2.5rem] hover:border-purple-500 group relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-purple-600/10 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                <i class="fas fa-chart-pie text-4xl mb-6 text-purple-500 group-hover:scale-110 transition"></i>
                <div class="font-black uppercase text-sm tracking-widest">Аналитика</div>
            </button>

            <button class="glass-card p-10 rounded-[2.5rem] hover:border-green-500 group relative overflow-hidden opacity-80">
                <i class="fas fa-cloud-upload-alt text-4xl mb-6 text-green-500"></i>
                <div class="font-black uppercase text-sm tracking-widest text-gray-400">План жүктөө</div>
            </button>
            
            <button class="glass-card p-10 rounded-[2.5rem] hover:border-orange-500 group relative overflow-hidden">
                <i class="fas fa-user-cog text-4xl mb-6 text-orange-500"></i>
                <div class="font-black uppercase text-sm tracking-widest">Профиль</div>
            </button>
        </div>
    </main>

    <!-- Firebase Core & Auth (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.firebaseio.com",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            messagingSenderId: "241750360816",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const database = firebase.database();

        // 1. Коопсуздук: Колдонуучунун кирүү абалын текшерүү
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Email'дин биринчи бөлүгүн гана көрсөтүү (мисалы: admin@...)
                const displayName = user.email.split('@')[0];
                document.getElementById('user-email').innerText = displayName;
                fetchStats(user.uid);
            } else {
                // Кирбеген болсо cabinet.html барагына кууп жиберүү
                window.location.replace("cabinet.html");
            }
        });

        // 2. Статистиканы Realtime Database'ден алуу
        function fetchStats(uid) {
            // Тесттердин саны
            database.ref(`tests/${uid}`).on('value', (snapshot) => {
                const count = snapshot.exists() ? snapshot.numChildren() : 0;
                animateNumber('total-tests-count', count);
            }, (error) => {
                console.error("Тесттерди алууда ката:", error);
            });

            // Жыйынтыктарды (окуучуларды) эсептөө
            database.ref(`results/${uid}`).on('value', (snapshot) => {
                let totalStudents = 0;
                if (snapshot.exists()) {
                    snapshot.forEach((testFolder) => {
                        totalStudents += testFolder.numChildren();
                    });
                }
                animateNumber('total-students-count', totalStudents);
            });
        }

        // 3. Сандардын анимациясы (эффект үчүн)
        function animateNumber(id, target) {
            let current = 0;
            const element = document.getElementById(id);
            const step = target > 10 ? Math.ceil(target / 20) : 1;
            
            const timer = setInterval(() => {
                current += step;
                if (current >= target) {
                    element.innerText = target;
                    clearInterval(timer);
                } else {
                    element.innerText = current;
                }
            }, 30);
        }

        // 4. Системадан чыгуу
        function logout() {
            if(confirm("Чыгууну каалайсызбы?")) {
                auth.signOut().then(() => {
                    window.location.replace("index.html");
                }).catch((error) => {
                    alert("Ката кетти: " + error.message);
                });
            }
        }
    </script>
</body>
</html>
